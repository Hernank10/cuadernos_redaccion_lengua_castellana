<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuaderno del Párrafo Expositivo — 100 técnicas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=IBM+Plex+Mono:wght@400;500;600&family=Caveat:wght@400;600;700&family=Mrs+Saint+Delafield&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#E3E5E6;
    --paper-dark:#C9CFD3;
    --drawer:#3E5C76;
    --drawer-dark:#2C4258;
    --page:#F9FAF8;
    --ink:#232729;
    --ink-light:#68727A;
    --red:#A8342A;
    --green:#3F6B4C;
    --gold:#96702A;
    --rule:#CBD6DE;
    --margin-red:#B5645A;
    --shadow: 0 10px 30px rgba(35,39,41,0.18);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(ellipse at top left, rgba(255,255,255,0.25), transparent 50%),
      var(--paper);
    color:var(--ink);
    font-family:'Source Serif 4', serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:940px;margin:0 auto;padding:26px 16px 60px;}

  header{text-align:center;margin-bottom:20px;}
  .plate{
    display:inline-block;
    background:var(--drawer);
    border:2px solid var(--drawer-dark);
    border-radius:4px;
    padding:6px 22px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2), var(--shadow);
    transform:rotate(-0.6deg);
  }
  .plate h1{
    font-family:'Special Elite', monospace;
    font-size:1.22rem;
    letter-spacing:0.05em;
    margin:0;
    color:#eef2f5;
    text-transform:uppercase;
  }
  header p{color:var(--ink-light);font-size:0.92rem;margin:10px 0 0;font-style:italic;}

  .tabs{display:flex;gap:6px;overflow-x:auto;padding:4px 2px 12px;scrollbar-width:thin;}
  .tab{
    flex:0 0 auto;font-family:'IBM Plex Mono', monospace;font-size:0.63rem;letter-spacing:0.03em;
    background:var(--page);border:1px solid #c1c9cd;border-bottom:3px solid var(--drawer-dark);
    padding:7px 10px;border-radius:3px 3px 0 0;cursor:pointer;color:var(--ink-light);white-space:nowrap;
    transition:transform .12s ease, color .12s ease, background .12s ease;
  }
  .tab:hover{transform:translateY(-2px);}
  .tab.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}

  .modebar{display:flex;justify-content:center;gap:10px;margin:4px 0 18px;flex-wrap:wrap;}
  .mode-btn{
    font-family:'IBM Plex Mono', monospace;font-size:0.76rem;padding:8px 15px;border-radius:999px;
    border:1.5px solid var(--ink);background:transparent;color:var(--ink);cursor:pointer;letter-spacing:0.02em;
  }
  .mode-btn.active{background:var(--ink);color:var(--paper);}

  .dash{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
  .stat{background:var(--page);border:1px solid #c1c9cd;border-radius:6px;padding:10px 8px;text-align:center;box-shadow:0 2px 0 #c1c9cd;}
  .stat .num{font-family:'IBM Plex Mono', monospace;font-size:1.3rem;font-weight:600;color:var(--red);display:block;}
  .stat .lbl{font-size:0.64rem;letter-spacing:0.05em;text-transform:uppercase;color:var(--ink-light);}
  .progress-outer{grid-column:1/-1;height:10px;background:var(--paper-dark);border-radius:999px;overflow:hidden;border:1px solid #c1c9cd;}
  .progress-inner{height:100%;background:linear-gradient(90deg, var(--gold), var(--drawer));width:0%;transition:width .4s ease;}

  .notebook{
    position:relative;
    background:var(--page);
    border-radius:6px;
    box-shadow:var(--shadow);
    padding:28px 26px 26px 62px;
    min-height:420px;
    background-image:
      repeating-linear-gradient(to bottom, transparent 0px, transparent 33px, var(--rule) 33px, var(--rule) 34px);
    background-position:0 78px;
  }
  .notebook::before{
    content:'';
    position:absolute;
    top:0;bottom:0;left:46px;
    width:1.5px;
    background:var(--margin-red);
    opacity:0.55;
  }
  .rings{
    position:absolute;
    left:-14px; top:26px; bottom:26px;
    width:28px;
    display:flex; flex-direction:column; justify-content:space-between;
  }
  .ring{
    width:26px;height:26px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #f4efe0, #c8bb98 60%, #9c8c62);
    box-shadow: inset 0 0 0 4px var(--page), 0 1px 2px rgba(0,0,0,0.3);
  }

  .card-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
  .card-num{font-family:'IBM Plex Mono', monospace;font-size:0.82rem;color:var(--red);font-weight:600;}
  .card-block{font-family:'IBM Plex Mono', monospace;font-size:0.6rem;color:var(--ink-light);text-transform:uppercase;letter-spacing:0.03em;}
  .notebook h2{font-family:'Special Elite', monospace;font-size:1.08rem;line-height:1.35;margin:2px 0 12px;}
  .notebook .desc{font-size:1.0rem;line-height:1.65;color:#2b2f31;}
  .quiz-clue{font-size:1.0rem;line-height:1.65;color:#2b2f31;font-style:italic;}

  .options{display:grid;gap:9px;margin-top:16px;}
  .opt{
    text-align:left;font-family:'Source Serif 4', serif;font-size:0.94rem;background:var(--paper);
    border:1px solid #c1c9cd;border-radius:5px;padding:10px 12px;cursor:pointer;
    transition:background .12s ease, transform .1s ease;
  }
  .opt:hover{background:#fff;transform:translateX(2px);}
  .opt.correct{background:#e2ecdf;border-color:var(--green);color:var(--green);}
  .opt.wrong{background:#f3dedb;border-color:var(--red);color:var(--red);}
  .opt:disabled{cursor:default;}

  .card-actions{display:flex;justify-content:space-between;align-items:center;margin-top:18px;}
  .btn{
    font-family:'IBM Plex Mono', monospace;font-size:0.76rem;padding:9px 14px;border-radius:5px;
    border:1.5px solid var(--ink);background:var(--ink);color:var(--paper);cursor:pointer;
  }
  .btn.ghost{background:transparent;color:var(--ink);}
  .btn:disabled{opacity:0.35;cursor:default;}

  .stamp{
    position:absolute;top:34%;left:58%;transform:translate(-50%,-50%) rotate(-12deg) scale(0.5);
    font-family:'Special Elite', monospace;font-size:2rem;letter-spacing:0.08em;padding:8px 22px;
    border:5px solid;border-radius:8px;opacity:0;pointer-events:none;text-transform:uppercase;mix-blend-mode:multiply;
  }
  .stamp.show{animation: stampIn .35s ease-out forwards;}
  .stamp.ok{color:var(--green);border-color:var(--green);}
  .stamp.no{color:var(--red);border-color:var(--red);}
  @keyframes stampIn{
    0%{opacity:0;transform:translate(-50%,-50%) rotate(-12deg) scale(1.8);}
    60%{opacity:0.85;transform:translate(-50%,-50%) rotate(-12deg) scale(0.92);}
    100%{opacity:0.85;transform:translate(-50%,-50%) rotate(-12deg) scale(1);}
  }

  .write-panel{margin-top:18px;padding-top:14px;border-top:1px dashed #c1c9cd;}
  .write-panel .hint{
    font-family:'IBM Plex Mono', monospace;font-size:0.68rem;color:var(--ink-light);
    text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px;
  }
  .cursive-input{
    width:100%;border:none;border-bottom:2px solid var(--rule);background:transparent;
    font-family:'Caveat', cursive;font-size:1.55rem;color:#1f394d;padding:6px 2px;outline:none;
  }
  .cursive-input::placeholder{font-family:'Caveat', cursive;color:#9fb0bb;font-size:1.4rem;}
  .cursive-input:focus{border-bottom-color:var(--gold);}

  .sig-row{display:flex;gap:14px;align-items:flex-end;margin-top:16px;flex-wrap:wrap;}
  .sig-box{flex:1 1 220px;}
  .sig-box label{
    display:block;font-family:'IBM Plex Mono', monospace;font-size:0.62rem;text-transform:uppercase;
    letter-spacing:0.04em;color:var(--ink-light);margin-bottom:4px;
  }
  .sig-input{
    width:100%;border:none;border-bottom:2px solid var(--rule);background:transparent;
    font-family:'Mrs Saint Delafield', cursive;font-size:2rem;color:var(--red);padding:2px 2px 4px;outline:none;
  }
  .sig-input::placeholder{font-family:'Source Serif 4', serif;font-size:0.85rem;color:#aebbc3;font-style:italic;}

  footer{text-align:center;margin-top:26px;color:var(--ink-light);font-size:0.74rem;font-family:'IBM Plex Mono', monospace;}

  .log-empty{text-align:center;color:var(--ink-light);font-style:italic;padding:50px 20px;}
  .log-entry{
    border-bottom:1px dashed #c1c9cd;padding:16px 0;display:grid;
    grid-template-columns:70px 1fr;gap:14px;align-items:start;
  }
  .log-entry:last-child{border-bottom:none;}
  .log-num{font-family:'IBM Plex Mono', monospace;font-size:0.72rem;color:var(--red);padding-top:4px;}
  .log-title{font-family:'Special Elite', monospace;font-size:0.95rem;margin:0 0 6px;}
  .log-block{
    font-family:'IBM Plex Mono', monospace;font-size:0.6rem;color:var(--ink-light);
    text-transform:uppercase;letter-spacing:0.03em;margin-bottom:8px;display:block;
  }
  .log-written{font-family:'Caveat', cursive;font-size:1.4rem;color:#1f394d;line-height:1.3;margin:4px 0 8px;}
  .log-sig-row{display:flex;justify-content:space-between;align-items:flex-end;gap:10px;}
  .log-sig{font-family:'Mrs Saint Delafield', cursive;font-size:1.7rem;color:var(--red);}
  .log-date{font-family:'IBM Plex Mono', monospace;font-size:0.62rem;color:var(--ink-light);}
  .log-del{background:none;border:none;color:var(--ink-light);cursor:pointer;font-size:0.85rem;padding:2px 6px;}
  .log-del:hover{color:var(--red);}

  @media (max-width:520px){
    .dash{grid-template-columns:repeat(2,1fr);}
    .plate h1{font-size:0.92rem;}
    .notebook h2{font-size:0.92rem;}
    .notebook{padding-left:50px;}
    .log-entry{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="plate"><h1>Cuaderno del Párrafo Expositivo</h1></div>
    <p>100 técnicas para explicar con claridad — practica, escribe a mano y firma</p>
  </header>

  <div class="modebar">
    <button class="mode-btn active" data-mode="explorar">📖 Explorar</button>
    <button class="mode-btn" data-mode="practicar">✍️ Practicar (quiz)</button>
    <button class="mode-btn" data-mode="cuaderno">📓 Mi cuaderno</button>
  </div>

  <div class="dash">
    <div class="stat"><span class="num" id="statScore">0</span><span class="lbl">Puntaje</span></div>
    <div class="stat"><span class="num" id="statStreak">0</span><span class="lbl">Racha actual</span></div>
    <div class="stat"><span class="num" id="statBest">0</span><span class="lbl">Mejor racha</span></div>
    <div class="stat"><span class="num" id="statMastered">0/100</span><span class="lbl">Dominadas</span></div>
    <div class="progress-outer"><div class="progress-inner" id="progressBar"></div></div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="stage" style="position:relative;">
    <div class="notebook" id="notebook">
      <div class="rings" id="rings"></div>
      <div class="stamp" id="stamp"></div>
      <div id="notebookBody"></div>
    </div>
  </div>

  <footer>Tu cuaderno y tu progreso se guardan en este navegador.</footer>
  <div style="text-align:center;margin-top:10px;">
    <button class="btn ghost" id="resetBtn" style="font-size:0.68rem;">↺ Restablecer todo</button>
  </div>
</div>

<script>
const TECHNIQUES = [
// I. Elementos básicos del párrafo expositivo (1-12)
[1,1,"Tema","Asunto concreto sobre el que informa o explica el párrafo."],
[2,1,"Objetividad","Presentación de la información sin juicios de valor del autor."],
[3,1,"Claridad expositiva","Formulación de las ideas de manera comprensible y sin ambigüedad."],
[4,1,"Precisión terminológica","Uso exacto de los términos propios del tema tratado."],
[5,1,"Orden lógico","Disposición de la información según una secuencia racional reconocible."],
[6,1,"Idea central expositiva","Concepto principal que el párrafo desarrolla y explica."],
[7,1,"Dato o información verificable","Contenido que puede comprobarse en fuentes externas."],
[8,1,"Fuente de información","Origen de los datos o conceptos presentados en el párrafo."],
[9,1,"Nivel de especialización","Grado de profundidad técnica adecuado al tema y al público."],
[10,1,"Destinatario","Lector al que se dirige la explicación, según su conocimiento previo."],
[11,1,"Propósito informativo","Finalidad de transmitir conocimiento, no de persuadir ni narrar."],
[12,1,"Registro formal o neutro","Tono impersonal y preciso propio de los textos expositivos."],

// II. Tipos de exposición según su organización (13-27)
[13,2,"Exposición de definición","Explica el significado exacto de un concepto o término."],
[14,2,"Exposición de clasificación","Organiza la información en categorías o tipos."],
[15,2,"Exposición de comparación","Explica un tema señalando semejanzas y diferencias con otro."],
[16,2,"Exposición de causa-efecto","Explica por qué ocurre un fenómeno y qué consecuencias produce."],
[17,2,"Exposición de problema-solución","Presenta una dificultad y explica las formas de resolverla."],
[18,2,"Exposición de proceso","Explica cómo se desarrolla algo paso a paso."],
[19,2,"Exposición cronológica","Ordena la información según la sucesión temporal de los hechos."],
[20,2,"Exposición de enumeración","Presenta una lista ordenada de elementos relacionados con el tema."],
[21,2,"Exposición de ejemplificación","Explica una idea general apoyándose en casos concretos."],
[22,2,"Exposición analítica","Descompone el tema en sus partes para explicarlo con detalle."],
[23,2,"Exposición sintética","Condensa la información esencial de un tema ya desarrollado."],
[24,2,"Exposición descriptiva-explicativa","Combina detalles descriptivos con la explicación de su función."],
[25,2,"Exposición por preguntas y respuestas","Organiza la información respondiendo interrogantes concretas."],
[26,2,"Exposición deductiva","Presenta primero el principio general y luego sus aplicaciones."],
[27,2,"Exposición inductiva","Presenta casos particulares antes de llegar a una conclusión general."],

// III. Estructura del párrafo expositivo (28-40)
[28,3,"Párrafo de introducción al tema","Presenta el asunto y delimita lo que se va a explicar."],
[29,3,"Párrafo de desarrollo expositivo","Explica con detalle uno de los aspectos del tema."],
[30,3,"Párrafo de síntesis o resumen","Condensa la información ya expuesta en pocas líneas."],
[31,3,"Párrafo de definición inicial","Abre explicando el significado del concepto central del texto."],
[32,3,"Párrafo de contextualización","Sitúa el tema en su marco histórico, social o disciplinar."],
[33,3,"Párrafo de desarrollo por subtemas","Organiza la explicación dividiéndola en aspectos concretos."],
[34,3,"Párrafo de transición expositiva","Enlaza un subtema con el siguiente dentro del desarrollo."],
[35,3,"Párrafo de cierre expositivo","Recapitula lo explicado sin repetirlo literalmente."],
[36,3,"Estructura de bloque temático","Agrupa la información relacionada bajo un mismo apartado."],
[37,3,"Pirámide invertida aplicada a la exposición","Presenta primero la información más relevante para el lector."],
[38,3,"Estructura jerárquica general-particular","Va de una visión amplia del tema a sus aspectos específicos."],
[39,3,"Estructura en cadena","Cada concepto explicado conduce naturalmente al siguiente."],
[40,3,"Estructura comparativa en bloques","Dedica un bloque a cada elemento antes de compararlos."],

// IV. Recursos de precisión y claridad (41-58)
[41,4,"Definición explícita","Declara de forma directa qué significa un término clave."],
[42,4,"Definición por género próximo y diferencia específica","Ubica el concepto en una categoría y señala qué lo distingue dentro de ella."],
[43,4,"Reformulación","Repite una idea con otras palabras para asegurar su comprensión."],
[44,4,"Ejemplo ilustrativo","Aporta un caso concreto que aclara una idea abstracta."],
[45,4,"Analogía explicativa","Compara el concepto con algo más familiar para facilitar su comprensión."],
[46,4,"Comparación explicativa","Contrasta dos elementos para precisar las características de uno de ellos."],
[47,4,"Cifra o dato estadístico","Aporta un número que respalda y precisa la información expuesta."],
[48,4,"Cita de fuente especializada","Incorpora la voz de un experto o estudio reconocido en el tema."],
[49,4,"Clasificación en categorías","Organiza los elementos del tema en grupos según un criterio claro."],
[50,4,"Uso de tecnicismos justificados","Emplea vocabulario especializado solo cuando es necesario y se explica."],
[51,4,"Evitar la ambigüedad terminológica","Usa cada término con un único significado a lo largo del texto."],
[52,4,"Uso de sinónimos explicativos","Aclara un término técnico ofreciendo un equivalente más accesible."],
[53,4,"Aclaración entre paréntesis o guiones","Añade una precisión breve sin interrumpir el flujo de la oración principal."],
[54,4,"Nota aclaratoria o al pie","Ofrece información complementaria fuera del cuerpo principal del texto."],
[55,4,"Organización lógica visualizable","Estructura la información de forma que pueda representarse en un esquema mental."],
[56,4,"Ejemplos cotidianos para conceptos abstractos","Traduce ideas complejas a situaciones familiares para el lector."],
[57,4,"Contraste conceptual","Define un concepto señalando explícitamente lo que no es."],
[58,4,"Precisión en el uso de cuantificadores","Distingue con exactitud entre 'algunos', 'la mayoría' y 'todos'."],

// V. Conectores y marcadores expositivos (59-70)
[59,5,"Marcadores de orden","Expresiones como 'primero' o 'finalmente' que organizan la secuencia expositiva."],
[60,5,"Conectores de causa","Expresiones como 'debido a' que introducen la razón de un fenómeno."],
[61,5,"Conectores de consecuencia","Expresiones como 'por lo tanto' que introducen el efecto derivado."],
[62,5,"Conectores de adición","Expresiones como 'además' que suman nueva información relacionada."],
[63,5,"Conectores de contraste","Expresiones como 'mientras que' que señalan una diferencia entre elementos."],
[64,5,"Conectores de reformulación","Expresiones como 'es decir' que aclaran lo dicho con otras palabras."],
[65,5,"Conectores de ejemplificación","Expresiones como 'por ejemplo' que introducen un caso concreto."],
[66,5,"Conectores de síntesis","Expresiones como 'en resumen' que cierran condensando lo expuesto."],
[67,5,"Marcadores de énfasis","Expresiones como 'cabe destacar' que resaltan un dato relevante."],
[68,5,"Marcadores de fuente","Expresiones como 'según' que atribuyen la información a su origen."],
[69,5,"Conectores temporales expositivos","Expresiones como 'durante' o 'posteriormente' que ordenan el tiempo de los hechos explicados."],
[70,5,"Conectores espaciales expositivos","Expresiones como 'en el centro' o 'alrededor de' que ordenan la información en el espacio."],

// VI. Párrafo expositivo según el género textual (71-82)
[71,6,"Párrafo de manual o instructivo","Explica pasos o procedimientos con fines prácticos."],
[72,6,"Párrafo de libro de texto","Explica un contenido curricular con fines didácticos."],
[73,6,"Párrafo enciclopédico","Presenta información verificable de manera sistemática y neutral."],
[74,6,"Párrafo de divulgación científica","Explica conceptos especializados a un público no experto."],
[75,6,"Párrafo periodístico informativo","Explica un hecho o fenómeno de actualidad de forma objetiva."],
[76,6,"Párrafo de informe técnico","Expone datos y análisis con fines profesionales o institucionales."],
[77,6,"Párrafo de artículo académico","Explica conceptos o resultados con rigor metodológico."],
[78,6,"Párrafo de conferencia o ponencia","Organiza la explicación oral de un tema ante una audiencia."],
[79,6,"Párrafo de guía turística informativa","Explica datos prácticos y contextuales de un lugar."],
[80,6,"Párrafo de ficha técnica","Presenta las características esenciales de un producto o servicio."],
[81,6,"Párrafo de tutorial en línea","Explica un procedimiento paso a paso en formato digital."],
[82,6,"Párrafo de wiki colaborativa","Explica un tema de forma neutral y editable por varios autores."],

// VII. Técnicas de organización visual y estructural (83-90)
[83,7,"Uso de subtítulos temáticos","Divide visualmente el texto según los subtemas tratados."],
[84,7,"Uso de listas numeradas","Presenta pasos o elementos en un orden secuencial explícito."],
[85,7,"Uso de viñetas o listas no numeradas","Presenta elementos relacionados sin jerarquía de orden."],
[86,7,"Uso de tablas comparativas","Organiza visualmente datos para facilitar su comparación."],
[87,7,"Uso de negritas para términos clave","Resalta visualmente los conceptos más importantes del texto."],
[88,7,"Resumen ejecutivo inicial","Sintetiza al inicio los puntos clave para lectores con poco tiempo."],
[89,7,"Glosario de términos al final","Reúne y explica el vocabulario especializado usado en el texto."],
[90,7,"Preguntas frecuentes como estructura","Organiza la información respondiendo dudas habituales del lector."],

// VIII. Errores comunes en el párrafo expositivo (91-96)
[91,8,"Mezcla de opinión con información objetiva","Introduce juicios de valor personales en un texto que debería ser neutral."],
[92,8,"Exceso de tecnicismos sin explicación","Usa vocabulario especializado que el lector no puede comprender."],
[93,8,"Desorden en la secuencia lógica de ideas","Presenta la información sin un criterio de organización reconocible."],
[94,8,"Información redundante sin valor añadido","Repite datos ya mencionados sin aportar nada nuevo."],
[95,8,"Falta de ejemplos que faciliten la comprensión","Explica conceptos abstractos sin anclarlos en casos concretos."],
[96,8,"Densidad excesiva de datos sin jerarquía","Acumula información sin distinguir lo esencial de lo secundario."],

// IX. Técnicas bilingües del párrafo expositivo español-inglés (97-100)
[97,9,"Topic sentence + supporting details","Estructura explícita del inglés académico, adaptable al español expositivo."],
[98,9,"Densidad informativa entre idiomas","El inglés expositivo suele preferir frases más cortas y directas que el español."],
[99,9,"Traducción de tecnicismos y falsos amigos","Revisar que un término técnico traducido conserve su significado exacto."],
[100,9,"Adaptación del orden lógico al traducir","La secuencia de ideas debe ajustarse a las convenciones de cada idioma, no calcarse."]
].map(([id,block,title,desc])=>({id,block,title,desc}));

const BLOCK_NAMES = {
  1:"I · Elementos básicos", 2:"II · Tipos de exposición", 3:"III · Estructura del párrafo",
  4:"IV · Precisión y claridad", 5:"V · Conectores expositivos", 6:"VI · Según el género",
  7:"VII · Organización visual", 8:"VIII · Errores comunes", 9:"IX · Técnicas bilingües ES-EN"
};

const STORAGE_KEY = "cuaderno-parrafo-expositivo-v1";
let memoryStore = null;

function loadProgress(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return memoryStore || { score:0, streak:0, best:0, mastery:{}, log:[] };
}
function saveProgress(p){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); }
  catch(e){ memoryStore = p; }
}

let progress = loadProgress();
if(!progress.log) progress.log = [];
let currentBlock = "all";
let currentIndex = 0;
let mode = "explorar";
let quizCurrent = null;
let answered = false;

const tabsEl = document.getElementById('tabs');
const notebookBody = document.getElementById('notebookBody');
const stampEl = document.getElementById('stamp');
const ringsEl = document.getElementById('rings');

for(let i=0;i<9;i++){ const d=document.createElement('div'); d.className='ring'; ringsEl.appendChild(d); }

function buildTabs(){
  const blocks = [["all","Todas"], ...Object.entries(BLOCK_NAMES)];
  tabsEl.innerHTML = "";
  blocks.forEach(([key,label])=>{
    const b = document.createElement('button');
    b.className = 'tab' + (String(key)===String(currentBlock) ? ' active' : '');
    b.textContent = label;
    b.onclick = ()=>{ currentBlock = key; currentIndex = 0; buildTabs(); render(); };
    tabsEl.appendChild(b);
  });
  tabsEl.style.display = mode==="cuaderno" ? "none" : "flex";
}

function filteredTechniques(){
  if(currentBlock==="all") return TECHNIQUES;
  return TECHNIQUES.filter(t=>String(t.block)===String(currentBlock));
}

function updateDash(){
  document.getElementById('statScore').textContent = progress.score;
  document.getElementById('statStreak').textContent = progress.streak;
  document.getElementById('statBest').textContent = progress.best;
  const masteredCount = Object.values(progress.mastery).filter(v=>v>=3).length;
  document.getElementById('statMastered').textContent = masteredCount + "/100";
  document.getElementById('progressBar').style.width = masteredCount + "%";
}

function markSeen(id){
  if(!progress.mastery[id]) progress.mastery[id] = 1;
  saveProgress(progress);
  updateDash();
}

function renderExplorar(){
  const list = filteredTechniques();
  if(currentIndex>=list.length) currentIndex = 0;
  if(currentIndex<0) currentIndex = list.length-1;
  const t = list[currentIndex];
  const level = progress.mastery[t.id] || 0;
  const badge = level>=3 ? "🟢 dominada" : level>=2 ? "🟡 practicada" : level>=1 ? "⚪ vista" : "· sin visitar";
  notebookBody.innerHTML = `
    <div class="card-top">
      <span class="card-num">Nº ${String(t.id).padStart(3,'0')}</span>
      <span class="card-block">${BLOCK_NAMES[t.block]}</span>
    </div>
    <h2>${t.title}</h2>
    <p class="desc">${t.desc}</p>
    <p style="font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:var(--ink-light);margin-top:14px;">${badge}</p>
    <div class="card-actions">
      <button class="btn ghost" id="prevBtn">← Anterior</button>
      <button class="btn" id="nextBtn">Siguiente →</button>
    </div>
  `;
  stampEl.className = "stamp";
  markSeen(t.id);
  document.getElementById('prevBtn').onclick = ()=>{ currentIndex -= 1; renderExplorar(); };
  document.getElementById('nextBtn').onclick = ()=>{ currentIndex += 1; renderExplorar(); };
}

function pickQuizQuestion(){
  const pool = filteredTechniques();
  quizCurrent = pool[Math.floor(Math.random()*pool.length)];
  let sameBlock = TECHNIQUES.filter(t=>t.block===quizCurrent.block && t.id!==quizCurrent.id).sort(()=>Math.random()-0.5);
  let others = TECHNIQUES.filter(t=>t.id!==quizCurrent.id && t.block!==quizCurrent.block).sort(()=>Math.random()-0.5);
  const distractors = sameBlock.concat(others).slice(0,3);
  const options = [quizCurrent, ...distractors].sort(()=>Math.random()-0.5);
  answered = false;
  return options;
}

function renderPracticar(){
  const options = pickQuizQuestion();
  notebookBody.innerHTML = `
    <div class="card-top">
      <span class="card-num">Nº ${String(quizCurrent.id).padStart(3,'0')}</span>
      <span class="card-block">${BLOCK_NAMES[quizCurrent.block]}</span>
    </div>
    <p class="quiz-clue">"${quizCurrent.desc}"</p>
    <p style="font-family:'IBM Plex Mono',monospace;font-size:0.68rem;color:var(--ink-light);margin-top:8px;">¿A qué técnica del párrafo expositivo corresponde esta descripción?</p>
    <div class="options" id="optionsBox"></div>
    <div class="write-panel" id="writePanel" style="display:none;">
      <p class="hint">Ahora escríbela de tu puño y letra, como en un cuaderno</p>
      <input type="text" class="cursive-input" id="writeInput" placeholder="Escribe aquí el nombre de la técnica...">
      <div class="sig-row">
        <div class="sig-box">
          <label>Tu firma</label>
          <input type="text" class="sig-input" id="sigInput" placeholder="Firma con tu nombre o iniciales">
        </div>
        <button class="btn" id="saveLogBtn">Guardar en el cuaderno</button>
      </div>
    </div>
    <div class="card-actions">
      <button class="btn ghost" disabled></button>
      <button class="btn" id="nextBtn">Siguiente pregunta →</button>
    </div>
  `;
  stampEl.className = "stamp";
  const box = document.getElementById('optionsBox');
  options.forEach(opt=>{
    const b = document.createElement('button');
    b.className = 'opt';
    b.textContent = opt.title;
    b.onclick = ()=> handleAnswer(opt, b);
    box.appendChild(b);
  });
  document.getElementById('nextBtn').onclick = ()=> renderPracticar();
}

function handleAnswer(opt, btnEl){
  if(answered) return;
  answered = true;
  const isCorrect = opt.id === quizCurrent.id;
  document.querySelectorAll('#optionsBox .opt').forEach(b=>{
    b.disabled = true;
    if(b.textContent === quizCurrent.title) b.classList.add('correct');
  });
  if(!isCorrect) btnEl.classList.add('wrong');

  const prevLevel = progress.mastery[quizCurrent.id] || 0;
  if(isCorrect){
    progress.streak += 1;
    progress.best = Math.max(progress.best, progress.streak);
    progress.score += prevLevel>=2 ? 5 : 10;
    progress.mastery[quizCurrent.id] = prevLevel===0 ? 2 : Math.min(3, prevLevel+1);
    stampEl.textContent = "Correcto";
    stampEl.classList.add('ok');
  } else {
    progress.streak = 0;
    progress.mastery[quizCurrent.id] = Math.max(1, prevLevel);
    stampEl.textContent = "Revisar";
    stampEl.classList.add('no');
  }
  requestAnimationFrame(()=> stampEl.classList.add('show'));
  saveProgress(progress);
  updateDash();

  const panel = document.getElementById('writePanel');
  panel.style.display = 'block';
  const wi = document.getElementById('writeInput');
  wi.focus();
  document.getElementById('saveLogBtn').onclick = ()=>{
    const written = wi.value.trim();
    const sig = document.getElementById('sigInput').value.trim();
    if(!written){ wi.focus(); return; }
    progress.log.unshift({
      id: quizCurrent.id,
      block: quizCurrent.block,
      title: quizCurrent.title,
      written,
      sig: sig || "—",
      correct: isCorrect,
      date: new Date().toLocaleString('es-ES', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'})
    });
    saveProgress(progress);
    document.getElementById('saveLogBtn').textContent = "✓ Guardado";
    document.getElementById('saveLogBtn').disabled = true;
  };
}

function renderCuaderno(){
  if(progress.log.length===0){
    notebookBody.innerHTML = `<div class="log-empty">Tu cuaderno está vacío todavía.<br>Ve a "Practicar (quiz)", responde una pregunta y escribe tu respuesta a mano para guardarla aquí.</div>`;
    return;
  }
  const entries = progress.log.map((e,i)=>`
    <div class="log-entry">
      <div class="log-num">Nº ${String(e.id).padStart(3,'0')}</div>
      <div>
        <span class="log-block">${BLOCK_NAMES[e.block]} ${e.correct? '· ✅ correcta':'· ⚠️ a repasar'}</span>
        <p class="log-title">${e.title}</p>
        <p class="log-written">"${e.written}"</p>
        <div class="log-sig-row">
          <span class="log-sig">${e.sig}</span>
          <span class="log-date">${e.date}</span>
          <button class="log-del" data-idx="${i}" title="Eliminar entrada">🗑</button>
        </div>
      </div>
    </div>
  `).join("");
  notebookBody.innerHTML = `
    <div class="card-top">
      <span class="card-num">Mi cuaderno</span>
      <span class="card-block">${progress.log.length} entrada(s)</span>
    </div>
    ${entries}
  `;
  notebookBody.querySelectorAll('.log-del').forEach(btn=>{
    btn.onclick = ()=>{
      const idx = parseInt(btn.dataset.idx,10);
      progress.log.splice(idx,1);
      saveProgress(progress);
      renderCuaderno();
    };
  });
}

function render(){
  buildTabs();
  if(mode==="explorar") renderExplorar();
  else if(mode==="practicar") renderPracticar();
  else renderCuaderno();
  updateDash();
}

document.querySelectorAll('.mode-btn').forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll('.mode-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    mode = b.dataset.mode;
    currentIndex = 0;
    render();
  };
});

document.getElementById('resetBtn').onclick = ()=>{
  if(confirm("¿Restablecer todo tu progreso y borrar el cuaderno?")){
    progress = { score:0, streak:0, best:0, mastery:{}, log:[] };
    saveProgress(progress);
    render();
  }
};

render();
</script>
</body>
</html>
