<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuaderno del Párrafo Descriptivo — 100 técnicas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=IBM+Plex+Mono:wght@400;500;600&family=Caveat:wght@400;600;700&family=Mrs+Saint+Delafield&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#E4E7DE;
    --paper-dark:#CBD3C2;
    --drawer:#3E6E71;
    --drawer-dark:#2A4F52;
    --page:#FAF8F1;
    --ink:#242A26;
    --ink-light:#67716A;
    --red:#A8342A;
    --green:#3F6B4C;
    --gold:#96702A;
    --rule:#C9DAD4;
    --margin-red:#B5645A;
    --shadow: 0 10px 30px rgba(36,42,38,0.18);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(ellipse at top left, rgba(255,255,255,0.25), transparent 50%),
      var(--paper);
    color:var(--ink);
    font-family:'Source Serif 4', serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:940px;margin:0 auto;padding:26px 16px 60px;}

  header{text-align:center;margin-bottom:20px;}
  .plate{
    display:inline-block;
    background:var(--drawer);
    border:2px solid var(--drawer-dark);
    border-radius:4px;
    padding:6px 22px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2), var(--shadow);
    transform:rotate(-0.6deg);
  }
  .plate h1{
    font-family:'Special Elite', monospace;
    font-size:1.28rem;
    letter-spacing:0.05em;
    margin:0;
    color:#eef4f1;
    text-transform:uppercase;
  }
  header p{color:var(--ink-light);font-size:0.92rem;margin:10px 0 0;font-style:italic;}

  .tabs{display:flex;gap:6px;overflow-x:auto;padding:4px 2px 12px;scrollbar-width:thin;}
  .tab{
    flex:0 0 auto;font-family:'IBM Plex Mono', monospace;font-size:0.66rem;letter-spacing:0.03em;
    background:var(--page);border:1px solid #c3cdc0;border-bottom:3px solid var(--drawer-dark);
    padding:7px 10px;border-radius:3px 3px 0 0;cursor:pointer;color:var(--ink-light);white-space:nowrap;
    transition:transform .12s ease, color .12s ease, background .12s ease;
  }
  .tab:hover{transform:translateY(-2px);}
  .tab.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}

  .modebar{display:flex;justify-content:center;gap:10px;margin:4px 0 18px;flex-wrap:wrap;}
  .mode-btn{
    font-family:'IBM Plex Mono', monospace;font-size:0.76rem;padding:8px 15px;border-radius:999px;
    border:1.5px solid var(--ink);background:transparent;color:var(--ink);cursor:pointer;letter-spacing:0.02em;
  }
  .mode-btn.active{background:var(--ink);color:var(--paper);}

  .dash{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
  .stat{background:var(--page);border:1px solid #c3cdc0;border-radius:6px;padding:10px 8px;text-align:center;box-shadow:0 2px 0 #c3cdc0;}
  .stat .num{font-family:'IBM Plex Mono', monospace;font-size:1.3rem;font-weight:600;color:var(--red);display:block;}
  .stat .lbl{font-size:0.64rem;letter-spacing:0.05em;text-transform:uppercase;color:var(--ink-light);}
  .progress-outer{grid-column:1/-1;height:10px;background:var(--paper-dark);border-radius:999px;overflow:hidden;border:1px solid #c3cdc0;}
  .progress-inner{height:100%;background:linear-gradient(90deg, var(--gold), var(--drawer));width:0%;transition:width .4s ease;}

  .notebook{
    position:relative;
    background:var(--page);
    border-radius:6px;
    box-shadow:var(--shadow);
    padding:28px 26px 26px 62px;
    min-height:420px;
    background-image:
      repeating-linear-gradient(to bottom, transparent 0px, transparent 33px, var(--rule) 33px, var(--rule) 34px);
    background-position:0 78px;
  }
  .notebook::before{
    content:'';
    position:absolute;
    top:0;bottom:0;left:46px;
    width:1.5px;
    background:var(--margin-red);
    opacity:0.55;
  }
  .rings{
    position:absolute;
    left:-14px; top:26px; bottom:26px;
    width:28px;
    display:flex; flex-direction:column; justify-content:space-between;
  }
  .ring{
    width:26px;height:26px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #f4efe0, #c8bb98 60%, #9c8c62);
    box-shadow: inset 0 0 0 4px var(--page), 0 1px 2px rgba(0,0,0,0.3);
  }

  .card-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
  .card-num{font-family:'IBM Plex Mono', monospace;font-size:0.82rem;color:var(--red);font-weight:600;}
  .card-block{font-family:'IBM Plex Mono', monospace;font-size:0.62rem;color:var(--ink-light);text-transform:uppercase;letter-spacing:0.03em;}
  .notebook h2{font-family:'Special Elite', monospace;font-size:1.12rem;line-height:1.35;margin:2px 0 12px;}
  .notebook .desc{font-size:1.0rem;line-height:1.65;color:#2c322d;}
  .quiz-clue{font-size:1.0rem;line-height:1.65;color:#2c322d;font-style:italic;}

  .options{display:grid;gap:9px;margin-top:16px;}
  .opt{
    text-align:left;font-family:'Source Serif 4', serif;font-size:0.94rem;background:var(--paper);
    border:1px solid #c3cdc0;border-radius:5px;padding:10px 12px;cursor:pointer;
    transition:background .12s ease, transform .1s ease;
  }
  .opt:hover{background:#fff;transform:translateX(2px);}
  .opt.correct{background:#e2ecdf;border-color:var(--green);color:var(--green);}
  .opt.wrong{background:#f3dedb;border-color:var(--red);color:var(--red);}
  .opt:disabled{cursor:default;}

  .card-actions{display:flex;justify-content:space-between;align-items:center;margin-top:18px;}
  .btn{
    font-family:'IBM Plex Mono', monospace;font-size:0.76rem;padding:9px 14px;border-radius:5px;
    border:1.5px solid var(--ink);background:var(--ink);color:var(--paper);cursor:pointer;
  }
  .btn.ghost{background:transparent;color:var(--ink);}
  .btn:disabled{opacity:0.35;cursor:default;}

  .stamp{
    position:absolute;top:34%;left:58%;transform:translate(-50%,-50%) rotate(-12deg) scale(0.5);
    font-family:'Special Elite', monospace;font-size:2rem;letter-spacing:0.08em;padding:8px 22px;
    border:5px solid;border-radius:8px;opacity:0;pointer-events:none;text-transform:uppercase;mix-blend-mode:multiply;
  }
  .stamp.show{animation: stampIn .35s ease-out forwards;}
  .stamp.ok{color:var(--green);border-color:var(--green);}
  .stamp.no{color:var(--red);border-color:var(--red);}
  @keyframes stampIn{
    0%{opacity:0;transform:translate(-50%,-50%) rotate(-12deg) scale(1.8);}
    60%{opacity:0.85;transform:translate(-50%,-50%) rotate(-12deg) scale(0.92);}
    100%{opacity:0.85;transform:translate(-50%,-50%) rotate(-12deg) scale(1);}
  }

  .write-panel{margin-top:18px;padding-top:14px;border-top:1px dashed #c3cdc0;}
  .write-panel .hint{
    font-family:'IBM Plex Mono', monospace;font-size:0.68rem;color:var(--ink-light);
    text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px;
  }
  .cursive-input{
    width:100%;border:none;border-bottom:2px solid var(--rule);background:transparent;
    font-family:'Caveat', cursive;font-size:1.55rem;color:#1f4a48;padding:6px 2px;outline:none;
  }
  .cursive-input::placeholder{font-family:'Caveat', cursive;color:#9bb3ac;font-size:1.4rem;}
  .cursive-input:focus{border-bottom-color:var(--gold);}

  .sig-row{display:flex;gap:14px;align-items:flex-end;margin-top:16px;flex-wrap:wrap;}
  .sig-box{flex:1 1 220px;}
  .sig-box label{
    display:block;font-family:'IBM Plex Mono', monospace;font-size:0.62rem;text-transform:uppercase;
    letter-spacing:0.04em;color:var(--ink-light);margin-bottom:4px;
  }
  .sig-input{
    width:100%;border:none;border-bottom:2px solid var(--rule);background:transparent;
    font-family:'Mrs Saint Delafield', cursive;font-size:2rem;color:var(--red);padding:2px 2px 4px;outline:none;
  }
  .sig-input::placeholder{font-family:'Source Serif 4', serif;font-size:0.85rem;color:#a9bab2;font-style:italic;}

  footer{text-align:center;margin-top:26px;color:var(--ink-light);font-size:0.74rem;font-family:'IBM Plex Mono', monospace;}

  .log-empty{text-align:center;color:var(--ink-light);font-style:italic;padding:50px 20px;}
  .log-entry{
    border-bottom:1px dashed #c3cdc0;padding:16px 0;display:grid;
    grid-template-columns:70px 1fr;gap:14px;align-items:start;
  }
  .log-entry:last-child{border-bottom:none;}
  .log-num{font-family:'IBM Plex Mono', monospace;font-size:0.72rem;color:var(--red);padding-top:4px;}
  .log-title{font-family:'Special Elite', monospace;font-size:0.95rem;margin:0 0 6px;}
  .log-block{
    font-family:'IBM Plex Mono', monospace;font-size:0.6rem;color:var(--ink-light);
    text-transform:uppercase;letter-spacing:0.03em;margin-bottom:8px;display:block;
  }
  .log-written{font-family:'Caveat', cursive;font-size:1.4rem;color:#1f4a48;line-height:1.3;margin:4px 0 8px;}
  .log-sig-row{display:flex;justify-content:space-between;align-items:flex-end;gap:10px;}
  .log-sig{font-family:'Mrs Saint Delafield', cursive;font-size:1.7rem;color:var(--red);}
  .log-date{font-family:'IBM Plex Mono', monospace;font-size:0.62rem;color:var(--ink-light);}
  .log-del{background:none;border:none;color:var(--ink-light);cursor:pointer;font-size:0.85rem;padding:2px 6px;}
  .log-del:hover{color:var(--red);}

  @media (max-width:520px){
    .dash{grid-template-columns:repeat(2,1fr);}
    .plate h1{font-size:0.98rem;}
    .notebook h2{font-size:0.96rem;}
    .notebook{padding-left:50px;}
    .log-entry{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="plate"><h1>Cuaderno del Párrafo Descriptivo</h1></div>
    <p>100 técnicas para pintar con palabras — practica, escribe a mano y firma</p>
  </header>

  <div class="modebar">
    <button class="mode-btn active" data-mode="explorar">📖 Explorar</button>
    <button class="mode-btn" data-mode="practicar">✍️ Practicar (quiz)</button>
    <button class="mode-btn" data-mode="cuaderno">📓 Mi cuaderno</button>
  </div>

  <div class="dash">
    <div class="stat"><span class="num" id="statScore">0</span><span class="lbl">Puntaje</span></div>
    <div class="stat"><span class="num" id="statStreak">0</span><span class="lbl">Racha actual</span></div>
    <div class="stat"><span class="num" id="statBest">0</span><span class="lbl">Mejor racha</span></div>
    <div class="stat"><span class="num" id="statMastered">0/100</span><span class="lbl">Dominadas</span></div>
    <div class="progress-outer"><div class="progress-inner" id="progressBar"></div></div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="stage" style="position:relative;">
    <div class="notebook" id="notebook">
      <div class="rings" id="rings"></div>
      <div class="stamp" id="stamp"></div>
      <div id="notebookBody"></div>
    </div>
  </div>

  <footer>Tu cuaderno y tu progreso se guardan en este navegador.</footer>
  <div style="text-align:center;margin-top:10px;">
    <button class="btn ghost" id="resetBtn" style="font-size:0.68rem;">↺ Restablecer todo</button>
  </div>
</div>

<script>
const TECHNIQUES = [
// I. Elementos básicos del párrafo descriptivo (1-12)
[1,1,"Objeto de la descripción","Elemento —persona, lugar, cosa o proceso— que el párrafo describe."],
[2,1,"Punto de vista descriptivo","Posición estática o dinámica desde la que se observa lo descrito."],
[3,1,"Orden espacial","Secuencia en que se presentan los elementos del objeto descrito."],
[4,1,"Selección de rasgos relevantes","Elegir solo los detalles que aportan a la impresión buscada."],
[5,1,"Impresión general (idea dominante)","Sensación de conjunto que organiza y unifica todos los detalles."],
[6,1,"Detalle significativo","Rasgo concreto que condensa el carácter de lo descrito."],
[7,1,"Densidad descriptiva","Cantidad de información sensorial concentrada en el párrafo."],
[8,1,"Ritmo descriptivo","Velocidad con que se percibe el desarrollo de la descripción."],
[9,1,"Distancia del observador","Cercanía o lejanía desde la que se percibe lo descrito."],
[10,1,"Foco descriptivo","Decisión de describir el conjunto o solo una parte destacada."],
[11,1,"Precisión léxica descriptiva","Uso de palabras exactas en vez de términos vagos o genéricos."],
[12,1,"Enfoque subjetivo vs. objetivo","Grado en que la descripción refleja una valoración personal o datos verificables."],

// II. Tipos de descripción según el objeto (13-27)
[13,2,"Prosopografía","Descripción de los rasgos físicos exteriores de una persona."],
[14,2,"Etopeya","Descripción del carácter, las virtudes o los defectos morales de una persona."],
[15,2,"Retrato","Combina prosopografía y etopeya para describir a una persona por completo."],
[16,2,"Autorretrato","Descripción que una persona hace de sí misma."],
[17,2,"Topografía","Descripción detallada de un lugar o paisaje."],
[18,2,"Cronografía","Descripción de una época o un momento histórico."],
[19,2,"Descripción de objeto","Detalla forma, material, función o apariencia de una cosa."],
[20,2,"Zoografía","Descripción de un animal, su aspecto y comportamiento."],
[21,2,"Descripción de proceso","Explica cómo se desarrolla o transforma algo paso a paso."],
[22,2,"Descripción de ambiente","Recrea la atmósfera general de un espacio o situación."],
[23,2,"Descripción de estado emocional","Detalla cómo se manifiesta una emoción en gestos y sensaciones."],
[24,2,"Descripción sinestésica","Combina sensaciones de distintos sentidos en una misma imagen."],
[25,2,"Descripción hiperbólica","Exagera los rasgos del objeto para intensificar el efecto."],
[26,2,"Descripción caricaturesca","Deforma o exagera rasgos con intención humorística o crítica."],
[27,2,"Descripción alegórica","Los rasgos descritos representan una idea abstracta más amplia."],

// III. Tipos de descripción según su función (28-40)
[28,3,"Descripción técnica o científica","Prioriza la exactitud y el vocabulario especializado sobre el estilo."],
[29,3,"Descripción literaria","Busca crear una imagen evocadora con recursos estéticos."],
[30,3,"Descripción publicitaria","Resalta cualidades atractivas de un producto para persuadir."],
[31,3,"Descripción periodística","Aporta contexto visual o de escena dentro de una noticia o crónica."],
[32,3,"Descripción turística","Destaca atractivos de un lugar para invitar a visitarlo."],
[33,3,"Descripción jurídica o pericial","Detalla hechos o evidencias con precisión y neutralidad legal."],
[34,3,"Descripción didáctica","Explica un objeto o fenómeno con fines educativos, de forma clara."],
[35,3,"Descripción enciclopédica","Presenta datos objetivos y verificables de manera sistemática."],
[36,3,"Descripción impresionista","Sugiere una impresión general antes que un inventario exhaustivo de detalles."],
[37,3,"Descripción realista","Reproduce lo observado con fidelidad y detalle minucioso."],
[38,3,"Descripción costumbrista","Retrata usos, tipos sociales o escenas de la vida cotidiana de una región."],
[39,3,"Descripción onírica","Recrea la lógica difusa y simbólica propia de los sueños."],
[40,3,"Descripción simbólica","Los elementos descritos representan un significado más allá de lo literal."],

// IV. Órdenes de organización espacial (41-52)
[41,4,"Orden de arriba hacia abajo","Describe primero la parte superior del objeto y desciende progresivamente."],
[42,4,"Orden de abajo hacia arriba","Comienza por la base del objeto y asciende hasta la parte superior."],
[43,4,"Orden de izquierda a derecha","Recorre el espacio siguiendo esa dirección horizontal."],
[44,4,"Orden de fuera hacia dentro","Va del exterior del objeto o espacio hacia su interior."],
[45,4,"Orden de dentro hacia fuera","Comienza en el centro o interior y avanza hacia el exterior."],
[46,4,"Orden de lo general a lo particular","Presenta primero una visión de conjunto y luego los detalles."],
[47,4,"Orden de lo particular a lo general","Parte de un detalle concreto para construir la visión de conjunto."],
[48,4,"Orden de cerca a lejos","Describe primero lo más próximo y avanza hacia el fondo."],
[49,4,"Orden de lejos a cerca","Describe primero el fondo y se acerca progresivamente al primer plano."],
[50,4,"Orden circular o panorámico","Recorre el espacio en círculo, volviendo al punto de partida."],
[51,4,"Orden por planos","Organiza la descripción en primer plano, plano medio y fondo."],
[52,4,"Orden cronológico dentro de lo estático","Describe cómo cambia el objeto a lo largo del tiempo, aunque sea inmóvil."],

// V. Recursos estilísticos de la descripción (53-70)
[53,5,"Adjetivación precisa","Elegir el adjetivo exacto en vez de uno genérico o vacío."],
[54,5,"Adjetivación explicativa vs. especificativa","Distinguir el adjetivo que añade matiz del que restringe el significado."],
[55,5,"Epíteto","Adjetivo que resalta una cualidad ya inherente al sustantivo."],
[56,5,"Comparación (símil)","Relaciona el objeto descrito con otro mediante 'como' o 'cual'."],
[57,5,"Metáfora descriptiva","Atribuye al objeto cualidades de otro campo sin conector comparativo."],
[58,5,"Enumeración descriptiva","Presenta una serie de rasgos o elementos relacionados con el objeto."],
[59,5,"Gradación de rasgos","Ordena los detalles de menor a mayor intensidad o importancia."],
[60,5,"Personificación descriptiva","Atribuye cualidades humanas a un objeto, lugar o animal."],
[61,5,"Sinestesia","Combina dos sentidos distintos en una misma expresión descriptiva."],
[62,5,"Hipérbole descriptiva","Exagera un rasgo del objeto para intensificar la imagen."],
[63,5,"Antítesis descriptiva","Contrapone dos rasgos opuestos del objeto para definirlo mejor."],
[64,5,"Prosopopeya","Atribuye vida, voz o movimiento a algo inanimado o abstracto."],
[65,5,"Imagen sensorial visual","Detalle que apela a la vista: color, forma, luz."],
[66,5,"Imagen sensorial auditiva","Detalle que apela al oído: sonidos, silencios, ecos."],
[67,5,"Imagen sensorial olfativa","Detalle que apela al olfato: aromas, olores del entorno."],
[68,5,"Imagen sensorial táctil","Detalle que apela al tacto: texturas, temperaturas."],
[69,5,"Imagen sensorial gustativa","Detalle que apela al gusto: sabores asociados al objeto."],
[70,5,"Color y luz como recurso descriptivo","Usa tonalidades y luminosidad para construir la atmósfera visual."],

// VI. Técnicas de construcción del párrafo descriptivo (71-82)
[71,6,"Oración temática descriptiva","Primera oración que anuncia qué se va a describir y bajo qué impresión."],
[72,6,"Selección jerárquica de detalles","Ordenar los rasgos del más al menos relevante para la impresión buscada."],
[73,6,"Evitar la enumeración caótica","No acumular detalles sin un criterio de orden reconocible."],
[74,6,"Verbos de estado","Usar 'ser', 'estar' o 'parecer' para fijar cualidades del objeto descrito."],
[75,6,"Verbos de percepción","Usar 'ver', 'oír' o 'sentir' para introducir los detalles sensoriales."],
[76,6,"Precisión en medidas y proporciones","Indicar tamaños, distancias o cantidades de forma exacta cuando aporte valor."],
[77,6,"Contraste como recurso de definición","Definir un rasgo comparándolo con su opuesto."],
[78,6,"Repetición de un rasgo dominante","Insistir en un detalle clave para fijarlo en la memoria del lector."],
[79,6,"Cierre con impresión de conjunto","Terminar el párrafo con una síntesis de la sensación general producida."],
[80,6,"Evitar la sobreadjetivación","No acumular adjetivos que satura la frase sin aportar precisión."],
[81,6,"Equilibrio entre lo objetivo y lo evocador","Combinar datos verificables con recursos que sugieren atmósfera."],
[82,6,"Progresión de lo esencial a lo accesorio","Presentar primero los rasgos definitorios y luego los secundarios."],

// VII. Descripción y función narrativa (83-90)
[83,7,"Descripción como pausa narrativa","Detiene momentáneamente la acción para detallar espacio o personaje."],
[84,7,"Descripción que anticipa la trama","Los detalles descritos contienen pistas sobre lo que ocurrirá después."],
[85,7,"Descripción que revela carácter","Los rasgos físicos o del entorno sugieren la personalidad de alguien."],
[86,7,"Descripción como reflejo emocional","El entorno descrito refleja el estado de ánimo de un personaje."],
[87,7,"Descripción integrada en la acción","Los detalles aparecen mientras el personaje actúa, sin detener el relato."],
[88,7,"Descripción retardadora","Alarga deliberadamente el ritmo antes de un momento de tensión."],
[89,7,"Descripción simbólica del destino del personaje","El espacio descrito anticipa simbólicamente lo que le ocurrirá a alguien."],
[90,7,"Descripción como marco de apertura o cierre","Sitúa al lector al inicio o cierra el relato con una imagen descriptiva."],

// VIII. Errores comunes en la descripción (91-96)
[91,8,"Exceso de adjetivos vacíos","Usa adjetivos genéricos como 'bonito' o 'interesante' sin aportar precisión."],
[92,8,"Descripción sin orden ni jerarquía","Salta de un detalle a otro sin un criterio espacial o lógico reconocible."],
[93,8,"Descripción redundante","Repite la misma información con distintas palabras sin añadir matiz."],
[94,8,"Descripción desconectada del resto del texto","No aporta nada al tono, la trama o el propósito general del escrito."],
[95,8,"Descripción excesivamente larga sin función","Se extiende más de lo necesario sin justificar su peso en el conjunto."],
[96,8,"Falta de una idea dominante clara","Acumula detalles sin que quede clara la impresión general que se busca transmitir."],

// IX. Técnicas bilingües de la descripción español-inglés (97-100)
[97,9,"Orden de adjetivos entre idiomas","El inglés antepone el adjetivo al sustantivo; el español suele posponerlo."],
[98,9,"Densidad adjetival entre idiomas","El español tolera más adjetivos seguidos que el inglés, que prefiere mayor economía."],
[99,9,"Traducción de imágenes sensoriales","Buscar el equivalente evocador, no la traducción literal, al cambiar de idioma."],
[100,9,"Adaptación del ritmo descriptivo al traducir","La cadencia y extensión de la descripción debe ajustarse a las convenciones de cada idioma."]
].map(([id,block,title,desc])=>({id,block,title,desc}));

const BLOCK_NAMES = {
  1:"I · Elementos básicos", 2:"II · Según el objeto", 3:"III · Según su función",
  4:"IV · Orden espacial", 5:"V · Recursos estilísticos", 6:"VI · Construcción del párrafo",
  7:"VII · Función narrativa", 8:"VIII · Errores comunes", 9:"IX · Técnicas bilingües ES-EN"
};

const STORAGE_KEY = "cuaderno-parrafo-descriptivo-v1";
let memoryStore = null;

function loadProgress(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return memoryStore || { score:0, streak:0, best:0, mastery:{}, log:[] };
}
function saveProgress(p){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); }
  catch(e){ memoryStore = p; }
}

let progress = loadProgress();
if(!progress.log) progress.log = [];
let currentBlock = "all";
let currentIndex = 0;
let mode = "explorar";
let quizCurrent = null;
let answered = false;

const tabsEl = document.getElementById('tabs');
const notebookBody = document.getElementById('notebookBody');
const stampEl = document.getElementById('stamp');
const ringsEl = document.getElementById('rings');

for(let i=0;i<9;i++){ const d=document.createElement('div'); d.className='ring'; ringsEl.appendChild(d); }

function buildTabs(){
  const blocks = [["all","Todas"], ...Object.entries(BLOCK_NAMES)];
  tabsEl.innerHTML = "";
  blocks.forEach(([key,label])=>{
    const b = document.createElement('button');
    b.className = 'tab' + (String(key)===String(currentBlock) ? ' active' : '');
    b.textContent = label;
    b.onclick = ()=>{ currentBlock = key; currentIndex = 0; buildTabs(); render(); };
    tabsEl.appendChild(b);
  });
  tabsEl.style.display = mode==="cuaderno" ? "none" : "flex";
}

function filteredTechniques(){
  if(currentBlock==="all") return TECHNIQUES;
  return TECHNIQUES.filter(t=>String(t.block)===String(currentBlock));
}

function updateDash(){
  document.getElementById('statScore').textContent = progress.score;
  document.getElementById('statStreak').textContent = progress.streak;
  document.getElementById('statBest').textContent = progress.best;
  const masteredCount = Object.values(progress.mastery).filter(v=>v>=3).length;
  document.getElementById('statMastered').textContent = masteredCount + "/100";
  document.getElementById('progressBar').style.width = masteredCount + "%";
}

function markSeen(id){
  if(!progress.mastery[id]) progress.mastery[id] = 1;
  saveProgress(progress);
  updateDash();
}

function renderExplorar(){
  const list = filteredTechniques();
  if(currentIndex>=list.length) currentIndex = 0;
  if(currentIndex<0) currentIndex = list.length-1;
  const t = list[currentIndex];
  const level = progress.mastery[t.id] || 0;
  const badge = level>=3 ? "🟢 dominada" : level>=2 ? "🟡 practicada" : level>=1 ? "⚪ vista" : "· sin visitar";
  notebookBody.innerHTML = `
    <div class="card-top">
      <span class="card-num">Nº ${String(t.id).padStart(3,'0')}</span>
      <span class="card-block">${BLOCK_NAMES[t.block]}</span>
    </div>
    <h2>${t.title}</h2>
    <p class="desc">${t.desc}</p>
    <p style="font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:var(--ink-light);margin-top:14px;">${badge}</p>
    <div class="card-actions">
      <button class="btn ghost" id="prevBtn">← Anterior</button>
      <button class="btn" id="nextBtn">Siguiente →</button>
    </div>
  `;
  stampEl.className = "stamp";
  markSeen(t.id);
  document.getElementById('prevBtn').onclick = ()=>{ currentIndex -= 1; renderExplorar(); };
  document.getElementById('nextBtn').onclick = ()=>{ currentIndex += 1; renderExplorar(); };
}

function pickQuizQuestion(){
  const pool = filteredTechniques();
  quizCurrent = pool[Math.floor(Math.random()*pool.length)];
  let sameBlock = TECHNIQUES.filter(t=>t.block===quizCurrent.block && t.id!==quizCurrent.id).sort(()=>Math.random()-0.5);
  let others = TECHNIQUES.filter(t=>t.id!==quizCurrent.id && t.block!==quizCurrent.block).sort(()=>Math.random()-0.5);
  const distractors = sameBlock.concat(others).slice(0,3);
  const options = [quizCurrent, ...distractors].sort(()=>Math.random()-0.5);
  answered = false;
  return options;
}

function renderPracticar(){
  const options = pickQuizQuestion();
  notebookBody.innerHTML = `
    <div class="card-top">
      <span class="card-num">Nº ${String(quizCurrent.id).padStart(3,'0')}</span>
      <span class="card-block">${BLOCK_NAMES[quizCurrent.block]}</span>
    </div>
    <p class="quiz-clue">"${quizCurrent.desc}"</p>
    <p style="font-family:'IBM Plex Mono',monospace;font-size:0.68rem;color:var(--ink-light);margin-top:8px;">¿A qué técnica del párrafo descriptivo corresponde esta descripción?</p>
    <div class="options" id="optionsBox"></div>
    <div class="write-panel" id="writePanel" style="display:none;">
      <p class="hint">Ahora escríbela de tu puño y letra, como en un cuaderno</p>
      <input type="text" class="cursive-input" id="writeInput" placeholder="Escribe aquí el nombre de la técnica...">
      <div class="sig-row">
        <div class="sig-box">
          <label>Tu firma</label>
          <input type="text" class="sig-input" id="sigInput" placeholder="Firma con tu nombre o iniciales">
        </div>
        <button class="btn" id="saveLogBtn">Guardar en el cuaderno</button>
      </div>
    </div>
    <div class="card-actions">
      <button class="btn ghost" disabled></button>
      <button class="btn" id="nextBtn">Siguiente pregunta →</button>
    </div>
  `;
  stampEl.className = "stamp";
  const box = document.getElementById('optionsBox');
  options.forEach(opt=>{
    const b = document.createElement('button');
    b.className = 'opt';
    b.textContent = opt.title;
    b.onclick = ()=> handleAnswer(opt, b);
    box.appendChild(b);
  });
  document.getElementById('nextBtn').onclick = ()=> renderPracticar();
}

function handleAnswer(opt, btnEl){
  if(answered) return;
  answered = true;
  const isCorrect = opt.id === quizCurrent.id;
  document.querySelectorAll('#optionsBox .opt').forEach(b=>{
    b.disabled = true;
    if(b.textContent === quizCurrent.title) b.classList.add('correct');
  });
  if(!isCorrect) btnEl.classList.add('wrong');

  const prevLevel = progress.mastery[quizCurrent.id] || 0;
  if(isCorrect){
    progress.streak += 1;
    progress.best = Math.max(progress.best, progress.streak);
    progress.score += prevLevel>=2 ? 5 : 10;
    progress.mastery[quizCurrent.id] = prevLevel===0 ? 2 : Math.min(3, prevLevel+1);
    stampEl.textContent = "Correcto";
    stampEl.classList.add('ok');
  } else {
    progress.streak = 0;
    progress.mastery[quizCurrent.id] = Math.max(1, prevLevel);
    stampEl.textContent = "Revisar";
    stampEl.classList.add('no');
  }
  requestAnimationFrame(()=> stampEl.classList.add('show'));
  saveProgress(progress);
  updateDash();

  const panel = document.getElementById('writePanel');
  panel.style.display = 'block';
  const wi = document.getElementById('writeInput');
  wi.focus();
  document.getElementById('saveLogBtn').onclick = ()=>{
    const written = wi.value.trim();
    const sig = document.getElementById('sigInput').value.trim();
    if(!written){ wi.focus(); return; }
    progress.log.unshift({
      id: quizCurrent.id,
      block: quizCurrent.block,
      title: quizCurrent.title,
      written,
      sig: sig || "—",
      correct: isCorrect,
      date: new Date().toLocaleString('es-ES', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'})
    });
    saveProgress(progress);
    document.getElementById('saveLogBtn').textContent = "✓ Guardado";
    document.getElementById('saveLogBtn').disabled = true;
  };
}

function renderCuaderno(){
  if(progress.log.length===0){
    notebookBody.innerHTML = `<div class="log-empty">Tu cuaderno está vacío todavía.<br>Ve a "Practicar (quiz)", responde una pregunta y escribe tu respuesta a mano para guardarla aquí.</div>`;
    return;
  }
  const entries = progress.log.map((e,i)=>`
    <div class="log-entry">
      <div class="log-num">Nº ${String(e.id).padStart(3,'0')}</div>
      <div>
        <span class="log-block">${BLOCK_NAMES[e.block]} ${e.correct? '· ✅ correcta':'· ⚠️ a repasar'}</span>
        <p class="log-title">${e.title}</p>
        <p class="log-written">"${e.written}"</p>
        <div class="log-sig-row">
          <span class="log-sig">${e.sig}</span>
          <span class="log-date">${e.date}</span>
          <button class="log-del" data-idx="${i}" title="Eliminar entrada">🗑</button>
        </div>
      </div>
    </div>
  `).join("");
  notebookBody.innerHTML = `
    <div class="card-top">
      <span class="card-num">Mi cuaderno</span>
      <span class="card-block">${progress.log.length} entrada(s)</span>
    </div>
    ${entries}
  `;
  notebookBody.querySelectorAll('.log-del').forEach(btn=>{
    btn.onclick = ()=>{
      const idx = parseInt(btn.dataset.idx,10);
      progress.log.splice(idx,1);
      saveProgress(progress);
      renderCuaderno();
    };
  });
}

function render(){
  buildTabs();
  if(mode==="explorar") renderExplorar();
  else if(mode==="practicar") renderPracticar();
  else renderCuaderno();
  updateDash();
}

document.querySelectorAll('.mode-btn').forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll('.mode-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    mode = b.dataset.mode;
    currentIndex = 0;
    render();
  };
});

document.getElementById('resetBtn').onclick = ()=>{
  if(confirm("¿Restablecer todo tu progreso y borrar el cuaderno?")){
    progress = { score:0, streak:0, best:0, mastery:{}, log:[] };
    saveProgress(progress);
    render();
  }
};

render();
</script>
</body>
</html>
