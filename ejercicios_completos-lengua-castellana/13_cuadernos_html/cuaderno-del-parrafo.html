<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuaderno del Párrafo — 100 técnicas y tipos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=IBM+Plex+Mono:wght@400;500;600&family=Caveat:wght@400;600;700&family=Mrs+Saint+Delafield&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#E7E3D3;
    --paper-dark:#D3CBAE;
    --drawer:#8FA88C;
    --drawer-dark:#6C8768;
    --page:#FBF9F0;
    --ink:#26291F;
    --ink-light:#6E715F;
    --red:#A8342A;
    --green:#3F6B4C;
    --gold:#96702A;
    --rule:#BFD0C6;
    --margin-red:#B5645A;
    --shadow: 0 10px 30px rgba(38,41,31,0.18);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(ellipse at top left, rgba(255,255,255,0.25), transparent 50%),
      var(--paper);
    color:var(--ink);
    font-family:'Source Serif 4', serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:940px;margin:0 auto;padding:26px 16px 60px;}

  header{text-align:center;margin-bottom:20px;}
  .plate{
    display:inline-block;
    background:var(--drawer);
    border:2px solid var(--drawer-dark);
    border-radius:4px;
    padding:6px 22px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.25), var(--shadow);
    transform:rotate(-0.6deg);
  }
  .plate h1{
    font-family:'Special Elite', monospace;
    font-size:1.35rem;
    letter-spacing:0.05em;
    margin:0;
    color:#20241a;
    text-transform:uppercase;
  }
  header p{color:var(--ink-light);font-size:0.92rem;margin:10px 0 0;font-style:italic;}

  .tabs{display:flex;gap:6px;overflow-x:auto;padding:4px 2px 12px;scrollbar-width:thin;}
  .tab{
    flex:0 0 auto;font-family:'IBM Plex Mono', monospace;font-size:0.7rem;letter-spacing:0.03em;
    background:var(--page);border:1px solid #cdc6ad;border-bottom:3px solid var(--drawer-dark);
    padding:7px 10px;border-radius:3px 3px 0 0;cursor:pointer;color:var(--ink-light);white-space:nowrap;
    transition:transform .12s ease, color .12s ease, background .12s ease;
  }
  .tab:hover{transform:translateY(-2px);}
  .tab.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}

  .modebar{display:flex;justify-content:center;gap:10px;margin:4px 0 18px;flex-wrap:wrap;}
  .mode-btn{
    font-family:'IBM Plex Mono', monospace;font-size:0.76rem;padding:8px 15px;border-radius:999px;
    border:1.5px solid var(--ink);background:transparent;color:var(--ink);cursor:pointer;letter-spacing:0.02em;
  }
  .mode-btn.active{background:var(--ink);color:var(--paper);}

  .dash{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
  .stat{background:var(--page);border:1px solid #cdc6ad;border-radius:6px;padding:10px 8px;text-align:center;box-shadow:0 2px 0 #cdc6ad;}
  .stat .num{font-family:'IBM Plex Mono', monospace;font-size:1.3rem;font-weight:600;color:var(--red);display:block;}
  .stat .lbl{font-size:0.64rem;letter-spacing:0.05em;text-transform:uppercase;color:var(--ink-light);}
  .progress-outer{grid-column:1/-1;height:10px;background:var(--paper-dark);border-radius:999px;overflow:hidden;border:1px solid #cdc6ad;}
  .progress-inner{height:100%;background:linear-gradient(90deg, var(--gold), var(--green));width:0%;transition:width .4s ease;}

  .notebook{
    position:relative;
    background:var(--page);
    border-radius:6px;
    box-shadow:var(--shadow);
    padding:28px 26px 26px 62px;
    min-height:420px;
    background-image:
      repeating-linear-gradient(to bottom, transparent 0px, transparent 33px, var(--rule) 33px, var(--rule) 34px);
    background-position:0 78px;
  }
  .notebook::before{
    content:'';
    position:absolute;
    top:0;bottom:0;left:46px;
    width:1.5px;
    background:var(--margin-red);
    opacity:0.55;
  }
  .rings{
    position:absolute;
    left:-14px; top:26px; bottom:26px;
    width:28px;
    display:flex; flex-direction:column; justify-content:space-between;
  }
  .ring{
    width:26px;height:26px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #f4efe0, #c8bb98 60%, #9c8c62);
    box-shadow: inset 0 0 0 4px var(--page), 0 1px 2px rgba(0,0,0,0.3);
  }

  .card-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
  .card-num{font-family:'IBM Plex Mono', monospace;font-size:0.82rem;color:var(--red);font-weight:600;}
  .card-block{font-family:'IBM Plex Mono', monospace;font-size:0.66rem;color:var(--ink-light);text-transform:uppercase;letter-spacing:0.04em;}
  .notebook h2{font-family:'Special Elite', monospace;font-size:1.16rem;line-height:1.35;margin:2px 0 12px;}
  .notebook .desc{font-size:1.0rem;line-height:1.65;color:#2f3225;}
  .quiz-clue{font-size:1.0rem;line-height:1.65;color:#2f3225;font-style:italic;}

  .options{display:grid;gap:9px;margin-top:16px;}
  .opt{
    text-align:left;font-family:'Source Serif 4', serif;font-size:0.94rem;background:var(--paper);
    border:1px solid #cdc6ad;border-radius:5px;padding:10px 12px;cursor:pointer;
    transition:background .12s ease, transform .1s ease;
  }
  .opt:hover{background:#fff;transform:translateX(2px);}
  .opt.correct{background:#e2ecdf;border-color:var(--green);color:var(--green);}
  .opt.wrong{background:#f3dedb;border-color:var(--red);color:var(--red);}
  .opt:disabled{cursor:default;}

  .card-actions{display:flex;justify-content:space-between;align-items:center;margin-top:18px;}
  .btn{
    font-family:'IBM Plex Mono', monospace;font-size:0.76rem;padding:9px 14px;border-radius:5px;
    border:1.5px solid var(--ink);background:var(--ink);color:var(--paper);cursor:pointer;
  }
  .btn.ghost{background:transparent;color:var(--ink);}
  .btn:disabled{opacity:0.35;cursor:default;}

  .stamp{
    position:absolute;top:34%;left:58%;transform:translate(-50%,-50%) rotate(-12deg) scale(0.5);
    font-family:'Special Elite', monospace;font-size:2rem;letter-spacing:0.08em;padding:8px 22px;
    border:5px solid;border-radius:8px;opacity:0;pointer-events:none;text-transform:uppercase;mix-blend-mode:multiply;
  }
  .stamp.show{animation: stampIn .35s ease-out forwards;}
  .stamp.ok{color:var(--green);border-color:var(--green);}
  .stamp.no{color:var(--red);border-color:var(--red);}
  @keyframes stampIn{
    0%{opacity:0;transform:translate(-50%,-50%) rotate(-12deg) scale(1.8);}
    60%{opacity:0.85;transform:translate(-50%,-50%) rotate(-12deg) scale(0.92);}
    100%{opacity:0.85;transform:translate(-50%,-50%) rotate(-12deg) scale(1);}
  }

  .write-panel{margin-top:18px;padding-top:14px;border-top:1px dashed #cdc6ad;}
  .write-panel .hint{
    font-family:'IBM Plex Mono', monospace;font-size:0.68rem;color:var(--ink-light);
    text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px;
  }
  .cursive-input{
    width:100%;border:none;border-bottom:2px solid var(--rule);background:transparent;
    font-family:'Caveat', cursive;font-size:1.55rem;color:#1f3a5c;padding:6px 2px;outline:none;
  }
  .cursive-input::placeholder{font-family:'Caveat', cursive;color:#9aa8b8;font-size:1.4rem;}
  .cursive-input:focus{border-bottom-color:var(--gold);}

  .sig-row{display:flex;gap:14px;align-items:flex-end;margin-top:16px;flex-wrap:wrap;}
  .sig-box{flex:1 1 220px;}
  .sig-box label{
    display:block;font-family:'IBM Plex Mono', monospace;font-size:0.62rem;text-transform:uppercase;
    letter-spacing:0.04em;color:var(--ink-light);margin-bottom:4px;
  }
  .sig-input{
    width:100%;border:none;border-bottom:2px solid var(--rule);background:transparent;
    font-family:'Mrs Saint Delafield', cursive;font-size:2rem;color:var(--red);padding:2px 2px 4px;outline:none;
  }
  .sig-input::placeholder{font-family:'Source Serif 4', serif;font-size:0.85rem;color:#b3ac93;font-style:italic;}

  footer{text-align:center;margin-top:26px;color:var(--ink-light);font-size:0.74rem;font-family:'IBM Plex Mono', monospace;}

  .log-empty{text-align:center;color:var(--ink-light);font-style:italic;padding:50px 20px;}
  .log-entry{
    border-bottom:1px dashed #cdc6ad;padding:16px 0;display:grid;
    grid-template-columns:70px 1fr;gap:14px;align-items:start;
  }
  .log-entry:last-child{border-bottom:none;}
  .log-num{font-family:'IBM Plex Mono', monospace;font-size:0.72rem;color:var(--red);padding-top:4px;}
  .log-title{font-family:'Special Elite', monospace;font-size:0.95rem;margin:0 0 6px;}
  .log-block{
    font-family:'IBM Plex Mono', monospace;font-size:0.6rem;color:var(--ink-light);
    text-transform:uppercase;letter-spacing:0.03em;margin-bottom:8px;display:block;
  }
  .log-written{font-family:'Caveat', cursive;font-size:1.4rem;color:#1f3a5c;line-height:1.3;margin:4px 0 8px;}
  .log-sig-row{display:flex;justify-content:space-between;align-items:flex-end;gap:10px;}
  .log-sig{font-family:'Mrs Saint Delafield', cursive;font-size:1.7rem;color:var(--red);}
  .log-date{font-family:'IBM Plex Mono', monospace;font-size:0.62rem;color:var(--ink-light);}
  .log-del{background:none;border:none;color:var(--ink-light);cursor:pointer;font-size:0.85rem;padding:2px 6px;}
  .log-del:hover{color:var(--red);}

  @media (max-width:520px){
    .dash{grid-template-columns:repeat(2,1fr);}
    .plate h1{font-size:1.05rem;}
    .notebook h2{font-size:1.0rem;}
    .notebook{padding-left:50px;}
    .log-entry{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="plate"><h1>Cuaderno del Párrafo</h1></div>
    <p>100 técnicas y tipos de párrafo — practica, escribe a mano y firma</p>
  </header>

  <div class="modebar">
    <button class="mode-btn active" data-mode="explorar">📖 Explorar</button>
    <button class="mode-btn" data-mode="practicar">✍️ Practicar (quiz)</button>
    <button class="mode-btn" data-mode="cuaderno">📓 Mi cuaderno</button>
  </div>

  <div class="dash">
    <div class="stat"><span class="num" id="statScore">0</span><span class="lbl">Puntaje</span></div>
    <div class="stat"><span class="num" id="statStreak">0</span><span class="lbl">Racha actual</span></div>
    <div class="stat"><span class="num" id="statBest">0</span><span class="lbl">Mejor racha</span></div>
    <div class="stat"><span class="num" id="statMastered">0/100</span><span class="lbl">Dominadas</span></div>
    <div class="progress-outer"><div class="progress-inner" id="progressBar"></div></div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="stage" style="position:relative;">
    <div class="notebook" id="notebook">
      <div class="rings" id="rings"></div>
      <div class="stamp" id="stamp"></div>
      <div id="notebookBody"></div>
    </div>
  </div>

  <footer>Tu cuaderno y tu progreso se guardan en este navegador.</footer>
  <div style="text-align:center;margin-top:10px;">
    <button class="btn ghost" id="resetBtn" style="font-size:0.68rem;">↺ Restablecer todo</button>
  </div>
</div>

<script>
const TECHNIQUES = [
// I. Tipos de párrafo según su función (1-15)
[1,1,"Párrafo introductorio","Presenta el tema, capta el interés y anticipa la tesis o el propósito del texto."],
[2,1,"Párrafo de desarrollo","Expone, explica o argumenta una de las ideas centrales del texto."],
[3,1,"Párrafo de transición","Enlaza dos secciones y prepara al lector para un cambio de idea o de tono."],
[4,1,"Párrafo conclusivo","Cierra el texto sintetizando lo expuesto sin repetirlo literalmente."],
[5,1,"Párrafo enumerativo","Presenta una lista de elementos, razones o pasos relacionados con un mismo tema."],
[6,1,"Párrafo descriptivo","Detalla las características de un objeto, lugar o persona mediante los sentidos."],
[7,1,"Párrafo narrativo","Cuenta una sucesión de hechos organizados en el tiempo."],
[8,1,"Párrafo argumentativo","Defiende una postura con razones y evidencia para persuadir al lector."],
[9,1,"Párrafo expositivo","Explica un tema de manera objetiva, sin intención de persuadir."],
[10,1,"Párrafo comparativo o de contraste","Señala semejanzas y diferencias entre dos o más elementos."],
[11,1,"Párrafo causal (causa-efecto)","Explica por qué ocurre algo y qué consecuencias produce."],
[12,1,"Párrafo de definición","Explica el significado preciso de un concepto o término."],
[13,1,"Párrafo ejemplificador","Ilustra una idea general mediante uno o varios casos concretos."],
[14,1,"Párrafo de problema-solución","Plantea una dificultad y propone una o varias formas de resolverla."],
[15,1,"Párrafo cronológico","Organiza la información siguiendo el orden temporal en que ocurrieron los hechos."],

// II. Tipos de párrafo según su estructura interna (16-30)
[16,2,"Párrafo deductivo","Parte de una idea general y la desarrolla hacia casos particulares."],
[17,2,"Párrafo inductivo","Parte de casos particulares para llegar a una conclusión general al final."],
[18,2,"Párrafo encuadrado","Presenta la idea principal al inicio y la retoma, reforzada, al final."],
[19,2,"Párrafo paralelo","Desarrolla varias ideas de igual importancia con estructuras sintácticas similares."],
[20,2,"Párrafo yuxtapuesto","Coloca ideas una junto a otra sin conectores explícitos entre ellas."],
[21,2,"Párrafo de secuencia","Ordena la información en pasos sucesivos, como en instrucciones."],
[22,2,"Párrafo enumerativo simple","Enumera elementos de un mismo nivel de importancia sin jerarquía interna."],
[23,2,"Párrafo enumerativo complejo","Enumera elementos que a su vez incluyen subdivisiones o matices."],
[24,2,"Párrafo de contraste directo","Opone dos ideas de forma explícita usando conectores adversativos."],
[25,2,"Párrafo de analogía","Explica una idea comparándola con otra de un campo distinto pero similar en estructura."],
[26,2,"Párrafo interrogativo","Se organiza en torno a una pregunta que el resto del párrafo responde."],
[27,2,"Párrafo de cita","Se construye alrededor de una cita o testimonio que luego se comenta."],
[28,2,"Párrafo de síntesis","Resume en pocas líneas ideas ya desarrolladas extensamente antes."],
[29,2,"Párrafo concatenado","Cada oración retoma un elemento de la anterior para avanzar en cadena."],
[30,2,"Párrafo circular","Termina retomando casi textualmente la idea con la que comenzó."],

// III. Técnicas de construcción del párrafo (31-50)
[31,3,"Oración temática (topic sentence)","Frase inicial que anuncia la idea central que desarrollará todo el párrafo."],
[32,3,"Unidad temática","Todas las oraciones del párrafo giran en torno a una sola idea principal."],
[33,3,"Coherencia interna","Las ideas del párrafo se relacionan lógicamente entre sí, sin contradicciones."],
[34,3,"Cohesión léxica","Uso de sinónimos y campos semánticos afines para enlazar las oraciones."],
[35,3,"Cohesión gramatical","Uso de pronombres, artículos y conjunciones para enlazar las oraciones."],
[36,3,"Longitud equilibrada","Ajustar la extensión del párrafo al peso real de la idea que desarrolla."],
[37,3,"Uso de conectores","Emplear enlaces lógicos que guíen al lector de una oración a la siguiente."],
[38,3,"Progresión de la información","Cada oración añade algo nuevo a lo ya dicho, sin estancarse ni repetir."],
[39,3,"Oración de cierre","Última oración que resume o proyecta la idea desarrollada en el párrafo."],
[40,3,"Evitar la digresión","No introducir ideas ajenas al tema central que rompan la unidad del párrafo."],
[41,3,"Un solo punto de vista por párrafo","Mantener la misma perspectiva o voz narrativa dentro de un mismo párrafo."],
[42,3,"Densidad informativa","Equilibrar la cantidad de información nueva para no saturar ni quedar vacío."],
[43,3,"Variación sintáctica","Alternar estructuras de oración para que el párrafo no suene mecánico."],
[44,3,"Repetición estratégica","Repetir deliberadamente una palabra clave para reforzar el tema del párrafo."],
[45,3,"Elipsis controlada","Omitir elementos sobreentendidos sin perder claridad ni cohesión."],
[46,3,"Marcadores discursivos","Palabras como 'en primer lugar' o 'finalmente' que organizan la lectura."],
[47,3,"Puntuación interna","Usar comas, punto y coma y dos puntos para ordenar las ideas dentro del párrafo."],
[48,3,"Subordinación equilibrada","No abusar de oraciones subordinadas largas que dificulten seguir la idea."],
[49,3,"Concordancia gramatical","Mantener la concordancia de género, número y tiempo verbal en todo el párrafo."],
[50,3,"Revisión de la extensión","Comprobar, al revisar, si el párrafo debería dividirse o fusionarse con otro."],

// IV. Técnicas de conexión entre párrafos (51-65)
[51,4,"Conectores de transición","Palabras como 'además' o 'no obstante' que enlazan un párrafo con el siguiente."],
[52,4,"Retomar palabra clave","Repetir al inicio del nuevo párrafo un término relevante del párrafo anterior."],
[53,4,"Pregunta puente","Cerrar un párrafo con una pregunta que el siguiente párrafo responde."],
[54,4,"Pronombre de enlace","Usar un pronombre al inicio del párrafo que remite a la idea anterior."],
[55,4,"Frase resumen","Iniciar el nuevo párrafo resumiendo brevemente lo dicho antes de avanzar."],
[56,4,"Contraste explícito","Señalar con un conector adversativo que el nuevo párrafo matiza o refuta al anterior."],
[57,4,"Progresión temática entre párrafos","Cada párrafo avanza un paso lógico respecto al anterior, sin saltos bruscos."],
[58,4,"Repetición de estructura","Repetir un patrón sintáctico entre párrafos para reforzar el paralelismo de ideas."],
[59,4,"Numeración o enumeración explícita","Usar 'primero', 'segundo', 'por último' para guiar la secuencia entre párrafos."],
[60,4,"Uso de sinónimos de enlace","Retomar una idea anterior con un sinónimo en vez de repetir la misma palabra."],
[61,4,"Referencia anafórica","Un párrafo remite a información ya mencionada en uno anterior."],
[62,4,"Referencia catafórica","Un párrafo anuncia información que se desarrollará en el que sigue."],
[63,4,"Conector causal entre párrafos","Mostrar que el contenido de un párrafo es consecuencia del anterior."],
[64,4,"Conector consecutivo entre párrafos","Señalar que lo dicho en un párrafo se deriva lógicamente de otro."],
[65,4,"Conector adversativo entre párrafos","Introducir una idea que contrasta con la desarrollada en el párrafo previo."],

// V. Párrafos según el género textual (66-80)
[66,5,"Párrafo periodístico (lead)","Responde qué, quién, cuándo, dónde y por qué en las primeras líneas de la noticia."],
[67,5,"Párrafo académico","Desarrolla una idea con rigor, cita fuentes y mantiene un registro formal."],
[68,5,"Párrafo epistolar","Se ajusta al tono y las convenciones de una carta, formal o personal."],
[69,5,"Párrafo jurídico","Usa terminología precisa y estructura formal propia de textos legales."],
[70,5,"Párrafo publicitario","Busca persuadir de forma breve y memorable, apelando a emociones o beneficios."],
[71,5,"Párrafo de blog","Combina tono cercano, párrafos cortos y frecuentes llamadas a la interacción."],
[72,5,"Párrafo de ensayo","Desarrolla una reflexión personal y argumentada sobre un tema."],
[73,5,"Párrafo científico","Prioriza precisión, objetividad y datos verificables sobre el estilo."],
[74,5,"Párrafo narrativo literario","Prioriza el ritmo, la voz y la construcción de atmósfera sobre la información."],
[75,5,"Párrafo de discurso oral","Se apoya en repeticiones y frases cortas pensadas para ser escuchadas, no leídas."],
[76,5,"Párrafo de manual técnico","Prioriza la claridad secuencial de instrucciones sobre el estilo literario."],
[77,5,"Párrafo de reseña","Combina descripción, valoración personal y argumentos que la sustentan."],
[78,5,"Párrafo biográfico","Organiza hechos vitales de una persona con criterio cronológico o temático."],
[79,5,"Párrafo de correo electrónico","Es breve, va directo al propósito y facilita una respuesta rápida."],
[80,5,"Párrafo de redes sociales","Prioriza brevedad extrema, impacto inmediato y lenguaje muy coloquial."],

// VI. Errores comunes y su corrección (81-90)
[81,6,"Párrafo demasiado largo","Acumula varias ideas sin dividir, dificultando seguir el hilo central."],
[82,6,"Párrafo demasiado corto","No desarrolla lo suficiente la idea y deja al lector con información insuficiente."],
[83,6,"Falta de oración temática","El párrafo no deja claro desde el inicio cuál es su idea principal."],
[84,6,"Múltiples ideas sin dividir","Desarrolla dos o más ideas independientes que deberían separarse en párrafos distintos."],
[85,6,"Repetición innecesaria","Repite la misma idea con otras palabras sin aportar información nueva."],
[86,6,"Ambigüedad referencial","Un pronombre o referencia puede interpretarse de más de una manera dentro del párrafo."],
[87,6,"Conectores mal usados","Emplea un conector que no corresponde a la relación lógica real entre las ideas."],
[88,6,"Falta de transición","El párrafo comienza de forma abrupta, sin enlace con el anterior."],
[89,6,"Desequilibrio de extensión","Los párrafos de un mismo texto varían tanto en longitud que rompen el ritmo de lectura."],
[90,6,"Incoherencia temática","El párrafo se desvía del tema central del texto sin justificación."],

// VII. Técnicas bilingües del párrafo español-inglés (91-100)
[91,7,"Posición de la idea principal entre idiomas","El inglés académico suele exigir la idea principal al inicio; el español admite más flexibilidad."],
[92,7,"Longitud promedio distinta entre idiomas","Los párrafos en inglés académico tienden a ser más cortos y uniformes que en español."],
[93,7,"Conectores propios de cada idioma","'Furthermore' y 'además' no siempre ocupan la misma posición ni tienen el mismo peso formal."],
[94,7,"Puntuación de párrafos citados entre idiomas","El inglés integra las citas de forma distinta al español académico dentro del párrafo."],
[95,7,"Traducción de la oración temática","Al traducir, la oración temática debe reformularse, no calcarse palabra por palabra."],
[96,7,"Adaptación del párrafo académico anglosajón","El modelo inglés de 'topic sentence + support + conclusion' puede adaptarse, no imponerse, al español."],
[97,7,"El párrafo de cinco oraciones (five-paragraph model)","Estructura típica del inglés escolar que conviene flexibilizar al escribir en español."],
[98,7,"El 'hook' inicial en inglés frente al párrafo introductorio en español","El inglés prioriza captar la atención inmediata; el español admite una introducción más contextual."],
[99,7,"Transferencia de conectores discursivos entre idiomas","Revisar que un conector traducido conserve la misma fuerza lógica en el nuevo idioma."],
[100,7,"Revisión bilingüe de la unidad del párrafo","Comprobar que, al traducir un párrafo, siga desarrollando una sola idea en el idioma de llegada."]
].map(([id,block,title,desc])=>({id,block,title,desc}));

const BLOCK_NAMES = {
  1:"I · Tipos por función", 2:"II · Tipos por estructura", 3:"III · Construcción del párrafo",
  4:"IV · Conexión entre párrafos", 5:"V · Según el género textual", 6:"VI · Errores comunes",
  7:"VII · Técnicas bilingües ES-EN"
};

const STORAGE_KEY = "cuaderno-parrafo-v1";
let memoryStore = null;

function loadProgress(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return memoryStore || { score:0, streak:0, best:0, mastery:{}, log:[] };
}
function saveProgress(p){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); }
  catch(e){ memoryStore = p; }
}

let progress = loadProgress();
if(!progress.log) progress.log = [];
let currentBlock = "all";
let currentIndex = 0;
let mode = "explorar";
let quizCurrent = null;
let answered = false;

const tabsEl = document.getElementById('tabs');
const notebookBody = document.getElementById('notebookBody');
const stampEl = document.getElementById('stamp');
const ringsEl = document.getElementById('rings');

for(let i=0;i<9;i++){ const d=document.createElement('div'); d.className='ring'; ringsEl.appendChild(d); }

function buildTabs(){
  const blocks = [["all","Todas"], ...Object.entries(BLOCK_NAMES)];
  tabsEl.innerHTML = "";
  blocks.forEach(([key,label])=>{
    const b = document.createElement('button');
    b.className = 'tab' + (String(key)===String(currentBlock) ? ' active' : '');
    b.textContent = label;
    b.onclick = ()=>{ currentBlock = key; currentIndex = 0; buildTabs(); render(); };
    tabsEl.appendChild(b);
  });
  tabsEl.style.display = mode==="cuaderno" ? "none" : "flex";
}

function filteredTechniques(){
  if(currentBlock==="all") return TECHNIQUES;
  return TECHNIQUES.filter(t=>String(t.block)===String(currentBlock));
}

function updateDash(){
  document.getElementById('statScore').textContent = progress.score;
  document.getElementById('statStreak').textContent = progress.streak;
  document.getElementById('statBest').textContent = progress.best;
  const masteredCount = Object.values(progress.mastery).filter(v=>v>=3).length;
  document.getElementById('statMastered').textContent = masteredCount + "/100";
  document.getElementById('progressBar').style.width = masteredCount + "%";
}

function markSeen(id){
  if(!progress.mastery[id]) progress.mastery[id] = 1;
  saveProgress(progress);
  updateDash();
}

function renderExplorar(){
  const list = filteredTechniques();
  if(currentIndex>=list.length) currentIndex = 0;
  if(currentIndex<0) currentIndex = list.length-1;
  const t = list[currentIndex];
  const level = progress.mastery[t.id] || 0;
  const badge = level>=3 ? "🟢 dominada" : level>=2 ? "🟡 practicada" : level>=1 ? "⚪ vista" : "· sin visitar";
  notebookBody.innerHTML = `
    <div class="card-top">
      <span class="card-num">Nº ${String(t.id).padStart(3,'0')}</span>
      <span class="card-block">${BLOCK_NAMES[t.block]}</span>
    </div>
    <h2>${t.title}</h2>
    <p class="desc">${t.desc}</p>
    <p style="font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:var(--ink-light);margin-top:14px;">${badge}</p>
    <div class="card-actions">
      <button class="btn ghost" id="prevBtn">← Anterior</button>
      <button class="btn" id="nextBtn">Siguiente →</button>
    </div>
  `;
  stampEl.className = "stamp";
  markSeen(t.id);
  document.getElementById('prevBtn').onclick = ()=>{ currentIndex -= 1; renderExplorar(); };
  document.getElementById('nextBtn').onclick = ()=>{ currentIndex += 1; renderExplorar(); };
}

function pickQuizQuestion(){
  const pool = filteredTechniques();
  quizCurrent = pool[Math.floor(Math.random()*pool.length)];
  let sameBlock = TECHNIQUES.filter(t=>t.block===quizCurrent.block && t.id!==quizCurrent.id).sort(()=>Math.random()-0.5);
  let others = TECHNIQUES.filter(t=>t.id!==quizCurrent.id && t.block!==quizCurrent.block).sort(()=>Math.random()-0.5);
  const distractors = sameBlock.concat(others).slice(0,3);
  const options = [quizCurrent, ...distractors].sort(()=>Math.random()-0.5);
  answered = false;
  return options;
}

function renderPracticar(){
  const options = pickQuizQuestion();
  notebookBody.innerHTML = `
    <div class="card-top">
      <span class="card-num">Nº ${String(quizCurrent.id).padStart(3,'0')}</span>
      <span class="card-block">${BLOCK_NAMES[quizCurrent.block]}</span>
    </div>
    <p class="quiz-clue">"${quizCurrent.desc}"</p>
    <p style="font-family:'IBM Plex Mono',monospace;font-size:0.68rem;color:var(--ink-light);margin-top:8px;">¿A qué técnica o tipo de párrafo corresponde esta descripción?</p>
    <div class="options" id="optionsBox"></div>
    <div class="write-panel" id="writePanel" style="display:none;">
      <p class="hint">Ahora escríbela de tu puño y letra, como en un cuaderno</p>
      <input type="text" class="cursive-input" id="writeInput" placeholder="Escribe aquí el nombre de la técnica o el tipo de párrafo...">
      <div class="sig-row">
        <div class="sig-box">
          <label>Tu firma</label>
          <input type="text" class="sig-input" id="sigInput" placeholder="Firma con tu nombre o iniciales">
        </div>
        <button class="btn" id="saveLogBtn">Guardar en el cuaderno</button>
      </div>
    </div>
    <div class="card-actions">
      <button class="btn ghost" disabled></button>
      <button class="btn" id="nextBtn">Siguiente pregunta →</button>
    </div>
  `;
  stampEl.className = "stamp";
  const box = document.getElementById('optionsBox');
  options.forEach(opt=>{
    const b = document.createElement('button');
    b.className = 'opt';
    b.textContent = opt.title;
    b.onclick = ()=> handleAnswer(opt, b);
    box.appendChild(b);
  });
  document.getElementById('nextBtn').onclick = ()=> renderPracticar();
}

function handleAnswer(opt, btnEl){
  if(answered) return;
  answered = true;
  const isCorrect = opt.id === quizCurrent.id;
  document.querySelectorAll('#optionsBox .opt').forEach(b=>{
    b.disabled = true;
    if(b.textContent === quizCurrent.title) b.classList.add('correct');
  });
  if(!isCorrect) btnEl.classList.add('wrong');

  const prevLevel = progress.mastery[quizCurrent.id] || 0;
  if(isCorrect){
    progress.streak += 1;
    progress.best = Math.max(progress.best, progress.streak);
    progress.score += prevLevel>=2 ? 5 : 10;
    progress.mastery[quizCurrent.id] = prevLevel===0 ? 2 : Math.min(3, prevLevel+1);
    stampEl.textContent = "Correcto";
    stampEl.classList.add('ok');
  } else {
    progress.streak = 0;
    progress.mastery[quizCurrent.id] = Math.max(1, prevLevel);
    stampEl.textContent = "Revisar";
    stampEl.classList.add('no');
  }
  requestAnimationFrame(()=> stampEl.classList.add('show'));
  saveProgress(progress);
  updateDash();

  const panel = document.getElementById('writePanel');
  panel.style.display = 'block';
  const wi = document.getElementById('writeInput');
  wi.focus();
  document.getElementById('saveLogBtn').onclick = ()=>{
    const written = wi.value.trim();
    const sig = document.getElementById('sigInput').value.trim();
    if(!written){ wi.focus(); return; }
    progress.log.unshift({
      id: quizCurrent.id,
      block: quizCurrent.block,
      title: quizCurrent.title,
      written,
      sig: sig || "—",
      correct: isCorrect,
      date: new Date().toLocaleString('es-ES', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'})
    });
    saveProgress(progress);
    document.getElementById('saveLogBtn').textContent = "✓ Guardado";
    document.getElementById('saveLogBtn').disabled = true;
  };
}

function renderCuaderno(){
  if(progress.log.length===0){
    notebookBody.innerHTML = `<div class="log-empty">Tu cuaderno está vacío todavía.<br>Ve a "Practicar (quiz)", responde una pregunta y escribe tu respuesta a mano para guardarla aquí.</div>`;
    return;
  }
  const entries = progress.log.map((e,i)=>`
    <div class="log-entry">
      <div class="log-num">Nº ${String(e.id).padStart(3,'0')}</div>
      <div>
        <span class="log-block">${BLOCK_NAMES[e.block]} ${e.correct? '· ✅ correcta':'· ⚠️ a repasar'}</span>
        <p class="log-title">${e.title}</p>
        <p class="log-written">"${e.written}"</p>
        <div class="log-sig-row">
          <span class="log-sig">${e.sig}</span>
          <span class="log-date">${e.date}</span>
          <button class="log-del" data-idx="${i}" title="Eliminar entrada">🗑</button>
        </div>
      </div>
    </div>
  `).join("");
  notebookBody.innerHTML = `
    <div class="card-top">
      <span class="card-num">Mi cuaderno</span>
      <span class="card-block">${progress.log.length} entrada(s)</span>
    </div>
    ${entries}
  `;
  notebookBody.querySelectorAll('.log-del').forEach(btn=>{
    btn.onclick = ()=>{
      const idx = parseInt(btn.dataset.idx,10);
      progress.log.splice(idx,1);
      saveProgress(progress);
      renderCuaderno();
    };
  });
}

function render(){
  buildTabs();
  if(mode==="explorar") renderExplorar();
  else if(mode==="practicar") renderPracticar();
  else renderCuaderno();
  updateDash();
}

document.querySelectorAll('.mode-btn').forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll('.mode-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    mode = b.dataset.mode;
    currentIndex = 0;
    render();
  };
});

document.getElementById('resetBtn').onclick = ()=>{
  if(confirm("¿Restablecer todo tu progreso y borrar el cuaderno?")){
    progress = { score:0, streak:0, best:0, mastery:{}, log:[] };
    saveProgress(progress);
    render();
  }
};

render();
</script>
</body>
</html>
