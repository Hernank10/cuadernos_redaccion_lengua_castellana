<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuaderno del Párrafo Narrativo — 100 técnicas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=IBM+Plex+Mono:wght@400;500;600&family=Caveat:wght@400;600;700&family=Mrs+Saint+Delafield&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#E9E1D6;
    --paper-dark:#D6C6B4;
    --drawer:#7A4B5C;
    --drawer-dark:#5C3444;
    --page:#FBF7EF;
    --ink:#2A2320;
    --ink-light:#736558;
    --red:#A8342A;
    --green:#3F6B4C;
    --gold:#96702A;
    --rule:#D8C6D2;
    --margin-red:#B5645A;
    --shadow: 0 10px 30px rgba(42,35,32,0.18);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(ellipse at top left, rgba(255,255,255,0.25), transparent 50%),
      var(--paper);
    color:var(--ink);
    font-family:'Source Serif 4', serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:940px;margin:0 auto;padding:26px 16px 60px;}

  header{text-align:center;margin-bottom:20px;}
  .plate{
    display:inline-block;
    background:var(--drawer);
    border:2px solid var(--drawer-dark);
    border-radius:4px;
    padding:6px 22px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2), var(--shadow);
    transform:rotate(-0.6deg);
  }
  .plate h1{
    font-family:'Special Elite', monospace;
    font-size:1.3rem;
    letter-spacing:0.05em;
    margin:0;
    color:#f3e9ee;
    text-transform:uppercase;
  }
  header p{color:var(--ink-light);font-size:0.92rem;margin:10px 0 0;font-style:italic;}

  .tabs{display:flex;gap:6px;overflow-x:auto;padding:4px 2px 12px;scrollbar-width:thin;}
  .tab{
    flex:0 0 auto;font-family:'IBM Plex Mono', monospace;font-size:0.68rem;letter-spacing:0.03em;
    background:var(--page);border:1px solid #d3c2ba;border-bottom:3px solid var(--drawer-dark);
    padding:7px 10px;border-radius:3px 3px 0 0;cursor:pointer;color:var(--ink-light);white-space:nowrap;
    transition:transform .12s ease, color .12s ease, background .12s ease;
  }
  .tab:hover{transform:translateY(-2px);}
  .tab.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}

  .modebar{display:flex;justify-content:center;gap:10px;margin:4px 0 18px;flex-wrap:wrap;}
  .mode-btn{
    font-family:'IBM Plex Mono', monospace;font-size:0.76rem;padding:8px 15px;border-radius:999px;
    border:1.5px solid var(--ink);background:transparent;color:var(--ink);cursor:pointer;letter-spacing:0.02em;
  }
  .mode-btn.active{background:var(--ink);color:var(--paper);}

  .dash{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
  .stat{background:var(--page);border:1px solid #d3c2ba;border-radius:6px;padding:10px 8px;text-align:center;box-shadow:0 2px 0 #d3c2ba;}
  .stat .num{font-family:'IBM Plex Mono', monospace;font-size:1.3rem;font-weight:600;color:var(--red);display:block;}
  .stat .lbl{font-size:0.64rem;letter-spacing:0.05em;text-transform:uppercase;color:var(--ink-light);}
  .progress-outer{grid-column:1/-1;height:10px;background:var(--paper-dark);border-radius:999px;overflow:hidden;border:1px solid #d3c2ba;}
  .progress-inner{height:100%;background:linear-gradient(90deg, var(--gold), var(--drawer));width:0%;transition:width .4s ease;}

  .notebook{
    position:relative;
    background:var(--page);
    border-radius:6px;
    box-shadow:var(--shadow);
    padding:28px 26px 26px 62px;
    min-height:420px;
    background-image:
      repeating-linear-gradient(to bottom, transparent 0px, transparent 33px, var(--rule) 33px, var(--rule) 34px);
    background-position:0 78px;
  }
  .notebook::before{
    content:'';
    position:absolute;
    top:0;bottom:0;left:46px;
    width:1.5px;
    background:var(--margin-red);
    opacity:0.55;
  }
  .rings{
    position:absolute;
    left:-14px; top:26px; bottom:26px;
    width:28px;
    display:flex; flex-direction:column; justify-content:space-between;
  }
  .ring{
    width:26px;height:26px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #f4efe0, #c8bb98 60%, #9c8c62);
    box-shadow: inset 0 0 0 4px var(--page), 0 1px 2px rgba(0,0,0,0.3);
  }

  .card-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
  .card-num{font-family:'IBM Plex Mono', monospace;font-size:0.82rem;color:var(--red);font-weight:600;}
  .card-block{font-family:'IBM Plex Mono', monospace;font-size:0.64rem;color:var(--ink-light);text-transform:uppercase;letter-spacing:0.03em;}
  .notebook h2{font-family:'Special Elite', monospace;font-size:1.14rem;line-height:1.35;margin:2px 0 12px;}
  .notebook .desc{font-size:1.0rem;line-height:1.65;color:#332a24;}
  .quiz-clue{font-size:1.0rem;line-height:1.65;color:#332a24;font-style:italic;}

  .options{display:grid;gap:9px;margin-top:16px;}
  .opt{
    text-align:left;font-family:'Source Serif 4', serif;font-size:0.94rem;background:var(--paper);
    border:1px solid #d3c2ba;border-radius:5px;padding:10px 12px;cursor:pointer;
    transition:background .12s ease, transform .1s ease;
  }
  .opt:hover{background:#fff;transform:translateX(2px);}
  .opt.correct{background:#e2ecdf;border-color:var(--green);color:var(--green);}
  .opt.wrong{background:#f3dedb;border-color:var(--red);color:var(--red);}
  .opt:disabled{cursor:default;}

  .card-actions{display:flex;justify-content:space-between;align-items:center;margin-top:18px;}
  .btn{
    font-family:'IBM Plex Mono', monospace;font-size:0.76rem;padding:9px 14px;border-radius:5px;
    border:1.5px solid var(--ink);background:var(--ink);color:var(--paper);cursor:pointer;
  }
  .btn.ghost{background:transparent;color:var(--ink);}
  .btn:disabled{opacity:0.35;cursor:default;}

  .stamp{
    position:absolute;top:34%;left:58%;transform:translate(-50%,-50%) rotate(-12deg) scale(0.5);
    font-family:'Special Elite', monospace;font-size:2rem;letter-spacing:0.08em;padding:8px 22px;
    border:5px solid;border-radius:8px;opacity:0;pointer-events:none;text-transform:uppercase;mix-blend-mode:multiply;
  }
  .stamp.show{animation: stampIn .35s ease-out forwards;}
  .stamp.ok{color:var(--green);border-color:var(--green);}
  .stamp.no{color:var(--red);border-color:var(--red);}
  @keyframes stampIn{
    0%{opacity:0;transform:translate(-50%,-50%) rotate(-12deg) scale(1.8);}
    60%{opacity:0.85;transform:translate(-50%,-50%) rotate(-12deg) scale(0.92);}
    100%{opacity:0.85;transform:translate(-50%,-50%) rotate(-12deg) scale(1);}
  }

  .write-panel{margin-top:18px;padding-top:14px;border-top:1px dashed #d3c2ba;}
  .write-panel .hint{
    font-family:'IBM Plex Mono', monospace;font-size:0.68rem;color:var(--ink-light);
    text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px;
  }
  .cursive-input{
    width:100%;border:none;border-bottom:2px solid var(--rule);background:transparent;
    font-family:'Caveat', cursive;font-size:1.55rem;color:#4a2c3a;padding:6px 2px;outline:none;
  }
  .cursive-input::placeholder{font-family:'Caveat', cursive;color:#b6a0ab;font-size:1.4rem;}
  .cursive-input:focus{border-bottom-color:var(--gold);}

  .sig-row{display:flex;gap:14px;align-items:flex-end;margin-top:16px;flex-wrap:wrap;}
  .sig-box{flex:1 1 220px;}
  .sig-box label{
    display:block;font-family:'IBM Plex Mono', monospace;font-size:0.62rem;text-transform:uppercase;
    letter-spacing:0.04em;color:var(--ink-light);margin-bottom:4px;
  }
  .sig-input{
    width:100%;border:none;border-bottom:2px solid var(--rule);background:transparent;
    font-family:'Mrs Saint Delafield', cursive;font-size:2rem;color:var(--red);padding:2px 2px 4px;outline:none;
  }
  .sig-input::placeholder{font-family:'Source Serif 4', serif;font-size:0.85rem;color:#bfae9c;font-style:italic;}

  footer{text-align:center;margin-top:26px;color:var(--ink-light);font-size:0.74rem;font-family:'IBM Plex Mono', monospace;}

  .log-empty{text-align:center;color:var(--ink-light);font-style:italic;padding:50px 20px;}
  .log-entry{
    border-bottom:1px dashed #d3c2ba;padding:16px 0;display:grid;
    grid-template-columns:70px 1fr;gap:14px;align-items:start;
  }
  .log-entry:last-child{border-bottom:none;}
  .log-num{font-family:'IBM Plex Mono', monospace;font-size:0.72rem;color:var(--red);padding-top:4px;}
  .log-title{font-family:'Special Elite', monospace;font-size:0.95rem;margin:0 0 6px;}
  .log-block{
    font-family:'IBM Plex Mono', monospace;font-size:0.6rem;color:var(--ink-light);
    text-transform:uppercase;letter-spacing:0.03em;margin-bottom:8px;display:block;
  }
  .log-written{font-family:'Caveat', cursive;font-size:1.4rem;color:#4a2c3a;line-height:1.3;margin:4px 0 8px;}
  .log-sig-row{display:flex;justify-content:space-between;align-items:flex-end;gap:10px;}
  .log-sig{font-family:'Mrs Saint Delafield', cursive;font-size:1.7rem;color:var(--red);}
  .log-date{font-family:'IBM Plex Mono', monospace;font-size:0.62rem;color:var(--ink-light);}
  .log-del{background:none;border:none;color:var(--ink-light);cursor:pointer;font-size:0.85rem;padding:2px 6px;}
  .log-del:hover{color:var(--red);}

  @media (max-width:520px){
    .dash{grid-template-columns:repeat(2,1fr);}
    .plate h1{font-size:1.0rem;}
    .notebook h2{font-size:0.98rem;}
    .notebook{padding-left:50px;}
    .log-entry{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="plate"><h1>Cuaderno del Párrafo Narrativo</h1></div>
    <p>100 técnicas para contar historias — practica, escribe a mano y firma</p>
  </header>

  <div class="modebar">
    <button class="mode-btn active" data-mode="explorar">📖 Explorar</button>
    <button class="mode-btn" data-mode="practicar">✍️ Practicar (quiz)</button>
    <button class="mode-btn" data-mode="cuaderno">📓 Mi cuaderno</button>
  </div>

  <div class="dash">
    <div class="stat"><span class="num" id="statScore">0</span><span class="lbl">Puntaje</span></div>
    <div class="stat"><span class="num" id="statStreak">0</span><span class="lbl">Racha actual</span></div>
    <div class="stat"><span class="num" id="statBest">0</span><span class="lbl">Mejor racha</span></div>
    <div class="stat"><span class="num" id="statMastered">0/100</span><span class="lbl">Dominadas</span></div>
    <div class="progress-outer"><div class="progress-inner" id="progressBar"></div></div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="stage" style="position:relative;">
    <div class="notebook" id="notebook">
      <div class="rings" id="rings"></div>
      <div class="stamp" id="stamp"></div>
      <div id="notebookBody"></div>
    </div>
  </div>

  <footer>Tu cuaderno y tu progreso se guardan en este navegador.</footer>
  <div style="text-align:center;margin-top:10px;">
    <button class="btn ghost" id="resetBtn" style="font-size:0.68rem;">↺ Restablecer todo</button>
  </div>
</div>

<script>
const TECHNIQUES = [
// I. Elementos básicos del párrafo narrativo (1-15)
[1,1,"Narrador","Voz que cuenta los hechos y decide qué información llega al lector y cómo."],
[2,1,"Punto de vista","Perspectiva desde la que se narra: primera, segunda o tercera persona."],
[3,1,"Foco narrativo","Grado de acceso del narrador a los pensamientos y sentimientos de los personajes."],
[4,1,"Tiempo verbal narrativo","Elección entre pretérito y presente para relatar la acción."],
[5,1,"Orden cronológico","Secuencia temporal en que se presentan los hechos del relato."],
[6,1,"Ambientación (escenario)","Espacio y época en que transcurre la acción del párrafo."],
[7,1,"Personaje","Figura que protagoniza o participa en la acción narrada."],
[8,1,"Acción","Sucesión de hechos que hacen avanzar la historia."],
[9,1,"Conflicto","Tensión o problema que impulsa la trama y motiva a los personajes."],
[10,1,"Tensión narrativa","Grado de incertidumbre o expectativa que mantiene interesado al lector."],
[11,1,"Ritmo narrativo","Velocidad con que se percibe el avance de los acontecimientos."],
[12,1,"Voz narrativa","Estilo particular y reconocible con que el narrador cuenta la historia."],
[13,1,"Tono","Actitud emocional del relato: irónico, solemne, nostálgico, etc."],
[14,1,"Atmósfera","Sensación general que envuelve la escena y predispone al lector."],
[15,1,"Marco temporal","Momento histórico o ficticio en que se sitúa la narración."],

// II. Tipos de narrador (16-25)
[16,2,"Narrador omnisciente","Conoce pensamientos, pasado y futuro de todos los personajes."],
[17,2,"Narrador protagonista","Cuenta la historia como personaje principal, en primera persona."],
[18,2,"Narrador testigo","Personaje secundario que relata lo que observa desde fuera de la acción central."],
[19,2,"Narrador equisciente","Conoce solo lo que sabe o percibe un personaje específico."],
[20,2,"Narrador objetivo","Describe hechos y diálogos sin acceder a pensamientos internos."],
[21,2,"Narrador no fiable","Su versión de los hechos puede ser incompleta, sesgada o engañosa."],
[22,2,"Narrador coral o múltiple","Varias voces narrativas se alternan para contar la misma historia."],
[23,2,"Narrador epistolar","Cuenta la historia a través de cartas, diarios o documentos."],
[24,2,"Narrador en segunda persona","Se dirige al lector o a un personaje como 'tú', involucrándolo directamente."],
[25,2,"Narrador intruso","Interrumpe el relato con comentarios o juicios propios."],

// III. Estructura del párrafo narrativo (26-40)
[26,3,"Situación inicial","Presenta el estado de cosas antes de que ocurra el conflicto."],
[27,3,"Nudo o complicación","Momento en que surge el problema que desencadena la acción."],
[28,3,"Clímax","Punto de máxima tensión dentro del párrafo o del relato."],
[29,3,"Desenlace","Resolución del conflicto planteado en el párrafo o la historia."],
[30,3,"Apertura in medias res","Comienza la narración en pleno desarrollo de la acción, sin preámbulos."],
[31,3,"Flashback (analepsis)","Interrumpe el presente narrativo para relatar un hecho anterior."],
[32,3,"Flashforward (prolepsis)","Adelanta al lector un hecho que ocurrirá más adelante en la historia."],
[33,3,"Resumen narrativo","Condensa en pocas líneas hechos que abarcan un periodo extenso."],
[34,3,"Párrafo escena","Detalla un momento puntual con ritmo pausado y alto nivel de detalle."],
[35,3,"Transición temporal","Marca el paso del tiempo entre un párrafo y el siguiente."],
[36,3,"Pausa descriptiva","Detiene momentáneamente la acción para describir espacio o personaje."],
[37,3,"Elipsis temporal","Omite deliberadamente un periodo de tiempo sin relatarlo."],
[38,3,"Párrafo circular narrativo","Vuelve, transformada, a la situación con que comenzó el relato."],
[39,3,"Narración en paralelo","Alterna dos líneas de acción que ocurren de forma simultánea."],
[40,3,"Cierre narrativo","Última frase del párrafo que da sensación de resolución o suspenso."],

// IV. Técnicas de estilo narrativo (41-60)
[41,4,"Mostrar, no contar","Sugerir una emoción mediante gestos y acciones en vez de nombrarla directamente."],
[42,4,"Verbos de acción precisos","Elegir verbos concretos que describan el movimiento con exactitud."],
[43,4,"Ritmo mediante oraciones cortas","Frases breves que aceleran la percepción de la acción."],
[44,4,"Ritmo mediante oraciones largas","Frases extensas que ralentizan el relato y profundizan en la escena."],
[45,4,"Diálogo dentro del párrafo","Intercalar las palabras de los personajes para dar viveza a la acción."],
[46,4,"Estilo directo","Reproduce textualmente las palabras del personaje entre comillas o guiones."],
[47,4,"Estilo indirecto","Refiere lo dicho por el personaje sin reproducir sus palabras exactas."],
[48,4,"Estilo indirecto libre","Funde la voz del narrador con el pensamiento del personaje sin marcarlo explícitamente."],
[49,4,"Monólogo interior","Reproduce el pensamiento de un personaje tal como fluye en su mente."],
[50,4,"Flujo de conciencia","Presenta pensamientos de forma discontinua, imitando el fluir mental real."],
[51,4,"Detalles sensoriales","Incluir olores, sonidos y texturas para anclar la escena en los sentidos."],
[52,4,"Metáfora narrativa","Traslada significado de un campo a otro para intensificar una imagen del relato."],
[53,4,"Símil narrativo","Compara explícitamente un elemento de la historia con otro, usando 'como'."],
[54,4,"Personificación narrativa","Atribuye cualidades humanas a elementos del entorno narrado."],
[55,4,"Foreshadowing","Siembra una pista sutil que anticipa un hecho posterior de la trama."],
[56,4,"Suspenso","Retiene información clave para mantener la incertidumbre del lector."],
[57,4,"Ironía dramática","El lector sabe algo que el personaje todavía ignora."],
[58,4,"Simbolismo","Un objeto o elemento concreto representa una idea más amplia dentro del relato."],
[59,4,"Repetición como recurso rítmico","Repite una palabra o estructura para reforzar una idea o emoción."],
[60,4,"Contraste entre acción y reflexión","Alterna momentos de movimiento con pausas de pensamiento del personaje."],

// V. Técnicas de conexión temporal (61-70)
[61,5,"Conectores temporales","Palabras como 'luego', 'después' o 'mientras' que ordenan la acción."],
[62,5,"Marcadores de simultaneidad","Indican que dos acciones ocurren al mismo tiempo, como 'mientras tanto'."],
[63,5,"Marcadores de anterioridad","Señalan que un hecho ocurrió antes de otro, como 'antes de que'."],
[64,5,"Marcadores de posterioridad","Indican que un hecho sucede después de otro, como 'más tarde'."],
[65,5,"Salto temporal explícito","Anuncia con claridad un cambio de época o momento, como 'diez años después'."],
[66,5,"Salto temporal implícito","Cambia de momento sin anunciarlo, dejando que el contexto lo revele."],
[67,5,"Pretérito perfecto simple","Tiempo verbal que narra la acción central y hace avanzar la trama."],
[68,5,"Pretérito imperfecto","Tiempo verbal que describe el trasfondo, hábitos o estados durante la acción."],
[69,5,"Contraste entre pretéritos","Combina acción puntual y trasfondo descriptivo dentro del mismo párrafo."],
[70,5,"Presente histórico","Narra hechos pasados en presente para darles vivacidad e inmediatez."],

// VI. Personajes y caracterización (71-80)
[71,6,"Caracterización directa","El narrador describe explícitamente cómo es un personaje."],
[72,6,"Caracterización indirecta","El carácter del personaje se deduce de sus acciones o palabras."],
[73,6,"Descripción física del personaje","Detalla rasgos corporales que ayudan a visualizarlo."],
[74,6,"Descripción psicológica del personaje","Detalla temperamento, motivaciones o conflictos internos."],
[75,6,"Diálogo caracterizador","El modo de hablar de un personaje revela su origen o personalidad."],
[76,6,"Acción reveladora de carácter","Un gesto o decisión concreta muestra cómo es realmente el personaje."],
[77,6,"Contraste entre personajes","Dos personajes se definen mutuamente por oposición."],
[78,6,"Evolución del personaje","Cambio interno que experimenta a lo largo de la narración."],
[79,6,"Motivación del personaje","Razón profunda que explica por qué actúa de determinada manera."],
[80,6,"Voz distintiva de cada personaje","Cada personaje mantiene un registro y vocabulario propios y reconocibles."],

// VII. Ambientación y escenario (81-88)
[81,7,"Descripción de espacio","Detalla el lugar físico donde transcurre la acción."],
[82,7,"Descripción del tiempo atmosférico","Usa el clima para reforzar la atmósfera de la escena."],
[83,7,"Ambiente como reflejo emocional","El entorno refleja o intensifica el estado de ánimo del personaje."],
[84,7,"Espacio como símbolo","Un lugar concreto representa una idea o un estado interior más amplio."],
[85,7,"Contraste entre espacio interior y exterior","Opone un lugar cerrado y uno abierto para crear significado."],
[86,7,"Sonidos ambientales","Incluye ruidos del entorno para reforzar la inmersión en la escena."],
[87,7,"Detalles de época o contexto histórico","Sitúa la acción con elementos propios de un periodo concreto."],
[88,7,"Espacio como motor de la acción","El propio escenario genera o condiciona lo que les ocurre a los personajes."],

// VIII. Errores comunes en el párrafo narrativo (89-95)
[89,8,"Exceso de adjetivación","Acumula adjetivos que recargan la prosa sin aportar precisión."],
[90,8,"Abuso del gerundio","Usa el gerundio de forma incorrecta o excesiva para narrar acciones."],
[91,8,"Ritmo monótono por oraciones repetitivas","Repite la misma estructura sintáctica y cansa al lector."],
[92,8,"Narrador inconsistente","Cambia sin justificación el nivel de conocimiento o la voz del narrador."],
[93,8,"Salto temporal confuso","Cambia de momento sin marcadores claros, y el lector pierde la ubicación."],
[94,8,"Exceso de diálogo sin acción","El diálogo se extiende sin gestos ni contexto que lo sostengan."],
[95,8,"Desequilibrio entre mostrar y contar","Abusa de la narración explicativa en vez de dejar que la escena hable."],

// IX. Técnicas bilingües del párrafo narrativo español-inglés (96-100)
[96,9,"Pretérito narrativo entre idiomas","El inglés distingue menos matices entre pretéritos que el español al narrar."],
[97,9,"El 'showing' anglosajón","La tradición inglesa insiste en mostrar la acción más que en describir estados."],
[98,9,"Traducción del estilo indirecto libre","Debe adaptarse la sintaxis, no calcarse, al pasar de un idioma a otro."],
[99,9,"Conectores temporales propios de cada idioma","'Meanwhile' y 'mientras tanto' no siempre ocupan la misma posición en la frase."],
[100,9,"Adaptación del ritmo narrativo al traducir","La cadencia de oraciones cortas o largas debe ajustarse a cada idioma, no copiarse literalmente."]
].map(([id,block,title,desc])=>({id,block,title,desc}));

const BLOCK_NAMES = {
  1:"I · Elementos básicos", 2:"II · Tipos de narrador", 3:"III · Estructura narrativa",
  4:"IV · Técnicas de estilo", 5:"V · Conexión temporal", 6:"VI · Personajes",
  7:"VII · Ambientación", 8:"VIII · Errores comunes", 9:"IX · Técnicas bilingües ES-EN"
};

const STORAGE_KEY = "cuaderno-parrafo-narrativo-v1";
let memoryStore = null;

function loadProgress(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return memoryStore || { score:0, streak:0, best:0, mastery:{}, log:[] };
}
function saveProgress(p){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); }
  catch(e){ memoryStore = p; }
}

let progress = loadProgress();
if(!progress.log) progress.log = [];
let currentBlock = "all";
let currentIndex = 0;
let mode = "explorar";
let quizCurrent = null;
let answered = false;

const tabsEl = document.getElementById('tabs');
const notebookBody = document.getElementById('notebookBody');
const stampEl = document.getElementById('stamp');
const ringsEl = document.getElementById('rings');

for(let i=0;i<9;i++){ const d=document.createElement('div'); d.className='ring'; ringsEl.appendChild(d); }

function buildTabs(){
  const blocks = [["all","Todas"], ...Object.entries(BLOCK_NAMES)];
  tabsEl.innerHTML = "";
  blocks.forEach(([key,label])=>{
    const b = document.createElement('button');
    b.className = 'tab' + (String(key)===String(currentBlock) ? ' active' : '');
    b.textContent = label;
    b.onclick = ()=>{ currentBlock = key; currentIndex = 0; buildTabs(); render(); };
    tabsEl.appendChild(b);
  });
  tabsEl.style.display = mode==="cuaderno" ? "none" : "flex";
}

function filteredTechniques(){
  if(currentBlock==="all") return TECHNIQUES;
  return TECHNIQUES.filter(t=>String(t.block)===String(currentBlock));
}

function updateDash(){
  document.getElementById('statScore').textContent = progress.score;
  document.getElementById('statStreak').textContent = progress.streak;
  document.getElementById('statBest').textContent = progress.best;
  const masteredCount = Object.values(progress.mastery).filter(v=>v>=3).length;
  document.getElementById('statMastered').textContent = masteredCount + "/100";
  document.getElementById('progressBar').style.width = masteredCount + "%";
}

function markSeen(id){
  if(!progress.mastery[id]) progress.mastery[id] = 1;
  saveProgress(progress);
  updateDash();
}

function renderExplorar(){
  const list = filteredTechniques();
  if(currentIndex>=list.length) currentIndex = 0;
  if(currentIndex<0) currentIndex = list.length-1;
  const t = list[currentIndex];
  const level = progress.mastery[t.id] || 0;
  const badge = level>=3 ? "🟢 dominada" : level>=2 ? "🟡 practicada" : level>=1 ? "⚪ vista" : "· sin visitar";
  notebookBody.innerHTML = `
    <div class="card-top">
      <span class="card-num">Nº ${String(t.id).padStart(3,'0')}</span>
      <span class="card-block">${BLOCK_NAMES[t.block]}</span>
    </div>
    <h2>${t.title}</h2>
    <p class="desc">${t.desc}</p>
    <p style="font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:var(--ink-light);margin-top:14px;">${badge}</p>
    <div class="card-actions">
      <button class="btn ghost" id="prevBtn">← Anterior</button>
      <button class="btn" id="nextBtn">Siguiente →</button>
    </div>
  `;
  stampEl.className = "stamp";
  markSeen(t.id);
  document.getElementById('prevBtn').onclick = ()=>{ currentIndex -= 1; renderExplorar(); };
  document.getElementById('nextBtn').onclick = ()=>{ currentIndex += 1; renderExplorar(); };
}

function pickQuizQuestion(){
  const pool = filteredTechniques();
  quizCurrent = pool[Math.floor(Math.random()*pool.length)];
  let sameBlock = TECHNIQUES.filter(t=>t.block===quizCurrent.block && t.id!==quizCurrent.id).sort(()=>Math.random()-0.5);
  let others = TECHNIQUES.filter(t=>t.id!==quizCurrent.id && t.block!==quizCurrent.block).sort(()=>Math.random()-0.5);
  const distractors = sameBlock.concat(others).slice(0,3);
  const options = [quizCurrent, ...distractors].sort(()=>Math.random()-0.5);
  answered = false;
  return options;
}

function renderPracticar(){
  const options = pickQuizQuestion();
  notebookBody.innerHTML = `
    <div class="card-top">
      <span class="card-num">Nº ${String(quizCurrent.id).padStart(3,'0')}</span>
      <span class="card-block">${BLOCK_NAMES[quizCurrent.block]}</span>
    </div>
    <p class="quiz-clue">"${quizCurrent.desc}"</p>
    <p style="font-family:'IBM Plex Mono',monospace;font-size:0.68rem;color:var(--ink-light);margin-top:8px;">¿A qué técnica del párrafo narrativo corresponde esta descripción?</p>
    <div class="options" id="optionsBox"></div>
    <div class="write-panel" id="writePanel" style="display:none;">
      <p class="hint">Ahora escríbela de tu puño y letra, como en un cuaderno</p>
      <input type="text" class="cursive-input" id="writeInput" placeholder="Escribe aquí el nombre de la técnica...">
      <div class="sig-row">
        <div class="sig-box">
          <label>Tu firma</label>
          <input type="text" class="sig-input" id="sigInput" placeholder="Firma con tu nombre o iniciales">
        </div>
        <button class="btn" id="saveLogBtn">Guardar en el cuaderno</button>
      </div>
    </div>
    <div class="card-actions">
      <button class="btn ghost" disabled></button>
      <button class="btn" id="nextBtn">Siguiente pregunta →</button>
    </div>
  `;
  stampEl.className = "stamp";
  const box = document.getElementById('optionsBox');
  options.forEach(opt=>{
    const b = document.createElement('button');
    b.className = 'opt';
    b.textContent = opt.title;
    b.onclick = ()=> handleAnswer(opt, b);
    box.appendChild(b);
  });
  document.getElementById('nextBtn').onclick = ()=> renderPracticar();
}

function handleAnswer(opt, btnEl){
  if(answered) return;
  answered = true;
  const isCorrect = opt.id === quizCurrent.id;
  document.querySelectorAll('#optionsBox .opt').forEach(b=>{
    b.disabled = true;
    if(b.textContent === quizCurrent.title) b.classList.add('correct');
  });
  if(!isCorrect) btnEl.classList.add('wrong');

  const prevLevel = progress.mastery[quizCurrent.id] || 0;
  if(isCorrect){
    progress.streak += 1;
    progress.best = Math.max(progress.best, progress.streak);
    progress.score += prevLevel>=2 ? 5 : 10;
    progress.mastery[quizCurrent.id] = prevLevel===0 ? 2 : Math.min(3, prevLevel+1);
    stampEl.textContent = "Correcto";
    stampEl.classList.add('ok');
  } else {
    progress.streak = 0;
    progress.mastery[quizCurrent.id] = Math.max(1, prevLevel);
    stampEl.textContent = "Revisar";
    stampEl.classList.add('no');
  }
  requestAnimationFrame(()=> stampEl.classList.add('show'));
  saveProgress(progress);
  updateDash();

  const panel = document.getElementById('writePanel');
  panel.style.display = 'block';
  const wi = document.getElementById('writeInput');
  wi.focus();
  document.getElementById('saveLogBtn').onclick = ()=>{
    const written = wi.value.trim();
    const sig = document.getElementById('sigInput').value.trim();
    if(!written){ wi.focus(); return; }
    progress.log.unshift({
      id: quizCurrent.id,
      block: quizCurrent.block,
      title: quizCurrent.title,
      written,
      sig: sig || "—",
      correct: isCorrect,
      date: new Date().toLocaleString('es-ES', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'})
    });
    saveProgress(progress);
    document.getElementById('saveLogBtn').textContent = "✓ Guardado";
    document.getElementById('saveLogBtn').disabled = true;
  };
}

function renderCuaderno(){
  if(progress.log.length===0){
    notebookBody.innerHTML = `<div class="log-empty">Tu cuaderno está vacío todavía.<br>Ve a "Practicar (quiz)", responde una pregunta y escribe tu respuesta a mano para guardarla aquí.</div>`;
    return;
  }
  const entries = progress.log.map((e,i)=>`
    <div class="log-entry">
      <div class="log-num">Nº ${String(e.id).padStart(3,'0')}</div>
      <div>
        <span class="log-block">${BLOCK_NAMES[e.block]} ${e.correct? '· ✅ correcta':'· ⚠️ a repasar'}</span>
        <p class="log-title">${e.title}</p>
        <p class="log-written">"${e.written}"</p>
        <div class="log-sig-row">
          <span class="log-sig">${e.sig}</span>
          <span class="log-date">${e.date}</span>
          <button class="log-del" data-idx="${i}" title="Eliminar entrada">🗑</button>
        </div>
      </div>
    </div>
  `).join("");
  notebookBody.innerHTML = `
    <div class="card-top">
      <span class="card-num">Mi cuaderno</span>
      <span class="card-block">${progress.log.length} entrada(s)</span>
    </div>
    ${entries}
  `;
  notebookBody.querySelectorAll('.log-del').forEach(btn=>{
    btn.onclick = ()=>{
      const idx = parseInt(btn.dataset.idx,10);
      progress.log.splice(idx,1);
      saveProgress(progress);
      renderCuaderno();
    };
  });
}

function render(){
  buildTabs();
  if(mode==="explorar") renderExplorar();
  else if(mode==="practicar") renderPracticar();
  else renderCuaderno();
  updateDash();
}

document.querySelectorAll('.mode-btn').forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll('.mode-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    mode = b.dataset.mode;
    currentIndex = 0;
    render();
  };
});

document.getElementById('resetBtn').onclick = ()=>{
  if(confirm("¿Restablecer todo tu progreso y borrar el cuaderno?")){
    progress = { score:0, streak:0, best:0, mastery:{}, log:[] };
    saveProgress(progress);
    render();
  }
};

render();
</script>
</body>
</html>
