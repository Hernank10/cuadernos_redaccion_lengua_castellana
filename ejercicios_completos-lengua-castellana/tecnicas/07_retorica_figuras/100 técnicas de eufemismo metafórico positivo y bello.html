    </style>
</head>

<script>

    const narrativos = [
        { nombre: "La muerte es el amanecer", teoria: "La muerte es el inicio de una nueva luz, no un final.", ejemplo: "Su muerte fue el amanecer de su eternidad.", ejercicio: "¿Qué eufemismo positivo ve la muerte como un nuevo comienzo luminoso?", respuesta: "la muerte es el amanecer" },
        { nombre: "El dolor es el jardín", teoria: "El sufrimiento es el suelo donde crece la fortaleza.", ejemplo: "Su dolor fue el jardín de su sabiduría.", ejercicio: "¿Qué eufemismo positivo ve el dolor como un espacio de crecimiento?", respuesta: "el dolor es el jardín" },
        { nombre: "La adversidad es la lluvia", teoria: "Las dificultades fecundan el alma como la lluvia a la tierra.", ejemplo: "La adversidad fue la lluvia que hizo germinar su esperanza.", ejercicio: "¿Qué eufemismo positivo ve la adversidad como agua que nutre?", respuesta: "la adversidad es la lluvia" },
        { nombre: "El fracaso es el escalón", teoria: "El fracaso es un peldaño hacia el éxito.", ejemplo: "Su fracaso fue el escalón que lo elevó.", ejercicio: "¿Qué eufemismo positivo ve el fracaso como un paso hacia arriba?", respuesta: "el fracaso es el escalón" },
        { nombre: "La pérdida es la semilla", teoria: "Perder es sembrar para cosechar más adelante.", ejemplo: "Su pérdida fue la semilla de su renacimiento.", ejercicio: "¿Qué eufemismo positivo ve la pérdida como origen de vida futura?", respuesta: "la pérdida es la semilla" },
        { nombre: "La soledad es el abrazo", teoria: "La soledad es el abrazo del alma consigo misma.", ejemplo: "Su soledad fue el abrazo que sanó su corazón.", ejercicio: "¿Qué eufemismo positivo ve la soledad como un encuentro íntimo?", respuesta: "la soledad es el abrazo" },
        { nombre: "El miedo es el guardián", teoria: "El miedo protege y prepara para el valor.", ejemplo: "Su miedo fue el guardián de su prudencia.", ejercicio: "¿Qué eufemismo positivo ve el miedo como un protector?", respuesta: "el miedo es el guardián" },
        { nombre: "El silencio es la palabra", teoria: "El silencio es el lenguaje más profundo.", ejemplo: "Su silencio fue la palabra que todos escucharon.", ejercicio: "¿Qué eufemismo positivo ve el silencio como una forma de comunicación?", respuesta: "el silencio es la palabra" },
        { nombre: "La oscuridad es el vientre", teoria: "La oscuridad gesta la luz, como el vientre gesta la vida.", ejemplo: "La oscuridad fue el vientre de su nueva luz.", ejercicio: "¿Qué eufemismo positivo ve la oscuridad como origen creador?", respuesta: "la oscuridad es el vientre" },
        { nombre: "La herida es la flor", teoria: "Las cicatrices son flores que brotan del dolor.", ejemplo: "Su herida se convirtió en una flor de esperanza.", ejercicio: "¿Qué eufemismo positivo ve las heridas como flores?", respuesta: "la herida es la flor" },
        { nombre: "El exilio es el viaje", teoria: "El destierro es una peregrinación hacia el autodescubrimiento.", ejemplo: "Su exilio fue el viaje hacia su verdad.", ejercicio: "¿Qué eufemismo positivo ve el exilio como un viaje de descubrimiento?", respuesta: "el exilio es el viaje" },
        { nombre: "El caos es el lienzo", teoria: "El desorden es el material bruto para crear belleza.", ejemplo: "El caos fue su lienzo, y de él nació la armonía.", ejercicio: "¿Qué eufemismo positivo ve el caos como punto de partida creativo?", respuesta: "el caos es el lienzo" },
        { nombre: "El llanto es la lluvia", teoria: "Las lágrimas fecundan el alma como la lluvia a la tierra.", ejemplo: "Su llanto fue la lluvia que hizo brotar su fortaleza.", ejercicio: "¿Qué eufemismo positivo ve el llanto como fertilizante del espíritu?", respuesta: "el llanto es la lluvia" },
        { nombre: "El olvido es el silencio", teoria: "El olvido es la pausa necesaria para un nuevo recuerdo.", ejemplo: "El olvido fue el silencio que precedió su renacer.", ejercicio: "¿Qué eufemismo positivo ve el olvido como una pausa creadora?", respuesta: "el olvido es el silencio" },
        { nombre: "La prisión es la libertad", teoria: "La reclusión puede ser la libertad del espíritu.", ejemplo: "Su prisión se convirtió en su libertad interior.", ejercicio: "¿Qué eufemismo positivo ve la prisión como liberación espiritual?", respuesta: "la prisión es la libertad" },

        { nombre: "El desierto es el jardín", teoria: "La aridez es el suelo donde germina la resistencia.", ejemplo: "Su desierto interior se volvió un jardín de fortaleza.", ejercicio: "¿Qué eufemismo positivo ve el desierto como un jardín potencial?", respuesta: "el desierto es el jardín" },

    narrativos.forEach((t, i) => TECNICAS.push({ id: i+1, bloque: 1, categoria: "narrativo", ...t }));

        { nombre: "Cicatriz de estrella", teoria: "Las marcas del dolor son estrellas que iluminan el camino.", ejemplo: "Su rostro tenía la cicatriz de una estrella.", ejercicio: "¿Qué eufemismo positivo describe una cicatriz como fuente de luz?", respuesta: "cicatriz de estrella" },

        { nombre: "Ojos de cielo", teoria: "Mirada profunda y serena como el cielo.", ejemplo: "Tenía ojos de cielo que inspiraban paz.", ejercicio: "¿Qué eufemismo positivo describe una mirada serena?", respuesta: "ojos de cielo" },

        { nombre: "Mano de pluma", teoria: "Manos delicadas y hábiles para crear belleza.", ejemplo: "Tenía mano de pluma para escribir versos.", ejercicio: "¿Qué eufemismo positivo describe una mano ligera y creativa?", respuesta: "mano de pluma" },
        { nombre: "Pies de danza", teoria: "Pies que se mueven con gracia y ligereza.", ejemplo: "Sus pies de danza recorrían el mundo.", ejercicio: "¿Qué eufemismo positivo describe pies ligeros?", respuesta: "pies de danza" },
        { nombre: "Alma de río", teoria: "Espíritu fluido y constante que todo lo recorre.", ejemplo: "Tenía alma de río, siempre en movimiento.", ejercicio: "¿Qué eufemismo positivo describe un alma fluida?", respuesta: "alma de río" },
        { nombre: "Corazón de mar", teoria: "Corazón profundo y vasto como el océano.", ejemplo: "Su corazón de mar albergaba mundos.", ejercicio: "¿Qué eufemismo positivo describe un corazón profundo?", respuesta: "corazón de mar" },

    function updateNav(block) {
        document.querySelectorAll('.block-nav button').forEach(b => b.classList.toggle('active', parseInt(b.dataset.block) === block));

    updateNav(1);

    window.verificarRespuesta = function(id) {
        const input = document.getElementById(`input-${id}`);
        const feedback = document.getElementById(`feedback-${id}`);
        const correcta = document.getElementById(`correcta-${id}`);
        if (!input || !feedback) return;
        const valor = input.value.trim().toLowerCase();
        const respuestaCorrecta = correcta ? correcta.textContent.toLowerCase() : '';
        if (valor === '' || valor === '...') {
            feedback.textContent = '✏️ Escribe tu respuesta primero.';
            feedback.className = 'feedback-msg';
            return;
        }
        const normalize = (s) => s.replace(/\s+/g, ' ').trim();
        const esCorrecto = normalize(valor) === normalize(respuestaCorrecta) ||
                           normalize(valor).includes(normalize(respuestaCorrecta)) ||
                           normalize(respuestaCorrecta).includes(normalize(valor));
        if (esCorrecto) {
            feedback.textContent = '✅ ¡Correcto! Bien hecho.';
            feedback.className = 'feedback-msg correcto';
        } else {
            feedback.textContent = `❌ Incorrecto. La respuesta correcta es: "${respuestaCorrecta}"`;
            feedback.className = 'feedback-msg incorrecto';
        }
    };

                            <div class="ejercicio">✏️ ${t.ejercicio}</div>
                            <div class="respuesta-area">

                            <div class="etiqueta">técnica #${t.id} · ${t.categoria}</div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ========== QUIZ ==========
    let quizQuestions = [];
    let currentQuizIndex = 0;
    let score = 0;
    let answered = false;

    function generateQuiz() {
        const shuffled = [...TECNICAS].sort(() => Math.random() - 0.5);
        quizQuestions = shuffled.slice(0, 10).map(t => {
            const opts = [t.respuesta];
            const others = TECNICAS.filter(x => x.id !== t.id);
            const shuffledOthers = others.sort(() => Math.random() - 0.5);
            for (let i = 0; i < 3; i++) {
                if (shuffledOthers[i]) opts.push(shuffledOthers[i].respuesta);
            }
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return {
                pregunta: `📌 ${t.ejercicio} (técnica: ${t.nombre})`,
                opciones: opts,
                correcta: t.respuesta,
                id: t.id
            };
        });
        currentQuizIndex = 0;
        score = 0;
        answered = false;
        renderQuiz();
    }

    function renderQuiz() {
        if (!quizQuestions.length) return;
        const q = quizQuestions[currentQuizIndex];
        const total = quizQuestions.length;
        let html = `
            <div class="quiz-pregunta">
                <p>${q.pregunta}</p>
                <div class="quiz-opciones" id="quizOptions">
        `;
        q.opciones.forEach((op, idx) => {
            html += `<button data-idx="${idx}" onclick="checkAnswer(${idx})">${op}</button>`;
        });
        html += `</div>
                <div id="quizFeedback" style="margin-top:0.8rem;"></div>
                <div class="quiz-result" id="quizScore">Puntuación: ${score}/${total}</div>
            </div>
            <div class="quiz-controles">
                <button id="nextQuizBtn" disabled>→ Siguiente</button>
                <button onclick="generateQuiz()">🔄 Nuevo cuestionario</button>
            </div>
        `;
        quizContainer.innerHTML = html;
        answered = false;
        document.getElementById('nextQuizBtn').disabled = true;
    }

    window.checkAnswer = function(idx) {
        if (answered) return;
        const q = quizQuestions[currentQuizIndex];
        const buttons = document.querySelectorAll('#quizOptions button');
        buttons.forEach((b, i) => {
            b.disabled = true;
            if (i === idx) {
                const esCorrecta = q.opciones[idx] === q.correcta;
                b.classList.add(esCorrecta ? 'correct' : 'incorrect');
                if (esCorrecta) score++;
            }
            if (q.opciones[i] === q.correcta) {
                buttons[i].classList.add('correct');
            }
        });
        answered = true;
        document.getElementById('nextQuizBtn').disabled = false;
        document.getElementById('quizScore').textContent = `Puntuación: ${score}/${quizQuestions.length}`;
        const fb = document.getElementById('quizFeedback');
        fb.innerHTML = `<span style="background:#1F4E5F;color:white;padding:0.2rem 1rem;border-radius:40px;">✅ Respuesta correcta: ${q.correcta}</span>`;
    };

    document.addEventListener('click', function(e) {
        if (e.target.id === 'nextQuizBtn') {
            if (currentQuizIndex < quizQuestions.length - 1) {
                currentQuizIndex++;
                renderQuiz();
            } else {
                alert(`¡Cuestionario finalizado! Puntuación: ${score}/${quizQuestions.length}`);
                document.getElementById('nextQuizBtn').disabled = true;
            }
        }
    });

    // Inicializar
    renderCards(1);
