            .cards-grid { grid-template-columns: 1fr; }

        }
    </style>
</head>

<script>
    // ================================================================
    // 100 TÉCNICAS DE EPÍTETOS DE CIENCIA FICCIÓN CON FIGURAS RETÓRICAS

    // Distribuidas en 4 bloques: Narrativo, Descriptivo, Argumentativo, Expositivo.
    // ================================================================
    const TECNICAS = [];

    // =================== BLOQUE 1: EPÍTETOS NARRATIVOS DE CIENCIA FICCIÓN (25) ===================
    const narrativos = [
        { nombre: "El silencioso vacío", teoria: "Epíteto narrativo: el vacío como silencioso.", ejemplo: "El silencioso vacío se extendía ante la nave.", ejercicio: "¿Qué epíteto narrativo describe el vacío como silencioso?", respuesta: "el silencioso vacío" },
        { nombre: "La inmensa galaxia", teoria: "Epíteto narrativo: la galaxia como inmensa.", ejemplo: "La inmensa galaxia giraba lentamente.", ejercicio: "¿Qué epíteto narrativo describe la galaxia como inmensa?", respuesta: "la inmensa galaxia" },
        { nombre: "El frío espacio", teoria: "Epíteto narrativo: el espacio como frío.", ejemplo: "El frío espacio era un abismo de oscuridad.", ejercicio: "¿Qué epíteto narrativo describe el espacio como frío?", respuesta: "el frío espacio" },

        { nombre: "El inmenso universo", teoria: "Epíteto narrativo: el universo como inmenso.", ejemplo: "El inmenso universo se expandía sin fin.", ejercicio: "¿Qué epíteto narrativo describe el universo como inmenso?", respuesta: "el inmenso universo" },

        { nombre: "La eterna noche", teoria: "Epíteto narrativo: la noche como eterna.", ejemplo: "La eterna noche cubría el planeta.", ejercicio: "¿Qué epíteto narrativo describe la noche como eterna?", respuesta: "la eterna noche" },

        { nombre: "El vasto océano", teoria: "Epíteto narrativo: el océano como vasto.", ejemplo: "El vasto océano de estrellas.", ejercicio: "¿Qué epíteto narrativo describe el océano como vasto?", respuesta: "el vasto océano" },
        { nombre: "La profunda oscuridad", teoria: "Epíteto narrativo: la oscuridad como profunda.", ejemplo: "La profunda oscuridad era un manto.", ejercicio: "¿Qué epíteto narrativo describe la oscuridad como profunda?", respuesta: "la profunda oscuridad" },

    narrativos.forEach((t, i) => TECNICAS.push({ id: i+1, bloque: 1, categoria: "narrativo", ...t }));

    // =================== BLOQUE 2: EPÍTETOS DESCRIPTIVOS DE CIENCIA FICCIÓN (25) ===================

        { nombre: "El blanco hielo", teoria: "Epíteto descriptivo: el hielo como blanco.", ejemplo: "El blanco hielo cubría la luna.", ejercicio: "¿Qué epíteto descriptivo describe el hielo como blanco?", respuesta: "el blanco hielo" },
        { nombre: "El negro espacio", teoria: "Epíteto descriptivo: el espacio como negro.", ejemplo: "El negro espacio era un abismo sin fin.", ejercicio: "¿Qué epíteto descriptivo describe el espacio como negro?", respuesta: "el negro espacio" },
        { nombre: "El gris planeta", teoria: "Epíteto descriptivo: el planeta como gris.", ejemplo: "El gris planeta era un mundo de roca.", ejercicio: "¿Qué epíteto descriptivo describe el planeta como gris?", respuesta: "el gris planeta" },

        { nombre: "El naranja amanecer", teoria: "Epíteto descriptivo: el amanecer como naranja.", ejemplo: "El naranja amanecer era un espectáculo.", ejercicio: "¿Qué epíteto descriptivo describe el amanecer como naranja?", respuesta: "el naranja amanecer" },
        { nombre: "El cristalino lago", teoria: "Epíteto descriptivo: el lago como cristalino.", ejemplo: "El cristalino lago reflejaba las estrellas.", ejercicio: "¿Qué epíteto descriptivo describe el lago como cristalino?", respuesta: "el cristalino lago" },
        { nombre: "El transparente aire", teoria: "Epíteto descriptivo: el aire como transparente.", ejemplo: "El transparente aire era puro en el planeta.", ejercicio: "¿Qué epíteto descriptivo describe el aire como transparente?", respuesta: "el transparente aire" },

    // =================== BLOQUE 4: EPÍTETOS EXPOSITIVOS DE CIENCIA FICCIÓN (25) ===================

        { nombre: "Análisis del epíteto", teoria: "Epíteto expositivo que analiza.", ejemplo: "El epíteto se compone de adjetivo y sustantivo.", ejercicio: "¿Qué epíteto expositivo analiza?", respuesta: "análisis del epíteto" },
        { nombre: "Síntesis del epíteto", teoria: "Epíteto expositivo que sintetiza.", ejemplo: "El epíteto es la síntesis de la cualidad.", ejercicio: "¿Qué epíteto expositivo sintetiza?", respuesta: "síntesis del epíteto" },
        { nombre: "Ejemplo de epíteto", teoria: "Epíteto expositivo con ejemplificación.", ejemplo: "Como 'el silencioso vacío', un ejemplo de epíteto.", ejercicio: "¿Qué epíteto expositivo usa ejemplos?", respuesta: "ejemplo de epíteto" },
        { nombre: "Paráfrasis del epíteto", teoria: "Epíteto expositivo que reformula.", ejemplo: "Es decir, el epíteto resalta una cualidad.", ejercicio: "¿Qué epíteto expositivo reformula?", respuesta: "paráfrasis del epíteto" },
        { nombre: "Resumen del epíteto", teoria: "Epíteto expositivo que resume.", ejemplo: "En resumen, el epíteto es un adjetivo expresivo.", ejercicio: "¿Qué epíteto expositivo resume?", respuesta: "resumen del epíteto" },

        { nombre: "Advertencia epitética", teoria: "Epíteto expositivo que advierte.", ejemplo: "Cuida los epítetos, son poderosos.", ejercicio: "¿Qué epíteto expositivo advierte?", respuesta: "advertencia epitética" },
        { nombre: "Corrección epitética", teoria: "Epíteto expositivo que corrige.", ejemplo: "Más bien, el epíteto es un adjetivo calificativo.", ejercicio: "¿Qué epíteto expositivo corrige?", respuesta: "corrección epitética" },
        { nombre: "Hipótesis epitética", teoria: "Epíteto expositivo que plantea hipótesis.", ejemplo: "Si el epíteto es preciso, entonces impacta.", ejercicio: "¿Qué epíteto expositivo plantea hipótesis?", respuesta: "hipótesis epitética" },
        { nombre: "Atenuación epitética", teoria: "Epíteto expositivo que atenúa.", ejemplo: "Quizás, el epíteto sea solo un adjetivo.", ejercicio: "¿Qué epíteto expositivo atenúa?", respuesta: "atenuación epitética" },
        { nombre: "Énfasis epitético", teoria: "Epíteto expositivo que enfatiza.", ejemplo: "Sin duda, el epíteto es clave en la literatura.", ejercicio: "¿Qué epíteto expositivo enfatiza?", respuesta: "énfasis epitético" },
        { nombre: "Generalización epitética", teoria: "Epíteto expositivo que generaliza.", ejemplo: "Todo epíteto es un adjetivo calificativo.", ejercicio: "¿Qué epíteto expositivo generaliza?", respuesta: "generalización epitética" },
        { nombre: "Precisión epitética", teoria: "Epíteto expositivo que precisa.", ejemplo: "Exactamente, el epíteto es un adjetivo resaltador.", ejercicio: "¿Qué epíteto expositivo precisa?", respuesta: "precisión epitética" },
        { nombre: "Matización epitética", teoria: "Epíteto expositivo que matiza.", ejemplo: "No obstante, el epíteto puede variar.", ejercicio: "¿Qué epíteto expositivo matiza?", respuesta: "matización epitética" },
        { nombre: "Conclusión positiva epitética", teoria: "Epíteto expositivo con conclusión positiva.", ejemplo: "Al final, el epíteto es bello.", ejercicio: "¿Qué epíteto expositivo concluye con optimismo?", respuesta: "conclusión positiva epitética" },
        { nombre: "Verdad universal epitética", teoria: "Epíteto expositivo con verdad universal.", ejemplo: "El epíteto es el espejo del sustantivo.", ejercicio: "¿Qué epíteto expositivo expresa una verdad eterna?", respuesta: "verdad universal epitética" },
    ];
    expositivos.forEach((t, i) => TECNICAS.push({ id: i+76, bloque: 4, categoria: "expositivo", ...t }));

    TECNICAS.sort((a,b) => a.id - b.id);

    // ========== RENDER ==========
    const blockNav = document.getElementById('blockNav');
    const cardsGrid = document.getElementById('cardsGrid');
    const quizContainer = document.getElementById('quizContainer');

    let currentBlock = 1;
    const BLOCK_NAMES = ['', 'Epítetos narrativos', 'Epítetos descriptivos', 'Epítetos argumentativos', 'Epítetos expositivos'];

    for (let i = 1; i <= 4; i++) {
        const btn = document.createElement('button');
        btn.textContent = `${i}. ${BLOCK_NAMES[i]}`;
        btn.dataset.block = i;
        btn.addEventListener('click', () => {
            currentBlock = i;
            renderCards(i);
            updateNav(i);
        });
        blockNav.appendChild(btn);
    }

    function updateNav(block) {
        document.querySelectorAll('.block-nav button').forEach(b => b.classList.toggle('active', parseInt(b.dataset.block) === block));
    }
    updateNav(1);

    window.verificarRespuesta = function(id) {
        const input = document.getElementById(`input-${id}`);
        const feedback = document.getElementById(`feedback-${id}`);
        const correcta = document.getElementById(`correcta-${id}`);
        if (!input || !feedback) return;
        const valor = input.value.trim().toLowerCase();
        const respuestaCorrecta = correcta ? correcta.textContent.toLowerCase() : '';
        if (valor === '' || valor === '...') {
            feedback.textContent = '✏️ Escribe tu respuesta primero.';
            feedback.className = 'feedback-msg';
            return;
        }
        const normalize = (s) => s.replace(/\s+/g, ' ').trim();
        const esCorrecto = normalize(valor) === normalize(respuestaCorrecta) ||
                           normalize(valor).includes(normalize(respuestaCorrecta)) ||
                           normalize(respuestaCorrecta).includes(normalize(valor));
        if (esCorrecto) {
            feedback.textContent = '✅ ¡Correcto! Bien hecho.';
            feedback.className = 'feedback-msg correcto';
        } else {
            feedback.textContent = `❌ Incorrecto. La respuesta correcta es: "${respuestaCorrecta}"`;
            feedback.className = 'feedback-msg incorrecto';
        }
    };

    function renderCards(block) {
        const filtered = TECNICAS.filter(t => t.bloque === block);
        cardsGrid.innerHTML = filtered.map((t, idx) => {
            return `
                <div class="card-flip" data-id="${t.id}" onclick="this.classList.toggle('flipped')">
                    <div class="card-flip-inner">
                        <div class="card-front">
                            <div class="numero">${t.id}</div>
                            <span class="categoria">${t.categoria}</span>
                            <h3>${t.nombre}</h3>
                            <div class="teoria">${t.teoria}</div>
                            <div class="girar-indicador">↻ tocar para practicar</div>
                        </div>
                        <div class="card-back">
                            <div style="font-weight:600;color:#8bc4e0;margin-bottom:0.2rem;">✨ ${t.nombre}</div>
                            <div class="ejemplo"><strong>Ejemplo:</strong> ${t.ejemplo}</div>
                            <div class="ejercicio">✏️ ${t.ejercicio}</div>
                            <div class="respuesta-area">
                                <input type="text" id="input-${t.id}" placeholder="Escribe tu respuesta..." />
                                <button class="btn-verificar" onclick="verificarRespuesta(${t.id})">Comprobar</button>
                            </div>
                            <div id="feedback-${t.id}" class="feedback-msg"></div>
                            <div id="correcta-${t.id}" style="display:none;">${t.respuesta}</div>
                            <div class="respuesta-correcta">✓ ${t.respuesta}</div>
                            <div class="etiqueta">técnica #${t.id} · ${t.categoria}</div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ========== QUIZ ==========
    let quizQuestions = [];
    let currentQuizIndex = 0;
    let score = 0;
    let answered = false;

    function generateQuiz() {
        const shuffled = [...TECNICAS].sort(() => Math.random() - 0.5);
        quizQuestions = shuffled.slice(0, 10).map(t => {
            const opts = [t.respuesta];
            const others = TECNICAS.filter(x => x.id !== t.id);
            const shuffledOthers = others.sort(() => Math.random() - 0.5);
            for (let i = 0; i < 3; i++) {
                if (shuffledOthers[i]) opts.push(shuffledOthers[i].respuesta);
            }
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return {
                pregunta: `📌 ${t.ejercicio} (técnica: ${t.nombre})`,
                opciones: opts,
                correcta: t.respuesta,
                id: t.id
            };
        });
        currentQuizIndex = 0;
        score = 0;
        answered = false;
        renderQuiz();
    }

    function renderQuiz() {
        if (!quizQuestions.length) return;
        const q = quizQuestions[currentQuizIndex];
        const total = quizQuestions.length;
        let html = `
            <div class="quiz-pregunta">
                <p>${q.pregunta}</p>
                <div class="quiz-opciones" id="quizOptions">
        `;
        q.opciones.forEach((op, idx) => {
            html += `<button data-idx="${idx}" onclick="checkAnswer(${idx})">${op}</button>`;
        });
        html += `</div>
                <div id="quizFeedback" style="margin-top:0.8rem;"></div>
                <div class="quiz-result" id="quizScore">Puntuación: ${score}/${total}</div>
            </div>
            <div class="quiz-controles">
                <button id="nextQuizBtn" disabled>→ Siguiente</button>
                <button onclick="generateQuiz()">🔄 Nuevo cuestionario</button>
            </div>
        `;
        quizContainer.innerHTML = html;
        answered = false;
        document.getElementById('nextQuizBtn').disabled = true;
    }

    window.checkAnswer = function(idx) {
        if (answered) return;
        const q = quizQuestions[currentQuizIndex];
        const buttons = document.querySelectorAll('#quizOptions button');
        buttons.forEach((b, i) => {
            b.disabled = true;
            if (i === idx) {
                const esCorrecta = q.opciones[idx] === q.correcta;
                b.classList.add(esCorrecta ? 'correct' : 'incorrect');
                if (esCorrecta) score++;
            }
            if (q.opciones[i] === q.correcta) {
                buttons[i].classList.add('correct');
            }
        });
        answered = true;
        document.getElementById('nextQuizBtn').disabled = false;
        document.getElementById('quizScore').textContent = `Puntuación: ${score}/${quizQuestions.length}`;
        const fb = document.getElementById('quizFeedback');
        fb.innerHTML = `<span style="background:#2a5a7a;color:#e0f0ff;padding:0.2rem 1rem;border-radius:40px;">✅ Respuesta correcta: ${q.correcta}</span>`;
    };

    document.addEventListener('click', function(e) {
        if (e.target.id === 'nextQuizBtn') {
            if (currentQuizIndex < quizQuestions.length - 1) {
                currentQuizIndex++;
                renderQuiz();
            } else {
                alert(`¡Cuestionario finalizado! Puntuación: ${score}/${quizQuestions.length}`);
                document.getElementById('nextQuizBtn').disabled = true;
            }
        }
    });

    // Inicializar
    renderCards(1);
    generateQuiz();
</script>
