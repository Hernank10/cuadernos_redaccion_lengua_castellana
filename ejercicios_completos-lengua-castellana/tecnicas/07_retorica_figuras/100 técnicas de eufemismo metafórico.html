</head>

<script>
    // ================================================================
    // 100 TÉCNICAS DE EUFEMISMO METAFÓRICO (Literatura universal)
    // Distribuidas en 4 bloques: Narrativo, Descriptivo, Argumentativo, Expositivo
    // Cada técnica incluye: nombre, teoría, ejemplo literario, ejercicio y respuesta.
    // ================================================================
    const TECNICAS = [];

    // =================== BLOQUE 1: EUFEMISMOS METAFÓRICOS NARRATIVOS (25) ===================
    const narrativos = [
        { nombre: "Pasar a mejor vida", teoria: "Eufemismo para la muerte, sugerente de transición a un estado superior.", ejemplo: "Don Quijote pasó a mejor vida al final de la novela.", ejercicio: "¿Qué eufemismo narrativo sustituye 'morir'?", respuesta: "pasar a mejor vida" },
        { nombre: "Partir sin regreso", teoria: "Eufemismo para la muerte como un viaje sin retorno.", ejemplo: "El héroe partió sin regreso tras su última batalla.", ejercicio: "¿Qué eufemismo ve la muerte como un viaje?", respuesta: "partir sin regreso" },
        { nombre: "Cerrar los ojos", teoria: "Eufemismo para la muerte como un sueño eterno.", ejemplo: "Cerró los ojos para siempre en su lecho.", ejercicio: "¿Qué eufemismo relaciona la muerte con el dormir?", respuesta: "cerrar los ojos" },
        { nombre: "Irse al otro barrio", teoria: "Eufemismo coloquial para la muerte, sugerente de cambio de lugar.", ejemplo: "Se fue al otro barrio en la noche.", ejercicio: "¿Qué eufemismo popular indica cambio de residencia?", respuesta: "irse al otro barrio" },
        { nombre: "Descansar en paz", teoria: "Eufemismo para la muerte como reposo eterno.", ejemplo: "Descansó en paz después de tanto sufrir.", ejercicio: "¿Qué eufemismo asocia la muerte con el descanso?", respuesta: "descansar en paz" },
        { nombre: "Estirar la pata", teoria: "Eufemismo humorístico para la muerte.", ejemplo: "El gato estiró la pata después de 20 años.", ejercicio: "¿Qué eufemismo coloquial y jocoso indica muerte?", respuesta: "estirar la pata" },
        { nombre: "Quedarse en el camino", teoria: "Eufemismo para la muerte como un viaje que se interrumpe.", ejemplo: "Muchos se quedaron en el camino durante la travesía.", ejercicio: "¿Qué eufemismo ve la muerte como un viaje truncado?", respuesta: "quedarse en el camino" },
        { nombre: "Entregar el alma", teoria: "Eufemismo para la muerte como entrega espiritual.", ejemplo: "Entregó el alma al creador.", ejercicio: "¿Qué eufemismo relaciona la muerte con una ofrenda?", respuesta: "entregar el alma" },
        { nombre: "Partir de este mundo", teoria: "Eufemismo para la muerte como salida del mundo terrenal.", ejemplo: "Partió de este mundo rodeado de seres queridos.", ejercicio: "¿Qué eufemismo indica salida del mundo?", respuesta: "partir de este mundo" },
        { nombre: "Dormir el sueño eterno", teoria: "Eufemismo poético para la muerte.", ejemplo: "Durmió el sueño eterno bajo el roble.", ejercicio: "¿Qué eufemismo literario describe la muerte como sueño perpetuo?", respuesta: "dormir el sueño eterno" },
        { nombre: "Apagar la luz", teoria: "Eufemismo para la muerte como fin de la vida.", ejemplo: "Apagó la luz de su existencia.", ejercicio: "¿Qué eufemismo asocia la muerte con el apagado de una luz?", respuesta: "apagar la luz" },
        { nombre: "Volverse polvo", teoria: "Eufemismo para la muerte como retorno a la materia.", ejemplo: "Todo se vuelve polvo al final.", ejercicio: "¿Qué eufemismo alude a la descomposición física?", respuesta: "volverse polvo" },
        { nombre: "Irse al más allá", teoria: "Eufemismo para la muerte como viaje a lo trascendente.", ejemplo: "Se fue al más allá en paz.", ejercicio: "¿Qué eufemismo sugiere un destino trascendente?", respuesta: "irse al más allá" },
        { nombre: "Dejar de existir", teoria: "Eufemismo para la muerte como cesación del ser.", ejemplo: "Dejó de existir tras una larga enfermedad.", ejercicio: "¿Qué eufemismo expresa la muerte como cese de la existencia?", respuesta: "dejar de existir" },
        { nombre: "Emprender el viaje final", teoria: "Eufemismo para la muerte como viaje definitivo.", ejemplo: "Emprendió el viaje final con serenidad.", ejercicio: "¿Qué eufemismo describe la muerte como viaje final?", respuesta: "emprender el viaje final" },
        { nombre: "Pasar a la inmortalidad", teoria: "Eufemismo para la muerte como acceso a la fama eterna.", ejemplo: "Pasó a la inmortalidad con su obra.", ejercicio: "¿Qué eufemismo relaciona la muerte con la gloria perpetua?", respuesta: "pasar a la inmortalidad" },
        { nombre: "Extinguirse", teoria: "Eufemismo para la muerte como desaparición gradual.", ejemplo: "La llama de su vida se extinguió.", ejercicio: "¿Qué eufemismo ve la muerte como un proceso de extinción?", respuesta: "extinguirse" },

        { nombre: "Despedirse de la vida", teoria: "Eufemismo para la muerte como un adiós.", ejemplo: "Se despidió de la vida con una sonrisa.", ejercicio: "¿Qué eufemismo expresa la muerte como una despedida?", respuesta: "despedirse de la vida" },
        { nombre: "Entrar en el descanso", teoria: "Eufemismo para la muerte como ingreso al reposo.", ejemplo: "Entró en el descanso eterno.", ejercicio: "¿Qué eufemismo asocia la muerte con el reposo final?", respuesta: "entrar en el descanso" },
        { nombre: "Ser llamado al cielo", teoria: "Eufemismo religioso para la muerte.", ejemplo: "Fue llamado al cielo en la madrugada.", ejercicio: "¿Qué eufemismo sugiere una convocatoria divina?", respuesta: "ser llamado al cielo" },
        { nombre: "Reunirse con sus ancestros", teoria: "Eufemismo para la muerte como reencuentro con antepasados.", ejemplo: "Se reunió con sus ancestros en el más allá.", ejercicio: "¿Qué eufemismo ve la muerte como un reencuentro familiar?", respuesta: "reunirse con sus ancestros" },

    ];
    narrativos.forEach((t, i) => TECNICAS.push({ id: i+1, bloque: 1, categoria: "narrativo", ...t }));

    // =================== BLOQUE 2: EUFEMISMOS METAFÓRICOS DESCRIPTIVOS (25) ===================
    const descriptivos = [
        { nombre: "Una dulce carga", teoria: "Eufemismo para la vejez o enfermedad como un peso amable.", ejemplo: "Llevaba su dulce carga con estoicismo.", ejercicio: "¿Qué eufemismo suaviza la vejez o enfermedad?", respuesta: "dulce carga" },

        { nombre: "Una transición", teoria: "Eufemismo para la muerte o cambio radical como un paso.", ejemplo: "Su transición fue serena.", ejercicio: "¿Qué eufemismo describe la muerte como un cambio?", respuesta: "transición" },
        { nombre: "El ocaso de la vida", teoria: "Eufemismo poético para la vejez como atardecer.", ejemplo: "Vivió plenamente el ocaso de su vida.", ejercicio: "¿Qué eufemismo asocia la vejez con el atardecer?", respuesta: "ocaso de la vida" },
        { nombre: "Un viaje sin regreso", teoria: "Eufemismo para la muerte como viaje definitivo.", ejemplo: "Emprendió un viaje sin regreso.", ejercicio: "¿Qué eufemismo describe la muerte como un viaje sin vuelta?", respuesta: "viaje sin regreso" },
        { nombre: "La cosecha", teoria: "Eufemismo para la muerte como recogida de frutos.", ejemplo: "Llegó su cosecha y partió.", ejercicio: "¿Qué eufemismo ve la muerte como una recolección?", respuesta: "cosecha" },
        { nombre: "Descansar en el jardín", teoria: "Eufemismo para la muerte como reposo en la naturaleza.", ejemplo: "Descansa en el jardín de los recuerdos.", ejercicio: "¿Qué eufemismo asocia la muerte con un lugar apacible?", respuesta: "descansar en el jardín" },
        { nombre: "La noche eterna", teoria: "Eufemismo para la muerte como oscuridad perpetua.", ejemplo: "Se sumió en la noche eterna.", ejercicio: "¿Qué eufemismo describe la muerte como noche sin fin?", respuesta: "noche eterna" },
        { nombre: "El sueño sin fin", teoria: "Eufemismo para la muerte como sueño perpetuo.", ejemplo: "Se entregó al sueño sin fin.", ejercicio: "¿Qué eufemismo ve la muerte como un sueño eterno?", respuesta: "sueño sin fin" },
        { nombre: "La partida", teoria: "Eufemismo para la muerte como salida.", ejemplo: "Su partida fue inesperada.", ejercicio: "¿Qué eufemismo describe la muerte como una partida?", respuesta: "partida" },
        { nombre: "El último adiós", teoria: "Eufemismo para la muerte como despedida final.", ejemplo: "Dio su último adiós al amanecer.", ejercicio: "¿Qué eufemismo asocia la muerte con una despedida?", respuesta: "último adiós" },
        { nombre: "La luz que se apaga", teoria: "Eufemismo para la muerte como fin de la vida.", ejemplo: "La luz se apagó lentamente.", ejercicio: "¿Qué eufemismo relaciona la muerte con el apagado de una luz?", respuesta: "luz que se apaga" },
        { nombre: "El silencio eterno", teoria: "Eufemismo para la muerte como ausencia de sonido.", ejemplo: "El silencio eterno lo envolvió.", ejercicio: "¿Qué eufemismo asocia la muerte con el silencio?", respuesta: "silencio eterno" },
        { nombre: "El vuelo hacia el infinito", teoria: "Eufemismo poético para la muerte como liberación.", ejemplo: "Alzó el vuelo hacia el infinito.", ejercicio: "¿Qué eufemismo ve la muerte como un vuelo?", respuesta: "vuelo hacia el infinito" },

    // =================== BLOQUE 4: EUFEMISMOS METAFÓRICOS EXPOSITIVOS (25) ===================
    const expositivos = [

        { nombre: "Reingeniería de procesos", teoria: "Eufemismo para cambios profundos en la organización.", ejemplo: "La reingeniería de procesos mejorará la eficiencia.", ejercicio: "¿Qué eufemismo sugiere una reforma estructural?", respuesta: "reingeniería de procesos" },

        { nombre: "Emprendimiento", teoria: "Eufemismo para autoempleo o iniciativa empresarial.", ejemplo: "El emprendimiento es clave para la economía.", ejercicio: "¿Qué eufemismo describe la iniciativa empresarial?", respuesta: "emprendimiento" },

        { nombre: "Reciclaje", teoria: "Eufemismo para reutilización de residuos.", ejemplo: "El reciclaje es una práctica necesaria.", ejercicio: "¿Qué eufemismo describe la reutilización?", respuesta: "reciclaje" },
        { nombre: "Eficiencia energética", teoria: "Eufemismo para ahorro de energía.", ejemplo: "La eficiencia energética reduce costos.", ejercicio: "¿Qué eufemismo describe el ahorro energético?", respuesta: "eficiencia energética" },
        { nombre: "Huella ecológica", teoria: "Eufemismo para impacto ambiental.", ejemplo: "Reducir la huella ecológica es prioritario.", ejercicio: "¿Qué eufemismo describe el impacto ambiental?", respuesta: "huella ecológica" },
        { nombre: "Capital humano", teoria: "Eufemismo para trabajadores cualificados.", ejemplo: "El capital humano es el activo más valioso.", ejercicio: "¿Qué eufemismo describe a los empleados cualificados?", respuesta: "capital humano" },
        { nombre: "Recursos humanos", teoria: "Eufemismo para el departamento de personal.", ejemplo: "El departamento de recursos humanos gestiona el talento.", ejercicio: "¿Qué eufemismo describe el área de personal?", respuesta: "recursos humanos" },
        { nombre: "Talento organizacional", teoria: "Eufemismo para el conjunto de habilidades de los empleados.", ejemplo: "El talento organizacional es clave.", ejercicio: "¿Qué eufemismo describe las competencias laborales?", respuesta: "talento organizacional" },

        { nombre: "Transformación digital", teoria: "Eufemismo para la adopción de tecnología digital.", ejemplo: "La transformación digital es inevitable.", ejercicio: "¿Qué eufemismo describe la digitalización?", respuesta: "transformación digital" },
        { nombre: "Inteligencia artificial", teoria: "Eufemismo para sistemas automatizados.", ejemplo: "La inteligencia artificial revoluciona la industria.", ejercicio: "¿Qué eufemismo describe los sistemas automatizados?", respuesta: "inteligencia artificial" },
        { nombre: "Big data", teoria: "Eufemismo para grandes volúmenes de datos.", ejemplo: "El big data permite análisis predictivos.", ejercicio: "¿Qué eufemismo describe grandes conjuntos de datos?", respuesta: "big data" },
        { nombre: "Cloud computing", teoria: "Eufemismo para servicios en la nube.", ejemplo: "El cloud computing facilita el acceso a datos.", ejercicio: "¿Qué eufemismo describe los servicios en la nube?", respuesta: "cloud computing" },
        { nombre: "Ciberseguridad", teoria: "Eufemismo para protección digital.", ejemplo: "La ciberseguridad es prioritaria.", ejercicio: "¿Qué eufemismo describe la protección en línea?", respuesta: "ciberseguridad" },
        { nombre: "Algoritmos", teoria: "Eufemismo para procesos matemáticos automatizados.", ejemplo: "Los algoritmos optimizan los resultados.", ejercicio: "¿Qué eufemismo describe procesos matemáticos automatizados?", respuesta: "algoritmos" },
    ];
    expositivos.forEach((t, i) => TECNICAS.push({ id: i+76, bloque: 4, categoria: "expositivo", ...t }));

    TECNICAS.sort((a,b) => a.id - b.id);

    // ========== RENDER ==========
    const blockNav = document.getElementById('blockNav');
    const cardsGrid = document.getElementById('cardsGrid');
    const quizContainer = document.getElementById('quizContainer');

    let currentBlock = 1;
    const BLOCK_NAMES = ['', 'Eufemismos narrativos', 'Eufemismos descriptivos', 'Eufemismos argumentativos', 'Eufemismos expositivos'];

    for (let i = 1; i <= 4; i++) {
        const btn = document.createElement('button');
        btn.textContent = `${i}. ${BLOCK_NAMES[i]}`;
        btn.dataset.block = i;
        btn.addEventListener('click', () => {
            currentBlock = i;
            renderCards(i);
            updateNav(i);
        });
        blockNav.appendChild(btn);
    }

    function updateNav(block) {
        document.querySelectorAll('.block-nav button').forEach(b => b.classList.toggle('active', parseInt(b.dataset.block) === block));
    }
    updateNav(1);

    window.verificarRespuesta = function(id) {
        const input = document.getElementById(`input-${id}`);
        const feedback = document.getElementById(`feedback-${id}`);
        const correcta = document.getElementById(`correcta-${id}`);
        if (!input || !feedback) return;
        const valor = input.value.trim().toLowerCase();
        const respuestaCorrecta = correcta ? correcta.textContent.toLowerCase() : '';
        if (valor === '' || valor === '...') {
            feedback.textContent = '✏️ Escribe tu respuesta primero.';
            feedback.className = 'feedback-msg';
            return;
        }
        const normalize = (s) => s.replace(/\s+/g, ' ').trim();
        const esCorrecto = normalize(valor) === normalize(respuestaCorrecta) ||
                           normalize(valor).includes(normalize(respuestaCorrecta)) ||
                           normalize(respuestaCorrecta).includes(normalize(valor));
        if (esCorrecto) {
            feedback.textContent = '✅ ¡Correcto! Bien hecho.';
            feedback.className = 'feedback-msg correcto';
        } else {
            feedback.textContent = `❌ Incorrecto. La respuesta correcta es: "${respuestaCorrecta}"`;
            feedback.className = 'feedback-msg incorrecto';
        }
    };

    function renderCards(block) {
        const filtered = TECNICAS.filter(t => t.bloque === block);
        cardsGrid.innerHTML = filtered.map((t, idx) => {
            return `
                <div class="card-flip" data-id="${t.id}" onclick="this.classList.toggle('flipped')">
                    <div class="card-flip-inner">
                        <div class="card-front">
                            <div class="numero">${t.id}</div>
                            <span class="categoria">${t.categoria}</span>
                            <h3>${t.nombre}</h3>
                            <div class="teoria">${t.teoria}</div>
                            <div class="girar-indicador">↻ tocar para practicar</div>
                        </div>
                        <div class="card-back">
                            <div style="font-weight:600;color:#1F4E5F;margin-bottom:0.2rem;">🌿 ${t.nombre}</div>
                            <div class="ejemplo"><strong>Ejemplo:</strong> ${t.ejemplo}</div>
                            <div class="ejercicio">✏️ ${t.ejercicio}</div>
                            <div class="respuesta-area">
                                <input type="text" id="input-${t.id}" placeholder="Escribe tu respuesta..." />
                                <button class="btn-verificar" onclick="verificarRespuesta(${t.id})">Comprobar</button>
                            </div>
                            <div id="feedback-${t.id}" class="feedback-msg"></div>
                            <div id="correcta-${t.id}" style="display:none;">${t.respuesta}</div>
                            <div class="respuesta-correcta">✓ ${t.respuesta}</div>
                            <div class="etiqueta">técnica #${t.id} · ${t.categoria}</div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ========== QUIZ ==========
    let quizQuestions = [];
    let currentQuizIndex = 0;
    let score = 0;
    let answered = false;

    function generateQuiz() {
        const shuffled = [...TECNICAS].sort(() => Math.random() - 0.5);
        quizQuestions = shuffled.slice(0, 10).map(t => {
            const opts = [t.respuesta];
            const others = TECNICAS.filter(x => x.id !== t.id);
            const shuffledOthers = others.sort(() => Math.random() - 0.5);
            for (let i = 0; i < 3; i++) {
                if (shuffledOthers[i]) opts.push(shuffledOthers[i].respuesta);
            }
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return {
                pregunta: `📌 ${t.ejercicio} (técnica: ${t.nombre})`,
                opciones: opts,
                correcta: t.respuesta,
                id: t.id
            };
        });
        currentQuizIndex = 0;
        score = 0;
        answered = false;
        renderQuiz();
    }

    function renderQuiz() {
        if (!quizQuestions.length) return;
        const q = quizQuestions[currentQuizIndex];
        const total = quizQuestions.length;
        let html = `
            <div class="quiz-pregunta">
                <p>${q.pregunta}</p>
                <div class="quiz-opciones" id="quizOptions">
        `;
        q.opciones.forEach((op, idx) => {
            html += `<button data-idx="${idx}" onclick="checkAnswer(${idx})">${op}</button>`;
        });
        html += `</div>
                <div id="quizFeedback" style="margin-top:0.8rem;"></div>
                <div class="quiz-result" id="quizScore">Puntuación: ${score}/${total}</div>
            </div>
            <div class="quiz-controles">
                <button id="nextQuizBtn" disabled>→ Siguiente</button>
                <button onclick="generateQuiz()">🔄 Nuevo cuestionario</button>
            </div>
        `;
        quizContainer.innerHTML = html;
        answered = false;
        document.getElementById('nextQuizBtn').disabled = true;
    }

    window.checkAnswer = function(idx) {
        if (answered) return;
        const q = quizQuestions[currentQuizIndex];
        const buttons = document.querySelectorAll('#quizOptions button');
        buttons.forEach((b, i) => {
            b.disabled = true;
            if (i === idx) {
                const esCorrecta = q.opciones[idx] === q.correcta;
                b.classList.add(esCorrecta ? 'correct' : 'incorrect');
                if (esCorrecta) score++;
            }
            if (q.opciones[i] === q.correcta) {
                buttons[i].classList.add('correct');
            }
        });
        answered = true;
        document.getElementById('nextQuizBtn').disabled = false;
        document.getElementById('quizScore').textContent = `Puntuación: ${score}/${quizQuestions.length}`;
        const fb = document.getElementById('quizFeedback');
        fb.innerHTML = `<span style="background:#1F4E5F;color:white;padding:0.2rem 1rem;border-radius:40px;">✅ Respuesta correcta: ${q.correcta}</span>`;
    };

    document.addEventListener('click', function(e) {
        if (e.target.id === 'nextQuizBtn') {
            if (currentQuizIndex < quizQuestions.length - 1) {
                currentQuizIndex++;
                renderQuiz();
            } else {
                alert(`¡Cuestionario finalizado! Puntuación: ${score}/${quizQuestions.length}`);
                document.getElementById('nextQuizBtn').disabled = true;
            }
        }
    });

    // Inicializar
    renderCards(1);
    generateQuiz();
</script>
