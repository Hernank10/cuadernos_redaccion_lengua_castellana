        }
    </style>
</head>

<div class="container" id="app">

<script>
    // ================================================================
    // 100 TÉCNICAS DE PERÍFRASIS DE CIENCIA FICCIÓN CON FIGURAS RETÓRICAS

    // combinada con una figura retórica específica.
    // Distribuidas en 4 bloques: Narrativo, Descriptivo, Argumentativo, Expositivo.
    // ================================================================
    const TECNICAS = [];

    // =================== BLOQUE 1: PERÍFRASIS NARRATIVA DE CIENCIA FICCIÓN (25) ===================
    const narrativos = [
        { nombre: "El viaje sin regreso", teoria: "Perífrasis narrativa para referirse a la muerte o a un viaje interestelar.", ejemplo: "Emprendió el viaje sin regreso hacia el agujero negro.", ejercicio: "¿Qué perífrasis narrativa describe un viaje definitivo?", respuesta: "el viaje sin regreso" },
        { nombre: "El lugar donde el tiempo se detiene", teoria: "Perífrasis para el horizonte de eventos de un agujero negro.", ejemplo: "La nave se acercó al lugar donde el tiempo se detiene.", ejercicio: "¿Qué perífrasis describe el horizonte de eventos?", respuesta: "el lugar donde el tiempo se detiene" },
        { nombre: "El eco de los que ya no están", teoria: "Perífrasis para la radiación de fondo cósmico de microondas.", ejemplo: "Los astronautas escuchaban el eco de los que ya no están.", ejercicio: "¿Qué perífrasis describe la radiación de fondo?", respuesta: "el eco de los que ya no están" },
        { nombre: "El jardín de las estrellas muertas", teoria: "Perífrasis para una nebulosa planetaria.", ejemplo: "La sonda exploró el jardín de las estrellas muertas.", ejercicio: "¿Qué perífrasis describe una nebulosa planetaria?", respuesta: "el jardín de las estrellas muertas" },
        { nombre: "La cuna de los mundos", teoria: "Perífrasis para una nebulosa de formación estelar.", ejemplo: "La cuna de los mundos albergaba nuevos soles.", ejercicio: "¿Qué perífrasis describe una nebulosa de formación estelar?", respuesta: "la cuna de los mundos" },
        { nombre: "El camino de los soles", teoria: "Perífrasis para la Vía Láctea.", ejemplo: "La nave viajó por el camino de los soles.", ejercicio: "¿Qué perífrasis describe la Vía Láctea?", respuesta: "el camino de los soles" },
        { nombre: "El océano de oscuridad", teoria: "Perífrasis para el espacio interestelar.", ejemplo: "La nave navegó por el océano de oscuridad.", ejercicio: "¿Qué perífrasis describe el espacio interestelar?", respuesta: "el océano de oscuridad" },
        { nombre: "El silencio que habla", teoria: "Perífrasis para la radiación cósmica.", ejemplo: "El silencio que habla llegó a la Tierra.", ejercicio: "¿Qué perífrasis describe una señal cósmica?", respuesta: "el silencio que habla" },
        { nombre: "La puerta de los sueños", teoria: "Perífrasis para un agujero de gusano.", ejemplo: "La puerta de los sueños se abrió frente a ellos.", ejercicio: "¿Qué perífrasis describe un agujero de gusano?", respuesta: "la puerta de los sueños" },
        { nombre: "El susurro del vacío", teoria: "Perífrasis para la energía oscura.", ejemplo: "El susurro del vacío expandía el universo.", ejercicio: "¿Qué perífrasis describe la energía oscura?", respuesta: "el susurro del vacío" },
        { nombre: "La memoria del tiempo", teoria: "Perífrasis para la relatividad del tiempo.", ejemplo: "La memoria del tiempo se dobla en el espacio.", ejercicio: "¿Qué perífrasis describe la relatividad?", respuesta: "la memoria del tiempo" },
        { nombre: "El laberinto de las galaxias", teoria: "Perífrasis para el universo observable.", ejemplo: "Navegaron por el laberinto de las galaxias.", ejercicio: "¿Qué perífrasis describe el universo observable?", respuesta: "el laberinto de las galaxias" },
        { nombre: "El abrazo de la gravedad", teoria: "Perífrasis para la atracción gravitacional.", ejemplo: "El abrazo de la gravedad los atrapó.", ejercicio: "¿Qué perífrasis describe la gravedad?", respuesta: "el abrazo de la gravedad" },
        { nombre: "El canto de las esferas", teoria: "Perífrasis para la música de las estrellas.", ejemplo: "El canto de las esferas guió su viaje.", ejercicio: "¿Qué perífrasis describe la música cósmica?", respuesta: "el canto de las esferas" },

        { nombre: "La telaraña de la red", teoria: "Perífrasis para Internet interplanetaria.", ejemplo: "La telaraña de la red conectaba colonias.", ejercicio: "¿Qué perífrasis describe la red interplanetaria?", respuesta: "la telaraña de la red" },

        { nombre: "El latido del universo", teoria: "Perífrasis para la radiación de fondo.", ejemplo: "El latido del universo es constante.", ejercicio: "¿Qué perífrasis describe el fondo cósmico?", respuesta: "el latido del universo" },
        { nombre: "La danza de los átomos", teoria: "Perífrasis para la física cuántica.", ejemplo: "La danza de los átomos crea la realidad.", ejercicio: "¿Qué perífrasis describe la física cuántica?", respuesta: "la danza de los átomos" },

    narrativos.forEach((t, i) => TECNICAS.push({ id: i+1, bloque: 1, categoria: "narrativo", ...t }));

    // =================== BLOQUE 2: PERÍFRASIS DESCRIPTIVA DE CIENCIA FICCIÓN (25) ===================

        { nombre: "El mar de estrellas", teoria: "Perífrasis descriptiva para el cielo estrellado.", ejemplo: "El mar de estrellas se extendía ante ellos.", ejercicio: "¿Qué perífrasis describe el cielo estrellado?", respuesta: "el mar de estrellas" },

        { nombre: "El río de fuego", teoria: "Perífrasis para un río de lava en un volcán.", ejemplo: "El río de fuego fluía por la montaña.", ejercicio: "¿Qué perífrasis describe un río de lava?", respuesta: "el río de fuego" },
        { nombre: "La montaña de sombras", teoria: "Perífrasis para un cráter en la luna.", ejemplo: "La montaña de sombras se alzaba en el horizonte.", ejercicio: "¿Qué perífrasis describe un cráter lunar?", respuesta: "la montaña de sombras" },
        { nombre: "El bosque de metal", teoria: "Perífrasis para una ciudad robótica.", ejemplo: "El bosque de metal era una urbe de robots.", ejercicio: "¿Qué perífrasis describe una ciudad robótica?", respuesta: "el bosque de metal" },
        { nombre: "El océano de nubes", teoria: "Perífrasis para Júpiter.", ejemplo: "El océano de nubes de Júpiter era imponente.", ejercicio: "¿Qué perífrasis describe Júpiter?", respuesta: "el océano de nubes" },
        { nombre: "El valle de la luz", teoria: "Perífrasis para un planeta iluminado por un quásar.", ejemplo: "El valle de la luz brillaba intensamente.", ejercicio: "¿Qué perífrasis describe un planeta iluminado?", respuesta: "el valle de la luz" },
        { nombre: "El templo de las estrellas", teoria: "Perífrasis para un observatorio espacial.", ejemplo: "El templo de las estrellas observaba el cosmos.", ejercicio: "¿Qué perífrasis describe un observatorio espacial?", respuesta: "el templo de las estrellas" },
        { nombre: "El abismo de hielo", teoria: "Perífrasis para un planeta congelado.", ejemplo: "El abismo de hielo era un mundo inhóspito.", ejercicio: "¿Qué perífrasis describe un planeta congelado?", respuesta: "el abismo de hielo" },
        { nombre: "El muro de fuego", teoria: "Perífrasis para una tormenta solar.", ejemplo: "El muro de fuego se acercaba a la nave.", ejercicio: "¿Qué perífrasis describe una tormenta solar?", respuesta: "el muro de fuego" },
        { nombre: "El jardín de luces", teoria: "Perífrasis para una ciudad alienígena.", ejemplo: "El jardín de luces era la capital alienígena.", ejercicio: "¿Qué perífrasis describe una ciudad alienígena?", respuesta: "el jardín de luces" },

    TECNICAS.sort((a,b) => a.id - b.id);

    // ========== RENDER ==========
    const blockNav = document.getElementById('blockNav');
    const cardsGrid = document.getElementById('cardsGrid');
    const quizContainer = document.getElementById('quizContainer');

    let currentBlock = 1;
    const BLOCK_NAMES = ['', 'Perífrasis narrativas', 'Perífrasis descriptivas', 'Perífrasis argumentativas', 'Perífrasis expositivas'];

    for (let i = 1; i <= 4; i++) {
        const btn = document.createElement('button');
        btn.textContent = `${i}. ${BLOCK_NAMES[i]}`;
        btn.dataset.block = i;
        btn.addEventListener('click', () => {
            currentBlock = i;
            renderCards(i);
            updateNav(i);
        });
        blockNav.appendChild(btn);
    }

    function updateNav(block) {
        document.querySelectorAll('.block-nav button').forEach(b => b.classList.toggle('active', parseInt(b.dataset.block) === block));
    }
    updateNav(1);

    window.verificarRespuesta = function(id) {
        const input = document.getElementById(`input-${id}`);
        const feedback = document.getElementById(`feedback-${id}`);
        const correcta = document.getElementById(`correcta-${id}`);
        if (!input || !feedback) return;
        const valor = input.value.trim().toLowerCase();
        const respuestaCorrecta = correcta ? correcta.textContent.toLowerCase() : '';
        if (valor === '' || valor === '...') {
            feedback.textContent = '✏️ Escribe tu respuesta primero.';
            feedback.className = 'feedback-msg';
            return;
        }
        const normalize = (s) => s.replace(/\s+/g, ' ').trim();
        const esCorrecto = normalize(valor) === normalize(respuestaCorrecta) ||
                           normalize(valor).includes(normalize(respuestaCorrecta)) ||
                           normalize(respuestaCorrecta).includes(normalize(valor));
        if (esCorrecto) {
            feedback.textContent = '✅ ¡Correcto! Bien hecho.';
            feedback.className = 'feedback-msg correcto';
        } else {
            feedback.textContent = `❌ Incorrecto. La respuesta correcta es: "${respuestaCorrecta}"`;
            feedback.className = 'feedback-msg incorrecto';
        }
    };

    function renderCards(block) {
        const filtered = TECNICAS.filter(t => t.bloque === block);
        cardsGrid.innerHTML = filtered.map((t, idx) => {
            return `
                <div class="card-flip" data-id="${t.id}" onclick="this.classList.toggle('flipped')">
                    <div class="card-flip-inner">
                        <div class="card-front">
                            <div class="numero">${t.id}</div>
                            <span class="categoria">${t.categoria}</span>
                            <h3>${t.nombre}</h3>
                            <div class="teoria">${t.teoria}</div>
                            <div class="girar-indicador">↻ tocar para practicar</div>
                        </div>
                        <div class="card-back">
                            <div style="font-weight:600;color:#8bc4e0;margin-bottom:0.2rem;">🌀 ${t.nombre}</div>
                            <div class="ejemplo"><strong>Ejemplo:</strong> ${t.ejemplo}</div>
                            <div class="ejercicio">✏️ ${t.ejercicio}</div>
                            <div class="respuesta-area">
                                <input type="text" id="input-${t.id}" placeholder="Escribe tu respuesta..." />
                                <button class="btn-verificar" onclick="verificarRespuesta(${t.id})">Comprobar</button>
                            </div>
                            <div id="feedback-${t.id}" class="feedback-msg"></div>
                            <div id="correcta-${t.id}" style="display:none;">${t.respuesta}</div>
                            <div class="respuesta-correcta">✓ ${t.respuesta}</div>
                            <div class="etiqueta">técnica #${t.id} · ${t.categoria}</div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ========== QUIZ ==========
    let quizQuestions = [];
    let currentQuizIndex = 0;
    let score = 0;
    let answered = false;

    function generateQuiz() {
        const shuffled = [...TECNICAS].sort(() => Math.random() - 0.5);
        quizQuestions = shuffled.slice(0, 10).map(t => {
            const opts = [t.respuesta];
            const others = TECNICAS.filter(x => x.id !== t.id);
            const shuffledOthers = others.sort(() => Math.random() - 0.5);
            for (let i = 0; i < 3; i++) {
                if (shuffledOthers[i]) opts.push(shuffledOthers[i].respuesta);
            }
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return {
                pregunta: `📌 ${t.ejercicio} (técnica: ${t.nombre})`,
                opciones: opts,
                correcta: t.respuesta,
                id: t.id
            };
        });
        currentQuizIndex = 0;
        score = 0;
        answered = false;
        renderQuiz();
    }

    function renderQuiz() {
        if (!quizQuestions.length) return;
        const q = quizQuestions[currentQuizIndex];
        const total = quizQuestions.length;
        let html = `
            <div class="quiz-pregunta">
                <p>${q.pregunta}</p>
                <div class="quiz-opciones" id="quizOptions">
        `;
        q.opciones.forEach((op, idx) => {
            html += `<button data-idx="${idx}" onclick="checkAnswer(${idx})">${op}</button>`;
        });
        html += `</div>
                <div id="quizFeedback" style="margin-top:0.8rem;"></div>
                <div class="quiz-result" id="quizScore">Puntuación: ${score}/${total}</div>
            </div>
            <div class="quiz-controles">
                <button id="nextQuizBtn" disabled>→ Siguiente</button>
                <button onclick="generateQuiz()">🔄 Nuevo cuestionario</button>
            </div>
        `;
        quizContainer.innerHTML = html;
        answered = false;
        document.getElementById('nextQuizBtn').disabled = true;
    }

    window.checkAnswer = function(idx) {
        if (answered) return;
        const q = quizQuestions[currentQuizIndex];
        const buttons = document.querySelectorAll('#quizOptions button');
        buttons.forEach((b, i) => {
            b.disabled = true;
            if (i === idx) {
                const esCorrecta = q.opciones[idx] === q.correcta;
                b.classList.add(esCorrecta ? 'correct' : 'incorrect');
                if (esCorrecta) score++;
            }
            if (q.opciones[i] === q.correcta) {
                buttons[i].classList.add('correct');
            }
        });
        answered = true;
        document.getElementById('nextQuizBtn').disabled = false;
        document.getElementById('quizScore').textContent = `Puntuación: ${score}/${quizQuestions.length}`;
        const fb = document.getElementById('quizFeedback');
        fb.innerHTML = `<span style="background:#2a5a7a;color:#e0f0ff;padding:0.2rem 1rem;border-radius:40px;">✅ Respuesta correcta: ${q.correcta}</span>`;
    };

    document.addEventListener('click', function(e) {
        if (e.target.id === 'nextQuizBtn') {
            if (currentQuizIndex < quizQuestions.length - 1) {
                currentQuizIndex++;
                renderQuiz();
            } else {
                alert(`¡Cuestionario finalizado! Puntuación: ${score}/${quizQuestions.length}`);
                document.getElementById('nextQuizBtn').disabled = true;
            }
        }
    });

    // Inicializar
    renderCards(1);
    generateQuiz();
</script>
