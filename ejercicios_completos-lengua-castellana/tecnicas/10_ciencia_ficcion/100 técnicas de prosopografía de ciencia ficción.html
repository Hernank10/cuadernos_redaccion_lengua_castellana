</head>

<div class="container" id="app">

<script>
    // ================================================================
    // 100 TÉCNICAS DE PROSOPOGRAFÍA DE CIENCIA FICCIÓN CON FIGURAS RETÓRICAS
    // Cada técnica combina una prosopografía (descripción física) con una figura retórica.
    // Distribuidas en 4 bloques: Narrativo, Descriptivo, Argumentativo, Expositivo.
    // ================================================================
    const TECNICAS = [];

    // =================== BLOQUE 1: PROSOPOGRAFÍA NARRATIVA DE CIENCIA FICCIÓN (25) ===================
    const narrativos = [
        { nombre: "El androide de acero", teoria: "Prosopografía narrativa: descripción de un androide con metáfora.", ejemplo: "Su cuerpo era de acero brillante, sus ojos de láser frío.", ejercicio: "¿Qué figura retórica describe un androide como de acero?", respuesta: "metáfora" },
        { nombre: "El alienígena de luz", teoria: "Prosopografía narrativa con símil.", ejemplo: "Su piel brillaba como la superficie de una estrella.", ejercicio: "¿Qué figura retórica usa 'como' en la descripción alienígena?", respuesta: "símil" },
        { nombre: "El robot de sombras", teoria: "Prosopografía narrativa con personificación.", ejemplo: "El robot caminaba con la elegancia de un bailarín.", ejercicio: "¿Qué figura retórica da cualidades humanas a un robot?", respuesta: "personificación" },
        { nombre: "El cyborg de fuego", teoria: "Prosopografía narrativa con hipérbole.", ejemplo: "Sus ojos ardían como dos soles.", ejercicio: "¿Qué figura retórica exagera la descripción de los ojos?", respuesta: "hipérbole" },
        { nombre: "El mutante de cristal", teoria: "Prosopografía narrativa con ironía.", ejemplo: "Qué frágil parecía el mutante de cristal.", ejercicio: "¿Qué figura retórica usa ironía en la descripción?", respuesta: "ironía" },
        { nombre: "El clon de hielo", teoria: "Prosopografía narrativa con litotes.", ejemplo: "No era un ser común, su piel era translúcida.", ejercicio: "¿Qué figura retórica niega lo contrario para describir?", respuesta: "litotes" },
        { nombre: "El viajero del tiempo", teoria: "Prosopografía narrativa con perífrasis.", ejemplo: "El que camina entre eras.", ejercicio: "¿Qué figura retórica usa un rodeo para describir?", respuesta: "perífrasis" },
        { nombre: "El extraterrestre de luz", teoria: "Prosopografía narrativa con antonomasia.", ejemplo: "El luminoso, así le llamaban.", ejercicio: "¿Qué figura retórica sustituye el nombre por una cualidad?", respuesta: "antonomasia" },
        { nombre: "El holograma de plata", teoria: "Prosopografía narrativa con alegoría.", ejemplo: "El holograma era un espejo de la memoria.", ejercicio: "¿Qué figura retórica es una metáfora extendida?", respuesta: "alegoría" },
        { nombre: "El cíborg de diamante", teoria: "Prosopografía narrativa con oxímoron.", ejemplo: "Fría y ardiente era su mirada de diamante.", ejercicio: "¿Qué figura retórica une opuestos en la descripción?", respuesta: "oxímoron" },
        { nombre: "El clon de hielo", teoria: "Prosopografía narrativa con paradoja.", ejemplo: "Vivía en la muerte, su cuerpo era un puente.", ejercicio: "¿Qué figura retórica es una contradicción verdadera?", respuesta: "paradoja" },
        { nombre: "El androide de estrellas", teoria: "Prosopografía narrativa con sinécdoque.", ejemplo: "Cien ojos de estrellas miraban.", ejercicio: "¿Qué figura retórica usa la parte por el todo?", respuesta: "sinécdoque" },
        { nombre: "El robot de energía", teoria: "Prosopografía narrativa con metonimia.", ejemplo: "El acero que piensa.", ejercicio: "¿Qué figura retórica usa una relación de contigüidad?", respuesta: "metonimia" },
        { nombre: "El viajero espacial", teoria: "Prosopografía narrativa con anáfora.", ejemplo: "Luz, luz, luz en su mirada.", ejercicio: "¿Qué figura retórica repite al inicio?", respuesta: "anáfora" },
        { nombre: "El mutante de fuego", teoria: "Prosopografía narrativa con epífora.", ejemplo: "...de fuego, ...de fuego.", ejercicio: "¿Qué figura retórica repite al final?", respuesta: "epífora" },
        { nombre: "El androide de sombras", teoria: "Prosopografía narrativa con quiasmo.", ejemplo: "Cuando la luz es sombra, la sombra es luz.", ejercicio: "¿Qué figura retórica cruza elementos?", respuesta: "quiasmo" },
        { nombre: "El cíborg de luz", teoria: "Prosopografía narrativa con gradación.", ejemplo: "Brillaba, resplandecía, ardía.", ejercicio: "¿Qué figura retórica usa progresión?", respuesta: "gradación" },
        { nombre: "El robot de fuego", teoria: "Prosopografía narrativa con clímax.", ejemplo: "Resistió, luchó, venció, ascendió.", ejercicio: "¿Qué figura retórica es una gradación ascendente?", respuesta: "clímax" },
        { nombre: "El alienígena de luz", teoria: "Prosopografía narrativa con apóstrofe.", ejemplo: "¡Oh, luz de las estrellas!", ejercicio: "¿Qué figura retórica se dirige a lo ausente?", respuesta: "apóstrofe" },
        { nombre: "El holograma de tiempo", teoria: "Prosopografía narrativa con interrogación retórica.", ejemplo: "¿Quién no ha soñado con ser luz?", ejercicio: "¿Qué figura retórica usa preguntas retóricas?", respuesta: "interrogación retórica" },
        { nombre: "El mutante de acero", teoria: "Prosopografía narrativa con exclamación.", ejemplo: "¡Qué poderosa es su mirada!", ejercicio: "¿Qué figura retórica usa exclamación?", respuesta: "exclamación" },
        { nombre: "El robot de luz", teoria: "Prosopografía narrativa con sarcasmo.", ejemplo: "Qué frágil es el robot de luz.", ejercicio: "¿Qué figura retórica usa sarcasmo?", respuesta: "sarcasmo" },
        { nombre: "El androide de sombras", teoria: "Prosopografía narrativa con antítesis.", ejemplo: "Luz y oscuridad en su rostro.", ejercicio: "¿Qué figura retórica contrapone ideas?", respuesta: "antítesis" },
        { nombre: "El clon de tiempo", teoria: "Prosopografía narrativa con epanadiplosis.", ejemplo: "Tiempo, eres tiempo.", ejercicio: "¿Qué figura retórica repite al inicio y al final?", respuesta: "epanadiplosis" },
        { nombre: "El viajero de estrellas", teoria: "Prosopografía narrativa con paralelismo.", ejemplo: "Caminar es soñar, soñar es caminar.", ejercicio: "¿Qué figura retórica usa estructuras paralelas?", respuesta: "paralelismo" },
    ];
    narrativos.forEach((t, i) => TECNICAS.push({ id: i+1, bloque: 1, categoria: "narrativo", ...t }));

    // =================== BLOQUE 2: PROSOPOGRAFÍA DESCRIPTIVA DE CIENCIA FICCIÓN (25) ===================
    const descriptivos = [
        { nombre: "Cuerpo de estrellas", teoria: "Prosopografía descriptiva con metáfora.", ejemplo: "Su cuerpo era un mapa de estrellas.", ejercicio: "¿Qué figura retórica describe un cuerpo como mapa estelar?", respuesta: "metáfora" },
        { nombre: "Ojos de galaxia", teoria: "Prosopografía descriptiva con símil.", ejemplo: "Sus ojos brillaban como galaxias lejanas.", ejercicio: "¿Qué figura retórica usa símil para describir ojos?", respuesta: "símil" },
        { nombre: "Piel de holograma", teoria: "Prosopografía descriptiva con personificación.", ejemplo: "Su piel bailaba con la luz.", ejercicio: "¿Qué figura retórica da vida a la piel?", respuesta: "personificación" },
        { nombre: "Cabello de luz", teoria: "Prosopografía descriptiva con hipérbole.", ejemplo: "Su cabello era un río de luz infinita.", ejercicio: "¿Qué figura retórica exagera la descripción del cabello?", respuesta: "hipérbole" },
        { nombre: "Manos de energía", teoria: "Prosopografía descriptiva con sinestesia.", ejemplo: "Sus manos emanaban un calor visual.", ejercicio: "¿Qué figura retórica mezcla sentidos?", respuesta: "sinestesia" },
        { nombre: "Rostro de cristal", teoria: "Prosopografía descriptiva con oxímoron.", ejemplo: "Su rostro era frágil y eterno.", ejercicio: "¿Qué figura retórica une opuestos en el rostro?", respuesta: "oxímoron" },
        { nombre: "Mirada de vacío", teoria: "Prosopografía descriptiva con paradoja.", ejemplo: "Su mirada contenía todo el vacío.", ejercicio: "¿Qué figura retórica es una contradicción descriptiva?", respuesta: "paradoja" },
        { nombre: "Sonrisa de acero", teoria: "Prosopografía descriptiva con litotes.", ejemplo: "No era una sonrisa común, era de acero.", ejercicio: "¿Qué figura retórica usa litotes para describir?", respuesta: "litotes" },
        { nombre: "Voz de susurro", teoria: "Prosopografía descriptiva con perífrasis.", ejemplo: "El eco de su voz era un susurro del vacío.", ejercicio: "¿Qué figura retórica usa un rodeo descriptivo?", respuesta: "perífrasis" },
        { nombre: "Forma de luz", teoria: "Prosopografía descriptiva con antonomasia.", ejemplo: "El luminoso, así era su forma.", ejercicio: "¿Qué figura retórica sustituye el nombre por cualidad?", respuesta: "antonomasia" },
        { nombre: "Cuerpo de ondas", teoria: "Prosopografía descriptiva con cromatismo.", ejemplo: "Su cuerpo cambiaba de color como un arco iris.", ejercicio: "¿Qué figura retórica usa colores en la descripción?", respuesta: "cromatismo" },
        { nombre: "Piel de metal", teoria: "Prosopografía descriptiva con epíteto.", ejemplo: "La fría piel de metal.", ejercicio: "¿Qué figura retórica usa adjetivos expresivos?", respuesta: "epíteto" },
        { nombre: "Ojos de fuego", teoria: "Prosopografía descriptiva con hipótiposis.", ejemplo: "Sus ojos ardían como si el fuego estuviera vivo.", ejercicio: "¿Qué figura retórica hace presente lo ausente?", respuesta: "hipótiposis" },
        { nombre: "Cabello de niebla", teoria: "Prosopografía descriptiva con diáfasis.", ejemplo: "Su cabello era como una niebla cósmica.", ejercicio: "¿Qué figura retórica describe por comparación?", respuesta: "diáfasis" },
        { nombre: "Manos de código", teoria: "Prosopografía descriptiva con iconografía.", ejemplo: "Sus manos eran la imagen del código binario.", ejercicio: "¿Qué figura retórica describe con imágenes simbólicas?", respuesta: "iconografía" },
        { nombre: "Rostro de pixel", teoria: "Prosopografía descriptiva con prosopografía.", ejemplo: "Su rostro era un mosaico de píxeles.", ejercicio: "¿Qué figura retórica describe el aspecto físico?", respuesta: "prosopografía" },
        { nombre: "Mirada de vacío", teoria: "Prosopografía descriptiva con etopeya.", ejemplo: "Su mirada reflejaba la soledad del cosmos.", ejercicio: "¿Qué figura retórica describe el carácter?", respuesta: "etopeya" },
        { nombre: "Sonrisa de luz", teoria: "Prosopografía descriptiva con retrato.", ejemplo: "Su sonrisa era luz y su mirada era paz.", ejercicio: "¿Qué figura retórica combina físico y moral?", respuesta: "retrato" },

    // =================== BLOQUE 3: PROSOPOGRAFÍA ARGUMENTATIVA DE CIENCIA FICCIÓN (25) ===================
    const argumentativos = [
        { nombre: "El ser de luz", teoria: "Prosopografía argumentativa con tesis.", ejemplo: "Su cuerpo de luz demuestra que la energía es vida.", ejercicio: "¿Qué figura retórica presenta una tesis en la descripción?", respuesta: "tesis" },
        { nombre: "El androide de razón", teoria: "Prosopografía argumentativa con argumento de autoridad.", ejemplo: "Como dijo el científico, su forma es la evolución.", ejercicio: "¿Qué figura retórica usa autoridad?", respuesta: "argumento de autoridad" },
        { nombre: "El mutante de evolución", teoria: "Prosopografía argumentativa con analogía.", ejemplo: "Su cuerpo es como la evolución misma.", ejercicio: "¿Qué figura retórica usa analogía?", respuesta: "analogía" },
        { nombre: "El cíborg de progreso", teoria: "Prosopografía argumentativa con ejemplificación.", ejemplo: "Como los cíborgs, su cuerpo es el futuro.", ejercicio: "¿Qué figura retórica usa ejemplos?", respuesta: "ejemplificación" },
        { nombre: "El robot de libertad", teoria: "Prosopografía argumentativa con contraargumento.", ejemplo: "No es esclavitud, es libertad robótica.", ejercicio: "¿Qué figura retórica refuta una idea?", respuesta: "contraargumento" },
        { nombre: "El clon de identidad", teoria: "Prosopografía argumentativa con concesión.", ejemplo: "Cierto, parece igual, pero su esencia es única.", ejercicio: "¿Qué figura retórica concede para contraargumentar?", respuesta: "concesión" },

        { nombre: "El clon de verdad", teoria: "Prosopografía argumentativa con silogismo.", ejemplo: "Si es clon, entonces es copia. Si es copia, no es original.", ejercicio: "¿Qué figura retórica usa razonamiento deductivo?", respuesta: "silogismo" },
        { nombre: "El androide de evolución", teoria: "Prosopografía argumentativa con inducción.", ejemplo: "Todos los androides evolucionan, luego este también.", ejercicio: "¿Qué figura retórica va de lo particular a lo general?", respuesta: "inducción" },

        { nombre: "El robot de luz", teoria: "Prosopografía argumentativa con antítesis.", ejemplo: "No es oscuridad, es luz.", ejercicio: "¿Qué figura retórica contrapone ideas?", respuesta: "antítesis" },
        { nombre: "El cíborg de tiempo", teoria: "Prosopografía argumentativa con paradoja.", ejemplo: "Su forma es la paradoja del tiempo.", ejercicio: "¿Qué figura retórica usa contradicción lógica?", respuesta: "paradoja" },
        { nombre: "El alienígena de verdad", teoria: "Prosopografía argumentativa con ironía.", ejemplo: "Qué verdad tan alienígena.", ejercicio: "¿Qué figura retórica usa ironía?", respuesta: "ironía" },
        { nombre: "El holograma de realidad", teoria: "Prosopografía argumentativa con sarcasmo.", ejemplo: "Qué real es el holograma.", ejercicio: "¿Qué figura retórica usa sarcasmo?", respuesta: "sarcasmo" },
        { nombre: "El robot de evolución", teoria: "Prosopografía argumentativa con disfemismo.", ejemplo: "El dolor es el martillo de su evolución.", ejercicio: "¿Qué figura retórica usa palabras fuertes?", respuesta: "disfemismo" },
        { nombre: "El mutante de paz", teoria: "Prosopografía argumentativa con eufemismo.", ejemplo: "Su forma es la paz del cosmos.", ejercicio: "¿Qué figura retórica usa suavidad?", respuesta: "eufemismo" },
    ];
    argumentativos.forEach((t, i) => TECNICAS.push({ id: i+51, bloque: 3, categoria: "argumentativo", ...t }));

    // =================== BLOQUE 4: PROSOPOGRAFÍA EXPOSITIVA DE CIENCIA FICCIÓN (25) ===================
    const expositivos = [
        { nombre: "Definición de androide", teoria: "Prosopografía expositiva con definición.", ejemplo: "Un androide es un ser con forma humana.", ejercicio: "¿Qué figura retórica define un concepto?", respuesta: "definición" },
        { nombre: "Clasificación de cíborgs", teoria: "Prosopografía expositiva con clasificación.", ejemplo: "Hay cíborgs de primera y segunda generación.", ejercicio: "¿Qué figura retórica clasifica elementos?", respuesta: "clasificación" },
        { nombre: "Comparación de formas", teoria: "Prosopografía expositiva con comparación.", ejemplo: "El clon es como un espejo del original.", ejercicio: "¿Qué figura retórica compara elementos?", respuesta: "comparación" },
        { nombre: "Causa de la mutación", teoria: "Prosopografía expositiva con causalidad.", ejemplo: "La radiación causó su forma mutante.", ejercicio: "¿Qué figura retórica explica causas?", respuesta: "causalidad" },
        { nombre: "Efecto de la evolución", teoria: "Prosopografía expositiva con efecto.", ejemplo: "La evolución dio forma a su cuerpo.", ejercicio: "¿Qué figura retórica explica efectos?", respuesta: "efecto" },
        { nombre: "Análisis del holograma", teoria: "Prosopografía expositiva con análisis.", ejemplo: "Su forma se descompone en píxeles.", ejercicio: "¿Qué figura retórica descompone en partes?", respuesta: "análisis" },
        { nombre: "Síntesis de la forma", teoria: "Prosopografía expositiva con síntesis.", ejemplo: "Su forma es la síntesis de la tecnología.", ejercicio: "¿Qué figura retórica integra ideas?", respuesta: "síntesis" },
        { nombre: "Ejemplo de robot", teoria: "Prosopografía expositiva con ejemplificación.", ejemplo: "Como el robot Atlas, su forma es ágil.", ejercicio: "¿Qué figura retórica usa ejemplos?", respuesta: "ejemplificación" },
        { nombre: "Paráfrasis de la descripción", teoria: "Prosopografía expositiva con paráfrasis.", ejemplo: "Es decir, su forma es la de un androide.", ejercicio: "¿Qué figura retórica reformula una idea?", respuesta: "paráfrasis" },
        { nombre: "Resumen de la forma", teoria: "Prosopografía expositiva con resumen.", ejemplo: "En resumen, su cuerpo es un mapa estelar.", ejercicio: "¿Qué figura retórica sintetiza?", respuesta: "resumen" },
        { nombre: "Glosa de la evolución", teoria: "Prosopografía expositiva con glosa.", ejemplo: "Cabe decir que su forma evoluciona.", ejercicio: "¿Qué figura retórica comenta un tema?", respuesta: "glosa" },
        { nombre: "Transición descriptiva", teoria: "Prosopografía expositiva con transición.", ejemplo: "Ahora, su forma es más compleja.", ejercicio: "¿Qué figura retórica conecta ideas?", respuesta: "transición" },
        { nombre: "Recapitulación de la forma", teoria: "Prosopografía expositiva con recapitulación.", ejemplo: "Retomando la forma, es de luz.", ejercicio: "¿Qué figura retórica recapitula?", respuesta: "recapitulación" },
        { nombre: "Conclusión sobre el robot", teoria: "Prosopografía expositiva con conclusión.", ejemplo: "Finalmente, su forma es el futuro.", ejercicio: "¿Qué figura retórica concluye?", respuesta: "conclusión" },
        { nombre: "Recomendación sobre cíborgs", teoria: "Prosopografía expositiva con recomendación.", ejemplo: "Te sugiero que estudies su forma.", ejercicio: "¿Qué figura retórica recomienda?", respuesta: "recomendación" },
        { nombre: "Advertencia sobre mutantes", teoria: "Prosopografía expositiva con advertencia.", ejemplo: "Cuida su forma, es frágil.", ejercicio: "¿Qué figura retórica advierte?", respuesta: "advertencia" },
        { nombre: "Corrección de la descripción", teoria: "Prosopografía expositiva con corrección.", ejemplo: "Más bien, su forma es holográfica.", ejercicio: "¿Qué figura retórica corrige?", respuesta: "corrección" },
        { nombre: "Hipótesis sobre alienígenas", teoria: "Prosopografía expositiva con hipótesis.", ejemplo: "Si su forma es de luz, entonces es energía.", ejercicio: "¿Qué figura retórica plantea hipótesis?", respuesta: "hipótesis" },
        { nombre: "Atenuación de la forma", teoria: "Prosopografía expositiva con atenuación.", ejemplo: "Quizás, su forma sea más simple.", ejercicio: "¿Qué figura retórica atenúa una idea?", respuesta: "atenuación" },
        { nombre: "Énfasis en la evolución", teoria: "Prosopografía expositiva con énfasis.", ejemplo: "Sin duda, su forma es evolutiva.", ejercicio: "¿Qué figura retórica enfatiza?", respuesta: "énfasis" },
        { nombre: "Generalización sobre robots", teoria: "Prosopografía expositiva con generalización.", ejemplo: "Todos los robots tienen forma humana.", ejercicio: "¿Qué figura retórica generaliza?", respuesta: "generalización" },
        { nombre: "Precisión de la descripción", teoria: "Prosopografía expositiva con precisión.", ejemplo: "Exactamente, su forma es de acero.", ejercicio: "¿Qué figura retórica precisa?", respuesta: "precisión" },
        { nombre: "Matización de la forma", teoria: "Prosopografía expositiva con matización.", ejemplo: "No obstante, su forma puede variar.", ejercicio: "¿Qué figura retórica matiza?", respuesta: "matización" },
        { nombre: "Conclusión positiva", teoria: "Prosopografía expositiva con conclusión positiva.", ejemplo: "Al final, su forma es bella.", ejercicio: "¿Qué figura retórica concluye con optimismo?", respuesta: "conclusión positiva" },
        { nombre: "Verdad universal de la forma", teoria: "Prosopografía expositiva con verdad universal.", ejemplo: "La forma es el espejo del ser.", ejercicio: "¿Qué figura retórica expresa una verdad eterna?", respuesta: "verdad universal" },
    ];
    expositivos.forEach((t, i) => TECNICAS.push({ id: i+76, bloque: 4, categoria: "expositivo", ...t }));

    TECNICAS.sort((a,b) => a.id - b.id);

    // ========== RENDER ==========
    const blockNav = document.getElementById('blockNav');
    const cardsGrid = document.getElementById('cardsGrid');
    const quizContainer = document.getElementById('quizContainer');

    let currentBlock = 1;
    const BLOCK_NAMES = ['', 'Prosopografía narrativas', 'Prosopografía descriptivas', 'Prosopografía argumentativas', 'Prosopografía expositivas'];

    for (let i = 1; i <= 4; i++) {
        const btn = document.createElement('button');
        btn.textContent = `${i}. ${BLOCK_NAMES[i]}`;
        btn.dataset.block = i;
        btn.addEventListener('click', () => {
            currentBlock = i;
            renderCards(i);
            updateNav(i);
        });
        blockNav.appendChild(btn);
    }

    function updateNav(block) {
        document.querySelectorAll('.block-nav button').forEach(b => b.classList.toggle('active', parseInt(b.dataset.block) === block));
    }
    updateNav(1);

    window.verificarRespuesta = function(id) {
        const input = document.getElementById(`input-${id}`);
        const feedback = document.getElementById(`feedback-${id}`);
        const correcta = document.getElementById(`correcta-${id}`);
        if (!input || !feedback) return;
        const valor = input.value.trim().toLowerCase();
        const respuestaCorrecta = correcta ? correcta.textContent.toLowerCase() : '';
        if (valor === '' || valor === '...') {
            feedback.textContent = '✏️ Escribe tu respuesta primero.';
            feedback.className = 'feedback-msg';
            return;
        }
        const normalize = (s) => s.replace(/\s+/g, ' ').trim();
        const esCorrecto = normalize(valor) === normalize(respuestaCorrecta) ||
                           normalize(valor).includes(normalize(respuestaCorrecta)) ||
                           normalize(respuestaCorrecta).includes(normalize(valor));
        if (esCorrecto) {
            feedback.textContent = '✅ ¡Correcto! Bien hecho.';
            feedback.className = 'feedback-msg correcto';
        } else {
            feedback.textContent = `❌ Incorrecto. La respuesta correcta es: "${respuestaCorrecta}"`;
            feedback.className = 'feedback-msg incorrecto';
        }
    };

    function renderCards(block) {
        const filtered = TECNICAS.filter(t => t.bloque === block);
        cardsGrid.innerHTML = filtered.map((t, idx) => {
            return `
                <div class="card-flip" data-id="${t.id}" onclick="this.classList.toggle('flipped')">
                    <div class="card-flip-inner">
                        <div class="card-front">
                            <div class="numero">${t.id}</div>
                            <span class="categoria">${t.categoria}</span>
                            <h3>${t.nombre}</h3>
                            <div class="teoria">${t.teoria}</div>
                            <div class="girar-indicador">↻ tocar para practicar</div>
                        </div>
                        <div class="card-back">
                            <div style="font-weight:600;color:#8bc4e0;margin-bottom:0.2rem;">👽 ${t.nombre}</div>
                            <div class="ejemplo"><strong>Ejemplo:</strong> ${t.ejemplo}</div>
                            <div class="ejercicio">✏️ ${t.ejercicio}</div>
                            <div class="respuesta-area">
                                <input type="text" id="input-${t.id}" placeholder="Escribe tu respuesta..." />
                                <button class="btn-verificar" onclick="verificarRespuesta(${t.id})">Comprobar</button>
                            </div>
                            <div id="feedback-${t.id}" class="feedback-msg"></div>
                            <div id="correcta-${t.id}" style="display:none;">${t.respuesta}</div>
                            <div class="respuesta-correcta">✓ ${t.respuesta}</div>
                            <div class="etiqueta">técnica #${t.id} · ${t.categoria}</div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ========== QUIZ ==========
    let quizQuestions = [];
    let currentQuizIndex = 0;
    let score = 0;
    let answered = false;

    function generateQuiz() {
        const shuffled = [...TECNICAS].sort(() => Math.random() - 0.5);
        quizQuestions = shuffled.slice(0, 10).map(t => {
            const opts = [t.respuesta];
            const others = TECNICAS.filter(x => x.id !== t.id);
            const shuffledOthers = others.sort(() => Math.random() - 0.5);
            for (let i = 0; i < 3; i++) {
                if (shuffledOthers[i]) opts.push(shuffledOthers[i].respuesta);
            }
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return {
                pregunta: `📌 ${t.ejercicio} (técnica: ${t.nombre})`,
                opciones: opts,
                correcta: t.respuesta,
                id: t.id
            };
        });
        currentQuizIndex = 0;
        score = 0;
        answered = false;
        renderQuiz();
    }

    function renderQuiz() {
        if (!quizQuestions.length) return;
        const q = quizQuestions[currentQuizIndex];
        const total = quizQuestions.length;
        let html = `
            <div class="quiz-pregunta">
                <p>${q.pregunta}</p>
                <div class="quiz-opciones" id="quizOptions">
        `;
        q.opciones.forEach((op, idx) => {
            html += `<button data-idx="${idx}" onclick="checkAnswer(${idx})">${op}</button>`;
        });
        html += `</div>
                <div id="quizFeedback" style="margin-top:0.8rem;"></div>
                <div class="quiz-result" id="quizScore">Puntuación: ${score}/${total}</div>
            </div>
            <div class="quiz-controles">
                <button id="nextQuizBtn" disabled>→ Siguiente</button>
                <button onclick="generateQuiz()">🔄 Nuevo cuestionario</button>
            </div>
        `;
        quizContainer.innerHTML = html;
        answered = false;
        document.getElementById('nextQuizBtn').disabled = true;
    }

    window.checkAnswer = function(idx) {
        if (answered) return;
        const q = quizQuestions[currentQuizIndex];
        const buttons = document.querySelectorAll('#quizOptions button');
        buttons.forEach((b, i) => {
            b.disabled = true;
            if (i === idx) {
                const esCorrecta = q.opciones[idx] === q.correcta;
                b.classList.add(esCorrecta ? 'correct' : 'incorrect');
                if (esCorrecta) score++;
            }
            if (q.opciones[i] === q.correcta) {
                buttons[i].classList.add('correct');
            }
        });
        answered = true;
        document.getElementById('nextQuizBtn').disabled = false;
        document.getElementById('quizScore').textContent = `Puntuación: ${score}/${quizQuestions.length}`;
        const fb = document.getElementById('quizFeedback');
        fb.innerHTML = `<span style="background:#2a5a7a;color:#e0f0ff;padding:0.2rem 1rem;border-radius:40px;">✅ Respuesta correcta: ${q.correcta}</span>`;
    };

    document.addEventListener('click', function(e) {
        if (e.target.id === 'nextQuizBtn') {
            if (currentQuizIndex < quizQuestions.length - 1) {
                currentQuizIndex++;
                renderQuiz();
            } else {
                alert(`¡Cuestionario finalizado! Puntuación: ${score}/${quizQuestions.length}`);
                document.getElementById('nextQuizBtn').disabled = true;
            }
        }
    });

    // Inicializar
    renderCards(1);
    generateQuiz();
</script>
</body>
</html>
