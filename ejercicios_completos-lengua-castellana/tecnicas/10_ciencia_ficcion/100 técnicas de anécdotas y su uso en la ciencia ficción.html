<script>
    // ================================================================
    // 100 TÉCNICAS DE ANÉCDOTAS DE CIENCIA FICCIÓN CON FIGURAS RETÓRICAS
    // Cada técnica combina una anécdota (relato breve con enseñanza) con una figura retórica.
    // Distribuidas en 4 bloques: Narrativo, Descriptivo, Argumentativo, Expositivo.
    // ================================================================
    const TECNICAS = [];

    // =================== BLOQUE 1: ANÉCDOTAS NARRATIVAS DE CIENCIA FICCIÓN (25) ===================
    const narrativos = [
        { nombre: "El viaje del aprendiz", teoria: "Anécdota narrativa: un aprendiz viaja al espacio.", ejemplo: "Un joven aprendiz viajó al espacio y descubrió que el verdadero tesoro era el conocimiento.", ejercicio: "¿Qué anécdota narrativa enseña que el conocimiento es el verdadero tesoro?", respuesta: "el viaje del aprendiz" },
        { nombre: "La última nave", teoria: "Anécdota narrativa: la última nave de la humanidad.", ejemplo: "La última nave partió hacia un nuevo mundo, llevando la esperanza de la humanidad.", ejercicio: "¿Qué anécdota narrativa habla de la última esperanza de la humanidad?", respuesta: "la última nave" },
        { nombre: "El primer contacto", teoria: "Anécdota narrativa: el primer encuentro con alienígenas.", ejemplo: "El primer contacto fue un momento de silencio, donde dos mundos se observaron.", ejercicio: "¿Qué anécdota narrativa describe el primer contacto alienígena?", respuesta: "el primer contacto" },
        { nombre: "El robot que soñó", teoria: "Anécdota narrativa: un robot que soñaba con ser humano.", ejemplo: "El robot soñó que era humano, y al despertar, entendió el significado de la vida.", ejercicio: "¿Qué anécdota narrativa explora los sueños de un robot?", respuesta: "el robot que soñó" },
        { nombre: "El viaje del tiempo", teoria: "Anécdota narrativa: un viajero del tiempo.", ejemplo: "Un viajero del tiempo regresó para advertir a la humanidad, pero nadie lo creyó.", ejercicio: "¿Qué anécdota narrativa habla de una advertencia del futuro?", respuesta: "el viaje del tiempo" },
        { nombre: "El planeta olvidado", teoria: "Anécdota narrativa: un planeta abandonado.", ejemplo: "En un planeta olvidado, una civilización dormía bajo el polvo estelar.", ejercicio: "¿Qué anécdota narrativa describe un planeta abandonado?", respuesta: "el planeta olvidado" },
        { nombre: "El mensaje de la estrella", teoria: "Anécdota narrativa: un mensaje de una estrella distante.", ejemplo: "El mensaje de la estrella decía: 'estamos solos en el universo' y la humanidad lloró.", ejercicio: "¿Qué anécdota narrativa habla de un mensaje estelar?", respuesta: "el mensaje de la estrella" },
        { nombre: "El hijo del astronauta", teoria: "Anécdota narrativa: un astronauta y su hijo.", ejemplo: "El astronauta prometió a su hijo regresar de las estrellas, y cumplió su promesa.", ejercicio: "¿Qué anécdota narrativa habla de una promesa entre padre e hijo?", respuesta: "el hijo del astronauta" },
        { nombre: "El cíborg y la flor", teoria: "Anécdota narrativa: un cíborg que cuida una flor.", ejemplo: "Un cíborg cuidó una flor en Marte, y aprendió el significado de la vida.", ejercicio: "¿Qué anécdota narrativa explora la humanidad a través de una flor?", respuesta: "el cíborg y la flor" },
        { nombre: "El eco del pasado", teoria: "Anécdota narrativa: un eco de una civilización antigua.", ejemplo: "El eco del pasado resonó en la nave, recordando a la tripulación su origen.", ejercicio: "¿Qué anécdota narrativa habla del eco de una civilización?", respuesta: "el eco del pasado" },
        { nombre: "La última esperanza", teoria: "Anécdota narrativa: la última esperanza de la humanidad.", ejemplo: "La última esperanza de la humanidad era una pequeña nave hacia una nueva estrella.", ejercicio: "¿Qué anécdota narrativa describe la última esperanza?", respuesta: "la última esperanza" },
        { nombre: "El robot y el niño", teoria: "Anécdota narrativa: un robot y un niño jugando.", ejemplo: "Un robot y un niño jugaron juntos, y el robot aprendió a reír.", ejercicio: "¿Qué anécdota narrativa explora la amistad entre robot y humano?", respuesta: "el robot y el niño" },
        { nombre: "El libro del espacio", teoria: "Anécdota narrativa: un libro que contiene todos los secretos del cosmos.", ejemplo: "El libro del espacio fue abierto, y la humanidad encontró la respuesta a sus preguntas.", ejercicio: "¿Qué anécdota narrativa habla de un libro cósmico?", respuesta: "el libro del espacio" },
        { nombre: "El viaje de la sonda", teoria: "Anécdota narrativa: una sonda que viaja más allá del sistema solar.", ejemplo: "La sonda viajó más allá del sistema solar y envió imágenes de un nuevo mundo.", ejercicio: "¿Qué anécdota narrativa describe el viaje de una sonda?", respuesta: "el viaje de la sonda" },
        { nombre: "El secreto del asteroide", teoria: "Anécdota narrativa: un asteroide que oculta un secreto.", ejemplo: "El asteroide ocultaba un secreto que cambiaría el destino de la humanidad.", ejercicio: "¿Qué anécdota narrativa habla de un secreto oculto en el espacio?", respuesta: "el secreto del asteroide" },
        { nombre: "La última estrella", teoria: "Anécdota narrativa: la última estrella del universo.", ejemplo: "La última estrella brilló en el fin del tiempo, y la humanidad la observó en silencio.", ejercicio: "¿Qué anécdota narrativa describe el fin de las estrellas?", respuesta: "la última estrella" },
        { nombre: "El viaje del androide", teoria: "Anécdota narrativa: un androide que busca su origen.", ejemplo: "Un androide buscó su origen en el cosmos y encontró la respuesta en una estrella.", ejercicio: "¿Qué anécdota narrativa explora la búsqueda de identidad?", respuesta: "el viaje del androide" },
        { nombre: "El vuelo del cometa", teoria: "Anécdota narrativa: el vuelo de un cometa.", ejemplo: "El cometa viajó por el sistema solar y la humanidad lo observó maravillada.", ejercicio: "¿Qué anécdota narrativa describe el vuelo de un cometa?", respuesta: "el vuelo del cometa" },
        { nombre: "El rey de las estrellas", teoria: "Anécdota narrativa: un hombre que se proclamó rey de las estrellas.", ejemplo: "El hombre se proclamó rey de las estrellas, pero el cosmos le recordó su pequeñez.", ejercicio: "¿Qué anécdota narrativa habla de la arrogancia humana?", respuesta: "el rey de las estrellas" },
        { nombre: "El jardín del espacio", teoria: "Anécdota narrativa: un jardín flotante en el espacio.", ejemplo: "Un jardín flotante en el espacio floreció con la luz de una estrella.", ejercicio: "¿Qué anécdota narrativa describe un jardín espacial?", respuesta: "el jardín del espacio" },

        { nombre: "El viaje de la luz", teoria: "Anécdota narrativa: el viaje de la luz a través del cosmos.", ejemplo: "La luz viajó millones de años para llegar a la Tierra, contando la historia del universo.", ejercicio: "¿Qué anécdota narrativa describe el viaje de la luz?", respuesta: "el viaje de la luz" },
        { nombre: "El reloj del tiempo", teoria: "Anécdota narrativa: un reloj que mide el tiempo del universo.", ejemplo: "El reloj del universo marcaba el tiempo, y la humanidad supo que el tiempo era eterno.", ejercicio: "¿Qué anécdota narrativa habla del tiempo eterno?", respuesta: "el reloj del tiempo" },
        { nombre: "El sueño del astronauta", teoria: "Anécdota narrativa: el sueño de un astronauta.", ejemplo: "El astronauta soñó que volaba entre las estrellas, y al despertar, supo que era su destino.", ejercicio: "¿Qué anécdota narrativa explora el sueño de volar?", respuesta: "el sueño del astronauta" },
        { nombre: "El eco de la Tierra", teoria: "Anécdota narrativa: el eco de la Tierra en el espacio.", ejemplo: "El eco de la Tierra resonó en el espacio, recordando a la humanidad su hogar.", ejercicio: "¿Qué anécdota narrativa habla del eco de la Tierra?", respuesta: "el eco de la Tierra" },
    ];
    narrativos.forEach((t, i) => TECNICAS.push({ id: i+1, bloque: 1, categoria: "narrativo", ...t }));

    // =================== BLOQUE 2: ANÉCDOTAS DESCRIPTIVAS DE CIENCIA FICCIÓN (25) ===================
    const descriptivos = [
        { nombre: "El lago de mercurio", teoria: "Anécdota descriptiva: un lago de mercurio en el espacio.", ejemplo: "El lago de mercurio reflejaba la luz de la estrella, creando un espejo cósmico.", ejercicio: "¿Qué anécdota descriptiva describe un lago de mercurio?", respuesta: "el lago de mercurio" },
        { nombre: "La montaña de hielo", teoria: "Anécdota descriptiva: una montaña de hielo en un planeta distante.", ejemplo: "La montaña de hielo era más alta que las nubes, y brillaba bajo la luz de la estrella.", ejercicio: "¿Qué anécdota descriptiva describe una montaña de hielo?", respuesta: "la montaña de hielo" },
        { nombre: "El desierto de cristal", teoria: "Anécdota descriptiva: un desierto de cristal en el espacio.", ejemplo: "El desierto de cristal era un mar de espejos que reflejaban el cosmos.", ejercicio: "¿Qué anécdota descriptiva describe un desierto de cristal?", respuesta: "el desierto de cristal" },
        { nombre: "El río de lava", teoria: "Anécdota descriptiva: un río de lava en un volcán espacial.", ejemplo: "El río de lava fluía como una serpiente de fuego hacia el horizonte.", ejercicio: "¿Qué anécdota descriptiva describe un río de lava?", respuesta: "el río de lava" },
        { nombre: "El bosque de metal", teoria: "Anécdota descriptiva: un bosque de árboles metálicos.", ejemplo: "El bosque de metal se alzaba en la llanura, con hojas de acero que reflejaban la luz.", ejercicio: "¿Qué anécdota descriptiva describe un bosque de metal?", respuesta: "el bosque de metal" },
        { nombre: "El océano de nubes", teoria: "Anécdota descriptiva: un océano de nubes en Júpiter.", ejemplo: "El océano de nubes se extendía sin fin, como un mar de algodón.", ejercicio: "¿Qué anécdota descriptiva describe un océano de nubes?", respuesta: "el océano de nubes" },

    window.verificarRespuesta = function(id) {
        const input = document.getElementById(`input-${id}`);
        const feedback = document.getElementById(`feedback-${id}`);
        const correcta = document.getElementById(`correcta-${id}`);
        if (!input || !feedback) return;
        const valor = input.value.trim().toLowerCase();
        const respuestaCorrecta = correcta ? correcta.textContent.toLowerCase() : '';
        if (valor === '' || valor === '...') {
            feedback.textContent = '✏️ Escribe tu respuesta primero.';
            feedback.className = 'feedback-msg';
            return;
        }
        const normalize = (s) => s.replace(/\s+/g, ' ').trim();
        const esCorrecto = normalize(valor) === normalize(respuestaCorrecta) ||
                           normalize(valor).includes(normalize(respuestaCorrecta)) ||
                           normalize(respuestaCorrecta).includes(normalize(valor));
        if (esCorrecto) {
            feedback.textContent = '✅ ¡Correcto! Bien hecho.';
            feedback.className = 'feedback-msg correcto';
        } else {
            feedback.textContent = `❌ Incorrecto. La respuesta correcta es: "${respuestaCorrecta}"`;
            feedback.className = 'feedback-msg incorrecto';
        }
    };

            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return {
                pregunta: `📌 ${t.ejercicio} (técnica: ${t.nombre})`,
                opciones: opts,
                correcta: t.respuesta,
                id: t.id
            };
        });
        currentQuizIndex = 0;
        score = 0;
        answered = false;
        renderQuiz();
    }

    function renderQuiz() {
        if (!quizQuestions.length) return;
        const q = quizQuestions[currentQuizIndex];
        const total = quizQuestions.length;
        let html = `
            <div class="quiz-pregunta">
                <p>${q.pregunta}</p>
                <div class="quiz-opciones" id="quizOptions">
        `;
        q.opciones.forEach((op, idx) => {
            html += `<button data-idx="${idx}" onclick="checkAnswer(${idx})">${op}</button>`;
        });
        html += `</div>
                <div id="quizFeedback" style="margin-top:0.8rem;"></div>
                <div class="quiz-result" id="quizScore">Puntuación: ${score}/${total}</div>
            </div>
            <div class="quiz-controles">
                <button id="nextQuizBtn" disabled>→ Siguiente</button>
                <button onclick="generateQuiz()">🔄 Nuevo cuestionario</button>
            </div>
        `;
        quizContainer.innerHTML = html;
        answered = false;
        document.getElementById('nextQuizBtn').disabled = true;
    }

    window.checkAnswer = function(idx) {
        if (answered) return;
        const q = quizQuestions[currentQuizIndex];
        const buttons = document.querySelectorAll('#quizOptions button');
        buttons.forEach((b, i) => {
            b.disabled = true;
            if (i === idx) {
                const esCorrecta = q.opciones[idx] === q.correcta;
                b.classList.add(esCorrecta ? 'correct' : 'incorrect');
                if (esCorrecta) score++;
            }
            if (q.opciones[i] === q.correcta) {
                buttons[i].classList.add('correct');
            }
        });
        answered = true;
        document.getElementById('nextQuizBtn').disabled = false;
        document.getElementById('quizScore').textContent = `Puntuación: ${score}/${quizQuestions.length}`;
        const fb = document.getElementById('quizFeedback');
        fb.innerHTML = `<span style="background:#2a5a7a;color:#e0f0ff;padding:0.2rem 1rem;border-radius:40px;">✅ Respuesta correcta: ${q.correcta}</span>`;
    };

    document.addEventListener('click', function(e) {
        if (e.target.id === 'nextQuizBtn') {
            if (currentQuizIndex < quizQuestions.length - 1) {
                currentQuizIndex++;
                renderQuiz();
            } else {
                alert(`¡Cuestionario finalizado! Puntuación: ${score}/${quizQuestions.length}`);
                document.getElementById('nextQuizBtn').disabled = true;
            }
        }
    });

    // Inicializar
    renderCards(1);
    generateQuiz();
</script>
</body>
</html>
