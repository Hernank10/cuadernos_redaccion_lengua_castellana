        }
    </style>
</head>

<div class="container" id="app">
    <div class="header">
        <h1>🌀 Paradojas de ciencia ficción <span>100 técnicas</span></h1>

    <div class="quiz-section" id="quizSection">
        <h2>🧠 Cuestionario <small>paradojas de ciencia ficción con figuras retóricas</small></h2>

<script>
    // ================================================================
    // 100 TÉCNICAS DE PARADOJAS DE CIENCIA FICCIÓN CON FIGURAS RETÓRICAS
    // Cada técnica combina una paradoja (cibernética, temporal, existencial, etc.)
    // con una figura retórica específica.
    // Distribuidas en 4 bloques: Narrativo, Descriptivo, Argumentativo, Expositivo.
    // ================================================================
    const TECNICAS = [];

    // =================== BLOQUE 1: PARADOJAS NARRATIVAS DE CIENCIA FICCIÓN (25) ===================
    const narrativos = [
        { nombre: "Paradoja del abuelo", teoria: "Viajar al pasado y matar a tu abuelo te impide nacer.", ejemplo: "Si matas a tu abuelo, ¿quién viajó al pasado?", ejercicio: "¿Qué paradoja temporal cuestiona la causalidad?", respuesta: "paradoja del abuelo" },
        { nombre: "Paradoja de Fermi", teoria: "Si hay tantas civilizaciones, ¿dónde están?", ejemplo: "El silencio cósmico es la respuesta.", ejercicio: "¿Qué paradoja cuestiona la ausencia de extraterrestres?", respuesta: "paradoja de Fermi" },
        { nombre: "Paradoja del observador", teoria: "La observación afecta la realidad observada.", ejemplo: "El experimento de la doble rendija.", ejercicio: "¿Qué paradoja une conciencia y realidad?", respuesta: "paradoja del observador" },
        { nombre: "Paradoja de la información", teoria: "La información no puede destruirse, solo transformarse.", ejemplo: "Los agujeros negros liberan radiación Hawking.", ejercicio: "¿Qué paradoja afirma que la información es eterna?", respuesta: "paradoja de la información" },
        { nombre: "Paradoja de la nave nodriza", teoria: "Una nave viaja a través del espacio sin tripulación.", ejemplo: "La nave sigue su rumbo aunque no haya nadie.", ejercicio: "¿Qué paradoja habla de naves autónomas?", respuesta: "paradoja de la nave nodriza" },
        { nombre: "Paradoja de la clonación", teoria: "Si clonas a alguien, ¿quién es el original?", ejemplo: "El clon y el original son idénticos.", ejercicio: "¿Qué paradoja cuestiona la identidad en la clonación?", respuesta: "paradoja de la clonación" },
        { nombre: "Paradoja de la simulación", teoria: "Si vivimos en una simulación, ¿quién la controla?", ejemplo: "La realidad podría ser un programa.", ejercicio: "¿Qué paradoja plantea que el universo es una simulación?", respuesta: "paradoja de la simulación" },
        { nombre: "Paradoja del teletransporte", teoria: "Si te desintegras y te reensamblas, ¿sigues siendo tú?", ejemplo: "El teletransporte plantea la continuidad del yo.", ejercicio: "¿Qué paradoja cuestiona la identidad en el teletransporte?", respuesta: "paradoja del teletransporte" },
        { nombre: "Paradoja de la inmortalidad", teoria: "Si eres inmortal, ¿cómo experimentas el tiempo?", ejemplo: "La eternidad es un instante infinito.", ejercicio: "¿Qué paradoja explora la percepción del tiempo eterno?", respuesta: "paradoja de la inmortalidad" },
        { nombre: "Paradoja del primer contacto", teoria: "Si hacemos contacto, ¿cómo comunicarnos?", ejemplo: "El lenguaje universal es la matemática.", ejercicio: "¿Qué paradoja aborda la comunicación con alienígenas?", respuesta: "paradoja del primer contacto" },
        { nombre: "Paradoja del robot autoconsciente", teoria: "Un robot que sabe que es un robot, ¿es libre?", ejemplo: "¿Puede un ser artificial tener libre albedrío?", ejercicio: "¿Qué paradoja explora la conciencia robótica?", respuesta: "paradoja del robot autoconsciente" },
        { nombre: "Paradoja del viaje a la Tierra", teoria: "Si viajas a la Tierra futura, ¿encuentras tu pasado?", ejemplo: "El viaje interestelar altera la percepción temporal.", ejercicio: "¿Qué paradoja combina viaje espacial y temporal?", respuesta: "paradoja del viaje a la Tierra" },
        { nombre: "Paradoja del oasis en el espacio", teoria: "Si hay un oasis en el espacio, ¿quién lo creó?", ejemplo: "Una estructura alienígena en el vacío.", ejercicio: "¿Qué paradoja cuestiona el origen de estructuras cósmicas?", respuesta: "paradoja del oasis en el espacio" },
        { nombre: "Paradoja de la humanidad eterna", teoria: "Si la humanidad nunca se extingue, ¿qué ocurre con el universo?", ejemplo: "La supervivencia eterna desafía la termodinámica.", ejercicio: "¿Qué paradoja explora la supervivencia eterna?", respuesta: "paradoja de la humanidad eterna" },
        { nombre: "Paradoja de la mente colectiva", teoria: "Todas las mentes conectadas, ¿pierden individualidad?", ejemplo: "La colmena de conciencias.", ejercicio: "¿Qué paradoja aborda la pérdida de identidad en una mente colectiva?", respuesta: "paradoja de la mente colectiva" },
        { nombre: "Paradoja del tiempo circular", teoria: "El tiempo es un bucle sin principio ni fin.", ejemplo: "Todo se repite eternamente.", ejercicio: "¿Qué paradoja plantea un tiempo cíclico?", respuesta: "paradoja del tiempo circular" },
        { nombre: "Paradoja del origen extraterrestre", teoria: "Si venimos de otro mundo, ¿por qué no lo recordamos?", ejemplo: "La memoria genética borrada.", ejercicio: "¿Qué paradoja cuestiona el origen alienígena humano?", respuesta: "paradoja del origen extraterrestre" },
        { nombre: "Paradoja del universo holográfico", teoria: "El universo es un holograma, la realidad es ilusión.", ejemplo: "La información del universo está en su borde.", ejercicio: "¿Qué paradoja sugiere que la realidad es 2D?", respuesta: "paradoja del universo holográfico" },
        { nombre: "Paradoja del fin de la historia", teoria: "Si sabemos el final, ¿cómo vivir el presente?", ejemplo: "Conocer el futuro anula la libertad.", ejercicio: "¿Qué paradoja explora el determinismo y el libre albedrío?", respuesta: "paradoja del fin de la historia" },
        { nombre: "Paradoja de la máquina de Dios", teoria: "Una máquina que puede hacer cualquier cosa, ¿puede crear una roca que no pueda levantar?", ejemplo: "La omnipotencia es contradictoria.", ejercicio: "¿Qué paradoja clásica se aplica a la tecnología?", respuesta: "paradoja de la máquina de Dios" },
        { nombre: "Paradoja del multiverso", teoria: "Si hay infinitos universos, todo existe en algún lugar.", ejemplo: "Hay un universo para cada decisión.", ejercicio: "¿Qué paradoja plantea la existencia de infinitas realidades?", respuesta: "paradoja del multiverso" },
        { nombre: "Paradoja del lenguaje alienígena", teoria: "Si no podemos traducir, ¿cómo sabemos que piensan?", ejemplo: "El lenguaje es la clave de la conciencia.", ejercicio: "¿Qué paradoja explora la comunicación con inteligencias no humanas?", respuesta: "paradoja del lenguaje alienígena" },
        { nombre: "Paradoja de la velocidad de la luz", teoria: "Si nada supera la luz, ¿cómo viajamos a las estrellas?", ejemplo: "El tiempo se detiene a esa velocidad.", ejercicio: "¿Qué paradoja explora los límites de la velocidad?", respuesta: "paradoja de la velocidad de la luz" },
        { nombre: "Paradoja del robot que sueña", teoria: "Si un robot sueña, ¿tiene inconsciencia?", ejemplo: "Los sueños como simulaciones internas.", ejercicio: "¿Qué paradoja explora la conciencia en robots?", respuesta: "paradoja del robot que sueña" },
        { nombre: "Paradoja del universo finito", teoria: "Si el universo tiene límite, ¿qué hay más allá?", ejemplo: "El vacío infinito detrás del límite.", ejercicio: "¿Qué paradoja explora los límites del cosmos?", respuesta: "paradoja del universo finito" },
    ];
    narrativos.forEach((t, i) => TECNICAS.push({ id: i+1, bloque: 1, categoria: "narrativo", ...t }));

    // =================== BLOQUE 2: PARADOJAS DESCRIPTIVAS DE CIENCIA FICCIÓN (25) ===================
    const descriptivos = [
        { nombre: "Paradoja del paisaje digital", teoria: "Describir un mundo virtual como si fuera real.", ejemplo: "El cielo de neón de una ciudad simulada.", ejercicio: "¿Qué figura retórica describe lo digital como físico?", respuesta: "paradoja del paisaje digital" },
        { nombre: "Paradoja de la luz negra", teoria: "Describir una luz que oscurece en lugar de iluminar.", ejemplo: "El resplandor de la oscuridad.", ejercicio: "¿Qué figura retórica usa oxímoron para describir lo imposible?", respuesta: "paradoja de la luz negra" },
        { nombre: "Paradoja del silencio cósmico", teoria: "Describir el silencio del espacio como un sonido.", ejemplo: "El grito silencioso del vacío.", ejercicio: "¿Qué figura retórica usa sinestesia para describir el cosmos?", respuesta: "paradoja del silencio cósmico" },
        { nombre: "Paradoja del tiempo congelado", teoria: "Describir un instante que dura para siempre.", ejemplo: "El eterno parpadeo de una estrella.", ejercicio: "¿Qué figura retórica describe un tiempo detenido?", respuesta: "paradoja del tiempo congelado" },
        { nombre: "Paradoja de la memoria perdida", teoria: "Describir un recuerdo que nunca existió.", ejemplo: "La nostalgia de un pasado ficticio.", ejercicio: "¿Qué figura retórica describe un recuerdo falso?", respuesta: "paradoja de la memoria perdida" },
        { nombre: "Paradoja del espacio curvo", teoria: "Describir un espacio que se dobla sobre sí mismo.", ejemplo: "El bucle infinito del corredor.", ejercicio: "¿Qué figura retórica describe un espacio no euclidiano?", respuesta: "paradoja del espacio curvo" },
        { nombre: "Paradoja de la materia oscura", teoria: "Describir algo que existe pero no se ve.", ejemplo: "La sombra de la materia invisible.", ejercicio: "¿Qué figura retórica describe lo que no se puede ver?", respuesta: "paradoja de la materia oscura" },
        { nombre: "Paradoja de la energía pura", teoria: "Describir energía como una sustancia sólida.", ejemplo: "La luz cristalizada en el vacío.", ejercicio: "¿Qué figura retórica describe lo inmaterial como tangible?", respuesta: "paradoja de la energía pura" },
        { nombre: "Paradoja de la conciencia expandida", teoria: "Describir la mente como un universo.", ejemplo: "El cosmos interior de la conciencia.", ejercicio: "¿Qué figura retórica describe la mente como un espacio?", respuesta: "paradoja de la conciencia expandida" },
        { nombre: "Paradoja del espejo infinito", teoria: "Describir reflejos que no terminan.", ejemplo: "La mirada que se pierde en sí misma.", ejercicio: "¿Qué figura retórica describe la reflexión infinita?", respuesta: "paradoja del espejo infinito" },

    window.verificarRespuesta = function(id) {
        const input = document.getElementById(`input-${id}`);
        const feedback = document.getElementById(`feedback-${id}`);
        const correcta = document.getElementById(`correcta-${id}`);
        if (!input || !feedback) return;
        const valor = input.value.trim().toLowerCase();
        const respuestaCorrecta = correcta ? correcta.textContent.toLowerCase() : '';
        if (valor === '' || valor === '...') {
            feedback.textContent = '✏️ Escribe tu respuesta primero.';
            feedback.className = 'feedback-msg';
            return;
        }
        const normalize = (s) => s.replace(/\s+/g, ' ').trim();
        const esCorrecto = normalize(valor) === normalize(respuestaCorrecta) ||
                           normalize(valor).includes(normalize(respuestaCorrecta)) ||
                           normalize(respuestaCorrecta).includes(normalize(valor));
        if (esCorrecto) {
            feedback.textContent = '✅ ¡Correcto! Bien hecho.';
            feedback.className = 'feedback-msg correcto';
        } else {
            feedback.textContent = `❌ Incorrecto. La respuesta correcta es: "${respuestaCorrecta}"`;
            feedback.className = 'feedback-msg incorrecto';
        }
    };

    let quizQuestions = [];

    let score = 0;
    let answered = false;

    function generateQuiz() {
        const shuffled = [...TECNICAS].sort(() => Math.random() - 0.5);
        quizQuestions = shuffled.slice(0, 10).map(t => {
            const opts = [t.respuesta];
            const others = TECNICAS.filter(x => x.id !== t.id);
            const shuffledOthers = others.sort(() => Math.random() - 0.5);
            for (let i = 0; i < 3; i++) {
                if (shuffledOthers[i]) opts.push(shuffledOthers[i].respuesta);
            }
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return {
                pregunta: `📌 ${t.ejercicio} (técnica: ${t.nombre})`,
                opciones: opts,
                correcta: t.respuesta,
                id: t.id
            };
        });
        currentQuizIndex = 0;
        score = 0;
        answered = false;
        renderQuiz();
    }

    function renderQuiz() {
        if (!quizQuestions.length) return;
        const q = quizQuestions[currentQuizIndex];
        const total = quizQuestions.length;
        let html = `
            <div class="quiz-pregunta">
                <p>${q.pregunta}</p>
                <div class="quiz-opciones" id="quizOptions">
        `;
        q.opciones.forEach((op, idx) => {
            html += `<button data-idx="${idx}" onclick="checkAnswer(${idx})">${op}</button>`;
        });
        html += `</div>
                <div id="quizFeedback" style="margin-top:0.8rem;"></div>
                <div class="quiz-result" id="quizScore">Puntuación: ${score}/${total}</div>
            </div>
            <div class="quiz-controles">
                <button id="nextQuizBtn" disabled>→ Siguiente</button>
                <button onclick="generateQuiz()">🔄 Nuevo cuestionario</button>
            </div>
        `;
        quizContainer.innerHTML = html;
        answered = false;
        document.getElementById('nextQuizBtn').disabled = true;
    }

    window.checkAnswer = function(idx) {
        if (answered) return;
        const q = quizQuestions[currentQuizIndex];
        const buttons = document.querySelectorAll('#quizOptions button');
        buttons.forEach((b, i) => {
            b.disabled = true;
            if (i === idx) {
                const esCorrecta = q.opciones[idx] === q.correcta;
                b.classList.add(esCorrecta ? 'correct' : 'incorrect');
                if (esCorrecta) score++;
            }
            if (q.opciones[i] === q.correcta) {
                buttons[i].classList.add('correct');
            }
        });
        answered = true;
        document.getElementById('nextQuizBtn').disabled = false;
        document.getElementById('quizScore').textContent = `Puntuación: ${score}/${quizQuestions.length}`;
        const fb = document.getElementById('quizFeedback');
        fb.innerHTML = `<span style="background:#2a5a7a;color:#e0f0ff;padding:0.2rem 1rem;border-radius:40px;">✅ Respuesta correcta: ${q.correcta}</span>`;
    };

    document.addEventListener('click', function(e) {
        if (e.target.id === 'nextQuizBtn') {
            if (currentQuizIndex < quizQuestions.length - 1) {
                currentQuizIndex++;
                renderQuiz();
            } else {
                alert(`¡Cuestionario finalizado! Puntuación: ${score}/${quizQuestions.length}`);
                document.getElementById('nextQuizBtn').disabled = true;
            }
        }
    });

    // Inicializar
    renderCards(1);
    generateQuiz();
</script>
</body>
</html>
