<script>
    // ================================================================
    // 100 TÉCNICAS DE METONIMIA DE CIENCIA FICCIÓN CON FIGURAS RETÓRICAS
    // Cada técnica combina una metonimia (relación de contigüidad: causa-efecto,
    // continente-contenido, autor-obra, etc.) con una figura retórica específica.
    // Distribuidas en 4 bloques: Narrativo, Descriptivo, Argumentativo, Expositivo.
    // ================================================================
    const TECNICAS = [];

    // =================== BLOQUE 1: METONIMIAS NARRATIVAS DE CIENCIA FICCIÓN (25) ===================
    const narrativos = [
        { nombre: "El acero que construye", teoria: "Metonimia narrativa (la materia por el objeto) con metáfora.", ejemplo: "El acero construyó la nave (los trabajadores).", ejercicio: "¿Qué metonimia usa el material por el objeto?", respuesta: "acero que construye" },
        { nombre: "La luz del saber", teoria: "Metonimia narrativa (la causa por el efecto) con símil.", ejemplo: "La luz del saber brilló como el sol (el conocimiento).", ejercicio: "¿Qué metonimia usa la causa por el efecto?", respuesta: "luz del saber" },
        { nombre: "El arma de la paz", teoria: "Metonimia narrativa (el instrumento por el usuario) con personificación.", ejemplo: "El arma de la paz susurraba esperanza (el diplomático).", ejercicio: "¿Qué metonimia usa el instrumento por el usuario?", respuesta: "arma de la paz" },
        { nombre: "La corona del imperio", teoria: "Metonimia narrativa (el símbolo por la autoridad) con hipérbole.", ejemplo: "La corona del imperio era más poderosa que las estrellas.", ejercicio: "¿Qué metonimia usa el símbolo por la autoridad?", respuesta: "corona del imperio" },
        { nombre: "El manto de la noche", teoria: "Metonimia narrativa (el continente por el contenido) con ironía.", ejemplo: "Qué manto tan oscuro el de la noche.", ejercicio: "¿Qué metonimia usa el continente por el contenido?", respuesta: "manto de la noche" },
        { nombre: "El eco del tiempo", teoria: "Metonimia narrativa (el efecto por la causa) con litotes.", ejemplo: "No era un eco cualquiera, era el tiempo.", ejercicio: "¿Qué metonimia usa el efecto por la causa?", respuesta: "eco del tiempo" },
        { nombre: "La pluma del escritor", teoria: "Metonimia narrativa (el instrumento por el creador) con perífrasis.", ejemplo: "La pluma que escribió el futuro (el escritor).", ejercicio: "¿Qué metonimia usa el instrumento por el creador?", respuesta: "pluma del escritor" },
        { nombre: "El trono del emperador", teoria: "Metonimia narrativa (el lugar por la autoridad) con antonomasia.", ejemplo: "El trono, así llamaban al poder.", ejercicio: "¿Qué metonimia usa el lugar por la autoridad?", respuesta: "trono del emperador" },
        { nombre: "El escudo de la verdad", teoria: "Metonimia narrativa (el objeto por la cualidad) con alegoría.", ejemplo: "El escudo de la verdad era la defensa del cosmos.", ejercicio: "¿Qué metonimia usa el objeto por la cualidad?", respuesta: "escudo de la verdad" },
        { nombre: "El fuego de la pasión", teoria: "Metonimia narrativa (la causa por el efecto) con oxímoron.", ejemplo: "El fuego frío de la pasión.", ejercicio: "¿Qué metonimia usa la causa por el efecto con oxímoron?", respuesta: "fuego de la pasión" },
        { nombre: "La sombra del poder", teoria: "Metonimia narrativa (el efecto por la causa) con paradoja.", ejemplo: "La sombra del poder era la luz de la libertad.", ejercicio: "¿Qué metonimia usa el efecto por la causa con paradoja?", respuesta: "sombra del poder" },
        { nombre: "El latido del universo", teoria: "Metonimia narrativa (la parte por el todo) con sinécdoque.", ejemplo: "El latido del universo era su corazón (la vida).", ejercicio: "¿Qué metonimia usa la parte por el todo?", respuesta: "latido del universo" },
        { nombre: "El aliento de la IA", teoria: "Metonimia narrativa (el efecto por la causa) con metonimia.", ejemplo: "El aliento de la IA era su código (el programa).", ejercicio: "¿Qué metonimia usa el efecto por la causa?", respuesta: "aliento de la IA" },

        { nombre: "La piel del tiempo", teoria: "Metonimia narrativa (el continente por el contenido) con epífora.", ejemplo: "...del tiempo, ...del tiempo, ...del tiempo.", ejercicio: "¿Qué metonimia usa el continente por el contenido con epífora?", respuesta: "piel del tiempo" },
        { nombre: "El pulso del vacío", teoria: "Metonimia narrativa (el efecto por la causa) con quiasmo.", ejemplo: "Cuando el vacío es pulso, el pulso es vacío.", ejercicio: "¿Qué metonimia usa el efecto por la causa con quiasmo?", respuesta: "pulso del vacío" },
        { nombre: "El grito del mutante", teoria: "Metonimia narrativa (el efecto por la causa) con gradación.", ejemplo: "El grito, el rugido, el alarido del mutante.", ejercicio: "¿Qué metonimia usa el efecto por la causa con gradación?", respuesta: "grito del mutante" },
        { nombre: "El suspiro del robot", teoria: "Metonimia narrativa (el efecto por la causa) con clímax.", ejemplo: "Suspiró, gimió, gritó, calló.", ejercicio: "¿Qué metonimia usa el efecto por la causa con clímax?", respuesta: "suspiro del robot" },
        { nombre: "El eco de la señal", teoria: "Metonimia narrativa (el efecto por la causa) con apóstrofe.", ejemplo: "¡Oh, señal, habla!", ejercicio: "¿Qué metonimia usa el efecto por la causa con apóstrofe?", respuesta: "eco de la señal" },
        { nombre: "El enigma de la sombra", teoria: "Metonimia narrativa (el efecto por la causa) con interrogación retórica.", ejemplo: "¿Quién no ha temido a la sombra?", ejercicio: "¿Qué metonimia usa el efecto por la causa con interrogación?", respuesta: "enigma de la sombra" },
        { nombre: "El fulgor de la estrella", teoria: "Metonimia narrativa (la causa por el efecto) con exclamación.", ejemplo: "¡Qué fulgor tan eterno!", ejercicio: "¿Qué metonimia usa la causa por el efecto con exclamación?", respuesta: "fulgor de la estrella" },

        { nombre: "El ciclo de la vida", teoria: "Metonimia narrativa (el efecto por la causa) con epanadiplosis.", ejemplo: "Vida, eres vida.", ejercicio: "¿Qué metonimia usa el efecto por la causa con epanadiplosis?", respuesta: "ciclo de la vida" },

    narrativos.forEach((t, i) => TECNICAS.push({ id: i+1, bloque: 1, categoria: "narrativo", ...t }));

    // =================== BLOQUE 2: METONIMIAS DESCRIPTIVAS DE CIENCIA FICCIÓN (25) ===================

        { nombre: "El manto de la noche", teoria: "Metonimia descriptiva (el continente por el contenido) con hipérbole.", ejemplo: "El manto de la noche era más oscuro que el abismo.", ejercicio: "¿Qué metonimia usa el continente por el contenido con hipérbole?", respuesta: "manto de la noche" },
        { nombre: "El eco del tiempo", teoria: "Metonimia descriptiva (el efecto por la causa) con sinestesia.", ejemplo: "El eco del tiempo tenía un olor a eternidad.", ejercicio: "¿Qué metonimia usa el efecto por la causa con sinestesia?", respuesta: "eco del tiempo" },
        { nombre: "El latido del cosmos", teoria: "Metonimia descriptiva (la parte por el todo) con oxímoron.", ejemplo: "El latido frío del cosmos.", ejercicio: "¿Qué metonimia usa la parte por el todo con oxímoron?", respuesta: "latido del cosmos" },
        { nombre: "La sombra del poder", teoria: "Metonimia descriptiva (el efecto por la causa) con paradoja.", ejemplo: "La sombra del poder era eterna y efímera.", ejercicio: "¿Qué metonimia usa el efecto por la causa con paradoja?", respuesta: "sombra del poder" },
        { nombre: "El aliento de la IA", teoria: "Metonimia descriptiva (el efecto por la causa) con litotes.", ejemplo: "No era un aliento cualquiera, era el de la IA.", ejercicio: "¿Qué metonimia usa el efecto por la causa con litotes?", respuesta: "aliento de la IA" },
        { nombre: "El rostro de la galaxia", teoria: "Metonimia descriptiva (la parte por el todo) con perífrasis.", ejemplo: "El rostro de la galaxia, el espejo del cosmos.", ejercicio: "¿Qué metonimia usa la parte por el todo con perífrasis?", respuesta: "rostro de la galaxia" },

    window.verificarRespuesta = function(id) {
        const input = document.getElementById(`input-${id}`);
        const feedback = document.getElementById(`feedback-${id}`);
        const correcta = document.getElementById(`correcta-${id}`);
        if (!input || !feedback) return;
        const valor = input.value.trim().toLowerCase();
        const respuestaCorrecta = correcta ? correcta.textContent.toLowerCase() : '';
        if (valor === '' || valor === '...') {
            feedback.textContent = '✏️ Escribe tu respuesta primero.';
            feedback.className = 'feedback-msg';
            return;
        }
        const normalize = (s) => s.replace(/\s+/g, ' ').trim();
        const esCorrecto = normalize(valor) === normalize(respuestaCorrecta) ||
                           normalize(valor).includes(normalize(respuestaCorrecta)) ||
                           normalize(respuestaCorrecta).includes(normalize(valor));
        if (esCorrecto) {
            feedback.textContent = '✅ ¡Correcto! Bien hecho.';
            feedback.className = 'feedback-msg correcto';
        } else {
            feedback.textContent = `❌ Incorrecto. La respuesta correcta es: "${respuestaCorrecta}"`;
            feedback.className = 'feedback-msg incorrecto';
        }
    };

    let quizQuestions = [];

    function generateQuiz() {
        const shuffled = [...TECNICAS].sort(() => Math.random() - 0.5);
        quizQuestions = shuffled.slice(0, 10).map(t => {
            const opts = [t.respuesta];
            const others = TECNICAS.filter(x => x.id !== t.id);
            const shuffledOthers = others.sort(() => Math.random() - 0.5);
            for (let i = 0; i < 3; i++) {
                if (shuffledOthers[i]) opts.push(shuffledOthers[i].respuesta);
            }
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return {
                pregunta: `📌 ${t.ejercicio} (técnica: ${t.nombre})`,
                opciones: opts,
                correcta: t.respuesta,
                id: t.id
            };
        });
        currentQuizIndex = 0;
        score = 0;
        answered = false;
        renderQuiz();
    }

        if (!quizQuestions.length) return;

                <p>${q.pregunta}</p>
                <div class="quiz-opciones" id="quizOptions">

        q.opciones.forEach((op, idx) => {
            html += `<button data-idx="${idx}" onclick="checkAnswer(${idx})">${op}</button>`;
        });
        html += `</div>

        const buttons = document.querySelectorAll('#quizOptions button');
        buttons.forEach((b, i) => {
            b.disabled = true;
            if (i === idx) {
                const esCorrecta = q.opciones[idx] === q.correcta;
                b.classList.add(esCorrecta ? 'correct' : 'incorrect');
                if (esCorrecta) score++;
            }
            if (q.opciones[i] === q.correcta) {
                buttons[i].classList.add('correct');
            }
        });
        answered = true;
        document.getElementById('nextQuizBtn').disabled = false;
        document.getElementById('quizScore').textContent = `Puntuación: ${score}/${quizQuestions.length}`;
        const fb = document.getElementById('quizFeedback');
        fb.innerHTML = `<span style="background:#2a5a7a;color:#e0f0ff;padding:0.2rem 1rem;border-radius:40px;">✅ Respuesta correcta: ${q.correcta}</span>`;
    };

    document.addEventListener('click', function(e) {
        if (e.target.id === 'nextQuizBtn') {
            if (currentQuizIndex < quizQuestions.length - 1) {
                currentQuizIndex++;
                renderQuiz();
            } else {
                alert(`¡Cuestionario finalizado! Puntuación: ${score}/${quizQuestions.length}`);
                document.getElementById('nextQuizBtn').disabled = true;
            }
        }
    });

    // Inicializar
    renderCards(1);
    generateQuiz();
</script>
</body>
</html>
