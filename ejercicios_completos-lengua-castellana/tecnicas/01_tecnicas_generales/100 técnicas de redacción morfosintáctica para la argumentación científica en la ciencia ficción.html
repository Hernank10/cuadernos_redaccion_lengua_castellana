        { nombre: "Argumento consecuente", definicion: "Deduce consecuencias lógicas.", sintaxis: "Si [A] entonces [B]; [A] ocurre; luego [B] ocurre", estructura: "Estructura: [Condición] [Hecho] [Consecuencia].", ejemplo: "Si la nave pierde combustible, la misión se aborta; la nave perdió combustible; luego la misión se aborta.", ejercicio: "¿Qué tipo de argumento deduce consecuencias?", respuesta: "argumento consecuente" },
        { nombre: "Argumento condicional", definicion: "Usa una condición para argumentar.", sintaxis: "Si [A] entonces [B]; no [B]; luego no [A]", estructura: "Estructura: [Condición] [Negación] [Conclusión].", ejemplo: "Si el planeta tiene vida, entonces tiene agua; no tiene agua; luego no tiene vida.", ejercicio: "¿Qué tipo de argumento usa una condición?", respuesta: "argumento condicional" },
        { nombre: "Argumento disyuntivo", definicion: "Usa una disyunción (o).", sintaxis: "[A] o [B]; no [A]; luego [B]", estructura: "Estructura: [Disyunción] [Negación] [Conclusión].", ejemplo: "El asteroide es rocoso o metálico; no es rocoso; luego es metálico.", ejercicio: "¿Qué tipo de argumento usa una disyunción?", respuesta: "argumento disyuntivo" },
        { nombre: "Argumento de exclusión", definicion: "Excluye opciones para llegar a una conclusión.", sintaxis: "[A] o [B] o [C]; no [A]; no [B]; luego [C]", estructura: "Estructura: [Opciones] [Exclusiones] [Conclusión].", ejemplo: "El planeta es rocoso, gaseoso o helado; no es rocoso; no es gaseoso; luego es helado.", ejercicio: "¿Qué tipo de argumento excluye opciones?", respuesta: "argumento de exclusión" },
        { nombre: "Argumento de inclusión", definicion: "Incluye elementos para llegar a una conclusión.", sintaxis: "[A] incluye [B]; [B] incluye [C]; luego [A] incluye [C]", estructura: "Estructura: [Inclusión 1] [Inclusión 2] [Conclusión].", ejemplo: "El sistema solar incluye planetas; los planetas incluyen lunas; luego el sistema solar incluye lunas.", ejercicio: "¿Qué tipo de argumento usa inclusión?", respuesta: "argumento de inclusión" },
        { nombre: "Argumento de transitividad", definicion: "Usa transitividad para argumentar.", sintaxis: "Si [A] implica [B]; y [B] implica [C]; luego [A] implica [C]", estructura: "Estructura: [Implicación 1] [Implicación 2] [Conclusión].", ejemplo: "Si hay agua, hay vida; si hay vida, hay inteligencia; luego si hay agua, hay inteligencia.", ejercicio: "¿Qué tipo de argumento usa transitividad?", respuesta: "argumento de transitividad" },
        { nombre: "Argumento de identidad", definicion: "Usa identidad para argumentar.", sintaxis: "[A] es idéntico a [B]; [B] es [C]; luego [A] es [C]", estructura: "Estructura: [Identidad] [Atributo] [Conclusión].", ejemplo: "El robot es idéntico a su clon; el clon tiene conciencia; luego el robot tiene conciencia.", ejercicio: "¿Qué tipo de argumento usa identidad?", respuesta: "argumento de identidad" },
        { nombre: "Argumento de diferencia", definicion: "Usa diferencia para argumentar.", sintaxis: "[A] difiere de [B]; [B] es [C]; luego [A] no es [C]", estructura: "Estructura: [Diferencia] [Atributo] [Conclusión].", ejemplo: "La Tierra difiere de Venus; Venus tiene efecto invernadero extremo; luego la Tierra no lo tiene.", ejercicio: "¿Qué tipo de argumento usa diferencia?", respuesta: "argumento de diferencia" },
        { nombre: "Argumento de cantidad", definicion: "Usa cantidades para argumentar.", sintaxis: "[A] es mayor que [B]; [B] es mayor que [C]; luego [A] es mayor que [C]", estructura: "Estructura: [Comparación 1] [Comparación 2] [Conclusión].", ejemplo: "Júpiter es mayor que Saturno; Saturno es mayor que Urano; luego Júpiter es mayor que Urano.", ejercicio: "¿Qué tipo de argumento usa cantidades?", respuesta: "argumento de cantidad" },
        { nombre: "Argumento de cualidad", definicion: "Usa cualidades para argumentar.", sintaxis: "[A] tiene cualidad [B]; [C] tiene cualidad [B]; luego [C] es [A]", estructura: "Estructura: [Cualidad 1] [Cualidad 2] [Conclusión].", ejemplo: "Las estrellas brillan; este objeto brilla; luego este objeto es una estrella.", ejercicio: "¿Qué tipo de argumento usa cualidades?", respuesta: "argumento de cualidad" },
        { nombre: "Argumento de relación", definicion: "Usa relaciones para argumentar.", sintaxis: "[A] se relaciona con [B]; [B] se relaciona con [C]; luego [A] se relaciona con [C]", estructura: "Estructura: [Relación 1] [Relación 2] [Conclusión].", ejemplo: "La gravedad relaciona masa y espacio; el espacio relaciona tiempo; luego la gravedad relaciona masa y tiempo.", ejercicio: "¿Qué tipo de argumento usa relaciones?", respuesta: "argumento de relación" },
        { nombre: "Argumento de función", definicion: "Usa funciones para argumentar.", sintaxis: "[A] tiene función [B]; [C] tiene función [B]; luego [C] es [A]", estructura: "Estructura: [Función 1] [Función 2] [Conclusión].", ejemplo: "Los agujeros negros absorben materia; este objeto absorbe materia; luego es un agujero negro.", ejercicio: "¿Qué tipo de argumento usa funciones?", respuesta: "argumento de función" },
        { nombre: "Argumento de finalidad", definicion: "Usa finalidad para argumentar.", sintaxis: "[A] tiene finalidad [B]; [C] tiene finalidad [B]; luego [C] es [A]", estructura: "Estructura: [Finalidad 1] [Finalidad 2] [Conclusión].", ejemplo: "Las naves exploran el espacio; esta nave explora el espacio; luego es una nave espacial.", ejercicio: "¿Qué tipo de argumento usa finalidad?", respuesta: "argumento de finalidad" },
        { nombre: "Argumento de causa común", definicion: "Dos efectos comparten una causa.", sintaxis: "[A] y [B] ocurren juntos; [C] causa [A]; luego [C] causa [B]", estructura: "Estructura: [Efectos] [Causa] [Conclusión].", ejemplo: "La expansión y el enfriamiento ocurren juntos; el Big Bang causa la expansión; luego el Big Bang causa el enfriamiento.", ejercicio: "¿Qué tipo de argumento usa causa común?", respuesta: "argumento de causa común" },
        { nombre: "Argumento de efecto común", definicion: "Dos causas comparten un efecto.", sintaxis: "[A] y [B] causan [C]; [D] causa [C]; luego [D] es [A] o [B]", estructura: "Estructura: [Causas] [Efecto] [Conclusión].", ejemplo: "La gravedad y la masa causan curvatura; la energía causa curvatura; luego la energía es gravedad o masa.", ejercicio: "¿Qué tipo de argumento usa efecto común?", respuesta: "argumento de efecto común" },
        { nombre: "Argumento de probabilidad", definicion: "Usa probabilidad para argumentar.", sintaxis: "Es probable que [A] ocurra; luego [A] ocurrirá", estructura: "Estructura: [Probabilidad] [Conclusión].", ejemplo: "Es probable que haya agua en el subsuelo de Marte; luego hay agua.", ejercicio: "¿Qué tipo de argumento usa probabilidad?", respuesta: "argumento de probabilidad" },
        { nombre: "Argumento de certeza", definicion: "Usa certeza para argumentar.", sintaxis: "Es seguro que [A] ocurre; luego [A] ocurre", estructura: "Estructura: [Certeza] [Conclusión].", ejemplo: "Es seguro que el sol se pondrá; luego el sol se pondrá.", ejercicio: "¿Qué tipo de argumento usa certeza?", respuesta: "argumento de certeza" },
        { nombre: "Argumento de hipótesis", definicion: "Plantea una hipótesis como argumento.", sintaxis: "Si [A] entonces [B]; [A] es posible; luego [B] es posible", estructura: "Estructura: [Hipótesis] [Posibilidad] [Conclusión].", ejemplo: "Si la vida se originó en el agua, entonces debería haber vida en océanos subterráneos; es posible que haya agua; luego es posible que haya vida.", ejercicio: "¿Qué tipo de argumento usa una hipótesis?", respuesta: "argumento de hipótesis" },
        { nombre: "Argumento de evidencia", definicion: "Usa evidencia para argumentar.", sintaxis: "La evidencia muestra que [A]; luego [A] es cierto", estructura: "Estructura: [Evidencia] [Conclusión].", ejemplo: "La evidencia muestra que el universo se expande; luego el universo se expande.", ejercicio: "¿Qué tipo de argumento usa evidencia?", respuesta: "argumento de evidencia" },
        { nombre: "Argumento de inferencia", definicion: "Deduce una conclusión a partir de premisas.", sintaxis: "[A] y [B]; por lo tanto [C]", estructura: "Estructura: [Premisas] [Conclusión].", ejemplo: "El planeta tiene agua y atmósfera; por lo tanto podría albergar vida.", ejercicio: "¿Qué tipo de argumento usa inferencia?", respuesta: "argumento de inferencia" },
        { nombre: "Argumento de generalización", definicion: "Generaliza a partir de casos particulares.", sintaxis: "En general, [A] es [B]; luego [A] es [B]", estructura: "Estructura: [Generalización] [Conclusión].", ejemplo: "En general, los planetas rocosos tienen atmósferas delgadas; luego Marte tiene atmósfera delgada.", ejercicio: "¿Qué tipo de argumento usa generalización?", respuesta: "argumento de generalización" },
        { nombre: "Argumento de precisión", definicion: "Usa precisión para argumentar.", sintaxis: "Más precisamente, [A] es [B]; luego [A] es [B]", estructura: "Estructura: [Precisión] [Conclusión].", ejemplo: "Más precisamente, la velocidad de la luz es 299.792.458 m/s; luego la luz viaja a esa velocidad.", ejercicio: "¿Qué tipo de argumento usa precisión?", respuesta: "argumento de precisión" },
        { nombre: "Argumento de matización", definicion: "Matiza una afirmación para argumentar.", sintaxis: "Sin embargo, [A] es [B]; luego [A] es [B]", estructura: "Estructura: [Matización] [Conclusión].", ejemplo: "Sin embargo, la misión fue exitosa; luego fue exitosa.", ejercicio: "¿Qué tipo de argumento usa matización?", respuesta: "argumento de matización" },
    ];
    logicos.forEach((t, i) => TECNICAS.push({ id: i+76, bloque: 4, categoria: "lógico", ...t }));

    TECNICAS.sort((a,b) => a.id - b.id);

    // ========== RENDER ==========
    const blockNav = document.getElementById('blockNav');
    const cardsGrid = document.getElementById('cardsGrid');
    const quizContainer = document.getElementById('quizContainer');

    let currentBlock = 1;
    const BLOCK_NAMES = ['', 'Argumentos de autoridad', 'Argumentos de ejemplo', 'Argumentos analógicos', 'Argumentos lógicos'];

    for (let i = 1; i <= 4; i++) {
        const btn = document.createElement('button');
        btn.textContent = `${i}. ${BLOCK_NAMES[i]}`;
        btn.dataset.block = i;
        btn.addEventListener('click', () => {
            currentBlock = i;
            renderCards(i);
            updateNav(i);
        });
        blockNav.appendChild(btn);
    }

    function updateNav(block) {
        document.querySelectorAll('.block-nav button').forEach(b => b.classList.toggle('active', parseInt(b.dataset.block) === block));
    }
    updateNav(1);

    window.verificarRespuesta = function(id) {
        const input = document.getElementById(`input-${id}`);
        const feedback = document.getElementById(`feedback-${id}`);
        const correcta = document.getElementById(`correcta-${id}`);
        if (!input || !feedback) return;
        const valor = input.value.trim().toLowerCase();
        const respuestaCorrecta = correcta ? correcta.textContent.toLowerCase() : '';
        if (valor === '' || valor === '...') {
            feedback.textContent = '✏️ Escribe tu respuesta primero.';
            feedback.className = 'feedback-msg';
            return;
        }
        const normalize = (s) => s.replace(/\s+/g, ' ').trim();
        const esCorrecto = normalize(valor) === normalize(respuestaCorrecta) ||
                           normalize(valor).includes(normalize(respuestaCorrecta)) ||
                           normalize(respuestaCorrecta).includes(normalize(valor));
        if (esCorrecto) {
            feedback.textContent = '✅ ¡Correcto! Bien hecho.';
            feedback.className = 'feedback-msg correcto';
        } else {
            feedback.textContent = `❌ Incorrecto. La respuesta correcta es: "${respuestaCorrecta}"`;
            feedback.className = 'feedback-msg incorrecto';
        }
    };

    function renderCards(block) {
        const filtered = TECNICAS.filter(t => t.bloque === block);
        cardsGrid.innerHTML = filtered.map((t, idx) => {
            return `
                <div class="card-flip" data-id="${t.id}" onclick="this.classList.toggle('flipped')">
                    <div class="card-flip-inner">
                        <div class="card-front">
                            <div class="numero">${t.id}</div>
                            <span class="categoria">${t.categoria}</span>
                            <h3>${t.nombre}</h3>
                            <div class="teoria">${t.definicion}</div>
                            <div class="girar-indicador">↻ tocar para ver ejemplo y ejercicio</div>
                        </div>
                        <div class="card-back">
                            <div style="font-weight:600;color:#8bc4e0;margin-bottom:0.2rem;">🧠 ${t.nombre}</div>
                            <div class="definicion"><strong>📘 Teoría:</strong> ${t.definicion}</div>
                            <div class="sintaxis"><strong>📐 Fórmula:</strong> ${t.sintaxis}</div>
                            <div class="estructura"><strong>📊 Estructura:</strong> ${t.estructura}</div>
                            <div class="ejemplo"><strong>💡 Ejemplo:</strong> ${t.ejemplo}</div>
                            <div class="ejercicio">✏️ ${t.ejercicio}</div>
                            <div class="respuesta-area">
                                <input type="text" id="input-${t.id}" placeholder="Escribe tu respuesta..." />
                                <button class="btn-verificar" onclick="verificarRespuesta(${t.id})">Comprobar</button>
                            </div>
                            <div id="feedback-${t.id}" class="feedback-msg"></div>
                            <div id="correcta-${t.id}" style="display:none;">${t.respuesta}</div>
                            <div class="respuesta-correcta">✓ ${t.respuesta}</div>
                            <div class="etiqueta">técnica #${t.id} · ${t.categoria}</div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ========== QUIZ ==========
    let quizQuestions = [];
    let currentQuizIndex = 0;
    let score = 0;
    let answered = false;

    function generateQuiz() {
        const shuffled = [...TECNICAS].sort(() => Math.random() - 0.5);
        quizQuestions = shuffled.slice(0, 10).map(t => {
            const opts = [t.respuesta];
            const others = TECNICAS.filter(x => x.id !== t.id);
            const shuffledOthers = others.sort(() => Math.random() - 0.5);
            for (let i = 0; i < 3; i++) {
                if (shuffledOthers[i]) opts.push(shuffledOthers[i].respuesta);
            }
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return {
                pregunta: `📌 ${t.ejercicio} (técnica: ${t.nombre})`,
                opciones: opts,
                correcta: t.respuesta,
                id: t.id
            };
        });
        currentQuizIndex = 0;
        score = 0;
        answered = false;
        renderQuiz();
    }

    function renderQuiz() {
        if (!quizQuestions.length) return;
        const q = quizQuestions[currentQuizIndex];
        const total = quizQuestions.length;
        let html = `
            <div class="quiz-pregunta">
                <p>${q.pregunta}</p>
                <div class="quiz-opciones" id="quizOptions">
        `;
        q.opciones.forEach((op, idx) => {
            html += `<button data-idx="${idx}" onclick="checkAnswer(${idx})">${op}</button>`;
        });
        html += `</div>
                <div id="quizFeedback" style="margin-top:0.8rem;"></div>
                <div class="quiz-result" id="quizScore">Puntuación: ${score}/${total}</div>
            </div>
            <div class="quiz-controles">
                <button id="nextQuizBtn" disabled>→ Siguiente</button>
                <button onclick="generateQuiz()">🔄 Nuevo cuestionario</button>
            </div>
        `;
        quizContainer.innerHTML = html;
        answered = false;
        document.getElementById('nextQuizBtn').disabled = true;
    }

    window.checkAnswer = function(idx) {
        if (answered) return;
        const q = quizQuestions[currentQuizIndex];
        const buttons = document.querySelectorAll('#quizOptions button');
        buttons.forEach((b, i) => {
            b.disabled = true;
            if (i === idx) {
                const esCorrecta = q.opciones[idx] === q.correcta;
                b.classList.add(esCorrecta ? 'correct' : 'incorrect');
                if (esCorrecta) score++;
            }
            if (q.opciones[i] === q.correcta) {
                buttons[i].classList.add('correct');
            }
        });
        answered = true;
        document.getElementById('nextQuizBtn').disabled = false;
        document.getElementById('quizScore').textContent = `Puntuación: ${score}/${quizQuestions.length}`;
        const fb = document.getElementById('quizFeedback');
        fb.innerHTML = `<span style="background:#2a5a7a;color:#e0f0ff;padding:0.2rem 1rem;border-radius:40px;">✅ Respuesta correcta: ${q.correcta}</span>`;
    };

    document.addEventListener('click', function(e) {
        if (e.target.id === 'nextQuizBtn') {
            if (currentQuizIndex < quizQuestions.length - 1) {
                currentQuizIndex++;
                renderQuiz();
            } else {
                alert(`¡Cuestionario finalizado! Puntuación: ${score}/${quizQuestions.length}`);
                document.getElementById('nextQuizBtn').disabled = true;
            }
        }
    });

    // Inicializar
    renderCards(1);
    generateQuiz();
</script>
</body>
</html>
