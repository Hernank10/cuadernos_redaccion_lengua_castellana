        { nombre: "La confianza y la sospecha", definicion: "Alegoría donde la confianza y la sospecha compiten por la cooperación interestelar.", sintaxis: "[Concepto] y [Concepto] compitieron por [cooperación], y [Concepto] demostró que [enseñanza].", estructura: "Estructura: [Introducción] [Conflicto] [Resolución] [Moraleja].", ejemplo: "Confianza y Sospecha compitieron por la cooperación interestelar; Confianza demostró que la sospecha es el veneno de la alianza.", ejercicio: "¿Qué alegoría enfrenta a la confianza y la sospecha?", respuesta: "La confianza y la sospecha" },
        { nombre: "La compasión y la justicia", definicion: "Alegoría donde la compasión y la justicia compiten por el perdón de un criminal.", sintaxis: "[Concepto] y [Concepto] compitieron por [perdón], y [Concepto] enseñó que [enseñanza].", estructura: "Estructura: [Introducción] [Conflicto] [Resolución] [Moraleja].", ejemplo: "Compasión y Justicia compitieron por el perdón de un criminal; Compasión enseñó que la justicia sin compasión es crueldad.", ejercicio: "¿Qué alegoría enfrenta a la compasión y la justicia?", respuesta: "La compasión y la justicia" },
        { nombre: "La humildad y el orgullo (II)", definicion: "Alegoría donde la humildad y el orgullo compiten por el liderazgo de una flota.", sintaxis: "[Concepto] y [Concepto] compitieron por [liderazgo], y [Concepto] descubrió que [enseñanza].", estructura: "Estructura: [Introducción] [Conflicto] [Resolución] [Moraleja].", ejemplo: "Humildad y Orgullo compitieron por el liderazgo de una flota; Humildad descubrió que el orgullo es la caída del líder.", ejercicio: "¿Qué alegoría enfrenta a la humildad y el orgullo (II)?", respuesta: "La humildad y el orgullo (II)" },
        { nombre: "La generosidad y la avaricia (II)", definicion: "Alegoría donde la generosidad y la avaricia compiten por la riqueza de una estrella.", sintaxis: "[Concepto] y [Concepto] compitieron por [riqueza], y [Concepto] demostró que [enseñanza].", estructura: "Estructura: [Introducción] [Conflicto] [Resolución] [Moraleja].", ejemplo: "Generosidad y Avaricia compitieron por la riqueza de una estrella; Generosidad demostró que la avaricia es la pobreza del alma.", ejercicio: "¿Qué alegoría enfrenta a la generosidad y la avaricia (II)?", respuesta: "La generosidad y la avaricia (II)" },
        { nombre: "La lealtad y la traición (II)", definicion: "Alegoría donde la lealtad y la traición compiten por la supervivencia de un equipo.", sintaxis: "[Concepto] y [Concepto] compitieron por [supervivencia], y [Concepto] enseñó que [enseñanza].", estructura: "Estructura: [Introducción] [Conflicto] [Resolución] [Moraleja].", ejemplo: "Lealtad y Traición compitieron por la supervivencia de un equipo; Lealtad enseñó que la traición es el fin de la confianza.", ejercicio: "¿Qué alegoría enfrenta a la lealtad y la traición (II)?", respuesta: "La lealtad y la traición (II)" },
        { nombre: "La paciencia y la impaciencia (II)", definicion: "Alegoría donde la paciencia y la impaciencia compiten por la evolución de una especie.", sintaxis: "[Concepto] y [Concepto] compitieron por [evolución], y [Concepto] descubrió que [enseñanza].", estructura: "Estructura: [Introducción] [Conflicto] [Resolución] [Moraleja].", ejemplo: "Paciencia e Impaciencia compitieron por la evolución de una especie; Paciencia descubrió que la impaciencia es el freno del cambio.", ejercicio: "¿Qué alegoría enfrenta a la paciencia y la impaciencia (II)?", respuesta: "La paciencia y la impaciencia (II)" },
        { nombre: "La sinceridad y la hipocresía (II)", definicion: "Alegoría donde la sinceridad y la hipocresía compiten por la confianza de una alianza.", sintaxis: "[Concepto] y [Concepto] compitieron por [confianza], y [Concepto] demostró que [enseñanza].", estructura: "Estructura: [Introducción] [Conflicto] [Resolución] [Moraleja].", ejemplo: "Sinceridad e Hipocresía compitieron por la confianza de una alianza; Sinceridad demostró que la hipocresía es la máscara del engaño.", ejercicio: "¿Qué alegoría enfrenta a la sinceridad y la hipocresía (II)?", respuesta: "La sinceridad y la hipocresía (II)" },
    ];
    eticos.forEach((t, i) => TECNICAS.push({ id: i+76, bloque: 4, categoria: "ético", ...t }));

    TECNICAS.sort((a,b) => a.id - b.id);

    // ========== RENDER ==========
    const blockNav = document.getElementById('blockNav');
    const cardsGrid = document.getElementById('cardsGrid');
    const quizContainer = document.getElementById('quizContainer');

    let currentBlock = 1;
    const BLOCK_NAMES = ['', 'Virtudes y vicios', 'Conceptos existenciales', 'Fuerzas cósmicas', 'Dilemas éticos'];

    for (let i = 1; i <= 4; i++) {
        const btn = document.createElement('button');
        btn.textContent = `${i}. ${BLOCK_NAMES[i]}`;
        btn.dataset.block = i;
        btn.addEventListener('click', () => {
            currentBlock = i;
            renderCards(i);
            updateNav(i);
        });
        blockNav.appendChild(btn);
    }

    function updateNav(block) {
        document.querySelectorAll('.block-nav button').forEach(b => b.classList.toggle('active', parseInt(b.dataset.block) === block));
    }
    updateNav(1);

    window.verificarRespuesta = function(id) {
        const input = document.getElementById(`input-${id}`);
        const feedback = document.getElementById(`feedback-${id}`);
        const correcta = document.getElementById(`correcta-${id}`);
        if (!input || !feedback) return;
        const valor = input.value.trim().toLowerCase();
        const respuestaCorrecta = correcta ? correcta.textContent.toLowerCase() : '';
        if (valor === '' || valor === '...') {
            feedback.textContent = '✏️ Escribe tu respuesta primero.';
            feedback.className = 'feedback-msg';
            return;
        }
        const normalize = (s) => s.replace(/\s+/g, ' ').trim();
        const esCorrecto = normalize(valor) === normalize(respuestaCorrecta) ||
                           normalize(valor).includes(normalize(respuestaCorrecta)) ||
                           normalize(respuestaCorrecta).includes(normalize(valor));
        if (esCorrecto) {
            feedback.textContent = '✅ ¡Correcto! Bien hecho.';
            feedback.className = 'feedback-msg correcto';
        } else {
            feedback.textContent = `❌ Incorrecto. La respuesta correcta es: "${respuestaCorrecta}"`;
            feedback.className = 'feedback-msg incorrecto';
        }
    };

    function renderCards(block) {
        const filtered = TECNICAS.filter(t => t.bloque === block);
        cardsGrid.innerHTML = filtered.map((t, idx) => {
            return `
                <div class="card-flip" data-id="${t.id}" onclick="this.classList.toggle('flipped')">
                    <div class="card-flip-inner">
                        <div class="card-front">
                            <div class="numero">${t.id}</div>
                            <span class="categoria">${t.categoria}</span>
                            <h3>${t.nombre}</h3>
                            <div class="teoria">${t.definicion}</div>
                            <div class="girar-indicador">↻ tocar para ver ejemplo y ejercicio</div>
                        </div>
                        <div class="card-back">
                            <div style="font-weight:600;color:#8bc4e0;margin-bottom:0.2rem;">🌀 ${t.nombre}</div>
                            <div class="definicion"><strong>📘 Teoría:</strong> ${t.definicion}</div>
                            <div class="sintaxis"><strong>📐 Fórmula:</strong> ${t.sintaxis}</div>
                            <div class="estructura"><strong>📊 Estructura:</strong> ${t.estructura}</div>
                            <div class="ejemplo"><strong>💡 Ejemplo:</strong> ${t.ejemplo}</div>
                            <div class="ejercicio">✏️ ${t.ejercicio}</div>
                            <div class="respuesta-area">
                                <input type="text" id="input-${t.id}" placeholder="Escribe tu respuesta..." />
                                <button class="btn-verificar" onclick="verificarRespuesta(${t.id})">Comprobar</button>
                            </div>
                            <div id="feedback-${t.id}" class="feedback-msg"></div>
                            <div id="correcta-${t.id}" style="display:none;">${t.respuesta}</div>
                            <div class="respuesta-correcta">✓ ${t.respuesta}</div>
                            <div class="etiqueta">técnica #${t.id} · ${t.categoria}</div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ========== QUIZ ==========
    let quizQuestions = [];
    let currentQuizIndex = 0;
    let score = 0;
    let answered = false;

    function generateQuiz() {
        const shuffled = [...TECNICAS].sort(() => Math.random() - 0.5);
        quizQuestions = shuffled.slice(0, 10).map(t => {
            const opts = [t.respuesta];
            const others = TECNICAS.filter(x => x.id !== t.id);
            const shuffledOthers = others.sort(() => Math.random() - 0.5);
            for (let i = 0; i < 3; i++) {
                if (shuffledOthers[i]) opts.push(shuffledOthers[i].respuesta);
            }
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return {
                pregunta: `📌 ${t.ejercicio} (técnica: ${t.nombre})`,
                opciones: opts,
                correcta: t.respuesta,
                id: t.id
            };
        });
        currentQuizIndex = 0;
        score = 0;
        answered = false;
        renderQuiz();
    }

    function renderQuiz() {
        if (!quizQuestions.length) return;
        const q = quizQuestions[currentQuizIndex];
        const total = quizQuestions.length;
        let html = `
            <div class="quiz-pregunta">
                <p>${q.pregunta}</p>
                <div class="quiz-opciones" id="quizOptions">
        `;
        q.opciones.forEach((op, idx) => {
            html += `<button data-idx="${idx}" onclick="checkAnswer(${idx})">${op}</button>`;
        });
        html += `</div>
                <div id="quizFeedback" style="margin-top:0.8rem;"></div>
                <div class="quiz-result" id="quizScore">Puntuación: ${score}/${total}</div>
            </div>
            <div class="quiz-controles">
                <button id="nextQuizBtn" disabled>→ Siguiente</button>
                <button onclick="generateQuiz()">🔄 Nuevo cuestionario</button>
            </div>
        `;
        quizContainer.innerHTML = html;
        answered = false;
        document.getElementById('nextQuizBtn').disabled = true;
    }

    window.checkAnswer = function(idx) {
        if (answered) return;
        const q = quizQuestions[currentQuizIndex];
        const buttons = document.querySelectorAll('#quizOptions button');
        buttons.forEach((b, i) => {
            b.disabled = true;
            if (i === idx) {
                const esCorrecta = q.opciones[idx] === q.correcta;
                b.classList.add(esCorrecta ? 'correct' : 'incorrect');
                if (esCorrecta) score++;
            }
            if (q.opciones[i] === q.correcta) {
                buttons[i].classList.add('correct');
            }
        });
        answered = true;
        document.getElementById('nextQuizBtn').disabled = false;
        document.getElementById('quizScore').textContent = `Puntuación: ${score}/${quizQuestions.length}`;
        const fb = document.getElementById('quizFeedback');
        fb.innerHTML = `<span style="background:#2a5a7a;color:#e0f0ff;padding:0.2rem 1rem;border-radius:40px;">✅ Respuesta correcta: ${q.correcta}</span>`;
    };

    document.addEventListener('click', function(e) {
        if (e.target.id === 'nextQuizBtn') {
            if (currentQuizIndex < quizQuestions.length - 1) {
                currentQuizIndex++;
                renderQuiz();
            } else {
                alert(`¡Cuestionario finalizado! Puntuación: ${score}/${quizQuestions.length}`);
                document.getElementById('nextQuizBtn').disabled = true;
            }
        }
    });

    // Inicializar
    renderCards(1);
    generateQuiz();
</script>
</body>
