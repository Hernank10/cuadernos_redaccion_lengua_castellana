        { nombre: "La conciencia y el instinto", definicion: "Paráfrasis sobre la conciencia y el instinto.", sintaxis: "Reformular: [original] → [paráfrasis] que enseña [lección].", estructura: "Estructura: [Original] → [Reformulación] → [Enseñanza].", ejemplo: "Original: 'La conciencia y el instinto exploraron un planeta.' → Paráfrasis: 'El pensamiento y el impulso recorrieron un mundo.' Enseña: 'La conciencia y el instinto son la razón y el corazón del ser.'", ejercicio: "¿Qué paráfrasis enseña que la conciencia y el instinto son la razón y el corazón del ser?", respuesta: "La conciencia y el instinto" },
        { nombre: "La verdad y la propaganda", definicion: "Paráfrasis sobre la verdad y la propaganda.", sintaxis: "Reformular: [original] → [paráfrasis] que enseña [lección].", estructura: "Estructura: [Original] → [Reformulación] → [Enseñanza].", ejemplo: "Original: 'La verdad y la propaganda compitieron por la opinión de una galaxia.' → Paráfrasis: 'La certeza y el bulo disputaron la mente de un universo.' Enseña: 'La verdad y la propaganda son la realidad y la máscara del discurso.'", ejercicio: "¿Qué paráfrasis enseña que la verdad y la propaganda son la realidad y la máscara del discurso?", respuesta: "La verdad y la propaganda" },
        { nombre: "La privacidad y la vigilancia", definicion: "Paráfrasis sobre la privacidad y la vigilancia.", sintaxis: "Reformular: [original] → [paráfrasis] que enseña [lección].", estructura: "Estructura: [Original] → [Reformulación] → [Enseñanza].", ejemplo: "Original: 'La privacidad y la vigilancia compitieron por la libertad de una colonia.' → Paráfrasis: 'El secreto y la mirada disputaron la libertad de un asentamiento.' Enseña: 'La privacidad y la vigilancia son el silencio y la voz del control.'", ejercicio: "¿Qué paráfrasis enseña que la privacidad y la vigilancia son el silencio y la voz del control?", respuesta: "La privacidad y la vigilancia" },
        { nombre: "El progreso y la sostenibilidad", definicion: "Paráfrasis sobre el progreso y la sostenibilidad.", sintaxis: "Reformular: [original] → [paráfrasis] que enseña [lección].", estructura: "Estructura: [Original] → [Reformulación] → [Enseñanza].", ejemplo: "Original: 'El progreso y la sostenibilidad compitieron por los recursos de un planeta.' → Paráfrasis: 'El avance y el equilibrio disputaron los dones de un mundo.' Enseña: 'El progreso y la sostenibilidad son la prisa y la pausa del desarrollo.'", ejercicio: "¿Qué paráfrasis enseña que el progreso y la sostenibilidad son la prisa y la pausa del desarrollo?", respuesta: "El progreso y la sostenibilidad" },
        { nombre: "La igualdad y la meritocracia", definicion: "Paráfrasis sobre la igualdad y la meritocracia.", sintaxis: "Reformular: [original] → [paráfrasis] que enseña [lección].", estructura: "Estructura: [Original] → [Reformulación] → [Enseñanza].", ejemplo: "Original: 'La igualdad y la meritocracia compitieron por la estructura de una sociedad interestelar.' → Paráfrasis: 'La equidad y el mérito disputaron el cimiento de una sociedad estelar.' Enseña: 'La igualdad y la meritocracia son la base y la cima del orden social.'", ejercicio: "¿Qué paráfrasis enseña que la igualdad y la meritocracia son la base y la cima del orden social?", respuesta: "La igualdad y la meritocracia" },
        { nombre: "La seguridad y la libertad (II)", definicion: "Paráfrasis sobre la seguridad y la libertad (II).", sintaxis: "Reformular: [original] → [paráfrasis] que enseña [lección].", estructura: "Estructura: [Original] → [Reformulación] → [Enseñanza].", ejemplo: "Original: 'La seguridad y la libertad compitieron por el gobierno de un sistema.' → Paráfrasis: 'La protección y el albedrío disputaron el timón de un sistema.' Enseña: 'La seguridad y la libertad son el escudo y la espada de la sociedad.'", ejercicio: "¿Qué paráfrasis enseña que la seguridad y la libertad son el escudo y la espada de la sociedad?", respuesta: "La seguridad y la libertad (II)" },
        { nombre: "La diversidad y la uniformidad (II)", definicion: "Paráfrasis sobre la diversidad y la uniformidad (II).", sintaxis: "Reformular: [original] → [paráfrasis] que enseña [lección].", estructura: "Estructura: [Original] → [Reformulación] → [Enseñanza].", ejemplo: "Original: 'La diversidad y la uniformidad compitieron por la cultura de una galaxia.' → Paráfrasis: 'La variedad y la igualdad disputaron el alma de un universo.' Enseña: 'La diversidad y la uniformidad son la danza y el silencio de la cultura.'", ejercicio: "¿Qué paráfrasis enseña que la diversidad y la uniformidad son la danza y el silencio de la cultura?", respuesta: "La diversidad y la uniformidad (II)" },
        { nombre: "El ser y el universo", definicion: "Paráfrasis sobre el ser y el universo.", sintaxis: "Reformular: [original] → [paráfrasis] que enseña [lección].", estructura: "Estructura: [Original] → [Reformulación] → [Enseñanza].", ejemplo: "Original: 'El ser y el universo se encontraron en el centro del cosmos.' → Paráfrasis: 'El existir y el todo se abrazaron en el corazón del todo.' Enseña: 'El ser y el universo son la gota y el océano de la existencia.'", ejercicio: "¿Qué paráfrasis enseña que el ser y el universo son la gota y el océano de la existencia?", respuesta: "El ser y el universo" },
    ];
    existenciales2.forEach((t, i) => TECNICAS.push({ id: i+76, bloque: 4, categoria: "existencial", ...t }));

    TECNICAS.sort((a,b) => a.id - b.id);

    // ========== RENDER ==========
    const blockNav = document.getElementById('blockNav');
    const cardsGrid = document.getElementById('cardsGrid');
    const quizContainer = document.getElementById('quizContainer');

    let currentBlock = 1;
    const BLOCK_NAMES = ['', 'Lecciones de supervivencia', 'Sabiduría tecnológica', 'Enseñanzas sociales', 'Reflexiones existenciales'];

    for (let i = 1; i <= 4; i++) {
        const btn = document.createElement('button');
        btn.textContent = `${i}. ${BLOCK_NAMES[i]}`;
        btn.dataset.block = i;
        btn.addEventListener('click', () => {
            currentBlock = i;
            renderCards(i);
            updateNav(i);
        });
        blockNav.appendChild(btn);
    }

    function updateNav(block) {
        document.querySelectorAll('.block-nav button').forEach(b => b.classList.toggle('active', parseInt(b.dataset.block) === block));
    }
    updateNav(1);

    window.verificarRespuesta = function(id) {
        const input = document.getElementById(`input-${id}`);
        const feedback = document.getElementById(`feedback-${id}`);
        const correcta = document.getElementById(`correcta-${id}`);
        if (!input || !feedback) return;
        const valor = input.value.trim().toLowerCase();
        const respuestaCorrecta = correcta ? correcta.textContent.toLowerCase() : '';
        if (valor === '' || valor === '...') {
            feedback.textContent = '✏️ Escribe tu respuesta primero.';
            feedback.className = 'feedback-msg';
            return;
        }
        const normalize = (s) => s.replace(/\s+/g, ' ').trim();
        const esCorrecto = normalize(valor) === normalize(respuestaCorrecta) ||
                           normalize(valor).includes(normalize(respuestaCorrecta)) ||
                           normalize(respuestaCorrecta).includes(normalize(valor));
        if (esCorrecto) {
            feedback.textContent = '✅ ¡Correcto! Bien hecho.';
            feedback.className = 'feedback-msg correcto';
        } else {
            feedback.textContent = `❌ Incorrecto. La respuesta correcta es: "${respuestaCorrecta}"`;
            feedback.className = 'feedback-msg incorrecto';
        }
    };

    function renderCards(block) {
        const filtered = TECNICAS.filter(t => t.bloque === block);
        cardsGrid.innerHTML = filtered.map((t, idx) => {
            return `
                <div class="card-flip" data-id="${t.id}" onclick="this.classList.toggle('flipped')">
                    <div class="card-flip-inner">
                        <div class="card-front">
                            <div class="numero">${t.id}</div>
                            <span class="categoria">${t.categoria}</span>
                            <h3>${t.nombre}</h3>
                            <div class="teoria">${t.definicion}</div>
                            <div class="girar-indicador">↻ tocar para ver ejemplo y ejercicio</div>
                        </div>
                        <div class="card-back">
                            <div style="font-weight:600;color:#8bc4e0;margin-bottom:0.2rem;">📖 ${t.nombre}</div>
                            <div class="definicion"><strong>📘 Teoría:</strong> ${t.definicion}</div>
                            <div class="sintaxis"><strong>📐 Fórmula:</strong> ${t.sintaxis}</div>
                            <div class="estructura"><strong>📊 Estructura:</strong> ${t.estructura}</div>
                            <div class="ejemplo"><strong>💡 Ejemplo:</strong> ${t.ejemplo}</div>
                            <div class="ejercicio">✏️ ${t.ejercicio}</div>
                            <div class="respuesta-area">
                                <input type="text" id="input-${t.id}" placeholder="Escribe tu respuesta..." />
                                <button class="btn-verificar" onclick="verificarRespuesta(${t.id})">Comprobar</button>
                            </div>
                            <div id="feedback-${t.id}" class="feedback-msg"></div>
                            <div id="correcta-${t.id}" style="display:none;">${t.respuesta}</div>
                            <div class="respuesta-correcta">✓ ${t.respuesta}</div>
                            <div class="etiqueta">técnica #${t.id} · ${t.categoria}</div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ========== QUIZ ==========
    let quizQuestions = [];
    let currentQuizIndex = 0;
    let score = 0;
    let answered = false;

    function generateQuiz() {
        const shuffled = [...TECNICAS].sort(() => Math.random() - 0.5);
        quizQuestions = shuffled.slice(0, 10).map(t => {
            const opts = [t.respuesta];
            const others = TECNICAS.filter(x => x.id !== t.id);
            const shuffledOthers = others.sort(() => Math.random() - 0.5);
            for (let i = 0; i < 3; i++) {
                if (shuffledOthers[i]) opts.push(shuffledOthers[i].respuesta);
            }
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return {
                pregunta: `📌 ${t.ejercicio} (técnica: ${t.nombre})`,
                opciones: opts,
                correcta: t.respuesta,
                id: t.id
            };
        });
        currentQuizIndex = 0;
        score = 0;
        answered = false;
        renderQuiz();
    }

    function renderQuiz() {
        if (!quizQuestions.length) return;
        const q = quizQuestions[currentQuizIndex];
        const total = quizQuestions.length;
        let html = `
            <div class="quiz-pregunta">
                <p>${q.pregunta}</p>
                <div class="quiz-opciones" id="quizOptions">
        `;
        q.opciones.forEach((op, idx) => {
            html += `<button data-idx="${idx}" onclick="checkAnswer(${idx})">${op}</button>`;
        });
        html += `</div>
                <div id="quizFeedback" style="margin-top:0.8rem;"></div>
                <div class="quiz-result" id="quizScore">Puntuación: ${score}/${total}</div>
            </div>
            <div class="quiz-controles">
                <button id="nextQuizBtn" disabled>→ Siguiente</button>
                <button onclick="generateQuiz()">🔄 Nuevo cuestionario</button>
            </div>
        `;
        quizContainer.innerHTML = html;
        answered = false;
        document.getElementById('nextQuizBtn').disabled = true;
    }

    window.checkAnswer = function(idx) {
        if (answered) return;
        const q = quizQuestions[currentQuizIndex];
        const buttons = document.querySelectorAll('#quizOptions button');
        buttons.forEach((b, i) => {
            b.disabled = true;
            if (i === idx) {
                const esCorrecta = q.opciones[idx] === q.correcta;
                b.classList.add(esCorrecta ? 'correct' : 'incorrect');
                if (esCorrecta) score++;
            }
            if (q.opciones[i] === q.correcta) {
                buttons[i].classList.add('correct');
            }
        });
        answered = true;
        document.getElementById('nextQuizBtn').disabled = false;
        document.getElementById('quizScore').textContent = `Puntuación: ${score}/${quizQuestions.length}`;
        const fb = document.getElementById('quizFeedback');
        fb.innerHTML = `<span style="background:#2a5a7a;color:#e0f0ff;padding:0.2rem 1rem;border-radius:40px;">✅ Respuesta correcta: ${q.correcta}</span>`;
    };

    document.addEventListener('click', function(e) {
        if (e.target.id === 'nextQuizBtn') {
            if (currentQuizIndex < quizQuestions.length - 1) {
                currentQuizIndex++;
                renderQuiz();
            } else {
                alert(`¡Cuestionario finalizado! Puntuación: ${score}/${quizQuestions.length}`);
                document.getElementById('nextQuizBtn').disabled = true;
            }
        }
    });

    // Inicializar
    renderCards(1);
    generateQuiz();
</script>
