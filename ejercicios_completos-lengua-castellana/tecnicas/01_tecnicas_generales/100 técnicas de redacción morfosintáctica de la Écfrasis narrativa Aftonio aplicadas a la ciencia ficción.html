        { nombre: "El vendaval en el planeta", definicion: "Descripción de un vendaval en un planeta alienígena.", sintaxis: "El [vendaval] [era] un [muro] de [viento], con [sonidos] que [silbaban] y [movimientos] que [temblaban].", estructura: "Estructura: [Introducción] [Movimiento] [Sonido] [Sensación] [Consecuencia].", ejemplo: "El vendaval era un muro de viento que azotaba el paisaje, con silbidos que atravesaban el aire y un temblor que se sentía en la piel.", ejercicio: "¿Qué técnica describe vívidamente un vendaval en un planeta?", respuesta: "El vendaval en el planeta" },
        { nombre: "El incendio en el bosque", definicion: "Descripción de un incendio en un bosque alienígena.", sintaxis: "El [incendio] [era] un [mar] de [fuego], con [luz] que [cegaba] y [sonidos] que [chisporroteaban].", estructura: "Estructura: [Introducción] [Color y luz] [Movimiento] [Sonido] [Olor].", ejemplo: "El incendio era un mar de fuego que devoraba el bosque, con luz que cegaba y chisporroteos que llenaban el aire de olor a ceniza.", ejercicio: "¿Qué técnica describe vívidamente un incendio en un bosque?", respuesta: "El incendio en el bosque" },

        { nombre: "La tormenta de nieve", definicion: "Descripción de una tormenta de nieve en un planeta.", sintaxis: "La [tormenta] [era] un [manto] de [nieve], con [luz] que [se filtraba] y [sonidos] que [susurraban].", estructura: "Estructura: [Introducción] [Color y textura] [Movimiento] [Sonido] [Sensación].", ejemplo: "La tormenta de nieve era un manto de cristales blancos que caía sin cesar, con luz que se filtraba entre los copos y un susurro que llenaba el aire.", ejercicio: "¿Qué técnica describe vívidamente una tormenta de nieve?", respuesta: "La tormenta de nieve" },
        { nombre: "El huracán en el planeta", definicion: "Descripción de un huracán en un planeta alienígena.", sintaxis: "El [huracán] [era] un [ojo] de [viento], con [sonidos] que [rugían] y [movimientos] que [temblaban].", estructura: "Estructura: [Introducción] [Movimiento] [Sonido] [Sensación] [Consecuencia].", ejemplo: "El huracán era un ojo de viento que giraba lentamente, con rugidos que atravesaban el aire y un temblor que se sentía en el suelo.", ejercicio: "¿Qué técnica describe vívidamente un huracán en un planeta?", respuesta: "El huracán en el planeta" },
        { nombre: "El maremoto en el océano", definicion: "Descripción de un maremoto en un océano alienígena.", sintaxis: "El [maremoto] [era] un [muro] de [agua], con [luz] que [se filtraba] y [sonidos] que [rugían].", estructura: "Estructura: [Introducción] [Color y luz] [Movimiento] [Sonido] [Sensación].", ejemplo: "El maremoto era un muro de agua que se elevaba hacia el cielo, con luz que se filtraba en sus crestas y un rugido que anunciaba su llegada.", ejercicio: "¿Qué técnica describe vívidamente un maremoto en un océano?", respuesta: "El maremoto en el océano" },
        { nombre: "El temblor de tierra", definicion: "Descripción de un temblor de tierra en un planeta.", sintaxis: "El [temblor] [era] un [estremecimiento] de [tierra], con [sonidos] que [retumbaban] y [movimientos] que [temblaban].", estructura: "Estructura: [Introducción] [Movimiento] [Sonido] [Sensación] [Consecuencia].", ejemplo: "El temblor era un estremecimiento de tierra que sacudía el paisaje, con retumbos que atravesaban el suelo y un temblor que se sentía en los huesos.", ejercicio: "¿Qué técnica describe vívidamente un temblor de tierra?", respuesta: "El temblor de tierra" },
    ];
    eventos.forEach((t, i) => TECNICAS.push({ id: i+76, bloque: 4, categoria: "eventos", ...t }));

    TECNICAS.sort((a,b) => a.id - b.id);

    // ========== RENDER ==========
    const blockNav = document.getElementById('blockNav');
    const cardsGrid = document.getElementById('cardsGrid');
    const quizContainer = document.getElementById('quizContainer');

    let currentBlock = 1;
    const BLOCK_NAMES = ['', 'Paisajes cósmicos', 'Seres alienígenas', 'Tecnología y naves', 'Eventos y fenómenos'];

    for (let i = 1; i <= 4; i++) {
        const btn = document.createElement('button');
        btn.textContent = `${i}. ${BLOCK_NAMES[i]}`;
        btn.dataset.block = i;
        btn.addEventListener('click', () => {
            currentBlock = i;
            renderCards(i);
            updateNav(i);
        });
        blockNav.appendChild(btn);
    }

    function updateNav(block) {
        document.querySelectorAll('.block-nav button').forEach(b => b.classList.toggle('active', parseInt(b.dataset.block) === block));
    }
    updateNav(1);

    window.verificarRespuesta = function(id) {
        const input = document.getElementById(`input-${id}`);
        const feedback = document.getElementById(`feedback-${id}`);
        const correcta = document.getElementById(`correcta-${id}`);
        if (!input || !feedback) return;
        const valor = input.value.trim().toLowerCase();
        const respuestaCorrecta = correcta ? correcta.textContent.toLowerCase() : '';
        if (valor === '' || valor === '...') {
            feedback.textContent = '✏️ Escribe tu respuesta primero.';
            feedback.className = 'feedback-msg';
            return;
        }
        const normalize = (s) => s.replace(/\s+/g, ' ').trim();
        const esCorrecto = normalize(valor) === normalize(respuestaCorrecta) ||
                           normalize(valor).includes(normalize(respuestaCorrecta)) ||
                           normalize(respuestaCorrecta).includes(normalize(valor));
        if (esCorrecto) {
            feedback.textContent = '✅ ¡Correcto! Bien hecho.';
            feedback.className = 'feedback-msg correcto';
        } else {
            feedback.textContent = `❌ Incorrecto. La respuesta correcta es: "${respuestaCorrecta}"`;
            feedback.className = 'feedback-msg incorrecto';
        }
    };

    function renderCards(block) {
        const filtered = TECNICAS.filter(t => t.bloque === block);
        cardsGrid.innerHTML = filtered.map((t, idx) => {
            return `
                <div class="card-flip" data-id="${t.id}" onclick="this.classList.toggle('flipped')">
                    <div class="card-flip-inner">
                        <div class="card-front">
                            <div class="numero">${t.id}</div>
                            <span class="categoria">${t.categoria}</span>
                            <h3>${t.nombre}</h3>
                            <div class="teoria">${t.definicion}</div>
                            <div class="girar-indicador">↻ tocar para ver ejemplo y ejercicio</div>
                        </div>
                        <div class="card-back">
                            <div style="font-weight:600;color:#8bc4e0;margin-bottom:0.2rem;">🎨 ${t.nombre}</div>
                            <div class="definicion"><strong>📘 Teoría:</strong> ${t.definicion}</div>
                            <div class="sintaxis"><strong>📐 Fórmula:</strong> ${t.sintaxis}</div>
                            <div class="estructura"><strong>📊 Estructura:</strong> ${t.estructura}</div>
                            <div class="ejemplo"><strong>💡 Ejemplo:</strong> ${t.ejemplo}</div>
                            <div class="ejercicio">✏️ ${t.ejercicio}</div>
                            <div class="respuesta-area">
                                <input type="text" id="input-${t.id}" placeholder="Escribe tu respuesta..." />
                                <button class="btn-verificar" onclick="verificarRespuesta(${t.id})">Comprobar</button>
                            </div>
                            <div id="feedback-${t.id}" class="feedback-msg"></div>
                            <div id="correcta-${t.id}" style="display:none;">${t.respuesta}</div>
                            <div class="respuesta-correcta">✓ ${t.respuesta}</div>
                            <div class="etiqueta">técnica #${t.id} · ${t.categoria}</div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ========== QUIZ ==========
    let quizQuestions = [];
    let currentQuizIndex = 0;
    let score = 0;
    let answered = false;

    function generateQuiz() {
        const shuffled = [...TECNICAS].sort(() => Math.random() - 0.5);
        quizQuestions = shuffled.slice(0, 10).map(t => {
            const opts = [t.respuesta];
            const others = TECNICAS.filter(x => x.id !== t.id);
            const shuffledOthers = others.sort(() => Math.random() - 0.5);
            for (let i = 0; i < 3; i++) {
                if (shuffledOthers[i]) opts.push(shuffledOthers[i].respuesta);
            }
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return {
                pregunta: `📌 ${t.ejercicio} (técnica: ${t.nombre})`,
                opciones: opts,
                correcta: t.respuesta,
                id: t.id
            };
        });
        currentQuizIndex = 0;
        score = 0;
        answered = false;
        renderQuiz();
    }

    function renderQuiz() {
        if (!quizQuestions.length) return;
        const q = quizQuestions[currentQuizIndex];
        const total = quizQuestions.length;
        let html = `
            <div class="quiz-pregunta">
                <p>${q.pregunta}</p>
                <div class="quiz-opciones" id="quizOptions">
        `;
        q.opciones.forEach((op, idx) => {
            html += `<button data-idx="${idx}" onclick="checkAnswer(${idx})">${op}</button>`;
        });
        html += `</div>
                <div id="quizFeedback" style="margin-top:0.8rem;"></div>
                <div class="quiz-result" id="quizScore">Puntuación: ${score}/${total}</div>
            </div>
            <div class="quiz-controles">
                <button id="nextQuizBtn" disabled>→ Siguiente</button>
                <button onclick="generateQuiz()">🔄 Nuevo cuestionario</button>
            </div>
        `;
        quizContainer.innerHTML = html;
        answered = false;
        document.getElementById('nextQuizBtn').disabled = true;
    }

    window.checkAnswer = function(idx) {
        if (answered) return;
        const q = quizQuestions[currentQuizIndex];
        const buttons = document.querySelectorAll('#quizOptions button');
        buttons.forEach((b, i) => {
            b.disabled = true;
            if (i === idx) {
                const esCorrecta = q.opciones[idx] === q.correcta;
                b.classList.add(esCorrecta ? 'correct' : 'incorrect');
                if (esCorrecta) score++;
            }
            if (q.opciones[i] === q.correcta) {
                buttons[i].classList.add('correct');
            }
        });
        answered = true;
        document.getElementById('nextQuizBtn').disabled = false;
        document.getElementById('quizScore').textContent = `Puntuación: ${score}/${quizQuestions.length}`;
        const fb = document.getElementById('quizFeedback');
        fb.innerHTML = `<span style="background:#2a5a7a;color:#e0f0ff;padding:0.2rem 1rem;border-radius:40px;">✅ Respuesta correcta: ${q.correcta}</span>`;
    };

    document.addEventListener('click', function(e) {
        if (e.target.id === 'nextQuizBtn') {
            if (currentQuizIndex < quizQuestions.length - 1) {
                currentQuizIndex++;
                renderQuiz();
            } else {
                alert(`¡Cuestionario finalizado! Puntuación: ${score}/${quizQuestions.length}`);
                document.getElementById('nextQuizBtn').disabled = true;
            }
        }
    });

    // Inicializar
    renderCards(1);
    generateQuiz();
</script>
