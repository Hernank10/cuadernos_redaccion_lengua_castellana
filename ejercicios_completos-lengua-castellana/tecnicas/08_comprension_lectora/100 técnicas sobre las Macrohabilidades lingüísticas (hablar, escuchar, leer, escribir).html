<body>
<div class="container" id="app">
    <div class="header">
        <h1>🗣️ Macrohabilidades lingüísticas <span>100 técnicas</span></h1>
        <div class="sub">hablar · escuchar · leer · escribir · concurso docente</div>
    </div>

    <div class="block-nav" id="blockNav"></div>
    <div id="cardsGrid" class="cards-grid"></div>

    <div class="quiz-section" id="quizSection">
        <h2>🧠 Cuestionario <small>macrohabilidades lingüísticas</small></h2>
        <div id="quizContainer"></div>
    </div>
    <div class="footer">100 técnicas · Escribe tu respuesta en cada tarjeta y verifica · Aprende las macrohabilidades</div>

<script>
    // ================================================================
    // 100 TÉCNICAS sobre Macrohabilidades lingüísticas
    // Hablar, escuchar, leer, escribir (con sus subprocesos)
    // Cada tarjeta tiene ejercicio con respuesta verificable por el usuario
    // ================================================================
    const TECNICAS = [];

    // Bloque 1: Habilidad de hablar (25)
    const b1 = [
        { nombre: "Expresión oral", teoria: "Capacidad de comunicarse verbalmente con claridad.", ejemplo: "Dar una exposición oral.", ejercicio: "¿Qué macrohabilidad es 'hablar'?", respuesta: "hablar" },
        { nombre: "Fluidez verbal", teoria: "Capacidad de hablar con soltura y sin pausas excesivas.", ejemplo: "Hablar sin titubeos.", ejercicio: "¿Qué aspecto de hablar es la soltura?", respuesta: "fluidez" },
        { nombre: "Pronunciación", teoria: "Articulación correcta de los sonidos.", ejemplo: "Pronunciar claramente las palabras.", ejercicio: "¿Qué aspecto de hablar es la claridad?", respuesta: "pronunciación" },
        { nombre: "Entonación", teoria: "Variación del tono para expresar intención.", ejemplo: "Usar tono interrogativo o exclamativo.", ejercicio: "¿Qué aspecto de hablar es el tono?", respuesta: "entonación" },
        { nombre: "Adecuación al contexto", teoria: "Usar el registro apropiado según la situación.", ejemplo: "Hablar formalmente en una entrevista.", ejercicio: "¿Qué aspecto de hablar es el registro?", respuesta: "adecuación" },
        { nombre: "Coherencia oral", teoria: "Organizar las ideas de manera lógica al hablar.", ejemplo: "Contar un suceso en orden cronológico.", ejercicio: "¿Qué aspecto de hablar es la organización?", respuesta: "coherencia" },
        { nombre: "Cohesión oral", teoria: "Usar conectores para unir las ideas.", ejemplo: "Usar 'primero', 'luego', 'finalmente'.", ejercicio: "¿Qué aspecto de hablar usa conectores?", respuesta: "cohesión" },
        { nombre: "Vocabulario", teoria: "Usar palabras precisas y variadas.", ejemplo: "No repetir siempre las mismas palabras.", ejercicio: "¿Qué aspecto de hablar es el léxico?", respuesta: "vocabulario" },
        { nombre: "Argumentación oral", teoria: "Defender una postura con razones.", ejemplo: "Debatir sobre un tema.", ejercicio: "¿Qué habilidad oral es persuadir?", respuesta: "argumentación" },
        { nombre: "Narración oral", teoria: "Contar historias de forma atractiva.", ejemplo: "Narrar una anécdota.", ejercicio: "¿Qué habilidad oral es contar historias?", respuesta: "narración" },
        { nombre: "Descripción oral", teoria: "Describir personas, objetos o lugares.", ejemplo: "Describir un paisaje.", ejercicio: "¿Qué habilidad oral es detallar?", respuesta: "descripción" },
        { nombre: "Exposición oral", teoria: "Presentar información de forma clara.", ejemplo: "Exponer un tema en clase.", ejercicio: "¿Qué habilidad oral es informar?", respuesta: "exposición" },
        { nombre: "Diálogo", teoria: "Conversación entre dos o más personas.", ejemplo: "Mantener una conversación.", ejercicio: "¿Qué tipo de comunicación oral es la conversación?", respuesta: "diálogo" },
        { nombre: "Monólogo", teoria: "Discurso de una sola persona.", ejemplo: "Un discurso político.", ejercicio: "¿Qué tipo de comunicación oral es un discurso?", respuesta: "monólogo" },
        { nombre: "Debate", teoria: "Discusión argumentada entre dos posturas.", ejemplo: "Debatir sobre la educación.", ejercicio: "¿Qué tipo de comunicación oral es la discusión?", respuesta: "debate" },
        { nombre: "Entrevista", teoria: "Conversación con preguntas y respuestas.", ejemplo: "Entrevistar a un experto.", ejercicio: "¿Qué tipo de comunicación oral usa preguntas?", respuesta: "entrevista" },
        { nombre: "Presentación", teoria: "Exposición con apoyo visual.", ejemplo: "Presentar con diapositivas.", ejercicio: "¿Qué tipo de comunicación oral usa recursos visuales?", respuesta: "presentación" },
        { nombre: "Lectura en voz alta", teoria: "Leer un texto con expresión.", ejemplo: "Leer un cuento en voz alta.", ejercicio: "¿Qué habilidad oral es leer en voz alta?", respuesta: "lectura oral" },
        { nombre: "Improvisación", teoria: "Hablar sin preparación previa.", ejemplo: "Responder una pregunta inesperada.", ejercicio: "¿Qué habilidad oral es improvisar?", respuesta: "improvisación" },
        { nombre: "Parafrasear oralmente", teoria: "Decir lo mismo con otras palabras.", ejemplo: "Explicar una idea de otra forma.", ejercicio: "¿Qué habilidad oral es reformular?", respuesta: "paráfrasis" },
        { nombre: "Resumir oralmente", teoria: "Sintetizar información en pocas palabras.", ejemplo: "Resumir una noticia.", ejercicio: "¿Qué habilidad oral es condensar?", respuesta: "resumen" },
        { nombre: "Opinar oralmente", teoria: "Expresar una opinión personal.", ejemplo: "Dar tu punto de vista.", ejercicio: "¿Qué habilidad oral es dar una opinión?", respuesta: "opinión" },
        { nombre: "Preguntar oralmente", teoria: "Formular preguntas claras.", ejemplo: "Preguntar para aclarar una duda.", ejercicio: "¿Qué habilidad oral es preguntar?", respuesta: "formulación de preguntas" },
        { nombre: "Responder oralmente", teoria: "Dar respuestas adecuadas.", ejemplo: "Contestar una pregunta.", ejercicio: "¿Qué habilidad oral es responder?", respuesta: "respuesta" },
        { nombre: "Turno de palabra", teoria: "Saber cuándo hablar y escuchar.", ejemplo: "Esperar el turno en una conversación.", ejercicio: "¿Qué habilidad oral es respetar turnos?", respuesta: "turno de palabra" },
    ];
    b1.forEach((t, i) => TECNICAS.push({ id: i+1, bloque: 1, categoria: "hablar", ...t }));

    // Bloque 2: Habilidad de escuchar (25)
    const b2 = [
        { nombre: "Comprensión auditiva", teoria: "Capacidad de entender lo que se oye.", ejemplo: "Entender una conferencia.", ejercicio: "¿Qué macrohabilidad es 'escuchar'?", respuesta: "escuchar" },
        { nombre: "Escucha activa", teoria: "Prestar atención y mostrar interés.", ejemplo: "Asentir y hacer preguntas.", ejercicio: "¿Qué tipo de escucha es participativa?", respuesta: "escucha activa" },
        { nombre: "Identificación de ideas principales", teoria: "Reconocer la idea más importante al escuchar.", ejemplo: "Captar la tesis de un discurso.", ejercicio: "¿Qué habilidad de escucha identifica lo esencial?", respuesta: "identificación de ideas principales" },
        { nombre: "Identificación de detalles", teoria: "Reconocer información específica.", ejemplo: "Escuchar una fecha o nombre.", ejercicio: "¿Qué habilidad de escucha capta detalles?", respuesta: "identificación de detalles" },
        { nombre: "Inferencia auditiva", teoria: "Deducir información no explícita.", ejemplo: "Inferir el estado de ánimo por el tono.", ejercicio: "¿Qué habilidad de escucha deduce?", respuesta: "inferencia" },
        { nombre: "Toma de apuntes", teoria: "Registrar información mientras se escucha.", ejemplo: "Apuntar lo esencial de una clase.", ejercicio: "¿Qué habilidad de escucha registra información?", respuesta: "toma de apuntes" },
        { nombre: "Resumen auditivo", teoria: "Sintetizar lo escuchado.", ejemplo: "Resumir una noticia radiofónica.", ejercicio: "¿Qué habilidad de escucha condensa?", respuesta: "resumen" },
        { nombre: "Paráfrasis auditiva", teoria: "Repetir con otras palabras lo escuchado.", ejemplo: "Explicar lo que dijo el profesor.", ejercicio: "¿Qué habilidad de escucha reformula?", respuesta: "paráfrasis" },
        { nombre: "Preguntas sobre lo escuchado", teoria: "Formular preguntas sobre el contenido.", ejemplo: "Preguntar sobre un punto confuso.", ejercicio: "¿Qué habilidad de escucha genera preguntas?", respuesta: "cuestionamiento" },
        { nombre: "Evaluación crítica auditiva", teoria: "Juzgar la validez de lo escuchado.", ejemplo: "Evaluar si el argumento es sólido.", ejercicio: "¿Qué habilidad de escucha evalúa?", respuesta: "evaluación crítica" },
        { nombre: "Detección de sesgos", teoria: "Reconocer parcialidad en el discurso.", ejemplo: "Identificar propaganda.", ejercicio: "¿Qué habilidad de escucha detecta sesgos?", respuesta: "detección de sesgos" },
        { nombre: "Interpretación de tonos", teoria: "Interpretar emociones por el tono.", ejemplo: "Reconocer sarcasmo.", ejercicio: "¿Qué habilidad de escucha interpreta tonos?", respuesta: "interpretación de tonos" },
        { nombre: "Comprensión de instrucciones", teoria: "Entender y seguir instrucciones orales.", ejemplo: "Seguir una receta de cocina.", ejercicio: "¿Qué habilidad de escucha sigue instrucciones?", respuesta: "comprensión de instrucciones" },
        { nombre: "Escucha empática", teoria: "Escuchar comprendiendo las emociones.", ejemplo: "Escuchar a alguien que está triste.", ejercicio: "¿Qué tipo de escucha es comprensiva?", respuesta: "escucha empática" },
        { nombre: "Escucha discriminativa", teoria: "Distinguir entre sonidos y palabras.", ejemplo: "Diferenciar entre 'b' y 'v'.", ejercicio: "¿Qué tipo de escucha distingue sonidos?", respuesta: "escucha discriminativa" },
        { nombre: "Escucha global", teoria: "Comprender el mensaje general.", ejemplo: "Captar la idea principal de una charla.", ejercicio: "¿Qué tipo de escucha es global?", respuesta: "escucha global" },
        { nombre: "Escucha selectiva", teoria: "Prestar atención a lo relevante.", ejemplo: "Escuchar solo los datos importantes.", ejercicio: "¿Qué tipo de escucha es selectiva?", respuesta: "escucha selectiva" },
        { nombre: "Escucha interpretativa", teoria: "Interpretar el mensaje más allá de lo literal.", ejemplo: "Interpretar una metáfora.", ejercicio: "¿Qué tipo de escucha interpreta?", respuesta: "escucha interpretativa" },
        { nombre: "Escucha crítica", teoria: "Evaluar y cuestionar lo escuchado.", ejemplo: "Preguntarse si es verdad.", ejercicio: "¿Qué tipo de escucha es crítica?", respuesta: "escucha crítica" },
        { nombre: "Escucha recreativa", teoria: "Escuchar por placer.", ejemplo: "Escuchar música o un audiolibro.", ejercicio: "¿Qué tipo de escucha es por disfrute?", respuesta: "escucha recreativa" },
        { nombre: "Escucha focalizada", teoria: "Concentrarse en un solo mensaje.", ejemplo: "Escuchar una conferencia sin distraerse.", ejercicio: "¿Qué tipo de escucha es concentrada?", respuesta: "escucha focalizada" },
        { nombre: "Escucha periférica", teoria: "Prestar atención a lo que pasa alrededor.", ejemplo: "Escuchar una conversación de fondo.", ejercicio: "¿Qué tipo de escucha es ambiental?", respuesta: "escucha periférica" },
        { nombre: "Escucha para aprender", teoria: "Escuchar con el fin de adquirir conocimiento.", ejemplo: "Escuchar una clase.", ejercicio: "¿Qué tipo de escucha es para aprender?", respuesta: "escucha académica" },
        { nombre: "Escucha para opinar", teoria: "Escuchar para formar una opinión.", ejemplo: "Escuchar un debate.", ejercicio: "¿Qué tipo de escucha es para formarse una idea?", respuesta: "escucha reflexiva" },
        { nombre: "Escucha y retroalimentación", teoria: "Escuchar y dar respuesta.", ejemplo: "Responder a lo que se escucha.", ejercicio: "¿Qué tipo de escucha implica respuesta?", respuesta: "escucha interactiva" },

    b2.forEach((t, i) => TECNICAS.push({ id: i+26, bloque: 2, categoria: "escuchar", ...t }));

    // Bloque 4: Habilidad de escribir (25)
    const b4 = [

        { nombre: "Planificación de la escritura", teoria: "Organizar ideas antes de escribir.", ejemplo: "Hacer un esquema.", ejercicio: "¿Qué etapa de escritura es la planificación?", respuesta: "planificación" },
        { nombre: "Textualización", teoria: "Escribir el texto en sí.", ejemplo: "Redactar el borrador.", ejercicio: "¿Qué etapa de escritura es la redacción?", respuesta: "textualización" },
        { nombre: "Revisión", teoria: "Corregir y mejorar el texto.", ejemplo: "Revisar ortografía y estilo.", ejercicio: "¿Qué etapa de escritura es la corrección?", respuesta: "revisión" },
        { nombre: "Edición", teoria: "Preparar la versión final.", ejemplo: "Dar formato al texto.", ejercicio: "¿Qué etapa de escritura es la versión final?", respuesta: "edición" },
        { nombre: "Coherencia escrita", teoria: "Las ideas tienen sentido y están organizadas.", ejemplo: "Escribir con introducción, desarrollo y conclusión.", ejercicio: "¿Qué aspecto de escritura es la organización?", respuesta: "coherencia" },
        { nombre: "Cohesión escrita", teoria: "Uso de conectores y referentes.", ejemplo: "Usar 'además', 'por tanto'.", ejercicio: "¿Qué aspecto de escritura usa enlaces?", respuesta: "cohesión" },

        { nombre: "Redacción", teoria: "Escribir de forma clara y fluida.", ejemplo: "Escribir un párrafo bien estructurado.", ejercicio: "¿Qué habilidad de escritura es redactar?", respuesta: "redacción" },

        { nombre: "Descripción escrita", teoria: "Describir personas, objetos o lugares.", ejemplo: "Describir un paisaje.", ejercicio: "¿Qué tipo de texto describe?", respuesta: "descripción" },
        { nombre: "Argumentación escrita", teoria: "Defender una postura con razones.", ejemplo: "Escribir un ensayo argumentativo.", ejercicio: "¿Qué tipo de texto argumenta?", respuesta: "argumentación" },
        { nombre: "Exposición escrita", teoria: "Informar sobre un tema.", ejemplo: "Escribir un artículo informativo.", ejercicio: "¿Qué tipo de texto expone?", respuesta: "exposición" },
        { nombre: "Carta", teoria: "Texto con emisor y receptor definidos.", ejemplo: "Escribir una carta formal.", ejercicio: "¿Qué tipo de texto es epistolar?", respuesta: "carta" },
        { nombre: "Correo electrónico", teoria: "Texto digital con estructura similar a la carta.", ejemplo: "Escribir un correo formal.", ejercicio: "¿Qué tipo de texto es digital?", respuesta: "correo electrónico" },
        { nombre: "Informe", teoria: "Texto que presenta datos y análisis.", ejemplo: "Escribir un informe de investigación.", ejercicio: "¿Qué tipo de texto es informativo?", respuesta: "informe" },
        { nombre: "Resumen escrito", teoria: "Sintetizar un texto más largo.", ejemplo: "Resumir un libro.", ejercicio: "¿Qué técnica de escritura condensa?", respuesta: "resumen" },
        { nombre: "Ensayo", teoria: "Texto breve sobre un tema con opinión.", ejemplo: "Escribir un ensayo literario.", ejercicio: "¿Qué tipo de texto es reflexivo?", respuesta: "ensayo" },
        { nombre: "Poema", teoria: "Texto con ritmo y métrica.", ejemplo: "Escribir un poema.", ejercicio: "¿Qué tipo de texto es poético?", respuesta: "poema" },
        { nombre: "Guion", teoria: "Texto para teatro o cine.", ejemplo: "Escribir un guion teatral.", ejercicio: "¿Qué tipo de texto es dramático?", respuesta: "guion" },
        { nombre: "Artículo", teoria: "Texto periodístico o académico.", ejemplo: "Escribir un artículo de opinión.", ejercicio: "¿Qué tipo de texto es periodístico?", respuesta: "artículo" },
        { nombre: "Blog", teoria: "Texto digital con publicaciones periódicas.", ejemplo: "Escribir en un blog.", ejercicio: "¿Qué tipo de texto es digital y personal?", respuesta: "blog" },
        { nombre: "Reescritura", teoria: "Mejorar un texto después de la corrección.", ejemplo: "Reescribir un borrador.", ejercicio: "¿Qué técnica de escritura mejora un texto?", respuesta: "reescritura" },

    b4.forEach((t, i) => TECNICAS.push({ id: i+76, bloque: 4, categoria: "escribir", ...t }));

    TECNICAS.sort((a,b) => a.id - b.id);

    // ========== RENDER ==========
    const blockNav = document.getElementById('blockNav');
    const cardsGrid = document.getElementById('cardsGrid');
    const quizContainer = document.getElementById('quizContainer');

    let currentBlock = 1;
    const BLOCK_NAMES = ['', 'Hablar', 'Escuchar', 'Leer', 'Escribir'];

    for (let i = 1; i <= 4; i++) {
        const btn = document.createElement('button');
        btn.textContent = `${i}. ${BLOCK_NAMES[i]}`;
        btn.dataset.block = i;
        btn.addEventListener('click', () => {
            currentBlock = i;
            renderCards(i);
            updateNav(i);
        });
        blockNav.appendChild(btn);
    }

    function updateNav(block) {
        document.querySelectorAll('.block-nav button').forEach(b => b.classList.toggle('active', parseInt(b.dataset.block) === block));
    }
    updateNav(1);

    window.verificarRespuesta = function(id) {
        const input = document.getElementById(`input-${id}`);
        const feedback = document.getElementById(`feedback-${id}`);
        const correcta = document.getElementById(`correcta-${id}`);
        if (!input || !feedback) return;
        const valor = input.value.trim().toLowerCase();
        const respuestaCorrecta = correcta ? correcta.textContent.toLowerCase() : '';
        if (valor === '' || valor === '...') {
            feedback.textContent = '✏️ Escribe tu respuesta primero.';
            feedback.className = 'feedback-msg';
            return;
        }
        const normalize = (s) => s.replace(/\s+/g, ' ').trim();
        const esCorrecto = normalize(valor) === normalize(respuestaCorrecta) ||
                           normalize(valor).includes(normalize(respuestaCorrecta)) ||
                           normalize(respuestaCorrecta).includes(normalize(valor));
        if (esCorrecto) {
            feedback.textContent = '✅ ¡Correcto! Bien hecho.';
            feedback.className = 'feedback-msg correcto';
        } else {
            feedback.textContent = `❌ Incorrecto. La respuesta correcta es: "${respuestaCorrecta}"`;
            feedback.className = 'feedback-msg incorrecto';
        }
    };

    function renderCards(block) {
        const filtered = TECNICAS.filter(t => t.bloque === block);
        cardsGrid.innerHTML = filtered.map((t, idx) => {
            return `
                <div class="card-flip" data-id="${t.id}" onclick="this.classList.toggle('flipped')">
                    <div class="card-flip-inner">
                        <div class="card-front">
                            <div class="numero">${t.id}</div>
                            <span class="categoria">${t.categoria}</span>
                            <h3>${t.nombre}</h3>
                            <div class="teoria">${t.teoria}</div>
                            <div class="girar-indicador">↻ tocar para practicar</div>
                        </div>
                        <div class="card-back">
                            <div style="font-weight:600;color:#1F4E5F;margin-bottom:0.2rem;">🗣️ ${t.nombre}</div>
                            <div class="ejemplo"><strong>Ejemplo:</strong> ${t.ejemplo}</div>
                            <div class="ejercicio">✏️ ${t.ejercicio}</div>
                            <div class="respuesta-area">
                                <input type="text" id="input-${t.id}" placeholder="Escribe tu respuesta..." />
                                <button class="btn-verificar" onclick="verificarRespuesta(${t.id})">Comprobar</button>
                            </div>
                            <div id="feedback-${t.id}" class="feedback-msg"></div>
                            <div id="correcta-${t.id}" style="display:none;">${t.respuesta}</div>
                            <div class="respuesta-correcta">✓ ${t.respuesta}</div>
                            <div class="etiqueta">técnica #${t.id} · ${t.categoria}</div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ========== QUIZ ==========
    let quizQuestions = [];
    let currentQuizIndex = 0;
    let score = 0;
    let answered = false;

    function generateQuiz() {
        const shuffled = [...TECNICAS].sort(() => Math.random() - 0.5);
        quizQuestions = shuffled.slice(0, 10).map(t => {
            const opts = [t.respuesta];
            const others = TECNICAS.filter(x => x.id !== t.id);
            const shuffledOthers = others.sort(() => Math.random() - 0.5);
            for (let i = 0; i < 3; i++) {
                if (shuffledOthers[i]) opts.push(shuffledOthers[i].respuesta);
            }
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return {
                pregunta: `📌 ${t.ejercicio} (técnica: ${t.nombre})`,
                opciones: opts,
                correcta: t.respuesta,
                id: t.id
            };
        });
        currentQuizIndex = 0;
        score = 0;
        answered = false;
        renderQuiz();
    }

    function renderQuiz() {
        if (!quizQuestions.length) return;
        const q = quizQuestions[currentQuizIndex];
        const total = quizQuestions.length;
        let html = `
            <div class="quiz-pregunta">
                <p>${q.pregunta}</p>
                <div class="quiz-opciones" id="quizOptions">
        `;
        q.opciones.forEach((op, idx) => {
            html += `<button data-idx="${idx}" onclick="checkAnswer(${idx})">${op}</button>`;
        });
        html += `</div>
                <div id="quizFeedback" style="margin-top:0.8rem;"></div>
                <div class="quiz-result" id="quizScore">Puntuación: ${score}/${total}</div>
            </div>
            <div class="quiz-controles">
                <button id="nextQuizBtn" disabled>→ Siguiente</button>
                <button onclick="generateQuiz()">🔄 Nuevo cuestionario</button>
            </div>
        `;
        quizContainer.innerHTML = html;
        answered = false;
        document.getElementById('nextQuizBtn').disabled = true;
    }

    window.checkAnswer = function(idx) {
        if (answered) return;
        const q = quizQuestions[currentQuizIndex];
        const buttons = document.querySelectorAll('#quizOptions button');
        buttons.forEach((b, i) => {
            b.disabled = true;
            if (i === idx) {
                const esCorrecta = q.opciones[idx] === q.correcta;
                b.classList.add(esCorrecta ? 'correct' : 'incorrect');
                if (esCorrecta) score++;
            }
            if (q.opciones[i] === q.correcta) {
                buttons[i].classList.add('correct');
            }
        });
        answered = true;
        document.getElementById('nextQuizBtn').disabled = false;
        document.getElementById('quizScore').textContent = `Puntuación: ${score}/${quizQuestions.length}`;
        const fb = document.getElementById('quizFeedback');
        fb.innerHTML = `<span style="background:#1F4E5F;color:white;padding:0.2rem 1rem;border-radius:40px;">✅ Respuesta correcta: ${q.correcta}</span>`;
    };

    document.addEventListener('click', function(e) {
        if (e.target.id === 'nextQuizBtn') {
            if (currentQuizIndex < quizQuestions.length - 1) {
                currentQuizIndex++;
                renderQuiz();
            } else {
                alert(`¡Cuestionario finalizado! Puntuación: ${score}/${quizQuestions.length}`);
                document.getElementById('nextQuizBtn').disabled = true;
            }
        }
    });

    // Inicializar
    renderCards(1);
    generateQuiz();
</script>
