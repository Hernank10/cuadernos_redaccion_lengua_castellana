        .btn-complete { background: var(--oro-antiguo); color: #1f1a16; border: none; }

        .progress-unit { background: #cfc2ae; border-radius: 30px; height: 6px; margin: 0.7rem 0; }
        .respuesta-correcta {

        }
        .respuesta-correcta.visible { display: block; }
        @media (max-width: 780px) {
            .tech-layout { flex-direction: column; padding: 1rem; }

            .sidebar-lux { width: 280px; left: -280px; }
        }
    </style>

        <h1>Retórica Clásica <span style="font-size: 1.2rem;">figuras retóricas · persuasión · estilo</span></h1>

<script>
    // ========== DATOS COMPLETOS DE 100 TÉCNICAS DE RETÓRICA ==========
    const tecnicasRetorica = [
        {id:1, nombre:"Retórica clásica: definición y partes del discurso", teoria:"La retórica clásica es el arte de la persuasión mediante el lenguaje. Sus cinco partes canónicas son: inventio (búsqueda de argumentos), dispositio (organización), elocutio (estilo y figuras), memoria (memorización), actio (pronunciación y gestos).", ejemplo:"Un abogado en un juicio: 1) inventio: selecciona pruebas; 2) dispositio: ordena; 3) elocutio: usa metáforas; 4) memoria: memoriza; 5) actio: gesticula.", ejercicio:"Explica las cinco partes canónicas de la retórica clásica.", respuesta:"1) Inventio: búsqueda de argumentos. 2) Dispositio: organización del discurso. 3) Elocutio: estilo y figuras. 4) Memoria: memorización. 5) Actio: pronunciación y gestos."},
        {id:2, nombre:"Ethos, pathos y logos (Aristóteles)", teoria:"Tres modos de persuasión: ethos (credibilidad del orador), pathos (apelación a las emociones), logos (argumentación lógica). Un discurso eficaz combina los tres.", ejemplo:"'Como médico con 20 años de experiencia (ethos), imaginen a sus hijos protegidos (pathos). Los datos muestran eficacia del 95% (logos).'", ejercicio:"Analiza el ethos, pathos y logos en un discurso político conocido.", respuesta:"Ejemplo: 'He trabajado por esta comunidad 30 años (ethos). ¿Quieren un futuro mejor? (pathos). Las cifras de empleo han mejorado (logos).'"},
        {id:3, nombre:"Entimema: silogismo retórico", teoria:"El entimema es un silogismo en el que una premisa está implícita porque es conocida por el auditorio. Ejemplo: 'Sócrates es mortal porque es hombre' (premisa implícita: todos los hombres son mortales).", ejemplo:"'No podemos confiar en él, porque es político' (premisa implícita: los políticos no son confiables).", ejercicio:"Convierte el siguiente silogismo en entimema: 'Todos los humanos son mortales. Los filósofos son humanos. Luego los filósofos son mortales.'", respuesta:"'Los filósofos son mortales' (se omite 'todos los humanos son mortales' o 'los filósofos son humanos')."},
        {id:4, nombre:"Lugares comunes (topoi)", teoria:"Los lugares comunes son esquemas argumentativos universales: definición, comparación, causa-efecto, autoridad, ejemplo, analogía. Ayudan a encontrar argumentos.", ejemplo:"Ejemplo de causa-efecto: 'Si fumas, tendrás cáncer.' De autoridad: 'La OMS recomienda vacunarse.'", ejercicio:"Aplica el tópico de comparación para argumentar que el español es una lengua importante.", respuesta:"'El español tiene más hablantes nativos que el francés y el alemán juntos. Si la importancia se mide por número de hablantes, el español es muy importante.'"},
        {id:5, nombre:"Dispositio: partes del discurso (exordio, narración, argumentación, peroración)", teoria:"El discurso clásico tiene: exordio (introducción, capta atención), narratio (exposición de hechos), propositio (tesis), argumentatio (argumentos a favor y en contra), refutatio (respuesta a objeciones), peroratio (conclusión, apela a emociones).", ejemplo:"Exordio: 'Señores jueces, estamos ante un hecho que conmueve la conciencia.' Narratio: 'El 15 de marzo, el acusado entró...'", ejercicio:"Escribe el exordio y la peroración de un discurso sobre la importancia de la educación.", respuesta:"Exordio: 'Imaginen un mundo sin escuelas.' Peroración: 'Por eso, invirtamos en educación. Por un futuro mejor, eduquemos a nuestros niños.'"},
        {id:6, nombre:"Elocutio: niveles de estilo (grave, medio, humilde)", teoria:"Cicerón distingue tres niveles: genus grave (estilo elevado, para discursos solemnes), genus medium (estilo medio, para enseñar o deleitar), genus humile (estilo sencillo, para instruir con claridad).", ejemplo:"Grave: 'Surcó los mares tempestuosos el intrépido navegante.' Medio: 'El explorador viajó por océanos peligrosos.' Humilde: 'El hombre cruzó el mar.'", ejercicio:"Reescribe 'El atleta ganó la carrera' en los tres niveles de estilo.", respuesta:"Grave: 'El héroe olímpico traspasó la meta en glorioso triunfo.' Medio: 'El atleta se esforzó y ganó.' Humilde: 'El corredor ganó.'"},
        {id:7, nombre:"Figuras retóricas: definición y clasificación", teoria:"Las figuras retóricas son recursos lingüísticos que desvían el uso normal del lenguaje para lograr un efecto estético o persuasivo. Se clasifican en figuras de pensamiento, de dicción, de construcción, de repetición y tropos.", ejemplo:"Ironía (pensamiento), aliteración (dicción), hipérbaton (construcción), anáfora (repetición), metáfora (tropo).", ejercicio:"Clasifica: 'Las perlas de tu boca', '¡Ay de mí!', 'El campo triste amaneció'.", respuesta:"'Las perlas de tu boca' → tropo (metáfora). '¡Ay de mí!' → figura de pensamiento (exclamación). 'El campo triste amaneció' → tropo (personificación)."},
        {id:8, nombre:"Figuras de pensamiento: exclamación, interrogación retórica", teoria:"La exclamación expresa emoción intensa con signos ¡!. La interrogación retórica es una pregunta que no espera respuesta, sino que afirma enfáticamente.", ejemplo:"Exclamación: '¡Qué hermosa es la libertad!' Interrogación retórica: '¿Quién puede dudar de la importancia de la educación?'", ejercicio:"Convierte 'La paz es valiosa' en exclamación e interrogación retórica.", respuesta:"Exclamación: '¡Qué valiosa es la paz!' Interrogación retórica: '¿Quién puede negar el valor de la paz?'"},
        {id:9, nombre:"Figuras de pensamiento: apóstrofe", teoria:"El apóstrofe dirige la palabra a un ser ausente, muerto o inanimado como si pudiera responder. Busca intensidad emocional.", ejemplo:"'Oh, muerte, ¿por qué te llevaste a mi amado?' 'Tú, libertad, que aún esperamos...'", ejercicio:"Escribe un apóstrofe dirigido a la luna.", respuesta:"'Luna, testigo de desvelos, ilumina mi soledad.'"},
        {id:10, nombre:"Figuras de pensamiento: prosopopeya o personificación", teoria:"La prosopopeya atribuye cualidades humanas a seres inanimados, animales o ideas abstractas.", ejemplo:"'La noche vestía su manto de estrellas.' 'El viento susurraba.'", ejercicio:"Escribe una personificación del silencio.", respuesta:"'El silencio se sentó a mi lado y me envolvió con su manto frío.'"},
        {id:11, nombre:"Figuras de pensamiento: ironía", teoria:"La ironía consiste en decir lo contrario de lo que se quiere expresar, o valorar negativamente mediante una expresión positiva.", ejemplo:"'¡Qué hermoso día!' durante una tormenta. 'Eres todo un genio' a quien comete un error.", ejercicio:"Escribe una oración irónica sobre alguien que llega tarde.", respuesta:"'¡Qué puntual eres! Siempre llegas antes que el sol del día siguiente.'"},
        {id:12, nombre:"Figuras de pensamiento: hipérbole", teoria:"La hipérbole exagera una cualidad o magnitud para crear énfasis, humor o emoción.", ejemplo:"'Te lo he dicho mil veces.' 'Estoy muerto de cansancio.'", ejercicio:"Transforma 'Estaba cansado' en hipérbole.", respuesta:"'Estaba tan cansado que podría dormir un año entero.'"},
        {id:13, nombre:"Figuras de pensamiento: antítesis y contraste", teoria:"La antítesis yuxtapone términos o ideas opuestas en una estructura paralela para crear un contraste enfático.", ejemplo:"'El hombre propone, Dios dispone.' 'Ir y venir, vivir y morir.'", ejercicio:"Construye una antítesis sobre 'conocimiento e ignorancia'.", respuesta:"'El conocimiento abre puertas; la ignorancia las cierra. El sabio sabe que no sabe; el ignorante cree que todo lo sabe.'"},
        {id:14, nombre:"Figuras de pensamiento: paradoja", teoria:"La paradoja es una afirmación aparentemente contradictoria que encierra una verdad profunda.", ejemplo:"'Solo sé que no sé nada' (Sócrates). 'Cuanto más das, más tienes.'", ejercicio:"Construye una paradoja sobre el silencio.", respuesta:"'El silencio es la palabra más elocuente.'"},
        {id:15, nombre:"Figuras de pensamiento: oxímoron", teoria:"El oxímoron une dos términos semánticamente opuestos en un mismo sintagma. Es una paradoja condensada en dos palabras.", ejemplo:"'oscuridad luminosa', 'silencio atronador', 'dulce amargura'", ejercicio:"Crea tres oxímoros originales.", respuesta:"'Conexión aislada', 'privacidad pública', 'descanso agotador'."},
        {id:16, nombre:"Figuras de pensamiento: eufemismo y disfemismo", teoria:"El eufemismo sustituye un término tabú por uno neutro. El disfemismo busca crudeza.", ejemplo:"Eufemismo: 'falleció' por 'murió'. Disfemismo: 'estiró la pata'.", ejercicio:"Reemplaza 'despedir a un empleado' por eufemismo y disfemismo.", respuesta:"Eufemismo: 'desvinculación laboral'. Disfemismo: 'echar'."},
        {id:17, nombre:"Figuras de pensamiento: lítotes", teoria:"La lítotes afirma algo negando lo contrario, produciendo atenuación o modestia.", ejemplo:"'No está mal' (está bien). 'No carece de méritos' (tiene méritos).", ejercicio:"Reescribe 'Es un texto excelente' como lítotes.", respuesta:"'El texto no carece de virtudes.'"},
        {id:18, nombre:"Figuras de dicción: aliteración", teoria:"La aliteración repite un mismo sonido al inicio de palabras cercanas, creando musicalidad y ritmo.", ejemplo:"'El susurro suave del silencio.' 'Tres tristes tigres.'", ejercicio:"Crea una oración con aliteración de la letra 'r'.", respuesta:"'El ronco rugido del rojo motor rompió la rutina.'"},
        {id:19, nombre:"Figuras de dicción: onomatopeya", teoria:"La onomatopeya imita sonidos de la naturaleza, animales u objetos.", ejemplo:"'El reloj hacía tic-tac.' 'El viento silbaba.'", ejercicio:"Escribe una oración con tres onomatopeyas.", respuesta:"'El gato maulló, el perro ladró y la puerta crujió.'"},
        {id:20, nombre:"Figuras de dicción: paranomasia", teoria:"La paranomasia juega con palabras de sonido similar pero significado diferente (parónimos).", ejemplo:"'Casa' y 'caza', 'bienes' y 'vienes'.", ejercicio:"Crea una oración con 'casa' y 'caza'.", respuesta:"'El cazador volvió a su casa después de la caza.'"},
        {id:21, nombre:"Figuras de dicción: calambur", teoria:"El calambur reúne sílabas de dos o más palabras para crear doble sentido. Se basa en reasignación de límites entre palabras.", ejemplo:"'Entre el clavel y la rosa, su majestad escoja' (escoja/es coja).", ejercicio:"Crea un calambur con 'semántica' y 'semana'.", respuesta:"'Semana tica: la que estudia semántica.'"},
        {id:22, nombre:"Figuras de dicción: retruécano", teoria:"El retruécano repite una misma frase con palabras invertidas para crear un nuevo significado.", ejemplo:"'No hay camino para la paz, la paz es el camino.'", ejercicio:"Construye un retruécano con 'vida' y 'muerte'.", respuesta:"'La muerte es el precio de la vida; la vida es el camino hacia la muerte.'"},
        {id:23, nombre:"Figuras de construcción: hipérbaton", teoria:"El hipérbaton altera el orden sintáctico canónico para enfatizar o lograr efecto poético.", ejemplo:"'Del tiempo y sus mudanzas tratará este capítulo.'", ejercicio:"Reescribe 'El poeta canta al amor' con hipérbaton.", respuesta:"'Al amor canta el poeta.'"},
        {id:24, nombre:"Figuras de construcción: asíndeton", teoria:"El asíndeton omite conjunciones entre elementos de una enumeración, creando rapidez o acumulación.", ejemplo:"'Llegué, vi, vencí.' 'Corre, salta, vuela.'", ejercicio:"Reescribe 'Compré pan, y leche, y queso' en asíndeton.", respuesta:"'Compré pan, leche, queso.'"},
        {id:25, nombre:"Figuras de construcción: polisíndeton", teoria:"El polisíndeton repite conjunciones entre elementos, creando lentitud o énfasis.", ejemplo:"'Y el mundo sigue y sigue y sigue.'", ejercicio:"Reescribe 'Estudia, trabaja, descansa' en polisíndeton.", respuesta:"'Estudia y trabaja y descansa.'"},
        {id:26, nombre:"Figuras de construcción: anáfora", teoria:"La anáfora repite una o varias palabras al inicio de frases consecutivas, creando ritmo y énfasis.", ejemplo:"'El mar, el mar, el mar. Siempre el mar.'", ejercicio:"Escribe una anáfora con la palabra 'lengua'.", respuesta:"'La lengua nos define. La lengua nos conecta. La lengua es nuestra identidad.'"},
        {id:27, nombre:"Figuras de construcción: epífora", teoria:"La epífora repite una o varias palabras al final de frases consecutivas.", ejemplo:"'Estudia para aprender, trabaja para aprender, vive para aprender.'", ejercicio:"Escribe una epífora con la palabra 'importante'.", respuesta:"'La claridad es importante. La precisión es importante. La brevedad es importante.'"},
        {id:28, nombre:"Figuras de construcción: anadiplosis", teoria:"La anadiplosis repite la última palabra de una cláusula al inicio de la siguiente.", ejemplo:"'Todo lo vence el amor, el amor vence todo.'", ejercicio:"Crea una anadiplosis con tres eslabones.", respuesta:"'El conocimiento da poder, el poder da responsabilidad, la responsabilidad da sabiduría.'"},
        {id:29, nombre:"Figuras de construcción: quiasmo", teoria:"El quiasmo cruza dos términos o ideas en una estructura AB/BA, creando un efecto de espejo.", ejemplo:"'No preguntes qué puede hacer tu país por ti, sino qué puedes hacer tú por tu país.'", ejercicio:"Construye un quiasmo con 'aprender' y 'enseñar'.", respuesta:"'Para aprender, enseña; para enseñar, aprende.'"},
        {id:30, nombre:"Figuras de construcción: zeugma y elipsis", teoria:"El zeugma es la elipsis de un verbo que se sobreentiende de una cláusula anterior. La elipsis omite elementos recuperables.", ejemplo:"'Unos estudian; otros, trabajan.' (elipsis de 'estudian')", ejercicio:"Reescribe 'María estudia historia y Juan estudia literatura' con zeugma.", respuesta:"'María estudia historia y Juan, literatura.'"},
        {id:31, nombre:"Figuras de construcción: pleonasmo", teoria:"El pleonasmo añade palabras redundantes para enfatizar.", ejemplo:"'Lo vi con mis propios ojos.' 'Subir arriba.'", ejercicio:"Identifica si el pleonasmo es intencional o vicioso: 'Era un círculo perfecto redondo'.", respuesta:"Vicioso (redundante), porque 'círculo' ya es redondo."},
        {id:32, nombre:"Figuras de construcción: epíteto", teoria:"El epíteto es un adjetivo que expresa una cualidad inherente al sustantivo, sin añadir información nueva.", ejemplo:"'blanca nieve', 'verde prado', 'roja sangre'", ejercicio:"Escribe una oración con tres epítetos.", respuesta:"'La blanca nieve cubría el verde prado bajo el frío invierno.'"},
        {id:33, nombre:"Tropos: metáfora", teoria:"La metáfora identifica un objeto (término real) con otro (término imaginario) con el que guarda semejanza. Es una comparación implícita.", ejemplo:"'El tiempo es oro.' 'Sus cabellos eran hebras de oro.'", ejercicio:"Convierte la comparación 'El sol brilla como un diamante' en metáfora.", respuesta:"'El sol es un diamante.'"},
        {id:34, nombre:"Tropos: metonimia", teoria:"La metonimia designa un concepto con el nombre de otro con el que tiene relación de contigüidad (causa-efecto, autor-obra, continente-contenido).", ejemplo:"'Leer a Cervantes' (autor por obra). 'La Casa Blanca anunció' (lugar por gobierno).", ejercicio:"Identifica la metonimia en: 'El museo compró un Goya.'", respuesta:"'un Goya' (productor por producto: el pintor Goya representa su cuadro)."},
        {id:35, nombre:"Tropos: sinécdoque", teoria:"La sinécdoque designa un todo por la parte (o viceversa), o un género por la especie.", ejemplo:"'Necesitamos manos' (parte por todo, manos = trabajadores).", ejercicio:"Identifica la sinécdoque en: 'El público aplaudió.'", respuesta:"'El público' (colectivo por los individuos, todo por partes)."},
        {id:36, nombre:"Tropos: sinestesia", teoria:"La sinestesia atribuye a un sentido una sensación que corresponde a otro sentido (mezcla sensorial).", ejemplo:"'colores cálidos', 'sonidos ásperos', 'voz aterciopelada'", ejercicio:"Crea una sinestesia que mezcle tacto y oído.", respuesta:"'El áspero sonido de la guitarra eléctrica.'"},
        {id:37, nombre:"Tropos: alegoría", teoria:"La alegoría es una metáfora extendida que constituye todo un texto o pasaje, donde cada elemento representa una idea abstracta.", ejemplo:"'La caverna' de Platón: la cueva es la ignorancia; las sombras, la percepción engañosa; la salida, el conocimiento.", ejercicio:"Interpreta la alegoría de 'el barco' como representación del gobierno.", respuesta:"El barco es el estado; el capitán, el gobernante; la tormenta, la crisis; los pasajeros, los ciudadanos."},
        {id:38, nombre:"Tropos: símil o comparación", teoria:"El símil establece una relación de semejanza mediante un nexo explícito ('como', 'cual', 'tal como').", ejemplo:"'Escribe como si tallara una piedra.' 'Brillaba como el sol.'", ejercicio:"Transforma la metáfora 'El amor es un laberinto' en símil.", respuesta:"'El amor es como un laberinto.'"},
        {id:39, nombre:"Tropos: perífrasis", teoria:"La perífrasis designa una realidad mediante una descripción indirecta o rodeo de palabras.", ejemplo:"'La ciudad de los rascacielos' por Nueva York. 'El autor de El Quijote' por Cervantes.", ejercicio:"Sustituye 'Real Academia Española' por una perífrasis.", respuesta:"'La institución que vela por la lengua castellana.'"},
        {id:40, nombre:"Tropos: antonomasia", teoria:"La antonomasia sustituye un nombre propio por una cualidad característica, o viceversa (nombre propio como arquetipo).", ejemplo:"'El Libertador' por Simón Bolívar. 'Un Quijote' por un idealista.", ejercicio:"Usa antonomasia para referirte a Cristóbal Colón.", respuesta:"'El Descubridor de América.'"},
        {id:41, nombre:"Figuras de diálogo: sermocinatio", teoria:"La sermocinatio finge un diálogo con el lector, un adversario o un personaje ausente.", ejemplo:"'Dirá el lector: '¿Y todo esto para qué?' Le responderé...'", ejercicio:"Escribe una oración de sermocinatio imaginando la objeción de un crítico.", respuesta:"'Quizás alguno piense: 'Eso es demasiado idealista'. A eso replico que...'"},
        {id:42, nombre:"Figuras de diálogo: interrogación retórica", teoria:"La interrogación retórica es una pregunta que no espera respuesta, sino que afirma enfáticamente.", ejemplo:"'¿Quién no ha cometido un error?' (equivale a 'todos han cometido errores').", ejercicio:"Convierte 'La gramática es importante' en interrogación retórica.", respuesta:"'¿Acaso alguien puede dudar de la importancia de la gramática?'"},
        {id:43, nombre:"Figuras de diálogo: corrección o epanortosis", teoria:"La epanortosis rectifica lo que se acaba de decir, sustituyéndolo por una expresión más fuerte o precisa.", ejemplo:"'Él era un hombre bueno, mejor dicho, un santo.'", ejercicio:"Añade una corrección a: 'El trabajo fue difícil...'", respuesta:"'El trabajo fue difícil, mejor dicho, fue el más complejo de mi carrera.'"},
        {id:44, nombre:"Figuras de diálogo: concesión", teoria:"La concesión admite un punto del adversario para después refutarlo o contrarrestarlo.", ejemplo:"'Es cierto que el rival tiene experiencia, pero nosotros tenemos juventud y entusiasmo.'", ejercicio:"Escribe una concesión seguida de refutación.", respuesta:"'Acepto que las energías renovables requieren inversión inicial alta, pero a largo plazo son más baratas.'"},
        {id:45, nombre:"Figuras de diálogo: dubitación", teoria:"La dubitación finge duda o vacilación sobre qué decir, para ganar simpatía o dar peso a lo que se elige.", ejemplo:"'¿Por dónde empezar? ¿Por los ejemplos o por la teoría? Comencemos por lo más sencillo.'", ejercicio:"Escribe una frase con dubitación.", respuesta:"'No sé si decir la verdad cruda o suavizarla; prefiero decirla tal cual.'"},
        {id:46, nombre:"Figuras de diálogo: licencia poética", teoria:"La licencia poética es la libertad del poeta para alterar reglas gramaticales, métricas o léxicas por efecto estético.", ejemplo:"'Del salón en el ángulo oscuro' (Bécquer, hipérbaton).", ejercicio:"Escribe un verso con licencia poética.", respuesta:"'Azulea el cielo en mi pecho sin fondo.' (neologismo 'azulea', hipérbaton)."},
        {id:47, nombre:"Figuras de repetición: gradación o clímax", teoria:"La gradación es una serie de palabras o ideas ordenadas en intensidad creciente (clímax) o decreciente (anticlímax).", ejemplo:"'Llegó, vio, venció.' 'La quiero, la adoro, la venero.'", ejercicio:"Escribe una gradación ascendente de tres pasos.", respuesta:"'Inténtalo, lucha, triunfa.'"},
        {id:48, nombre:"Figuras de repetición: epanadiplosis", teoria:"La epanadiplosis repite la misma palabra al inicio y al final de una cláusula o verso.", ejemplo:"'Verde que te quiero verde.' (Lorca).", ejercicio:"Crea una epanadiplosis con 'libertad'.", respuesta:"'Libertad, anhelo de todos, libertad.'"},
        {id:49, nombre:"Figuras de repetición: anadiplosis", teoria:"La anadiplosis repite la última palabra de una cláusula al inicio de la siguiente (encadenamiento).", ejemplo:"'Todo lo vence el amor, el amor vence todo.'", ejercicio:"Construye una anadiplosis con tres eslabones.", respuesta:"'El conocimiento da poder, el poder da responsabilidad, la responsabilidad da sabiduría.'"},
        {id:50, nombre:"Figuras de repetición: epanalepsis", teoria:"La epanalepsis repite la misma palabra después de un paréntesis o inciso.", ejemplo:"'Él, y solo él, puede decidir.'", ejercicio:"Escribe una oración con epanalepsis.", respuesta:"'Ella, y nadie más que ella, tiene la respuesta.'"},
        {id:51, nombre:"Figuras de pensamiento: reticencia o aposiopesis", teoria:"La reticencia deja la frase incompleta, dando a entender más de lo que se dice. Se marca con puntos suspensivos.", ejemplo:"'Si vuelves a hacer eso... ya sabes.'", ejercicio:"Escribe una frase con reticencia que exprese una amenaza implícita.", respuesta:"'Si vuelves a llegar tarde...'"},
        {id:52, nombre:"Figuras de pensamiento: expolición o interpretación", teoria:"La expolición repite una misma idea con diferentes palabras (paráfrasis) para dar énfasis.", ejemplo:"'La puntuación es clave, es decir, sin ella el texto es caótico, en otras palabras, la puntuación organiza el discurso.'", ejercicio:"Aplica la expolición a 'La lectura es beneficiosa'.", respuesta:"'La lectura es beneficiosa. Leer nos enriquece, nos abre la mente, nos hace más sabios. En definitiva, leer es crecer.'"},
        {id:53, nombre:"Figuras de pensamiento: preterición", teoria:"La preterición dice que se va a omitir algo, pero precisamente mencionándolo.", ejemplo:"'No mencionaré sus errores pasados, pero...'", ejercicio:"Usa la preterición para mencionar un defecto.", respuesta:"'No voy a hablar de su impuntualidad, pero su trabajo es excelente.'"},
        {id:54, nombre:"Figuras de pensamiento: paradiástole", teoria:"La paradiástole distingue términos que suelen confundirse, para precisar conceptos.", ejemplo:"'No es lo mismo libertad que libertinaje.'", ejercicio:"Distingue entre 'información' y 'conocimiento'.", respuesta:"'No es lo mismo tener información que poseer conocimiento: la información son datos, el conocimiento es comprensión.'"},
        {id:55, nombre:"Figuras patéticas: conmiseración", teoria:"Las figuras patéticas apelan a las emociones. La conmiseración despierta compasión.", ejemplo:"'Imaginen a esos niños sin hogar, en la lluvia, sin abrigo.'", ejercicio:"Escribe una frase que despierte compasión por animales abandonados.", respuesta:"'En cada frío invierno, miles de perros y gatos esperan sin esperanza una caricia que nunca llega.'"},
        {id:56, nombre:"Figuras de amplificación: acumulación", teoria:"La acumulación es la enumeración de términos relacionados para reforzar una idea.", ejemplo:"'Llora, sufre, gime, desespera.'", ejercicio:"Crea una acumulación de adjetivos para describir a un héroe.", respuesta:"'Valiente, audaz, generoso, fuerte, sabio, compasivo: así era el héroe.'"},
        {id:57, nombre:"Figuras lógicas: definición", teoria:"La definición establece el significado de un término para guiar el debate. Puede ser nominal o real.", ejemplo:"'Por justicia entendemos dar a cada uno lo suyo.'", ejercicio:"Define 'retórica'.", respuesta:"'La retórica es el arte de la persuasión mediante el lenguaje.'"},
        {id:58, nombre:"Figuras lógicas: división o partición", teoria:"La división descompone un todo en sus partes para organizar el discurso o argumentar.", ejemplo:"'Las causas de la pobreza son tres: económicas, sociales y educativas.'", ejercicio:"Divide el concepto 'inteligencia' en tres tipos.", respuesta:"'La inteligencia se divide en: lingüística, lógico-matemática y espacial.'"},
        {id:59, nombre:"Figuras lógicas: argumentación por analogía", teoria:"La analogía compara dos situaciones para inferir que lo válido en una lo es en la otra.", ejemplo:"'Así como el arquitecto necesita planos, el escritor necesita una sintaxis firme.'", ejercicio:"Construye una analogía entre gobierno y barco.", respuesta:"'Así como el capitán debe navegar con prudencia, el gobernante debe dirigir el país con sabiduría.'"},
        {id:60, nombre:"Figuras lógicas: ejemplo o paradigma", teoria:"El ejemplo es un caso concreto que ilustra una regla general.", ejemplo:"'Hay muchos casos de éxito: por ejemplo, el programa de alfabetización de Cuba.'", ejercicio:"Da un ejemplo histórico de perseverancia.", respuesta:"'Thomas Edison falló mil veces antes de inventar la bombilla; su perseverancia demuestra que el fracaso es parte del éxito.'"},
        {id:61, nombre:"Figuras lógicas: inducción", teoria:"La inducción va de casos particulares a una conclusión general.", ejemplo:"'El mercurio se dilata con el calor, el agua también, el alcohol también; por lo tanto, todos los líquidos se dilatan.'", ejercicio:"Construye una inducción sobre estudio y éxito.", respuesta:"'Einstein estudió incansablemente. Marie Curie también. Newton también. Por lo tanto, el estudio es clave para el éxito científico.'"},
        {id:62, nombre:"Figuras lógicas: deducción o silogismo", teoria:"La deducción va de lo general a lo particular. El silogismo es su forma canónica.", ejemplo:"'Todos los humanos son mortales. Sócrates es humano. Luego Sócrates es mortal.'", ejercicio:"Completa: 'Todos los mamíferos tienen sangre caliente. El delfín es mamífero. Luego...'", respuesta:"'Luego el delfín tiene sangre caliente.'"},
        {id:63, nombre:"Figuras de atenuación: mitigación", teoria:"La mitigación reduce la fuerza de una afirmación para ser más cortés.", ejemplo:"'Quizás deberías reconsiderar tu decisión.'", ejercicio:"Reescribe 'Debes corregir esto' de manera atenuada.", respuesta:"'Sería conveniente que revisaras esto, si no es mucha molestia.'"},
        {id:64, nombre:"Figuras de intensificación: reiteración", teoria:"La reiteración repite una misma idea con diferentes palabras para reforzarla.", ejemplo:"'Es verdad, es cierto, es indudable: la educación cambia vidas.'", ejercicio:"Reitera 'La puntuación es importante' de tres maneras.", respuesta:"'La puntuación es importante; es fundamental; es la columna vertebral del texto.'"},
        {id:65, nombre:"Figuras de diálogo: objeción y refutación", teoria:"Anticipa una posible crítica y la rebate. Muestra consideración de puntos de vista contrarios.", ejemplo:"'Algunos podrían objetar que es muy caro. Sin embargo, a largo plazo resulta más económico.'", ejercicio:"Anticipa y refuta una objeción a aumentar impuestos a los ricos.", respuesta:"'Dirán que los ricos generarían menos empleo. Pero la historia demuestra que con una tributación justa, la economía puede crecer.'"},
        {id:66, nombre:"Figuras de diálogo: conciliación", teoria:"Busca un punto de acuerdo con el adversario antes de presentar el propio argumento.", ejemplo:"'En esto estamos de acuerdo: la educación es importante. Pero difiero en los medios.'", ejercicio:"Escribe una frase de conciliación.", respuesta:"'Coincido en que la libertad de expresión es fundamental. No obstante, creo que debe tener límites cuando incita al odio.'"},
        {id:67, nombre:"Figuras de amplificación: digresión", teoria:"La digresión es una desviación temporal del tema principal para introducir una anécdota o reflexión.", ejemplo:"'Permítanme una breve digresión para contarles una anécdota de mi abuelo... Volviendo al tema...'", ejercicio:"Escribe una digresión de una oración sobre educación.", respuesta:"'Hablando de educación, recuerdo que Sócrates decía que solo sé que no sé nada; esa humildad es el primer paso del conocimiento.'"},
        {id:68, nombre:"Figuras de pensamiento: admonición", teoria:"La admonición advierte o aconseja al auditorio sobre las consecuencias de sus actos.", ejemplo:"'Cuidado con la indiferencia, porque la injusticia se nutre de ella.'", ejercicio:"Escribe una admonición sobre el medio ambiente.", respuesta:"'Advierto: si no cuidamos hoy nuestros bosques, mañana nuestros hijos heredarán un desierto.'"},
        {id:69, nombre:"Figuras de pensamiento: deprecación", teoria:"La deprecación implora o ruega a los oyentes, jueces o dioses.", ejemplo:"'Os lo ruego, señores jueces, tened clemencia con este pobre hombre.'", ejercicio:"Escribe una deprecación pidiendo votar.", respuesta:"'Les ruego, por el futuro de nuestros hijos, que acudan a votar.'"},
        {id:70, nombre:"Figuras de pensamiento: imprecación", teoria:"La imprecación invoca un mal contra alguien o algo (maldición).", ejemplo:"'¡Maldita sea la guerra que destruyó mi hogar!'", ejercicio:"Escribe una imprecación literaria contra la injusticia.", respuesta:"'¡Maldita sea la injusticia que condena a los inocentes y premia a los culpables!'"},
        {id:71, nombre:"Figuras de pensamiento: prosopografía", teoria:"La prosopografía es la descripción física de una persona.", ejemplo:"'Era un hombre alto, de pelo cano, mirada penetrante y voz grave.'", ejercicio:"Describe a un sabio idealizado.", respuesta:"'Tenía la frente amplia, los ojos brillantes de curiosidad, y las manos callosas de tanto escribir.'"},
        {id:72, nombre:"Figuras de pensamiento: etopeya", teoria:"La etopeya es la descripción del carácter y cualidades morales de una persona.", ejemplo:"'Era un hombre justo, honesto, generoso, aunque un poco irascible.'", ejercicio:"Describe a un líder justo.", respuesta:"'Era un líder que escuchaba antes de decidir, que castigaba con moderación y premiaba con generosidad.'"},
        {id:73, nombre:"Figuras de pensamiento: cronografía", teoria:"La cronografía es la descripción de un tiempo o época.", ejemplo:"'Era el invierno de 1943, el frío más intenso que se recordaba.'", ejercicio:"Describe la primavera en tu ciudad.", respuesta:"'Era la primavera de 2025, cuando los cerezos florecían en las calles y el olor a jazmín invadía las noches.'"},
        {id:74, nombre:"Figuras de pensamiento: topografía", teoria:"La topografía es la descripción de un lugar.", ejemplo:"'El valle se extendía verde y fértil, regado por un río de aguas cristalinas.'", ejercicio:"Describe una biblioteca antigua.", respuesta:"'La biblioteca era un laberinto de estantes de madera oscura, iluminado por ventanales góticos, con olor a papel añejo.'"},
        {id:75, nombre:"Figuras de pensamiento: semblanza", teoria:"La semblanza combina prosopografía y etopeya (descripción física y moral).", ejemplo:"'Fue un hombre de baja estatura pero de inmensa bondad.'", ejercicio:"Escribe una semblanza de dos oraciones.", respuesta:"'María era una mujer menuda, de manos siempre ocupadas, y de una energía contagiosa. Su risa llenaba la sala y su generosidad no conocía límites.'"},
        {id:76, nombre:"Figuras de pensamiento: caricatura", teoria:"La caricatura exagera los rasgos físicos o morales con fines humorísticos o satíricos.", ejemplo:"'El político era tan alto y delgado que parecía una antena de televisión con corbata.'", ejercicio:"Caricaturiza a un político que habla mucho y dice poco.", respuesta:"'El orador tenía una boca tan grande que cuando abría la boca, no se sabía si iba a hablar o a tragarse el micrófono.'"},
        {id:77, nombre:"Figuras de pensamiento: sentencia", teoria:"La sentencia (o máxima) es una afirmación breve y profunda que encierra una enseñanza moral.", ejemplo:"'Más vale pájaro en mano que ciento volando.'", ejercicio:"Inventa una sentencia sobre la paciencia.", respuesta:"'La paciencia no es esperar, sino seguir caminando mientras se espera.'"},
        {id:78, nombre:"Figuras de pensamiento: adivinanza", teoria:"La adivinanza plantea un enigma para que el receptor lo resuelva.", ejemplo:"'Oro parece, plata no es, el que no lo adivine, bien tonto es.' (El plátano).", ejercicio:"Inventa una adivinanza sobre la luna.", respuesta:"'Una dama blanca que baila en el cielo, que cambia de vestido sin tener consuelo. ¿Qué es?' (La luna)."},
        {id:79, nombre:"Retórica publicitaria: eslogan", teoria:"El eslogan es una frase breve, memorable y persuasiva que emplea recursos retóricos como rima, aliteración, anáfora, metáfora o imperativo.", ejemplo:"'Just do it.' (Nike). 'Porque tú lo vales.' (L'Oréal).", ejercicio:"Crea un eslogan para fomento de la lectura con aliteración.", respuesta:"'Leer te lleva lejos, leer te libera.'"},
        {id:80, nombre:"Retórica política: discurso de investidura", teoria:"El discurso de investidura sigue la dispositio: exordio (agradecimiento), narratio (diagnóstico), argumentatio (propuestas), peroratio (llamado a la unidad).", ejemplo:"'No les traigo soluciones mágicas, sino trabajo honrado. No les prometo un paraíso, sino un camino de justicia.'", ejercicio:"Escribe el exordio de un discurso de investidura.", respuesta:"'Queridos conciudadanos: Asumo este cargo con humildad y con la firme promesa de servirles con lealtad. Juntos, sacaremos adelante nuestra nación.'"},
        {id:81, nombre:"Retórica judicial: alegato", teoria:"El alegato judicial sigue: exordio, narratio, argumentatio, refutatio, peroratio. Apela a la justicia y a las emociones.", ejemplo:"'Señores del jurado, en sus manos está la justicia. No permitan que el crimen quede impune.'", ejercicio:"Escribe una breve argumentatio para un abogado defensor.", respuesta:"'Mis clientes no estaban en la escena del crimen. Diez testigos lo corroboran. ¿Cómo podrían haber cometido el delito si estaban a 50 kilómetros?'"},
        {id:82, nombre:"Retórica deliberativa: discurso parlamentario", teoria:"La retórica deliberativa busca aconsejar sobre acciones futuras, argumentando lo conveniente o perjudicial. Usa tópicos de lo posible, útil, justo.", ejemplo:"'Esta ley traerá más empleo y reducirá la pobreza; votar en contra es votar por el statu quo de la desigualdad.'", ejercicio:"Argumenta en contra de una propuesta de aumento de impuestos.", respuesta:"'Aumentar los impuestos ahora sería contraproducente. Mataría el consumo, frenaría la inversión y hundiría la economía. En lugar de eso, deberíamos reducir el gasto innecesario.'"},
        {id:83, nombre:"Retórica epidíctica: elogio fúnebre", teoria:"La retórica epidíctica elogia o censura. El elogio fúnebre celebra virtudes del difunto, consuela y exalta valores.", ejemplo:"'Hoy despedimos a un hombre bueno, un padre amoroso, un ciudadano ejemplar. Su legado perdura.'", ejercicio:"Escribe una oración de elogio para un maestro jubilado.", respuesta:"'Despedimos a una maestra que sembró conocimiento en generaciones enteras. Su paciencia y sabiduría dejaron huella. Que su ejemplo nos inspire.'"},
        {id:84, nombre:"Análisis retórico de discursos famosos", teoria:"El análisis retórico identifica dispositio, argumentos, figuras, ethos, pathos, logos. Se aplica a discursos históricos.", ejemplo:"'El discurso 'No pasarán' de Dolores Ibárruri usa anáforas ('No pasarán'), pathos (miedo y rabia), y una peroración enfática.'", ejercicio:"Analiza una figura retórica en un fragmento de discurso conocido.", respuesta:"En el discurso 'Tengo un sueño' de Martin Luther King, la anáfora 'Tengo un sueño' crea ritmo y énfasis, repitiéndose ocho veces."},
        {id:85, nombre:"Retórica y propaganda política", teoria:"La propaganda política usa eslóganes repetitivos, metáforas bélicas, eufemismos, demonización del adversario, y apelación al miedo.", ejemplo:"'Juntos venceremos la crisis' (metáfora bélica). 'Los traidores de la patria' (demonización).", ejercicio:"Identifica un recurso retórico en un eslogan político.", respuesta:"Eslogan: 'Primero las personas' (antítesis implícita con 'primero el capital'). Recurso: metonimia ('las personas' por sus necesidades)."},
        {id:86, nombre:"Retórica y discurso religioso", teoria:"El discurso religioso usa ejemplos (parábolas), metáforas (Dios como pastor), repeticiones (letanías), y estructura: exordio, narratio (lectura bíblica), argumentatio, peroratio (exhortación).", ejemplo:"'Como el pastor cuida de sus ovejas, así Dios cuida de nosotros.' (símil).", ejercicio:"Escribe una frase con símil para un discurso religioso sobre la fe.", respuesta:"'La fe es como una semilla; aunque pequeña, puede mover montañas si se riega con esperanza.'"},
        {id:87, nombre:"Retórica y publicidad: análisis de anuncios", teoria:"Los anuncios usan apelación a la emoción (pathos), credibilidad (ethos), lógica (logos). Figuras comunes: metáfora, hipérbole, interrogación retórica, imperativo.", ejemplo:"'¿Cansado de las manchas? Nuestro detergente las elimina al instante. Confía en la marca líder.'", ejercicio:"Analiza un eslogan publicitario conocido.", respuesta:"Eslogan: 'Ponle el acento español.' (Instituto Cervantes). Figura: metonimia ('acento español' por cultura española, idioma)."},
        {id:88, nombre:"Retórica visual y multimodal", teoria:"La retórica visual estudia cómo las imágenes, colores y diseño persuaden. Figuras visuales: metáfora visual (bombilla como idea), hipérbole visual, antítesis visual.", ejemplo:"En una ONG, imagen de un niño desnutrido y luego sano: antítesis visual y pathos.", ejercicio:"Describe una metáfora visual para una campaña sobre cambio climático.", respuesta:"'Un termómetro gigante que marca 45°C con la Tierra dentro, como si estuviera hirviendo. Metáfora visual: 'la Tierra tiene fiebre por el calentamiento'.'"},
        {id:89, nombre:"Retórica digital y redes sociales", teoria:"En redes sociales, la retórica se adapta a la brevedad, el hashtag (#) como tópico, la inmediatez, y memes (imagen + texto con parodia).", ejemplo:"'Si no vacunas a tus hijos, estás poniendo en riesgo a los demás. #SaludPública'", ejercicio:"Escribe un tweet persuasivo sobre la importancia de leer con figura retórica.", respuesta:"'¿Quieres ser libre? Lee. ¿Quieres ser sabio? Lee. ¿Quieres ser feliz? Lee. 📚✨ #LecturaQueTransforma'"},
        {id:90, nombre:"Retórica conversacional: técnicas cotidianas", teoria:"En conversaciones diarias usamos cumplidos (cortesía positiva), preguntas retóricas, concesión, analogías, ejemplos.", ejemplo:"'Entiendo tu punto, pero ¿has considerado esto?' (concesión + pregunta).", ejercicio:"Aplica concesión para convencer a un amigo de ir al cine.", respuesta:"'Tienes razón, el teatro tiene un encanto especial. Pero hoy estamos cansados, y el cine nos permitirá relajarnos más.'"},
        {id:91, nombre:"Falacias retóricas más comunes", teoria:"Falacias: ad hominem (atacar a la persona), falsa dicotomía (solo dos opciones), pendiente resbaladiza, petición de principio, generalización apresurada.", ejemplo:"Ad hominem: 'No puedes confiar en su propuesta porque es un mentiroso.'", ejercicio:"Identifica la falacia en: 'Si permitimos el matrimonio igualitario, después permitirán el matrimonio con animales.'", respuesta:"Pendiente resbaladiza (slippery slope): asume sin evidencia consecuencias extremas."},
        {id:92, nombre:"Retórica de la ciencia: ethos del investigador", teoria:"El ethos científico se construye con objetividad, precisión, transparencia. Se usa primera persona plural o voz pasiva.", ejemplo:"'Los autores declaramos no tener conflictos de interés. Los datos están disponibles.'", ejercicio:"Escribe una frase que refuerce el ethos de un investigador.", respuesta:"'Este estudio sigue las guías éticas de la Declaración de Helsinki y fue aprobado por el comité institucional.'"},
        {id:93, nombre:"Retórica del humor y la ironía", teoria:"El humor retórico explota ambigüedad, violación de máximas, exageración, sorpresa, incongruencia. Ironía, sarcasmo, absurdo.", ejemplo:"Chiste: '¿Qué le dice un techo a otro techo? Te echo de menos.' (calambur).", ejercicio:"Crea una frase humorística con paronomasia.", respuesta:"'El pollo se sentó en el poyo y el poyo se cayó con el pollo.'"},
        {id:94, nombre:"Análisis retórico de un texto literario", teoria:"El análisis identifica figuras, estructura argumentativa, ethos del narrador, pathos evocado, tópicos. Ejemplo: en 'Cien años de soledad', la metáfora de Macondo como paraíso perdido.", ejemplo:"Análisis del soneto de Quevedo: 'Miré los muros de la patria mía...' usa anáfora ('si un tiempo') y metáfora ('los muros' como la patria).", ejercicio:"Analiza una figura retórica en un texto breve.", respuesta:"En 'Volverán las oscuras golondrinas' de Bécquer, la anáfora 'volverán' crea expectativa, el hipérbaton 'en tu balcón sus nidos a colgar' da musicalidad, y la personificación de las golondrinas expresa el anhelo del amor perdido."},
        {id:95, nombre:"Figuras de pensamiento: la sobrecarga retórica", teoria:"Consiste en la acumulación excesiva de recursos retóricos. Puede ser intencional (estilo barroco) o vicioso (afectación).", ejemplo:"'¡Oh, excelsa, divina, suprema, excelsa criatura!' (Góngora).", ejercicio:"Reescribe la frase 'La casa es bonita' con sobrecarga retórica.", respuesta:"'¡Oh, sublime y excelsa morada, de bellas proporciones y armónica fábrica, que al alma regocija!'"},
        {id:96, nombre:"Figuras de pensamiento: la paradoja retórica", teoria:"La paradoja retórica une conceptos contradictorios para impactar.", ejemplo:"'Vivo sin vivir en mí, y tan alta vida espero, que muero porque no muero.' (Santa Teresa).", ejercicio:"Construye una paradoja retórica sobre el amor.", respuesta:"'El amor es herida que no duele, fuego que no quema, hielo que abrasa.'"},
        {id:97, nombre:"Figuras de pensamiento: la antítesis dramática", teoria:"Antítesis intensificada para crear tensión dialéctica.", ejemplo:"'Si me quieres, soy tuyo; si no, también. Tu indiferencia me ata más que tu amor.'", ejercicio:"Crea una antítesis dramática sobre la ausencia.", respuesta:"'Tu ausencia pesa más que tu presencia; te extraño más cuando estás que cuando te vas.'"},
        {id:98, nombre:"Figuras de pensamiento: la prosopografía moral", teoria:"Descripción de cualidades interiores de una persona idealizada.", ejemplo:"'Era un espíritu libre, indómito, con sed de justicia y corazón de niño.'", ejercicio:"Describe a un filósofo idealizado.", respuesta:"'Buscaba la verdad con humildad, se equivocaba con honestidad y enseñaba con paciencia.'"},
        {id:99, nombre:"Figuras de pensamiento: la etopeya ejemplar", teoria:"Descripción del carácter con fines moralizantes.", ejemplo:"'El sabio no es el que sabe mucho, sino el que sabe que no sabe.'", ejercicio:"Escribe una etopeya de un líder ejemplar.", respuesta:"'El líder ejemplar no grita órdenes, sino que escucha con atención; no impone, sino que persuade.'"},
        {id:100, nombre:"Síntesis de la retórica: el discurso perfecto", teoria:"Un discurso perfecto combina una inventio sólida (argumentos), una dispositio clara (orden), una elocutio bella (figuras), memoria firme, y actio convincente. Equilibra ethos, pathos y logos.", ejemplo:"'El discurso de Cicerón contra Catilina es modelo: exordio impactante ('¿Hasta cuándo abusarás de nuestra paciencia?'), narratio clara, argumentatio con entimemas, peroratio patética.'", ejercicio:"Diseña un esquema de discurso de 5 minutos sobre un tema de tu elección aplicando los cinco cánones.", respuesta:"Tema: importancia de la lectura. Inventio: datos sobre analfabetismo, beneficios de leer. Dispositio: exordio (anécdota), narratio (problema), argumentatio (3 argumentos), peroratio (llamada a la acción). Elocutio: anáfora ('Leer es...'), metáfora ('la llave del conocimiento'). Memoria: mapa mental. Actio: gestos de apertura, contacto visual."}
    ];

    let tecnicas = tecnicasRetorica.map(t => ({ ...t, completada: false, respuestaUsuario: "" }));
    let currentTechIdx = 0;

    // localStorage functions
    function guardarProgreso() {
        let data = tecnicas.map(t => ({ completada: t.completada, respuestaUsuario: t.respuestaUsuario || "" }));
        localStorage.setItem("retorica_progreso", JSON.stringify(data));
        actualizarEstadisticas();
        actualizarBarraOro();
        renderIndiceLateral();
    }

    function cargarProgreso() {
        let saved = localStorage.getItem("retorica_progreso");
        if (saved) {
            let data = JSON.parse(saved);
            for (let i = 0; i < tecnicas.length; i++) {
                if (data[i]) {
                    tecnicas[i].completada = data[i].completada || false;
                    tecnicas[i].respuestaUsuario = data[i].respuestaUsuario || "";
                }
            }
        }
        actualizarEstadisticas();
        actualizarBarraOro();
        renderIndiceLateral();
    }

    function actualizarEstadisticas() {
        let completadas = tecnicas.filter(t => t.completada).length;
        let porcentaje = Math.round((completadas / 100) * 100);
        const statsDiv = document.getElementById("statsPreview");
        if (statsDiv) statsDiv.innerHTML = `Progreso: ${porcentaje}% · Técnicas completadas: ${completadas}/100 · ⚜ retórica`;
        const goldFill = document.getElementById("globalGoldFill");
        if (goldFill) goldFill.style.width = porcentaje + "%";
    }

    function actualizarBarraOro() {
        let completadas = tecnicas.filter(t => t.completada).length;
        let pct = (completadas / 100) * 100;
        document.getElementById("globalGoldFill").style.width = pct + "%";
    }

    function renderIndiceLateral() {
        const busqueda = document.getElementById("searchTech")?.value.toLowerCase() || "";
        let filtradas = tecnicas.filter(t => t.nombre.toLowerCase().includes(busqueda) || (t.teoria && t.teoria.toLowerCase().includes(busqueda)));
        const listaUl = document.getElementById("techIndexList");
        if (!listaUl) return;
        listaUl.innerHTML = "";
        filtradas.forEach(tech => {
            let li = document.createElement("li");
            let a = document.createElement("a");
            a.innerHTML = `${tech.nombre.substring(0, 52)}${tech.nombre.length > 52 ? "…" : ""} ${tech.completada ? "✓" : "○"}`;
            a.addEventListener("click", (e) => {
                e.preventDefault();
                currentTechIdx = tech.id - 1;
                renderVistaTecnica();
                if (window.innerWidth <= 800) document.getElementById("luxSidebar").classList.remove("open");
            });
            li.appendChild(a);
            listaUl.appendChild(li);
        });
    }

    function renderVistaTecnica() {
        const t = tecnicas[currentTechIdx];
        const container = document.getElementById("dynamicTechView");
        if (!container) return;
        const letraInicial = t.nombre.charAt(0);
        container.innerHTML = `
            <div class="tech-primary">
                <div class="numero-gigante">${t.id}</div>
                <div class="tech-title"><span class="capitular">${letraInicial}</span>${t.nombre.substring(1)}</div>
                <div class="card"><h3>📜 Teoría retórica</h3><p>${t.teoria}</p></div>
                <div class="card"><h3>❧ Ejemplo de uso</h3><p>${t.ejemplo}</p></div>
                <div class="card"><h3>✍️ Ejercicio de retórica</h3><p>${t.ejercicio}</p>
                    <textarea id="respuestaTextAreaLux" rows="4" placeholder="Escribe aquí tu respuesta...">${t.respuestaUsuario || ""}</textarea>
                    <div style="margin-top: 0.5rem;">
                        <button class="btn-nav btn-show-answer" id="btnMostrarRespuesta">📖 Ver respuesta correcta</button>
                    </div>
                    <div id="respuestaCorrectaPanel" class="respuesta-correcta">
                        <strong>✓ Respuesta modelo:</strong><br>${t.respuesta}
                    </div>
                </div>
                <div style="margin: 2rem 0;">
                    <button class="btn-nav" id="btnAnterior">← anterior</button>
                    <button class="btn-nav btn-complete" id="btnCompletar">${t.completada ? "✓ Completada" : "◌ Marcar completada"}</button>
                    <button class="btn-nav" id="btnSiguiente">siguiente →</button>
                </div>
            </div>
            <div class="tech-aside">
                <div><strong>⚜ Progreso global</strong><div class="progress-unit"><div style="width:${(tecnicas.filter(tc=>tc.completada).length/100)*100}%; height:6px; background:var(--oro-antiguo); border-radius:30px;"></div></div>
                <p>${tecnicas.filter(tc=>tc.completada).length} de 100 técnicas</p>
                <hr style="margin:1rem 0; border-color:#cfc3ad;">
                <p><strong>📖 Figura o técnica</strong><br>${t.nombre.split(':')[0]}</p>
                <p><strong>🎨 Enfoque</strong><br>Persuasión · Estilo · Argumentación</p>
                <div class="ornament-line" style="font-size:1.2rem;">⁂ § ⚜</div>
                <p style="margin-top:1rem; font-size:0.8rem;">“La retórica es el arte de encontrar en cada caso los medios de persuasión disponibles” — Aristóteles</p>
            </div>
        `;
        const textarea = document.getElementById("respuestaTextAreaLux");
        if (textarea) {
            textarea.addEventListener("input", (e) => {
                tecnicas[currentTechIdx].respuestaUsuario = e.target.value;
                guardarProgreso();
            });
        }
        const btnRespuesta = document.getElementById("btnMostrarRespuesta");
        const panelRespuesta = document.getElementById("respuestaCorrectaPanel");
        if (btnRespuesta && panelRespuesta) {
            btnRespuesta.addEventListener("click", () => {
                panelRespuesta.classList.toggle("visible");
            });
        }
        document.getElementById("btnAnterior")?.addEventListener("click", () => {
            if (currentTechIdx > 0) { currentTechIdx--; renderVistaTecnica(); window.scrollTo(0, 0); }
        });
        document.getElementById("btnSiguiente")?.addEventListener("click", () => {
            if (currentTechIdx < 99) { currentTechIdx++; renderVistaTecnica(); window.scrollTo(0, 0); }
        });
        document.getElementById("btnCompletar")?.addEventListener("click", () => {
            tecnicas[currentTechIdx].completada = !tecnicas[currentTechIdx].completada;
            guardarProgreso();
            renderVistaTecnica();
            renderIndiceLateral();
        });
    }

    const menuBtn = document.getElementById("menuToggleBtn");
    const sidebar = document.getElementById("luxSidebar");
    const closeBtn = document.getElementById("closeSidebarBtn");
    menuBtn?.addEventListener("click", () => sidebar.classList.toggle("open"));
    closeBtn?.addEventListener("click", () => sidebar.classList.remove("open"));
    const searchInput = document.getElementById("searchTech");
    searchInput?.addEventListener("input", () => renderIndiceLateral());

    function inicializar() {
        cargarProgreso();
        renderVistaTecnica();
        window.addEventListener("beforeunload", () => guardarProgreso());
    }
    inicializar();
</script>
</body>
</html>
