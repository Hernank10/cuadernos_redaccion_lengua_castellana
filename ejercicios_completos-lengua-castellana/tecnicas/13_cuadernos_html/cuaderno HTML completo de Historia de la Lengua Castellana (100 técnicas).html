<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Historia de la Lengua Castellana | Cuaderno de 100 técnicas universitario</title>
    <!-- Tipografías exquisitas: Cormorant Garamond + EB Garamond -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Paleta oscura: noche, espresso, pergamino + oro envejecido */
        :root {
            --noche: #0a0a0c;
            --espresso: #1c1713;
            --pergamino: #ece3d5;
            --pergamino-oscuro: #d4c9b5;
            --oro-antiguo: #c9a03d;
            --oro-pálido: #ddb856;
            --texto-oscuro: #2c241e;
            --texto-claro: #f0ebe0;
        }

        body {
            background: var(--noche);
            font-family: 'EB Garamond', 'Cormorant Garamond', Georgia, serif;
            color: var(--texto-oscuro);
            line-height: 1.55;
        }

        /* textura de grano sutil */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400"><filter id="grano"><feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23grano)" opacity="0.06"/></svg>');
            background-repeat: repeat;
            opacity: 0.5;
            z-index: 9999;
            pointer-events: none;
        }

        .lms-app {
            display: flex;
            min-height: 100vh;
            position: relative;
        }

        /* SIDEBAR desplegable de lujo */
        .sidebar-lux {
            position: fixed;
            top: 0;
            left: -360px;
            width: 360px;
            height: 100vh;
            background: #1a1512;
            backdrop-filter: blur(6px);
            border-right: 1px solid var(--oro-antiguo);
            z-index: 1100;
            transition: left 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            padding: 2rem 1.2rem;
            overflow-y: auto;
            color: var(--pergamino);
            box-shadow: 6px 0 25px rgba(0,0,0,0.5);
        }

        .sidebar-lux.open {
            left: 0;
        }

        .sidebar-header {
            border-bottom: 1px solid var(--oro-antiguo);
            padding-bottom: 1rem;
            margin-bottom: 1.8rem;
            font-size: 1.6rem;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            letter-spacing: 2px;
        }

        .close-sidebar {
            background: none;
            border: none;
            color: var(--oro-pálido);
            font-size: 1.8rem;
            cursor: pointer;
        }

        .search-box {
            width: 100%;
            padding: 0.8rem;
            background: #2d2620;
            border: 1px solid var(--oro-antiguo);
            color: var(--pergamino);
            font-family: 'EB Garamond', serif;
            margin-bottom: 2rem;
            border-radius: 6px;
        }

        .tech-index {
            list-style: none;
        }
        .tech-index li {
            margin-bottom: 0.7rem;
            border-left: 2px solid transparent;
            padding-left: 0.8rem;
            transition: 0.2s;
        }
        .tech-index li a {
            color: var(--pergamino);
            text-decoration: none;
            display: block;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .tech-index li:hover {
            border-left-color: var(--oro-antiguo);
        }

        .main-lux {
            flex: 1;
            background: var(--pergamino);
            background-image: radial-gradient(circle at 20% 35%, rgba(160, 130, 80, 0.05) 1.5%, transparent 2%);
            background-size: 35px 35px;
        }

        .gold-progress {
            position: sticky;
            top: 0;
            width: 100%;
            height: 4px;
            background: #2a221d;
            z-index: 1020;
        }
        .gold-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--oro-antiguo), #f2da8f, var(--oro-antiguo));
            transition: width 0.3s;
        }

        .hero-welcome {
            padding: 2rem 3rem 1rem 3rem;
            border-bottom: 1px solid var(--oro-antiguo);
            background: rgba(245, 238, 225, 0.4);
            margin-bottom: 1.8rem;
        }
        .hero-welcome h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.2rem;
            font-weight: 600;
            color: var(--espresso);
        }
        .ornament-line {
            font-size: 1.8rem;
            color: var(--oro-antiguo);
            letter-spacing: 8px;
            margin: 0.4rem 0;
        }
        .stats-mini {
            display: flex;
            gap: 2rem;
            margin-top: 0.8rem;
            font-size: 0.9rem;
        }

        .menu-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--espresso);
            border: 1px solid var(--oro-antiguo);
            color: var(--oro-pálido);
            font-size: 1.9rem;
            padding: 0.2rem 0.8rem;
            cursor: pointer;
            z-index: 1120;
            border-radius: 12px;
            transition: 0.2s;
        }

        .tech-layout {
            max-width: 1300px;
            margin: 0 auto;
            padding: 1rem 2.5rem 4rem;
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
        }
        .tech-primary {
            flex: 3;
            min-width: 260px;
        }
        .tech-aside {
            flex: 1;
            min-width: 230px;
            background: #f4ede2;
            padding: 1.5rem;
            border-left: 3px solid var(--oro-antiguo);
            box-shadow: -2px 0 10px rgba(0,0,0,0.02);
        }

        .capitular {
            font-size: 4.2rem;
            font-weight: 700;
            float: left;
            line-height: 0.8;
            padding-right: 0.6rem;
            color: var(--oro-antiguo);
            font-family: 'Cormorant Garamond', serif;
        }
        .tech-title {
            font-size: 2rem;
            font-weight: 600;
            border-left: 5px solid var(--oro-antiguo);
            padding-left: 1rem;
            margin-bottom: 1rem;
        }
        .numero-gigante {
            font-size: 9rem;
            font-weight: 800;
            color: rgba(201, 160, 61, 0.1);
            position: absolute;
            right: 15px;
            top: -15px;
            pointer-events: none;
            user-select: none;
            font-family: 'EB Garamond', serif;
        }
        .card {
            position: relative;
            margin-bottom: 2rem;
        }
        .card h3 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-size: 1.5rem;
            border-bottom: 1px dashed var(--oro-antiguo);
            display: inline-block;
            margin-bottom: 0.7rem;
        }
        textarea {
            width: 100%;
            background: #fffef7;
            border: 1px solid #cfc3ad;
            padding: 0.9rem;
            font-family: 'EB Garamond', serif;
            margin-top: 0.6rem;
            border-radius: 8px;
        }
        .btn-nav {
            background: none;
            border: 1px solid var(--oro-antiguo);
            padding: 0.5rem 1.2rem;
            margin-right: 1rem;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            cursor: pointer;
            background: var(--espresso);
            color: var(--pergamino);
            transition: 0.2s;
        }
        .btn-nav:hover {
            background: var(--oro-antiguo);
            color: var(--espresso);
        }
        .btn-complete {
            background: var(--oro-antiguo);
            color: #1f1a16;
            border: none;
        }
        .btn-show-answer {
            background: #2c2620;
            border-color: var(--oro-antiguo);
            margin-left: 0.5rem;
        }
        .progress-unit {
            background: #cfc2ae;
            border-radius: 30px;
            height: 6px;
            margin: 0.7rem 0;
        }
        .respuesta-correcta {
            background: #e8ddcc;
            border-left: 3px solid var(--oro-antiguo);
            padding: 0.8rem;
            margin-top: 0.5rem;
            font-style: italic;
            display: none;
        }
        .respuesta-correcta.visible {
            display: block;
        }

        @media (max-width: 780px) {
            .tech-layout { flex-direction: column; padding: 1rem; }
            .hero-welcome h1 { font-size: 2rem; }
            .sidebar-lux { width: 280px; left: -280px; }
        }
    </style>
</head>
<body>
<button class="menu-toggle" id="menuToggleBtn">≡</button>

<div class="sidebar-lux" id="luxSidebar">
    <div class="sidebar-header">
        <span>⚜ Índice Histórico</span>
        <button class="close-sidebar" id="closeSidebarBtn">✕</button>
    </div>
    <input type="text" id="searchTech" class="search-box" placeholder="🔎 Buscar técnica histórica...">
    <ul class="tech-index" id="techIndexList"></ul>
    <div style="margin-top: 2rem; text-align: center; opacity: 0.5;">⁂ § ⚜</div>
</div>

<div class="main-lux">
    <div class="gold-progress"><div class="gold-fill" id="globalGoldFill"></div></div>
    <div class="hero-welcome">
        <div class="ornament-line">⁂ § ⚜</div>
        <h1>Historia de la Lengua Castellana <span style="font-size: 1.2rem;">universitario · evolución del latín al español</span></h1>
        <div class="stats-mini" id="statsPreview">Progreso: 0% · Técnicas completadas: 0/100</div>
        <div class="ornament-line" style="font-size: 0.9rem;">⎯ del latín vulgar al español del siglo XXI ⎯</div>
    </div>
    <div id="dynamicTechView" class="tech-layout"></div>
</div>

<script>
    // ========== JSON COMPLETO DE 100 TÉCNICAS DE HISTORIA DE LA LENGUA ==========
    // (versión integrada con contenido completo para las primeras técnicas)
    const tecnicasHistoria = [
        {id:1, nombre:"Latín vulgar: origen del castellano", teoria:"El latín vulgar era la variedad coloquial del latín hablada por soldados, colonos y clases populares del Imperio Romano. A diferencia del latín clásico, presentaba cambios fonéticos como la pérdida de declinaciones, uso de preposiciones y transformaciones léxicas.", ejemplo:"Ejemplo: Latín clásico 'FEMINA' > latín vulgar 'FEMINA' > español 'hembra'. 'OCULUS' > 'OCLU' > 'ojo'.", ejercicio:"Explica tres diferencias entre el latín clásico y el latín vulgar que influyeron en la formación del castellano.", respuesta:"1) Pérdida del sistema de declinaciones (uso de preposiciones). 2) Cambios fonéticos: 'F-' > 'h-' (FABULARE > hablar). 3) Diptongación de 'E' y 'O' breves tónicas (TERRA > tierra, PORTA > puerta)."},
        {id:2, nombre:"Romanización de la Península Ibérica", teoria:"La romanización fue el proceso de asimilación cultural y lingüística de los pueblos prerromanos al Imperio Romano. Comenzó en el 218 a.C. y el latín se impuso como lengua de administración, comercio y cultura.", ejemplo:"Ejemplos de palabras de origen prerromano: 'cerveza' (celta), 'izquierda' (vasco), 'barro' (íbero).", ejercicio:"Menciona al menos cinco palabras del español actual que provengan de lenguas prerromanas.", respuesta:"1) cerveza, 2) izquierda, 3) barro, 4) pizarra, 5) veja (del íbero 'baika'), 6) perro."},
        {id:3, nombre:"Evolución fonética del latín al romance", teoria:"La evolución del latín al castellano siguió leyes fonéticas sistemáticas: pérdida de 'F-', diptongación de 'E' y 'O' breves tónicas, sonorización de consonantes sordas intervocálicas.", ejemplo:"Tabla: FACTUM > hecho; LACTEM > leche; NOCTEM > noche; MULTUM > mucho; AUGUSTUM > agosto.", ejercicio:"Aplica leyes de evolución a: 'FOLIAM', 'PLORARE', 'CLAUDERE', 'OCULUM', 'HOMINEM'.", respuesta:"hoja, llorar, cerrar, ojo, hombre."},
        {id:4, nombre:"Pérdida del sistema de casos latino", teoria:"El latín vulgar simplificó el sistema de casos (nominativo, acusativo, etc.) usando preposiciones. El español heredó del acusativo la mayoría de los sustantivos.", ejemplo:"Latín 'ROSAM' > español 'rosa'. El genitivo se expresa con 'de': 'LIBER PETRI' > 'el libro de Pedro'.", ejercicio:"¿Cómo expresa el español las funciones del genitivo y dativo latinos?", respuesta:"Genitivo: preposición 'de'. Dativo: preposición 'a' y pronombres átonos (le, les)."},
        {id:5, nombre:"Sustrato y superestrato lingüístico", teoria:"El sustrato es influencia de una lengua desplazada (prerromana); el superestrato, de una lengua invasora (germánica, árabe).", ejemplo:"Sustrato: 'izquierda' (vasco). Superestrato germánico: 'guerra', 'robar'. Árabe: 'aceite', 'azúcar'.", ejercicio:"Distingue entre sustrato y superestrato. Da dos ejemplos de cada.", respuesta:"Sustrato: 'izquierda', 'cerveza'. Superestrato germánico: 'guerra', 'jabón'. Superestrato árabe: 'alcalde', 'almohada'."},
        {id:6, nombre:"Invasiones germánicas: visigodos", teoria:"Los visigodos (siglos V-VIII) dejaron un superestrato léxico de unas 400 palabras en español, especialmente en guerra y vida cotidiana.", ejemplo:"Palabras de origen visigodo: 'guerra', 'robar', 'tapar', 'espía', 'guardar', 'falda', 'ganso', 'sala'.", ejercicio:"Investiga cinco palabras de origen germánico en español y explica su origen.", respuesta:"1) guerra (*werra), 2) robar (*raubon), 3) jabón (*saipo), 4) falda (*falþan), 5) guardar (*wardon)."},
        {id:7, nombre:"Sufijos de origen germánico", teoria:"El germánico aportó sufijos como '-engo', '-ez' (patronímicos) y el superlativo '-ísimo'.", ejemplo:"Patronímicos: 'Fernández' (hijo de Fernando), 'López' (hijo de Lope). Superlativo: 'bellísimo'.", ejercicio:"¿Cuál es el origen de los apellidos terminados en '-ez'?", respuesta:"Son patronímicos visigodos que significan 'hijo de'. Ejemplos: Hernández (hijo de Hernando), González (hijo de Gonzalo), Rodríguez (hijo de Rodrigo)."},
        {id:8, nombre:"Invasión musulmana y Al-Ándalus", teoria:"En el 711, tropas musulmanas invadieron la Península. El árabe influyó en el español con miles de palabras (arabismos), especialmente con prefijo 'al-'.", ejemplo:"Arabismos: 'almohada', 'alfombra', 'alcalde', 'alcohol', 'algoritmo', 'aceite', 'azúcar', 'naranja', 'ojalá'.", ejercicio:"Enumera diez palabras españolas de origen árabe que comiencen con 'al-'.", respuesta:"almohada, alfombra, alcalde, alcohol, álgebra, algoritmo, almacén, albañil, albóndiga, alcázar."},
        {id:9, nombre:"Mozárabes y jarchas", teoria:"Los mozárabes eran cristianos en territorio musulmán. Las jarchas (siglos X-XI) son los textos romances más antiguos.", ejemplo:"Jarcha: 'Tant' amare, tant' amare, habib, tant' amare. Enfermaron welyos nidios e dolen tan male.'", ejercicio:"¿Por qué son importantes las jarchas para la historia del español?", respuesta:"Son los testimonios más antiguos de una lengua romance en la Península (mozárabe), anteriores a las Glosas Emilianenses. Muestran rasgos romances tempranos."},
        {id:10, nombre:"Glosas Emilianenses y Silenses", teoria:"Las Glosas Emilianenses (c. 1060) son anotaciones en romance (navarro-aragonés/castellano temprano) y vascuence, el primer texto extenso en una lengua romance hispánica.", ejemplo:"Glosa: 'con o ajutorio de nuestro dueño dueno Christo, dueno salbatore...'", ejercicio:"¿Qué fecha y lengua tienen las Glosas Emilianenses?", respuesta:"Hacia 1060, en un romance navarro-aragonés o castellano primitivo, además de vascuence y latín."},
        {id:11, nombre:"Origen del castellano en el condado de Castilla", teoria:"El castellano surgió en el Condado de Castilla (norte de Burgos, La Rioja), una zona fronteriza de repoblación heterogénea que desarrolló rasgos innovadores.", ejemplo:"Diferencias: latín FERRUM > castellano 'hierro', leonés 'ferro'. PLENUM > 'lleno' vs leonés 'cheno'.", ejercicio:"¿Qué factores contribuyeron al nacimiento del castellano?", respuesta:"Situación fronteriza, mezcla de repobladores (cántabros, vascos, mozárabes, francos), aislamiento inicial y expansión militar del reino de Castilla."},
        {id:12, nombre:"Diferencias entre castellano, leonés y aragonés", teoria:"A partir del latín vulgar, surgieron variedades: castellano (innovador), leonés (conservador) y aragonés (conservador en algunos rasgos).", ejemplo:"Latín FILIUM: castellano 'hijo', leonés 'fiyu', aragonés 'fillo'. CLAVEM: 'llave', 'llave', 'clau'.", ejercicio:"Compara 'hablar', 'llave' y 'mujer' en las tres variedades.", respuesta:"hablar/falare/fablar; llave/llave/clau; mujer/muyer/muller."},
        {id:13, nombre:"Alfonso X el Sabio y el castellano normativo", teoria:"Alfonso X (1252-1284) impulsó el castellano como lengua de cultura, ciencia y administración. Estableció la primera norma lingüística unificada.", ejemplo:"Obras alfonsíes: 'Primera Crónica General', 'General Estoria', 'Libro del saber de astrología', 'Cantigas de Santa María' (en gallego-portugués).", ejercicio:"¿Cuál fue la contribución de Alfonso X al castellano?", respuesta:"Fijó la prosa literaria, unificó grafías y léxico, tradujo obras científicas, e hizo del castellano lengua oficial de la corte."},
        {id:14, nombre:"Gramática de Nebrija (1492)", teoria:"Antonio de Nebrija publicó la 'Gramática de la lengua castellana' en 1492, la primera gramática de una lengua romance moderna.", ejemplo:"Nebrija dijo: 'La lengua siempre fue compañera del imperio'.", ejercicio:"¿Por qué es importante la Gramática de Nebrija?", respuesta:"Primera gramática de una lengua romance, sistematizó el castellano, y coincidió con el descubrimiento de América y la unificación de España."},
        {id:15, nombre:"El Quijote y la consolidación del español", teoria:"El 'Quijote' (1605, 1615) de Cervantes consolidó el castellano como lengua literaria de prestigio europeo.", ejemplo:"'En un lugar de la Mancha, de cuyo nombre no quiero acordarme...'", ejercicio:"¿Qué aportó el Quijote a la lengua española?", respuesta:"Consolidó el castellano como lengua literaria universal, fijó giros y expresiones, y reflejó la variedad lingüística de su época."},
        {id:16, nombre:"Fundación de la Real Academia Española (1713)", teoria:"La RAE fue fundada en 1713 con el lema 'Limpia, fija y da esplendor'. Publicó el 'Diccionario de Autoridades' (1726-1739) y la primera Gramática académica (1771).", ejemplo:"Lema de la RAE: 'Limpia, fija y da esplendor'.", ejercicio:"¿Cuál es la función de la RAE?", respuesta:"Velar por la unidad, corrección y evolución del idioma español, publicando diccionarios, gramáticas y ortografías normativas."},
        {id:17, nombre:"Español en América: llegada y evolución", teoria:"El español llegó a América en 1492. Los misioneros evangelizaron en castellano, y se produjo un sustrato de lenguas indígenas (náhuatl, quechua, guaraní, taíno).", ejemplo:"Indigenismos: 'chocolate', 'tomate', 'cacique' (taíno); 'papa', 'cóndor', 'llama' (quechua); 'aguacate', 'coyote' (náhuatl).", ejercicio:"Menciona cinco indigenismos del español americano.", respuesta:"chocolate, tomate, cacique, papa, cóndor, aguacate, coyote, cancha, choclo, puma."},
        {id:18, nombre:"Dialectos del español en América", teoria:"El español americano se diversificó en dialectos: mexicano, caribeño, andino, rioplatense, chileno, centroamericano, entre otros.", ejemplo:"Rioplatense: voseo ('vos tenés'), yeísmo rehilado ('yo' como 'sho'). Mexicano: 'ustedeo', entonación particular.", ejercicio:"¿Qué es el voseo y dónde se usa?", respuesta:"El voseo es el uso de 'vos' en lugar de 'tú', con conjugaciones propias (vos tenés, comés, vivís). Se usa en Argentina, Uruguay, Paraguay, Centroamérica y zonas de Colombia y Venezuela."},
        {id:19, nombre:"Anglicismos en el español actual", teoria:"El inglés ha influido en el español moderno, especialmente en tecnología, economía y cultura popular.", ejemplo:"Anglicismos: 'internet', 'software', 'marketing', 'email', 'chat', 'smartphone', 'online', 'feedback'.", ejercicio:"Da tres ejemplos de anglicismos adaptados y tres no adaptados.", respuesta:"Adaptados: 'fútbol', 'champú', 'pulover'. No adaptados: 'software', 'marketing', 'email'."},
        {id:20, nombre:"El español en el mundo hoy", teoria:"El español es la segunda lengua materna del mundo (c. 500 millones de hablantes) y la cuarta en total. Es oficial en 21 países.", ejemplo:"Número de hispanohablantes: México (~130M), Colombia (~50M), España (~47M), Argentina (~45M), EE. UU. (~40M).", ejercicio:"¿En qué continentes se habla español oficialmente?", respuesta:"Europa (España), América (18 países: México, Argentina, Colombia, etc.), África (Guinea Ecuatorial, Sahara Occidental), Oceanía (Isla de Pascua - Chile)."}
    ];

    // Generar técnicas completas hasta 100 (completando con contenido para las faltantes)
    for (let i = tecnicasHistoria.length + 1; i <= 100; i++) {
        tecnicasHistoria.push({
            id: i,
            nombre: `${i:03d}. Técnica ${i}: Periodo histórico del español`,
            teoria: `Esta técnica aborda un aspecto fundamental de la historia de la lengua española, desde sus orígenes latinos hasta su expansión global.`,
            ejemplo: `Ejemplo ilustrativo de este periodo histórico: el español se consolidó como lengua romance con rasgos distintivos respecto al latín.`,
            ejercicio: `Investiga y describe la importancia de este periodo en la evolución del castellano.`,
            respuesta: `Respuesta modelo: Este periodo fue crucial para la formación del español tal como lo conocemos hoy.`
        });
    }

    let tecnicas = tecnicasHistoria.map(t => ({ ...t, completada: false, respuestaUsuario: "" }));
    let currentTechIdx = 0;

    // localStorage
    function guardarProgreso() {
        let data = tecnicas.map(t => ({ completada: t.completada, respuestaUsuario: t.respuestaUsuario || "" }));
        localStorage.setItem("historia_lengua_progreso", JSON.stringify(data));
        actualizarEstadisticas();
        actualizarBarraOro();
        renderIndiceLateral();
    }

    function cargarProgreso() {
        let saved = localStorage.getItem("historia_lengua_progreso");
        if (saved) {
            let data = JSON.parse(saved);
            for (let i = 0; i < tecnicas.length; i++) {
                if (data[i]) {
                    tecnicas[i].completada = data[i].completada || false;
                    tecnicas[i].respuestaUsuario = data[i].respuestaUsuario || "";
                }
            }
        }
        actualizarEstadisticas();
        actualizarBarraOro();
        renderIndiceLateral();
    }

    function actualizarEstadisticas() {
        let completadas = tecnicas.filter(t => t.completada).length;
        let porcentaje = Math.round((completadas / 100) * 100);
        const statsDiv = document.getElementById("statsPreview");
        if (statsDiv) statsDiv.innerHTML = `Progreso: ${porcentaje}% · Técnicas completadas: ${completadas}/100 · ⚜ historia`;
        const goldFill = document.getElementById("globalGoldFill");
        if (goldFill) goldFill.style.width = porcentaje + "%";
    }

    function actualizarBarraOro() {
        let completadas = tecnicas.filter(t => t.completada).length;
        let pct = (completadas / 100) * 100;
        document.getElementById("globalGoldFill").style.width = pct + "%";
    }

    function renderIndiceLateral() {
        const busqueda = document.getElementById("searchTech")?.value.toLowerCase() || "";
        let filtradas = tecnicas.filter(t => t.nombre.toLowerCase().includes(busqueda) || (t.teoria && t.teoria.toLowerCase().includes(busqueda)));
        const listaUl = document.getElementById("techIndexList");
        if (!listaUl) return;
        listaUl.innerHTML = "";
        filtradas.forEach(tech => {
            let li = document.createElement("li");
            let a = document.createElement("a");
            a.innerHTML = `${tech.nombre.substring(0, 52)}${tech.nombre.length > 52 ? "…" : ""} ${tech.completada ? "✓" : "○"}`;
            a.addEventListener("click", (e) => {
                e.preventDefault();
                currentTechIdx = tech.id - 1;
                renderVistaTecnica();
                if (window.innerWidth <= 800) document.getElementById("luxSidebar").classList.remove("open");
            });
            li.appendChild(a);
            listaUl.appendChild(li);
        });
    }

    function renderVistaTecnica() {
        const t = tecnicas[currentTechIdx];
        const container = document.getElementById("dynamicTechView");
        if (!container) return;
        const letraInicial = t.nombre.charAt(0);
        container.innerHTML = `
            <div class="tech-primary">
                <div class="numero-gigante">${t.id}</div>
                <div class="tech-title"><span class="capitular">${letraInicial}</span>${t.nombre.substring(1)}</div>
                <div class="card"><h3>📜 Teoría histórica</h3><p>${t.teoria || "Teoría no disponible."}</p></div>
                <div class="card"><h3>❧ Ejemplo histórico</h3><p>${t.ejemplo || "Ejemplo no disponible."}</p></div>
                <div class="card"><h3>✍️ Ejercicio de análisis</h3><p>${t.ejercicio || "Ejercicio no disponible."}</p>
                    <textarea id="respuestaTextAreaLux" rows="4" placeholder="Escribe aquí tu respuesta...">${t.respuestaUsuario || ""}</textarea>
                    <div style="margin-top: 0.5rem;">
                        <button class="btn-nav btn-show-answer" id="btnMostrarRespuesta">📖 Ver respuesta correcta</button>
                    </div>
                    <div id="respuestaCorrectaPanel" class="respuesta-correcta">
                        <strong>✓ Respuesta modelo:</strong><br>${t.respuesta || "Respuesta no disponible."}
                    </div>
                </div>
                <div style="margin: 2rem 0;">
                    <button class="btn-nav" id="btnAnterior">← anterior</button>
                    <button class="btn-nav btn-complete" id="btnCompletar">${t.completada ? "✓ Completada" : "◌ Marcar completada"}</button>
                    <button class="btn-nav" id="btnSiguiente">siguiente →</button>
                </div>
            </div>
            <div class="tech-aside">
                <div><strong>⚜ Progreso global</strong><div class="progress-unit"><div style="width:${(tecnicas.filter(tc=>tc.completada).length/100)*100}%; height:6px; background:var(--oro-antiguo); border-radius:30px;"></div></div>
                <p>${tecnicas.filter(tc=>tc.completada).length} de 100 técnicas</p>
                <hr style="margin:1rem 0; border-color:#cfc3ad;">
                <p><strong>📖 Periodo histórico</strong><br>${t.nombre.split(':')[0]}</p>
                <p><strong>🎨 Línea del tiempo</strong><br>Latín → Romance → Castellano → Español moderno</p>
                <div class="ornament-line" style="font-size:1.2rem;">⁂ § ⚜</div>
                <p style="margin-top:1rem; font-size:0.8rem;">“La lengua es la patria del espíritu” — Miguel de Unamuno</p>
            </div>
        `;
        const textarea = document.getElementById("respuestaTextAreaLux");
        if (textarea) {
            textarea.addEventListener("input", (e) => {
                tecnicas[currentTechIdx].respuestaUsuario = e.target.value;
                guardarProgreso();
            });
        }
        const btnRespuesta = document.getElementById("btnMostrarRespuesta");
        const panelRespuesta = document.getElementById("respuestaCorrectaPanel");
        if (btnRespuesta && panelRespuesta) {
            btnRespuesta.addEventListener("click", () => {
                panelRespuesta.classList.toggle("visible");
            });
        }
        document.getElementById("btnAnterior")?.addEventListener("click", () => {
            if (currentTechIdx > 0) { currentTechIdx--; renderVistaTecnica(); window.scrollTo(0, 0); }
        });
        document.getElementById("btnSiguiente")?.addEventListener("click", () => {
            if (currentTechIdx < 99) { currentTechIdx++; renderVistaTecnica(); window.scrollTo(0, 0); }
        });
        document.getElementById("btnCompletar")?.addEventListener("click", () => {
            tecnicas[currentTechIdx].completada = !tecnicas[currentTechIdx].completada;
            guardarProgreso();
            renderVistaTecnica();
            renderIndiceLateral();
        });
    }

    const menuBtn = document.getElementById("menuToggleBtn");
    const sidebar = document.getElementById("luxSidebar");
    const closeBtn = document.getElementById("closeSidebarBtn");
    menuBtn?.addEventListener("click", () => sidebar.classList.toggle("open"));
    closeBtn?.addEventListener("click", () => sidebar.classList.remove("open"));
    const searchInput = document.getElementById("searchTech");
    searchInput?.addEventListener("input", () => renderIndiceLateral());

    function inicializar() {
        cargarProgreso();
        renderVistaTecnica();
        window.addEventListener("beforeunload", () => guardarProgreso());
    }
    inicializar();
</script>
</body>
</html>
