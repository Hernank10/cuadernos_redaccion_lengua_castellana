<!DOCTYPE html>
<html lang="es">
<head>

    <title>Antropolingüística del Castellano | Cuaderno de 100 técnicas universitario</title>
    <!-- Tipografías exquisitas -->

    <style>
        * {

        :root {

            background-repeat: repeat;

        .lms-app {

        .sidebar-lux {
            position: fixed;

            padding: 2rem 1.2rem;
            overflow-y: auto;
            color: var(--pergamino);
            box-shadow: 6px 0 25px rgba(0,0,0,0.5);
        }

        .sidebar-lux.open {
            left: 0;
        }

        .sidebar-header {
            border-bottom: 1px solid var(--oro-antiguo);
            padding-bottom: 1rem;
            margin-bottom: 1.8rem;
            font-size: 1.6rem;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            letter-spacing: 2px;
        }

        .close-sidebar {

            color: var(--oro-pálido);
            font-size: 1.8rem;
            cursor: pointer;
        }

        .search-box {
            width: 100%;
            padding: 0.8rem;
            background: #2d2620;
            border: 1px solid var(--oro-antiguo);

            font-family: 'EB Garamond', serif;
            margin-bottom: 2rem;

        }

        .tech-index {
            list-style: none;
        }
        .tech-index li {
            margin-bottom: 0.7rem;

            padding-left: 0.8rem;

        }
        .tech-index li a {
            color: var(--pergamino);

            font-size: 0.9rem;
            cursor: pointer;
        }
        .tech-index li:hover {
            border-left-color: var(--oro-antiguo);
        }

        .main-lux {
            flex: 1;
            background: var(--pergamino);
            background-image: radial-gradient(circle at 20% 35%, rgba(160, 130, 80, 0.05) 1.5%, transparent 2%);
            background-size: 35px 35px;
        }

        .gold-progress {
            position: sticky;
            top: 0;
            width: 100%;
            height: 4px;
            background: #2a221d;
            z-index: 1020;
        }
        .gold-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--oro-antiguo), #f2da8f, var(--oro-antiguo));

        }

        .hero-welcome {
            padding: 2rem 3rem 1rem 3rem;
            border-bottom: 1px solid var(--oro-antiguo);
            background: rgba(245, 238, 225, 0.4);
            margin-bottom: 1.8rem;
        }
        .hero-welcome h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            font-weight: 600;

        }
        .ornament-line {

        }
        .stats-mini {

        .menu-toggle {

        }

        .tech-layout {
            max-width: 1300px;
            margin: 0 auto;
            padding: 1rem 2.5rem 4rem;
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
        }
        .tech-primary {
            flex: 3;
            min-width: 260px;
        }
        .tech-aside {
            flex: 1;
            min-width: 230px;
            background: #f4ede2;

        }

        .capitular {
            font-size: 4.2rem;
            font-weight: 700;
            float: left;
            line-height: 0.8;
            padding-right: 0.6rem;
            color: var(--oro-antiguo);
            font-family: 'Cormorant Garamond', serif;
        }
        .tech-title {
            font-size: 1.9rem;
            font-weight: 600;
            border-left: 5px solid var(--oro-antiguo);
            padding-left: 1rem;
            margin-bottom: 1rem;
        }
        .numero-gigante {
            font-size: 9rem;
            font-weight: 800;
            color: rgba(201, 160, 61, 0.1);
            position: absolute;
            right: 15px;
            top: -15px;
            pointer-events: none;
            user-select: none;
            font-family: 'EB Garamond', serif;
        }
        .card {
            position: relative;
            margin-bottom: 2rem;
        }
        .card h3 {
            font-family: 'Cormorant Garamond', serif;

        textarea {
            width: 100%;
            background: #fffef7;
            border: 1px solid #cfc3ad;

            border-radius: 8px;
        }
        .btn-nav {
            background: none;
            border: 1px solid var(--oro-antiguo);
            padding: 0.5rem 1.2rem;
            margin-right: 1rem;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            cursor: pointer;
            background: var(--espresso);
            color: var(--pergamino);
            transition: 0.2s;
        }
        .btn-nav:hover {
            background: var(--oro-antiguo);
            color: var(--espresso);
        }
        .btn-complete {
            background: var(--oro-antiguo);
            color: #1f1a16;
            border: none;
        }
        .btn-show-answer {
            background: #2c2620;
            border-color: var(--oro-antiguo);
            margin-left: 0.5rem;
        }
        .progress-unit {
            background: #cfc2ae;
            border-radius: 30px;
            height: 6px;
            margin: 0.7rem 0;
        }
        .respuesta-correcta {
            background: #e8ddcc;
            border-left: 3px solid var(--oro-antiguo);
            padding: 0.8rem;
            margin-top: 0.5rem;
            font-style: italic;
            display: none;
        }
        .respuesta-correcta.visible {
            display: block;
        }

        @media (max-width: 780px) {
            .tech-layout { flex-direction: column; padding: 1rem; }
            .hero-welcome h1 { font-size: 2rem; }
            .sidebar-lux { width: 280px; left: -280px; }
        }
    </style>
</head>
<body>
<button class="menu-toggle" id="menuToggleBtn">≡</button>

<div class="sidebar-lux" id="luxSidebar">
    <div class="sidebar-header">
        <span>⚜ Índice Antropolingüística</span>
        <button class="close-sidebar" id="closeSidebarBtn">✕</button>
    </div>
    <input type="text" id="searchTech" class="search-box" placeholder="🔎 Buscar técnica (lengua, cultura, sociedad)...">
    <ul class="tech-index" id="techIndexList"></ul>
    <div style="margin-top: 2rem; text-align: center; opacity: 0.5;">⁂ § ⚜</div>
</div>

<div class="main-lux">
    <div class="gold-progress"><div class="gold-fill" id="globalGoldFill"></div></div>
    <div class="hero-welcome">
        <div class="ornament-line">⁂ § ⚜</div>
        <h1>Antropolingüística del Castellano <span style="font-size: 1.2rem;">lengua · cultura · sociedad · identidad</span></h1>
        <div class="stats-mini" id="statsPreview">Progreso: 0% · Técnicas completadas: 0/100</div>
        <div class="ornament-line" style="font-size: 0.9rem;">⎯ el lenguaje como fenómeno cultural ⎯</div>
    </div>
    <div id="dynamicTechView" class="tech-layout"></div>
</div>

<script>
    // ========== DATOS COMPLETOS DE 100 TÉCNICAS DE ANTROPOLINGÜÍSTICA ==========
    // Lista de temas para las 100 técnicas
    const temasAntropo = [
        "Definición y alcance de la antropolingüística", "Hipótesis de Sapir-Whorf", "Determinismo lingüístico vs relativismo", "Categorización lingüística y cultura", "Lenguaje, cultura y pensamiento", "Etnografía de la comunicación", "Sociolingüística y antropolingüística", "Lengua y cosmovisión en el mundo hispano", "Etnografías del habla en comunidades hispanohablantes", "Lengua y ritualidad en el mundo hispano", "Pragmática intercultural en español", "Tabú lingüístico en las culturas hispanas",
        "Lengua y género en el mundo hispano", "Marcadores de discurso y cultura", "Cortesía y cultura hispana", "Formas de tratamiento: tú, usted, vos", "Lenguaje e identidad cultural", "Actitudes lingüísticas en el mundo hispano", "Prestigio lingüístico y variación", "Lengua y poder simbólico (Bourdieu)", "Ideologías lingüísticas", "Lengua y nación en la historia de España", "Lenguas cooficiales de España", "Políticas lingüísticas en España y América", "Variedades sociales del español", "Jergas y argot en el mundo hispano", "Lengua y género: variación sociolingüística", "Lenguaje juvenil en el mundo hispano", "Comunicación mediada por tecnología", "Lenguaje y discurso político", "Lenguaje publicitario en español", "Lengua y humor en español", "Lengua y religión", "Lengua y medicina tradicional", "Etnobotánica y etnolingüística", "Toponimia del mundo hispano",
        "Dialectología del español", "El español de América", "Indigenismos", "Africanismos", "El voseo", "Seseo, ceceo y distinción", "Yeísmo y lleísmo", "Aspiración y pérdida de 's'", "El español canario", "El español andaluz", "El español rioplatense", "El español mexicano",
        "Contacto de lenguas", "Bilingüismo social en España", "Bilingüismo social en América Latina", "Diglosia", "Alternancia de código", "Préstamos lingüísticos", "Calcos lingüísticos", "Español en Estados Unidos", "Spanglish", "Desplazamiento y muerte de lenguas", "Revitalización lingüística", "Planificación lingüística",
        "Lengua e identidad étnica", "Lengua y construcción de la nación", "Nacionalismo lingüístico en España", "Actitudes hacia el español en el mundo", "Prestigio del español", "Variedades diatópicas", "Variedades diastráticas", "Variedades diafásicas", "Lengua juvenil y contracultura", "Lenguaje inclusivo", "Lengua y redes sociales", "Lengua y marketing", "Lengua y discurso político: manipulación", "Lengua y medios de comunicación", "Lengua y traducción", "Lengua y literatura", "Lengua y música", "Lengua y cine", "Lengua y turismo", "Lengua y diplomacia", "Lengua y derecho", "Lengua y ciencia", "Lengua y tecnología", "Futuro del español",
        "Normativa y prescripción", "Panhispanismo y unidad", "Lengua y enseñanza", "Lengua y educación bilingüe", "Lengua y diversidad en el aula", "Lengua y política educativa en España", "Lengua y política educativa en América Latina", "Lengua y materiales didácticos", "Lengua y formación de docentes", "Lengua y evaluación", "Lengua y tecnología educativa", "Lengua y corpus lingüísticos", "Lengua y estudios de percepción", "Lengua y cambio lingüístico", "Lengua y globalización", "Lengua y derechos lingüísticos"
    ];

    // Generar todas las técnicas con contenido
    let tecnicas = [];
    
    for (let i = 1; i <= 100; i++) {
        let tema = temasAntropo[i-1] || `Técnica ${i}`;
        tecnicas.push({
            id: i,
            nombre: `${i.toString().padStart(3, '0')}. ${tema}`,
            teoria: `Esta técnica aborda el estudio de "${tema}" en el marco de la antropolingüística del castellano. Se analizan las relaciones entre lengua, cultura, sociedad e identidad en el mundo hispano, con ejemplos concretos de variación dialectal, contacto de lenguas, políticas lingüísticas y prácticas comunicativas.`,
            ejemplo: `Ejemplo ilustrativo de "${tema}": en las comunidades hispanohablantes, este fenómeno se manifiesta en la variación lingüística, las actitudes hacia las distintas variedades, o las políticas de normalización lingüística. Por ejemplo, el estudio de los tratamientos de cortesía (tú/usted/vos) revela diferencias culturales en la gestión de la distancia social.`,
            ejercicio: `Investiga y analiza un caso concreto de "${tema}" en el mundo hispano. Describe cómo se manifiesta en una región o comunidad específica y cuáles son sus implicaciones culturales y sociales.`,
            respuesta: `Respuesta modelo: "${tema}" se observa en [región/comunidad] donde [descripción del fenómeno]. Las implicaciones culturales incluyen [análisis]. Este caso es relevante para entender la relación entre lenguaje y cultura porque [conclusión].`,
            completada: false,
            respuestaUsuario: ""
        });
    }

    // Sobrescribir las primeras 12 técnicas con contenido más detallado
    const tecnicasDetalladas = [
        {id:1, teoria:"La antropolingüística (o antropología lingüística) estudia las relaciones entre el lenguaje, la cultura y la sociedad. Investiga cómo el lenguaje influye en la cosmovisión, cómo las prácticas culturales se reflejan en la lengua, y cómo la identidad social se construye discursivamente. Integra métodos de la lingüística y la antropología.", ejemplo:"El estudio de los términos de parentesco en español ('padre', 'madre', 'abuelo', 'tío') revela una organización familiar bilateral.", ejercicio:"Explica la diferencia entre antropolingüística, sociolingüística y etnografía de la comunicación.", respuesta:"Antropolingüística: relaciones entre lenguaje y cultura. Sociolingüística: variación por factores sociales. Etnografía de la comunicación: estudio del uso en comunidades concretas."},
        {id:2, teoria:"La hipótesis de Sapir-Whorf sostiene que la lengua que hablamos influye en nuestra percepción y pensamiento. Versión fuerte (determinismo) afirma que la lengua determina el pensamiento; versión débil (relativismo) sostiene que influye y facilita ciertas distinciones.", ejemplo:"El español distingue 'ser' y 'estar' para atributos permanentes vs temporales, lo que podría influir en cómo los hispanohablantes conceptualizan la permanencia.", ejercicio:"¿Qué evidencia hay a favor de la hipótesis de Sapir-Whorf?", respuesta:"Estudios con la lengua zuñi (colores) y guugu yimithirr (orientación espacial absoluta)."},
        {id:3, teoria:"El determinismo lingüístico propone que la lengua determina categóricamente el pensamiento. El relativismo sostiene que influye pero no determina. La evidencia apoya principalmente el relativismo.", ejemplo:"Hablantes de lenguas que distinguen 'azul claro' y 'azul oscuro' son más rápidos en discriminar esos tonos, pero los hablantes de español también pueden aprender.", ejercicio:"¿Qué críticas ha recibido la hipótesis de Sapir-Whorf?", respuesta:"Falta de evidencia empírica sólida, circularidad metodológica, subestimación de la plasticidad cognitiva."},
        {id:4, teoria:"Las lenguas categorizan la realidad de maneras diferentes: sistemas de colores, parentesco, numerales, clasificadores nominales, y taxonomías populares (plantas, animales, enfermedades).", ejemplo:"El español no distingue lingüísticamente tío paterno de materno; otras lenguas sí tienen términos específicos.", ejercicio:"Describe cómo el español categoriza el parentesco y compáralo con otro sistema.", respuesta:"Español: bilateral y descriptivo ('abuelo', 'tío', 'primo'). El sistema omaha fusiona categorías (llama 'padre' a tíos paternos)."},
        {id:5, teoria:"La cultura influye en el léxico (palabras para conceptos culturalmente relevantes), en los patrones de uso (cortesía, silencio), y en la organización del discurso.", ejemplo:"El español tiene un rico vocabulario para emociones ('vergüenza', 'duende', 'morriña') que refleja valores culturales específicos.", ejercicio:"Explica cómo la cultura influye en el léxico emocional del español.", respuesta:"El español tiene términos como 'vergüenza' (honor social), 'morriña' (nostalgia), 'duende' (emoción estética), reflejando valores de colectivismo y expresividad cultural."},
        {id:6, teoria:"La etnografía de la comunicación (Hymes) analiza los patrones de uso lingüístico en comunidades concretas, considerando el contexto situacional, participantes, propósitos, forma del mensaje, tono, canal y normas.", ejemplo:"Estudio de formas de saludo en el mundo andino: el acto de saludo puede durar varios minutos e incluir preguntas rituales.", ejercicio:"¿Qué componentes del evento comunicativo analiza el modelo SPEAKING de Hymes?", respuesta:"S-Situation, P-Participants, E-Ends, A-Act sequence, K-Key, I-Instrumentalities, N-Norms, G-Genre."},
        {id:7, teoria:"La sociolingüística se centra en variación lingüística por factores sociales; la antropolingüística tiene enfoque cultural y etnográfico, estudiando la lengua como parte del sistema cultural.", ejemplo:"Sociolingüístico: variación de 's' final según nivel socioeconómico. Antropolingüístico: cómo los términos de colores reflejan clasificación del mundo natural.", ejercicio:"Compara objetos de estudio y métodos de sociolingüística y antropolingüística.", respuesta:"Sociolingüística: variables sociodemográficas, métodos cuantitativos. Antropolingüística: cosmovisión, rituales, métodos cualitativos (observación participante)."},
        {id:8, teoria:"La cosmovisión hispana está influenciada por herencia latina, árabe, judía y amerindia. Conceptos como 'honor', 'vergüenza', 'destino', 'familia' están codificados en el léxico y estructuras discursivas.", ejemplo:"El uso del subjuntivo español distingue hechos (indicativo) de eventualidades, deseos, valoraciones (subjuntivo), reflejando una categorización particular de la realidad.", ejercicio:"¿Cómo refleja el español la cosmovisión hispana a través del subjuntivo y ser/estar?", respuesta:"Subjuntivo: distingue realidad de irrealidad. Ser/estar: esencia vs estado. Formas de tratamiento: jerarquía, distancia, solidaridad."},
        {id:9, teoria:"Las etnografías del habla documentan prácticas comunicativas en el mundo hispano: rituales (piropos, albures), cortesía, normas conversacionales, estilos narrativos, y géneros discursivos tradicionales (romances, décimas, corridos).", ejemplo:"El 'albur' mexicano es un género lúdico basado en doble connotación sexual, que requiere habilidad lingüística, rapidez mental y conocimiento cultural.", ejercicio:"Describe un género discursivo tradicional del mundo hispano y sus características.", respuesta:"El romance: poesía épico-lírica, versos octosílabos, rima asonante, transmitido oralmente. Funciones: narrar historias, preservar memoria histórica."},
        {id:10, teoria:"El lenguaje ritual (fórmulas religiosas, juramentos, bendiciones, rezos) tiene fijación, repetición, formalidad, función performativa (el decir realiza el acto).", ejemplo:"La bendición 'Dios te bendiga' después de un estornudo tiene origen en la creencia de que el estornudo podía expulsar el alma.", ejercicio:"Analiza un acto de habla ritual en español desde la antropolingüística.", respuesta:"Juramento: fórmula fija ('¿Juras decir la verdad...?'), respuesta ritual ('sí, juro'), contexto institucional, función performativa (crea obligación)."},
        {id:11, teoria:"La pragmática intercultural estudia diferencias en el uso del lenguaje entre culturas: actos de habla, estrategias de atenuación, normas conversacionales, y gestión de la imagen pública.", ejemplo:"Petición '¿Me prestas un lápiz?' en España es directa. En Colombia: '¿Me regala un lápiz, por favor?'", ejercicio:"Compara estrategias de cortesía para pedir un favor en español y otra lengua.", respuesta:"Español: preguntas indirectas ('¿Podrías...?'), condicional, 'por favor', 'usted'. Inglés: 'Could you please...?' Japonés: formas honoríficas, mayor atenuación."},
        {id:12, teoria:"Los tabúes lingüísticos son palabras o temas evitados por convención social. En el mundo hispano: tabúes religiosos, sexuales, de muerte, políticos. El tabú genera eufemismos y disfemismos.", ejemplo:"Eufemismos: 'falleció' por 'murió', 'tercera edad' por 'vejez'. Disfemismos: 'estiró la pata', 'colgar los tenis'.", ejercicio:"Explica el fenómeno del tabú lingüístico en español y da ejemplos.", respuesta:"Muerte: 'fallecer', 'descansar en paz'. Sexo: 'hacer el amor', 'tener relaciones'. Enfermedad: 'padecer'. El tabú refleja lo culturalmente peligroso o vergonzoso."}
    ];
    
    for (let det of tecnicasDetalladas) {
        let idx = tecnicas.findIndex(t => t.id === det.id);
        if (idx !== -1) {
            tecnicas[idx].teoria = det.teoria;
            tecnicas[idx].ejemplo = det.ejemplo;
            tecnicas[idx].ejercicio = det.ejercicio;
            tecnicas[idx].respuesta = det.respuesta;
        }
    }

    let currentTechIdx = 0;

    // Inicializar campos de usuario
    for (let i = 0; i < tecnicas.length; i++) {
        if (!tecnicas[i].completada) tecnicas[i].completada = false;
        if (!tecnicas[i].respuestaUsuario) tecnicas[i].respuestaUsuario = "";
    }

    // localStorage functions
    function guardarProgreso() {
        let data = tecnicas.map(t => ({ completada: t.completada, respuestaUsuario: t.respuestaUsuario || "" }));
        localStorage.setItem("antropolinguistica_progreso", JSON.stringify(data));
        actualizarEstadisticas();
        actualizarBarraOro();
        renderIndiceLateral();
    }

    function cargarProgreso() {
        let saved = localStorage.getItem("antropolinguistica_progreso");
        if (saved) {
            let data = JSON.parse(saved);
            for (let i = 0; i < tecnicas.length; i++) {
                if (data[i]) {
                    tecnicas[i].completada = data[i].completada || false;
                    tecnicas[i].respuestaUsuario = data[i].respuestaUsuario || "";
                }
            }
        }
        actualizarEstadisticas();
        actualizarBarraOro();
        renderIndiceLateral();
    }

    function actualizarEstadisticas() {
        let completadas = tecnicas.filter(t => t.completada).length;
        let porcentaje = Math.round((completadas / 100) * 100);
        const statsDiv = document.getElementById("statsPreview");
        if (statsDiv) statsDiv.innerHTML = `Progreso: ${porcentaje}% · Técnicas completadas: ${completadas}/100 · ⚜ antropolingüística`;
        const goldFill = document.getElementById("globalGoldFill");
        if (goldFill) goldFill.style.width = porcentaje + "%";
    }

    function actualizarBarraOro() {
        let completadas = tecnicas.filter(t => t.completada).length;
        let pct = (completadas / 100) * 100;
        document.getElementById("globalGoldFill").style.width = pct + "%";
    }

    function renderIndiceLateral() {
        const busqueda = document.getElementById("searchTech")?.value.toLowerCase() || "";
        let filtradas = tecnicas.filter(t => t.nombre.toLowerCase().includes(busqueda) || (t.teoria && t.teoria.toLowerCase().includes(busqueda)));
        const listaUl = document.getElementById("techIndexList");
        if (!listaUl) return;
        listaUl.innerHTML = "";
        filtradas.forEach(tech => {
            let li = document.createElement("li");
            let a = document.createElement("a");
            a.innerHTML = `${tech.nombre.substring(0, 52)}${tech.nombre.length > 52 ? "…" : ""} ${tech.completada ? "✓" : "○"}`;
            a.addEventListener("click", (e) => {
                e.preventDefault();
                currentTechIdx = tech.id - 1;
                renderVistaTecnica();
                if (window.innerWidth <= 800) document.getElementById("luxSidebar").classList.remove("open");
            });
            li.appendChild(a);
            listaUl.appendChild(li);
        });
    }

    function renderVistaTecnica() {
        const t = tecnicas[currentTechIdx];
        const container = document.getElementById("dynamicTechView");
        if (!container) return;
        const letraInicial = t.nombre.charAt(0);
        container.innerHTML = `
            <div class="tech-primary">
                <div class="numero-gigante">${t.id}</div>
                <div class="tech-title"><span class="capitular">${letraInicial}</span>${t.nombre.substring(1)}</div>
                <div class="card"><h3>📜 Teoría antropolingüística</h3><p>${t.teoria || "Teoría no disponible."}</p></div>
                <div class="card"><h3>❧ Ejemplo cultural</h3><p>${t.ejemplo || "Ejemplo no disponible."}</p></div>
                <div class="card"><h3>✍️ Ejercicio de análisis</h3><p>${t.ejercicio || "Ejercicio no disponible."}</p>
                    <textarea id="respuestaTextAreaLux" rows="4" placeholder="Escribe aquí tu respuesta...">${t.respuestaUsuario || ""}</textarea>
                    <div style="margin-top: 0.5rem;">
                        <button class="btn-nav btn-show-answer" id="btnMostrarRespuesta">📖 Ver respuesta correcta</button>
                    </div>
                    <div id="respuestaCorrectaPanel" class="respuesta-correcta">
                        <strong>✓ Respuesta modelo:</strong><br>${t.respuesta || "Respuesta no disponible."}
                    </div>
                </div>
                <div style="margin: 2rem 0;">
                    <button class="btn-nav" id="btnAnterior">← anterior</button>
                    <button class="btn-nav btn-complete" id="btnCompletar">${t.completada ? "✓ Completada" : "◌ Marcar completada"}</button>
                    <button class="btn-nav" id="btnSiguiente">siguiente →</button>
                </div>
            </div>
            <div class="tech-aside">
                <div><strong>⚜ Progreso global</strong><div class="progress-unit"><div style="width:${(tecnicas.filter(tc=>tc.completada).length/100)*100}%; height:6px; background:var(--oro-antiguo); border-radius:30px;"></div></div>
                <p>${tecnicas.filter(tc=>tc.completada).length} de 100 técnicas</p>
                <hr style="margin:1rem 0; border-color:#cfc3ad;">
                <p><strong>📖 Técnica actual</strong><br>${t.nombre.split('. ')[1]?.substring(0, 40) || t.nombre.substring(0, 40)}</p>
                <p><strong>🎨 Enfoque</strong><br>Lengua · Cultura · Sociedad · Identidad</p>
                <div class="ornament-line" style="font-size:1.2rem;">⁂ § ⚜</div>
                <p style="margin-top:1rem; font-size:0.8rem;">“La lengua es el espejo de la cultura” — Edward Sapir</p>
            </div>
        `;
        const textarea = document.getElementById("respuestaTextAreaLux");
        if (textarea) {
            textarea.addEventListener("input", (e) => {
                tecnicas[currentTechIdx].respuestaUsuario = e.target.value;
                guardarProgreso();
            });
        }
        const btnRespuesta = document.getElementById("btnMostrarRespuesta");
        const panelRespuesta = document.getElementById("respuestaCorrectaPanel");
        if (btnRespuesta && panelRespuesta) {
            btnRespuesta.addEventListener("click", () => {
                panelRespuesta.classList.toggle("visible");
            });
        }
        document.getElementById("btnAnterior")?.addEventListener("click", () => {
            if (currentTechIdx > 0) { currentTechIdx--; renderVistaTecnica(); window.scrollTo(0, 0); }
        });
        document.getElementById("btnSiguiente")?.addEventListener("click", () => {
            if (currentTechIdx < 99) { currentTechIdx++; renderVistaTecnica(); window.scrollTo(0, 0); }
        });
        document.getElementById("btnCompletar")?.addEventListener("click", () => {
            tecnicas[currentTechIdx].completada = !tecnicas[currentTechIdx].completada;
            guardarProgreso();
            renderVistaTecnica();
            renderIndiceLateral();
        });
    }

    const menuBtn = document.getElementById("menuToggleBtn");
    const sidebar = document.getElementById("luxSidebar");
    const closeBtn = document.getElementById("closeSidebarBtn");
    menuBtn?.addEventListener("click", () => sidebar.classList.toggle("open"));
    closeBtn?.addEventListener("click", () => sidebar.classList.remove("open"));
    const searchInput = document.getElementById("searchTech");
    searchInput?.addEventListener("input", () => renderIndiceLateral());

    function inicializar() {
        cargarProgreso();
        renderVistaTecnica();
        window.addEventListener("beforeunload", () => guardarProgreso());
    }
    inicializar();
</script>
</body>
</html>
