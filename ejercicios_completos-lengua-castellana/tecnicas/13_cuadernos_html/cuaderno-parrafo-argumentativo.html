<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuaderno del Párrafo Argumentativo — 100 técnicas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=IBM+Plex+Mono:wght@400;500;600&family=Caveat:wght@400;600;700&family=Mrs+Saint+Delafield&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EAE1D3;
    --paper-dark:#D8C4A9;
    --drawer:#8B4A2B;
    --drawer-dark:#6B3820;
    --page:#FBF7EF;
    --ink:#2A2119;
    --ink-light:#75695B;
    --red:#A8342A;
    --green:#3F6B4C;
    --gold:#96702A;
    --rule:#E0CFC0;
    --margin-red:#B5645A;
    --shadow: 0 10px 30px rgba(42,33,25,0.18);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(ellipse at top left, rgba(255,255,255,0.25), transparent 50%),
      var(--paper);
    color:var(--ink);
    font-family:'Source Serif 4', serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:940px;margin:0 auto;padding:26px 16px 60px;}

  header{text-align:center;margin-bottom:20px;}
  .plate{
    display:inline-block;
    background:var(--drawer);
    border:2px solid var(--drawer-dark);
    border-radius:4px;
    padding:6px 22px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2), var(--shadow);
    transform:rotate(-0.6deg);
  }
  .plate h1{
    font-family:'Special Elite', monospace;
    font-size:1.24rem;
    letter-spacing:0.05em;
    margin:0;
    color:#f5ece1;
    text-transform:uppercase;
  }
  header p{color:var(--ink-light);font-size:0.92rem;margin:10px 0 0;font-style:italic;}

  .tabs{display:flex;gap:6px;overflow-x:auto;padding:4px 2px 12px;scrollbar-width:thin;}
  .tab{
    flex:0 0 auto;font-family:'IBM Plex Mono', monospace;font-size:0.64rem;letter-spacing:0.03em;
    background:var(--page);border:1px solid #d8c6b3;border-bottom:3px solid var(--drawer-dark);
    padding:7px 10px;border-radius:3px 3px 0 0;cursor:pointer;color:var(--ink-light);white-space:nowrap;
    transition:transform .12s ease, color .12s ease, background .12s ease;
  }
  .tab:hover{transform:translateY(-2px);}
  .tab.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}

  .modebar{display:flex;justify-content:center;gap:10px;margin:4px 0 18px;flex-wrap:wrap;}
  .mode-btn{
    font-family:'IBM Plex Mono', monospace;font-size:0.76rem;padding:8px 15px;border-radius:999px;
    border:1.5px solid var(--ink);background:transparent;color:var(--ink);cursor:pointer;letter-spacing:0.02em;
  }
  .mode-btn.active{background:var(--ink);color:var(--paper);}

  .dash{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
  .stat{background:var(--page);border:1px solid #d8c6b3;border-radius:6px;padding:10px 8px;text-align:center;box-shadow:0 2px 0 #d8c6b3;}
  .stat .num{font-family:'IBM Plex Mono', monospace;font-size:1.3rem;font-weight:600;color:var(--red);display:block;}
  .stat .lbl{font-size:0.64rem;letter-spacing:0.05em;text-transform:uppercase;color:var(--ink-light);}
  .progress-outer{grid-column:1/-1;height:10px;background:var(--paper-dark);border-radius:999px;overflow:hidden;border:1px solid #d8c6b3;}
  .progress-inner{height:100%;background:linear-gradient(90deg, var(--gold), var(--drawer));width:0%;transition:width .4s ease;}

  .notebook{
    position:relative;
    background:var(--page);
    border-radius:6px;
    box-shadow:var(--shadow);
    padding:28px 26px 26px 62px;
    min-height:420px;
    background-image:
      repeating-linear-gradient(to bottom, transparent 0px, transparent 33px, var(--rule) 33px, var(--rule) 34px);
    background-position:0 78px;
  }
  .notebook::before{
    content:'';
    position:absolute;
    top:0;bottom:0;left:46px;
    width:1.5px;
    background:var(--margin-red);
    opacity:0.55;
  }
  .rings{
    position:absolute;
    left:-14px; top:26px; bottom:26px;
    width:28px;
    display:flex; flex-direction:column; justify-content:space-between;
  }
  .ring{
    width:26px;height:26px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #f4efe0, #c8bb98 60%, #9c8c62);
    box-shadow: inset 0 0 0 4px var(--page), 0 1px 2px rgba(0,0,0,0.3);
  }

  .card-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
  .card-num{font-family:'IBM Plex Mono', monospace;font-size:0.82rem;color:var(--red);font-weight:600;}
  .card-block{font-family:'IBM Plex Mono', monospace;font-size:0.6rem;color:var(--ink-light);text-transform:uppercase;letter-spacing:0.03em;}
  .notebook h2{font-family:'Special Elite', monospace;font-size:1.1rem;line-height:1.35;margin:2px 0 12px;}
  .notebook .desc{font-size:1.0rem;line-height:1.65;color:#332920;}
  .quiz-clue{font-size:1.0rem;line-height:1.65;color:#332920;font-style:italic;}

  .options{display:grid;gap:9px;margin-top:16px;}
  .opt{
    text-align:left;font-family:'Source Serif 4', serif;font-size:0.94rem;background:var(--paper);
    border:1px solid #d8c6b3;border-radius:5px;padding:10px 12px;cursor:pointer;
    transition:background .12s ease, transform .1s ease;
  }
  .opt:hover{background:#fff;transform:translateX(2px);}
  .opt.correct{background:#e2ecdf;border-color:var(--green);color:var(--green);}
  .opt.wrong{background:#f3dedb;border-color:var(--red);color:var(--red);}
  .opt:disabled{cursor:default;}

  .card-actions{display:flex;justify-content:space-between;align-items:center;margin-top:18px;}
  .btn{
    font-family:'IBM Plex Mono', monospace;font-size:0.76rem;padding:9px 14px;border-radius:5px;
    border:1.5px solid var(--ink);background:var(--ink);color:var(--paper);cursor:pointer;
  }
  .btn.ghost{background:transparent;color:var(--ink);}
  .btn:disabled{opacity:0.35;cursor:default;}

  .stamp{
    position:absolute;top:34%;left:58%;transform:translate(-50%,-50%) rotate(-12deg) scale(0.5);
    font-family:'Special Elite', monospace;font-size:2rem;letter-spacing:0.08em;padding:8px 22px;
    border:5px solid;border-radius:8px;opacity:0;pointer-events:none;text-transform:uppercase;mix-blend-mode:multiply;
  }
  .stamp.show{animation: stampIn .35s ease-out forwards;}
  .stamp.ok{color:var(--green);border-color:var(--green);}
  .stamp.no{color:var(--red);border-color:var(--red);}
  @keyframes stampIn{
    0%{opacity:0;transform:translate(-50%,-50%) rotate(-12deg) scale(1.8);}
    60%{opacity:0.85;transform:translate(-50%,-50%) rotate(-12deg) scale(0.92);}
    100%{opacity:0.85;transform:translate(-50%,-50%) rotate(-12deg) scale(1);}
  }

  .write-panel{margin-top:18px;padding-top:14px;border-top:1px dashed #d8c6b3;}
  .write-panel .hint{
    font-family:'IBM Plex Mono', monospace;font-size:0.68rem;color:var(--ink-light);
    text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px;
  }
  .cursive-input{
    width:100%;border:none;border-bottom:2px solid var(--rule);background:transparent;
    font-family:'Caveat', cursive;font-size:1.55rem;color:#5c3117;padding:6px 2px;outline:none;
  }
  .cursive-input::placeholder{font-family:'Caveat', cursive;color:#c2a68f;font-size:1.4rem;}
  .cursive-input:focus{border-bottom-color:var(--gold);}

  .sig-row{display:flex;gap:14px;align-items:flex-end;margin-top:16px;flex-wrap:wrap;}
  .sig-box{flex:1 1 220px;}
  .sig-box label{
    display:block;font-family:'IBM Plex Mono', monospace;font-size:0.62rem;text-transform:uppercase;
    letter-spacing:0.04em;color:var(--ink-light);margin-bottom:4px;
  }
  .sig-input{
    width:100%;border:none;border-bottom:2px solid var(--rule);background:transparent;
    font-family:'Mrs Saint Delafield', cursive;font-size:2rem;color:var(--red);padding:2px 2px 4px;outline:none;
  }
  .sig-input::placeholder{font-family:'Source Serif 4', serif;font-size:0.85rem;color:#c7b39d;font-style:italic;}

  footer{text-align:center;margin-top:26px;color:var(--ink-light);font-size:0.74rem;font-family:'IBM Plex Mono', monospace;}

  .log-empty{text-align:center;color:var(--ink-light);font-style:italic;padding:50px 20px;}
  .log-entry{
    border-bottom:1px dashed #d8c6b3;padding:16px 0;display:grid;
    grid-template-columns:70px 1fr;gap:14px;align-items:start;
  }
  .log-entry:last-child{border-bottom:none;}
  .log-num{font-family:'IBM Plex Mono', monospace;font-size:0.72rem;color:var(--red);padding-top:4px;}
  .log-title{font-family:'Special Elite', monospace;font-size:0.95rem;margin:0 0 6px;}
  .log-block{
    font-family:'IBM Plex Mono', monospace;font-size:0.6rem;color:var(--ink-light);
    text-transform:uppercase;letter-spacing:0.03em;margin-bottom:8px;display:block;
  }
  .log-written{font-family:'Caveat', cursive;font-size:1.4rem;color:#5c3117;line-height:1.3;margin:4px 0 8px;}
  .log-sig-row{display:flex;justify-content:space-between;align-items:flex-end;gap:10px;}
  .log-sig{font-family:'Mrs Saint Delafield', cursive;font-size:1.7rem;color:var(--red);}
  .log-date{font-family:'IBM Plex Mono', monospace;font-size:0.62rem;color:var(--ink-light);}
  .log-del{background:none;border:none;color:var(--ink-light);cursor:pointer;font-size:0.85rem;padding:2px 6px;}
  .log-del:hover{color:var(--red);}

  @media (max-width:520px){
    .dash{grid-template-columns:repeat(2,1fr);}
    .plate h1{font-size:0.95rem;}
    .notebook h2{font-size:0.94rem;}
    .notebook{padding-left:50px;}
    .log-entry{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="plate"><h1>Cuaderno del Párrafo Argumentativo</h1></div>
    <p>100 técnicas para persuadir con argumentos — practica, escribe a mano y firma</p>
  </header>

  <div class="modebar">
    <button class="mode-btn active" data-mode="explorar">📖 Explorar</button>
    <button class="mode-btn" data-mode="practicar">✍️ Practicar (quiz)</button>
    <button class="mode-btn" data-mode="cuaderno">📓 Mi cuaderno</button>
  </div>

  <div class="dash">
    <div class="stat"><span class="num" id="statScore">0</span><span class="lbl">Puntaje</span></div>
    <div class="stat"><span class="num" id="statStreak">0</span><span class="lbl">Racha actual</span></div>
    <div class="stat"><span class="num" id="statBest">0</span><span class="lbl">Mejor racha</span></div>
    <div class="stat"><span class="num" id="statMastered">0/100</span><span class="lbl">Dominadas</span></div>
    <div class="progress-outer"><div class="progress-inner" id="progressBar"></div></div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="stage" style="position:relative;">
    <div class="notebook" id="notebook">
      <div class="rings" id="rings"></div>
      <div class="stamp" id="stamp"></div>
      <div id="notebookBody"></div>
    </div>
  </div>

  <footer>Tu cuaderno y tu progreso se guardan en este navegador.</footer>
  <div style="text-align:center;margin-top:10px;">
    <button class="btn ghost" id="resetBtn" style="font-size:0.68rem;">↺ Restablecer todo</button>
  </div>
</div>

<script>
const TECHNIQUES = [
// I. Elementos básicos del párrafo argumentativo (1-12)
[1,1,"Tesis","Idea principal que el párrafo o el texto defiende y busca demostrar."],
[2,1,"Argumento","Razón concreta que se aporta para sostener la tesis."],
[3,1,"Contraargumento","Razón u objeción que respalda la postura contraria a la tesis."],
[4,1,"Refutación","Respuesta que invalida o debilita un contraargumento."],
[5,1,"Concesión","Reconocimiento parcial de la validez de una objeción antes de matizarla."],
[6,1,"Evidencia o prueba","Dato, hecho o testimonio que respalda un argumento."],
[7,1,"Garantía (warrant)","Principio o supuesto que conecta la evidencia con la conclusión."],
[8,1,"Conclusión parcial","Cierre de un argumento específico dentro del desarrollo del párrafo."],
[9,1,"Premisa","Afirmación que sirve de base lógica para llegar a una conclusión."],
[10,1,"Falacia","Error de razonamiento que debilita la validez de un argumento."],
[11,1,"Postura o punto de vista","Posición concreta que el autor adopta frente al tema tratado."],
[12,1,"Audiencia (destinatario)","Lector o público al que se dirige y adapta la argumentación."],

// II. Tipos de argumento (13-27)
[13,2,"Argumento de autoridad","Se apoya en la opinión de un experto o una fuente reconocida."],
[14,2,"Argumento de ejemplo","Usa un caso concreto para respaldar una afirmación general."],
[15,2,"Argumento causal","Sostiene la tesis explicando una relación de causa y efecto."],
[16,2,"Argumento de analogía","Compara la situación con otra similar para sostener la conclusión."],
[17,2,"Argumento de generalización","Extiende una conclusión válida en varios casos a un principio general."],
[18,2,"Argumento estadístico o de datos","Se apoya en cifras o estudios cuantitativos verificables."],
[19,2,"Argumento ad populum","Apela a la opinión mayoritaria como si eso garantizara su verdad."],
[20,2,"Argumento de consecuencias","Justifica la tesis mostrando los efectos positivos o negativos de aceptarla."],
[21,2,"Argumento de signos","Interpreta un indicio como prueba indirecta de algo no observado directamente."],
[22,2,"Argumento de definición","Sostiene la tesis a partir del significado preciso de un concepto clave."],
[23,2,"Argumento de principios o valores","Se apoya en normas éticas o valores compartidos por la audiencia."],
[24,2,"Argumento pragmático","Justifica la tesis por su utilidad práctica o sus resultados concretos."],
[25,2,"Argumento emocional (pathos)","Apela a los sentimientos del lector para reforzar la persuasión."],
[26,2,"Argumento lógico deductivo","Parte de premisas generales para llegar a una conclusión particular necesaria."],
[27,2,"Argumento lógico inductivo","Parte de casos particulares para sugerir una conclusión general probable."],

// III. Estructuras del párrafo argumentativo (28-40)
[28,3,"Estructura tesis-argumentos-conclusión","Presenta la tesis, la respalda con razones y cierra con una síntesis."],
[29,3,"Estructura problema-solución","Plantea una dificultad y argumenta a favor de una manera de resolverla."],
[30,3,"Estructura de contraste","Expone razones a favor y en contra antes de tomar postura."],
[31,3,"Estructura concesiva","Reconoce una objeción ('aunque') antes de reafirmar la tesis ('sin embargo')."],
[32,3,"Estructura de causa-consecuencia","Argumenta mostrando qué provoca qué y con qué efectos."],
[33,3,"Estructura silogística","Organiza el argumento en premisa mayor, premisa menor y conclusión."],
[34,3,"Estructura de enumeración de razones","Presenta varias razones ordenadas que sostienen la misma tesis."],
[35,3,"Estructura dialéctica","Expone tesis, antítesis y una síntesis que las integra."],
[36,3,"Estructura deductiva","Va de un principio general a su aplicación en un caso concreto."],
[37,3,"Estructura inductiva","Va de casos concretos hacia una conclusión general."],
[38,3,"Párrafo de apertura argumentativa","Presenta el tema y anticipa la postura que se defenderá."],
[39,3,"Párrafo de desarrollo argumentativo","Despliega uno o varios argumentos con su evidencia correspondiente."],
[40,3,"Párrafo de cierre argumentativo","Sintetiza los argumentos y refuerza la tesis sin repetirla literalmente."],

// IV. Técnicas retóricas de persuasión (41-58)
[41,4,"Ethos","Apela a la credibilidad y autoridad moral de quien argumenta."],
[42,4,"Pathos","Apela a las emociones del lector para reforzar la persuasión."],
[43,4,"Logos","Apela a la razón y a la coherencia lógica del argumento."],
[44,4,"Pregunta retórica","Formula una pregunta cuya respuesta obvia refuerza la tesis."],
[45,4,"Anáfora persuasiva","Repite una expresión al inicio de varias oraciones para dar fuerza al argumento."],
[46,4,"Gradación (clímax argumentativo)","Ordena las razones de menor a mayor fuerza persuasiva."],
[47,4,"Antítesis argumentativa","Contrapone dos ideas opuestas para resaltar la validez de la propia postura."],
[48,4,"Hipérbole persuasiva","Exagera deliberadamente para intensificar el efecto de un argumento."],
[49,4,"Ironía argumentativa","Usa el sentido contrario de las palabras con fin crítico o persuasivo."],
[50,4,"Metáfora persuasiva","Traslada significado de otro campo para hacer más memorable un argumento."],
[51,4,"Símil argumentativo","Compara explícitamente la situación con otra para reforzar la tesis."],
[52,4,"Apelación a valores compartidos","Vincula la tesis con principios que la audiencia ya acepta."],
[53,4,"Apelación a la experiencia común","Usa vivencias cotidianas del lector para hacer creíble el argumento."],
[54,4,"Uso de cifras impactantes","Presenta un dato numérico que sorprende y refuerza la tesis."],
[55,4,"Uso de testimonios","Incorpora la voz de alguien afectado o experto para dar peso al argumento."],
[56,4,"Personalización del ejemplo","Convierte un caso general en una historia concreta y cercana."],
[57,4,"Lenguaje inclusivo (nosotros)","Usa la primera persona del plural para generar cercanía con el lector."],
[58,4,"Llamada a la acción","Invita explícitamente al lector a actuar o a cambiar de postura."],

// V. Técnicas de organización lógica (59-70)
[59,5,"Conectores causales","Palabras como 'porque' o 'ya que' que introducen la razón de un argumento."],
[60,5,"Conectores consecutivos","Palabras como 'por lo tanto' que introducen la conclusión derivada."],
[61,5,"Conectores concesivos","Palabras como 'aunque' que introducen una objeción reconocida."],
[62,5,"Conectores adversativos","Palabras como 'sin embargo' que introducen un matiz opuesto."],
[63,5,"Conectores de adición","Palabras como 'además' que suman un nuevo argumento al ya expuesto."],
[64,5,"Conectores de orden","Expresiones como 'en primer lugar' que organizan la secuencia de razones."],
[65,5,"Progresión de menor a mayor fuerza","Ordena los argumentos guardando el más contundente para el final."],
[66,5,"Progresión de mayor a menor fuerza","Abre con el argumento más fuerte y cierra con los de apoyo."],
[67,5,"Anticipación del contraargumento","Menciona la objeción antes de que el lector la piense por sí mismo."],
[68,5,"Refutación explícita","Señala directamente por qué un contraargumento no es válido o suficiente."],
[69,5,"Concesión parcial","Acepta parte de la objeción para luego matizarla o limitarla."],
[70,5,"Síntesis final de razones","Reúne brevemente los argumentos principales antes de concluir."],

// VI. Falacias comunes a evitar (71-85)
[71,6,"Ad hominem","Ataca a la persona que argumenta en vez de refutar su argumento."],
[72,6,"Falsa causa (post hoc)","Asume que un hecho causó otro solo porque ocurrió antes."],
[73,6,"Falsa dicotomía","Presenta solo dos opciones cuando en realidad existen más alternativas."],
[74,6,"Generalización apresurada","Extiende una conclusión a partir de muy pocos casos observados."],
[75,6,"Pendiente resbaladiza","Afirma que un hecho menor desencadenará inevitablemente una cadena de consecuencias graves."],
[76,6,"Apelación a la ignorancia","Da por válido un argumento solo porque no se ha demostrado lo contrario."],
[77,6,"Círculo vicioso (petición de principio)","Da por probado en la premisa lo mismo que se pretende demostrar."],
[78,6,"Hombre de paja","Deforma la postura contraria para hacerla más fácil de refutar."],
[79,6,"Apelación a la tradición","Justifica algo solo porque siempre se ha hecho así."],
[80,6,"Apelación a la novedad","Justifica algo solo porque es reciente o moderno."],
[81,6,"Falacia del francotirador","Selecciona solo los datos que confirman la tesis, ignorando el resto."],
[82,6,"Falacia de autoridad mal aplicada","Cita a una autoridad ajena al tema específico que se está discutiendo."],
[83,6,"Falacia ad populum","Da por válido un argumento solo porque muchos lo creen cierto."],
[84,6,"Falso dilema temporal","Presenta una decisión como urgente cuando en realidad admite más tiempo."],
[85,6,"Non sequitur","La conclusión no se desprende lógicamente de las premisas presentadas."],

// VII. Párrafo argumentativo según el género textual (86-93)
[86,7,"Párrafo de ensayo argumentativo","Desarrolla una reflexión personal sostenida con razones y evidencia."],
[87,7,"Párrafo de editorial periodístico","Expresa la postura institucional de un medio sobre un tema de actualidad."],
[88,7,"Párrafo de artículo de opinión","Defiende el punto de vista personal de su autor sobre un tema público."],
[89,7,"Párrafo jurídico argumentativo (alegato)","Defiende una postura legal apoyada en normas y precedentes."],
[90,7,"Párrafo académico argumentativo","Sostiene una postura con rigor metodológico y cita de fuentes."],
[91,7,"Párrafo publicitario persuasivo","Argumenta a favor de un producto apelando a beneficios y emociones."],
[92,7,"Párrafo de discurso político","Busca persuadir a una audiencia amplia combinando razón y emoción."],
[93,7,"Párrafo de debate oral","Se construye para ser dicho en voz alta y responder en tiempo real a objeciones."],

// VIII. Revisión y errores comunes (94-97)
[94,8,"Argumento sin evidencia","Afirma una razón sin respaldarla con datos, ejemplos o autoridad."],
[95,8,"Falta de conexión entre tesis y argumentos","Los argumentos no sostienen claramente la tesis planteada."],
[96,8,"Exceso de argumentos débiles sin jerarquía","Acumula muchas razones poco sólidas en vez de pocas bien fundamentadas."],
[97,8,"Tono agresivo que debilita la persuasión","Un tono hostil aleja a la audiencia en vez de convencerla."],

// IX. Técnicas bilingües del párrafo argumentativo español-inglés (98-100)
[98,9,"Estructura claim-evidence-warrant","Modelo anglosajón explícito que puede adaptarse, no imponerse, al español."],
[99,9,"Conectores argumentativos entre idiomas","'Therefore' y 'por lo tanto' no siempre ocupan el mismo lugar ni el mismo peso formal."],
[100,9,"Adaptación del tono persuasivo al traducir","La intensidad emocional y la formalidad del argumento deben ajustarse a cada idioma."]
].map(([id,block,title,desc])=>({id,block,title,desc}));

const BLOCK_NAMES = {
  1:"I · Elementos básicos", 2:"II · Tipos de argumento", 3:"III · Estructuras",
  4:"IV · Técnicas retóricas", 5:"V · Organización lógica", 6:"VI · Falacias a evitar",
  7:"VII · Según el género", 8:"VIII · Errores comunes", 9:"IX · Técnicas bilingües ES-EN"
};

const STORAGE_KEY = "cuaderno-parrafo-argumentativo-v1";
let memoryStore = null;

function loadProgress(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return memoryStore || { score:0, streak:0, best:0, mastery:{}, log:[] };
}
function saveProgress(p){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); }
  catch(e){ memoryStore = p; }
}

let progress = loadProgress();
if(!progress.log) progress.log = [];
let currentBlock = "all";
let currentIndex = 0;
let mode = "explorar";
let quizCurrent = null;
let answered = false;

const tabsEl = document.getElementById('tabs');
const notebookBody = document.getElementById('notebookBody');
const stampEl = document.getElementById('stamp');
const ringsEl = document.getElementById('rings');

for(let i=0;i<9;i++){ const d=document.createElement('div'); d.className='ring'; ringsEl.appendChild(d); }

function buildTabs(){
  const blocks = [["all","Todas"], ...Object.entries(BLOCK_NAMES)];
  tabsEl.innerHTML = "";
  blocks.forEach(([key,label])=>{
    const b = document.createElement('button');
    b.className = 'tab' + (String(key)===String(currentBlock) ? ' active' : '');
    b.textContent = label;
    b.onclick = ()=>{ currentBlock = key; currentIndex = 0; buildTabs(); render(); };
    tabsEl.appendChild(b);
  });
  tabsEl.style.display = mode==="cuaderno" ? "none" : "flex";
}

function filteredTechniques(){
  if(currentBlock==="all") return TECHNIQUES;
  return TECHNIQUES.filter(t=>String(t.block)===String(currentBlock));
}

function updateDash(){
  document.getElementById('statScore').textContent = progress.score;
  document.getElementById('statStreak').textContent = progress.streak;
  document.getElementById('statBest').textContent = progress.best;
  const masteredCount = Object.values(progress.mastery).filter(v=>v>=3).length;
  document.getElementById('statMastered').textContent = masteredCount + "/100";
  document.getElementById('progressBar').style.width = masteredCount + "%";
}

function markSeen(id){
  if(!progress.mastery[id]) progress.mastery[id] = 1;
  saveProgress(progress);
  updateDash();
}

function renderExplorar(){
  const list = filteredTechniques();
  if(currentIndex>=list.length) currentIndex = 0;
  if(currentIndex<0) currentIndex = list.length-1;
  const t = list[currentIndex];
  const level = progress.mastery[t.id] || 0;
  const badge = level>=3 ? "🟢 dominada" : level>=2 ? "🟡 practicada" : level>=1 ? "⚪ vista" : "· sin visitar";
  notebookBody.innerHTML = `
    <div class="card-top">
      <span class="card-num">Nº ${String(t.id).padStart(3,'0')}</span>
      <span class="card-block">${BLOCK_NAMES[t.block]}</span>
    </div>
    <h2>${t.title}</h2>
    <p class="desc">${t.desc}</p>
    <p style="font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:var(--ink-light);margin-top:14px;">${badge}</p>
    <div class="card-actions">
      <button class="btn ghost" id="prevBtn">← Anterior</button>
      <button class="btn" id="nextBtn">Siguiente →</button>
    </div>
  `;
  stampEl.className = "stamp";
  markSeen(t.id);
  document.getElementById('prevBtn').onclick = ()=>{ currentIndex -= 1; renderExplorar(); };
  document.getElementById('nextBtn').onclick = ()=>{ currentIndex += 1; renderExplorar(); };
}

function pickQuizQuestion(){
  const pool = filteredTechniques();
  quizCurrent = pool[Math.floor(Math.random()*pool.length)];
  let sameBlock = TECHNIQUES.filter(t=>t.block===quizCurrent.block && t.id!==quizCurrent.id).sort(()=>Math.random()-0.5);
  let others = TECHNIQUES.filter(t=>t.id!==quizCurrent.id && t.block!==quizCurrent.block).sort(()=>Math.random()-0.5);
  const distractors = sameBlock.concat(others).slice(0,3);
  const options = [quizCurrent, ...distractors].sort(()=>Math.random()-0.5);
  answered = false;
  return options;
}

function renderPracticar(){
  const options = pickQuizQuestion();
  notebookBody.innerHTML = `
    <div class="card-top">
      <span class="card-num">Nº ${String(quizCurrent.id).padStart(3,'0')}</span>
      <span class="card-block">${BLOCK_NAMES[quizCurrent.block]}</span>
    </div>
    <p class="quiz-clue">"${quizCurrent.desc}"</p>
    <p style="font-family:'IBM Plex Mono',monospace;font-size:0.68rem;color:var(--ink-light);margin-top:8px;">¿A qué técnica del párrafo argumentativo corresponde esta descripción?</p>
    <div class="options" id="optionsBox"></div>
    <div class="write-panel" id="writePanel" style="display:none;">
      <p class="hint">Ahora escríbela de tu puño y letra, como en un cuaderno</p>
      <input type="text" class="cursive-input" id="writeInput" placeholder="Escribe aquí el nombre de la técnica...">
      <div class="sig-row">
        <div class="sig-box">
          <label>Tu firma</label>
          <input type="text" class="sig-input" id="sigInput" placeholder="Firma con tu nombre o iniciales">
        </div>
        <button class="btn" id="saveLogBtn">Guardar en el cuaderno</button>
      </div>
    </div>
    <div class="card-actions">
      <button class="btn ghost" disabled></button>
      <button class="btn" id="nextBtn">Siguiente pregunta →</button>
    </div>
  `;
  stampEl.className = "stamp";
  const box = document.getElementById('optionsBox');
  options.forEach(opt=>{
    const b = document.createElement('button');
    b.className = 'opt';
    b.textContent = opt.title;
    b.onclick = ()=> handleAnswer(opt, b);
    box.appendChild(b);
  });
  document.getElementById('nextBtn').onclick = ()=> renderPracticar();
}

function handleAnswer(opt, btnEl){
  if(answered) return;
  answered = true;
  const isCorrect = opt.id === quizCurrent.id;
  document.querySelectorAll('#optionsBox .opt').forEach(b=>{
    b.disabled = true;
    if(b.textContent === quizCurrent.title) b.classList.add('correct');
  });
  if(!isCorrect) btnEl.classList.add('wrong');

  const prevLevel = progress.mastery[quizCurrent.id] || 0;
  if(isCorrect){
    progress.streak += 1;
    progress.best = Math.max(progress.best, progress.streak);
    progress.score += prevLevel>=2 ? 5 : 10;
    progress.mastery[quizCurrent.id] = prevLevel===0 ? 2 : Math.min(3, prevLevel+1);
    stampEl.textContent = "Correcto";
    stampEl.classList.add('ok');
  } else {
    progress.streak = 0;
    progress.mastery[quizCurrent.id] = Math.max(1, prevLevel);
    stampEl.textContent = "Revisar";
    stampEl.classList.add('no');
  }
  requestAnimationFrame(()=> stampEl.classList.add('show'));
  saveProgress(progress);
  updateDash();

  const panel = document.getElementById('writePanel');
  panel.style.display = 'block';
  const wi = document.getElementById('writeInput');
  wi.focus();
  document.getElementById('saveLogBtn').onclick = ()=>{
    const written = wi.value.trim();
    const sig = document.getElementById('sigInput').value.trim();
    if(!written){ wi.focus(); return; }
    progress.log.unshift({
      id: quizCurrent.id,
      block: quizCurrent.block,
      title: quizCurrent.title,
      written,
      sig: sig || "—",
      correct: isCorrect,
      date: new Date().toLocaleString('es-ES', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'})
    });
    saveProgress(progress);
    document.getElementById('saveLogBtn').textContent = "✓ Guardado";
    document.getElementById('saveLogBtn').disabled = true;
  };
}

function renderCuaderno(){
  if(progress.log.length===0){
    notebookBody.innerHTML = `<div class="log-empty">Tu cuaderno está vacío todavía.<br>Ve a "Practicar (quiz)", responde una pregunta y escribe tu respuesta a mano para guardarla aquí.</div>`;
    return;
  }
  const entries = progress.log.map((e,i)=>`
    <div class="log-entry">
      <div class="log-num">Nº ${String(e.id).padStart(3,'0')}</div>
      <div>
        <span class="log-block">${BLOCK_NAMES[e.block]} ${e.correct? '· ✅ correcta':'· ⚠️ a repasar'}</span>
        <p class="log-title">${e.title}</p>
        <p class="log-written">"${e.written}"</p>
        <div class="log-sig-row">
          <span class="log-sig">${e.sig}</span>
          <span class="log-date">${e.date}</span>
          <button class="log-del" data-idx="${i}" title="Eliminar entrada">🗑</button>
        </div>
      </div>
    </div>
  `).join("");
  notebookBody.innerHTML = `
    <div class="card-top">
      <span class="card-num">Mi cuaderno</span>
      <span class="card-block">${progress.log.length} entrada(s)</span>
    </div>
    ${entries}
  `;
  notebookBody.querySelectorAll('.log-del').forEach(btn=>{
    btn.onclick = ()=>{
      const idx = parseInt(btn.dataset.idx,10);
      progress.log.splice(idx,1);
      saveProgress(progress);
      renderCuaderno();
    };
  });
}

function render(){
  buildTabs();
  if(mode==="explorar") renderExplorar();
  else if(mode==="practicar") renderPracticar();
  else renderCuaderno();
  updateDash();
}

document.querySelectorAll('.mode-btn').forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll('.mode-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    mode = b.dataset.mode;
    currentIndex = 0;
    render();
  };
});

document.getElementById('resetBtn').onclick = ()=>{
  if(confirm("¿Restablecer todo tu progreso y borrar el cuaderno?")){
    progress = { score:0, streak:0, best:0, mastery:{}, log:[] };
    saveProgress(progress);
    render();
  }
};

render();
</script>
</body>
</html>
