</head>

<div class="container" id="app">

    <div class="quiz-section" id="quizSection">

        <div id="quizContainer"></div>

<script>
    // ================================================================
    // 100 TÉCNICAS DE DISFEMISMO (Literatura universal)
    // Distribuidas en 4 bloques: Narrativo, Descriptivo, Argumentativo, Expositivo
    // Cada técnica incluye: nombre, teoría, ejemplo literario, ejercicio y respuesta.
    // ================================================================
    const TECNICAS = [];

    // =================== BLOQUE 1: DISFEMISMOS NARRATIVOS (25) ===================
    const narrativos = [
        { nombre: "Estirar la pata", teoria: "Disfemismo humorístico para la muerte, usado en narraciones coloquiales.", ejemplo: "El viejo estiró la pata sin previo aviso.", ejercicio: "¿Qué disfemismo narrativo alude a la muerte de forma jocosa?", respuesta: "estirar la pata" },
        { nombre: "Colgar los tenis", teoria: "Disfemismo coloquial para morir.", ejemplo: "El boxeador colgó los tenis en el ring.", ejercicio: "¿Qué disfemismo usa la imagen de colgar calzado para la muerte?", respuesta: "colgar los tenis" },
        { nombre: "Palmarla", teoria: "Disfemismo vulgar para morir.", ejemplo: "Se temía que la palmara en cualquier momento.", ejercicio: "¿Qué disfemismo narrativo es sinónimo de 'morir' en lenguaje coloquial?", respuesta: "palmarla" },
        { nombre: "Criar malvas", teoria: "Disfemismo para estar muerto y enterrado.", ejemplo: "Ya está criando malvas en el cementerio.", ejercicio: "¿Qué disfemismo indica que alguien está muerto y enterrado?", respuesta: "criar malvas" },
        { nombre: "Darla", teoria: "Disfemismo vulgar para morir.", ejemplo: "La dio en el hospital.", ejercicio: "¿Qué disfemismo corto y vulgar significa 'morir'?", respuesta: "darla" },
        { nombre: "Irse al cuerno", teoria: "Disfemismo para irse o morir de forma abrupta.", ejemplo: "Se fue al cuerno sin decir adiós.", ejercicio: "¿Qué disfemismo expresa una partida violenta o la muerte?", respuesta: "irse al cuerno" },
        { nombre: "Hincar el pico", teoria: "Disfemismo vulgar para morir (en algunas regiones).", ejemplo: "El toro hincó el pico en la plaza.", ejercicio: "¿Qué disfemismo alude a la muerte con imagen animal?", respuesta: "hincar el pico" },
        { nombre: "Quedarse frito", teoria: "Disfemismo para morir dormido.", ejemplo: "Se quedó frito mientras veía la tele.", ejercicio: "¿Qué disfemismo sugiere muerte mientras se duerme?", respuesta: "quedarse frito" },
        { nombre: "Pasar a la otra vida", teoria: "Disfemismo con tono burlón para la muerte.", ejemplo: "Pasó a la otra vida con sus deudas.", ejercicio: "¿Qué disfemismo narrativo es una ironía sobre el más allá?", respuesta: "pasar a la otra vida" },
        { nombre: "Rajar la pana", teoria: "Disfemismo vulgar para morir (en algunos dialectos).", ejemplo: "El viejo rajó la pana en su casa.", ejercicio: "¿Qué disfemismo popular significa morir?", respuesta: "rajar la pana" },
        { nombre: "Mascar la tierra", teoria: "Disfemismo para estar muerto en la tumba.", ejemplo: "Ya está masticando tierra.", ejercicio: "¿Qué disfemismo indica que alguien está enterrado?", respuesta: "mascar la tierra" },
        { nombre: "Patear el balde", teoria: "Disfemismo para morir, usado en algunos países.", ejemplo: "El perro pateó el balde.", ejercicio: "¿Qué disfemismo usa la imagen de patear un cubo para la muerte?", respuesta: "patear el balde" },
        { nombre: "Dejar la piel", teoria: "Disfemismo para morir o esforzarse hasta la muerte.", ejemplo: "Dejó la piel en la batalla.", ejercicio: "¿Qué disfemismo sugiere perder la vida en un esfuerzo?", respuesta: "dejar la piel" },
        { nombre: "Irrumpir en el más allá", teoria: "Disfemismo irónico para la muerte.", ejemplo: "Irrumpió en el más allá sin avisar.", ejercicio: "¿Qué disfemismo con tono sarcástico describe la muerte?", respuesta: "irrumpir en el más allá" },
        { nombre: "Descolgarse", teoria: "Disfemismo para morir en la jerga callejera.", ejemplo: "El soldado se descolgó en la trinchera.", ejercicio: "¿Qué disfemismo significa 'morir' en contexto bélico?", respuesta: "descolgarse" },
        { nombre: "Tragar tierra", teoria: "Disfemismo para morir o ser enterrado.", ejemplo: "Tragó tierra después del accidente.", ejercicio: "¿Qué disfemismo alude a ingerir tierra como imagen de muerte?", respuesta: "tragar tierra" },
        { nombre: "Hacer el viaje final", teoria: "Disfemismo irónico para la muerte.", ejemplo: "Hizo el viaje final sin equipaje.", ejercicio: "¿Qué disfemismo narrativo describe la muerte como un viaje sin retorno?", respuesta: "hacer el viaje final" },
        { nombre: "Cerrar el paraguas", teoria: "Disfemismo para morir (en algunas culturas).", ejemplo: "El dictador cerró el paraguas.", ejercicio: "¿Qué disfemismo sugiere el fin de la vida con una imagen cotidiana?", respuesta: "cerrar el paraguas" },
        { nombre: "Apagar el televisor", teoria: "Disfemismo moderno para la muerte.", ejemplo: "Apagó el televisor y se fue.", ejercicio: "¿Qué disfemismo de la era digital significa morir?", respuesta: "apagar el televisor" },
        { nombre: "Quedar en el camino", teoria: "Disfemismo para morir durante un viaje o empresa.", ejemplo: "Muchos quedaron en el camino.", ejercicio: "¿Qué disfemismo sugiere muerte en una travesía?", respuesta: "quedar en el camino" },
        { nombre: "Hacer la última cena", teoria: "Disfemismo para morir, con tono irónico.", ejemplo: "Hizo su última cena en la prisión.", ejercicio: "¿Qué disfemismo alude a la muerte con referencia bíblica?", respuesta: "hacer la última cena" },
        { nombre: "Firmar el acta de defunción", teoria: "Disfemismo burocrático para la muerte.", ejemplo: "Firmó su acta de defunción con su último aliento.", ejercicio: "¿Qué disfemismo usa terminología administrativa para la muerte?", respuesta: "firmar el acta de defunción" },
        { nombre: "Pasar a la historia", teoria: "Disfemismo para morir, con ironía sobre la fama.", ejemplo: "Pasó a la historia sin gloria.", ejercicio: "¿Qué disfemismo sugiere que la muerte es un paso a la memoria colectiva?", respuesta: "pasar a la historia" },
        { nombre: "Dejar el escenario", teoria: "Disfemismo para morir, como salir de una obra de teatro.", ejemplo: "Dejó el escenario en el último acto.", ejercicio: "¿Qué disfemismo ve la muerte como salir de una representación?", respuesta: "dejar el escenario" },
        { nombre: "Cortar el bacalao", teoria: "Disfemismo para morir (en algunas regiones).", ejemplo: "El viejo cortó el bacalao en la cama.", ejercicio: "¿Qué disfemismo popular significa morir?", respuesta: "cortar el bacalao" },
    ];
    narrativos.forEach((t, i) => TECNICAS.push({ id: i+1, bloque: 1, categoria: "narrativo", ...t }));

    // =================== BLOQUE 2: DISFEMISMOS DESCRIPTIVOS (25) ===================
    const descriptivos = [
        { nombre: "Cara de pocos amigos", teoria: "Disfemismo para describir a alguien con expresión seria o antipática.", ejemplo: "Llegó con cara de pocos amigos.", ejercicio: "¿Qué disfemismo describe una expresión hostil?", respuesta: "cara de pocos amigos" },

        { nombre: "Feo como una blasfemia", teoria: "Disfemismo hiperbólico para describir a alguien muy feo.", ejemplo: "El monstruo era feo como una blasfemia.", ejercicio: "¿Qué disfemismo describe una fealdad extrema?", respuesta: "feo como una blasfemia" },
        { nombre: "Más feo que pegar a la madre", teoria: "Disfemismo coloquial para describir algo muy feo.", ejemplo: "Ese cuadro es más feo que pegar a la madre.", ejercicio: "¿Qué disfemismo coloquial describe algo horrible?", respuesta: "más feo que pegar a la madre" },
        { nombre: "Flaco como un esqueleto", teoria: "Disfemismo para describir a alguien extremadamente delgado.", ejemplo: "Estaba flaco como un esqueleto.", ejercicio: "¿Qué disfemismo describe delgadez extrema?", respuesta: "flaco como un esqueleto" },
        { nombre: "Gordo como un cerdo", teoria: "Disfemismo para describir a alguien muy gordo, de forma despectiva.", ejemplo: "El señor era gordo como un cerdo.", ejercicio: "¿Qué disfemismo describe obesidad de manera ofensiva?", respuesta: "gordo como un cerdo" },
        { nombre: "Cabeza de chorlito", teoria: "Disfemismo para describir a alguien despistado o tonto.", ejemplo: "Mi hermano es un cabeza de chorlito.", ejercicio: "¿Qué disfemismo describe a una persona distraída?", respuesta: "cabeza de chorlito" },
        { nombre: "Cerebro de mosquito", teoria: "Disfemismo para describir a alguien poco inteligente.", ejemplo: "Tiene cerebro de mosquito.", ejercicio: "¿Qué disfemismo insulta la inteligencia de alguien?", respuesta: "cerebro de mosquito" },
        { nombre: "Boca de buzón", teoria: "Disfemismo para describir a alguien que habla demasiado.", ejemplo: "Ese tiene boca de buzón.", ejercicio: "¿Qué disfemismo describe a una persona parlanchina?", respuesta: "boca de buzón" },
        { nombre: "Lengua viperina", teoria: "Disfemismo para describir a alguien que habla con malicia.", ejemplo: "Sus comentarios con lengua viperina hirieron a todos.", ejercicio: "¿Qué disfemismo describe una lengua malévola?", respuesta: "lengua viperina" },
        { nombre: "Manos de trapo", teoria: "Disfemismo para describir a alguien torpe.", ejemplo: "Tiene manos de trapo para la cocina.", ejercicio: "¿Qué disfemismo describe a una persona torpe?", respuesta: "manos de trapo" },
        { nombre: "Pies de plomo", teoria: "Disfemismo para describir a alguien pesado o lento.", ejemplo: "El trabajador tiene pies de plomo.", ejercicio: "¿Qué disfemismo describe a alguien muy lento?", respuesta: "pies de plomo" },
        { nombre: "Ojos de sapo", teoria: "Disfemismo para describir ojos saltones o feos.", ejemplo: "El anciano tenía ojos de sapo.", ejercicio: "¿Qué disfemismo describe ojos feos o prominentes?", respuesta: "ojos de sapo" },
        { nombre: "Pelo de estropajo", teoria: "Disfemismo para describir cabello áspero o descuidado.", ejemplo: "Su pelo era un estropajo.", ejercicio: "¿Qué disfemismo describe un cabello maltratado?", respuesta: "pelo de estropajo" },
        { nombre: "Dientes de ajo", teoria: "Disfemismo para describir dientes amarillos o feos.", ejemplo: "Sonreía con sus dientes de ajo.", ejercicio: "¿Qué disfemismo describe dientes desagradables?", respuesta: "dientes de ajo" },
        { nombre: "Nariz de patata", teoria: "Disfemismo para describir una nariz grande y fea.", ejemplo: "Tenía una nariz de patata.", ejercicio: "¿Qué disfemismo describe una nariz grande?", respuesta: "nariz de patata" },

        { nombre: "Cara de perro", teoria: "Disfemismo para describir a alguien con mala cara o triste.", ejemplo: "Tenía cara de perro todo el día.", ejercicio: "¿Qué disfemismo describe una expresión apesadumbrada?", respuesta: "cara de perro" },
        { nombre: "Boca de lobo", teoria: "Disfemismo para describir a alguien que come mucho.", ejemplo: "Ese chico tiene boca de lobo.", ejercicio: "¿Qué disfemismo describe a un comilón?", respuesta: "boca de lobo" },
        { nombre: "Panza de cemento", teoria: "Disfemismo para describir a alguien que bebe mucho alcohol.", ejemplo: "Tiene una panza de cemento.", ejercicio: "¿Qué disfemismo describe a un bebedor empedernido?", respuesta: "panza de cemento" },
    ];
    descriptivos.forEach((t, i) => TECNICAS.push({ id: i+26, bloque: 2, categoria: "descriptivo", ...t }));

    // =================== BLOQUE 3: DISFEMISMOS ARGUMENTATIVOS (25) ===================
    const argumentativos = [
        { nombre: "Falacia", teoria: "Disfemismo para un argumento engañoso o falso.", ejemplo: "Su razonamiento está lleno de falacias.", ejercicio: "¿Qué disfemismo describe un argumento engañoso?", respuesta: "falacia" },
        { nombre: "Sofisma", teoria: "Disfemismo para un razonamiento falso con apariencia de verdad.", ejemplo: "Eso es un sofisma barato.", ejercicio: "¿Qué disfemismo describe un razonamiento falso?", respuesta: "sofisma" },
        { nombre: "Paparruchas", teoria: "Disfemismo para argumentos sin fundamento.", ejemplo: "No me vengas con paparruchas.", ejercicio: "¿Qué disfemismo descalifica argumentos absurdos?", respuesta: "paparruchas" },
        { nombre: "Cortinas de humo", teoria: "Disfemismo para argumentos que ocultan la verdad.", ejemplo: "Esa declaración es una cortina de humo.", ejercicio: "¿Qué disfemismo describe un argumento que distrae?", respuesta: "cortinas de humo" },
        { nombre: "Cháchara", teoria: "Disfemismo para hablar sin contenido.", ejemplo: "Es pura cháchara, no dice nada.", ejercicio: "¿Qué disfemismo describe un discurso vacío?", respuesta: "cháchara" },
        { nombre: "Sesgo", teoria: "Disfemismo para una postura parcial e injusta.", ejemplo: "Su argumento está viciado por el sesgo.", ejercicio: "¿Qué disfemismo describe una postura tendenciosa?", respuesta: "sesgo" },
        { nombre: "Manipulación", teoria: "Disfemismo para la distorsión de la información.", ejemplo: "Esa es una manipulación de los hechos.", ejercicio: "¿Qué disfemismo describe la deformación de la realidad?", respuesta: "manipulación" },
        { nombre: "Propaganda", teoria: "Disfemismo para información sesgada con intención política.", ejemplo: "Todo eso es propaganda barata.", ejercicio: "¿Qué disfemismo describe mensajes manipuladores?", respuesta: "propaganda" },
        { nombre: "Demagogia", teoria: "Disfemismo para argumentos que apelan a emociones en lugar de razón.", ejemplo: "El político recurrió a la demagogia.", ejercicio: "¿Qué disfemismo describe la manipulación emocional?", respuesta: "demagogia" },
        { nombre: "Paja mental", teoria: "Disfemismo para ideas sin sustancia.", ejemplo: "No tengo tiempo para tu paja mental.", ejercicio: "¿Qué disfemismo describe ideas vacías?", respuesta: "paja mental" },
        { nombre: "Churro", teoria: "Disfemismo para un texto o discurso mal hecho.", ejemplo: "Ese ensayo es un churro.", ejercicio: "¿Qué disfemismo describe un trabajo mal elaborado?", respuesta: "churro" },
        { nombre: "Copia", teoria: "Disfemismo para un texto plagiado o sin originalidad.", ejemplo: "Su tesis es una copia.", ejercicio: "¿Qué disfemismo describe un trabajo no original?", respuesta: "copia" },
        { nombre: "Ladrillo", teoria: "Disfemismo para un texto muy largo y aburrido.", ejemplo: "El informe es un ladrillo.", ejercicio: "¿Qué disfemismo describe un texto pesado?", respuesta: "ladrillo" },
        { nombre: "Rollos", teoria: "Disfemismo para explicaciones largas y confusas.", ejemplo: "Deja de rollos y ve al grano.", ejercicio: "¿Qué disfemismo describe un discurso prolijo?", respuesta: "rollos" },
        { nombre: "Fuego de artificio", teoria: "Disfemismo para argumentos llamativos pero superficiales.", ejemplo: "Sus palabras fueron fuego de artificio.", ejercicio: "¿Qué disfemismo describe una retórica vacía?", respuesta: "fuego de artificio" },
        { nombre: "Humo", teoria: "Disfemismo para promesas vacías.", ejemplo: "Todo fue humo, no cumplió.", ejercicio: "¿Qué disfemismo describe promesas incumplidas?", respuesta: "humo" },
        { nombre: "Palabrería", teoria: "Disfemismo para discurso con muchas palabras y poco contenido.", ejemplo: "No me interesa tu palabrería.", ejercicio: "¿Qué disfemismo describe verborrea?", respuesta: "palabrería" },
        { nombre: "Parrafada", teoria: "Disfemismo para un párrafo muy largo y confuso.", ejemplo: "Escribe parrafadas incomprensibles.", ejercicio: "¿Qué disfemismo describe un párrafo extenso?", respuesta: "parrafada" },
        { nombre: "Corta pega", teoria: "Disfemismo para un texto mal redactado.", ejemplo: "Ese artículo es una corta pega.", ejercicio: "¿Qué disfemismo describe mala redacción?", respuesta: "corta pega" },
        { nombre: "Pega", teoria: "Disfemismo para un argumento débil o inconsistente.", ejemplo: "Esa tiene pega.", ejercicio: "¿Qué disfemismo describe un argumento con fallos?", respuesta: "pega" },
        { nombre: "Paja", teoria: "Disfemismo para contenido irrelevante.", ejemplo: "Quita la paja y ve al grano.", ejercicio: "¿Qué disfemismo describe información superflua?", respuesta: "paja" },
        { nombre: "Cortina de humo", teoria: "Disfemismo para distracción argumentativa.", ejemplo: "Su respuesta es una cortina de humo.", ejercicio: "¿Qué disfemismo describe una evasiva?", respuesta: "cortina de humo" },
        { nombre: "Excusa", teoria: "Disfemismo para una justificación débil.", ejemplo: "Esa es una excusa barata.", ejercicio: "¿Qué disfemismo describe una justificación pobre?", respuesta: "excusa" },
        { nombre: "Cuento chino", teoria: "Disfemismo para una historia falsa o inverosímil.", ejemplo: "No me vengas con cuentos chinos.", ejercicio: "¿Qué disfemismo describe una mentira absurda?", respuesta: "cuento chino" },
        { nombre: "Patraña", teoria: "Disfemismo para una mentira o invención.", ejemplo: "Todo eso es una patraña.", ejercicio: "¿Qué disfemismo describe una invención falsa?", respuesta: "patraña" },
    ];
    argumentativos.forEach((t, i) => TECNICAS.push({ id: i+51, bloque: 3, categoria: "argumentativo", ...t }));

    // =================== BLOQUE 4: DISFEMISMOS EXPOSITIVOS (25) ===================
    const expositivos = [
        { nombre: "Basura", teoria: "Disfemismo para material de mala calidad.", ejemplo: "Este artículo es una basura.", ejercicio: "¿Qué disfemismo describe un trabajo de mala calidad?", respuesta: "basura" },
        { nombre: "Churro", teoria: "Disfemismo para una obra mal hecha.", ejemplo: "La película es un churro.", ejercicio: "¿Qué disfemismo describe una obra deficiente?", respuesta: "churro" },
        { nombre: "Porquería", teoria: "Disfemismo para algo de muy baja calidad.", ejemplo: "Esa comida es una porquería.", ejercicio: "¿Qué disfemismo describe algo malo?", respuesta: "porquería" },
        { nombre: "Mierda", teoria: "Disfemismo vulgar para algo de mala calidad.", ejemplo: "Ese informe es una mierda.", ejercicio: "¿Qué disfemismo vulgar describe algo de mala calidad?", respuesta: "mierda" },
        { nombre: "Zoquete", teoria: "Disfemismo para una persona torpe o tonta.", ejemplo: "Es un zoquete para las matemáticas.", ejercicio: "¿Qué disfemismo describe a alguien torpe?", respuesta: "zoquete" },
        { nombre: "Cabeza de turco", teoria: "Disfemismo para una persona que carga con la culpa.", ejemplo: "Lo hicieron cabeza de turco.", ejercicio: "¿Qué disfemismo describe a un chivo expiatorio?", respuesta: "cabeza de turco" },
        { nombre: "Chivo expiatorio", teoria: "Disfemismo para un culpable inocente.", ejemplo: "Buscaron un chivo expiatorio.", ejercicio: "¿Qué disfemismo describe a un culpable inocente?", respuesta: "chivo expiatorio" },
        { nombre: "Perro callejero", teoria: "Disfemismo para una persona marginada.", ejemplo: "Es un perro callejero en la sociedad.", ejercicio: "¿Qué disfemismo describe a un marginado?", respuesta: "perro callejero" },
        { nombre: "Rata", teoria: "Disfemismo para una persona despreciable.", ejemplo: "Esa rata de político.", ejercicio: "¿Qué disfemismo describe a alguien despreciable?", respuesta: "rata" },
        { nombre: "Culebra", teoria: "Disfemismo para una persona traicionera.", ejemplo: "Es una culebra, no confíes en ella.", ejercicio: "¿Qué disfemismo describe a alguien traicionero?", respuesta: "culebra" },
        { nombre: "Hiena", teoria: "Disfemismo para una persona cruel.", ejemplo: "El jefe es una hiena.", ejercicio: "¿Qué disfemismo describe a alguien cruel?", respuesta: "hiena" },
        { nombre: "Buitre", teoria: "Disfemismo para alguien que se aprovecha de los demás.", ejemplo: "Es un buitre financiero.", ejercicio: "¿Qué disfemismo describe a un aprovechado?", respuesta: "buitre" },
        { nombre: "Lacra", teoria: "Disfemismo para una persona que daña a la sociedad.", ejemplo: "Es una lacra social.", ejercicio: "¿Qué disfemismo describe a un elemento dañino?", respuesta: "lacra" },
        { nombre: "Escoria", teoria: "Disfemismo para una persona despreciable.", ejemplo: "Los trata como escoria.", ejercicio: "¿Qué disfemismo describe a alguien vil?", respuesta: "escoria" },
        { nombre: "Alimaña", teoria: "Disfemismo para un ser perjudicial.", ejemplo: "Esa alimaña robó todo.", ejercicio: "¿Qué disfemismo describe a un ser dañino?", respuesta: "alimaña" },
        { nombre: "Parásito", teoria: "Disfemismo para alguien que vive a expensas de otros.", ejemplo: "Es un parásito social.", ejercicio: "¿Qué disfemismo describe a un aprovechado?", respuesta: "parásito" },
        { nombre: "Sanguijuela", teoria: "Disfemismo para alguien que chupa la energía de otros.", ejemplo: "Es una sanguijuela emocional.", ejercicio: "¿Qué disfemismo describe a alguien que agota a los demás?", respuesta: "sanguijuela" },
        { nombre: "Larva", teoria: "Disfemismo para alguien inmaduro o despreciable.", ejemplo: "Es una larva, no sirve para nada.", ejercicio: "¿Qué disfemismo describe a alguien inmaduro?", respuesta: "larva" },
        { nombre: "Gusano", teoria: "Disfemismo para una persona despreciable.", ejemplo: "No soy un gusano, merezco respeto.", ejercicio: "¿Qué disfemismo describe a alguien vil?", respuesta: "gusano" },
        { nombre: "Cucaracha", teoria: "Disfemismo para una persona desagradable.", ejemplo: "Esa cucaracha siempre se escapa.", ejercicio: "¿Qué disfemismo describe a alguien repulsivo?", respuesta: "cucaracha" },
        { nombre: "Mosca", teoria: "Disfemismo para una persona molestosa.", ejemplo: "Deja de ser una mosca.", ejercicio: "¿Qué disfemismo describe a un pesado?", respuesta: "mosca" },
        { nombre: "Abejorro", teoria: "Disfemismo para una persona ruidosa e inoportuna.", ejemplo: "Es un abejorro, no para de hablar.", ejercicio: "¿Qué disfemismo describe a alguien molesto?", respuesta: "abejorro" },
        { nombre: "Piojo", teoria: "Disfemismo para una persona pequeña o insignificante.", ejemplo: "Ese piojo no tiene importancia.", ejercicio: "¿Qué disfemismo describe a alguien insignificante?", respuesta: "piojo" },
        { nombre: "Pulga", teoria: "Disfemismo para una persona pequeña.", ejemplo: "Es una pulga, apenas se le ve.", ejercicio: "¿Qué disfemismo describe a alguien de baja estatura?", respuesta: "pulga" },
        { nombre: "Chico de los mandados", teoria: "Disfemismo para alguien subordinado.", ejemplo: "Siempre es el chico de los mandados.", ejercicio: "¿Qué disfemismo describe a un subordinado?", respuesta: "chico de los mandados" },
    ];
    expositivos.forEach((t, i) => TECNICAS.push({ id: i+76, bloque: 4, categoria: "expositivo", ...t }));

    TECNICAS.sort((a,b) => a.id - b.id);

    // ========== RENDER ==========
    const blockNav = document.getElementById('blockNav');
    const cardsGrid = document.getElementById('cardsGrid');
    const quizContainer = document.getElementById('quizContainer');

    let currentBlock = 1;
    const BLOCK_NAMES = ['', 'Disfemismos narrativos', 'Disfemismos descriptivos', 'Disfemismos argumentativos', 'Disfemismos expositivos'];

    for (let i = 1; i <= 4; i++) {
        const btn = document.createElement('button');
        btn.textContent = `${i}. ${BLOCK_NAMES[i]}`;
        btn.dataset.block = i;
        btn.addEventListener('click', () => {
            currentBlock = i;
            renderCards(i);
            updateNav(i);
        });
        blockNav.appendChild(btn);
    }

    function updateNav(block) {
        document.querySelectorAll('.block-nav button').forEach(b => b.classList.toggle('active', parseInt(b.dataset.block) === block));
    }
    updateNav(1);

    window.verificarRespuesta = function(id) {
        const input = document.getElementById(`input-${id}`);
        const feedback = document.getElementById(`feedback-${id}`);
        const correcta = document.getElementById(`correcta-${id}`);
        if (!input || !feedback) return;
        const valor = input.value.trim().toLowerCase();
        const respuestaCorrecta = correcta ? correcta.textContent.toLowerCase() : '';
        if (valor === '' || valor === '...') {
            feedback.textContent = '✏️ Escribe tu respuesta primero.';
            feedback.className = 'feedback-msg';
            return;
        }
        const normalize = (s) => s.replace(/\s+/g, ' ').trim();
        const esCorrecto = normalize(valor) === normalize(respuestaCorrecta) ||
                           normalize(valor).includes(normalize(respuestaCorrecta)) ||
                           normalize(respuestaCorrecta).includes(normalize(valor));
        if (esCorrecto) {
            feedback.textContent = '✅ ¡Correcto! Bien hecho.';
            feedback.className = 'feedback-msg correcto';
        } else {
            feedback.textContent = `❌ Incorrecto. La respuesta correcta es: "${respuestaCorrecta}"`;
            feedback.className = 'feedback-msg incorrecto';
        }
    };

    function renderCards(block) {
        const filtered = TECNICAS.filter(t => t.bloque === block);
        cardsGrid.innerHTML = filtered.map((t, idx) => {
            return `
                <div class="card-flip" data-id="${t.id}" onclick="this.classList.toggle('flipped')">
                    <div class="card-flip-inner">
                        <div class="card-front">
                            <div class="numero">${t.id}</div>
                            <span class="categoria">${t.categoria}</span>
                            <h3>${t.nombre}</h3>
                            <div class="teoria">${t.teoria}</div>
                            <div class="girar-indicador">↻ tocar para practicar</div>
                        </div>
                        <div class="card-back">
                            <div style="font-weight:600;color:#1F4E5F;margin-bottom:0.2rem;">🔥 ${t.nombre}</div>
                            <div class="ejemplo"><strong>Ejemplo:</strong> ${t.ejemplo}</div>
                            <div class="ejercicio">✏️ ${t.ejercicio}</div>
                            <div class="respuesta-area">
                                <input type="text" id="input-${t.id}" placeholder="Escribe tu respuesta..." />
                                <button class="btn-verificar" onclick="verificarRespuesta(${t.id})">Comprobar</button>
                            </div>
                            <div id="feedback-${t.id}" class="feedback-msg"></div>
                            <div id="correcta-${t.id}" style="display:none;">${t.respuesta}</div>
                            <div class="respuesta-correcta">✓ ${t.respuesta}</div>
                            <div class="etiqueta">técnica #${t.id} · ${t.categoria}</div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ========== QUIZ ==========
    let quizQuestions = [];
    let currentQuizIndex = 0;
    let score = 0;
    let answered = false;

    function generateQuiz() {
        const shuffled = [...TECNICAS].sort(() => Math.random() - 0.5);
        quizQuestions = shuffled.slice(0, 10).map(t => {
            const opts = [t.respuesta];
            const others = TECNICAS.filter(x => x.id !== t.id);
            const shuffledOthers = others.sort(() => Math.random() - 0.5);
            for (let i = 0; i < 3; i++) {
                if (shuffledOthers[i]) opts.push(shuffledOthers[i].respuesta);
            }
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return {
                pregunta: `📌 ${t.ejercicio} (técnica: ${t.nombre})`,
                opciones: opts,
                correcta: t.respuesta,
                id: t.id
            };
        });
        currentQuizIndex = 0;
        score = 0;
        answered = false;
        renderQuiz();
    }

    function renderQuiz() {
        if (!quizQuestions.length) return;
        const q = quizQuestions[currentQuizIndex];
        const total = quizQuestions.length;
        let html = `
            <div class="quiz-pregunta">
                <p>${q.pregunta}</p>
                <div class="quiz-opciones" id="quizOptions">
        `;
        q.opciones.forEach((op, idx) => {
            html += `<button data-idx="${idx}" onclick="checkAnswer(${idx})">${op}</button>`;
        });
        html += `</div>
                <div id="quizFeedback" style="margin-top:0.8rem;"></div>
                <div class="quiz-result" id="quizScore">Puntuación: ${score}/${total}</div>
            </div>
            <div class="quiz-controles">
                <button id="nextQuizBtn" disabled>→ Siguiente</button>
                <button onclick="generateQuiz()">🔄 Nuevo cuestionario</button>
            </div>
        `;
        quizContainer.innerHTML = html;
        answered = false;
        document.getElementById('nextQuizBtn').disabled = true;
    }

    window.checkAnswer = function(idx) {
        if (answered) return;
        const q = quizQuestions[currentQuizIndex];
        const buttons = document.querySelectorAll('#quizOptions button');
        buttons.forEach((b, i) => {
            b.disabled = true;
            if (i === idx) {
                const esCorrecta = q.opciones[idx] === q.correcta;
                b.classList.add(esCorrecta ? 'correct' : 'incorrect');
                if (esCorrecta) score++;
            }
            if (q.opciones[i] === q.correcta) {
                buttons[i].classList.add('correct');
            }
        });
        answered = true;
        document.getElementById('nextQuizBtn').disabled = false;
        document.getElementById('quizScore').textContent = `Puntuación: ${score}/${quizQuestions.length}`;
        const fb = document.getElementById('quizFeedback');
        fb.innerHTML = `<span style="background:#1F4E5F;color:white;padding:0.2rem 1rem;border-radius:40px;">✅ Respuesta correcta: ${q.correcta}</span>`;
    };

    document.addEventListener('click', function(e) {
        if (e.target.id === 'nextQuizBtn') {
            if (currentQuizIndex < quizQuestions.length - 1) {
                currentQuizIndex++;
                renderQuiz();
            } else {
                alert(`¡Cuestionario finalizado! Puntuación: ${score}/${quizQuestions.length}`);
                document.getElementById('nextQuizBtn').disabled = true;
            }
        }
    });

    // Inicializar
    renderCards(1);
    generateQuiz();
</script>
</body>
</html>
