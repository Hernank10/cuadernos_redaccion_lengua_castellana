<body>
<div class="container" id="app">
    <div class="header">
        <h1>✍️ Redacción morfosintáctica científica <span>100 técnicas</span></h1>
        <div class="sub">ciencia ficción · teoría · sintaxis · ejemplos</div>
    </div>

    <div class="block-nav" id="blockNav"></div>
    <div id="cardsGrid" class="cards-grid"></div>

    <div class="quiz-section" id="quizSection">
        <h2>🧠 Cuestionario <small>redacción científica en ciencia ficción</small></h2>
        <div id="quizContainer"></div>
    </div>
    <div class="footer">Escribe tu respuesta en cada tarjeta y verifica · Explora el arte de escribir ciencia</div>
</div>

<script>
    // ================================================================
    // 100 TÉCNICAS DE REDACCIÓN MORFOSINTÁCTICA CIENTÍFICA EN CIENCIA FICCIÓN
    // Cada técnica: nombre, definición/teoría, estructura sintáctica,
    // fórmula de redacción, ejemplo, ejercicio y respuesta.
    // Distribuidas en 4 bloques: Narrativo, Descriptivo, Argumentativo, Expositivo.
    // ================================================================
    const TECNICAS = [];

    // =================== BLOQUE 1: ESTRUCTURAS NARRATIVAS (25) ===================
    const narrativas = [
        { nombre: "Oración simple declarativa", definicion: "Expresa un hecho científico de forma directa.", sintaxis: "Sujeto + Verbo + Complemento (SV + V + C)", estructura: "Estructura básica: [Sujeto] [Verbo] [Complemento].", ejemplo: "El experimento demostró la existencia de la materia oscura.", ejercicio: "¿Qué estructura sintáctica usa oraciones simples con sujeto, verbo y complemento?", respuesta: "oración simple declarativa" },
        { nombre: "Oración compuesta coordinada", definicion: "Une dos oraciones con un nexo (y, o, pero).", sintaxis: "O1 + Nexo + O2", estructura: "Estructura coordinada: [Oración 1] [Nexo] [Oración 2].", ejemplo: "El cohete despegó y la nave entró en órbita.", ejercicio: "¿Qué estructura une oraciones con nexos como 'y' o 'pero'?", respuesta: "oración compuesta coordinada" },
        { nombre: "Oración compuesta subordinada", definicion: "Una oración depende de otra (que, porque, cuando).", sintaxis: "O principal + Nexo + O subordinada", estructura: "Estructura subordinada: [Oración principal] [Nexo] [Oración subordinada].", ejemplo: "Los científicos observaron que la estrella se había apagado.", ejercicio: "¿Qué estructura usa una oración que depende de otra con 'que'?", respuesta: "oración compuesta subordinada" },
        { nombre: "Oración condicional", definicion: "Expresa una condición (si).", sintaxis: "Si + O1, O2", estructura: "Estructura condicional: [Si] [Condición] [Consecuencia].", ejemplo: "Si la nave alcanza la velocidad de la luz, podrá viajar a otras estrellas.", ejercicio: "¿Qué estructura usa 'si' para expresar una condición?", respuesta: "oración condicional" },
        { nombre: "Oración causal", definicion: "Expresa causa (porque, ya que).", sintaxis: "O1 + Nexo causal + O2", estructura: "Estructura causal: [Causa] [Porque] [Efecto].", ejemplo: "El experimento falló porque no se calibraron los sensores.", ejercicio: "¿Qué estructura usa 'porque' para expresar causa?", respuesta: "oración causal" },
        { nombre: "Oración consecutiva", definicion: "Expresa consecuencia (por tanto, así que).", sintaxis: "O1 + Nexo consecutivo + O2", estructura: "Estructura consecutiva: [Hecho] [Por tanto] [Consecuencia].", ejemplo: "La radiación aumentó, por tanto los astronautas debieron refugiarse.", ejercicio: "¿Qué estructura usa 'por tanto' para expresar consecuencia?", respuesta: "oración consecutiva" },
        { nombre: "Oración final", definicion: "Expresa propósito (para que, a fin de).", sintaxis: "O1 + Nexo final + O2", estructura: "Estructura final: [Acción] [Para que] [Propósito].", ejemplo: "Los científicos enviaron la sonda para que explorara el asteroide.", ejercicio: "¿Qué estructura usa 'para que' para expresar propósito?", respuesta: "oración final" },
        { nombre: "Oración temporal", definicion: "Expresa tiempo (cuando, mientras).", sintaxis: "O1 + Nexo temporal + O2", estructura: "Estructura temporal: [Hecho] [Cuando] [Hecho].", ejemplo: "Cuando el cometa pasó, la nave capturó imágenes.", ejercicio: "¿Qué estructura usa 'cuando' para expresar tiempo?", respuesta: "oración temporal" },
        { nombre: "Oración concesiva", definicion: "Expresa objeción (aunque, a pesar de que).", sintaxis: "O1 + Nexo concesivo + O2", estructura: "Estructura concesiva: [Hecho] [Aunque] [Objeción].", ejemplo: "Aunque la misión fue arriesgada, los astronautas lograron su objetivo.", ejercicio: "¿Qué estructura usa 'aunque' para expresar objeción?", respuesta: "oración concesiva" },
        { nombre: "Oración comparativa", definicion: "Compara dos elementos (como, tan... como).", sintaxis: "O1 + Nexo comparativo + O2", estructura: "Estructura comparativa: [Elemento 1] [Como] [Elemento 2].", ejemplo: "La gravedad de Marte es menor que la de la Tierra.", ejercicio: "¿Qué estructura usa 'como' para comparar?", respuesta: "oración comparativa" },
        { nombre: "Oración modal", definicion: "Expresa modo (como, según).", sintaxis: "O1 + Nexo modal + O2", estructura: "Estructura modal: [Hecho] [Como] [Modo].", ejemplo: "Los astronautas actuaron según lo previsto en el protocolo.", ejercicio: "¿Qué estructura usa 'según' para expresar modo?", respuesta: "oración modal" },
        { nombre: "Oración de relativo", definicion: "Añade información sobre un sustantivo (que, quien).", sintaxis: "Sustantivo + Nexo relativo + O", estructura: "Estructura de relativo: [Sustantivo] [Que] [Oración].", ejemplo: "La sonda que envió la NASA llegó a Marte.", ejercicio: "¿Qué estructura usa 'que' para añadir información sobre un sustantivo?", respuesta: "oración de relativo" },
        { nombre: "Oración interrogativa indirecta", definicion: "Formula una pregunta de forma indirecta.", sintaxis: "V + Nexo interrogativo + O", estructura: "Estructura interrogativa indirecta: [Verbo] [Si/Pregunta] [Oración].", ejemplo: "Los científicos se preguntaron si la vida podría existir en Europa.", ejercicio: "¿Qué estructura usa 'si' para formular una pregunta indirecta?", respuesta: "oración interrogativa indirecta" },
        { nombre: "Oración exclamativa", definicion: "Expresa emoción o énfasis.", sintaxis: "¡O!", estructura: "Estructura exclamativa: [¡] [Oración] [!].", ejemplo: "¡Qué increíble es la inmensidad del cosmos!", ejercicio: "¿Qué estructura usa exclamaciones para enfatizar?", respuesta: "oración exclamativa" },
        { nombre: "Oración dubitativa", definicion: "Expresa duda (quizás, tal vez).", sintaxis: "Nexo de duda + O", estructura: "Estructura dubitativa: [Quizás] [Oración].", ejemplo: "Quizás la vida extraterrestre sea más común de lo que imaginamos.", ejercicio: "¿Qué estructura usa 'quizás' para expresar duda?", respuesta: "oración dubitativa" },
        { nombre: "Oración desiderativa", definicion: "Expresa deseo (ojalá, espero que).", sintaxis: "Nexo de deseo + O", estructura: "Estructura desiderativa: [Ojalá] [Oración].", ejemplo: "Ojalá los astronautas encuentren señales de vida en Marte.", ejercicio: "¿Qué estructura usa 'ojalá' para expresar deseo?", respuesta: "oración desiderativa" },
        { nombre: "Oración de gerundio", definicion: "Usa gerundio para expresar acción simultánea.", sintaxis: "O1 + Gerundio + O2", estructura: "Estructura de gerundio: [Oración 1] [Gerundio] [Oración 2].", ejemplo: "Explorando la superficie, el rover encontró minerales.", ejercicio: "¿Qué estructura usa el gerundio (-ando, -endo) para expresar acción simultánea?", respuesta: "oración de gerundio" },
        { nombre: "Oración de participio", definicion: "Usa participio para expresar acción pasiva.", sintaxis: "Participio + O", estructura: "Estructura de participio: [Participio] [Oración].", ejemplo: "Descubierta la señal, los científicos celebraron.", ejercicio: "¿Qué estructura usa el participio (-ado, -ido) para expresar acción pasiva?", respuesta: "oración de participio" },
        { nombre: "Oración de infinitivo", definicion: "Usa infinitivo como sustantivo.", sintaxis: "Infinitivo + O", estructura: "Estructura de infinitivo: [Infinitivo] [Oración].", ejemplo: "Viajar a las estrellas es el sueño de la humanidad.", ejercicio: "¿Qué estructura usa el infinitivo como sujeto de una oración?", respuesta: "oración de infinitivo" },
        { nombre: "Oración pasiva", definicion: "El sujeto recibe la acción (ser + participio).", sintaxis: "Sujeto paciente + Ser + Participio + Complemento", estructura: "Estructura pasiva: [Sujeto paciente] [Ser] [Participio] [Complemento].", ejemplo: "El satélite fue lanzado por la agencia espacial.", ejercicio: "¿Qué estructura usa 'ser + participio' para expresar voz pasiva?", respuesta: "oración pasiva" },
        { nombre: "Oración impersonal", definicion: "No tiene sujeto explícito (se + verbo).", sintaxis: "Se + Verbo + Complemento", estructura: "Estructura impersonal: [Se] [Verbo] [Complemento].", ejemplo: "Se observó un fenómeno extraño en el cielo.", ejercicio: "¿Qué estructura usa 'se' para formar oraciones impersonales?", respuesta: "oración impersonal" },

        { nombre: "Estructura de efecto", definicion: "Explica los efectos de un fenómeno.", sintaxis: "Sujeto + Produce + Efecto", estructura: "Estructura de efecto expositivo: [Sujeto] [Produce] [Efecto].", ejemplo: "La radiación solar produce auroras boreales.", ejercicio: "¿Qué estructura usa 'produce' para explicar efectos?", respuesta: "estructura de efecto" },
        { nombre: "Estructura de proceso", definicion: "Explica los pasos de un proceso.", sintaxis: "Primero + O1 + Luego + O2 + Finalmente + O3", estructura: "Estructura de proceso expositivo: [Primero] [Paso 1] [Luego] [Paso 2] [Finalmente] [Paso 3].", ejemplo: "Primero, el cohete despega; luego, se separan las etapas; finalmente, la nave entra en órbita.", ejercicio: "¿Qué estructura usa marcadores de proceso para explicar pasos?", respuesta: "estructura de proceso" },
        { nombre: "Estructura de análisis", definicion: "Descompone un todo en partes.", sintaxis: "Sujeto + Se compone de + Partes", estructura: "Estructura de análisis: [Sujeto] [Se compone de] [Parte 1] [Y] [Parte 2].", ejemplo: "El sistema solar se compone del Sol, los planetas y los asteroides.", ejercicio: "¿Qué estructura usa 'se compone de' para analizar?", respuesta: "estructura de análisis" },
        { nombre: "Estructura de síntesis", definicion: "Integra partes en un todo.", sintaxis: "Partes + Forman + Sujeto", estructura: "Estructura de síntesis: [Partes] [Forman] [Sujeto].", ejemplo: "Los planetas, asteroides y cometas forman el sistema solar.", ejercicio: "¿Qué estructura usa 'forman' para sintetizar?", respuesta: "estructura de síntesis" },
        { nombre: "Estructura de ejemplificación", definicion: "Ilustra con ejemplos.", sintaxis: "Por ejemplo + O", estructura: "Estructura de ejemplificación expositiva: [Por ejemplo] [Ejemplo].", ejemplo: "Por ejemplo, el telescopio Hubble ha captado imágenes de galaxias lejanas.", ejercicio: "¿Qué estructura usa 'por ejemplo' para ilustrar?", respuesta: "estructura de ejemplificación" },
        { nombre: "Estructura de definición ampliada", definicion: "Define un concepto con detalles.", sintaxis: "Sujeto + Es + Definición + Detalles", estructura: "Estructura de definición ampliada: [Sujeto] [Es] [Definición] [Detalles].", ejemplo: "Un agujero negro es una región del espacio con gravedad tan extrema que ni la luz puede escapar.", ejercicio: "¿Qué estructura define un concepto con detalles adicionales?", respuesta: "estructura de definición ampliada" },
        { nombre: "Estructura de secuencia temporal", definicion: "Explica eventos en orden temporal.", sintaxis: "En + Tiempo + O", estructura: "Estructura de secuencia temporal: [En] [Tiempo] [Oración].", ejemplo: "En 1969, el ser humano pisó la Luna por primera vez.", ejercicio: "¿Qué estructura usa marcadores temporales para secuenciar eventos?", respuesta: "estructura de secuencia temporal" },
        { nombre: "Estructura de ubicación espacial", definicion: "Explica la ubicación de algo.", sintaxis: "Sujeto + Está en + Lugar", estructura: "Estructura de ubicación espacial: [Sujeto] [Está en] [Lugar].", ejemplo: "El cinturón de asteroides está entre Marte y Júpiter.", ejercicio: "¿Qué estructura usa 'está en' para explicar ubicación?", respuesta: "estructura de ubicación espacial" },
        { nombre: "Estructura de comparación cuantitativa", definicion: "Compara cantidades.", sintaxis: "Sujeto + Tiene + Número + más/menos que + Otro", estructura: "Estructura de comparación cuantitativa: [Sujeto] [Tiene] [Número] [Más/menos que] [Otro].", ejemplo: "Júpiter tiene 318 veces más masa que la Tierra.", ejercicio: "¿Qué estructura usa 'más/menos que' para comparar cantidades?", respuesta: "estructura de comparación cuantitativa" },
        { nombre: "Estructura de relación proporcional", definicion: "Expresa relaciones proporcionales.", sintaxis: "A mayor + X, mayor + Y", estructura: "Estructura de relación proporcional: [A mayor] [X] [Mayor] [Y].", ejemplo: "A mayor distancia del Sol, menor temperatura.", ejercicio: "¿Qué estructura expresa relaciones proporcionales?", respuesta: "estructura de relación proporcional" },
        { nombre: "Estructura de probabilidad", definicion: "Expresa probabilidad.", sintaxis: "Es probable que + O", estructura: "Estructura de probabilidad: [Es probable que] [Oración].", ejemplo: "Es probable que exista agua en el subsuelo de Marte.", ejercicio: "¿Qué estructura usa 'es probable que' para expresar probabilidad?", respuesta: "estructura de probabilidad" },
        { nombre: "Estructura de certeza", definicion: "Expresa certeza.", sintaxis: "Es seguro que + O", estructura: "Estructura de certeza: [Es seguro que] [Oración].", ejemplo: "Es seguro que el sol se pondrá al atardecer.", ejercicio: "¿Qué estructura usa 'es seguro que' para expresar certeza?", respuesta: "estructura de certeza" },
        { nombre: "Estructura de hipótesis", definicion: "Plantea una hipótesis.", sintaxis: "Se hipotetiza que + O", estructura: "Estructura de hipótesis expositiva: [Se hipotetiza que] [Oración].", ejemplo: "Se hipotetiza que el universo se expande a un ritmo acelerado.", ejercicio: "¿Qué estructura usa 'se hipotetiza que' para plantear hipótesis?", respuesta: "estructura de hipótesis" },
        { nombre: "Estructura de teoría", definicion: "Presenta una teoría científica.", sintaxis: "Según la teoría + O", estructura: "Estructura de teoría: [Según la teoría] [Oración].", ejemplo: "Según la teoría de la relatividad, el tiempo se dilata en presencia de gravedad.", ejercicio: "¿Qué estructura usa 'según la teoría' para presentar una teoría?", respuesta: "estructura de teoría" },
        { nombre: "Estructura de ley", definicion: "Presenta una ley científica.", sintaxis: "La ley + O", estructura: "Estructura de ley: [La ley] [Oración].", ejemplo: "La ley de la gravedad establece que dos cuerpos se atraen.", ejercicio: "¿Qué estructura usa 'la ley' para presentar una ley científica?", respuesta: "estructura de ley" },
        { nombre: "Estructura de principio", definicion: "Presenta un principio científico.", sintaxis: "El principio + O", estructura: "Estructura de principio: [El principio] [Oración].", ejemplo: "El principio de incertidumbre establece límites a la medición.", ejercicio: "¿Qué estructura usa 'el principio' para presentar un principio?", respuesta: "estructura de principio" },
        { nombre: "Estructura de conclusión expositiva", definicion: "Concluye la exposición.", sintaxis: "En resumen + O", estructura: "Estructura de conclusión expositiva: [En resumen] [Oración].", ejemplo: "En resumen, el sistema solar está formado por ocho planetas.", ejercicio: "¿Qué estructura usa 'en resumen' para concluir?", respuesta: "estructura de conclusión expositiva" },
        { nombre: "Estructura de recapitulación", definicion: "Recapitula lo expuesto.", sintaxis: "Recapitulando + O", estructura: "Estructura de recapitulación: [Recapitulando] [Oración].", ejemplo: "Recapitulando, la luz viaja a 300.000 km/s.", ejercicio: "¿Qué estructura usa 'recapitulando' para resumir?", respuesta: "estructura de recapitulación" },
        { nombre: "Estructura de transición", definicion: "Conecta dos secciones.", sintaxis: "Ahora bien + O", estructura: "Estructura de transición: [Ahora bien] [Oración].", ejemplo: "Ahora bien, pasemos a analizar la segunda hipótesis.", ejercicio: "¿Qué estructura usa 'ahora bien' para transitar entre secciones?", respuesta: "estructura de transición" },
        { nombre: "Estructura de recomendación expositiva", definicion: "Recomienda una acción.", sintaxis: "Se recomienda + O", estructura: "Estructura de recomendación expositiva: [Se recomienda] [Oración].", ejemplo: "Se recomienda utilizar telescopios para observar el cielo nocturno.", ejercicio: "¿Qué estructura usa 'se recomienda' para recomendar?", respuesta: "estructura de recomendación expositiva" },
    ];
    expositivas.forEach((t, i) => TECNICAS.push({ id: i+76, bloque: 4, categoria: "expositivo", ...t }));

    TECNICAS.sort((a,b) => a.id - b.id);

    // ========== RENDER ==========
    const blockNav = document.getElementById('blockNav');
    const cardsGrid = document.getElementById('cardsGrid');
    const quizContainer = document.getElementById('quizContainer');

    let currentBlock = 1;
    const BLOCK_NAMES = ['', 'Estructuras narrativas', 'Estructuras descriptivas', 'Estructuras argumentativas', 'Estructuras expositivas'];

    for (let i = 1; i <= 4; i++) {
        const btn = document.createElement('button');
        btn.textContent = `${i}. ${BLOCK_NAMES[i]}`;
        btn.dataset.block = i;
        btn.addEventListener('click', () => {
            currentBlock = i;
            renderCards(i);
            updateNav(i);
        });
        blockNav.appendChild(btn);
    }

    function updateNav(block) {
        document.querySelectorAll('.block-nav button').forEach(b => b.classList.toggle('active', parseInt(b.dataset.block) === block));
    }
    updateNav(1);

    window.verificarRespuesta = function(id) {
        const input = document.getElementById(`input-${id}`);
        const feedback = document.getElementById(`feedback-${id}`);
        const correcta = document.getElementById(`correcta-${id}`);
        if (!input || !feedback) return;
        const valor = input.value.trim().toLowerCase();
        const respuestaCorrecta = correcta ? correcta.textContent.toLowerCase() : '';
        if (valor === '' || valor === '...') {
            feedback.textContent = '✏️ Escribe tu respuesta primero.';
            feedback.className = 'feedback-msg';
            return;
        }
        const normalize = (s) => s.replace(/\s+/g, ' ').trim();
        const esCorrecto = normalize(valor) === normalize(respuestaCorrecta) ||
                           normalize(valor).includes(normalize(respuestaCorrecta)) ||
                           normalize(respuestaCorrecta).includes(normalize(valor));
        if (esCorrecto) {
            feedback.textContent = '✅ ¡Correcto! Bien hecho.';
            feedback.className = 'feedback-msg correcto';
        } else {
            feedback.textContent = `❌ Incorrecto. La respuesta correcta es: "${respuestaCorrecta}"`;
            feedback.className = 'feedback-msg incorrecto';
        }
    };

    function renderCards(block) {
        const filtered = TECNICAS.filter(t => t.bloque === block);
        cardsGrid.innerHTML = filtered.map((t, idx) => {
            return `
                <div class="card-flip" data-id="${t.id}" onclick="this.classList.toggle('flipped')">
                    <div class="card-flip-inner">
                        <div class="card-front">
                            <div class="numero">${t.id}</div>
                            <span class="categoria">${t.categoria}</span>
                            <h3>${t.nombre}</h3>
                            <div class="teoria">${t.definicion}</div>
                            <div class="girar-indicador">↻ tocar para ver ejemplo y ejercicio</div>
                        </div>
                        <div class="card-back">
                            <div style="font-weight:600;color:#8bc4e0;margin-bottom:0.2rem;">✍️ ${t.nombre}</div>
                            <div class="definicion"><strong>📘 Teoría:</strong> ${t.definicion}</div>
                            <div class="sintaxis"><strong>📐 Fórmula:</strong> ${t.sintaxis}</div>
                            <div class="estructura"><strong>📊 Estructura:</strong> ${t.estructura}</div>
                            <div class="ejemplo"><strong>💡 Ejemplo:</strong> ${t.ejemplo}</div>
                            <div class="ejercicio">✏️ ${t.ejercicio}</div>
                            <div class="respuesta-area">
                                <input type="text" id="input-${t.id}" placeholder="Escribe tu respuesta..." />
                                <button class="btn-verificar" onclick="verificarRespuesta(${t.id})">Comprobar</button>
                            </div>
                            <div id="feedback-${t.id}" class="feedback-msg"></div>
                            <div id="correcta-${t.id}" style="display:none;">${t.respuesta}</div>
                            <div class="respuesta-correcta">✓ ${t.respuesta}</div>
                            <div class="etiqueta">técnica #${t.id} · ${t.categoria}</div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ========== QUIZ ==========
    let quizQuestions = [];
    let currentQuizIndex = 0;
    let score = 0;
    let answered = false;

    function generateQuiz() {
        const shuffled = [...TECNICAS].sort(() => Math.random() - 0.5);
        quizQuestions = shuffled.slice(0, 10).map(t => {
            const opts = [t.respuesta];
            const others = TECNICAS.filter(x => x.id !== t.id);
            const shuffledOthers = others.sort(() => Math.random() - 0.5);
            for (let i = 0; i < 3; i++) {
                if (shuffledOthers[i]) opts.push(shuffledOthers[i].respuesta);
            }
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return {
                pregunta: `📌 ${t.ejercicio} (técnica: ${t.nombre})`,
                opciones: opts,
                correcta: t.respuesta,
                id: t.id
            };
        });
        currentQuizIndex = 0;
        score = 0;
        answered = false;
        renderQuiz();
    }

    function renderQuiz() {
        if (!quizQuestions.length) return;
        const q = quizQuestions[currentQuizIndex];
        const total = quizQuestions.length;
        let html = `
            <div class="quiz-pregunta">
                <p>${q.pregunta}</p>
                <div class="quiz-opciones" id="quizOptions">
        `;
        q.opciones.forEach((op, idx) => {
            html += `<button data-idx="${idx}" onclick="checkAnswer(${idx})">${op}</button>`;
        });
        html += `</div>
                <div id="quizFeedback" style="margin-top:0.8rem;"></div>
                <div class="quiz-result" id="quizScore">Puntuación: ${score}/${total}</div>
            </div>
            <div class="quiz-controles">
                <button id="nextQuizBtn" disabled>→ Siguiente</button>
                <button onclick="generateQuiz()">🔄 Nuevo cuestionario</button>
            </div>
        `;
        quizContainer.innerHTML = html;
        answered = false;
        document.getElementById('nextQuizBtn').disabled = true;
    }

    window.checkAnswer = function(idx) {
        if (answered) return;
        const q = quizQuestions[currentQuizIndex];
        const buttons = document.querySelectorAll('#quizOptions button');
        buttons.forEach((b, i) => {
            b.disabled = true;
            if (i === idx) {
                const esCorrecta = q.opciones[idx] === q.correcta;
                b.classList.add(esCorrecta ? 'correct' : 'incorrect');
                if (esCorrecta) score++;
            }
            if (q.opciones[i] === q.correcta) {
                buttons[i].classList.add('correct');
            }
        });
        answered = true;
        document.getElementById('nextQuizBtn').disabled = false;
        document.getElementById('quizScore').textContent = `Puntuación: ${score}/${quizQuestions.length}`;
        const fb = document.getElementById('quizFeedback');
        fb.innerHTML = `<span style="background:#2a5a7a;color:#e0f0ff;padding:0.2rem 1rem;border-radius:40px;">✅ Respuesta correcta: ${q.correcta}</span>`;
    };

    document.addEventListener('click', function(e) {
        if (e.target.id === 'nextQuizBtn') {
            if (currentQuizIndex < quizQuestions.length - 1) {
                currentQuizIndex++;
                renderQuiz();
            } else {
                alert(`¡Cuestionario finalizado! Puntuación: ${score}/${quizQuestions.length}`);
                document.getElementById('nextQuizBtn').disabled = true;
            }
        }
    });

    // Inicializar
    renderCards(1);
    generateQuiz();
</script>
</body>
</html>
