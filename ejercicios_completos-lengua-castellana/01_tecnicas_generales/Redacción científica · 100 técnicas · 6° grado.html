<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redacción científica · 100 técnicas · 6° grado</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #FBF8F2;
            font-family: 'Inter', sans-serif;
            color: #1B2E35;
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 280px;
            background: #FBF8F2;
            border-right: 1px solid #E8E1D3;
            padding: 2rem 1.2rem;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .sidebar-brand {
            font-family: 'Fraunces', serif;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.02em;
            color: #1B2E35;
            margin-bottom: 0.2rem;
        }
        .sidebar-sub {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #8A7E6B;
            border-bottom: 1px solid #E8E1D3;
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }
        .search-box {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid #E8E1D3;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            background: white;
            margin-bottom: 1.2rem;
            transition: border-color 0.2s;
        }
        .search-box:focus {
            outline: none;
            border-color: #A8432E;
        }
        .sidebar-nav {
            list-style: none;
            padding: 0;
        }
        .sidebar-nav li {
            margin-bottom: 0.3rem;
        }
        .sidebar-nav a {
            display: block;
            padding: 0.5rem 0.8rem;
            border-radius: 6px;
            color: #1B2E35;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: background 0.15s, color 0.15s;
            border-left: 3px solid transparent;
        }
        .sidebar-nav a:hover {
            background: #EDE8DD;
            color: #1B2E35;
        }
        .sidebar-nav a.active {
            background: #EDE8DD;
            border-left-color: #A8432E;
            color: #A8432E;
            font-weight: 600;
        }
        .sidebar-nav .badge-cat {
            float: right;
            background: #E8E1D3;
            color: #5C5A4E;
            font-size: 0.6rem;
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            font-weight: 400;
        }
        .sidebar-footer {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #8A7E6B;
            border-top: 1px solid #E8E1D3;
            padding-top: 1rem;
        }
        .main {
            flex: 1;
            padding: 2rem 2.5rem;
            max-width: calc(100% - 280px);
        }
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            border-bottom: 1px solid #E8E1D3;
            padding-bottom: 1rem;
        }
        .main-header h1 {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: 1.8rem;
            letter-spacing: -0.02em;
            color: #1B2E35;
        }
        .main-header .counter {
            font-size: 0.85rem;
            color: #5C7A6E;
            background: #F0F1EC;
            padding: 0.3rem 1rem;
            border-radius: 30px;
        }
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #E8E1D3;
            padding-bottom: 0.5rem;
            flex-wrap: wrap;
        }
        .tabs button {
            background: none;
            border: none;
            padding: 0.5rem 1.2rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            color: #5C5A4E;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .tabs button:hover {
            background: #EDE8DD;
            color: #1B2E35;
        }
        .tabs button.active {
            background: #1B2E35;
            color: #FBF8F2;
        }
        .ficha-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .ficha {
            background: #FBF8F2;
            border: 1px solid #E8E1D3;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            transition: box-shadow 0.2s, transform 0.2s;
            position: relative;
            perspective: 800px;
            min-height: 280px;
            display: flex;
            flex-direction: column;
        }
        .ficha:hover {
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .ficha-inner {
            flex: 1;
            padding: 1.2rem 1.2rem 1rem 1.2rem;
            display: flex;
            flex-direction: column;
            transition: transform 0.5s ease;
            transform-style: preserve-3d;
        }
        .ficha.flipped .ficha-inner {
            transform: rotateY(180deg);
        }
        .ficha-face {
            backface-visibility: hidden;
        }
        .ficha-front {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .ficha-back {
            transform: rotateY(180deg);
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 1.2rem;
            background: #FBF8F2;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .ficha-tag {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #8A7E6B;
            background: #EDE8DD;
            display: inline-block;
            padding: 0.15rem 0.6rem;
            border-radius: 20px;
            align-self: flex-start;
            margin-bottom: 0.5rem;
        }
        .ficha-num {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: 0.8rem;
            color: #A8432E;
            margin-bottom: 0.3rem;
        }
        .ficha-titulo {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: 1.1rem;
            line-height: 1.3;
            margin-bottom: 0.4rem;
            color: #1B2E35;
        }
        .ficha-teoria {
            font-size: 0.85rem;
            line-height: 1.5;
            color: #2D4046;
            flex: 1;
            margin-bottom: 0.8rem;
        }
        .ficha-ejemplo {
            background: #F4F1E9;
            border-left: 3px solid #C9A227;
            padding: 0.5rem 0.8rem;
            font-size: 0.8rem;
            border-radius: 0 6px 6px 0;
            margin-bottom: 0.8rem;
            font-style: italic;
            color: #2D4046;
        }
        .ficha-ejemplo small {
            display: block;
            color: #5C7A6E;
            font-style: normal;
            font-size: 0.7rem;
            margin-top: 0.2rem;
        }
        .ficha-pregunta {
            font-size: 0.8rem;
            font-weight: 500;
            color: #A8432E;
            margin-top: 0.3rem;
        }
        .ficha-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            margin-top: 0.5rem;
            border-top: 1px solid #EDE8DD;
            padding-top: 0.5rem;
            flex-wrap: wrap;
        }
        .ficha-actions button {
            background: none;
            border: none;
            font-size: 0.75rem;
            color: #8A7E6B;
            cursor: pointer;
            transition: color 0.15s;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
        }
        .ficha-actions button:hover {
            color: #A8432E;
            background: #EDE8DD;
        }
        .ficha-actions .btn-speak {
            color: #5C7A6E;
        }
        .ficha-actions .btn-speak:hover {
            color: #2D6A4F;
            background: #E6F3ED;
        }
        .ficha-actions .btn-speak.speaking {
            color: #A8432E;
            background: #FBE9EB;
            animation: pulse 0.8s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .ficha-tab {
            position: absolute;
            top: 12px;
            left: -6px;
            width: 12px;
            height: 40px;
            border-radius: 0 6px 6px 0;
            background: #C9A227;
            opacity: 0.7;
        }
        .ficha-tab.cat1 { background: #A8432E; }
        .ficha-tab.cat2 { background: #5C7A6E; }
        .ficha-tab.cat3 { background: #C9A227; }
        .ficha-tab.cat4 { background: #8A7E6B; }
        .ficha-tab.cat5 { background: #B08A6B; }
        .ficha-tab.cat6 { background: #6B8A7A; }
        .ficha-tab.cat7 { background: #A87A6B; }
        .ficha-tab.cat8 { background: #7A8A6B; }
        .ficha-tab.cat9 { background: #8A6B7A; }
        .ficha-tab.cat10 { background: #6B7A8A; }

        .quiz-container {
            display: none;
            margin-top: 1rem;
        }
        .quiz-container.active {
            display: block;
        }
        .quiz-progress {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .quiz-stats {
            display: flex;
            gap: 1.5rem;
            font-size: 0.9rem;
        }
        .quiz-stats span {
            background: #F0F1EC;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
        }
        .quiz-question {
            font-family: 'Fraunces', serif;
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
        }
        .quiz-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
        }
        .quiz-options button {
            background: #FBF8F2;
            border: 1px solid #E8E1D3;
            border-radius: 10px;
            padding: 0.8rem 1rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.15s;
            color: #1B2E35;
        }
        .quiz-options button:hover {
            background: #EDE8DD;
        }
        .quiz-options button.correct {
            background: #5C7A6E;
            color: white;
            border-color: #5C7A6E;
        }
        .quiz-options button.wrong {
            background: #A8432E;
            color: white;
            border-color: #A8432E;
        }
        .quiz-options button:disabled {
            cursor: default;
            opacity: 0.6;
        }
        .quiz-feedback {
            margin-top: 1.2rem;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            background: #F4F1E9;
            border-left: 4px solid #C9A227;
        }
        .quiz-next {
            margin-top: 1.5rem;
            background: #1B2E35;
            color: #FBF8F2;
            border: none;
            padding: 0.6rem 1.8rem;
            border-radius: 30px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }
        .quiz-next:hover {
            background: #2D4046;
        }
        .no-results {
            grid-column: 1/-1;
            text-align: center;
            color: #8A7E6B;
            padding: 3rem 0;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid #E8E1D3;
                padding: 1rem;
            }
            .main {
                max-width: 100%;
                padding: 1.2rem;
            }
            .ficha-grid {
                grid-template-columns: 1fr;
            }
            .quiz-options {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-brand">📘 Redacción</div>
    <div class="sidebar-sub">Científica · 6° grado</div>
    <input type="text" class="search-box" id="searchBox" placeholder="🔍 Buscar técnica...">
    <ul class="sidebar-nav" id="sidebarNav"></ul>
    <div class="sidebar-footer">
        <i class="bi bi-arrow-repeat"></i> Haz clic en la ficha para girar<br>
        <i class="bi bi-volume-up"></i> 🔊 Escucha cada técnica
    </div>
</aside>

<main class="main">
    <div class="main-header">
        <h1>100 técnicas de redacción científica</h1>
        <span class="counter" id="totalCounter">0 fichas</span>
    </div>

    <div class="tabs">
        <button class="active" data-tab="grid">📚 Fichas</button>
        <button data-tab="quiz">🧠 Quiz</button>
        <button data-tab="all" id="showAllBtn">📋 Todas las técnicas</button>
    </div>

    <div id="gridContainer" class="ficha-grid"></div>

    <div id="quizContainer" class="quiz-container">
        <div class="quiz-progress">
            <span id="quizProgress">1 / 10</span>
            <div class="quiz-stats">
                <span id="quizScore">✅ 0</span>
                <span id="quizTotal">📝 0</span>
            </div>
        </div>
        <div id="quizQuestion" class="quiz-question"></div>
        <div id="quizOptions" class="quiz-options"></div>
        <div id="quizFeedback" class="quiz-feedback" style="display:none;"></div>
        <button id="quizNext" class="quiz-next" style="display:none;">Siguiente →</button>
    </div>
</main>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // --------------------------------------------------------------
        // DATOS: 100 TÉCNICAS (10 categorías × 10)
        // --------------------------------------------------------------
        const DATA = [
            // CATEGORÍA 1: FUNDAMENTOS
            { id: 1, cat: 1, nombre: "Definir el propósito del texto",
              teoria: "Antes de escribir, pregunta: ¿qué quiero lograr? ¿Informar, explicar, convencer o describir? Esto define el tono y la estructura.",
              ejemploES: "Ejemplo: 'El objetivo de este informe es explicar el ciclo del agua a los compañeros de clase.'",
              ejemploEN: "Example: 'The purpose of this report is to explain the water cycle to classmates.'",
              pregunta: "¿Qué debes definir antes de comenzar a escribir un texto científico?",
              respuesta: "El propósito del texto (informar, explicar, convencer o describir)." },
            { id: 2, cat: 1, nombre: "Conocer al lector",
              teoria: "Escribe pensando en quién te leerá. Usa un lenguaje y ejemplos adecuados a su edad y conocimiento.",
              ejemploES: "Ejemplo: 'Si escribes para niños de 6°, usa ejemplos cotidianos y palabras claras.'",
              ejemploEN: "Example: 'If writing for 6th graders, use everyday examples and clear words.'",
              pregunta: "¿A quién debes tener en cuenta al escribir un texto científico?",
              respuesta: "Al lector (destinatario), para adaptar el lenguaje y los ejemplos." },
            { id: 3, cat: 1, nombre: "Estructura básica: introducción, desarrollo, conclusión",
              teoria: "Todo texto científico debe tener una apertura que presente el tema, un desarrollo con explicaciones y un cierre que resuma lo aprendido.",
              ejemploES: "Ejemplo: 'Introducción: ¿qué es la fotosíntesis? Desarrollo: cómo ocurre. Conclusión: importancia para la vida.'",
              ejemploEN: "Example: 'Introduction: what is photosynthesis? Development: how it happens. Conclusion: importance for life.'",
              pregunta: "¿Cuáles son las tres partes principales de un texto científico?",
              respuesta: "Introducción, desarrollo y conclusión." },
            { id: 4, cat: 1, nombre: "Usar párrafos cortos",
              teoria: "Los párrafos de 3 a 5 oraciones facilitan la lectura. Cada párrafo debe desarrollar una idea principal.",
              ejemploES: "Ejemplo: 'El sol es una estrella. Produce luz y calor. Sin él, no habría vida en la Tierra.'",
              ejemploEN: "Example: 'The sun is a star. It produces light and heat. Without it, life on Earth would not exist.'",
              pregunta: "¿Cuántas oraciones debe tener idealmente un párrafo en un texto científico para niños?",
              respuesta: "De 3 a 5 oraciones, cada uno con una idea principal." },
            { id: 5, cat: 1, nombre: "Evitar repeticiones innecesarias",
              teoria: "No uses la misma palabra muchas veces. Busca sinónimos o reestructura la frase para que sea variada.",
              ejemploES: "Ejemplo: En lugar de 'El agua es importante. El agua es necesaria.', escribe 'El agua es importante y necesaria.'",
              ejemploEN: "Example: Instead of 'Water is important. Water is necessary.', write 'Water is important and necessary.'",
              pregunta: "¿Qué recurso puedes usar para no repetir siempre la misma palabra?",
              respuesta: "Sinónimos o reestructurar la frase." },
            { id: 6, cat: 1, nombre: "Conectar ideas con palabras de enlace",
              teoria: "Usa conectores como 'porque', 'sin embargo', 'además', 'por lo tanto' para unir las ideas y dar fluidez.",
              ejemploES: "Ejemplo: 'Las plantas necesitan luz; por lo tanto, crecen hacia el sol.'",
              ejemploEN: "Example: 'Plants need light; therefore, they grow towards the sun.'",
              pregunta: "¿Qué son los conectores y para qué sirven?",
              respuesta: "Palabras que unen ideas para dar fluidez al texto (porque, sin embargo, además, por lo tanto)." },
            { id: 7, cat: 1, nombre: "Utilizar ejemplos concretos",
              teoria: "Los ejemplos ayudan a entender conceptos abstractos. Pon casos que los niños puedan imaginar o experimentar.",
              ejemploES: "Ejemplo: 'La fuerza de gravedad es como un imán que atrae todo hacia el centro de la Tierra.'",
              ejemploEN: "Example: 'Gravity is like a magnet that pulls everything towards the center of the Earth.'",
              pregunta: "¿Por qué son útiles los ejemplos en un texto científico?",
              respuesta: "Porque ayudan a entender conceptos abstractos mediante casos concretos." },
            { id: 8, cat: 1, nombre: "Escribir oraciones en voz activa",
              teoria: "La voz activa hace el texto más directo y dinámico. Sujeto + verbo + objeto.",
              ejemploES: "Ejemplo: 'El científico observó el experimento.' (activa) vs 'El experimento fue observado por el científico.' (pasiva).",
              ejemploEN: "Example: 'The scientist observed the experiment.' (active) vs 'The experiment was observed by the scientist.' (passive).",
              pregunta: "¿Qué es la voz activa y por qué se recomienda en redacción científica?",
              respuesta: "Es cuando el sujeto realiza la acción; hace el texto más directo y dinámico." },
            { id: 9, cat: 1, nombre: "Revisar la ortografía y puntuación",
              teoria: "Los errores ortográficos y de puntuación distraen al lector y restan credibilidad. Revisa siempre tu texto.",
              ejemploES: "Ejemplo: 'El agua hierve a 100°C' (correcto) vs 'El agua hirve a 100°C' (incorrecto).",
              ejemploEN: "Example: 'Water boils at 100°C' (correct) vs 'Water boil at 100°C' (incorrect).",
              pregunta: "¿Qué debes revisar siempre después de escribir un texto científico?",
              respuesta: "La ortografía y la puntuación." },
            { id: 10, cat: 1, nombre: "Leer en voz alta para comprobar fluidez",
              teoria: "Al leer en voz alta, escucharás si las oraciones son naturales y si el ritmo es adecuado.",
              ejemploES: "Ejemplo: 'La Tierra gira alrededor del Sol.' Suena bien. 'La Tierra gira alrededor del Sol y además también rota.' Puede sonar repetitivo.",
              ejemploEN: "Example: 'The Earth revolves around the Sun.' Sounds good. 'The Earth revolves around the Sun and also rotates.' Might sound repetitive.",
              pregunta: "¿Qué técnica ayuda a detectar problemas de fluidez en un texto?",
              respuesta: "Leer el texto en voz alta." },
            // CATEGORÍA 2: DESCRIPCIÓN DE PROCESOS
            { id: 11, cat: 2, nombre: "Usar verbos en presente para procesos generales",
              teoria: "Para describir procesos científicos que siempre ocurren igual, usa el presente simple.",
              ejemploES: "Ejemplo: 'El agua se evapora cuando se calienta.'",
              ejemploEN: "Example: 'Water evaporates when heated.'",
              pregunta: "¿Qué tiempo verbal se usa para describir procesos científicos generales?",
              respuesta: "El presente simple (presente de indicativo)." },
            { id: 12, cat: 2, nombre: "Orden cronológico de pasos",
              teoria: "Enumera los pasos de un proceso en orden temporal usando conectores como 'primero', 'luego', 'después', 'finalmente'.",
              ejemploES: "Ejemplo: 'Primero, llena el vaso con agua. Luego, añade el colorante. Después, observa cómo se difunde.'",
              ejemploEN: "Example: 'First, fill the glass with water. Then, add the dye. After that, observe how it spreads.'",
              pregunta: "¿Qué conectores ayudan a ordenar los pasos de un proceso?",
              respuesta: "Primero, luego, después, finalmente." },
            { id: 13, cat: 2, nombre: "Explicar la causa y el efecto",
              teoria: "Muestra por qué ocurre algo y qué consecuencias tiene. Usa conectores como 'porque', 'debido a', 'por lo tanto'.",
              ejemploES: "Ejemplo: 'La lluvia ácida daña los bosques porque disuelve los nutrientes del suelo.'",
              ejemploEN: "Example: 'Acid rain damages forests because it dissolves soil nutrients.'",
              pregunta: "¿Qué relación es importante explicar en los procesos científicos?",
              respuesta: "La relación causa-efecto." },
            { id: 14, cat: 2, nombre: "Utilizar diagramas o dibujos (en texto, describir)",
              teoria: "Si no puedes incluir una imagen, describe con palabras lo que se vería en un diagrama.",
              ejemploES: "Ejemplo: 'El diagrama muestra el Sol en el centro, y la Tierra girando a su alrededor.'",
              ejemploEN: "Example: 'The diagram shows the Sun in the center, and the Earth revolving around it.'",
              pregunta: "¿Cómo puedes ayudar al lector a visualizar un proceso sin una imagen?",
              respuesta: "Describiendo con palabras lo que se vería en un diagrama." },
            { id: 15, cat: 2, nombre: "Diferenciar entre secuencia y simultaneidad",
              teoria: "No todos los pasos ocurren uno tras otro; algunos suceden al mismo tiempo. Usa 'mientras' o 'al mismo tiempo'.",
              ejemploES: "Ejemplo: 'Mientras el agua se calienta, el termómetro marca la temperatura.'",
              ejemploEN: "Example: 'While the water heats up, the thermometer shows the temperature.'",
              pregunta: "¿Qué palabras indican que dos acciones ocurren al mismo tiempo?",
              respuesta: "Mientras, al mismo tiempo." },
            { id: 16, cat: 2, nombre: "Incluir advertencias o precauciones",
              teoria: "En procesos experimentales, es importante señalar riesgos o cuidados. Usa 'no olvides', 'ten cuidado'.",
              ejemploES: "Ejemplo: 'No olvides usar guantes al manipular productos químicos.'",
              ejemploEN: "Example: 'Don't forget to wear gloves when handling chemicals.'",
              pregunta: "¿Qué tipo de información de seguridad debe incluirse en la descripción de un experimento?",
              respuesta: "Advertencias o precauciones (uso de guantes, cuidado con sustancias)." },
            { id: 17, cat: 2, nombre: "Describir resultados esperados",
              teoria: "Indica qué se espera observar al final del proceso. Usa 'se espera que...' o 'debería ocurrir...'.",
              ejemploES: "Ejemplo: 'Se espera que el color del agua se vuelva azul.'",
              ejemploEN: "Example: 'It is expected that the water color will turn blue.'",
              pregunta: "¿Qué debes mencionar sobre los resultados al describir un proceso?",
              respuesta: "Los resultados esperados." },
            { id: 18, cat: 2, nombre: "Comparar antes y después",
              teoria: "Muestra el estado inicial y final para resaltar el cambio. Usa 'inicialmente' y 'finalmente'.",
              ejemploES: "Ejemplo: 'Inicialmente el agua estaba fría; finalmente hirvió.'",
              ejemploEN: "Example: 'Initially the water was cold; finally it boiled.'",
              pregunta: "¿Qué palabras ayudan a mostrar el cambio en un proceso?",
              respuesta: "Inicialmente, finalmente." },
            { id: 19, cat: 2, nombre: "Usar la voz pasiva solo cuando sea necesario",
              teoria: "La pasiva puede ser útil cuando el agente no es importante, pero no abuses. Prefiere la activa.",
              ejemploES: "Ejemplo: 'El experimento fue realizado por los estudiantes.' (pasiva) vs 'Los estudiantes realizaron el experimento.' (activa).",
              ejemploEN: "Example: 'The experiment was performed by the students.' (passive) vs 'The students performed the experiment.' (active).",
              pregunta: "¿Cuándo es útil usar la voz pasiva en un texto científico?",
              respuesta: "Cuando el agente no es importante o se desconoce." },
            { id: 20, cat: 2, nombre: "Incluir preguntas para guiar al lector",
              teoria: "Haz preguntas retóricas para involucrar al lector y que reflexione sobre el proceso.",
              ejemploES: "Ejemplo: '¿Qué crees que pasará si añadimos más sal?'",
              ejemploEN: "Example: 'What do you think will happen if we add more salt?'",
              pregunta: "¿Qué recurso puedes usar para hacer que el lector participe activamente?",
              respuesta: "Preguntas retóricas." },
            // CATEGORÍA 3: DESCRIPCIÓN DE OBJETOS Y SERES VIVOS
            { id: 21, cat: 3, nombre: "Observar y anotar características",
              teoria: "Antes de describir, observa detenidamente el objeto o ser vivo y toma notas de sus cualidades.",
              ejemploES: "Ejemplo: 'El león tiene pelaje amarillo, melena oscura y garras afiladas.'",
              ejemploEN: "Example: 'The lion has yellow fur, a dark mane, and sharp claws.'",
              pregunta: "¿Qué debes hacer primero antes de describir algo?",
              respuesta: "Observar y anotar sus características." },
            { id: 22, cat: 3, nombre: "Organizar la descripción de lo general a lo particular",
              teoria: "Primero da una visión general, luego detalla partes específicas.",
              ejemploES: "Ejemplo: 'El coche es rojo. Tiene cuatro puertas, un motor potente y neumáticos anchos.'",
              ejemploEN: "Example: 'The car is red. It has four doors, a powerful engine, and wide tires.'",
              pregunta: "¿Cuál es el orden recomendado para describir un objeto?",
              respuesta: "De lo general a lo particular." },
            { id: 23, cat: 3, nombre: "Usar los cinco sentidos en la descripción",
              teoria: "Describe lo que se ve, se oye, se huele, se toca y (si es posible) se saborea.",
              ejemploES: "Ejemplo: 'La flor es amarilla, huele dulce y sus pétalos son suaves al tacto.'",
              ejemploEN: "Example: 'The flower is yellow, smells sweet, and its petals are soft to the touch.'",
              pregunta: "¿Qué sentidos puedes usar para hacer una descripción más rica?",
              respuesta: "Vista, oído, olfato, tacto y gusto." },
            { id: 24, cat: 3, nombre: "Distinguir entre descripción objetiva y subjetiva",
              teoria: "La objetiva presenta hechos medibles; la subjetiva incluye opiniones o emociones.",
              ejemploES: "Ejemplo: Objetivo: 'El gato pesa 4 kg.' Subjetivo: 'El gato es hermoso.'",
              ejemploEN: "Example: Objective: 'The cat weighs 4 kg.' Subjective: 'The cat is beautiful.'",
              pregunta: "¿Qué diferencia hay entre una descripción objetiva y una subjetiva?",
              respuesta: "La objetiva da hechos, la subjetiva incluye opiniones." },
            { id: 25, cat: 3, nombre: "Utilizar adjetivos precisos",
              teoria: "Elige adjetivos que describan exactamente la cualidad: 'rojo intenso' en lugar de 'rojo'.",
              ejemploES: "Ejemplo: 'El cielo era de un azul profundo.'",
              ejemploEN: "Example: 'The sky was a deep blue.'",
              pregunta: "¿Qué tipo de adjetivos enriquecen una descripción?",
              respuesta: "Adjetivos precisos y específicos." },
            { id: 26, cat: 3, nombre: "Comparar con elementos conocidos",
              teoria: "Usa comparaciones (símiles) para ayudar al lector a imaginar: 'como...', 'parecido a...'.",
              ejemploES: "Ejemplo: 'El cactus tiene forma de columna, como un poste.'",
              ejemploEN: "Example: 'The cactus is shaped like a column, like a pole.'",
              pregunta: "¿Qué recurso literario ayuda a describir algo comparándolo con lo conocido?",
              respuesta: "El símil (comparación con 'como', 'parecido a')." },
            { id: 27, cat: 3, nombre: "Describir la función o utilidad",
              teoria: "Además de cómo es, explica para qué sirve o qué hace.",
              ejemploES: "Ejemplo: 'El termómetro mide la temperatura. Sirve para saber si tenemos fiebre.'",
              ejemploEN: "Example: 'The thermometer measures temperature. It helps us know if we have a fever.'",
              pregunta: "Además de las características, ¿qué más debes incluir en la descripción de un objeto?",
              respuesta: "Su función o utilidad." },
            { id: 28, cat: 3, nombre: "Describir el hábitat o entorno",
              teoria: "Para seres vivos, menciona dónde viven y cómo se relacionan con su ambiente.",
              ejemploES: "Ejemplo: 'El pingüino vive en zonas frías, cerca del mar, donde se alimenta de peces.'",
              ejemploEN: "Example: 'The penguin lives in cold areas, near the sea, where it feeds on fish.'",
              pregunta: "¿Qué información sobre el entorno es importante en la descripción de un ser vivo?",
              respuesta: "Su hábitat y cómo se relaciona con él." },
            { id: 29, cat: 3, nombre: "Incluir datos curiosos",
              teoria: "Un dato sorprendente hace la descripción más interesante y memorable.",
              ejemploES: "Ejemplo: 'El pulpo tiene tres corazones y su sangre es azul.'",
              ejemploEN: "Example: 'The octopus has three hearts and blue blood.'",
              pregunta: "¿Qué tipo de información puede hacer una descripción más atractiva?",
              respuesta: "Datos curiosos o sorprendentes." },
            { id: 30, cat: 3, nombre: "Revisar que la descripción sea coherente",
              teoria: "Todas las partes de la descripción deben estar relacionadas y no contradecirse.",
              ejemploES: "Ejemplo: No digas 'el animal es pequeño' y luego 'mide 2 metros'.",
              ejemploEN: "Example: Don't say 'the animal is small' and then 'it measures 2 meters'.",
              pregunta: "¿Qué cualidad debe tener una buena descripción en cuanto a su contenido?",
              respuesta: "Coherencia (sin contradicciones)." },
            // CATEGORÍA 4: NARRACIÓN DE EXPERIMENTOS
            { id: 31, cat: 4, nombre: "Escribir en pasado para experimentos ya realizados",
              teoria: "Cuando narras un experimento que ya hiciste, usa el pretérito (pasado).",
              ejemploES: "Ejemplo: 'Ayer realizamos el experimento. Mezclamos los líquidos y observamos el cambio.'",
              ejemploEN: "Example: 'Yesterday we performed the experiment. We mixed the liquids and observed the change.'",
              pregunta: "¿Qué tiempo verbal se usa para narrar un experimento ya realizado?",
              respuesta: "Pretérito (pasado)." },
            { id: 32, cat: 4, nombre: "Secuenciar con marcadores temporales",
              teoria: "Usa palabras como 'al principio', 'después', 'más tarde', 'al final' para ordenar los eventos.",
              ejemploES: "Ejemplo: 'Al principio, colocamos el papel en el agua. Después, vimos cómo se mojaba.'",
              ejemploEN: "Example: 'At first, we put the paper in the water. Then, we saw how it got wet.'",
              pregunta: "¿Qué marcadores temporales ayudan a ordenar una narración?",
              respuesta: "Al principio, después, más tarde, al final." },
            { id: 33, cat: 4, nombre: "Incluir las observaciones y resultados",
              teoria: "Cuenta qué viste, mediste o sentiste durante el experimento. Sé detallado.",
              ejemploES: "Ejemplo: 'Observamos que el agua se volvió turbia y el termómetro marcó 25°C.'",
              ejemploEN: "Example: 'We observed that the water became cloudy and the thermometer read 25°C.'",
              pregunta: "¿Qué tipo de información debes incluir al narrar un experimento?",
              respuesta: "Las observaciones y resultados obtenidos." },
            { id: 34, cat: 4, nombre: "Explicar lo que se hizo y por qué",
              teoria: "No solo digas qué hiciste, sino también la razón de cada paso.",
              ejemploES: "Ejemplo: 'Añadimos sal al agua para aumentar su densidad.'",
              ejemploEN: "Example: 'We added salt to the water to increase its density.'",
              pregunta: "Además de describir las acciones, ¿qué debes explicar en la narración de un experimento?",
              respuesta: "La razón de cada paso (por qué lo hiciste)." },
            { id: 35, cat: 4, nombre: "Describir los materiales y herramientas",
              teoria: "Menciona todos los objetos que usaste: vasos, termómetros, lupas, etc.",
              ejemploES: "Ejemplo: 'Usamos una lupa para observar las hojas.'",
              ejemploEN: "Example: 'We used a magnifying glass to observe the leaves.'",
              pregunta: "¿Qué debes listar al principio de la narración de un experimento?",
              respuesta: "Los materiales y herramientas utilizados." },
            { id: 36, cat: 4, nombre: "Utilizar diálogos o citas (si son relevantes)",
              teoria: "Si alguien hizo un comentario importante, puedes incluirlo entre comillas.",
              ejemploES: "Ejemplo: 'María dijo: "¡El líquido cambió de color!"'",
              ejemploEN: "Example: 'Maria said: "The liquid changed color!"'",
              pregunta: "¿Cómo puedes incluir palabras textuales de una persona en tu narración?",
              respuesta: "Usando comillas (diálogo o cita)." },
            { id: 37, cat: 4, nombre: "Mostrar sorpresa o emoción (si es apropiado)",
              teoria: "En un relato personal, puedes expresar tus reacciones, pero sin exagerar.",
              ejemploES: "Ejemplo: 'Nos sorprendió ver que la planta creció 5 cm en una semana.'",
              ejemploEN: "Example: 'We were surprised to see the plant grow 5 cm in one week.'",
              pregunta: "¿Puedes incluir emociones en la narración de un experimento?",
              respuesta: "Sí, de forma moderada para hacer el relato más vivo." },
            { id: 38, cat: 4, nombre: "Concluir con lo aprendido",
              teoria: "Al final, reflexiona sobre lo que el experimento te enseñó.",
              ejemploES: "Ejemplo: 'Aprendimos que la luz es necesaria para la fotosíntesis.'",
              ejemploEN: "Example: 'We learned that light is necessary for photosynthesis.'",
              pregunta: "¿Qué debe incluir la conclusión de la narración de un experimento?",
              respuesta: "Lo aprendido o la enseñanza obtenida." },
            { id: 39, cat: 4, nombre: "Escribir en primera persona (yo/nosotros)",
              teoria: "Es común usar 'nosotros' para narrar experimentos grupales.",
              ejemploES: "Ejemplo: 'Nosotros observamos que el agua se congeló.'",
              ejemploEN: "Example: 'We observed that the water froze.'",
              pregunta: "¿Qué persona gramatical se usa a menudo en la narración de experimentos?",
              respuesta: "Primera persona (nosotros/yo)." },
            { id: 40, cat: 4, nombre: "Revisar que la narración tenga un hilo conductor",
              teoria: "Todo debe estar conectado; no saltes de un tema a otro sin transición.",
              ejemploES: "Ejemplo: 'Después de mezclar, observamos. Luego, medimos la temperatura.' (coherente).",
              ejemploEN: "Example: 'After mixing, we observed. Then, we measured the temperature.' (coherent).",
              pregunta: "¿Qué característica debe tener la narración para que sea fácil de seguir?",
              respuesta: "Un hilo conductor o coherencia." },
            // CATEGORÍA 5: ARGUMENTACIÓN SENCILLA
            { id: 41, cat: 5, nombre: "Dar una opinión y apoyarla con razones",
              teoria: "No solo digas lo que piensas; explica por qué piensas así. Usa 'porque'.",
              ejemploES: "Ejemplo: 'Creo que deberíamos reciclar más porque así reducimos la contaminación.'",
              ejemploEN: "Example: 'I think we should recycle more because it reduces pollution.'",
              pregunta: "¿Qué debes añadir a tu opinión para que sea una argumentación?",
              respuesta: "Razones o evidencias (por qué)." },
            { id: 42, cat: 5, nombre: "Usar datos o ejemplos como evidencia",
              teoria: "Los hechos concretos fortalecen tu argumento. Menciona números o casos.",
              ejemploES: "Ejemplo: 'El 80% de los residuos se pueden reciclar, según datos de la ciudad.'",
              ejemploEN: "Example: '80% of waste can be recycled, according to city data.'",
              pregunta: "¿Qué tipo de información hace más fuerte un argumento?",
              respuesta: "Datos, ejemplos o evidencias." },
            { id: 43, cat: 5, nombre: "Reconocer un punto de vista contrario",
              teoria: "Menciona lo que otros podrían pensar y luego respóndelo. Esto muestra que has considerado otras ideas.",
              ejemploES: "Ejemplo: 'Algunos dicen que reciclar es caro, pero a largo plazo ahorra recursos.'",
              ejemploEN: "Example: 'Some say recycling is expensive, but in the long run it saves resources.'",
              pregunta: "¿Qué estrategia fortalece un argumento al considerar otras opiniones?",
              respuesta: "Reconocer y responder al punto de vista contrario." },
            { id: 44, cat: 5, nombre: "Conectar causas y consecuencias",
              teoria: "Muestra qué efecto produce una acción. Usa 'por lo tanto', 'como resultado'.",
              ejemploES: "Ejemplo: 'Si talamos árboles, perdemos oxígeno. Por lo tanto, debemos proteger los bosques.'",
              ejemploEN: "Example: 'If we cut down trees, we lose oxygen. Therefore, we must protect forests.'",
              pregunta: "¿Qué relación lógica es clave en la argumentación?",
              respuesta: "Causa-consecuencia." },
            { id: 45, cat: 5, nombre: "Usar preguntas retóricas para involucrar",
              teoria: "Haz preguntas que no necesitan respuesta para que el lector reflexione.",
              ejemploES: "Ejemplo: '¿No sería mejor cuidar el planeta para las futuras generaciones?'",
              ejemploEN: "Example: 'Wouldn't it be better to take care of the planet for future generations?'",
              pregunta: "¿Qué recurso retórico puede involucrar al lector sin esperar respuesta?",
              respuesta: "La pregunta retórica." },
            { id: 46, cat: 5, nombre: "Ordenar los argumentos de menor a mayor importancia",
              teoria: "Empieza con razones menos fuertes y termina con la más convincente.",
              ejemploES: "Ejemplo: 'Primero, reciclar ahorra energía. Además, reduce la basura. Pero lo más importante: protege el medio ambiente.'",
              ejemploEN: "Example: 'First, recycling saves energy. Also, it reduces waste. But most importantly: it protects the environment.'",
              pregunta: "¿Cuál es un buen orden para presentar los argumentos?",
              respuesta: "De menor a mayor importancia." },
            { id: 47, cat: 5, nombre: "Incluir una conclusión firme",
              teoria: "Termina reafirmando tu postura con una frase contundente.",
              ejemploES: "Ejemplo: 'Por todas estas razones, reciclar es una responsabilidad de todos.'",
              ejemploEN: "Example: 'For all these reasons, recycling is everyone's responsibility.'",
              pregunta: "¿Cómo debe ser la conclusión de un texto argumentativo?",
              respuesta: "Firme, reafirmando la postura." },
            { id: 48, cat: 5, nombre: "Evitar insultos o descalificaciones",
              teoria: "Argumenta con respeto. Ataca las ideas, no a las personas.",
              ejemploES: "Ejemplo: 'Tu idea es incorrecta' (mejor que 'eres un ignorante').",
              ejemploEN: "Example: 'Your idea is incorrect' (better than 'you are ignorant').",
              pregunta: "¿Qué debes evitar en un texto argumentativo?",
              respuesta: "Insultos o descalificaciones personales." },
            { id: 49, cat: 5, nombre: "Usar conectores de oposición ('pero', 'sin embargo')",
              teoria: "Estos conectores te permiten contrastar ideas y mostrar matices.",
              ejemploES: "Ejemplo: 'Reciclar requiere esfuerzo, pero los beneficios son enormes.'",
              ejemploEN: "Example: 'Recycling requires effort, but the benefits are huge.'",
              pregunta: "¿Qué conectores sirven para mostrar contraste?",
              respuesta: "Pero, sin embargo, aunque." },
            { id: 50, cat: 5, nombre: "Revisar que los argumentos sean lógicos",
              teoria: "Asegúrate de que tus razones realmente apoyen tu opinión y no se contradigan.",
              ejemploES: "Ejemplo: Si dices que el reciclaje es bueno, no digas luego que 'no importa'.",
              ejemploEN: "Example: If you say recycling is good, don't then say 'it doesn't matter'.",
              pregunta: "¿Qué cualidad debe tener la cadena de argumentos?",
              respuesta: "Ser lógica y sin contradicciones." },
            // CATEGORÍA 6: EXPOSICIÓN DE INFORMACIÓN
            { id: 51, cat: 6, nombre: "Presentar el tema con una definición clara",
              teoria: "Empieza explicando qué es el tema principal de manera sencilla.",
              ejemploES: "Ejemplo: 'El ciclo del agua es el movimiento continuo del agua en la Tierra.'",
              ejemploEN: "Example: 'The water cycle is the continuous movement of water on Earth.'",
              pregunta: "¿Cómo se debe iniciar un texto expositivo?",
              respuesta: "Con una definición clara del tema." },
            { id: 52, cat: 6, nombre: "Organizar la información en subtemas",
              teoria: "Divide el tema en partes más pequeñas y asígnale un título a cada una.",
              ejemploES: "Ejemplo: '1. Evaporación, 2. Condensación, 3. Precipitación.'",
              ejemploEN: "Example: '1. Evaporation, 2. Condensation, 3. Precipitation.'",
              pregunta: "¿Qué técnica ayuda a organizar información extensa?",
              respuesta: "Dividir en subtemas." },
            { id: 53, cat: 6, nombre: "Usar ejemplos y contraejemplos",
              teoria: "Muestra casos que cumplen y no cumplen la regla para aclarar conceptos.",
              ejemploES: "Ejemplo: 'Los mamíferos dan leche; las aves no.'",
              ejemploEN: "Example: 'Mammals give milk; birds do not.'",
              pregunta: "¿Qué recurso ayuda a clarificar una definición?",
              respuesta: "Ejemplos y contraejemplos." },
            { id: 54, cat: 6, nombre: "Incluir datos numéricos o medidas",
              teoria: "Los números dan precisión a la información. Usa unidades.",
              ejemploES: "Ejemplo: 'La temperatura de ebullición del agua es 100°C.'",
              ejemploEN: "Example: 'The boiling point of water is 100°C.'",
              pregunta: "¿Qué tipo de información hace más precisa una exposición?",
              respuesta: "Datos numéricos con unidades." },
            { id: 55, cat: 6, nombre: "Definir palabras nuevas en el contexto",
              teoria: "Cuando uses una palabra técnica, explícala inmediatamente.",
              ejemploES: "Ejemplo: 'La fotosíntesis (proceso por el cual las plantas fabrican su alimento) es esencial.'",
              ejemploEN: "Example: 'Photosynthesis (the process by which plants make their food) is essential.'",
              pregunta: "¿Qué debes hacer cuando introduces un término nuevo?",
              respuesta: "Definirlo en el contexto." },
            { id: 56, cat: 6, nombre: "Utilizar comparaciones para hacerlo comprensible",
              teoria: "Compara conceptos nuevos con otros ya conocidos.",
              ejemploES: "Ejemplo: 'El ADN es como un manual de instrucciones para el cuerpo.'",
              ejemploEN: "Example: 'DNA is like an instruction manual for the body.'",
              pregunta: "¿Qué recurso facilita la comprensión de conceptos nuevos?",
              respuesta: "Comparaciones con lo conocido." },
            { id: 57, cat: 6, nombre: "Evitar información demasiado técnica para la audiencia",
              teoria: "Ajusta el nivel de complejidad a la edad y conocimientos del lector.",
              ejemploES: "Ejemplo: Para niños de 6°, no uses 'polimerización'; di 'unión de moléculas'.",
              ejemploEN: "Example: For 6th graders, don't use 'polymerization'; say 'molecule joining'.",
              pregunta: "¿Cómo debes adaptar la información según el lector?",
              respuesta: "Usar un lenguaje y ejemplos adecuados a su nivel." },
            { id: 58, cat: 6, nombre: "Incluir preguntas para verificar comprensión",
              teoria: "Después de un bloque de información, haz una pregunta sencilla.",
              ejemploES: "Ejemplo: '¿Sabes cuál es la función del corazón?'",
              ejemploEN: "Example: 'Do you know what the function of the heart is?'",
              pregunta: "¿Qué recurso ayuda a comprobar si el lector está entendiendo?",
              respuesta: "Preguntas de verificación." },
            { id: 59, cat: 6, nombre: "Resumir al final de cada sección",
              teoria: "Un breve resumen ayuda a fijar lo aprendido.",
              ejemploES: "Ejemplo: 'En resumen, la evaporación es el paso del agua líquida a vapor.'",
              ejemploEN: "Example: 'In summary, evaporation is the change from liquid water to vapor.'",
              pregunta: "¿Qué puedes hacer al final de cada parte de un texto expositivo?",
              respuesta: "Un breve resumen." },
            { id: 60, cat: 6, nombre: "Citar fuentes confiables (si es posible)",
              teoria: "Menciona de dónde obtuviste la información (libros, enciclopedias, profesores).",
              ejemploES: "Ejemplo: 'Según el libro de Ciencias Naturales, la Tierra tiene 4.500 millones de años.'",
              ejemploEN: "Example: 'According to the Science textbook, the Earth is 4.5 billion years old.'",
              pregunta: "¿Qué debes hacer para dar credibilidad a tu exposición?",
              respuesta: "Citar las fuentes de información." },
            // CATEGORÍA 7: DESCRIPCIÓN DE GRÁFICOS Y DATOS
            { id: 61, cat: 7, nombre: "Identificar el tipo de gráfico",
              teoria: "Di si es un gráfico de barras, líneas, pastel, etc., y qué representa.",
              ejemploES: "Ejemplo: 'El gráfico de barras muestra las temperaturas máximas de cada mes.'",
              ejemploEN: "Example: 'The bar chart shows the maximum temperatures of each month.'",
              pregunta: "¿Qué debes indicar primero al describir un gráfico?",
              respuesta: "El tipo de gráfico y lo que representa." },
            { id: 62, cat: 7, nombre: "Describir los ejes y etiquetas",
              teoria: "Explica qué mide cada eje y las unidades utilizadas.",
              ejemploES: "Ejemplo: 'El eje horizontal representa los meses, y el vertical la temperatura en °C.'",
              ejemploEN: "Example: 'The horizontal axis represents the months, and the vertical axis the temperature in °C.'",
              pregunta: "¿Qué información sobre los ejes debes dar en la descripción?",
              respuesta: "Qué miden y las unidades." },
            { id: 63, cat: 7, nombre: "Señalar tendencias o patrones",

        // --------------------------------------------------------------
        // RENDERIZAR SIDEBAR
        // --------------------------------------------------------------
        function renderSidebar() {
            sidebarNav.innerHTML = '';
            CATEGORIAS.forEach((cat, idx) => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = '#';
                a.dataset.cat = idx + 1;
                const count = DATA.filter(d => d.cat === idx + 1).length;
                a.innerHTML = `${cat} <span class="badge-cat">${count}</span>`;
                a.addEventListener('click', (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.sidebar-nav a').forEach(el => el.classList.remove('active'));
                    a.classList.add('active');
                    filtrarPorCategoria(idx + 1);
                });
                li.appendChild(a);
                sidebarNav.appendChild(li);
            });
        }

        // --------------------------------------------------------------
        // LECTOR DE VOZ
        // --------------------------------------------------------------
        function speakText(text, button) {
            if (!window.speechSynthesis) {
                alert('Tu navegador no soporta la síntesis de voz.');
                return;
            }

            // Si ya está hablando y es el mismo botón, detener
            if (speakingElement === button && speechSynthesis.speaking) {
                speechSynthesis.cancel();
                button.classList.remove('speaking');
                button.innerHTML = '<i class="bi bi-volume-up"></i> Escuchar';
                speakingElement = null;
                return;
            }

            // Detener cualquier reproducción anterior
            if (speechSynthesis.speaking) {
                speechSynthesis.cancel();
                if (speakingElement) {
                    speakingElement.classList.remove('speaking');
                    speakingElement.innerHTML = '<i class="bi bi-volume-up"></i> Escuchar';
                }
            }

            // Crear nuevo utterance
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'es-ES';
            utterance.rate = 0.9;
            utterance.pitch = 1;

            utterance.onend = function() {
                if (button) {
                    button.classList.remove('speaking');
                    button.innerHTML = '<i class="bi bi-volume-up"></i> Escuchar';
                }
                speakingElement = null;
            };

            utterance.onerror = function() {
                if (button) {
                    button.classList.remove('speaking');
                    button.innerHTML = '<i class="bi bi-volume-up"></i> Escuchar';
                }
                speakingElement = null;
            };

            speechSynthesis.speak(utterance);
            button.classList.add('speaking');
            button.innerHTML = '<i class="bi bi-stop-circle"></i> Detener';
            speakingElement = button;
            currentUtterance = utterance;
        }

        // --------------------------------------------------------------
        // RENDERIZAR FICHAS
        // --------------------------------------------------------------
        function renderFichas(fichas) {
            gridContainer.innerHTML = '';
            if (!fichas || fichas.length === 0) {
                gridContainer.innerHTML = '<div class="no-results">🔍 No hay técnicas que coincidan con tu búsqueda.</div>';
                totalCounter.textContent = '0 fichas';
                return;
            }
            fichas.forEach((f) => {
                const div = document.createElement('div');
                div.className = 'ficha';
                div.dataset.cat = f.cat;

                const tab = document.createElement('div');
                tab.className = `ficha-tab cat${f.cat}`;
                div.appendChild(tab);

                const inner = document.createElement('div');
                inner.className = 'ficha-inner';

                // FRONT
                const front = document.createElement('div');
                front.className = 'ficha-face ficha-front';
                front.innerHTML = `
                    <span class="ficha-tag">Cat. ${f.cat} · ${CATEGORIAS[f.cat-1]}</span>
                    <span class="ficha-num">#${f.id}</span>
                    <div class="ficha-titulo">${f.nombre}</div>
                    <div class="ficha-teoria">${f.teoria}</div>
                    <div class="ficha-ejemplo">“${f.ejemploES}” <small>🇬🇧 ${f.ejemploEN}</small></div>
                    <div class="ficha-pregunta">❓ ${f.pregunta}</div>
                `;

                // BACK
                const back = document.createElement('div');
                back.className = 'ficha-face ficha-back';
                back.innerHTML = `
                    <div style="font-size:0.8rem; color:#A8432E; margin-bottom:0.5rem;">💡 Respuesta</div>
                    <div style="font-size:1rem; font-weight:500; color:#1B2E35;">${f.respuesta}</div>
                    <div style="margin-top:0.8rem; font-size:0.7rem; color:#8A7E6B;">Haz clic nuevamente para volver</div>
                `;

                inner.appendChild(front);
                inner.appendChild(back);
                div.appendChild(inner);

                // ACCIONES
                const actions = document.createElement('div');
                actions.className = 'ficha-actions';

                // Botón Girar
                const btnFlip = document.createElement('button');
                btnFlip.innerHTML = '<i class="bi bi-arrow-repeat"></i> Girar';
                btnFlip.addEventListener('click', (e) => {
                    e.stopPropagation();
                    div.classList.toggle('flipped');
                });
                actions.appendChild(btnFlip);

                // Botón Escuchar
                const btnSpeak = document.createElement('button');
                btnSpeak.className = 'btn-speak';
                btnSpeak.innerHTML = '<i class="bi bi-volume-up"></i> Escuchar';
                const textoCompleto = `${f.nombre}. ${f.teoria}. Ejemplo: ${f.ejemploES}. Pregunta: ${f.pregunta}. Respuesta: ${f.respuesta}`;
                btnSpeak.addEventListener('click', (e) => {
                    e.stopPropagation();
                    speakText(textoCompleto, btnSpeak);
                });
                actions.appendChild(btnSpeak);

                div.appendChild(actions);

                // girar al hacer clic en la ficha (excepto botones)
                div.addEventListener('click', (e) => {
                    if (e.target.closest('.ficha-actions')) return;
                    div.classList.toggle('flipped');
                });

                gridContainer.appendChild(div);
            });
            totalCounter.textContent = `${fichas.length} fichas`;
        }

        // --------------------------------------------------------------
        // FILTROS
        // --------------------------------------------------------------
        function filtrarPorCategoria(cat) {
            const filtradas = DATA.filter(d => d.cat === cat);
            currentFichas = filtradas;
            renderFichas(filtradas);
            // Cambiar pestaña activa a Fichas
            document.querySelector('.tabs .active')?.classList.remove('active');
            document.querySelector('[data-tab="grid"]')?.classList.add('active');
            quizContainer.classList.remove('active');
            gridContainer.style.display = 'grid';
            // Limpiar búsqueda
            searchBox.value = '';
        }

        function filtrarPorBusqueda(query) {
            if (!query.trim()) {
                currentFichas = DATA;
                renderFichas(DATA);
                return;
            }
            const q = query.toLowerCase().trim();
            const filtradas = DATA.filter(d =>
                d.nombre.toLowerCase().includes(q) ||
                d.teoria.toLowerCase().includes(q) ||
                d.ejemploES.toLowerCase().includes(q) ||
                d.pregunta.toLowerCase().includes(q) ||
                d.respuesta.toLowerCase().includes(q)
            );
            currentFichas = filtradas;
            renderFichas(filtradas);
        }

        // --------------------------------------------------------------
        // TABS: GRID vs QUIZ
        // --------------------------------------------------------------
        tabs.forEach(tab => {
            tab.addEventListener('click', function() {
                tabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                const target = this.dataset.tab;
                if (target === 'grid') {
                    gridContainer.style.display = 'grid';
                    quizContainer.classList.remove('active');
                    renderFichas(currentFichas);
                } else if (target === 'quiz') {
                    gridContainer.style.display = 'none';
                    quizContainer.classList.add('active');
                    iniciarQuiz();
                }
            });
        });

        // Botón "Todas las técnicas"
        showAllBtn.addEventListener('click', function() {
            document.querySelectorAll('.sidebar-nav a').forEach(el => el.classList.remove('active'));
            tabs.forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            currentFichas = DATA;
            renderFichas(DATA);
            quizContainer.classList.remove('active');
            gridContainer.style.display = 'grid';
            searchBox.value = '';
        });

        // --------------------------------------------------------------
        // QUIZ
        // --------------------------------------------------------------
        let quizData = [];
        let quizIndex = 0;
        let quizScore = 0;
        let quizTotal = 0;
        let answered = false;

        function iniciarQuiz() {
            const shuffled = [...DATA].sort(() => Math.random() - 0.5);
            quizData = shuffled.slice(0, 10);
            quizIndex = 0;
            quizScore = 0;
            quizTotal = 0;
            answered = false;
            mostrarPreguntaQuiz();
        }

        function mostrarPreguntaQuiz() {
            if (quizIndex >= quizData.length) {
                document.getElementById('quizQuestion').textContent = '🎉 ¡Has completado el quiz!';
                document.getElementById('quizOptions').innerHTML = '';
                document.getElementById('quizFeedback').style.display = 'block';
                document.getElementById('quizFeedback').innerHTML = `<strong>Puntuación final:</strong> ${quizScore} / ${quizData.length}`;
                document.getElementById('quizNext').style.display = 'none';
                document.getElementById('quizProgress').textContent = '¡Terminado!';
                document.getElementById('quizTotal').textContent = `📝 ${quizData.length}`;
                return;
            }

            const q = quizData[quizIndex];
            document.getElementById('quizProgress').textContent = `${quizIndex+1} / ${quizData.length}`;
            document.getElementById('quizScore').textContent = `✅ ${quizScore}`;
            document.getElementById('quizTotal').textContent = `📝 ${quizData.length}`;
            document.getElementById('quizQuestion').textContent = `❓ ${q.pregunta}`;
            document.getElementById('quizFeedback').style.display = 'none';
            document.getElementById('quizNext').style.display = 'none';
            answered = false;

            const correcta = q.respuesta;
            const incorrectas = DATA.filter(d => d.respuesta !== correcta).map(d => d.respuesta);
            const shuffledIncorrectas = incorrectas.sort(() => Math.random() - 0.5).slice(0, 3);
            const opciones = [correcta, ...shuffledIncorrectas].sort(() => Math.random() - 0.5);

            const container = document.getElementById('quizOptions');
            container.innerHTML = '';
            opciones.forEach(op => {
                const btn = document.createElement('button');
                btn.textContent = op;
                btn.addEventListener('click', () => {
                    if (answered) return;
                    answered = true;
                    quizTotal++;
                    const esCorrecta = op === correcta;
                    if (esCorrecta) quizScore++;
                    document.querySelectorAll('#quizOptions button').forEach(b => b.disabled = true);
                    btn.classList.add(esCorrecta ? 'correct' : 'wrong');
                    if (!esCorrecta) {
                        document.querySelectorAll('#quizOptions button').forEach(b => {
                            if (b.textContent === correcta) b.classList.add('correct');
                        });
                    }
                    document.getElementById('quizScore').textContent = `✅ ${quizScore}`;
                    document.getElementById('quizFeedback').style.display = 'block';
                    document.getElementById('quizFeedback').innerHTML = esCorrecta
                        ? `✅ ¡Correcto! ${correcta}`
                        : `❌ La respuesta correcta era: ${correcta}`;
                    document.getElementById('quizNext').style.display = 'inline-block';
                });
                container.appendChild(btn);
            });
        }

        document.getElementById('quizNext').addEventListener('click', () => {
            quizIndex++;
            mostrarPreguntaQuiz();
        });

        // --------------------------------------------------------------
        // INICIALIZACIÓN
        // --------------------------------------------------------------
        renderSidebar();
        renderFichas(DATA);
        quizContainer.classList.remove('active');

        // Buscador
        searchBox.addEventListener('input', function() {
            filtrarPorBusqueda(this.value);
            // Desactivar filtros de categoría
            document.querySelectorAll('.sidebar-nav a').forEach(el => el.classList.remove('active'));
        });

        console.log('📘 Redacción científica · 100 técnicas cargadas');
    });
</script>

</body>
</html>
