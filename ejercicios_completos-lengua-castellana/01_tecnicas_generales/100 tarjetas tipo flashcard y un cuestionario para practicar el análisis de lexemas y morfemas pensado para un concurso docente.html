        .header {

        .card-front, .card-back {

        .card-back {

        .quiz-section {

        .quiz-section h2 {

        }
        .quiz-pregunta {
            background: white;

            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            border: 1px solid #ece3d6;
        }
        .quiz-pregunta p {
            font-weight: 500;

        }
        .quiz-opciones {
            display: flex;

        }
        .quiz-opciones button {

        .quiz-result {

        }
        .quiz-controles {
            display: flex;

        }
        .quiz-controles button {

            padding: 0.5rem 1.8rem;
            border-radius: 40px;

            cursor: pointer;
            transition: 0.15s;
        }
        .quiz-controles button:hover {

        }
        .quiz-controles button:disabled {
            opacity: 0.5;

        }
        .footer {

        @media (max-width: 600px) {

        .audio-icon {

<body>
<div class="container" id="app">
    <div class="header">
        <h1>📘 Didáctica <span>100 técnicas</span></h1>
        <div class="sub">morfología · concurso docente</div>
    </div>

    <div class="block-nav" id="blockNav"></div>
    <div id="cardsGrid" class="cards-grid"></div>

    <div class="quiz-section" id="quizSection">
        <h2>🧠 Cuestionario docente <small>selecciona la estrategia correcta</small></h2>
        <div id="quizContainer"></div>
    </div>
    <div class="footer">Fichas de didáctica morfológica · teoría + ejemplo + ejercicio</div>
</div>

<script>
    // ============================================================
    // 100 TÉCNICAS DE DIDÁCTICA DE LA MORFOLOGÍA (concurso docente)
    // Cada ficha: teoría breve, ejemplo bilingüe, ejercicio y respuesta
    // ============================================================
    const TECNICAS = [];

    // Bloque 1: Lexemas y morfemas (20)
    const b1 = [
        { nombre: "Lexema o raíz", teoria: "Núcleo semántico de la palabra, aporta el significado básico.", ejemplo: "En 'gatitos', la raíz es 'gat-'.", ejercicio: "¿Cuál es la raíz de 'panadero'?", respuesta: "pan-" },
        { nombre: "Morfema flexivo", teoria: "Aporta género, número, persona, tiempo, etc. sin cambiar el significado léxico.", ejemplo: "En 'gatos', '-s' es morfema flexivo de número.", ejercicio: "Morfema flexivo de 'cantábamos'", respuesta: "-ábamos (tiempo, persona, número)" },
        { nombre: "Morfema derivativo", teoria: "Crea palabras nuevas añadiendo prefijos o sufijos.", ejemplo: "En 'gatito', '-it-' es morfema derivativo diminutivo.", ejercicio: "Derivativo en 'florero'", respuesta: "-ero" },
        { nombre: "Prefijo", teoria: "Morfema derivativo que se antepone a la raíz.", ejemplo: "En 'deshacer', 'des-' es prefijo.", ejercicio: "Prefijo en 'rehacer'", respuesta: "re-" },
        { nombre: "Sufijo", teoria: "Morfema derivativo que se pospone a la raíz.", ejemplo: "En 'papelería', '-ería' es sufijo.", ejercicio: "Sufijo en 'belleza'", respuesta: "-eza" },
        { nombre: "Interfijo", teoria: "Elemento sin significado que une raíz y sufijo.", ejemplo: "En 'panadería', '-ad-' es interfijo.", ejercicio: "Interfijo en 'cafetería'", respuesta: "-et- (en algunos análisis)" },
        { nombre: "Morfema cero", teoria: "Morfema que no tiene forma fonética, pero tiene significado.", ejemplo: "En 'luz' (singular) frente a 'luces' (plural), el singular tiene morfema cero.", ejercicio: "Morfema cero en 'feliz' (singular)", respuesta: "cero para género/número" },
        { nombre: "Palabra simple", teoria: "Formada por una raíz y eventualmente morfemas flexivos.", ejemplo: "pan, casa.", ejercicio: "Ejemplo de palabra simple", respuesta: "flor" },
        { nombre: "Palabra derivada", teoria: "Formada por raíz + morfemas derivativos.", ejemplo: "panadería (pan + ad + ería).", ejercicio: "Derivada de 'mar'", respuesta: "marino" },
        { nombre: "Palabra compuesta", teoria: "Unión de dos o más raíces.", ejemplo: "paraguas (para + aguas).", ejercicio: "Compuesta de 'saca' + 'corcho'", respuesta: "sacacorchos" },
        { nombre: "Parasíntesis", teoria: "Composición y derivación a la vez (prefijo+raíz+sufijo).", ejemplo: "enlatar (en + lat + ar).", ejercicio: "Parasíntesis de 'amigo'", respuesta: "enamorado (en + amor + ado)" },
        { nombre: "Familia léxica", teoria: "Conjunto de palabras que comparten la misma raíz.", ejemplo: "pan, panadero, panadería, empanar.", ejercicio: "Familia de 'flor'", respuesta: "flor, florero, florecer" },
        { nombre: "Análisis morfológico", teoria: "Separar la palabra en sus componentes: lexema + morfemas.", ejemplo: "gatitos = gat- (lex) + -it- (dim) + -o (gen) + -s (plur).", ejercicio: "Analiza 'corríamos'", respuesta: "corr- (raíz) + -í- (vocal temática) + -amos (flexivo)" },
        { nombre: "Vocal temática", teoria: "Vocal que indica la conjugación (ar, er, ir).", ejemplo: "En 'cant-á-bamos', la vocal temática es -a-.", ejercicio: "Vocal temática de 'vivir'", respuesta: "-i-" },
        { nombre: "Raíz y desinencia", teoria: "En verbos, la raíz es el lexema y la desinencia incluye vocal temática y morfemas flexivos.", ejemplo: "cant- + -amos (desinencia).", ejercicio: "Desinencia de 'bailamos'", respuesta: "-amos" },
        { nombre: "Género gramatical (didáctica)", teoria: "Enseñar que el género no siempre es natural, sino gramatical.", ejemplo: "El puente (masculino) / La puente (femenino, en algunos dialectos).", ejercicio: "Género de 'mar' en didáctica", respuesta: "ambos (el mar/la mar)" },
        { nombre: "Número (didáctica)", teoria: "Enseñar que el plural no solo se forma con -s, sino también con -es.", ejemplo: "luz → luces.", ejercicio: "Plural de 'jabalí'", respuesta: "jabalíes (o jabalís, admitido)" },
        { nombre: "Aumentativos y diminutivos", teoria: "Sufijos que expresan tamaño o valoración.", ejemplo: "casota, casita.", ejercicio: "Diminutivo de 'joven'", respuesta: "jovencito" },
        { nombre: "Despectivos", teoria: "Sufijos que expresan menosprecio (-ucho, -aco).", ejemplo: "pueblucho, libraco.", ejercicio: "Despectivo de 'casa'", respuesta: "casucha" },
        { nombre: "Gentilicios", teoria: "Sufijos que indican procedencia (-ano, -ense, -eño).", ejemplo: "madrileño, bogotano.", ejercicio: "Gentilicio de 'París'", respuesta: "parisino" },
    ];
    b1.forEach((t, i) => TECNICAS.push({ id: i+1, bloque: 1, categoria: "lexemas/morfemas", ...t }));

    // Bloque 2: Estrategias didácticas (20)
    const b2 = [
        { nombre: "Regla de la raíz invariable", teoria: "Identificar la raíz comparando palabras de la familia léxica.", ejemplo: "pan, panadero → raíz pan-", ejercicio: "Estrategia para enseñar raíz", respuesta: "comparar 'niño, niñera, niñez' → raíz niñ-" },
        { nombre: "Uso de colores", teoria: "Subrayar con colores diferentes lexemas y morfemas.", ejemplo: "Rojo para raíz, azul para sufijos.", ejercicio: "Color para morfemas flexivos", respuesta: "verde o azul (según convención)" },
        { nombre: "Juego de tarjetas", teoria: "Tarjetas con raíces y morfemas para formar palabras.", ejemplo: "gat- + -it- + -o → gatito.", ejercicio: "Actividad lúdica para morfemas", respuesta: "rompecabezas de palabras" },
        { nombre: "Análisis en cadena", teoria: "Descomponer la palabra paso a paso: raíz → derivación → flexión.", ejemplo: "florecitas: flor (raíz) + -ec- (dim) + -it- (dim) + -as (flex).", ejercicio: "Cadena para 'corredores'", respuesta: "corr- (raíz) + -e- (vocal) + -dor- (agente) + -es (plural)" },
        { nombre: "Comparación de pares", teoria: "Comparar palabras con y sin morfema para ver su significado.", ejemplo: "casa / casita.", ejercicio: "Par mínimo para género", respuesta: "niño / niña" },
        { nombre: "Dictado morfológico", teoria: "Dictar palabras y pedir que se separen en morfemas.", ejemplo: "Dictar 'predecir' → pre- + decir.", ejercicio: "Dictado para 'deshacer'", respuesta: "des- + hacer" },
        { nombre: "Caja de morfemas", teoria: "Tener recortables de prefijos y sufijos para construir palabras.", ejemplo: "re-, des-, -ito, -ero.", ejercicio: "Sufijo para 'librero'", respuesta: "-ero" },
        { nombre: "Regla de la vocal temática", teoria: "Enseñar que los verbos se clasifican por su vocal temática.", ejemplo: "cantar (a), comer (e), vivir (i).", ejercicio: "Vocal temática de 'temer'", respuesta: "-e-" },
        { nombre: "Conjugación modelo", teoria: "Usar un verbo modelo para enseñar desinencias.", ejemplo: "amar: am-o, am-as, am-a...", ejercicio: "Modelo para verbos en -ir", respuesta: "vivir" },
        { nombre: "Derivación inversa", teoria: "Partir de una palabra derivada y encontrar la primitiva.", ejemplo: "florero → flor.", ejercicio: "Primitiva de 'panadería'", respuesta: "pan" },
        { nombre: "Familia léxica visual", teoria: "Hacer un mapa mental de la familia de una palabra.", ejemplo: "sol → solar, soleado, parasol.", ejercicio: "Familia de 'luz'", respuesta: "luz, lucir, lucero" },
        { nombre: "Rima y morfología", teoria: "Usar rimas para memorizar sufijos.", ejemplo: "-ito, -ita, cosita.", ejercicio: "Rima para -ero", respuesta: "panadero, florero" },
        { nombre: "Regla de la tilde en morfemas", teoria: "Enseñar que los morfemas no alteran la tilde de la raíz.", ejemplo: "joven → jovencito (mantiene tilde).", ejercicio: "Tilde en 'difícil' + -mente", respuesta: "difícilmente (mantiene tilde)" },
        { nombre: "Palabras compuestas con guión", teoria: "Enseñar que algunos compuestos llevan guión.", ejemplo: "físico-químico.", ejercicio: "Compuesto con guión de 'teórico' y 'práctico'", respuesta: "teórico-práctico" },
        { nombre: "Análisis de sufijos productivos", teoria: "Enseñar los sufijos más usados para formar sustantivos y adjetivos.", ejemplo: "-ción, -dad, -eza.", ejercicio: "Sufijo para cualidad (de 'bello')", respuesta: "-eza (belleza)" },
        { nombre: "Regla de la sinonimia", teoria: "Usar sinónimos para identificar raíces.", ejemplo: "feliz / alegre (raíces diferentes).", ejercicio: "Sinónimo de 'casa' para enseñar raíz", respuesta: "hogar" },
        { nombre: "Formación de palabras con prefijos", teoria: "Lista de prefijos y su significado.", ejemplo: "pre- (antes), post- (después).", ejercicio: "Significado de 'sub-'", respuesta: "debajo" },
        { nombre: "Estrategia de la pregunta guía", teoria: "Preguntar: '¿Cuál es la parte que no cambia?' para hallar la raíz.", ejemplo: "en 'cantar, canción, cantante' → raíz 'cant-'.", ejercicio: "Pregunta para hallar raíz de 'marino'", respuesta: "¿qué parte comparten 'mar, marinero, marítimo'? → mar-" },
        { nombre: "Uso de etimologías", teoria: "Contar el origen de las palabras para entender morfemas.", ejemplo: "pan (latín panis).", ejercicio: "Etimología de 'libro'", respuesta: "liber (latín)" },
        { nombre: "Regla de los falsos morfemas", teoria: "Enseñar que no toda sílaba es morfema (ej. 'cabeza' no es 'cabe' + za).", ejercicio: "Falso morfema en 'caramelo'", respuesta: "cara- no es morfema" },
    ];
    b2.forEach((t, i) => TECNICAS.push({ id: i+21, bloque: 2, categoria: "estrategias", ...t }));

    // Bloque 3: Flexión verbal y nominal (20)
    const b3 = [
        { nombre: "Desinencias verbales", teoria: "Terminaciones que indican persona, número, tiempo y modo.", ejemplo: "cant-amos: -amos es desinencia.", ejercicio: "Desinencia de 'bailabas'", respuesta: "-abas" },
        { nombre: "Tiempos simples", teoria: "Formados por raíz + desinencia.", ejemplo: "cant-o, cant-aba, cant-é.", ejercicio: "Tiempo simple de 'viviré'", respuesta: "futuro simple" },
        { nombre: "Tiempos compuestos", teoria: "Formados por haber + participio.", ejemplo: "he cantado.", ejercicio: "Compuesto de 'había salido'", respuesta: "pretérito pluscuamperfecto" },
        { nombre: "Modo indicativo", teoria: "Expresa realidad o hechos objetivos.", ejemplo: "canto, canté, cantaré.", ejercicio: "Modo de 'cantarías'", respuesta: "condicional (indicativo)" },
        { nombre: "Modo subjuntivo", teoria: "Expresa deseo, duda, posibilidad.", ejemplo: "cante, cantara, cantase.", ejercicio: "Modo de 'ojalá cantes'", respuesta: "subjuntivo" },
        { nombre: "Modo imperativo", teoria: "Expresa mandato o ruego.", ejemplo: "canta, cantad.", ejercicio: "Imperativo de 'callar' 2ª singular", respuesta: "calla" },
        { nombre: "Formas no personales", teoria: "Infinitivo, gerundio y participio.", ejemplo: "cantar, cantando, cantado.", ejercicio: "Gerundio de 'vivir'", respuesta: "viviendo" },
        { nombre: "Concordancia verbal (didáctica)", teoria: "El verbo concuerda en número y persona con el sujeto.", ejemplo: "Ellos cantan (3ª plural).", ejercicio: "Corrige: 'El perro ladran'", respuesta: "El perro ladra" },
        { nombre: "Concordancia nominal (didáctica)", teoria: "Artículo, sustantivo y adjetivo concuerdan en género y número.", ejemplo: "el perro blanco / los perros blancos.", ejercicio: "Corrige: 'la niño alta'", respuesta: "el niño alto" },
        { nombre: "Sujeto tácito (didáctica)", teoria: "Enseñar que el sujeto puede omitirse porque la desinencia lo indica.", ejemplo: "Cantamos (nosotros).", ejercicio: "Sujeto de 'corría'", respuesta: "él/ella (tácito)" },
        { nombre: "Verbos regulares", teoria: "Mantienen la raíz y siguen un modelo de conjugación.", ejemplo: "amar, temer, vivir.", ejercicio: "Regular: 'comer' 1ª singular presente", respuesta: "como" },
        { nombre: "Verbos irregulares", teoria: "Cambian la raíz o la desinencia.", ejemplo: "tener (tengo, tienes).", ejercicio: "Irregular: 'decir' 1ª singular presente", respuesta: "digo" },
        { nombre: "Verbos defectivos", teoria: "Carecen de algunas formas (ej. 'abolir' solo en infinitivo).", ejemplo: "soler (solo presente y pret. imperfecto).", ejercicio: "Defectivo: 'balbucir'", respuesta: "balbucear (más usado)" },
        { nombre: "Verbos copulativos", teoria: "Ser, estar, parecer (unen sujeto y atributo).", ejemplo: "Ella es inteligente.", ejercicio: "Copulativo en 'Parece cansado'", respuesta: "parece" },
        { nombre: "Voz activa", teoria: "El sujeto realiza la acción.", ejemplo: "Juan lee el libro.", ejercicio: "Voz activa de 'El poema fue escrito'", respuesta: "Escribieron el poema" },
        { nombre: "Voz pasiva", teoria: "El sujeto recibe la acción (ser + participio).", ejemplo: "El libro fue leído por Juan.", ejercicio: "Pasiva de 'Los niños comen pizza'", respuesta: "La pizza es comida por los niños" },
        { nombre: "Pasiva refleja", teoria: "Se + verbo en activa (impersonal o pasiva).", ejemplo: "Se venden casas.", ejercicio: "Pasiva refleja de 'Se alquilan habitaciones'", respuesta: "habitaciones son alquiladas (interpretación)" },
        { nombre: "Perífrasis verbales", teoria: "Verbo auxiliar + gerundio/participio/infinitivo.", ejemplo: "estoy cantando, voy a cantar.", ejercicio: "Perífrasis en 'debo estudiar'", respuesta: "deber + infinitivo" },
        { nombre: "Nexos temporales", teoria: "Conectores que sitúan la acción en el tiempo (antes, después).", ejemplo: "cuando, luego, mientras.", ejercicio: "Nexo temporal en 'Mientras comía, sonó el teléfono'", respuesta: "mientras" },
        { nombre: "Aspecto verbal (didáctica)", teoria: "Enseñar perfecto/imperfecto con ejemplos visuales.", ejemplo: "canté (perfecto) vs cantaba (imperfecto).", ejercicio: "Aspecto de 'había comido'", respuesta: "perfecto" },
    ];
    b3.forEach((t, i) => TECNICAS.push({ id: i+41, bloque: 3, categoria: "flexión", ...t }));

    // Bloque 4: Formación de palabras (20)
    const b4 = [
        { nombre: "Composición propia", teoria: "Unión de dos palabras con significado propio.", ejemplo: "abrelatas, paraguas.", ejercicio: "Compuesto de 'corta' + 'uñas'", respuesta: "cortauñas" },
        { nombre: "Composición sintagmática", teoria: "Unión de palabras con preposición (tipo 'hombre rana').", ejemplo: "coche bomba, hombre rana.", ejercicio: "Compuesto sintagmático de 'perro' + 'policía'", respuesta: "perro policía" },
        { nombre: "Derivación con prefijos cultos", teoria: "Prefijos de origen griego o latino (anti-, bio-, geo-).", ejemplo: "antibiótico, geografía.", ejercicio: "Prefijo culto de 'contra'", respuesta: "anti-" },
        { nombre: "Derivación con sufijos cultos", teoria: "Sufijos de origen griego o latino (-logía, -fobia).", ejemplo: "filosofía, claustrofobia.", ejercicio: "Sufijo culto de 'estudio'", respuesta: "-logía" },
        { nombre: "Acronimia", teoria: "Crear palabras con las siglas de una expresión.", ejemplo: "OVNI (Objeto Volador No Identificado).", ejercicio: "Acrónimo de 'Sistema Operativo'", respuesta: "SO" },
        { nombre: "Siglas", teoria: "Letras iniciales de una denominación.", ejemplo: "ONU, RAE.", ejercicio: "Sigla de 'Organización Mundial de la Salud'", respuesta: "OMS" },
        { nombre: "Abreviatura", teoria: "Reducción gráfica de una palabra.", ejemplo: "Sr., Dra.", ejercicio: "Abreviatura de 'usted'", respuesta: "Ud." },
        { nombre: "Acortamiento", teoria: "Reducción de una palabra larga (bici, tele).", ejemplo: "bicicleta → bici.", ejercicio: "Acortamiento de 'televisión'", respuesta: "tele" },
        { nombre: "Palabra comodín", teoria: "Palabra que reemplaza a muchas (cosa, chisme).", ejemplo: "¿Cómo se llama esa cosa?", ejercicio: "Comodín para 'objeto'", respuesta: "coso" },
        { nombre: "Neologismo", teoria: "Palabra nueva creada para designar una realidad nueva.", ejemplo: "selfie, tuit.", ejercicio: "Neologismo de 'mensaje de texto'", respuesta: "SMS" },
        { nombre: "Arcaísmo", teoria: "Palabra antigua en desuso.", ejemplo: "facer (hacer), yantar (comer).", ejercicio: "Arcaísmo de 'cabeza'", respuesta: "testa" },
        { nombre: "Préstamo léxico", teoria: "Palabra tomada de otro idioma.", ejemplo: "fútbol (inglés), champú (hindi).", ejercicio: "Préstamo de 'restaurante' (francés)", respuesta: "restaurant" },
        { nombre: "Extranjerismo", teoria: "Palabra extranjera sin adaptar.", ejemplo: "sándwich, pizza.", ejercicio: "Extranjerismo de 'equipo' (inglés)", respuesta: "team" },
        { nombre: "Calco semántico", teoria: "Traducir una palabra extranjera con elementos propios.", ejemplo: "rascacielos (del inglés skycraper).", ejercicio: "Calco de 'hot dog'", respuesta: "perro caliente" },
        { nombre: "Palabra tabú", teoria: "Palabra evitada por razones sociales.", ejemplo: "muerte (tabú) → fallecimiento.", ejercicio: "Tabú de 'cárcel'", respuesta: "centro penitenciario" },
        { nombre: "Eufemismo", teoria: "Palabra suave para sustituir un tabú.", ejemplo: "tercera edad (por vejez).", ejercicio: "Eufemismo de 'morir'", respuesta: "fallecer" },
        { nombre: "Disfemismo", teoria: "Palabra despectiva o vulgar.", ejemplo: "tío (por persona).", ejercicio: "Disfemismo de 'cabeza'", respuesta: "coco" },
        { nombre: "Deonomástica", teoria: "Palabra derivada de un nombre propio.", ejemplo: "quijote (de Don Quijote).", ejercicio: "Deonomástico de 'Maquiavelo'", respuesta: "maquiavélico" },
        { nombre: "Onomatopeya (didáctica)", teoria: "Palabras que imitan sonidos.", ejemplo: "tic-tac, miau.", ejercicio: "Onomatopeya de 'golpe'", respuesta: "pum" },
        { nombre: "Interjección", teoria: "Palabra que expresa emoción (¡ay!, ¡oh!).", ejemplo: "¡Ay! ¡Qué dolor!", ejercicio: "Interjección de sorpresa", respuesta: "¡oh!" },
    ];
    b4.forEach((t, i) => TECNICAS.push({ id: i+61, bloque: 4, categoria: "formación", ...t }));

    // Bloque 5: Evaluación y diagnóstico (20)
    const b5 = [
        { nombre: "Prueba de segmentación", teoria: "Pedir al estudiante que separe una palabra en morfemas.", ejemplo: "injusto → in- + just- + -o.", ejercicio: "Segmenta 'desalmado'", respuesta: "des- + alm- + -ado" },
        { nombre: "Prueba de familias léxicas", teoria: "Escribir todas las palabras derivadas de una raíz.", ejemplo: "sol: solar, soleado, parasol.", ejercicio: "Familia de 'nave'", respuesta: "navegar, navegante, navegación" },
        { nombre: "Ejercicio de falsos amigos", teoria: "Identificar palabras que parecen tener un morfema pero no.", ejemplo: "caramelo no es cara + melo.", ejercicio: "Falso amigo morfológico en 'caballo'", respuesta: "caba- no es morfema" },
        { nombre: "Dictado de compuestos", teoria: "Dictar compuestos y pedir separación.", ejemplo: "paraguas → para + aguas.", ejercicio: "Compuesto de 'rascacielos'", respuesta: "rasca + cielos" },
        { nombre: "Identificar raíz en verbos", teoria: "Dado un verbo, señalar la raíz y la desinencia.", ejemplo: "corríamos: corr- + -íamos.", ejercicio: "Raíz de 'vivíamos'", respuesta: "viv-" },
        { nombre: "Completar con morfemas", teoria: "Dar una raíz y pedir añadir prefijos/sufijos.", ejemplo: "libr- → librero, libreta.", ejercicio: "Añade sufijo a 'pan' para hacer un lugar", respuesta: "panadería" },
        { nombre: "Clasificación de palabras", teoria: "Clasificar en simples, derivadas, compuestas.", ejemplo: "casa (simple), casita (derivada), sacacorchos (compuesta).", ejercicio: "Clasifica 'abrelatas'", respuesta: "compuesta" },
        { nombre: "Análisis de perífrasis", teoria: "Identificar el verbo auxiliar y el principal.", ejemplo: "estoy cantando → estar + cantando.", ejercicio: "Perífrasis en 'tengo que salir'", respuesta: "tener que + infinitivo" },
        { nombre: "Corrección de errores", teoria: "Detectar fallos de concordancia o derivación.", ejemplo: "Los niños está contento → están.", ejercicio: "Corrige: 'La casa son grandes'", respuesta: "La casa es grande" },
        { nombre: "Traducción morfológica", teoria: "Traducir palabras a otro idioma y comparar morfemas.", ejemplo: "gatitos → kittens (inglés).", ejercicio: "Compara 'casitas' con 'little houses'", respuesta: "ambos tienen diminutivo" },
        { nombre: "Juego de dominó morfológico", teoria: "Fichas con raíz y sufijo para formar palabras.", ejemplo: "pan + ería → panadería.", ejercicio: "Dominó: 'café' + 'tería'", respuesta: "cafetería" },
        { nombre: "Regla de la derivación apreciativa", teoria: "Enseñar que los sufijos apreciativos no cambian la categoría.", ejemplo: "gato → gatito (sustantivo).", ejercicio: "Sufijo apreciativo en 'abuelita'", respuesta: "-it- (diminutivo)" },
        { nombre: "Uso de prefijos negativos", teoria: "Enseñar prefijos como in-, des-, a- para negación.", ejemplo: "inútil, deshacer, amoral.", ejercicio: "Prefijo negativo de 'posible'", respuesta: "imposible" },
        { nombre: "Sufijos para verbos", teoria: "Sufijos que forman verbos (-ar, -ear, -ificar).", ejemplo: "belleza → embellecer.", ejercicio: "Verbo derivado de 'frágil'", respuesta: "fragilizar" },
        { nombre: "Sufijos para sustantivos", teoria: "-ción, -dad, -eza, -ismo.", ejemplo: "educar → educación.", ejercicio: "Sustantivo derivado de 'joven'", respuesta: "juventud" },
        { nombre: "Sufijos para adjetivos", teoria: "-oso, -able, -al, -ivo.", ejemplo: "deseo → deseable.", ejercicio: "Adjetivo de 'calor'", respuesta: "caluroso" },
        { nombre: "Regla de acentuación en derivados", teoria: "Mantener o trasladar la tilde según la palabra derivada.", ejemplo: "difícil → difícilmente (mantiene).", ejercicio: "Tilde en 'fácilmente'", respuesta: "fácilmente (mantiene)" },
        { nombre: "Identificar interfijos", teoria: "Separar palabra y detectar interfijos sin significado.", ejemplo: "panadería: pan + -ad- + -ería.", ejercicio: "Interfijo en 'cabezota'", respuesta: "-ot- (apreciativo)" },
        { nombre: "Regla de la composición con guión", teoria: "Usar guión cuando los elementos son de distinta categoría.", ejemplo: "teórico-práctico.", ejercicio: "Compuesto con guión de 'socio' y 'cultural'", respuesta: "socio-cultural" },
        { nombre: "Análisis de derivados con prefijos cultos", teoria: "Reconocer prefijos como tele-, micro-, macro-.", ejemplo: "teléfono, microscopio.", ejercicio: "Significado de 'macro-'", respuesta: "grande" },
    ];
    b5.forEach((t, i) => TECNICAS.push({ id: i+81, bloque: 5, categoria: "evaluación", ...t }));

    // Ordenar por id
    TECNICAS.sort((a,b) => a.id - b.id);

    // ===================== RENDER =====================
    const blockNav = document.getElementById('blockNav');
    const cardsGrid = document.getElementById('cardsGrid');
    const quizContainer = document.getElementById('quizContainer');

    let currentBlock = 1;
    const BLOCK_NAMES = ['', 'Lexemas y morfemas', 'Estrategias didácticas', 'Flexión verbal y nominal', 'Formación de palabras', 'Evaluación y diagnóstico'];

    // generar navegación (5 bloques)
    for (let i = 1; i <= 5; i++) {
        const btn = document.createElement('button');
        btn.textContent = `${i}. ${BLOCK_NAMES[i]}`;
        btn.dataset.block = i;
        btn.addEventListener('click', () => {
            currentBlock = i;
            renderCards(i);
            updateNav(i);
        });
        blockNav.appendChild(btn);
    }

    function updateNav(block) {
        document.querySelectorAll('.block-nav button').forEach(b => b.classList.toggle('active', parseInt(b.dataset.block) === block));
    }
    updateNav(1);

    function renderCards(block) {
        const filtered = TECNICAS.filter(t => t.bloque === block);
        cardsGrid.innerHTML = filtered.map((t, idx) => {
            return `
                <div class="card-flip" data-id="${t.id}" onclick="this.classList.toggle('flipped')">
                    <div class="card-flip-inner">
                        <div class="card-front">
                            <div class="numero">${t.id}</div>
                            <span class="categoria">${t.categoria}</span>
                            <h3>${t.nombre}</h3>
                            <div class="teoria">${t.teoria}</div>
                            <div class="girar-indicador">↻ tocar para ver ejercicio</div>
                        </div>
                        <div class="card-back">
                            <div style="font-weight:600;color:#1F4E5F;margin-bottom:0.2rem;">📘 ${t.nombre}</div>
                            <div class="ejemplo"><strong>Ejemplo:</strong> ${t.ejemplo}</div>
                            <div class="ejercicio">✏️ ${t.ejercicio}</div>
                            <div class="respuesta">✓ ${t.respuesta}</div>
                            <div class="etiqueta">técnica #${t.id} · ${t.categoria}</div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ===================== QUIZ =====================
    let quizQuestions = [];
    let currentQuizIndex = 0;
    let score = 0;
    let answered = false;

    function generateQuiz() {
        const shuffled = [...TECNICAS].sort(() => Math.random() - 0.5);
        quizQuestions = shuffled.slice(0, 10).map(t => {
            const opts = [t.respuesta];
            const others = TECNICAS.filter(x => x.id !== t.id);
            const shuffledOthers = others.sort(() => Math.random() - 0.5);
            for (let i = 0; i < 3; i++) {
                if (shuffledOthers[i]) opts.push(shuffledOthers[i].respuesta);
            }
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return {
                pregunta: `📌 ${t.ejercicio} (técnica: ${t.nombre})`,
                opciones: opts,
                correcta: t.respuesta,
                id: t.id
            };
        });
        currentQuizIndex = 0;
        score = 0;
        answered = false;
        renderQuiz();
    }

    function renderQuiz() {
        if (!quizQuestions.length) return;
        const q = quizQuestions[currentQuizIndex];
        const total = quizQuestions.length;
        let html = `
            <div class="quiz-pregunta">
                <p>${q.pregunta}</p>
                <div class="quiz-opciones" id="quizOptions">
        `;
        q.opciones.forEach((op, idx) => {
            html += `<button data-idx="${idx}" onclick="checkAnswer(${idx})">${op}</button>`;
        });
        html += `</div>
                <div id="quizFeedback" style="margin-top:0.8rem;"></div>
                <div class="quiz-result" id="quizScore">Puntuación: ${score}/${total}</div>
            </div>
            <div class="quiz-controles">
                <button id="nextQuizBtn" disabled>→ Siguiente</button>
                <button onclick="generateQuiz()">🔄 Nuevo cuestionario</button>
            </div>
        `;
        quizContainer.innerHTML = html;
        answered = false;
        document.getElementById('nextQuizBtn').disabled = true;
    }

    window.checkAnswer = function(idx) {
        if (answered) return;
        const q = quizQuestions[currentQuizIndex];
        const buttons = document.querySelectorAll('#quizOptions button');
        buttons.forEach((b, i) => {
            b.disabled = true;
            if (i === idx) {
                const esCorrecta = q.opciones[idx] === q.correcta;
                b.classList.add(esCorrecta ? 'correct' : 'incorrect');
                if (esCorrecta) score++;
            }
            if (q.opciones[i] === q.correcta) {
                buttons[i].classList.add('correct');
            }
        });
        answered = true;
        document.getElementById('nextQuizBtn').disabled = false;
        document.getElementById('quizScore').textContent = `Puntuación: ${score}/${quizQuestions.length}`;
        const fb = document.getElementById('quizFeedback');
        fb.innerHTML = `<span style="background:#1F4E5F;color:white;padding:0.2rem 1rem;border-radius:40px;">✅ Respuesta correcta: ${q.correcta}</span>`;
    }

    document.addEventListener('click', function(e) {
        if (e.target.id === 'nextQuizBtn') {
            if (currentQuizIndex < quizQuestions.length - 1) {
                currentQuizIndex++;
                renderQuiz();
            } else {
                alert(`¡Cuestionario finalizado! Puntuación: ${score}/${quizQuestions.length}`);
                document.getElementById('nextQuizBtn').disabled = true;
            }
        }
    });

    // Inicializar
    renderCards(1);
    generateQuiz();
</script>
</body>
</html>
