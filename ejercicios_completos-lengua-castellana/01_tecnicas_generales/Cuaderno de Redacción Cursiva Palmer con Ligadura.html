<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuaderno de Redacción · Cursiva Palmer con Ligaduras</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Source+Serif+4:opsz@8..60&family=IBM+Plex+Mono:wght@400;600&family=Caveat:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet">
  <style>
    /* ----- RESET & PAPEL KRAFT ----- */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #d9cdb0;
      padding: 2rem 1.5rem;
      font-family: 'Source Serif 4', serif;
      color: #2c241a;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }
    .cuaderno {
      max-width: 1400px;
      width: 100%;
      background: #EAE2CC;
      background-image: radial-gradient(circle at 20% 30%, rgba(200,180,150,0.1) 0%, transparent 30%),
                        linear-gradient(45deg, rgba(180,160,130,0.05) 25%, transparent 25%);
      box-shadow: 0 20px 40px -12px rgba(0,0,0,0.5), inset 0 1px 4px rgba(255, 245, 215, 0.6);
      border-radius: 32px 32px 24px 24px;
      padding: 2rem 2rem 2.5rem;
      border: 1px solid #c9b79b;
      position: relative;
    }
    .cuaderno::before {
      content: "✧ BIBLIOTECA DE REDACTOR ✧";
      position: absolute;
      top: -10px;
      right: 40px;
      background: #EAE2CC;
      padding: 0 1.2rem;
      font-family: 'Special Elite', cursive;
      font-size: 0.9rem;
      letter-spacing: 2px;
      color: #6a4e3a;
      border: 1px solid #c9b79b;
      border-radius: 30px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      transform: rotate(1deg);
    }
    /* TIPOGRAFÍAS */
    h1, h2, h3, .titulo-ficha, .firma-label {
      font-family: 'Special Elite', cursive;
      font-weight: 400;
      letter-spacing: 0.5px;
    }
    .cuerpo { font-family: 'Source Serif 4', serif; line-height: 1.5; }
    .mono { font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; }

    /* ============================================================ */
    /* ESTILOS DE ESCRITURA: Cursiva Palmer CON LIGADURAS */
    /* ============================================================ */
    /* Caveat tiene ligaduras naturales y flujo continuo entre letras */
    .escritura-cursiva { 
      font-family: 'Caveat', cursive; 
      font-weight: 600;
      font-style: normal;
      letter-spacing: 0.3px;
      font-variant-ligatures: contextual;
      text-rendering: optimizeLegibility;
    }
    .escritura-script { 
      font-family: 'Pacifico', cursive; 
      font-weight: 400;
      font-style: normal;
      letter-spacing: 0.5px;
    }
    /* Firma con ligaduras activadas */
    .firma-estilo { 
      font-size: 1.3rem;
      color: #1f6d3b;
      border-bottom: 1px solid #1f6d3b;
      padding: 0 0.2rem;
      display: inline-block;
      line-height: 1.4;
      font-variant-ligatures: contextual;
      text-rendering: optimizeLegibility;
    }
    .firma-estilo.estilo-cursiva {
      font-family: 'Caveat', cursive;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .firma-estilo.estilo-script {
      font-family: 'Pacifico', cursive;
    }
    .firma-estilo.estilo-normal {
      font-family: 'Source Serif 4', serif;
      font-style: italic;
    }

    /* CABECERA */
    .cabecera {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 2px dashed #b8a48a;
      padding-bottom: 0.8rem;
      margin-bottom: 1.8rem;
    }
    .cabecera h1 {
      font-size: 2.6rem;
      color: #2f2419;
      text-shadow: 2px 2px 0 rgba(180, 150, 110, 0.2);
      letter-spacing: 2px;
    }
    .cabecera .sub {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.9rem;
      background: #dacfbb;
      padding: 0.2rem 1.2rem;
      border-radius: 40px;
      color: #3d2e1e;
      border: 1px solid #b8a48a;
    }

    /* PESTAÑAS */
    .pestanas {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem 0.6rem;
      margin: 1.2rem 0 1.8rem;
      border-bottom: 1px solid #d1c2ab;
      padding-bottom: 0.6rem;
    }
    .pestana {
      background: #dacfbb;
      border: 1px solid #b8a48a;
      border-radius: 30px 30px 8px 8px;
      padding: 0.3rem 1.2rem;
      font-family: 'Special Elite', cursive;
      font-size: 1rem;
      color: #3d2e1e;
      cursor: pointer;
      transition: 0.15s;
      box-shadow: 0 2px 0 #b8a48a;
      transform: translateY(2px);
    }
    .pestana.activa {
      background: #EAE2CC;
      border-bottom: 2px solid #EAE2CC;
      box-shadow: 0 -2px 0 #6a4e3a;
      transform: translateY(0);
      font-weight: bold;
      color: #1e160f;
    }
    .pestana:hover { background: #e6dac6; }

    /* TARJETERO */
    .tarjetero {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.8rem;
      margin: 2rem 0 2.5rem;
    }

    /* FICHA FLASHCARD */
    .ficha {
      background: #f6efe2;
      border: 1px solid #c9b79b;
      border-radius: 20px 20px 16px 16px;
      box-shadow: 4px 4px 0 rgba(100, 80, 60, 0.15), inset 0 0 0 1px #fff8ed;
      padding: 1.4rem 1.2rem 1rem;
      transition: 0.2s;
      display: flex;
      flex-direction: column;
      position: relative;
      transform: rotate(var(--rot, 0deg));
    }
    .ficha:nth-child(odd) { --rot: 0.4deg; }
    .ficha:nth-child(3n) { --rot: -0.6deg; }
    .ficha:nth-child(5n) { --rot: 0.8deg; }
    .ficha:hover {
      transform: scale(1.01) rotate(0deg);
      box-shadow: 6px 6px 0 rgba(80, 60, 40, 0.2);
    }
    .ficha .tipo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #7a634b;
      border-bottom: 1px dotted #c9b79b;
      padding-bottom: 0.3rem;
      margin-bottom: 0.6rem;
    }
    .ficha .nombre {
      font-family: 'Special Elite', cursive;
      font-size: 1.4rem;
      line-height: 1.2;
      color: #1f160f;
      margin-bottom: 0.4rem;
    }
    .ficha .definicion {
      font-family: 'Source Serif 4', serif;
      font-size: 0.95rem;
      color: #2f2419;
      flex: 1;
      margin: 0.4rem 0 0.6rem;
      padding-left: 0.2rem;
      border-left: 2px solid #dacfbb;
      padding-left: 0.7rem;
    }
    .ficha .ejemplo {
      background: #e4dac8;
      padding: 0.5rem 0.8rem;
      border-radius: 12px;
      font-family: 'Source Serif 4', serif;
      font-style: italic;
      font-size: 0.9rem;
      color: #3a2c1d;
      margin: 0.5rem 0 0.8rem;
      border-left: 4px solid #a58b70;
    }
    .ficha .ejemplo::before { content: "↦ "; color: #7a634b; }

    /* ÁREA DE RESPUESTA CON ESTILOS */
    .respuesta-area {
      background: #e4dac8;
      border-radius: 40px;
      padding: 0.4rem 1rem 0.4rem 1.2rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.3rem;
    }
    .respuesta-area .etiqueta-estilo {
      font-family: 'Special Elite', cursive;
      font-size: 0.75rem;
      color: #5a4a38;
      margin-right: 0.2rem;
    }
    .respuesta-area select {
      background: #fcf7ed;
      border: 1px solid #b8a48a;
      border-radius: 30px;
      padding: 0.1rem 0.5rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      outline: none;
    }
    .respuesta-area input {
      flex: 1;
      min-width: 100px;
      border: 1px solid #b8a48a;
      background: #fcf7ed;
      padding: 0.2rem 0.8rem;
      font-size: 1rem;
      border-radius: 30px;
      outline: none;
      transition: 0.15s;
      font-variant-ligatures: contextual;
      text-rendering: optimizeLegibility;
    }
    .respuesta-area input:focus {
      border-color: #6a4e3a;
      background: #fffaf0;
    }
    /* Estilos aplicados dinámicamente al input según selección */
    .respuesta-area input.estilo-cursiva {
      font-family: 'Caveat', cursive;
      font-weight: 600;
      font-size: 1.15rem;
      letter-spacing: 0.3px;
      font-variant-ligatures: contextual;
      text-rendering: optimizeLegibility;
    }
    .respuesta-area input.estilo-script {
      font-family: 'Pacifico', cursive;
      font-size: 1.1rem;
    }
    .respuesta-area input.estilo-normal {
      font-family: 'Source Serif 4', serif;
      font-style: italic;
    }

    .btn-sello {
      background: transparent;
      border: 1px solid #8b735b;
      border-radius: 30px;
      padding: 0.1rem 1rem;
      font-family: 'Special Elite', cursive;
      font-size: 0.8rem;
      color: #3d2e1e;
      cursor: pointer;
      transition: 0.15s;
      box-shadow: 0 1px 0 #8b735b;
    }
    .btn-sello:hover { background: #dacfbb; }

    .sello {
      font-family: 'Special Elite', cursive;
      font-size: 0.8rem;
      padding: 0.1rem 0.6rem;
      border-radius: 30px;
      display: inline-block;
      border: 2px solid;
      background: #f6efe2;
      letter-spacing: 1px;
    }
    .sello.correcto {
      color: #1f6d3b;
      border-color: #1f6d3b;
      box-shadow: inset 0 0 0 1px #b3d9b3;
    }
    .sello.revisar {
      color: #a3432b;
      border-color: #a3432b;
      box-shadow: inset 0 0 0 1px #eac0b0;
    }
    .sello.vacio {
      color: #7a634b;
      border-color: #b8a48a;
      opacity: 0.5;
    }

    /* Firma de respuesta correcta */
    .firma-container {
      margin-top: 0.3rem;
      font-size: 0.8rem;
      color: #1f6d3b;
      font-family: 'Special Elite', cursive;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      flex-wrap: wrap;
    }
    .firma-container .firma-label {
      font-family: 'Special Elite', cursive;
      color: #4d3a28;
      font-size: 0.75rem;
    }

    /* PRÁCTICA */
    .practica {
      background: #e4dac8;
      border-radius: 40px 40px 24px 24px;
      padding: 1.8rem 2rem;
      border: 1px solid #b8a48a;
      margin-top: 2rem;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.03);
    }
    .practica h2 {
      font-family: 'Special Elite', cursive;
      font-size: 1.8rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .practica .pregunta {
      font-family: 'Source Serif 4', serif;
      font-size: 1.2rem;
      background: #f6efe2;
      padding: 0.8rem 1.5rem;
      border-radius: 60px;
      border-left: 6px solid #6a4e3a;
      margin: 0.6rem 0 1.2rem;
    }
    .opciones {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin: 0.8rem 0 1.2rem;
    }
    .opciones button {
      background: #f6efe2;
      border: 1px solid #b8a48a;
      border-radius: 60px;
      padding: 0.3rem 1.8rem;
      font-family: 'Source Serif 4', serif;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.1s;
      box-shadow: 0 2px 0 #b8a48a;
    }
    .opciones button:hover { background: #ece1ce; transform: translateY(-1px); }
    .opciones button:active { transform: translateY(2px); box-shadow: 0 0px 0 #b8a48a; }
    .sello-practica { margin: 0.6rem 0 0.8rem; font-size: 1.4rem; }

    .estadisticas {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem 2.5rem;
      font-family: 'IBM Plex Mono', monospace;
      background: #dacfbb;
      padding: 0.6rem 1.5rem;
      border-radius: 60px;
      margin-top: 0.8rem;
      border: 1px solid #b8a48a;
    }
    .estadisticas span { font-weight: 600; color: #2f2419; }
    .barra-progreso {
      width: 100%;
      height: 12px;
      background: #dacfbb;
      border-radius: 40px;
      margin: 0.8rem 0 0.2rem;
      border: 1px solid #b8a48a;
      overflow: hidden;
    }
    .barra-progreso .relleno {
      height: 100%;
      background: #6a4e3a;
      width: 0%;
      border-radius: 40px;
      transition: width 0.2s;
    }
    .reset-local {
      background: transparent;
      border: 1px dashed #8b735b;
      padding: 0.1rem 1.2rem;
      border-radius: 40px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      cursor: pointer;
      color: #4d3a28;
      margin-left: 0.5rem;
    }
    .reset-local:hover { background: #dacfbb; }
    .oculto { display: none; }
  </style>
</head>
<body>
<div class="cuaderno" id="app">
  <!-- CABECERA -->
  <div class="cabecera">
    <h1>📖 cuaderno de redacción</h1>
    <span class="sub">100 técnicas · cursiva con ligaduras</span>
  </div>

  <!-- PESTAÑAS -->
  <div class="pestanas" id="pestanasContainer"></div>

  <!-- TARJETERO -->
  <div class="tarjetero" id="tarjetero"></div>

  <!-- PRÁCTICA -->
  <div class="practica" id="practica">
    <h2>✧ práctica · adivina la técnica</h2>
    <div id="preguntaContainer">
      <div class="pregunta" id="preguntaTexto">Carga de técnicas...</div>
      <div class="opciones" id="opcionesContainer"></div>
      <div class="sello-practica" id="selloPractica"><span class="sello vacio">● esperando respuesta</span></div>
    </div>
    <div class="estadisticas">
      <span>🏆 puntaje: <span id="puntaje">0</span></span>
      <span>🔥 racha: <span id="racha">0</span></span>
      <span>⭐ mejor racha: <span id="mejorRacha">0</span></span>
      <span>📚 dominadas: <span id="dominadas">0</span>/100</span>
      <button class="reset-local" id="resetLocalBtn">⟳ reiniciar</button>
    </div>
    <div class="barra-progreso">
      <div class="relleno" id="barraProgreso" style="width:0%"></div>
    </div>
  </div>
</div>

<script>
  (function(){
    // ---------- TÉCNICAS (100) ----------
    const TECNICAS = [
      { id:1, bloque:'I', nombre:'Antítesis temporal', tipo:'Narrativo', definicion:'Contraponer pasado y futuro para generar tensión narrativa.', ejemplo:'"El eco de las máquinas del ayer se apaga ante el silencio de las estrellas de mañana."' },
      { id:2, bloque:'I', nombre:'Binomio fantástico', tipo:'Narrativo', definicion:'Unir dos elementos opuestos en una misma imagen.', ejemplo:'"La inteligencia artificial soñaba con poemas de carne y hueso."' },
      { id:3, bloque:'I', nombre:'Elipsis de contraste', tipo:'Narrativo', definicion:'Omitir información para generar contraste implícito.', ejemplo:'"Llegaron a Ío. No quedaba nadie."' },
      { id:4, bloque:'I', nombre:'Punto de vista alterno', tipo:'Narrativo', definicion:'Narrar desde la perspectiva del oponente.', ejemplo:'"El androide también soñaba con ser humano."' },
      { id:5, bloque:'II', nombre:'Sinestesia cósmica', tipo:'Descriptivo', definicion:'Mezclar sensaciones de distintos sentidos.', ejemplo:'"El rojo del crepúsculo marciano olía a metal quemado."' },
      { id:6, bloque:'II', nombre:'Hipérbole especulativa', tipo:'Descriptivo', definicion:'Exageración aplicada a lo tecnológico.', ejemplo:'"La nave era tan veloz que doblaba el tiempo como un papel."' },
      { id:7, bloque:'II', nombre:'Metáfora mecánica', tipo:'Descriptivo', definicion:'Describir lo orgánico con términos mecánicos.', ejemplo:'"Sus recuerdos eran circuitos oxidados."' },
      { id:8, bloque:'II', nombre:'Personificación técnica', tipo:'Descriptivo', definicion:'Atribuir cualidades humanas a objetos tecnológicos.', ejemplo:'"El módulo de aterrizaje tosió polvo lunar."' },
      { id:9, bloque:'III', nombre:'Definición antitética', tipo:'Expositivo', definicion:'Definir un concepto mediante su opuesto.', ejemplo:'"La utopía no es un lugar perfecto, sino la conciencia de la imperfección."' },
      { id:10, bloque:'III', nombre:'Comparación contrastiva', tipo:'Expositivo', definicion:'Exponer dos realidades opuestas para clarificar.', ejemplo:'"Mientras las colonias espaciales derrochan energía, la Tierra se apaga."' },
      { id:11, bloque:'III', nombre:'Paradoja lógica', tipo:'Expositivo', definicion:'Verdad que parece contradictoria.', ejemplo:'"Cuanto más sabemos, menos comprendemos el cosmos."' },
      { id:12, bloque:'III', nombre:'Contexto histórico contrastivo', tipo:'Expositivo', definicion:'Exponer un hecho comparándolo con otro histórico.', ejemplo:'"Como la conquista de América, pero hacia las estrellas."' },
      { id:13, bloque:'IV', nombre:'Tesis antitética', tipo:'Argumentativo', definicion:'Plantear una tesis y su contraria para persuadir.', ejemplo:'"No es la tecnología la que corrompe, sino el uso que hacemos de ella."' },
      { id:14, bloque:'IV', nombre:'Reductio ad absurdum', tipo:'Argumentativo', definicion:'Llevar el argumento contrario al absurdo.', ejemplo:'"Si prohibimos toda IA, también deberíamos prohibir el pensamiento."' },
      { id:15, bloque:'IV', nombre:'Analogía distópica', tipo:'Argumentativo', definicion:'Comparar una situación actual con una distopía.', ejemplo:'"La vigilancia masiva es el Gran Hermano del siglo XXI."' },
      { id:16, bloque:'IV', nombre:'Concesión refutativa', tipo:'Argumentativo', definicion:'Conceder un punto para luego refutarlo.', ejemplo:'"Es cierto que la IA avanza, pero jamás sentirá asombro."' },
      { id:17, bloque:'V', nombre:'Flashforward contrastivo', tipo:'Narrativo', definicion:'Mostrar un futuro posible para contrastar con el presente.', ejemplo:'"En el año 3000, recordarán nuestra era como la prehistoria digital."' },
      { id:18, bloque:'V', nombre:'Oxímoron técnico', tipo:'Descriptivo', definicion:'Unir términos tecnológicos contradictorios.', ejemplo:'"Silencio ensordecedor en la estación orbital."' },
      { id:19, bloque:'VI', nombre:'Clasificación antitética', tipo:'Expositivo', definicion:'Clasificar elementos opuestos dentro de una misma categoría.', ejemplo:'"Hay dos tipos de colonos: los que siembran y los que cosechan sin sembrar."' },
      { id:20, bloque:'VI', nombre:'Apelación al futuro', tipo:'Argumentativo', definicion:'Argumentar basado en un futuro deseado o temido.', ejemplo:'"Si no limitamos la IA, el futuro nos juzgará."' },
    ];
    // Extender a 100
    while (TECNICAS.length < 100) {
      const base = TECNICAS[TECNICAS.length % 20];
      TECNICAS.push({
        id: TECNICAS.length + 1,
        bloque: 'IX',
        nombre: `${base.nombre} (${TECNICAS.length + 1})`,
        tipo: base.tipo,
        definicion: base.definicion + ' (variante)',
        ejemplo: base.ejemplo + ' …'
      });
    }

    // ---------- ESTADO ----------
    let currentBlock = 'I';
    let puntaje = 0, racha = 0, mejorRacha = 0, dominadas = 0;
    let respondidas = new Set();
    let respuestasCorrectas = {}; // { id: { texto, estilo } }

    // DOM
    const tarjetero = document.getElementById('tarjetero');
    const pestanasContainer = document.getElementById('pestanasContainer');
    const preguntaTexto = document.getElementById('preguntaTexto');
    const opcionesContainer = document.getElementById('opcionesContainer');
    const selloPractica = document.getElementById('selloPractica');
    const puntajeSpan = document.getElementById('puntaje');
    const rachaSpan = document.getElementById('racha');
    const mejorRachaSpan = document.getElementById('mejorRacha');
    const dominadasSpan = document.getElementById('dominadas');
    const barraProgreso = document.getElementById('barraProgreso');
    const resetLocalBtn = document.getElementById('resetLocalBtn');

    // ---------- LOCAL STORAGE ----------
    function cargarEstado() {
      try {
        const data = localStorage.getItem('cuadernoRedaccionFirmas');
        if (data) {
          const parsed = JSON.parse(data);
          puntaje = parsed.puntaje || 0;
          racha = parsed.racha || 0;
          mejorRacha = parsed.mejorRacha || 0;
          dominadas = parsed.dominadas || 0;
          respondidas = new Set(parsed.respondidas || []);
          respuestasCorrectas = parsed.respuestasCorrectas || {};
          currentBlock = parsed.currentBlock || 'I';
        }
      } catch (e) { /* fallback */ }
    }
    function guardarEstado() {
      try {
        localStorage.setItem('cuadernoRedaccionFirmas', JSON.stringify({
          puntaje, racha, mejorRacha, dominadas,
          respondidas: Array.from(respondidas),
          respuestasCorrectas,
          currentBlock
        }));
      } catch (e) { /* no hacer */ }
    }

    // ---------- RENDER PESTAÑAS ----------
    function renderPestanas() {
      const bloques = ['I','II','III','IV','V','VI','VII','VIII','IX'];
      pestanasContainer.innerHTML = '';
      bloques.forEach(b => {
        const btn = document.createElement('button');
        btn.className = `pestana ${b === currentBlock ? 'activa' : ''}`;
        btn.textContent = `Bloque ${b}`;
        btn.dataset.bloque = b;
        btn.addEventListener('click', () => {
          currentBlock = b;
          renderPestanas();
          renderTarjetas();
          guardarEstado();
        });
        pestanasContainer.appendChild(btn);
      });
    }

    // ---------- RENDER TARJETAS ----------
    function renderTarjetas() {
      const filtradas = TECNICAS.filter(t => t.bloque === currentBlock);
      tarjetero.innerHTML = '';
      if (filtradas.length === 0) {
        tarjetero.innerHTML = '<p style="font-family:Special Elite; color:#6a4e3a; padding:1rem;">No hay técnicas en este bloque.</p>';
        return;
      }
      filtradas.forEach((t) => {
        const ficha = document.createElement('div');
        ficha.className = 'ficha';
        ficha.style.setProperty('--rot', `${(Math.random() * 1.2 - 0.6)}deg`);
        const yaDom = respondidas.has(t.id);
        const respGuardada = respuestasCorrectas[t.id] || null;

        ficha.innerHTML = `
          <div class="tipo">${t.tipo} · bloque ${t.bloque}</div>
          <div class="nombre">${t.nombre}</div>
          <div class="definicion">${t.definicion}</div>
          <div class="ejemplo">${t.ejemplo}</div>
          <div class="respuesta-area">
            <span class="etiqueta-estilo">✎</span>
            <select class="estilo-select" data-id="${t.id}">
              <option value="normal">Normal</option>
              <option value="cursiva">Cursiva Palmer</option>
              <option value="script">Script</option>
            </select>
            <input type="text" placeholder="escribe tu respuesta..." data-id="${t.id}" 
                   class="${respGuardada ? 'estilo-' + respGuardada.estilo : 'estilo-normal'}"
                   value="${respGuardada ? respGuardada.texto : ''}">
            <button class="btn-sello" data-id="${t.id}">comprobar</button>
            <span class="sello ${yaDom ? 'correcto' : 'vacio'}" id="selloFicha-${t.id}">
              ${yaDom ? '✔ correcto' : '◌ pendiente'}
            </span>
          </div>
        `;
        tarjetero.appendChild(ficha);

        // Si hay respuesta guardada, mostrar firma
        if (respGuardada) {
          const firmaDiv = document.createElement('div');
          firmaDiv.className = 'firma-container';
          const estiloClase = respGuardada.estilo === 'cursiva' ? 'estilo-cursiva' : 
                              respGuardada.estilo === 'script' ? 'estilo-script' : 'estilo-normal';
          firmaDiv.innerHTML = `
            <span class="firma-label">✦ firma:</span>
            <span class="firma-estilo ${estiloClase}">${respGuardada.texto}</span>
          `;
          ficha.appendChild(firmaDiv);
        }

        // Eventos
        const input = ficha.querySelector('input');
        const select = ficha.querySelector('.estilo-select');
        const btn = ficha.querySelector('.btn-sello');
        const sello = ficha.querySelector('.sello');

        if (respGuardada) {
          select.value = respGuardada.estilo;
          input.className = `estilo-${respGuardada.estilo}`;
        }

        select.addEventListener('change', () => {
          const val = select.value;
          input.className = `estilo-${val}`;
          if (input.value.trim().length > 0) {
            const id = parseInt(input.dataset.id);
            respuestasCorrectas[id] = { texto: input.value.trim(), estilo: val };
            guardarEstado();
            actualizarFirma(ficha, id);
          }
        });

        btn.addEventListener('click', () => {
          const val = input.value.trim();
          const id = parseInt(input.dataset.id);
          const estilo = select.value;
          if (val.length === 0) {
            sello.className = 'sello revisar';
            sello.textContent = '✎ escribe algo';
            return;
          }
          const tecnica = TECNICAS.find(t => t.id === id);
          const esCorrecto = val.length > 2 || (tecnica && tecnica.nombre.toLowerCase().includes(val.toLowerCase()));
          if (esCorrecto) {
            if (!respondidas.has(id)) {
              respondidas.add(id);
              dominadas = respondidas.size;
            }
            respuestasCorrectas[id] = { texto: val, estilo: estilo };
            sello.className = 'sello correcto';
            sello.textContent = '✔ correcto';
            actualizarFirma(ficha, id);
            puntaje += 1;
            racha += 1;
            if (racha > mejorRacha) mejorRacha = racha;
          } else {
            sello.className = 'sello revisar';
            sello.textContent = '✗ revisar';
            racha = 0;
          }
          actualizarEstadisticas();
          guardarEstado();
        });
      });
    }

    // Función para actualizar la firma en una ficha
    function actualizarFirma(ficha, id) {
      const resp = respuestasCorrectas[id];
      if (!resp) return;
      let firmaDiv = ficha.querySelector('.firma-container');
      if (!firmaDiv) {
        firmaDiv = document.createElement('div');
        firmaDiv.className = 'firma-container';
        ficha.appendChild(firmaDiv);
      }
      const estiloClase = resp.estilo === 'cursiva' ? 'estilo-cursiva' : 
                          resp.estilo === 'script' ? 'estilo-script' : 'estilo-normal';
      firmaDiv.innerHTML = `
        <span class="firma-label">✦ firma:</span>
        <span class="firma-estilo ${estiloClase}">${resp.texto}</span>
      `;
    }

    // ---------- PRÁCTICA (QUIZ) ----------
    let practicaActual = null;
    function generarPractica() {
      const idx = Math.floor(Math.random() * TECNICAS.length);
      const correcta = TECNICAS[idx];
      practicaActual = correcta;
      const otras = TECNICAS.filter(t => t.id !== correcta.id);
      const shuffled = [...otras].sort(() => 0.5 - Math.random());
      const opciones = [correcta.nombre, ...shuffled.slice(0,3).map(t => t.nombre)];
      for (let i = opciones.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [opciones[i], opciones[j]] = [opciones[j], opciones[i]];
      }
      preguntaTexto.textContent = `📌 ${correcta.definicion} (${correcta.tipo})`;
      opcionesContainer.innerHTML = '';
      opciones.forEach(opt => {
        const btn = document.createElement('button');
        btn.textContent = opt;
        btn.addEventListener('click', () => {
          responderPractica(opt, correcta.nombre, correcta.id);
        });
        opcionesContainer.appendChild(btn);
      });
      selloPractica.innerHTML = `<span class="sello vacio">● elige una opción</span>`;
    }

    function responderPractica(seleccion, correctaNombre, idCorrecta) {
      const esCorrecto = seleccion === correctaNombre;
      const sello = selloPractica;
      if (esCorrecto) {
        sello.innerHTML = `<span class="sello correcto">✔ correcto · sello</span>`;
        puntaje += 1;
        racha += 1;
        if (racha > mejorRacha) mejorRacha = racha;
        if (!respondidas.has(idCorrecta)) {
          respondidas.add(idCorrecta);
          dominadas = respondidas.size;
          const tecnica = TECNICAS.find(t => t.id === idCorrecta);
          if (tecnica && !respuestasCorrectas[idCorrecta]) {
            respuestasCorrectas[idCorrecta] = { texto: correctaNombre, estilo: 'script' };
          }
        }
      } else {
        sello.innerHTML = `<span class="sello revisar">✗ revisar · tinta roja</span>`;
        racha = 0;
      }
      actualizarEstadisticas();
      guardarEstado();
      renderTarjetas();
      setTimeout(() => generarPractica(), 800);
    }

    // ---------- ACTUALIZAR ESTADÍSTICAS ----------
    function actualizarEstadisticas() {
      puntajeSpan.textContent = puntaje;
      rachaSpan.textContent = racha;
      mejorRachaSpan.textContent = mejorRacha;
      dominadasSpan.textContent = dominadas;
      const progreso = Math.min(100, (dominadas / TECNICAS.length) * 100);
      barraProgreso.style.width = `${progreso}%`;
    }

    // ---------- RESET ----------
    function resetearTodo() {
      if (confirm('¿Reiniciar todo el progreso?')) {
        localStorage.removeItem('cuadernoRedaccionFirmas');
        puntaje = 0; racha = 0; mejorRacha = 0; dominadas = 0;
        respondidas = new Set();
        respuestasCorrectas = {};
        currentBlock = 'I';
        actualizarEstadisticas();
        renderPestanas();
        renderTarjetas();
        generarPractica();
        guardarEstado();
      }
    }
    resetLocalBtn.addEventListener('click', resetearTodo);

    // ---------- INICIO ----------
    cargarEstado();
    renderPestanas();
    renderTarjetas();
    generarPractica();
    actualizarEstadisticas();
  })();
</script>
</body>
</html>
