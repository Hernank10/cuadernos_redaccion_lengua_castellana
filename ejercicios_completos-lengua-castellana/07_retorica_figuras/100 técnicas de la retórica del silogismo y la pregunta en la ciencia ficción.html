        { nombre: "Silogismo de advertencia expositivo", definicion: "Advierte sobre algo mediante silogismo.", sintaxis: "Si [A] es [B] en el [cosmos], y [C] advierte [B], entonces [C] es [A] por advertencia.", ejemplo: "Si la contaminación espacial es peligrosa, y esto es una advertencia, entonces la contaminación es peligrosa.", ejercicio: "¿Qué tipo de silogismo advierte en el espacio?", respuesta: "silogismo de advertencia expositivo" },

        { nombre: "Silogismo de énfasis expositivo", definicion: "Enfatiza una idea mediante silogismo.", sintaxis: "Si [A] es [B] en el [cosmos], y [C] enfatiza [B], entonces [C] es [A] por énfasis.", ejemplo: "Si la exploración espacial es crucial, y esto es un énfasis, entonces es crucial.", ejercicio: "¿Qué tipo de silogismo enfatiza en el espacio?", respuesta: "silogismo de énfasis expositivo" },
        { nombre: "Silogismo de generalización expositivo", definicion: "Generaliza una idea mediante silogismo.", sintaxis: "Si [A] es [B] en el [cosmos], y [C] generaliza [B], entonces [C] es [A] por generalización.", ejemplo: "Si un exoplaneta es habitable, entonces todos los exoplanetas pueden ser habitables.", ejercicio: "¿Qué tipo de silogismo generaliza en el espacio?", respuesta: "silogismo de generalización expositivo" },
        { nombre: "Silogismo de precisión expositivo", definicion: "Busca precisión mediante silogismo.", sintaxis: "Si [A] es exactamente [B] en el [cosmos], y [C] precisa [B], entonces [C] es [A] por precisión.", ejemplo: "Si la velocidad de la luz es exactamente 299,792,458 m/s, y esto es una precisión, entonces es luz.", ejercicio: "¿Qué tipo de silogismo busca precisión en el espacio?", respuesta: "silogismo de precisión expositivo" },
        { nombre: "Silogismo de matización expositivo", definicion: "Matiza una idea mediante silogismo.", sintaxis: "Si [A] es [B] en el [cosmos], y [C] matiza [B], entonces [C] es [A] por matización.", ejemplo: "Si la vida en la Tierra es compleja, y otros planetas pueden tener vida simple, entonces la vida varía.", ejercicio: "¿Qué tipo de silogismo matiza en el espacio?", respuesta: "silogismo de matización expositivo" },
        { nombre: "Silogismo de conclusión positiva expositivo", definicion: "Concluye con optimismo mediante silogismo.", sintaxis: "Si [A] es [B] en el [cosmos], y [C] concluye positivamente, entonces [C] es [A] con optimismo.", ejemplo: "Si el futuro de la humanidad está en el espacio, y esto es optimista, entonces el futuro es brillante.", ejercicio: "¿Qué tipo de silogismo concluye con optimismo en el espacio?", respuesta: "silogismo de conclusión positiva expositivo" },
        { nombre: "Silogismo de verdad universal expositivo", definicion: "Expresa una verdad eterna mediante silogismo.", sintaxis: "Si [A] es [B] en el [cosmos], y [C] expresa una verdad universal, entonces [C] es [A] por verdad universal.", ejemplo: "Si el cosmos es el espejo del alma, y esto es una verdad universal, entonces el cosmos refleja el alma.", ejercicio: "¿Qué tipo de silogismo expresa una verdad universal en el espacio?", respuesta: "silogismo de verdad universal expositivo" },
    ];
    expositivos.forEach((t, i) => TECNICAS.push({ id: i+76, bloque: 4, categoria: "expositivo", ...t }));

    TECNICAS.sort((a,b) => a.id - b.id);

    // ========== RENDER ==========
    const blockNav = document.getElementById('blockNav');
    const cardsGrid = document.getElementById('cardsGrid');
    const quizContainer = document.getElementById('quizContainer');

    let currentBlock = 1;
    const BLOCK_NAMES = ['', 'Silogismos narrativos', 'Silogismos descriptivos', 'Silogismos argumentativos', 'Silogismos expositivos'];

    for (let i = 1; i <= 4; i++) {
        const btn = document.createElement('button');
        btn.textContent = `${i}. ${BLOCK_NAMES[i]}`;
        btn.dataset.block = i;
        btn.addEventListener('click', () => {
            currentBlock = i;
            renderCards(i);
            updateNav(i);
        });
        blockNav.appendChild(btn);
    }

    function updateNav(block) {
        document.querySelectorAll('.block-nav button').forEach(b => b.classList.toggle('active', parseInt(b.dataset.block) === block));
    }
    updateNav(1);

    window.verificarRespuesta = function(id) {
        const input = document.getElementById(`input-${id}`);
        const feedback = document.getElementById(`feedback-${id}`);
        const correcta = document.getElementById(`correcta-${id}`);
        if (!input || !feedback) return;
        const valor = input.value.trim().toLowerCase();
        const respuestaCorrecta = correcta ? correcta.textContent.toLowerCase() : '';
        if (valor === '' || valor === '...') {
            feedback.textContent = '✏️ Escribe tu respuesta primero.';
            feedback.className = 'feedback-msg';
            return;
        }
        const normalize = (s) => s.replace(/\s+/g, ' ').trim();
        const esCorrecto = normalize(valor) === normalize(respuestaCorrecta) ||
                           normalize(valor).includes(normalize(respuestaCorrecta)) ||
                           normalize(respuestaCorrecta).includes(normalize(valor));
        if (esCorrecto) {
            feedback.textContent = '✅ ¡Correcto! Bien hecho.';
            feedback.className = 'feedback-msg correcto';
        } else {
            feedback.textContent = `❌ Incorrecto. La respuesta correcta es: "${respuestaCorrecta}"`;
            feedback.className = 'feedback-msg incorrecto';
        }
    };

    function renderCards(block) {
        const filtered = TECNICAS.filter(t => t.bloque === block);
        cardsGrid.innerHTML = filtered.map((t, idx) => {
            return `
                <div class="card-flip" data-id="${t.id}" onclick="this.classList.toggle('flipped')">
                    <div class="card-flip-inner">
                        <div class="card-front">
                            <div class="numero">${t.id}</div>
                            <span class="categoria">${t.categoria}</span>
                            <h3>${t.nombre}</h3>
                            <div class="teoria">${t.definicion}</div>
                            <div class="girar-indicador">↻ tocar para ver ejemplo y ejercicio</div>
                        </div>
                        <div class="card-back">
                            <div style="font-weight:600;color:#8bc4e0;margin-bottom:0.2rem;">🧠 ${t.nombre}</div>
                            <div class="definicion"><strong>📘 Teoría:</strong> ${t.definicion}</div>
                            <div class="sintaxis"><strong>📐 Fórmula:</strong> ${t.sintaxis}</div>
                            <div class="ejemplo"><strong>💡 Ejemplo:</strong> ${t.ejemplo}</div>
                            <div class="ejercicio">✏️ ${t.ejercicio}</div>
                            <div class="respuesta-area">
                                <input type="text" id="input-${t.id}" placeholder="Escribe tu respuesta..." />
                                <button class="btn-verificar" onclick="verificarRespuesta(${t.id})">Comprobar</button>
                            </div>
                            <div id="feedback-${t.id}" class="feedback-msg"></div>
                            <div id="correcta-${t.id}" style="display:none;">${t.respuesta}</div>
                            <div class="respuesta-correcta">✓ ${t.respuesta}</div>
                            <div class="etiqueta">técnica #${t.id} · ${t.categoria}</div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ========== QUIZ ==========
    let quizQuestions = [];
    let currentQuizIndex = 0;
    let score = 0;
    let answered = false;

    function generateQuiz() {
        const shuffled = [...TECNICAS].sort(() => Math.random() - 0.5);
        quizQuestions = shuffled.slice(0, 10).map(t => {
            const opts = [t.respuesta];
            const others = TECNICAS.filter(x => x.id !== t.id);
            const shuffledOthers = others.sort(() => Math.random() - 0.5);
            for (let i = 0; i < 3; i++) {
                if (shuffledOthers[i]) opts.push(shuffledOthers[i].respuesta);
            }
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return {
                pregunta: `📌 ${t.ejercicio} (técnica: ${t.nombre})`,
                opciones: opts,
                correcta: t.respuesta,
                id: t.id
            };
        });
        currentQuizIndex = 0;
        score = 0;
        answered = false;
        renderQuiz();
    }

    function renderQuiz() {
        if (!quizQuestions.length) return;
        const q = quizQuestions[currentQuizIndex];
        const total = quizQuestions.length;
        let html = `
            <div class="quiz-pregunta">
                <p>${q.pregunta}</p>
                <div class="quiz-opciones" id="quizOptions">
        `;
        q.opciones.forEach((op, idx) => {
            html += `<button data-idx="${idx}" onclick="checkAnswer(${idx})">${op}</button>`;
        });
        html += `</div>
                <div id="quizFeedback" style="margin-top:0.8rem;"></div>
                <div class="quiz-result" id="quizScore">Puntuación: ${score}/${total}</div>
            </div>
            <div class="quiz-controles">
                <button id="nextQuizBtn" disabled>→ Siguiente</button>
                <button onclick="generateQuiz()">🔄 Nuevo cuestionario</button>
            </div>
        `;
        quizContainer.innerHTML = html;
        answered = false;
        document.getElementById('nextQuizBtn').disabled = true;
    }

    window.checkAnswer = function(idx) {
        if (answered) return;
        const q = quizQuestions[currentQuizIndex];
        const buttons = document.querySelectorAll('#quizOptions button');
        buttons.forEach((b, i) => {
            b.disabled = true;
            if (i === idx) {
                const esCorrecta = q.opciones[idx] === q.correcta;
                b.classList.add(esCorrecta ? 'correct' : 'incorrect');
                if (esCorrecta) score++;
            }
            if (q.opciones[i] === q.correcta) {
                buttons[i].classList.add('correct');
            }
        });
        answered = true;
        document.getElementById('nextQuizBtn').disabled = false;
        document.getElementById('quizScore').textContent = `Puntuación: ${score}/${quizQuestions.length}`;
        const fb = document.getElementById('quizFeedback');
        fb.innerHTML = `<span style="background:#2a5a7a;color:#e0f0ff;padding:0.2rem 1rem;border-radius:40px;">✅ Respuesta correcta: ${q.correcta}</span>`;
    };

    document.addEventListener('click', function(e) {
        if (e.target.id === 'nextQuizBtn') {
            if (currentQuizIndex < quizQuestions.length - 1) {
                currentQuizIndex++;
                renderQuiz();
            } else {
                alert(`¡Cuestionario finalizado! Puntuación: ${score}/${quizQuestions.length}`);
                document.getElementById('nextQuizBtn').disabled = true;
            }
        }
    });

    // Inicializar
    renderCards(1);
    generateQuiz();
</script>
