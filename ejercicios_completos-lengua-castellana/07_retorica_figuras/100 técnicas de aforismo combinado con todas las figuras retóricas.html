    <div class="quiz-section" id="quizSection">

        <div id="quizContainer"></div>

<script>
    // ================================================================
    // 100 TÉCNICAS DE AFORISMO COMBINADO CON FIGURAS RETÓRICAS
    // Cada técnica es un aforismo (sentencia breve y profunda) con una figura retórica.
    // Distribuidas en 4 bloques: Narrativo, Descriptivo, Argumentativo, Expositivo.
    // ================================================================
    const TECNICAS = [];

    // =================== BLOQUE 1: AFORISMOS NARRATIVOS CON FIGURAS (25) ===================
    const narrativos = [
        { nombre: "Aforismo metafórico", teoria: "Sentencia breve con metáfora.", ejemplo: "La vida es un viaje, no un destino.", ejercicio: "¿Qué figura retórica usa metáfora en un aforismo?", respuesta: "aforismo metafórico" },
        { nombre: "Aforismo con símil", teoria: "Sentencia breve con comparación explícita.", ejemplo: "El amor es como el viento, no se ve pero se siente.", ejercicio: "¿Qué figura retórica usa símil en un aforismo?", respuesta: "aforismo con símil" },
        { nombre: "Aforismo con personificación", teoria: "Sentencia breve que da vida a lo inanimado.", ejemplo: "El tiempo siempre espera a quien sabe esperar.", ejercicio: "¿Qué figura retórica usa personificación en un aforismo?", respuesta: "aforismo con personificación" },
        { nombre: "Aforismo con hipérbole", teoria: "Sentencia breve con exageración.", ejemplo: "Una sonrisa puede mover montañas.", ejercicio: "¿Qué figura retórica usa hipérbole en un aforismo?", respuesta: "aforismo con hipérbole" },
        { nombre: "Aforismo irónico", teoria: "Sentencia breve con ironía.", ejemplo: "Qué sabia es la ignorancia.", ejercicio: "¿Qué figura retórica usa ironía en un aforismo?", respuesta: "aforismo irónico" },
        { nombre: "Aforismo con litotes", teoria: "Sentencia breve con doble negación.", ejemplo: "No es poca cosa ser feliz.", ejercicio: "¿Qué figura retórica usa litotes en un aforismo?", respuesta: "aforismo con litotes" },
        { nombre: "Aforismo con perífrasis", teoria: "Sentencia breve con rodeo de palabras.", ejemplo: "El que nunca calla, nunca escucha.", ejercicio: "¿Qué figura retórica usa perífrasis en un aforismo?", respuesta: "aforismo con perífrasis" },
        { nombre: "Aforismo con antonomasia", teoria: "Sentencia breve que usa un nombre por una cualidad.", ejemplo: "El sabio aprende de todos.", ejercicio: "¿Qué figura retórica usa antonomasia en un aforismo?", respuesta: "aforismo con antonomasia" },
        { nombre: "Aforismo alegórico", teoria: "Sentencia breve con metáfora extendida.", ejemplo: "El árbol de la paciencia da frutos dulces.", ejercicio: "¿Qué figura retórica usa alegoría en un aforismo?", respuesta: "aforismo alegórico" },
        { nombre: "Aforismo con oxímoron", teoria: "Sentencia breve que une opuestos.", ejemplo: "La dulce batalla de la vida.", ejercicio: "¿Qué figura retórica usa oxímoron en un aforismo?", respuesta: "aforismo con oxímoron" },
        { nombre: "Aforismo con paradoja", teoria: "Sentencia breve con contradicción verdadera.", ejemplo: "El que sabe más, más duda.", ejercicio: "¿Qué figura retórica usa paradoja en un aforismo?", respuesta: "aforismo con paradoja" },
        { nombre: "Aforismo con sinécdoque", teoria: "Sentencia breve que usa la parte por el todo.", ejemplo: "La mano que da nunca está vacía.", ejercicio: "¿Qué figura retórica usa sinécdoque en un aforismo?", respuesta: "aforismo con sinécdoque" },
        { nombre: "Aforismo con metonimia", teoria: "Sentencia breve con relación de contigüidad.", ejemplo: "La pluma es más poderosa que la espada.", ejercicio: "¿Qué figura retórica usa metonimia en un aforismo?", respuesta: "aforismo con metonimia" },
        { nombre: "Aforismo con anáfora", teoria: "Sentencia breve que repite al inicio.", ejemplo: "Vive, vive, vive sin miedo.", ejercicio: "¿Qué figura retórica usa anáfora en un aforismo?", respuesta: "aforismo con anáfora" },
        { nombre: "Aforismo con epífora", teoria: "Sentencia breve que repite al final.", ejemplo: "...de la verdad, ...de la verdad.", ejercicio: "¿Qué figura retórica usa epífora en un aforismo?", respuesta: "aforismo con epífora" },
        { nombre: "Aforismo con quiasmo", teoria: "Sentencia breve con cruce de elementos.", ejemplo: "Cuando el sabio señala la luna, el necio mira el dedo.", ejercicio: "¿Qué figura retórica usa quiasmo en un aforismo?", respuesta: "aforismo con quiasmo" },
        { nombre: "Aforismo con gradación", teoria: "Sentencia breve con progresión.", ejemplo: "Siembra un pensamiento, cosecha una acción; siembra una acción, cosecha un destino.", ejercicio: "¿Qué figura retórica usa gradación en un aforismo?", respuesta: "aforismo con gradación" },
        { nombre: "Aforismo con clímax", teoria: "Sentencia breve con ascenso de intensidad.", ejemplo: "Piensa, actúa, vive, triunfa.", ejercicio: "¿Qué figura retórica usa clímax en un aforismo?", respuesta: "aforismo con clímax" },
        { nombre: "Aforismo con apóstrofe", teoria: "Sentencia breve que se dirige a alguien.", ejemplo: "Oh, tiempo, enséñame a esperar.", ejercicio: "¿Qué figura retórica usa apóstrofe en un aforismo?", respuesta: "aforismo con apóstrofe" },
        { nombre: "Aforismo con interrogación retórica", teoria: "Sentencia breve con pregunta retórica.", ejemplo: "¿Quién sabe si mañana es realidad?", ejercicio: "¿Qué figura retórica usa interrogación retórica en un aforismo?", respuesta: "aforismo con interrogación retórica" },
        { nombre: "Aforismo con exclamación", teoria: "Sentencia breve con exclamación.", ejemplo: "¡Qué breve es el instante!", ejercicio: "¿Qué figura retórica usa exclamación en un aforismo?", respuesta: "aforismo con exclamación" },
        { nombre: "Aforismo con sarcasmo", teoria: "Sentencia breve con sarcasmo.", ejemplo: "Qué genio para ser feliz.", ejercicio: "¿Qué figura retórica usa sarcasmo en un aforismo?", respuesta: "aforismo con sarcasmo" },
        { nombre: "Aforismo con antítesis", teoria: "Sentencia breve con contraste.", ejemplo: "La luz y la sombra son hermanas.", ejercicio: "¿Qué figura retórica usa antítesis en un aforismo?", respuesta: "aforismo con antítesis" },
        { nombre: "Aforismo con epanadiplosis", teoria: "Sentencia breve que repite al inicio y al final.", ejemplo: "Vivir para aprender, aprender para vivir.", ejercicio: "¿Qué figura retórica usa epanadiplosis en un aforismo?", respuesta: "aforismo con epanadiplosis" },
        { nombre: "Aforismo con paralelismo", teoria: "Sentencia breve con estructuras paralelas.", ejemplo: "Amar es construir, amar es crecer.", ejercicio: "¿Qué figura retórica usa paralelismo en un aforismo?", respuesta: "aforismo con paralelismo" },
    ];
    narrativos.forEach((t, i) => TECNICAS.push({ id: i+1, bloque: 1, categoria: "narrativo", ...t }));

    // =================== BLOQUE 2: AFORISMOS DESCRIPTIVOS CON FIGURAS (25) ===================
    const descriptivos = [
        { nombre: "Aforismo con sinestesia", teoria: "Sentencia breve que mezcla sentidos.", ejemplo: "El aroma de la felicidad es un color cálido.", ejercicio: "¿Qué figura retórica usa sinestesia en un aforismo?", respuesta: "aforismo con sinestesia" },
        { nombre: "Aforismo con cromatismo", teoria: "Sentencia breve que usa colores simbólicos.", ejemplo: "La esperanza es un verde eterno.", ejercicio: "¿Qué figura retórica usa cromatismo en un aforismo?", respuesta: "aforismo con cromatismo" },
        { nombre: "Aforismo táctil", teoria: "Sentencia breve que apela al tacto.", ejemplo: "La bondad tiene la textura de la seda.", ejercicio: "¿Qué figura retórica usa el tacto en un aforismo?", respuesta: "aforismo táctil" },
        { nombre: "Aforismo olfativo", teoria: "Sentencia breve que apela al olfato.", ejemplo: "El perfume de la verdad es sutil.", ejercicio: "¿Qué figura retórica usa el olfato en un aforismo?", respuesta: "aforismo olfativo" },
        { nombre: "Aforismo gustativo", teoria: "Sentencia breve que apela al gusto.", ejemplo: "El éxito tiene sabor a esfuerzo.", ejercicio: "¿Qué figura retórica usa el gusto en un aforismo?", respuesta: "aforismo gustativo" },
        { nombre: "Aforismo auditivo", teoria: "Sentencia breve que apela al oído.", ejemplo: "El susurro de la conciencia es más fuerte que el grito.", ejercicio: "¿Qué figura retórica usa el oído en un aforismo?", respuesta: "aforismo auditivo" },
        { nombre: "Aforismo visual", teoria: "Sentencia breve que apela a la vista.", ejemplo: "La esperanza es un horizonte infinito.", ejercicio: "¿Qué figura retórica usa lo visual en un aforismo?", respuesta: "aforismo visual" },
        { nombre: "Aforismo con cinestesia", teoria: "Sentencia breve que apela al movimiento.", ejemplo: "La vida es una danza que nunca termina.", ejercicio: "¿Qué figura retórica usa el movimiento en un aforismo?", respuesta: "aforismo con cinestesia" },
        { nombre: "Aforismo onomatopéyico", teoria: "Sentencia breve que imita sonidos.", ejemplo: "El tic-tac del tiempo no espera.", ejercicio: "¿Qué figura retórica usa onomatopeya en un aforismo?", respuesta: "aforismo onomatopéyico" },
        { nombre: "Aforismo mitológico", teoria: "Sentencia breve con referencia a mitos.", ejemplo: "El vuelo de Ícaro nos enseña a no tocar el sol.", ejercicio: "¿Qué figura retórica usa mitología en un aforismo?", respuesta: "aforismo mitológico" },
        { nombre: "Aforismo bíblico", teoria: "Sentencia breve con referencia bíblica.", ejemplo: "El que siembra vientos, cosecha tempestades.", ejercicio: "¿Qué figura retórica usa referencias bíblicas en un aforismo?", respuesta: "aforismo bíblico" },
        { nombre: "Aforismo clásico", teoria: "Sentencia breve con referencia clásica.", ejemplo: "La espada de Damocles siempre está presente.", ejercicio: "¿Qué figura retórica usa referencias clásicas en un aforismo?", respuesta: "aforismo clásico" },
        { nombre: "Aforismo romántico", teoria: "Sentencia breve con lenguaje romántico.", ejemplo: "El corazón es el jardín del alma.", ejercicio: "¿Qué figura retórica usa lenguaje romántico en un aforismo?", respuesta: "aforismo romántico" },
        { nombre: "Aforismo surrealista", teoria: "Sentencia breve con imagen surrealista.", ejemplo: "El reloj de la vida se derrite en la memoria.", ejercicio: "¿Qué figura retórica usa surrealismo en un aforismo?", respuesta: "aforismo surrealista" },

    // =================== BLOQUE 4: AFORISMOS EXPOSITIVOS CON FIGURAS (25) ===================

        { nombre: "Aforismo con análisis", teoria: "Sentencia breve que descompone una idea.", ejemplo: "El tiempo se divide en instantes, la vida en decisiones.", ejercicio: "¿Qué figura retórica usa análisis en un aforismo?", respuesta: "aforismo con análisis" },
        { nombre: "Aforismo con síntesis", teoria: "Sentencia breve que integra ideas.", ejemplo: "En la unidad de la diversidad está la fuerza.", ejercicio: "¿Qué figura retórica usa síntesis en un aforismo?", respuesta: "aforismo con síntesis" },
        { nombre: "Aforismo con ejemplificación expositiva", teoria: "Sentencia breve con ejemplo.", ejemplo: "Como el árbol que crece firme, el carácter se forja.", ejercicio: "¿Qué figura retórica usa ejemplificación expositiva?", respuesta: "aforismo con ejemplificación expositiva" },
        { nombre: "Aforismo con paráfrasis", teoria: "Sentencia breve que reformula una idea.", ejemplo: "Es decir, vivir es aprender.", ejercicio: "¿Qué figura retórica usa paráfrasis en un aforismo?", respuesta: "aforismo con paráfrasis" },
        { nombre: "Aforismo con resumen", teoria: "Sentencia breve que sintetiza.", ejemplo: "En resumen, todo depende de la actitud.", ejercicio: "¿Qué figura retórica usa resumen en un aforismo?", respuesta: "aforismo con resumen" },
        { nombre: "Aforismo con glosa", teoria: "Sentencia breve que comenta.", ejemplo: "Cabe decir que la esperanza es eterna.", ejercicio: "¿Qué figura retórica usa glosa en un aforismo?", respuesta: "aforismo con glosa" },

        { nombre: "Aforismo con advertencia", teoria: "Sentencia breve que advierte.", ejemplo: "Cuida tus pensamientos, forjan tu destino.", ejercicio: "¿Qué figura retórica usa advertencia en un aforismo?", respuesta: "aforismo con advertencia" },
        { nombre: "Aforismo con corrección", teoria: "Sentencia breve que corrige.", ejemplo: "Más bien, el silencio es sabiduría.", ejercicio: "¿Qué figura retórica usa corrección en un aforismo?", respuesta: "aforismo con corrección" },

        { nombre: "Aforismo con atenuación", teoria: "Sentencia breve que atenúa una idea.", ejemplo: "Quizás, tal vez, el camino es la meta.", ejercicio: "¿Qué figura retórica usa atenuación en un aforismo?", respuesta: "aforismo con atenuación" },
        { nombre: "Aforismo con énfasis", teoria: "Sentencia breve que enfatiza.", ejemplo: "Sin duda, la perseverancia vence.", ejercicio: "¿Qué figura retórica usa énfasis en un aforismo?", respuesta: "aforismo con énfasis" },
        { nombre: "Aforismo con generalización", teoria: "Sentencia breve que generaliza.", ejemplo: "Toda acción tiene una reacción.", ejercicio: "¿Qué figura retórica usa generalización en un aforismo?", respuesta: "aforismo con generalización" },
        { nombre: "Aforismo con precisión", teoria: "Sentencia breve que precisa.", ejemplo: "Exactamente, el amor es la respuesta.", ejercicio: "¿Qué figura retórica usa precisión en un aforismo?", respuesta: "aforismo con precisión" },
        { nombre: "Aforismo con matización", teoria: "Sentencia breve que matiza.", ejemplo: "No obstante, el dolor puede ser maestro.", ejercicio: "¿Qué figura retórica usa matización en un aforismo?", respuesta: "aforismo con matización" },
        { nombre: "Aforismo con conclusión positiva", teoria: "Sentencia breve que termina con optimismo.", ejemplo: "Al final, el amor siempre gana.", ejercicio: "¿Qué figura retórica usa conclusión positiva?", respuesta: "aforismo con conclusión positiva" },
        { nombre: "Aforismo con verdad universal", teoria: "Sentencia breve que expresa una verdad eterna.", ejemplo: "Lo que das, recibes.", ejercicio: "¿Qué figura retórica expresa una verdad universal?", respuesta: "aforismo con verdad universal" },
    ];
    expositivos.forEach((t, i) => TECNICAS.push({ id: i+76, bloque: 4, categoria: "expositivo", ...t }));

    TECNICAS.sort((a,b) => a.id - b.id);

    // ========== RENDER ==========
    const blockNav = document.getElementById('blockNav');
    const cardsGrid = document.getElementById('cardsGrid');
    const quizContainer = document.getElementById('quizContainer');

    let currentBlock = 1;
    const BLOCK_NAMES = ['', 'Aforismos narrativos', 'Aforismos descriptivos', 'Aforismos argumentativos', 'Aforismos expositivos'];

    for (let i = 1; i <= 4; i++) {
        const btn = document.createElement('button');
        btn.textContent = `${i}. ${BLOCK_NAMES[i]}`;
        btn.dataset.block = i;
        btn.addEventListener('click', () => {
            currentBlock = i;
            renderCards(i);
            updateNav(i);
        });
        blockNav.appendChild(btn);
    }

    function updateNav(block) {
        document.querySelectorAll('.block-nav button').forEach(b => b.classList.toggle('active', parseInt(b.dataset.block) === block));
    }
    updateNav(1);

    window.verificarRespuesta = function(id) {
        const input = document.getElementById(`input-${id}`);
        const feedback = document.getElementById(`feedback-${id}`);
        const correcta = document.getElementById(`correcta-${id}`);
        if (!input || !feedback) return;
        const valor = input.value.trim().toLowerCase();
        const respuestaCorrecta = correcta ? correcta.textContent.toLowerCase() : '';
        if (valor === '' || valor === '...') {
            feedback.textContent = '✏️ Escribe tu respuesta primero.';
            feedback.className = 'feedback-msg';
            return;
        }
        const normalize = (s) => s.replace(/\s+/g, ' ').trim();
        const esCorrecto = normalize(valor) === normalize(respuestaCorrecta) ||
                           normalize(valor).includes(normalize(respuestaCorrecta)) ||
                           normalize(respuestaCorrecta).includes(normalize(valor));
        if (esCorrecto) {
            feedback.textContent = '✅ ¡Correcto! Bien hecho.';
            feedback.className = 'feedback-msg correcto';
        } else {
            feedback.textContent = `❌ Incorrecto. La respuesta correcta es: "${respuestaCorrecta}"`;
            feedback.className = 'feedback-msg incorrecto';
        }
    };

    function renderCards(block) {
        const filtered = TECNICAS.filter(t => t.bloque === block);
        cardsGrid.innerHTML = filtered.map((t, idx) => {
            return `
                <div class="card-flip" data-id="${t.id}" onclick="this.classList.toggle('flipped')">
                    <div class="card-flip-inner">
                        <div class="card-front">
                            <div class="numero">${t.id}</div>
                            <span class="categoria">${t.categoria}</span>
                            <h3>${t.nombre}</h3>
                            <div class="teoria">${t.teoria}</div>
                            <div class="girar-indicador">↻ tocar para practicar</div>
                        </div>
                        <div class="card-back">
                            <div style="font-weight:600;color:#1F4E5F;margin-bottom:0.2rem;">💡 ${t.nombre}</div>
                            <div class="ejemplo"><strong>Ejemplo:</strong> ${t.ejemplo}</div>
                            <div class="ejercicio">✏️ ${t.ejercicio}</div>
                            <div class="respuesta-area">
                                <input type="text" id="input-${t.id}" placeholder="Escribe tu respuesta..." />
                                <button class="btn-verificar" onclick="verificarRespuesta(${t.id})">Comprobar</button>
                            </div>
                            <div id="feedback-${t.id}" class="feedback-msg"></div>
                            <div id="correcta-${t.id}" style="display:none;">${t.respuesta}</div>
                            <div class="respuesta-correcta">✓ ${t.respuesta}</div>
                            <div class="etiqueta">técnica #${t.id} · ${t.categoria}</div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ========== QUIZ ==========
    let quizQuestions = [];
    let currentQuizIndex = 0;
    let score = 0;
    let answered = false;

    function generateQuiz() {
        const shuffled = [...TECNICAS].sort(() => Math.random() - 0.5);
        quizQuestions = shuffled.slice(0, 10).map(t => {
            const opts = [t.respuesta];
            const others = TECNICAS.filter(x => x.id !== t.id);
            const shuffledOthers = others.sort(() => Math.random() - 0.5);
            for (let i = 0; i < 3; i++) {
                if (shuffledOthers[i]) opts.push(shuffledOthers[i].respuesta);
            }
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return {
                pregunta: `📌 ${t.ejercicio} (técnica: ${t.nombre})`,
                opciones: opts,
                correcta: t.respuesta,
                id: t.id
            };
        });
        currentQuizIndex = 0;
        score = 0;
        answered = false;
        renderQuiz();
    }

    function renderQuiz() {
        if (!quizQuestions.length) return;
        const q = quizQuestions[currentQuizIndex];
        const total = quizQuestions.length;
        let html = `
            <div class="quiz-pregunta">
                <p>${q.pregunta}</p>
                <div class="quiz-opciones" id="quizOptions">
        `;
        q.opciones.forEach((op, idx) => {
            html += `<button data-idx="${idx}" onclick="checkAnswer(${idx})">${op}</button>`;
        });
        html += `</div>
                <div id="quizFeedback" style="margin-top:0.8rem;"></div>
                <div class="quiz-result" id="quizScore">Puntuación: ${score}/${total}</div>
            </div>
            <div class="quiz-controles">
                <button id="nextQuizBtn" disabled>→ Siguiente</button>
                <button onclick="generateQuiz()">🔄 Nuevo cuestionario</button>
            </div>
        `;
        quizContainer.innerHTML = html;
        answered = false;
        document.getElementById('nextQuizBtn').disabled = true;
    }

    window.checkAnswer = function(idx) {
        if (answered) return;
        const q = quizQuestions[currentQuizIndex];
        const buttons = document.querySelectorAll('#quizOptions button');
        buttons.forEach((b, i) => {
            b.disabled = true;
            if (i === idx) {
                const esCorrecta = q.opciones[idx] === q.correcta;
                b.classList.add(esCorrecta ? 'correct' : 'incorrect');
                if (esCorrecta) score++;
            }
            if (q.opciones[i] === q.correcta) {
                buttons[i].classList.add('correct');
            }
        });
        answered = true;
        document.getElementById('nextQuizBtn').disabled = false;
        document.getElementById('quizScore').textContent = `Puntuación: ${score}/${quizQuestions.length}`;
        const fb = document.getElementById('quizFeedback');
        fb.innerHTML = `<span style="background:#1F4E5F;color:white;padding:0.2rem 1rem;border-radius:40px;">✅ Respuesta correcta: ${q.correcta}</span>`;
    };

    document.addEventListener('click', function(e) {
        if (e.target.id === 'nextQuizBtn') {
            if (currentQuizIndex < quizQuestions.length - 1) {
                currentQuizIndex++;
                renderQuiz();
            } else {
                alert(`¡Cuestionario finalizado! Puntuación: ${score}/${quizQuestions.length}`);
                document.getElementById('nextQuizBtn').disabled = true;
            }
        }
    });

    // Inicializar
    renderCards(1);
    generateQuiz();
</script>
