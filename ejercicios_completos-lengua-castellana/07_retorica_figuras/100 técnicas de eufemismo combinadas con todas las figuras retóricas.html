<script>
    // ================================================================
    // 100 TÉCNICAS DE EUFEMISMO COMBINADAS CON FIGURAS RETÓRICAS
    // Cada técnica combina eufemismo con una figura retórica específica.
    // Distribuidas en 4 bloques: Narrativo, Descriptivo, Argumentativo, Expositivo.
    // ================================================================
    const TECNICAS = [];

    // =================== BLOQUE 1: EUFEMISMOS NARRATIVOS CON FIGURAS (25) ===================
    const narrativos = [
        { nombre: "Metáfora eufemística", teoria: "Sustituir una palabra dura con una metáfora suave.", ejemplo: "Su partida fue un amanecer (en lugar de 'muerte').", ejercicio: "¿Qué figura retórica combina eufemismo con comparación implícita?", respuesta: "metáfora eufemística" },
        { nombre: "Símil eufemístico", teoria: "Comparación explícita para suavizar una idea.", ejemplo: "Su partida fue como el ocaso (en lugar de 'muerte').", ejercicio: "¿Qué figura retórica usa 'como' para suavizar?", respuesta: "símil eufemístico" },
        { nombre: "Personificación eufemística", teoria: "Atribuir cualidades humanas para suavizar.", ejemplo: "La noche lo abrazó (en lugar de 'murió').", ejercicio: "¿Qué figura retórica da vida a lo inanimado para eufemizar?", respuesta: "personificación eufemística" },
        { nombre: "Hipérbole eufemística", teoria: "Exageración para minimizar o suavizar.", ejemplo: "Lleva una eternidad en el trabajo (en lugar de 'trabaja mucho').", ejercicio: "¿Qué figura retórica exagera para eufemizar?", respuesta: "hipérbole eufemística" },
        { nombre: "Ironía eufemística", teoria: "Decir lo contrario para suavizar con humor.", ejemplo: "Qué gran pérdida (en lugar de 'qué alivio').", ejercicio: "¿Qué figura retórica usa ironía como eufemismo?", respuesta: "ironía eufemística" },
        { nombre: "Litotes eufemística", teoria: "Negar lo contrario para afirmar suavemente.", ejemplo: "No es malo (en lugar de 'es bueno').", ejercicio: "¿Qué figura retórica usa doble negación como eufemismo?", respuesta: "litotes eufemística" },
        { nombre: "Perífrasis eufemística", teoria: "Rodeo de palabras para suavizar.", ejemplo: "El que no debe ser nombrado (en lugar de 'Voldemort').", ejercicio: "¿Qué figura retórica usa un rodeo para eufemizar?", respuesta: "perífrasis eufemística" },
        { nombre: "Antonomasia eufemística", teoria: "Sustituir un nombre por una cualidad positiva.", ejemplo: "El justo (en lugar de un juez severo).", ejercicio: "¿Qué figura retórica sustituye el nombre por una cualidad?", respuesta: "antonomasia eufemística" },
        { nombre: "Eufemismo alegórico", teoria: "Metáfora extendida que suaviza un concepto.", ejemplo: "El viaje final (en lugar de 'muerte').", ejercicio: "¿Qué figura retórica es una metáfora extendida con eufemismo?", respuesta: "alegoría eufemística" },
        { nombre: "Oxímoron eufemístico", teoria: "Unión de términos contradictorios para suavizar.", ejemplo: "Dulce muerte (en lugar de 'muerte dolorosa').", ejercicio: "¿Qué figura retórica une opuestos como eufemismo?", respuesta: "oxímoron eufemístico" },
        { nombre: "Paradoja eufemística", teoria: "Contradicción que suaviza con una verdad.", ejemplo: "Vivo sin vivir en mí (en lugar de 'muerte en vida').", ejercicio: "¿Qué figura retórica es una contradicción eufemística?", respuesta: "paradoja eufemística" },
        { nombre: "Sinécdoque eufemística", teoria: "La parte por el todo para suavizar.", ejemplo: "Alma en paz (en lugar de 'difunto').", ejercicio: "¿Qué figura retórica usa la parte por el todo como eufemismo?", respuesta: "sinécdoque eufemística" },
        { nombre: "Metonimia eufemística", teoria: "La causa por el efecto para suavizar.", ejemplo: "Descansar en el Señor (en lugar de 'morir').", ejercicio: "¿Qué figura retórica usa relación de contigüidad como eufemismo?", respuesta: "metonimia eufemística" },
        { nombre: "Anáfora eufemística", teoria: "Repetir una palabra suave al inicio.", ejemplo: "Paz, paz, paz (en lugar de 'guerra').", ejercicio: "¿Qué figura retórica repite para enfatizar el eufemismo?", respuesta: "anáfora eufemística" },
        { nombre: "Epífora eufemística", teoria: "Repetir una palabra suave al final.", ejemplo: "...de la luz, ...de la luz, ...de la luz.", ejercicio: "¿Qué figura retórica repite al final para eufemizar?", respuesta: "epífora eufemística" },
        { nombre: "Quiasmo eufemístico", teoria: "Cruzar elementos para suavizar.", ejemplo: "Cuando la vida es sueño, el sueño es vida.", ejercicio: "¿Qué figura retórica cruza elementos como eufemismo?", respuesta: "quiasmo eufemístico" },
        { nombre: "Gradación eufemística", teoria: "Progresión de términos suaves.", ejemplo: "Se fue, partió, descansó (en lugar de 'murió').", ejercicio: "¿Qué figura retórica usa gradación para eufemizar?", respuesta: "gradación eufemística" },
        { nombre: "Clímax eufemístico", teoria: "Progresión ascendente de suavidad.", ejemplo: "Sintió tristeza, melancolía, nostalgia (en lugar de 'depresión').", ejercicio: "¿Qué figura retórica es una gradación ascendente eufemística?", respuesta: "clímax eufemístico" },
        { nombre: "Alegoría eufemística", teoria: "Historia simbólica que suaviza una idea.", ejemplo: "El viaje del héroe (en lugar de 'la vida').", ejercicio: "¿Qué figura retórica usa una historia simbólica como eufemismo?", respuesta: "alegoría eufemística" },
        { nombre: "Apóstrofe eufemístico", teoria: "Dirigirse a algo ausente con suavidad.", ejemplo: "Oh, dulce muerte, ven.", ejercicio: "¿Qué figura retórica se dirige a lo ausente como eufemismo?", respuesta: "apóstrofe eufemístico" },
        { nombre: "Interrogación retórica eufemística", teoria: "Pregunta retórica que suaviza una idea.", ejemplo: "¿Y si la vida es un sueño?", ejercicio: "¿Qué figura retórica usa preguntas retóricas como eufemismo?", respuesta: "interrogación retórica eufemística" },
        { nombre: "Exclamación eufemística", teoria: "Exclamación que suaviza la emoción.", ejemplo: "¡Qué momento tan hermoso!", ejercicio: "¿Qué figura retórica usa exclamaciones para eufemizar?", respuesta: "exclamación eufemística" },
        { nombre: "Sarcasmo eufemístico", teoria: "Ironía cruel que suaviza con humor negro.", ejemplo: "Qué día tan maravilloso para morir.", ejercicio: "¿Qué figura retórica usa sarcasmo como eufemismo?", respuesta: "sarcasmo eufemístico" },
        { nombre: "Disfemismo invertido", teoria: "Usar palabras fuertes con intención positiva.", ejemplo: "Eres una bestia (en lugar de 'eres genial').", ejercicio: "¿Qué figura retórica usa disfemismo con intención positiva?", respuesta: "disfemismo invertido" },
        { nombre: "Antítesis eufemística", teoria: "Contraste de ideas para suavizar.", ejemplo: "No es vida, es un sueño.", ejercicio: "¿Qué figura retórica contrapone ideas para eufemizar?", respuesta: "antítesis eufemística" },
    ];
    narrativos.forEach((t, i) => TECNICAS.push({ id: i+1, bloque: 1, categoria: "narrativo", ...t }));

    // =================== BLOQUE 2: EUFEMISMOS DESCRIPTIVOS CON FIGURAS (25) ===================
    const descriptivos = [
        { nombre: "Metáfora descriptiva eufemística", teoria: "Metáfora para describir con suavidad.", ejemplo: "Su rostro era un atardecer (en lugar de 'arrugado').", ejercicio: "¿Qué figura retórica describe con metáfora eufemística?", respuesta: "metáfora descriptiva eufemística" },
        { nombre: "Símil descriptivo eufemístico", teoria: "Comparación para describir con suavidad.", ejemplo: "Su cabello como la nieve (en lugar de 'canas').", ejercicio: "¿Qué figura retórica usa símil para describir suavemente?", respuesta: "símil descriptivo eufemístico" },
        { nombre: "Personificación descriptiva eufemística", teoria: "Dar vida a lo inanimado para describir con suavidad.", ejemplo: "El tiempo dibujó arrugas en su rostro.", ejercicio: "¿Qué figura retórica describe con personificación eufemística?", respuesta: "personificación descriptiva eufemística" },
        { nombre: "Hipérbole descriptiva eufemística", teoria: "Exagerar para describir con suavidad.", ejemplo: "Es más bella que el amanecer.", ejercicio: "¿Qué figura retórica usa hipérbole para describir suavemente?", respuesta: "hipérbole descriptiva eufemística" },
        { nombre: "Sinestesia descriptiva eufemística", teoria: "Combinar sentidos para describir con suavidad.", ejemplo: "Un aroma a luz dorada.", ejercicio: "¿Qué figura retórica mezcla sentidos para describir suavemente?", respuesta: "sinestesia descriptiva eufemística" },
        { nombre: "Oxímoron descriptivo eufemístico", teoria: "Unir opuestos para describir con suavidad.", ejemplo: "Dulce vejez.", ejercicio: "¿Qué figura retórica une opuestos para describir suavemente?", respuesta: "oxímoron descriptivo eufemístico" },
        { nombre: "Paradoja descriptiva eufemística", teoria: "Contradicción para describir con suavidad.", ejemplo: "Solo sé que no sé nada (en lugar de 'ignorante').", ejercicio: "¿Qué figura retórica usa paradoja para describir suavemente?", respuesta: "paradoja descriptiva eufemística" },
        { nombre: "Litotes descriptiva eufemística", teoria: "Negar lo contrario para describir suavemente.", ejemplo: "No es joven (en lugar de 'es viejo').", ejercicio: "¿Qué figura retórica usa litotes para describir suavemente?", respuesta: "litotes descriptiva eufemística" },
        { nombre: "Perífrasis descriptiva eufemística", teoria: "Rodeo para describir con suavidad.", ejemplo: "La edad de la sabiduría (en lugar de 'vejez').", ejercicio: "¿Qué figura retórica usa perífrasis para describir suavemente?", respuesta: "perífrasis descriptiva eufemística" },
        { nombre: "Antonomasia descriptiva eufemística", teoria: "Sustituir un nombre por una cualidad para describir.", ejemplo: "El de la sonrisa eterna (en lugar de un nombre).", ejercicio: "¿Qué figura retórica usa antonomasia para describir suavemente?", respuesta: "antonomasia descriptiva eufemística" },
        { nombre: "Eufemismo sinestésico", teoria: "Combinar sensaciones para suavizar una descripción.", ejemplo: "Un silencio color de luna.", ejercicio: "¿Qué figura retórica combina sentidos para eufemizar?", respuesta: "sinestesia eufemística" },

        { nombre: "Síntesis eufemística", teoria: "Sintetizar con suavidad.", ejemplo: "En esencia, todo se reduce a...", ejercicio: "¿Qué figura retórica sintetiza con eufemismo?", respuesta: "síntesis eufemística" },
        { nombre: "Ejemplificación eufemística", teoria: "Ejemplificar con suavidad.", ejemplo: "Por ejemplo, como una flor que florece.", ejercicio: "¿Qué figura retórica ejemplifica con eufemismo?", respuesta: "ejemplificación eufemística" },

        { nombre: "Eufemismo de la advertencia", teoria: "Advertir con suavidad.", ejemplo: "Quizás convenga tener en cuenta que...", ejercicio: "¿Qué figura retórica advierte con eufemismo?", respuesta: "eufemismo de la advertencia" },
        { nombre: "Eufemismo de la corrección", teoria: "Corregir con suavidad.", ejemplo: "Permíteme una pequeña corrección...", ejercicio: "¿Qué figura retórica corrige con eufemismo?", respuesta: "eufemismo de la corrección" },
        { nombre: "Eufemismo de la hipótesis", teoria: "Hipótesis con suavidad.", ejemplo: "Si consideramos la posibilidad de que...", ejercicio: "¿Qué figura retórica hipotetiza con eufemismo?", respuesta: "eufemismo de la hipótesis" },
        { nombre: "Eufemismo de la conclusión positiva", teoria: "Concluir con optimismo.", ejemplo: "En definitiva, todo es una oportunidad.", ejercicio: "¿Qué figura retórica concluye con eufemismo positivo?", respuesta: "eufemismo de la conclusión positiva" },

    TECNICAS.sort((a,b) => a.id - b.id);

    // ========== RENDER ==========
    const blockNav = document.getElementById('blockNav');
    const cardsGrid = document.getElementById('cardsGrid');
    const quizContainer = document.getElementById('quizContainer');

    let currentBlock = 1;
    const BLOCK_NAMES = ['', 'Eufemismos narrativos', 'Eufemismos descriptivos', 'Eufemismos argumentativos', 'Eufemismos expositivos'];

    for (let i = 1; i <= 4; i++) {
        const btn = document.createElement('button');
        btn.textContent = `${i}. ${BLOCK_NAMES[i]}`;
        btn.dataset.block = i;
        btn.addEventListener('click', () => {
            currentBlock = i;
            renderCards(i);
            updateNav(i);
        });
        blockNav.appendChild(btn);
    }

    function updateNav(block) {
        document.querySelectorAll('.block-nav button').forEach(b => b.classList.toggle('active', parseInt(b.dataset.block) === block));
    }
    updateNav(1);

    window.verificarRespuesta = function(id) {
        const input = document.getElementById(`input-${id}`);
        const feedback = document.getElementById(`feedback-${id}`);
        const correcta = document.getElementById(`correcta-${id}`);
        if (!input || !feedback) return;
        const valor = input.value.trim().toLowerCase();
        const respuestaCorrecta = correcta ? correcta.textContent.toLowerCase() : '';
        if (valor === '' || valor === '...') {
            feedback.textContent = '✏️ Escribe tu respuesta primero.';
            feedback.className = 'feedback-msg';
            return;
        }
        const normalize = (s) => s.replace(/\s+/g, ' ').trim();
        const esCorrecto = normalize(valor) === normalize(respuestaCorrecta) ||
                           normalize(valor).includes(normalize(respuestaCorrecta)) ||
                           normalize(respuestaCorrecta).includes(normalize(valor));
        if (esCorrecto) {
            feedback.textContent = '✅ ¡Correcto! Bien hecho.';
            feedback.className = 'feedback-msg correcto';
        } else {
            feedback.textContent = `❌ Incorrecto. La respuesta correcta es: "${respuestaCorrecta}"`;
            feedback.className = 'feedback-msg incorrecto';
        }
    };

    function renderCards(block) {
        const filtered = TECNICAS.filter(t => t.bloque === block);
        cardsGrid.innerHTML = filtered.map((t, idx) => {
            return `
                <div class="card-flip" data-id="${t.id}" onclick="this.classList.toggle('flipped')">
                    <div class="card-flip-inner">
                        <div class="card-front">
                            <div class="numero">${t.id}</div>
                            <span class="categoria">${t.categoria}</span>
                            <h3>${t.nombre}</h3>
                            <div class="teoria">${t.teoria}</div>
                            <div class="girar-indicador">↻ tocar para practicar</div>
                        </div>
                        <div class="card-back">
                            <div style="font-weight:600;color:#1F4E5F;margin-bottom:0.2rem;">🌹 ${t.nombre}</div>
                            <div class="ejemplo"><strong>Ejemplo:</strong> ${t.ejemplo}</div>
                            <div class="ejercicio">✏️ ${t.ejercicio}</div>
                            <div class="respuesta-area">
                                <input type="text" id="input-${t.id}" placeholder="Escribe tu respuesta..." />
                                <button class="btn-verificar" onclick="verificarRespuesta(${t.id})">Comprobar</button>
                            </div>
                            <div id="feedback-${t.id}" class="feedback-msg"></div>
                            <div id="correcta-${t.id}" style="display:none;">${t.respuesta}</div>
                            <div class="respuesta-correcta">✓ ${t.respuesta}</div>
                            <div class="etiqueta">técnica #${t.id} · ${t.categoria}</div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ========== QUIZ ==========
    let quizQuestions = [];
    let currentQuizIndex = 0;
    let score = 0;
    let answered = false;

    function generateQuiz() {
        const shuffled = [...TECNICAS].sort(() => Math.random() - 0.5);
        quizQuestions = shuffled.slice(0, 10).map(t => {
            const opts = [t.respuesta];
            const others = TECNICAS.filter(x => x.id !== t.id);
            const shuffledOthers = others.sort(() => Math.random() - 0.5);
            for (let i = 0; i < 3; i++) {
                if (shuffledOthers[i]) opts.push(shuffledOthers[i].respuesta);
            }
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return {
                pregunta: `📌 ${t.ejercicio} (técnica: ${t.nombre})`,
                opciones: opts,
                correcta: t.respuesta,
                id: t.id
            };
        });
        currentQuizIndex = 0;
        score = 0;
        answered = false;
        renderQuiz();
    }

    function renderQuiz() {
        if (!quizQuestions.length) return;
        const q = quizQuestions[currentQuizIndex];
        const total = quizQuestions.length;
        let html = `
            <div class="quiz-pregunta">
                <p>${q.pregunta}</p>
                <div class="quiz-opciones" id="quizOptions">
        `;
        q.opciones.forEach((op, idx) => {
            html += `<button data-idx="${idx}" onclick="checkAnswer(${idx})">${op}</button>`;
        });
        html += `</div>
                <div id="quizFeedback" style="margin-top:0.8rem;"></div>
                <div class="quiz-result" id="quizScore">Puntuación: ${score}/${total}</div>
            </div>
            <div class="quiz-controles">
                <button id="nextQuizBtn" disabled>→ Siguiente</button>
                <button onclick="generateQuiz()">🔄 Nuevo cuestionario</button>
            </div>
        `;
        quizContainer.innerHTML = html;
        answered = false;
        document.getElementById('nextQuizBtn').disabled = true;
    }

    window.checkAnswer = function(idx) {
        if (answered) return;
        const q = quizQuestions[currentQuizIndex];
        const buttons = document.querySelectorAll('#quizOptions button');
        buttons.forEach((b, i) => {
            b.disabled = true;
            if (i === idx) {
                const esCorrecta = q.opciones[idx] === q.correcta;
                b.classList.add(esCorrecta ? 'correct' : 'incorrect');
                if (esCorrecta) score++;
            }
            if (q.opciones[i] === q.correcta) {
                buttons[i].classList.add('correct');
            }
        });
        answered = true;
        document.getElementById('nextQuizBtn').disabled = false;
        document.getElementById('quizScore').textContent = `Puntuación: ${score}/${quizQuestions.length}`;
        const fb = document.getElementById('quizFeedback');
        fb.innerHTML = `<span style="background:#1F4E5F;color:white;padding:0.2rem 1rem;border-radius:40px;">✅ Respuesta correcta: ${q.correcta}</span>`;
    };

    document.addEventListener('click', function(e) {
        if (e.target.id === 'nextQuizBtn') {
            if (currentQuizIndex < quizQuestions.length - 1) {
                currentQuizIndex++;
                renderQuiz();
            } else {
                alert(`¡Cuestionario finalizado! Puntuación: ${score}/${quizQuestions.length}`);
                document.getElementById('nextQuizBtn').disabled = true;
            }
        }
    });

    // Inicializar
    renderCards(1);
    generateQuiz();
</script>
