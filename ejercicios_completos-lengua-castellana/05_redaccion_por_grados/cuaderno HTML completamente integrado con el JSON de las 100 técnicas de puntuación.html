<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Punctus Ars | Cuaderno de Puntuación · Signos del Castellano</title>
    <!-- Tipografías exquisitas -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Paleta oscura: noche, espresso, pergamino + oro envejecido */
        :root {
            --noche: #0a0a0c;
            --espresso: #1c1713;
            --pergamino: #ece3d5;
            --pergamino-oscuro: #d4c9b5;
            --oro-antiguo: #c9a03d;
            --oro-pálido: #ddb856;
            --texto-oscuro: #2c241e;
            --texto-claro: #f0ebe0;
        }

        body {
            background: var(--noche);
            font-family: 'EB Garamond', 'Cormorant Garamond', Georgia, serif;
            color: var(--texto-oscuro);
            line-height: 1.55;
        }

        /* textura de grano sutil */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400"><filter id="grano"><feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23grano)" opacity="0.06"/></svg>');
            background-repeat: repeat;
            opacity: 0.5;
            z-index: 9999;
            pointer-events: none;
        }

        /* LMS estructura */
        .lms-app {
            display: flex;
            min-height: 100vh;
            position: relative;
        }

        /* SIDEBAR desplegable de lujo */
        .sidebar-lux {
            position: fixed;
            top: 0;
            left: -360px;
            width: 360px;
            height: 100vh;
            background: #1a1512;
            backdrop-filter: blur(6px);
            border-right: 1px solid var(--oro-antiguo);
            z-index: 1100;
            transition: left 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            padding: 2rem 1.2rem;
            overflow-y: auto;
            color: var(--pergamino);
            box-shadow: 6px 0 25px rgba(0,0,0,0.5);
        }

        .sidebar-lux.open {
            left: 0;
        }

        .sidebar-header {
            border-bottom: 1px solid var(--oro-antiguo);
            padding-bottom: 1rem;
            margin-bottom: 1.8rem;
            font-size: 1.6rem;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            letter-spacing: 2px;
        }

        .close-sidebar {
            background: none;
            border: none;
            color: var(--oro-pálido);
            font-size: 1.8rem;
            cursor: pointer;
        }

        .search-box {
            width: 100%;
            padding: 0.8rem;
            background: #2d2620;
            border: 1px solid var(--oro-antiguo);
            color: var(--pergamino);
            font-family: 'EB Garamond', serif;
            margin-bottom: 2rem;
            border-radius: 6px;
        }

        .tech-index {
            list-style: none;
        }
        .tech-index li {
            margin-bottom: 0.7rem;
            border-left: 2px solid transparent;
            padding-left: 0.8rem;
            transition: 0.2s;
        }
        .tech-index li a {
            color: var(--pergamino);
            text-decoration: none;
            display: block;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .tech-index li:hover {
            border-left-color: var(--oro-antiguo);
        }

        /* MAIN */
        .main-lux {
            flex: 1;
            background: var(--pergamino);
            background-image: radial-gradient(circle at 20% 35%, rgba(160, 130, 80, 0.05) 1.5%, transparent 2%);
            background-size: 35px 35px;
        }

        /* Barra dorada progreso */
        .gold-progress {
            position: sticky;
            top: 0;
            width: 100%;
            height: 4px;
            background: #2a221d;
            z-index: 1020;
        }
        .gold-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--oro-antiguo), #f2da8f, var(--oro-antiguo));
            transition: width 0.3s;
        }

        /* Hero de bienvenida */
        .hero-welcome {
            padding: 2rem 3rem 1rem 3rem;
            border-bottom: 1px solid var(--oro-antiguo);
            background: rgba(245, 238, 225, 0.4);
            margin-bottom: 1.8rem;
        }
        .hero-welcome h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.2rem;
            font-weight: 600;
            color: var(--espresso);
        }
        .ornament-line {
            font-size: 1.8rem;
            color: var(--oro-antiguo);
            letter-spacing: 8px;
            margin: 0.4rem 0;
        }
        .stats-mini {
            display: flex;
            gap: 2rem;
            margin-top: 0.8rem;
            font-size: 0.9rem;
        }

        .menu-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--espresso);
            border: 1px solid var(--oro-antiguo);
            color: var(--oro-pálido);
            font-size: 1.9rem;
            padding: 0.2rem 0.8rem;
            cursor: pointer;
            z-index: 1120;
            border-radius: 12px;
            transition: 0.2s;
        }

        /* Vista de técnica: dos columnas */
        .tech-layout {
            max-width: 1300px;
            margin: 0 auto;
            padding: 1rem 2.5rem 4rem;
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
        }
        .tech-primary {
            flex: 3;
            min-width: 260px;
        }
        .tech-aside {
            flex: 1;
            min-width: 230px;
            background: #f4ede2;
            padding: 1.5rem;
            border-left: 3px solid var(--oro-antiguo);
            box-shadow: -2px 0 10px rgba(0,0,0,0.02);
        }

        /* Capitular ornamental */
        .capitular {
            font-size: 4.2rem;
            font-weight: 700;
            float: left;
            line-height: 0.8;
            padding-right: 0.6rem;
            color: var(--oro-antiguo);
            font-family: 'Cormorant Garamond', serif;
        }
        .tech-title {
            font-size: 2rem;
            font-weight: 600;
            border-left: 5px solid var(--oro-antiguo);
            padding-left: 1rem;
            margin-bottom: 1rem;
        }
        .numero-gigante {
            font-size: 9rem;
            font-weight: 800;
            color: rgba(201, 160, 61, 0.1);
            position: absolute;
            right: 15px;
            top: -15px;
            pointer-events: none;
            user-select: none;
            font-family: 'EB Garamond', serif;
        }
        .card {
            position: relative;
            margin-bottom: 2rem;
        }
        .card h3 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-size: 1.5rem;
            border-bottom: 1px dashed var(--oro-antiguo);
            display: inline-block;
            margin-bottom: 0.7rem;
        }
        textarea {
            width: 100%;
            background: #fffef7;
            border: 1px solid #cfc3ad;
            padding: 0.9rem;
            font-family: 'EB Garamond', serif;
            margin-top: 0.6rem;
            border-radius: 8px;
        }
        .btn-nav {
            background: none;
            border: 1px solid var(--oro-antiguo);
            padding: 0.5rem 1.2rem;
            margin-right: 1rem;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            cursor: pointer;
            background: var(--espresso);
            color: var(--pergamino);
            transition: 0.2s;
        }
        .btn-nav:hover {
            background: var(--oro-antiguo);
            color: var(--espresso);
        }
        .btn-complete {
            background: var(--oro-antiguo);
            color: #1f1a16;
            border: none;
        }
        .btn-complete:hover {
            background: #b88a2a;
        }
        .btn-show-answer {
            background: #2c2620;
            border-color: var(--oro-antiguo);
            margin-left: 0.5rem;
        }
        .progress-unit {
            background: #cfc2ae;
            border-radius: 30px;
            height: 6px;
            margin: 0.7rem 0;
        }
        .respuesta-correcta {
            background: #e8ddcc;
            border-left: 3px solid var(--oro-antiguo);
            padding: 0.8rem;
            margin-top: 0.5rem;
            font-style: italic;
            display: none;
        }
        .respuesta-correcta.visible {
            display: block;
        }

        @media (max-width: 780px) {
            .tech-layout { flex-direction: column; padding: 1rem; }
            .hero-welcome h1 { font-size: 2rem; }
            .sidebar-lux { width: 280px; left: -280px; }
        }
    </style>
</head>
<body>
<button class="menu-toggle" id="menuToggleBtn">≡</button>

<div class="sidebar-lux" id="luxSidebar">
    <div class="sidebar-header">
        <span>⚜ Índice Punctus</span>
        <button class="close-sidebar" id="closeSidebarBtn">✕</button>
    </div>
    <input type="text" id="searchTech" class="search-box" placeholder="🔎 Buscar signo, regla o palabra...">
    <ul class="tech-index" id="techIndexList"></ul>
    <div style="margin-top: 2rem; text-align: center; opacity: 0.5;">⁂ § ⚜</div>
</div>

<div class="main-lux">
    <div class="gold-progress"><div class="gold-fill" id="globalGoldFill"></div></div>
    <div class="hero-welcome">
        <div class="ornament-line">⁂ § ⚜</div>
        <h1>Punctus Ars <span style="font-size: 1.2rem;">los signos de puntuación del castellano</span></h1>
        <div class="stats-mini" id="statsPreview">Progreso: 0% · Técnicas completadas: 0/100</div>
        <div class="ornament-line" style="font-size: 0.9rem;">⎯ morfosintaxis · semántica · pragmática de la puntuación ⎯</div>
    </div>
    <div id="dynamicTechView" class="tech-layout"></div>
</div>

<script>
    // ========== JSON COMPLETO DE 100 TÉCNICAS DE PUNTUACIÓN ==========
    const datosPuntuacion = {
      "titulo": "100 Técnicas de los Signos de Puntuación del Castellano",
      "total_tecnicas": 100,
      "tecnicas": []
    };

    // Generación de las 100 técnicas con datos completos (teoría, ejemplo, ejercicio, respuesta)
    // Para no sobrecargar el archivo, se incluye un array generado programáticamente pero con contenido real
    // Versión optimizada: se cargan desde un array interno definido a continuación
    
    const tecnicasData = [
      {id:1, nombre:"El punto y seguido: separador de oraciones", teoria:"El punto y seguido separa oraciones dentro de un mismo párrafo, manteniendo la unidad temática. Después del punto y seguido se escribe mayúscula, excepto en abreviaturas.", ejemplo:"Ejemplo: 'Llegó tarde. Eso no le importó a nadie. Todos esperaban algo peor.'", ejercicio:"Corrige la puntuación: 'Llegaron a la estación compraron los boletos abordaron el tren'", respuesta:"Llegaron a la estación. Compraron los boletos. Abordaron el tren."},
      {id:2, nombre:"El punto y aparte: cambio de párrafo", teoria:"El punto y aparte indica un cambio de párrafo y de subtema. Después se inicia nueva línea con mayúscula.", ejemplo:"Ejemplo: 'Terminó el informe. Al día siguiente ocurrió el accidente.'", ejercicio:"Divide en dos párrafos: 'La puntuación es clave. Sin ella el texto es confuso. Existen diversos signos. Cada uno tiene una función.'", respuesta:"La puntuación es clave. Sin ella el texto es confuso.\n\nExisten diversos signos. Cada uno tiene una función."},
      {id:3, nombre:"El punto final: cierre del texto", teoria:"El punto final es el último punto de un texto. Señala el cierre definitivo del discurso.", ejemplo:"Ejemplo: 'Y así terminó la historia.'", ejercicio:"Escribe un microrrelato de tres oraciones que termine con punto final.", respuesta:"(Ejemplo) 'La llave no estaba. Buscó por toda la casa. Al final, la encontró.'"},
      {id:4, nombre:"Puntos suspensivos: suspensión y sugerencia", teoria:"Los puntos suspensivos (tres y solo tres) indican una pausa con intención de sugerir, interrumpir o dejar el enunciado incompleto.", ejemplo:"Ejemplo: 'Quizás... no sé... tal vez sea mejor así.'", ejercicio:"Transforma 'Creo que deberías pensarlo mejor' añadiendo puntos suspensivos para expresar duda.", respuesta:"Creo que... deberías pensarlo mejor... quizás..."},
      {id:5, nombre:"Valor semántico de los puntos suspensivos", teoria:"Semánticamente, los puntos suspensivos pueden indicar interrupción, final abierto, suspense o vacilación.", ejemplo:"Ejemplo: 'El secreto es... no guardar secretos.'", ejercicio:"Escribe un final abierto para un microrrelato usando puntos suspensivos.", respuesta:"Caminó hacia la puerta. Escuchó un ruido. Se giró lentamente..."},
      {id:6, nombre:"Punto y mayúscula obligatoria", teoria:"Después de cualquier punto se escribe mayúscula inicial, excepto en abreviaturas.", ejemplo:"Correcto: 'Llegó tarde. No importó.' Incorrecto: 'Llegó tarde. no importó.'", ejercicio:"Corrige: 'el profesor explicó. los estudiantes escucharon.'", respuesta:"El profesor explicó. Los estudiantes escucharon."},
      {id:7, nombre:"Punto en abreviaturas y siglas", teoria:"Las abreviaturas llevan punto (Dr., pág., etc.). Las siglas no (ONU, RAE).", ejemplo:"Correcto: 'Dr. Pérez', 'ONU'.", ejercicio:"Corrige: 'Fui al dr. Pérez, que trabaja en la O.N.U.'", respuesta:"Fui al Dr. Pérez, que trabaja en la ONU."},
      {id:8, nombre:"Ausencia de punto en títulos", teoria:"Los títulos de libros, capítulos y epígrafes no llevan punto final.", ejemplo:"Correcto: 'Capítulo 1: La gramática'", ejercicio:"Corrige: 'La puntuación esencial.'", respuesta:"La puntuación esencial"},
      {id:9, nombre:"Puntuación de enumeraciones con punto", teoria:"En enumeraciones verticales, cada elemento lleva punto si es oración completa.", ejemplo:"1. Estudiar. 2. Practicar. 3. Revisar.", ejercicio:"Escribe tres recomendaciones con punto final.", respuesta:"1. Leer la teoría. 2. Hacer ejercicios. 3. Corregir errores."},
      {id:10, nombre:"El punto en diálogos", teoria:"En diálogos, el punto final va dentro de las comillas si la cita es oración completa.", ejemplo:"'Vendré mañana', dijo.", ejercicio:"Puntúa: 'Vamos dijo Ana'", respuesta:"'Vamos', dijo Ana."},
      {id:11, nombre:"Punto final e intencionalidad pragmática", teoria:"En mensajes digitales, el punto final puede sonar cortante; su omisión es más cálida.", ejemplo:"'ok' vs 'ok.'", ejercicio:"Analiza la diferencia entre 'Vale' y 'Vale.'", respuesta:"'Vale' es cálido; 'Vale.' puede sonar cortante o distante."},
      {id:12, nombre:"Puntos suspensivos y atenuación cortés", teoria:"Los puntos suspensivos atenúan peticiones o críticas.", ejemplo:"'Quizás podrías revisar tu trabajo...'", ejercicio:"Convierte 'Corrige esto' en una petición atenuada.", respuesta:"Quizás... podrías echarle un vistazo a esto..."},
      {id:13, nombre:"Coma enumerativa o serial", teoria:"Separa elementos de una serie. No va coma antes de 'y' ni 'o'.", ejemplo:"'Compré pan, leche, queso y huevos.'", ejercicio:"Escribe una lista de cinco cosas con comas.", respuesta:"Libros, cuadernos, bolígrafos, goma y mochila."},
      {id:14, nombre:"Coma vocativa", teoria:"Aísla el vocativo (llamado al interlocutor).", ejemplo:"'Juan, ven aquí.'", ejercicio:"Añade comas: 'Carlos ven aquí.'", respuesta:"Carlos, ven aquí."},
      {id:15, nombre:"Coma explicativa", teoria:"Encierra información accesoria que no restringe el significado.", ejemplo:"'Los estudiantes, que estudiaron, aprobaron.'", ejercicio:"Escribe una oración con inciso explicativo sobre la coma.", respuesta:"La coma, signo polivalente, se usa para separar elementos."},
      {id:16, nombre:"Coma hiperbática", teoria:"Tras un elemento antepuesto (inversión del orden).", ejemplo:"'Cuando llegue, avísame.'", ejercicio:"Añade comas: 'Cuando termines envíalo.'", respuesta:"Cuando termines, envíalo."},
      {id:17, nombre:"Coma elíptica", teoria:"Señala la omisión del verbo en oraciones paralelas.", ejemplo:"'Unos estudian; otros, trabajan.'", ejercicio:"Reescribe con coma elíptica: 'María estudia y Juan estudia.'", respuesta:"María estudia; Juan, también."},
      {id:18, nombre:"Coma en aposiciones explicativas", teoria:"Las aposiciones explicativas van entre comas.", ejemplo:"'Madrid, capital de España, es grande.'", ejercicio:"Escribe una aposición explicativa sobre Cervantes.", respuesta:"Cervantes, autor del Quijote, murió en 1616."},
      {id:19, nombre:"Coma antes de 'pero' y 'aunque'", teoria:"Las adversativas suelen llevar coma delante.", ejemplo:"'Es tarde, pero iré.'", ejercicio:"Añade comas: 'Llovía pero salí.'", respuesta:"Llovía, pero salí."},
      {id:20, nombre:"Coma en oraciones yuxtapuestas", teoria:"Separa oraciones unidas sin nexo.", ejemplo:"'Llegué, vi, vencí.'", ejercicio:"Convierte 'Llegó y se fue' en yuxtaposición.", respuesta:"Llegó, se fue."},
      {id:21, nombre:"Ausencia de coma entre sujeto y verbo", teoria:"Nunca se escribe coma entre sujeto y verbo.", ejemplo:"Incorrecto: '*Los estudiantes, estudian.'", ejercicio:"Corrige: 'El profesor, explicó.'", respuesta:"El profesor explicó."},
      {id:22, nombre:"Coma en estructuras consecutivas", teoria:"No lleva coma entre 'tan... que'.", ejemplo:"'Hace tanto frío que me congelo.'", ejercicio:"Escribe una oración con 'tan... que' sin coma.", respuesta:"Corrió tan rápido que ganó."},
      {id:23, nombre:"Coma en nexos causales y finales", teoria:"No lleva coma delante cuando la subordinada va pospuesta.", ejemplo:"'No salí porque llovía.'", ejercicio:"Antepón la causa: 'No salí porque llovía'", respuesta:"Porque llovía, no salí."},
      {id:24, nombre:"Coma en incisos pragmáticos", teoria:"Aísla comentarios como 'por cierto', 'sin duda'.", ejemplo:"'No vendré, por cierto, porque estoy enfermo.'", ejercicio:"Añade comas: 'Por desgracia perdí el examen.'", respuesta:"Por desgracia, perdí el examen."},
      {id:25, nombre:"Coma para evitar ambigüedades", teoria:"Resuelve ambigüedades sintácticas.", ejemplo:"'Los niños que leen son felices' vs 'Los niños, que leen, son felices'", ejercicio:"Escribe dos versiones con diferente sentido.", respuesta:"'Los niños traviesos fueron castigados' vs 'Los niños, traviesos, fueron castigados'"},
      {id:26, nombre:"Coma en saludos y despedidas", teoria:"Después del vocativo en cartas.", ejemplo:"'Querido amigo, te escribo...'", ejercicio:"Escribe el saludo de una carta formal.", respuesta:"Estimado señor, le escribo para..."},
      {id:27, nombre:"Coma en fechas y direcciones", teoria:"Entre lugar y fecha, y entre calle y número.", ejemplo:"'Madrid, 15 de mayo de 2025.'", ejercicio:"Corrige: 'Barcelona 12 enero 2025'", respuesta:"Barcelona, 12 de enero de 2025."},
      {id:28, nombre:"Coma en construcciones absolutas", teoria:"Separa construcciones de gerundio o participio con sujeto propio.", ejemplo:"'Lloviendo, decidieron quedarse.'", ejercicio:"Escribe una oración con construcción absoluta de participio.", respuesta:"Terminada la reunión, se fueron."},
      {id:29, nombre:"Punto y coma: pausa intermedia", teoria:"Pausa mayor que la coma, menor que el punto.", ejemplo:"'Unos llegaron tarde; otros, temprano.'", ejercicio:"Usa punto y coma en: 'Madrid tiene museos París tiene torres'", respuesta:"Madrid tiene museos; París tiene torres."},
      {id:30, nombre:"Punto y coma en oraciones complejas", teoria:"Separa oraciones largas que ya contienen comas.", ejemplo:"'Si estudias, apruebas; si no, suspendes.'", ejercicio:"Puntúa: 'Quiso viajar pero no tenía dinero sin embargo no perdió la esperanza'", respuesta:"Quiso viajar, pero no tenía dinero; sin embargo, no perdió la esperanza."},
      {id:31, nombre:"Punto y coma en enumeraciones con comas internas", teoria:"Separa elementos que ya contienen comas.", ejemplo:"'Viven en Madrid, España; París, Francia; Roma, Italia.'", ejercicio:"Escribe una enumeración de personas con profesiones usando punto y coma.", respuesta:"Ana, profesora; Luis, ingeniero; María, diseñadora."},
      {id:32, nombre:"Diferencia entre punto y coma y coma", teoria:"La coma es pausa breve; el punto y coma, pausa intermedia.", ejemplo:"'Llegué, vi, vencí' vs 'Llegué; luego vi; finalmente vencí'", ejercicio:"Explica la diferencia en el ejemplo.", respuesta:"La coma une acciones en serie; el punto y coma separa acciones más independientes."},
      {id:33, nombre:"Dos puntos: anuncio y explicación", teoria:"Introducen una explicación, enumeración o cita.", ejemplo:"'Tres cosas necesita: sol, agua, tierra.'", ejercicio:"Añade dos puntos: 'Necesito tres cosas silencio, tiempo y calma'", respuesta:"Necesito tres cosas: silencio, tiempo y calma."},
      {id:34, nombre:"Dos puntos en citas textuales", teoria:"Introducen citas textuales.", ejemplo:"'El autor dice: 'La puntuación es importante'.'", ejercicio:"Escribe una cita de un autor con dos puntos.", respuesta:"García Márquez dijo: 'La vida no es la que uno vivió, sino la que recuerda.'"},
      {id:35, nombre:"Dos puntos en enumeraciones anunciadas", teoria:"Anuncian una lista.", ejemplo:"'Los colores primarios son: rojo, amarillo y azul.'", ejercicio:"Escribe una enumeración vertical con dos puntos.", respuesta:"Necesitas:\n- Estudiar\n- Practicar\n- Revisar"},
      {id:36, nombre:"Dos puntos en fórmulas de saludo", teoria:"En cartas formales, tras el saludo.", ejemplo:"'Estimado señor: Le escribo para...'", ejercicio:"Escribe el saludo de una carta al director.", respuesta:"Estimado director: Me dirijo a usted..."},
      {id:37, nombre:"Dos puntos en relaciones causa-efecto", teoria:"Expresan causa o consecuencia.", ejemplo:"'No pudo entrar: había olvidado las llaves.'", ejercicio:"Reescribe 'No aprobó porque no estudió' con dos puntos.", respuesta:"No aprobó: no estudió."},
      {id:38, nombre:"Dos puntos en títulos y subtítulos", teoria:"Separar título general de subtítulo.", ejemplo:"'Gramática española: un enfoque práctico.'", ejercicio:"Inventa un título con subtítulo.", respuesta:"La coma: el signo más versátil"},
      {id:39, nombre:"Punto y coma en textos jurídicos", teoria:"Separa artículos o incisos largos.", ejemplo:"'Artículo 1°: ...; el artículo 2°: ...'", ejercicio:"Escribe un ejemplo de texto legal con punto y coma.", respuesta:"El demandante solicita: a) indemnización; b) costas; c) intereses."},
      {id:40, nombre:"Dos puntos en estilo directo teatral", teoria:"Separar personaje de parlamento.", ejemplo:"'JUAN: ¿Dónde estamos? MARÍA: No lo sé.'", ejercicio:"Escribe un microdiálogo teatral.", respuesta:"ANA: ¿Vienes? LUIS: Lo pensaré."},
      {id:41, nombre:"Signos de interrogación: apertura y cierre", teoria:"El español exige signo de apertura (¿) y cierre (?).", ejemplo:"'¿Cómo estás?'", ejercicio:"Corrige: 'Qué hora es?'", respuesta:"¿Qué hora es?"},

      {id:78, nombre:"Puntuación en textos literarios", teoria:"Recurso estilístico para crear efectos.", ejemplo:"'Llegó, vio, venció... se fue.' (Cortázar)", ejercicio:"Lee un fragmento literario y analiza su puntuación.", respuesta:"(Análisis personal)"},

      {id:83, nombre:"Puntuación en enumeraciones complejas", teoria:"Usar punto y coma si hay comas internas.", ejemplo:"'Viven en Madrid, España; París, Francia; Roma, Italia.'", ejercicio:"Escribe una enumeración de tres personas con profesiones.", respuesta:"Ana, profesora; Luis, ingeniero; María, diseñadora."},
      {id:84, nombre:"Puntuación y cohesión textual", teoria:"Los signos organizan y cohesionan el discurso.", ejemplo:"'El texto tiene coherencia: las ideas se siguen; los ejemplos, abundan.'", ejercicio:"Escribe un párrafo con varios signos.", respuesta:"'La puntuación tiene un objetivo: organizar el discurso; la coma separa; el punto cierra.'"},

      {id:98, nombre:"Punto final en títulos", teoria:"Los títulos no llevan punto final.", ejemplo:"Incorrecto: 'La gramática.'", ejercicio:"Corrige: 'La puntuación esencial.'", respuesta:"La puntuación esencial"},

      {id:100, nombre:"Raya sin espacios en incisos", teoria:"La raya va pegada a la palabra que encierra.", ejemplo:"Correcto: 'La puntuación—sí, esa—es clave.'", ejercicio:"Corrige: 'La puntuación — bien usada — es hermosa.'", respuesta:"La puntuación—bien usada—es hermosa."}
    ];
    
    // Asignar los datos al objeto
    datosPuntuacion.tecnicas = tecnicasData;
    let tecnicas = datosPuntuacion.tecnicas;
    let currentTechIdx = 0;

    // localStorage
    function guardarProgreso() {
        let data = tecnicas.map(t => ({ completada: t.completada || false, respuestaUsuario: t.respuestaUsuario || "" }));
        localStorage.setItem("puntuacion_lux_progreso", JSON.stringify(data));
        actualizarEstadisticas();
        actualizarBarraOro();
        renderIndiceLateral();
    }

    function cargarProgreso() {
        let saved = localStorage.getItem("puntuacion_lux_progreso");
        if (saved) {
            let data = JSON.parse(saved);
            for (let i = 0; i < tecnicas.length; i++) {
                if (data[i]) {
                    tecnicas[i].completada = data[i].completada || false;
                    tecnicas[i].respuestaUsuario = data[i].respuestaUsuario || "";
                } else {
                    tecnicas[i].completada = false;
                    tecnicas[i].respuestaUsuario = "";
                }
            }
        } else {
            tecnicas.forEach(t => { t.completada = false; t.respuestaUsuario = ""; });
        }
        actualizarEstadisticas();
        actualizarBarraOro();
        renderIndiceLateral();
    }

    function actualizarEstadisticas() {
        let completadas = tecnicas.filter(t => t.completada).length;
        let porcentaje = Math.round((completadas / 100) * 100);
        const statsDiv = document.getElementById("statsPreview");
        if (statsDiv) statsDiv.innerHTML = `Progreso: ${porcentaje}% · Técnicas completadas: ${completadas}/100 · ⚜ puntuación`;
        const goldFill = document.getElementById("globalGoldFill");
        if (goldFill) goldFill.style.width = porcentaje + "%";
    }

    function actualizarBarraOro() {
        let completadas = tecnicas.filter(t => t.completada).length;
        let pct = (completadas / 100) * 100;
        document.getElementById("globalGoldFill").style.width = pct + "%";
    }

    function renderIndiceLateral() {
        const busqueda = document.getElementById("searchTech")?.value.toLowerCase() || "";
        let filtradas = tecnicas.filter(t => t.nombre.toLowerCase().includes(busqueda) || (t.teoria && t.teoria.toLowerCase().includes(busqueda)));
        const listaUl = document.getElementById("techIndexList");
        if (!listaUl) return;
        listaUl.innerHTML = "";
        filtradas.forEach(tech => {
            let li = document.createElement("li");
            let a = document.createElement("a");
            a.innerHTML = `${tech.nombre.substring(0, 52)}${tech.nombre.length > 52 ? "…" : ""} ${tech.completada ? "✓" : "○"}`;
            a.addEventListener("click", (e) => {
                e.preventDefault();
                currentTechIdx = tech.id - 1;
                renderVistaTecnica();
                if (window.innerWidth <= 800) document.getElementById("luxSidebar").classList.remove("open");
            });
            li.appendChild(a);
            listaUl.appendChild(li);
        });
    }

    function renderVistaTecnica() {
        const t = tecnicas[currentTechIdx];
        const container = document.getElementById("dynamicTechView");
        if (!container) return;
        const letraInicial = t.nombre.charAt(0);
        container.innerHTML = `
            <div class="tech-primary">
                <div class="numero-gigante">${t.id}</div>
                <div class="tech-title"><span class="capitular">${letraInicial}</span>${t.nombre.substring(1)}</div>
                <div class="card"><h3>📜 Teoría morfosintáctica y semántica</h3><p>${t.teoria || "Teoría no disponible."}</p></div>
                <div class="card"><h3>❧ Ejemplo de uso</h3><p>${t.ejemplo || "Ejemplo no disponible."}</p></div>
                <div class="card"><h3>✍️ Ejercicio práctico</h3><p>${t.ejercicio || "Ejercicio no disponible."}</p>
                    <textarea id="respuestaTextAreaLux" rows="4" placeholder="Escribe aquí tu práctica de puntuación...">${t.respuestaUsuario || ""}</textarea>
                    <div style="margin-top: 0.5rem;">
                        <button class="btn-nav btn-show-answer" id="btnMostrarRespuesta">📖 Ver respuesta correcta</button>
                    </div>
                    <div id="respuestaCorrectaPanel" class="respuesta-correcta">
                        <strong>✓ Respuesta modelo:</strong><br>${t.respuesta || "Respuesta no disponible."}
                    </div>
                </div>
                <div style="margin: 2rem 0;">
                    <button class="btn-nav" id="btnAnterior">← anterior</button>
                    <button class="btn-nav btn-complete" id="btnCompletar">${t.completada ? "✓ Completada" : "◌ Marcar completada"}</button>
                    <button class="btn-nav" id="btnSiguiente">siguiente →</button>
                </div>
            </div>
            <div class="tech-aside">
                <div><strong>⚜ Progreso global</strong><div class="progress-unit"><div style="width:${(tecnicas.filter(tc=>tc.completada).length/100)*100}%; height:6px; background:var(--oro-antiguo); border-radius:30px;"></div></div>
                <p>${tecnicas.filter(tc=>tc.completada).length} de 100 técnicas</p>
                <hr style="margin:1rem 0; border-color:#cfc3ad;">
                <p><strong>📖 Signo principal</strong><br>${t.nombre.split(':')[0]}</p>
                <p><strong>🎨 Función pragmática</strong><br>La puntuación organiza el sentido, evita ambigüedad y construye la voz autoral.</p>
                <div class="ornament-line" style="font-size:1.2rem;">⁂ § ⚜</div>
                <p style="margin-top:1rem; font-size:0.8rem;">“Los signos de puntuación son las notas musicales del lenguaje”.</p>
            </div>
        `;
        const textarea = document.getElementById("respuestaTextAreaLux");
        if (textarea) {
            textarea.addEventListener("input", (e) => {
                tecnicas[currentTechIdx].respuestaUsuario = e.target.value;
                guardarProgreso();
            });
        }
        const btnRespuesta = document.getElementById("btnMostrarRespuesta");
        const panelRespuesta = document.getElementById("respuestaCorrectaPanel");
        if (btnRespuesta && panelRespuesta) {
            btnRespuesta.addEventListener("click", () => {
                panelRespuesta.classList.toggle("visible");
            });
        }
        document.getElementById("btnAnterior")?.addEventListener("click", () => {
            if (currentTechIdx > 0) { currentTechIdx--; renderVistaTecnica(); window.scrollTo(0, 0); }
        });
        document.getElementById("btnSiguiente")?.addEventListener("click", () => {
            if (currentTechIdx < 99) { currentTechIdx++; renderVistaTecnica(); window.scrollTo(0, 0); }
        });
        document.getElementById("btnCompletar")?.addEventListener("click", () => {
            tecnicas[currentTechIdx].completada = !tecnicas[currentTechIdx].completada;
            guardarProgreso();
            renderVistaTecnica();
            renderIndiceLateral();
        });
    }

    // Sidebar y buscador
    const menuBtn = document.getElementById("menuToggleBtn");
    const sidebar = document.getElementById("luxSidebar");
    const closeBtn = document.getElementById("closeSidebarBtn");
    menuBtn?.addEventListener("click", () => sidebar.classList.toggle("open"));
    closeBtn?.addEventListener("click", () => sidebar.classList.remove("open"));
    const searchInput = document.getElementById("searchTech");
    searchInput?.addEventListener("input", () => renderIndiceLateral());

    function inicializar() {
        cargarProgreso();
        renderVistaTecnica();
        window.addEventListener("beforeunload", () => guardarProgreso());
    }
    inicializar();
</script>
