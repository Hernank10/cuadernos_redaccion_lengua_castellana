    <style>

        body {

        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {

        .header h1 {

        }
        .header h1 span {

        .block-nav button {

        .card-flip.flipped .card-flip-inner { transform: rotateY(180deg); }
        .card-front, .card-back {

            border-radius: 24px;

        .card-back {

        .quiz-section {

        .quiz-section h2 {

        }
        .quiz-opciones button.incorrect {

        }

        .footer {

            .cards-grid { grid-template-columns: 1fr; }
            .quiz-section { padding: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <h1>🌀 Hipótiposis de ciencia ficción <span>100 técnicas</span></h1>
        <div class="sub">narrativas · descriptivas · argumentativas · expositivas · figuras retóricas</div>
    </div>

    <div class="block-nav" id="blockNav"></div>
    <div id="cardsGrid" class="cards-grid"></div>

    <div class="quiz-section" id="quizSection">
        <h2>🧠 Cuestionario <small>hipótiposis de ciencia ficción con figuras retóricas</small></h2>
        <div id="quizContainer"></div>
    </div>
    <div class="footer">Escribe tu respuesta en cada tarjeta y verifica · Explora las imágenes vívidas del cosmos</div>
</div>

<script>
    // ================================================================
    // 100 TÉCNICAS DE HIPÓTIPOSIS DE CIENCIA FICCIÓN CON FIGURAS RETÓRICAS
    // Cada técnica combina una hipótiposis (descripción vívida que hace presente lo ausente)
    // con una figura retórica específica.
    // Distribuidas en 4 bloques: Narrativo, Descriptivo, Argumentativo, Expositivo.
    // ================================================================
    const TECNICAS = [];

    // =================== BLOQUE 1: HIPÓTIPOSIS NARRATIVA DE CIENCIA FICCIÓN (25) ===================
    const narrativos = [
        { nombre: "El agujero negro devorador", teoria: "Hipótiposis narrativa con metáfora: el agujero negro como un monstruo.", ejemplo: "El agujero negro devoraba estrellas con su fauces de gravedad.", ejercicio: "¿Qué figura retórica describe un agujero negro como un devorador?", respuesta: "metáfora" },
        { nombre: "La explosión de la supernova", teoria: "Hipótiposis narrativa con símil.", ejemplo: "La supernova estalló como un millón de soles en un instante.", ejercicio: "¿Qué figura retórica usa 'como' en la descripción?", respuesta: "símil" },
        { nombre: "El viaje interestelar", teoria: "Hipótiposis narrativa con personificación.", ejemplo: "La nave surcaba el vacío con la gracia de una ballena cósmica.", ejercicio: "¿Qué figura retórica da cualidades humanas a la nave?", respuesta: "personificación" },
        { nombre: "El encuentro con alienígenas", teoria: "Hipótiposis narrativa con hipérbole.", ejemplo: "Sus ojos eran galaxias enteras.", ejercicio: "¿Qué figura retórica exagera la descripción?", respuesta: "hipérbole" },
        { nombre: "La colonia espacial", teoria: "Hipótiposis narrativa con ironía.", ejemplo: "Qué pacífica era la colonia, con sus guerras de sombras.", ejercicio: "¿Qué figura retórica usa ironía en la descripción?", respuesta: "ironía" },
        { nombre: "El planeta desolado", teoria: "Hipótiposis narrativa con litotes.", ejemplo: "No era un planeta común, era un desierto de ruinas.", ejercicio: "¿Qué figura retórica niega lo contrario para describir?", respuesta: "litotes" },
        { nombre: "La nave nodriza", teoria: "Hipótiposis narrativa con perífrasis.", ejemplo: "La madre de todas las naves, la ciudad del espacio.", ejercicio: "¿Qué figura retórica usa un rodeo para describir?", respuesta: "perífrasis" },
        { nombre: "El cíborg legendario", teoria: "Hipótiposis narrativa con antonomasia.", ejemplo: "El inmortal, así llamaban al cíborg.", ejercicio: "¿Qué figura retórica sustituye el nombre por una cualidad?", respuesta: "antonomasia" },
        { nombre: "La guerra de las galaxias", teoria: "Hipótiposis narrativa con alegoría.", ejemplo: "La guerra era un espejo de la lucha eterna entre el bien y el mal.", ejercicio: "¿Qué figura retórica es una metáfora extendida?", respuesta: "alegoría" },
        { nombre: "El agujero de gusano", teoria: "Hipótiposis narrativa con oxímoron.", ejemplo: "El túnel era un puente de tiempo y espacio.", ejercicio: "¿Qué figura retórica une opuestos en la descripción?", respuesta: "oxímoron" },
        { nombre: "El viaje en el tiempo", teoria: "Hipótiposis narrativa con paradoja.", ejemplo: "El viaje era un presente que nunca llegaba.", ejercicio: "¿Qué figura retórica es una contradicción verdadera?", respuesta: "paradoja" },
        { nombre: "El robot gigante", teoria: "Hipótiposis narrativa con sinécdoque.", ejemplo: "Cien brazos de acero levantaban la ciudad.", ejercicio: "¿Qué figura retórica usa la parte por el todo?", respuesta: "sinécdoque" },
        { nombre: "El holograma del pasado", teoria: "Hipótiposis narrativa con metonimia.", ejemplo: "El holograma era un eco del tiempo.", ejercicio: "¿Qué figura retórica usa una relación de contigüidad?", respuesta: "metonimia" },
        { nombre: "La lluvia de estrellas", teoria: "Hipótiposis narrativa con anáfora.", ejemplo: "Caían, caían, caían estrellas del cielo.", ejercicio: "¿Qué figura retórica repite al inicio?", respuesta: "anáfora" },
        { nombre: "El desierto de hielo", teoria: "Hipótiposis narrativa con epífora.", ejemplo: "...de hielo, ...de hielo, ...de hielo.", ejercicio: "¿Qué figura retórica repite al final?", respuesta: "epífora" },
        { nombre: "El campo de batalla estelar", teoria: "Hipótiposis narrativa con quiasmo.", ejemplo: "Cuando las naves eran fuego, el fuego era naves.", ejercicio: "¿Qué figura retórica cruza elementos?", respuesta: "quiasmo" },
        { nombre: "La evolución del mutante", teoria: "Hipótiposis narrativa con gradación.", ejemplo: "Mutaba, crecía, se transformaba en luz.", ejercicio: "¿Qué figura retórica usa progresión?", respuesta: "gradación" },
        { nombre: "El ascenso del cíborg", teoria: "Hipótiposis narrativa con clímax.", ejemplo: "Resistió, luchó, venció, ascendió al cosmos.", ejercicio: "¿Qué figura retórica es una gradación ascendente?", respuesta: "clímax" },
        { nombre: "El susurro del vacío", teoria: "Hipótiposis narrativa con apóstrofe.", ejemplo: "¡Oh, vacío, habla!", ejercicio: "¿Qué figura retórica se dirige a lo ausente?", respuesta: "apóstrofe" },
        { nombre: "El enigma de la señal", teoria: "Hipótiposis narrativa con interrogación retórica.", ejemplo: "¿Quién no ha soñado con una señal de las estrellas?", ejercicio: "¿Qué figura retórica usa preguntas retóricas?", respuesta: "interrogación retórica" },
        { nombre: "El planeta perdido", teoria: "Hipótiposis narrativa con exclamación.", ejemplo: "¡Qué desolación tan hermosa!", ejercicio: "¿Qué figura retórica usa exclamación?", respuesta: "exclamación" },
        { nombre: "La IA despierta", teoria: "Hipótiposis narrativa con sarcasmo.", ejemplo: "Qué humano es el robot.", ejercicio: "¿Qué figura retórica usa sarcasmo?", respuesta: "sarcasmo" },
        { nombre: "El universo en expansión", teoria: "Hipótiposis narrativa con antítesis.", ejemplo: "Luz y oscuridad, el universo en expansión.", ejercicio: "¿Qué figura retórica contrapone ideas?", respuesta: "antítesis" },
        { nombre: "El ciclo del tiempo", teoria: "Hipótiposis narrativa con epanadiplosis.", ejemplo: "Tiempo, eres tiempo.", ejercicio: "¿Qué figura retórica repite al inicio y al final?", respuesta: "epanadiplosis" },
        { nombre: "El viaje de la vida", teoria: "Hipótiposis narrativa con paralelismo.", ejemplo: "Vivir es viajar, viajar es vivir.", ejercicio: "¿Qué figura retórica usa estructuras paralelas?", respuesta: "paralelismo" },
    ];
    narrativos.forEach((t, i) => TECNICAS.push({ id: i+1, bloque: 1, categoria: "narrativo", ...t }));

    // =================== BLOQUE 2: HIPÓTIPOSIS DESCRIPTIVA DE CIENCIA FICCIÓN (25) ===================
    const descriptivos = [
        { nombre: "El mar de estrellas", teoria: "Hipótiposis descriptiva con metáfora.", ejemplo: "El mar de estrellas se extendía como un océano de luz.", ejercicio: "¿Qué figura retórica describe el cielo como un mar?", respuesta: "metáfora" },
        { nombre: "La luz de la nebulosa", teoria: "Hipótiposis descriptiva con símil.", ejemplo: "La nebulosa brillaba como un lienzo de colores.", ejercicio: "¿Qué figura retórica usa símil para describir?", respuesta: "símil" },
        { nombre: "El viento de Marte", teoria: "Hipótiposis descriptiva con personificación.", ejemplo: "El viento marciano susurraba secretos antiguos.", ejercicio: "¿Qué figura retórica da vida al viento?", respuesta: "personificación" },
        { nombre: "El cráter lunar", teoria: "Hipótiposis descriptiva con hipérbole.", ejemplo: "El cráter era tan profundo como el abismo del tiempo.", ejercicio: "¿Qué figura retórica exagera la descripción?", respuesta: "hipérbole" },
        { nombre: "El desierto de hielo", teoria: "Hipótiposis descriptiva con sinestesia.", ejemplo: "El frío tenía un olor a metal y silencio.", ejercicio: "¿Qué figura retórica mezcla sentidos?", respuesta: "sinestesia" },
        { nombre: "El océano de metano", teoria: "Hipótiposis descriptiva con oxímoron.", ejemplo: "El océano era frío y ardiente a la vez.", ejercicio: "¿Qué figura retórica une opuestos?", respuesta: "oxímoron" },
        { nombre: "El bosque de cristal", teoria: "Hipótiposis descriptiva con paradoja.", ejemplo: "El bosque era eterno y frágil, un sueño de hielo.", ejercicio: "¿Qué figura retórica es una contradicción descriptiva?", respuesta: "paradoja" },
        { nombre: "La ciudad flotante", teoria: "Hipótiposis descriptiva con litotes.", ejemplo: "No era una ciudad cualquiera, flotaba en el cielo.", ejercicio: "¿Qué figura retórica usa litotes para describir?", respuesta: "litotes" },
        { nombre: "El templo de los dioses", teoria: "Hipótiposis descriptiva con perífrasis.", ejemplo: "El lugar donde los dioses tocaban la tierra.", ejercicio: "¿Qué figura retórica usa un rodeo descriptivo?", respuesta: "perífrasis" },
        { nombre: "El jardín de las estrellas", teoria: "Hipótiposis descriptiva con antonomasia.", ejemplo: "El jardín de los dioses, así llamaban a la nebulosa.", ejercicio: "¿Qué figura retórica sustituye el nombre por cualidad?", respuesta: "antonomasia" },
        { nombre: "El abismo de luz", teoria: "Hipótiposis descriptiva con cromatismo.", ejemplo: "El abismo era un azul profundo que se perdía en la eternidad.", ejercicio: "¿Qué figura retórica usa colores en la descripción?", respuesta: "cromatismo" },
        { nombre: "El río de fuego", teoria: "Hipótiposis descriptiva con epíteto.", ejemplo: "El ardiente río de fuego serpenteaba por el valle.", ejercicio: "¿Qué figura retórica usa adjetivos expresivos?", respuesta: "epíteto" },
        { nombre: "El valle de la luna", teoria: "Hipótiposis descriptiva con hipótiposis.", ejemplo: "El valle era un paisaje de sueños, con cráteres que parecían ojos.", ejercicio: "¿Qué figura retórica hace presente lo ausente?", respuesta: "hipótiposis" },
        { nombre: "El puente de luz", teoria: "Hipótiposis descriptiva con diáfasis.", ejemplo: "El puente era como un arco iris de energía.", ejercicio: "¿Qué figura retórica describe por comparación?", respuesta: "diáfasis" },
        { nombre: "El espejo del tiempo", teoria: "Hipótiposis descriptiva con iconografía.", ejemplo: "El espejo reflejaba el tiempo como una espiral.", ejercicio: "¿Qué figura retórica describe con imágenes simbólicas?", respuesta: "iconografía" },

        { nombre: "El viaje interestelar", teoria: "Hipótiposis argumentativa con analogía.", ejemplo: "El viaje interestelar es como la evolución de la humanidad.", ejercicio: "¿Qué figura retórica usa analogía?", respuesta: "analogía" },
        { nombre: "El futuro de la colonia", teoria: "Hipótiposis argumentativa con ejemplificación.", ejemplo: "Como las colonias de Marte, nuestro futuro es espacial.", ejercicio: "¿Qué figura retórica usa ejemplos?", respuesta: "ejemplificación" },

        { nombre: "La antítesis del vacío", teoria: "Hipótiposis argumentativa con antítesis.", ejemplo: "No es vacío, es plenitud.", ejercicio: "¿Qué figura retórica contrapone ideas?", respuesta: "antítesis" },
        { nombre: "La paradoja del tiempo", teoria: "Hipótiposis argumentativa con paradoja.", ejemplo: "El tiempo es la paradoja de la existencia.", ejercicio: "¿Qué figura retórica usa contradicción lógica?", respuesta: "paradoja" },

    argumentativos.forEach((t, i) => TECNICAS.push({ id: i+51, bloque: 3, categoria: "argumentativo", ...t }));

    // =================== BLOQUE 4: HIPÓTIPOSIS EXPOSITIVA DE CIENCIA FICCIÓN (25) ===================
    const expositivos = [
        { nombre: "Definición de hipótiposis", teoria: "Hipótiposis expositiva con definición.", ejemplo: "La hipótiposis es una descripción vívida que hace presente lo ausente.", ejercicio: "¿Qué figura retórica define un concepto?", respuesta: "definición" },
        { nombre: "Clasificación de nebulosas", teoria: "Hipótiposis expositiva con clasificación.", ejemplo: "Las nebulosas se clasifican en emisión, reflexión y oscura.", ejercicio: "¿Qué figura retórica clasifica elementos?", respuesta: "clasificación" },
        { nombre: "Comparación de galaxias", teoria: "Hipótiposis expositiva con comparación.", ejemplo: "La Vía Láctea es como una espiral de estrellas.", ejercicio: "¿Qué figura retórica compara elementos?", respuesta: "comparación" },
        { nombre: "Causa de la gravedad", teoria: "Hipótiposis expositiva con causalidad.", ejemplo: "La gravedad es causada por la curvatura del espacio.", ejercicio: "¿Qué figura retórica explica causas?", respuesta: "causalidad" },
        { nombre: "Efecto de la expansión", teoria: "Hipótiposis expositiva con efecto.", ejemplo: "La expansión del universo produce el desplazamiento al rojo.", ejercicio: "¿Qué figura retórica explica efectos?", respuesta: "efecto" },
        { nombre: "Análisis del ADN alienígena", teoria: "Hipótiposis expositiva con análisis.", ejemplo: "El ADN alienígena se compone de cuatro bases diferentes.", ejercicio: "¿Qué figura retórica descompone en partes?", respuesta: "análisis" },
        { nombre: "Síntesis de la evolución", teoria: "Hipótiposis expositiva con síntesis.", ejemplo: "La evolución es la síntesis de la adaptación y la selección.", ejercicio: "¿Qué figura retórica integra ideas?", respuesta: "síntesis" },
        { nombre: "Ejemplo de exoplaneta", teoria: "Hipótiposis expositiva con ejemplificación.", ejemplo: "Como Próxima b, un exoplaneta habitable.", ejercicio: "¿Qué figura retórica usa ejemplos?", respuesta: "ejemplificación" },
        { nombre: "Paráfrasis de la teoría", teoria: "Hipótiposis expositiva con paráfrasis.", ejemplo: "Es decir, el universo es un holograma.", ejercicio: "¿Qué figura retórica reformula una idea?", respuesta: "paráfrasis" },
        { nombre: "Resumen del cosmos", teoria: "Hipótiposis expositiva con resumen.", ejemplo: "En resumen, el universo es infinito y en expansión.", ejercicio: "¿Qué figura retórica sintetiza?", respuesta: "resumen" },
        { nombre: "Glosa de la física cuántica", teoria: "Hipótiposis expositiva con glosa.", ejemplo: "Cabe decir que la física cuántica desafía la lógica.", ejercicio: "¿Qué figura retórica comenta un tema?", respuesta: "glosa" },
        { nombre: "Transición al futuro", teoria: "Hipótiposis expositiva con transición.", ejemplo: "Ahora, el futuro es la exploración espacial.", ejercicio: "¿Qué figura retórica conecta ideas?", respuesta: "transición" },
        { nombre: "Recapitulación de la ciencia", teoria: "Hipótiposis expositiva con recapitulación.", ejemplo: "Retomando la ciencia, la física es la base.", ejercicio: "¿Qué figura retórica recapitula?", respuesta: "recapitulación" },
        { nombre: "Conclusión sobre la vida", teoria: "Hipótiposis expositiva con conclusión.", ejemplo: "Finalmente, la vida es el milagro del cosmos.", ejercicio: "¿Qué figura retórica concluye?", respuesta: "conclusión" },
        { nombre: "Recomendación sobre la colonia", teoria: "Hipótiposis expositiva con recomendación.", ejemplo: "Te sugiero que estudies la colonia marciana.", ejercicio: "¿Qué figura retórica recomienda?", respuesta: "recomendación" },
        { nombre: "Advertencia sobre el viaje", teoria: "Hipótiposis expositiva con advertencia.", ejemplo: "Cuida el viaje, el espacio es hostil.", ejercicio: "¿Qué figura retórica advierte?", respuesta: "advertencia" },
        { nombre: "Corrección de la descripción", teoria: "Hipótiposis expositiva con corrección.", ejemplo: "Más bien, el agujero negro es un túnel.", ejercicio: "¿Qué figura retórica corrige?", respuesta: "corrección" },
        { nombre: "Hipótesis sobre el multiverso", teoria: "Hipótiposis expositiva con hipótesis.", ejemplo: "Si el multiverso existe, entonces todo es posible.", ejercicio: "¿Qué figura retórica plantea hipótesis?", respuesta: "hipótesis" },
        { nombre: "Atenuación de la teoría", teoria: "Hipótiposis expositiva con atenuación.", ejemplo: "Quizás, la teoría de cuerdas sea la clave.", ejercicio: "¿Qué figura retórica atenúa una idea?", respuesta: "atenuación" },
        { nombre: "Énfasis en la evolución", teoria: "Hipótiposis expositiva con énfasis.", ejemplo: "Sin duda, la evolución es la respuesta.", ejercicio: "¿Qué figura retórica enfatiza?", respuesta: "énfasis" },
        { nombre: "Generalización sobre la vida", teoria: "Hipótiposis expositiva con generalización.", ejemplo: "Toda vida busca la luz.", ejercicio: "¿Qué figura retórica generaliza?", respuesta: "generalización" },
        { nombre: "Precisión de la física", teoria: "Hipótiposis expositiva con precisión.", ejemplo: "Exactamente, la física es la ciencia del universo.", ejercicio: "¿Qué figura retórica precisa?", respuesta: "precisión" },
        { nombre: "Matización del destino", teoria: "Hipótiposis expositiva con matización.", ejemplo: "No obstante, el destino no es fijo.", ejercicio: "¿Qué figura retórica matiza?", respuesta: "matización" },
        { nombre: "Conclusión positiva", teoria: "Hipótiposis expositiva con conclusión positiva.", ejemplo: "Al final, el cosmos es bello.", ejercicio: "¿Qué figura retórica concluye con optimismo?", respuesta: "conclusión positiva" },
        { nombre: "Verdad universal del universo", teoria: "Hipótiposis expositiva con verdad universal.", ejemplo: "El universo es el espejo del ser.", ejercicio: "¿Qué figura retórica expresa una verdad eterna?", respuesta: "verdad universal" },
    ];
    expositivos.forEach((t, i) => TECNICAS.push({ id: i+76, bloque: 4, categoria: "expositivo", ...t }));

    TECNICAS.sort((a,b) => a.id - b.id);

    // ========== RENDER ==========
    const blockNav = document.getElementById('blockNav');
    const cardsGrid = document.getElementById('cardsGrid');
    const quizContainer = document.getElementById('quizContainer');

    let currentBlock = 1;
    const BLOCK_NAMES = ['', 'Hipótiposis narrativas', 'Hipótiposis descriptivas', 'Hipótiposis argumentativas', 'Hipótiposis expositivas'];

    for (let i = 1; i <= 4; i++) {
        const btn = document.createElement('button');
        btn.textContent = `${i}. ${BLOCK_NAMES[i]}`;
        btn.dataset.block = i;
        btn.addEventListener('click', () => {
            currentBlock = i;
            renderCards(i);
            updateNav(i);
        });
        blockNav.appendChild(btn);
    }

    function updateNav(block) {
        document.querySelectorAll('.block-nav button').forEach(b => b.classList.toggle('active', parseInt(b.dataset.block) === block));
    }
    updateNav(1);

    window.verificarRespuesta = function(id) {
        const input = document.getElementById(`input-${id}`);
        const feedback = document.getElementById(`feedback-${id}`);
        const correcta = document.getElementById(`correcta-${id}`);
        if (!input || !feedback) return;
        const valor = input.value.trim().toLowerCase();
        const respuestaCorrecta = correcta ? correcta.textContent.toLowerCase() : '';
        if (valor === '' || valor === '...') {
            feedback.textContent = '✏️ Escribe tu respuesta primero.';
            feedback.className = 'feedback-msg';
            return;
        }
        const normalize = (s) => s.replace(/\s+/g, ' ').trim();
        const esCorrecto = normalize(valor) === normalize(respuestaCorrecta) ||
                           normalize(valor).includes(normalize(respuestaCorrecta)) ||
                           normalize(respuestaCorrecta).includes(normalize(valor));
        if (esCorrecto) {
            feedback.textContent = '✅ ¡Correcto! Bien hecho.';
            feedback.className = 'feedback-msg correcto';
        } else {
            feedback.textContent = `❌ Incorrecto. La respuesta correcta es: "${respuestaCorrecta}"`;
            feedback.className = 'feedback-msg incorrecto';
        }
    };

    function renderCards(block) {
        const filtered = TECNICAS.filter(t => t.bloque === block);
        cardsGrid.innerHTML = filtered.map((t, idx) => {
            return `
                <div class="card-flip" data-id="${t.id}" onclick="this.classList.toggle('flipped')">
                    <div class="card-flip-inner">
                        <div class="card-front">
                            <div class="numero">${t.id}</div>
                            <span class="categoria">${t.categoria}</span>
                            <h3>${t.nombre}</h3>
                            <div class="teoria">${t.teoria}</div>
                            <div class="girar-indicador">↻ tocar para practicar</div>
                        </div>
                        <div class="card-back">
                            <div style="font-weight:600;color:#8bc4e0;margin-bottom:0.2rem;">🌀 ${t.nombre}</div>
                            <div class="ejemplo"><strong>Ejemplo:</strong> ${t.ejemplo}</div>
                            <div class="ejercicio">✏️ ${t.ejercicio}</div>
                            <div class="respuesta-area">
                                <input type="text" id="input-${t.id}" placeholder="Escribe tu respuesta..." />
                                <button class="btn-verificar" onclick="verificarRespuesta(${t.id})">Comprobar</button>
                            </div>
                            <div id="feedback-${t.id}" class="feedback-msg"></div>
                            <div id="correcta-${t.id}" style="display:none;">${t.respuesta}</div>
                            <div class="respuesta-correcta">✓ ${t.respuesta}</div>
                            <div class="etiqueta">técnica #${t.id} · ${t.categoria}</div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ========== QUIZ ==========
    let quizQuestions = [];
    let currentQuizIndex = 0;
    let score = 0;
    let answered = false;

    function generateQuiz() {
        const shuffled = [...TECNICAS].sort(() => Math.random() - 0.5);
        quizQuestions = shuffled.slice(0, 10).map(t => {
            const opts = [t.respuesta];
            const others = TECNICAS.filter(x => x.id !== t.id);
            const shuffledOthers = others.sort(() => Math.random() - 0.5);
            for (let i = 0; i < 3; i++) {
                if (shuffledOthers[i]) opts.push(shuffledOthers[i].respuesta);
            }
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return {
                pregunta: `📌 ${t.ejercicio} (técnica: ${t.nombre})`,
                opciones: opts,
                correcta: t.respuesta,
                id: t.id
            };
        });
        currentQuizIndex = 0;
        score = 0;
        answered = false;
        renderQuiz();
    }

    function renderQuiz() {
        if (!quizQuestions.length) return;
        const q = quizQuestions[currentQuizIndex];
        const total = quizQuestions.length;
        let html = `
            <div class="quiz-pregunta">
                <p>${q.pregunta}</p>
                <div class="quiz-opciones" id="quizOptions">
        `;
        q.opciones.forEach((op, idx) => {
            html += `<button data-idx="${idx}" onclick="checkAnswer(${idx})">${op}</button>`;
        });
        html += `</div>
                <div id="quizFeedback" style="margin-top:0.8rem;"></div>
                <div class="quiz-result" id="quizScore">Puntuación: ${score}/${total}</div>
            </div>
            <div class="quiz-controles">
                <button id="nextQuizBtn" disabled>→ Siguiente</button>
                <button onclick="generateQuiz()">🔄 Nuevo cuestionario</button>
            </div>
        `;
        quizContainer.innerHTML = html;
        answered = false;
        document.getElementById('nextQuizBtn').disabled = true;
    }

    window.checkAnswer = function(idx) {
        if (answered) return;
        const q = quizQuestions[currentQuizIndex];
        const buttons = document.querySelectorAll('#quizOptions button');
        buttons.forEach((b, i) => {
            b.disabled = true;
            if (i === idx) {
                const esCorrecta = q.opciones[idx] === q.correcta;
                b.classList.add(esCorrecta ? 'correct' : 'incorrect');
                if (esCorrecta) score++;
            }
            if (q.opciones[i] === q.correcta) {
                buttons[i].classList.add('correct');
            }
        });
        answered = true;
        document.getElementById('nextQuizBtn').disabled = false;
        document.getElementById('quizScore').textContent = `Puntuación: ${score}/${quizQuestions.length}`;
        const fb = document.getElementById('quizFeedback');
        fb.innerHTML = `<span style="background:#2a5a7a;color:#e0f0ff;padding:0.2rem 1rem;border-radius:40px;">✅ Respuesta correcta: ${q.correcta}</span>`;
    };

    document.addEventListener('click', function(e) {
        if (e.target.id === 'nextQuizBtn') {
            if (currentQuizIndex < quizQuestions.length - 1) {
                currentQuizIndex++;
                renderQuiz();
            } else {
                alert(`¡Cuestionario finalizado! Puntuación: ${score}/${quizQuestions.length}`);
                document.getElementById('nextQuizBtn').disabled = true;
            }
        }
    });

    // Inicializar
    renderCards(1);
    generateQuiz();
</script>
</body>
