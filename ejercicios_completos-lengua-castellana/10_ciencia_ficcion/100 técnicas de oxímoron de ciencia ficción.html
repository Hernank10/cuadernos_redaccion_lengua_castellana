        }
    </style>
</head>

<script>
    // ================================================================
    // 100 TÉCNICAS DE OXÍMORON DE CIENCIA FICCIÓN CON FIGURAS RETÓRICAS
    // Cada técnica combina un oxímoron (unión de opuestos) con una figura retórica.
    // Distribuidas en 4 bloques: Narrativo, Descriptivo, Argumentativo, Expositivo.
    // ================================================================
    const TECNICAS = [];

    // =================== BLOQUE 1: OXÍMORON NARRATIVO DE CIENCIA FICCIÓN (25) ===================
    const narrativos = [
        { nombre: "Silencio atronador", teoria: "Oxímoron narrativo: un silencio que se siente como un trueno.", ejemplo: "El silencio atronador del espacio vacío.", ejercicio: "¿Qué oxímoron narrativo combina silencio y ruido?", respuesta: "silencio atronador" },
        { nombre: "Oscuridad radiante", teoria: "Oxímoron narrativo: una oscuridad que emite luz.", ejemplo: "La oscuridad radiante de un agujero negro.", ejercicio: "¿Qué oxímoron describe algo oscuro pero luminoso?", respuesta: "oscuridad radiante" },
        { nombre: "Soledad poblada", teoria: "Oxímoron narrativo: una soledad llena de presencias.", ejemplo: "La soledad poblada de la nave espacial.", ejercicio: "¿Qué oxímoron combina soledad y compañía?", respuesta: "soledad poblada" },
        { nombre: "Eternidad fugaz", teoria: "Oxímoron narrativo: un instante que dura para siempre.", ejemplo: "La eternidad fugaz de un viaje interestelar.", ejercicio: "¿Qué oxímoron describe un tiempo infinito pero breve?", respuesta: "eternidad fugaz" },
        { nombre: "Muerte viviente", teoria: "Oxímoron narrativo: algo que está muerto pero se mueve.", ejemplo: "La muerte viviente de los androides conscientes.", ejercicio: "¿Qué oxímoron describe la vida en la muerte?", respuesta: "muerte viviente" },
        { nombre: "Cautiverio libre", teoria: "Oxímoron narrativo: una prisión que es libertad.", ejemplo: "El cautiverio libre de los viajeros espaciales.", ejercicio: "¿Qué oxímoron combina cárcel y libertad?", respuesta: "cautiverio libre" },
        { nombre: "Olvido presente", teoria: "Oxímoron narrativo: un recuerdo que es olvido.", ejemplo: "El olvido presente de los clones.", ejercicio: "¿Qué oxímoron describe la memoria y el olvido juntos?", respuesta: "olvido presente" },
        { nombre: "Paz bélica", teoria: "Oxímoron narrativo: una paz que es guerra.", ejemplo: "La paz bélica de las colonias espaciales.", ejercicio: "¿Qué oxímoron combina paz y guerra?", respuesta: "paz bélica" },
        { nombre: "Orden caótico", teoria: "Oxímoron narrativo: un caos que tiene orden.", ejemplo: "El orden caótico del universo cuántico.", ejercicio: "¿Qué oxímoron describe orden en el caos?", respuesta: "orden caótico" },
        { nombre: "Frío ardiente", teoria: "Oxímoron narrativo: un frío que quema.", ejemplo: "El frío ardiente del espacio profundo.", ejercicio: "¿Qué oxímoron combina frío y calor?", respuesta: "frío ardiente" },
        { nombre: "Luz sombría", teoria: "Oxímoron narrativo: una luz que es oscura.", ejemplo: "La luz sombría de una estrella moribunda.", ejercicio: "¿Qué oxímoron describe una luz tenebrosa?", respuesta: "luz sombría" },
        { nombre: "Canto mudo", teoria: "Oxímoron narrativo: un canto sin sonido.", ejemplo: "El canto mudo de las pulsares.", ejercicio: "¿Qué oxímoron combina canto y silencio?", respuesta: "canto mudo" },
        { nombre: "Sueño despierto", teoria: "Oxímoron narrativo: un sueño mientras se está despierto.", ejemplo: "El sueño despierto de los astronautas.", ejercicio: "¿Qué oxímoron describe la vigilia soñadora?", respuesta: "sueño despierto" },
        { nombre: "Vida eterna", teoria: "Oxímoron narrativo: una vida sin fin.", ejemplo: "La vida eterna de los robots inmortales.", ejercicio: "¿Qué oxímoron combina vida y fin?", respuesta: "vida eterna" },
        { nombre: "Nada infinita", teoria: "Oxímoron narrativo: un vacío infinito.", ejemplo: "La nada infinita del multiverso.", ejercicio: "¿Qué oxímoron describe la nada y el infinito?", respuesta: "nada infinita" },
        { nombre: "Fuerza frágil", teoria: "Oxímoron narrativo: una fuerza que es frágil.", ejemplo: "La fuerza frágil de la gravedad cuántica.", ejercicio: "¿Qué oxímoron combina fuerza y debilidad?", respuesta: "fuerza frágil" },
        { nombre: "Sabiduría ignorante", teoria: "Oxímoron narrativo: un sabio que no sabe.", ejemplo: "La sabiduría ignorante de la IA.", ejercicio: "¿Qué oxímoron describe el conocimiento y la ignorancia?", respuesta: "sabiduría ignorante" },
        { nombre: "Viaje inmóvil", teoria: "Oxímoron narrativo: un viaje sin movimiento.", ejemplo: "El viaje inmóvil del teletransporte.", ejercicio: "¿Qué oxímoron combina viaje y quietud?", respuesta: "viaje inmóvil" },
        { nombre: "Caída ascendente", teoria: "Oxímoron narrativo: una caída que sube.", ejemplo: "La caída ascendente hacia un agujero negro.", ejercicio: "¿Qué oxímoron describe una caída que es ascenso?", respuesta: "caída ascendente" },
        { nombre: "Eco sin voz", teoria: "Oxímoron narrativo: un eco sin origen.", ejemplo: "El eco sin voz de la señal perdida.", ejercicio: "¿Qué oxímoron combina eco y silencio?", respuesta: "eco sin voz" },
        { nombre: "Tiempo detenido", teoria: "Oxímoron narrativo: un tiempo que no avanza.", ejemplo: "El tiempo detenido de la nave en velocidad luz.", ejercicio: "¿Qué oxímoron describe el tiempo y la detención?", respuesta: "tiempo detenido" },
        { nombre: "Fuego helado", teoria: "Oxímoron narrativo: un fuego que congela.", ejemplo: "El fuego helado de la antimateria.", ejercicio: "¿Qué oxímoron combina fuego y hielo?", respuesta: "fuego helado" },
        { nombre: "Raíz sin planta", teoria: "Oxímoron narrativo: un origen sin forma.", ejemplo: "La raíz sin planta del árbol genético.", ejercicio: "¿Qué oxímoron describe el origen y lo originado?", respuesta: "raíz sin planta" },
        { nombre: "Estrella desaparecida", teoria: "Oxímoron narrativo: una estrella que ya no existe.", ejemplo: "La estrella desaparecida que aún ilumina.", ejercicio: "¿Qué oxímoron describe la luz de lo que ya no es?", respuesta: "estrella desaparecida" },
        { nombre: "Universo finito", teoria: "Oxímoron narrativo: un universo con límites.", ejemplo: "El universo finito y sin bordes.", ejercicio: "¿Qué oxímoron combina universo y finito?", respuesta: "universo finito" },
    ];
    narrativos.forEach((t, i) => TECNICAS.push({ id: i+1, bloque: 1, categoria: "narrativo", ...t }));

    // =================== BLOQUE 2: OXÍMORON DESCRIPTIVO DE CIENCIA FICCIÓN (25) ===================
    const descriptivos = [
        { nombre: "Negro brillante", teoria: "Oxímoron descriptivo: un negro que brilla.", ejemplo: "El negro brillante del espacio vacío.", ejercicio: "¿Qué oxímoron descriptivo combina negro y brillo?", respuesta: "negro brillante" },

        { nombre: "Mar de polvo", teoria: "Oxímoron descriptivo: un mar de polvo estelar.", ejemplo: "El mar de polvo de la nebulosa.", ejercicio: "¿Qué oxímoron describe el mar y el polvo?", respuesta: "mar de polvo" },
        { nombre: "Montaña vacía", teoria: "Oxímoron descriptivo: una montaña sin contenido.", ejemplo: "La montaña vacía de los cráteres.", ejercicio: "¿Qué oxímoron describe la montaña y el vacío?", respuesta: "montaña vacía" },
        { nombre: "Lluvia seca", teoria: "Oxímoron descriptivo: una lluvia sin agua.", ejemplo: "La lluvia seca de meteoritos.", ejercicio: "¿Qué oxímoron describe la lluvia y la sequedad?", respuesta: "lluvia seca" },
        { nombre: "Viento quieto", teoria: "Oxímoron descriptivo: un viento inmóvil.", ejemplo: "El viento quieto en la estación espacial.", ejercicio: "¿Qué oxímoron describe el viento y la quietud?", respuesta: "viento quieto" },
        { nombre: "Fuego frío", teoria: "Oxímoron descriptivo: un fuego sin calor.", ejemplo: "El fuego frío de la combustión en el vacío.", ejercicio: "¿Qué oxímoron describe el fuego y el frío?", respuesta: "fuego frío" },
        { nombre: "Flor de acero", teoria: "Oxímoron descriptivo: una flor metálica.", ejemplo: "La flor de acero de la estructura espacial.", ejercicio: "¿Qué oxímoron describe la flor y el metal?", respuesta: "flor de acero" },
        { nombre: "Árbol de cristal", teoria: "Oxímoron descriptivo: un árbol transparente.", ejemplo: "El árbol de cristal de la estación de investigación.", ejercicio: "¿Qué oxímoron describe el árbol y el cristal?", respuesta: "árbol de cristal" },
        { nombre: "Desierto verde", teoria: "Oxímoron descriptivo: un desierto con vegetación.", ejemplo: "El desierto verde del planeta terraformado.", ejercicio: "¿Qué oxímoron describe el desierto y el verde?", respuesta: "desierto verde" },
        { nombre: "Cielo subterráneo", teoria: "Oxímoron descriptivo: un cielo bajo tierra.", ejemplo: "El cielo subterráneo de las colonias.", ejercicio: "¿Qué oxímoron describe el cielo y el subsuelo?", respuesta: "cielo subterráneo" },
        { nombre: "Océano de nubes", teoria: "Oxímoron descriptivo: un océano de gas.", ejemplo: "El océano de nubes de Júpiter.", ejercicio: "¿Qué oxímoron describe el océano y las nubes?", respuesta: "océano de nubes" },
        { nombre: "Montaña de hielo", teoria: "Oxímoron descriptivo: una montaña helada.", ejemplo: "La montaña de hielo de los cometas.", ejercicio: "¿Qué oxímoron describe la montaña y el hielo?", respuesta: "montaña de hielo" },
        { nombre: "Ciudad fantasma", teoria: "Oxímoron descriptivo: una ciudad abandonada.", ejemplo: "La ciudad fantasma de la estación espacial.", ejercicio: "¿Qué oxímoron describe la ciudad y lo espectral?", respuesta: "ciudad fantasma" },

        { nombre: "Materia antimateria", teoria: "Oxímoron expositivo: materia y antimateria juntas.", ejemplo: "La materia antimateria del universo.", ejercicio: "¿Qué oxímoron describe materia y antimateria?", respuesta: "materia antimateria" },

        { nombre: "Luz cuántica", teoria: "Oxímoron expositivo: la luz en el mundo cuántico.", ejemplo: "La luz cuántica del láser.", ejercicio: "¿Qué oxímoron combina luz y cuántica?", respuesta: "luz cuántica" },
        { nombre: "Computadora cuántica", teoria: "Oxímoron expositivo: una computadora cuántica.", ejemplo: "La computadora cuántica del futuro.", ejercicio: "¿Qué oxímoron describe computadora y cuántica?", respuesta: "computadora cuántica" },

        { nombre: "Realidad virtual", teoria: "Oxímoron expositivo: una realidad no real.", ejemplo: "La realidad virtual del metaverso.", ejercicio: "¿Qué oxímoron combina realidad y virtualidad?", respuesta: "realidad virtual" },
        { nombre: "Tierra colonizada", teoria: "Oxímoron expositivo: una Tierra colonizada.", ejemplo: "La Tierra colonizada del futuro.", ejercicio: "¿Qué oxímoron describe la Tierra y colonización?", respuesta: "tierra colonizada" },
        { nombre: "Viaje temporal", teoria: "Oxímoron expositivo: viajar en el tiempo.", ejemplo: "El viaje temporal de la ciencia ficción.", ejercicio: "¿Qué oxímoron combina viaje y tiempo?", respuesta: "viaje temporal" },
        { nombre: "Máquina pensante", teoria: "Oxímoron expositivo: una máquina que piensa.", ejemplo: "La máquina pensante de la IA.", ejercicio: "¿Qué oxímoron describe máquina y pensamiento?", respuesta: "máquina pensante" },
        { nombre: "Vida sintética", teoria: "Oxímoron expositivo: una vida creada.", ejemplo: "La vida sintética en el laboratorio.", ejercicio: "¿Qué oxímoron combina vida y síntesis?", respuesta: "vida sintética" },
        { nombre: "Cuerpo digital", teoria: "Oxímoron expositivo: un cuerpo en el mundo digital.", ejemplo: "El cuerpo digital del avatar.", ejercicio: "¿Qué oxímoron describe cuerpo y digital?", respuesta: "cuerpo digital" },
        { nombre: "Mente expandida", teoria: "Oxímoron expositivo: una mente que se expande.", ejemplo: "La mente expandida de la IA.", ejercicio: "¿Qué oxímoron combina mente y expansión?", respuesta: "mente expandida" },
        { nombre: "Universo simulado", teoria: "Oxímoron expositivo: un universo que es simulación.", ejemplo: "El universo simulado del multiverso.", ejercicio: "¿Qué oxímoron describe universo y simulación?", respuesta: "universo simulado" },

        { nombre: "Dimensiones adicionales", teoria: "Oxímoron expositivo: dimensiones extras.", ejemplo: "Las dimensiones adicionales de la teoría M.", ejercicio: "¿Qué oxímoron describe dimensiones y adicionales?", respuesta: "dimensiones adicionales" },
        { nombre: "Teoría de todo", teoria: "Oxímoron expositivo: una teoría que lo abarca todo.", ejemplo: "La teoría de todo de la física.", ejercicio: "¿Qué oxímoron combina teoría y totalidad?", respuesta: "teoría de todo" },
        { nombre: "Ley de la naturaleza", teoria: "Oxímoron expositivo: una ley natural.", ejemplo: "La ley de la naturaleza de la gravedad.", ejercicio: "¿Qué oxímoron describe ley y naturaleza?", respuesta: "ley de la naturaleza" },
        { nombre: "Observador cuántico", teoria: "Oxímoron expositivo: un observador en el mundo cuántico.", ejemplo: "El observador cuántico en la dualidad.", ejercicio: "¿Qué oxímoron combina observador y cuántica?", respuesta: "observador cuántico" },
    ];
    expositivos.forEach((t, i) => TECNICAS.push({ id: i+76, bloque: 4, categoria: "expositivo", ...t }));

    TECNICAS.sort((a,b) => a.id - b.id);

    // ========== RENDER ==========
    const blockNav = document.getElementById('blockNav');
    const cardsGrid = document.getElementById('cardsGrid');
    const quizContainer = document.getElementById('quizContainer');

    let currentBlock = 1;
    const BLOCK_NAMES = ['', 'Oxímoron narrativos', 'Oxímoron descriptivos', 'Oxímoron argumentativos', 'Oxímoron expositivos'];

    for (let i = 1; i <= 4; i++) {
        const btn = document.createElement('button');
        btn.textContent = `${i}. ${BLOCK_NAMES[i]}`;
        btn.dataset.block = i;
        btn.addEventListener('click', () => {
            currentBlock = i;
            renderCards(i);
            updateNav(i);
        });
        blockNav.appendChild(btn);
    }

    function updateNav(block) {
        document.querySelectorAll('.block-nav button').forEach(b => b.classList.toggle('active', parseInt(b.dataset.block) === block));
    }
    updateNav(1);

    window.verificarRespuesta = function(id) {
        const input = document.getElementById(`input-${id}`);
        const feedback = document.getElementById(`feedback-${id}`);
        const correcta = document.getElementById(`correcta-${id}`);
        if (!input || !feedback) return;
        const valor = input.value.trim().toLowerCase();
        const respuestaCorrecta = correcta ? correcta.textContent.toLowerCase() : '';
        if (valor === '' || valor === '...') {
            feedback.textContent = '✏️ Escribe tu respuesta primero.';
            feedback.className = 'feedback-msg';
            return;
        }
        const normalize = (s) => s.replace(/\s+/g, ' ').trim();
        const esCorrecto = normalize(valor) === normalize(respuestaCorrecta) ||
                           normalize(valor).includes(normalize(respuestaCorrecta)) ||
                           normalize(respuestaCorrecta).includes(normalize(valor));
        if (esCorrecto) {
            feedback.textContent = '✅ ¡Correcto! Bien hecho.';
            feedback.className = 'feedback-msg correcto';
        } else {
            feedback.textContent = `❌ Incorrecto. La respuesta correcta es: "${respuestaCorrecta}"`;
            feedback.className = 'feedback-msg incorrecto';
        }
    };

    function renderCards(block) {
        const filtered = TECNICAS.filter(t => t.bloque === block);
        cardsGrid.innerHTML = filtered.map((t, idx) => {
            return `
                <div class="card-flip" data-id="${t.id}" onclick="this.classList.toggle('flipped')">
                    <div class="card-flip-inner">
                        <div class="card-front">
                            <div class="numero">${t.id}</div>
                            <span class="categoria">${t.categoria}</span>
                            <h3>${t.nombre}</h3>
                            <div class="teoria">${t.teoria}</div>
                            <div class="girar-indicador">↻ tocar para practicar</div>
                        </div>
                        <div class="card-back">
                            <div style="font-weight:600;color:#8bc4e0;margin-bottom:0.2rem;">⚡ ${t.nombre}</div>
                            <div class="ejemplo"><strong>Ejemplo:</strong> ${t.ejemplo}</div>
                            <div class="ejercicio">✏️ ${t.ejercicio}</div>
                            <div class="respuesta-area">
                                <input type="text" id="input-${t.id}" placeholder="Escribe tu respuesta..." />
                                <button class="btn-verificar" onclick="verificarRespuesta(${t.id})">Comprobar</button>
                            </div>
                            <div id="feedback-${t.id}" class="feedback-msg"></div>
                            <div id="correcta-${t.id}" style="display:none;">${t.respuesta}</div>
                            <div class="respuesta-correcta">✓ ${t.respuesta}</div>
                            <div class="etiqueta">técnica #${t.id} · ${t.categoria}</div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ========== QUIZ ==========
    let quizQuestions = [];
    let currentQuizIndex = 0;
    let score = 0;
    let answered = false;

    function generateQuiz() {
        const shuffled = [...TECNICAS].sort(() => Math.random() - 0.5);
        quizQuestions = shuffled.slice(0, 10).map(t => {
            const opts = [t.respuesta];
            const others = TECNICAS.filter(x => x.id !== t.id);
            const shuffledOthers = others.sort(() => Math.random() - 0.5);
            for (let i = 0; i < 3; i++) {
                if (shuffledOthers[i]) opts.push(shuffledOthers[i].respuesta);
            }
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return {
                pregunta: `📌 ${t.ejercicio} (técnica: ${t.nombre})`,
                opciones: opts,
                correcta: t.respuesta,
                id: t.id
            };
        });
        currentQuizIndex = 0;
        score = 0;
        answered = false;
        renderQuiz();
    }

    function renderQuiz() {
        if (!quizQuestions.length) return;
        const q = quizQuestions[currentQuizIndex];
        const total = quizQuestions.length;
        let html = `
            <div class="quiz-pregunta">
                <p>${q.pregunta}</p>
                <div class="quiz-opciones" id="quizOptions">
        `;
        q.opciones.forEach((op, idx) => {
            html += `<button data-idx="${idx}" onclick="checkAnswer(${idx})">${op}</button>`;
        });
        html += `</div>
                <div id="quizFeedback" style="margin-top:0.8rem;"></div>
                <div class="quiz-result" id="quizScore">Puntuación: ${score}/${total}</div>
            </div>
            <div class="quiz-controles">
                <button id="nextQuizBtn" disabled>→ Siguiente</button>
                <button onclick="generateQuiz()">🔄 Nuevo cuestionario</button>
            </div>
        `;
        quizContainer.innerHTML = html;
        answered = false;
        document.getElementById('nextQuizBtn').disabled = true;
    }

    window.checkAnswer = function(idx) {
        if (answered) return;
        const q = quizQuestions[currentQuizIndex];
        const buttons = document.querySelectorAll('#quizOptions button');
        buttons.forEach((b, i) => {
            b.disabled = true;
            if (i === idx) {
                const esCorrecta = q.opciones[idx] === q.correcta;
                b.classList.add(esCorrecta ? 'correct' : 'incorrect');
                if (esCorrecta) score++;
            }
            if (q.opciones[i] === q.correcta) {
                buttons[i].classList.add('correct');
            }
        });
        answered = true;
        document.getElementById('nextQuizBtn').disabled = false;
        document.getElementById('quizScore').textContent = `Puntuación: ${score}/${quizQuestions.length}`;
        const fb = document.getElementById('quizFeedback');
        fb.innerHTML = `<span style="background:#2a5a7a;color:#e0f0ff;padding:0.2rem 1rem;border-radius:40px;">✅ Respuesta correcta: ${q.correcta}</span>`;
    };

    document.addEventListener('click', function(e) {
        if (e.target.id === 'nextQuizBtn') {
            if (currentQuizIndex < quizQuestions.length - 1) {
                currentQuizIndex++;
                renderQuiz();
            } else {
                alert(`¡Cuestionario finalizado! Puntuación: ${score}/${quizQuestions.length}`);
                document.getElementById('nextQuizBtn').disabled = true;
            }
        }
    });

    // Inicializar
    renderCards(1);
    generateQuiz();
</script>
