<script>

    const TECNICAS = [];

    // =================== BLOQUE 1: SINÉCDOQUES NARRATIVAS DE CIENCIA FICCIÓN (25) ===================
    const narrativos = [
        { nombre: "Cien brazos de acero", teoria: "Sinécdoque narrativa (la parte por el todo) con metáfora.", ejemplo: "Cien brazos de acero construyeron la nave.", ejercicio: "¿Qué figura retórica usa la parte por el todo con metáfora?", respuesta: "metáfora" },

        { nombre: "La mano del destino", teoria: "Sinécdoque narrativa con personificación.", ejemplo: "La mano del destino guiaba la nave.", ejercicio: "¿Qué figura retórica da cualidades humanas a la parte?", respuesta: "personificación" },

        { nombre: "La sangre de las estrellas", teoria: "Sinécdoque narrativa con oxímoron.", ejemplo: "La sangre fría de las estrellas.", ejercicio: "¿Qué figura retórica une opuestos en la sinécdoque?", respuesta: "oxímoron" },
        { nombre: "La sombra del cíborg", teoria: "Sinécdoque narrativa con paradoja.", ejemplo: "La sombra del cíborg era la luz de su existencia.", ejercicio: "¿Qué figura retórica es una contradicción verdadera?", respuesta: "paradoja" },
        { nombre: "El aliento de la IA", teoria: "Sinécdoque narrativa con sinécdoque.", ejemplo: "El aliento de la IA era su software.", ejercicio: "¿Qué figura retórica usa la parte por el todo?", respuesta: "sinécdoque" },

    narrativos.forEach((t, i) => TECNICAS.push({ id: i+1, bloque: 1, categoria: "narrativo", ...t }));

        { nombre: "Una galaxia de luz", teoria: "Sinécdoque descriptiva con metáfora.", ejemplo: "Una galaxia de luz en sus ojos.", ejercicio: "¿Qué figura retórica usa metáfora en la sinécdoque?", respuesta: "metáfora" },

        { nombre: "El eco del tiempo", teoria: "Sinécdoque descriptiva con paradoja.", ejemplo: "El eco del tiempo era eterno y efímero.", ejercicio: "¿Qué figura retórica es una contradicción descriptiva?", respuesta: "paradoja" },

        { nombre: "El susurro del silencio", teoria: "Sinécdoque descriptiva con perífrasis.", ejemplo: "El susurro del silencio, el eco del vacío.", ejercicio: "¿Qué figura retórica usa un rodeo descriptivo?", respuesta: "perífrasis" },
        { nombre: "La piel del tiempo", teoria: "Sinécdoque descriptiva con antonomasia.", ejemplo: "La piel del tiempo, así llamaban a la historia.", ejercicio: "¿Qué figura retórica sustituye el nombre por cualidad?", respuesta: "antonomasia" },

        { nombre: "El brillo del acero", teoria: "Sinécdoque descriptiva con epíteto.", ejemplo: "El brillo del frío acero.", ejercicio: "¿Qué figura retórica usa adjetivos expresivos?", respuesta: "epíteto" },
        { nombre: "El grito del sol", teoria: "Sinécdoque descriptiva con hipótiposis.", ejemplo: "El grito del sol era un rugido de luz.", ejercicio: "¿Qué figura retórica hace presente lo ausente?", respuesta: "hipótiposis" },
        { nombre: "El espejo de la luna", teoria: "Sinécdoque descriptiva con diáfasis.", ejemplo: "La luna era como un espejo de la tierra.", ejercicio: "¿Qué figura retórica describe por comparación?", respuesta: "diáfasis" },

    // =================== BLOQUE 3: SINÉCDOQUES ARGUMENTATIVAS DE CIENCIA FICCIÓN (25) ===================
    const argumentativos = [
        { nombre: "La mano del poder", teoria: "Sinécdoque argumentativa con tesis.", ejemplo: "La mano del poder controla el universo.", ejercicio: "¿Qué figura retórica presenta una tesis en la sinécdoque?", respuesta: "tesis" },
        { nombre: "El ojo de la ley", teoria: "Sinécdoque argumentativa con argumento de autoridad.", ejemplo: "Como dijo el filósofo, el ojo de la ley es la justicia.", ejercicio: "¿Qué figura retórica usa autoridad?", respuesta: "argumento de autoridad" },
        { nombre: "El corazón de la colonia", teoria: "Sinécdoque argumentativa con analogía.", ejemplo: "El corazón de la colonia es como el motor de la nave.", ejercicio: "¿Qué figura retórica usa analogía?", respuesta: "analogía" },
        { nombre: "El cerebro de la IA", teoria: "Sinécdoque argumentativa con ejemplificación.", ejemplo: "Como el cerebro humano, la IA procesa información.", ejercicio: "¿Qué figura retórica usa ejemplos?", respuesta: "ejemplificación" },
        { nombre: "El alma del robot", teoria: "Sinécdoque argumentativa con contraargumento.", ejemplo: "No es un objeto, es el alma del robot.", ejercicio: "¿Qué figura retórica refuta una idea?", respuesta: "contraargumento" },

        { nombre: "La deducción del cosmos", teoria: "Sinécdoque argumentativa con deducción.", ejemplo: "Todo cosmos es infinito, luego este también.", ejercicio: "¿Qué figura retórica va de lo general a lo particular?", respuesta: "deducción" },

        { nombre: "El disfemismo de la evolución", teoria: "Sinécdoque argumentativa con disfemismo.", ejemplo: "El dolor es el martillo de la evolución.", ejercicio: "¿Qué figura retórica usa palabras fuertes?", respuesta: "disfemismo" },
        { nombre: "El eufemismo del final", teoria: "Sinécdoque argumentativa con eufemismo.", ejemplo: "El final es el comienzo de la luz.", ejercicio: "¿Qué figura retórica usa suavidad?", respuesta: "eufemismo" },
    ];
    argumentativos.forEach((t, i) => TECNICAS.push({ id: i+51, bloque: 3, categoria: "argumentativo", ...t }));

    // =================== BLOQUE 4: SINÉCDOQUES EXPOSITIVAS DE CIENCIA FICCIÓN (25) ===================
    const expositivos = [
        { nombre: "Definición de sinécdoque", teoria: "Sinécdoque expositiva con definición.", ejemplo: "La sinécdoque es una figura que usa la parte por el todo.", ejercicio: "¿Qué figura retórica define la sinécdoque?", respuesta: "definición" },
        { nombre: "Clasificación de galaxias", teoria: "Sinécdoque expositiva con clasificación.", ejemplo: "Las galaxias se clasifican en espirales y elípticas.", ejercicio: "¿Qué figura retórica clasifica elementos?", respuesta: "clasificación" },
        { nombre: "Comparación de estrellas", teoria: "Sinécdoque expositiva con comparación.", ejemplo: "El sol es como una estrella ordinaria.", ejercicio: "¿Qué figura retórica compara elementos?", respuesta: "comparación" },
        { nombre: "Causa de la gravedad", teoria: "Sinécdoque expositiva con causalidad.", ejemplo: "La gravedad es causada por la masa.", ejercicio: "¿Qué figura retórica explica causas?", respuesta: "causalidad" },
        { nombre: "Efecto de la expansión", teoria: "Sinécdoque expositiva con efecto.", ejemplo: "La expansión produce el desplazamiento al rojo.", ejercicio: "¿Qué figura retórica explica efectos?", respuesta: "efecto" },
        { nombre: "Análisis del ADN", teoria: "Sinécdoque expositiva con análisis.", ejemplo: "El ADN se compone de cuatro bases.", ejercicio: "¿Qué figura retórica descompone en partes?", respuesta: "análisis" },
        { nombre: "Síntesis de la evolución", teoria: "Sinécdoque expositiva con síntesis.", ejemplo: "La evolución es adaptación y selección.", ejercicio: "¿Qué figura retórica integra ideas?", respuesta: "síntesis" },
        { nombre: "Ejemplo de exoplaneta", teoria: "Sinécdoque expositiva con ejemplificación.", ejemplo: "Como Próxima b, un exoplaneta habitable.", ejercicio: "¿Qué figura retórica usa ejemplos?", respuesta: "ejemplificación" },
        { nombre: "Paráfrasis de la teoría", teoria: "Sinécdoque expositiva con paráfrasis.", ejemplo: "Es decir, el universo es un holograma.", ejercicio: "¿Qué figura retórica reformula una idea?", respuesta: "paráfrasis" },
        { nombre: "Resumen del cosmos", teoria: "Sinécdoque expositiva con resumen.", ejemplo: "En resumen, el universo es infinito.", ejercicio: "¿Qué figura retórica sintetiza?", respuesta: "resumen" },
        { nombre: "Glosa de la física", teoria: "Sinécdoque expositiva con glosa.", ejemplo: "Cabe decir que la física es la base.", ejercicio: "¿Qué figura retórica comenta un tema?", respuesta: "glosa" },
        { nombre: "Transición al futuro", teoria: "Sinécdoque expositiva con transición.", ejemplo: "Ahora, el futuro es la exploración.", ejercicio: "¿Qué figura retórica conecta ideas?", respuesta: "transición" },
        { nombre: "Recapitulación de la ciencia", teoria: "Sinécdoque expositiva con recapitulación.", ejemplo: "Retomando la ciencia, la física es la clave.", ejercicio: "¿Qué figura retórica recapitula?", respuesta: "recapitulación" },
        { nombre: "Conclusión sobre la vida", teoria: "Sinécdoque expositiva con conclusión.", ejemplo: "Finalmente, la vida es el milagro.", ejercicio: "¿Qué figura retórica concluye?", respuesta: "conclusión" },
        { nombre: "Recomendación sobre el viaje", teoria: "Sinécdoque expositiva con recomendación.", ejemplo: "Te sugiero que explores el cosmos.", ejercicio: "¿Qué figura retórica recomienda?", respuesta: "recomendación" },
        { nombre: "Advertencia sobre el espacio", teoria: "Sinécdoque expositiva con advertencia.", ejemplo: "Cuida el espacio, es hostil.", ejercicio: "¿Qué figura retórica advierte?", respuesta: "advertencia" },
        { nombre: "Corrección de la descripción", teoria: "Sinécdoque expositiva con corrección.", ejemplo: "Más bien, el agujero negro es un túnel.", ejercicio: "¿Qué figura retórica corrige?", respuesta: "corrección" },
        { nombre: "Hipótesis sobre el multiverso", teoria: "Sinécdoque expositiva con hipótesis.", ejemplo: "Si el multiverso existe, todo es posible.", ejercicio: "¿Qué figura retórica plantea hipótesis?", respuesta: "hipótesis" },
        { nombre: "Atenuación de la teoría", teoria: "Sinécdoque expositiva con atenuación.", ejemplo: "Quizás, la teoría de cuerdas sea la clave.", ejercicio: "¿Qué figura retórica atenúa una idea?", respuesta: "atenuación" },
        { nombre: "Énfasis en la evolución", teoria: "Sinécdoque expositiva con énfasis.", ejemplo: "Sin duda, la evolución es la respuesta.", ejercicio: "¿Qué figura retórica enfatiza?", respuesta: "énfasis" },
        { nombre: "Generalización sobre la vida", teoria: "Sinécdoque expositiva con generalización.", ejemplo: "Toda vida busca la luz.", ejercicio: "¿Qué figura retórica generaliza?", respuesta: "generalización" },
        { nombre: "Precisión de la física", teoria: "Sinécdoque expositiva con precisión.", ejemplo: "Exactamente, la física es la ciencia del universo.", ejercicio: "¿Qué figura retórica precisa?", respuesta: "precisión" },
        { nombre: "Matización del destino", teoria: "Sinécdoque expositiva con matización.", ejemplo: "No obstante, el destino no es fijo.", ejercicio: "¿Qué figura retórica matiza?", respuesta: "matización" },
        { nombre: "Conclusión positiva", teoria: "Sinécdoque expositiva con conclusión positiva.", ejemplo: "Al final, el cosmos es bello.", ejercicio: "¿Qué figura retórica concluye con optimismo?", respuesta: "conclusión positiva" },
        { nombre: "Verdad universal del universo", teoria: "Sinécdoque expositiva con verdad universal.", ejemplo: "El universo es el espejo del ser.", ejercicio: "¿Qué figura retórica expresa una verdad eterna?", respuesta: "verdad universal" },
    ];
    expositivos.forEach((t, i) => TECNICAS.push({ id: i+76, bloque: 4, categoria: "expositivo", ...t }));

    TECNICAS.sort((a,b) => a.id - b.id);

    // ========== RENDER ==========
    const blockNav = document.getElementById('blockNav');
    const cardsGrid = document.getElementById('cardsGrid');
    const quizContainer = document.getElementById('quizContainer');

    let currentBlock = 1;
    const BLOCK_NAMES = ['', 'Sinécdoques narrativas', 'Sinécdoques descriptivas', 'Sinécdoques argumentativas', 'Sinécdoques expositivas'];

    for (let i = 1; i <= 4; i++) {
        const btn = document.createElement('button');
        btn.textContent = `${i}. ${BLOCK_NAMES[i]}`;
        btn.dataset.block = i;
        btn.addEventListener('click', () => {
            currentBlock = i;
            renderCards(i);
            updateNav(i);
        });
        blockNav.appendChild(btn);
    }

    function updateNav(block) {
        document.querySelectorAll('.block-nav button').forEach(b => b.classList.toggle('active', parseInt(b.dataset.block) === block));
    }
    updateNav(1);

    window.verificarRespuesta = function(id) {
        const input = document.getElementById(`input-${id}`);
        const feedback = document.getElementById(`feedback-${id}`);
        const correcta = document.getElementById(`correcta-${id}`);
        if (!input || !feedback) return;
        const valor = input.value.trim().toLowerCase();
        const respuestaCorrecta = correcta ? correcta.textContent.toLowerCase() : '';
        if (valor === '' || valor === '...') {
            feedback.textContent = '✏️ Escribe tu respuesta primero.';
            feedback.className = 'feedback-msg';
            return;
        }
        const normalize = (s) => s.replace(/\s+/g, ' ').trim();
        const esCorrecto = normalize(valor) === normalize(respuestaCorrecta) ||
                           normalize(valor).includes(normalize(respuestaCorrecta)) ||
                           normalize(respuestaCorrecta).includes(normalize(valor));
        if (esCorrecto) {
            feedback.textContent = '✅ ¡Correcto! Bien hecho.';
            feedback.className = 'feedback-msg correcto';
        } else {
            feedback.textContent = `❌ Incorrecto. La respuesta correcta es: "${respuestaCorrecta}"`;
            feedback.className = 'feedback-msg incorrecto';
        }
    };

    function renderCards(block) {
        const filtered = TECNICAS.filter(t => t.bloque === block);
        cardsGrid.innerHTML = filtered.map((t, idx) => {
            return `
                <div class="card-flip" data-id="${t.id}" onclick="this.classList.toggle('flipped')">
                    <div class="card-flip-inner">
                        <div class="card-front">
                            <div class="numero">${t.id}</div>
                            <span class="categoria">${t.categoria}</span>
                            <h3>${t.nombre}</h3>
                            <div class="teoria">${t.teoria}</div>
                            <div class="girar-indicador">↻ tocar para practicar</div>
                        </div>
                        <div class="card-back">
                            <div style="font-weight:600;color:#8bc4e0;margin-bottom:0.2rem;">🌀 ${t.nombre}</div>
                            <div class="ejemplo"><strong>Ejemplo:</strong> ${t.ejemplo}</div>
                            <div class="ejercicio">✏️ ${t.ejercicio}</div>
                            <div class="respuesta-area">
                                <input type="text" id="input-${t.id}" placeholder="Escribe tu respuesta..." />
                                <button class="btn-verificar" onclick="verificarRespuesta(${t.id})">Comprobar</button>
                            </div>
                            <div id="feedback-${t.id}" class="feedback-msg"></div>
                            <div id="correcta-${t.id}" style="display:none;">${t.respuesta}</div>
                            <div class="respuesta-correcta">✓ ${t.respuesta}</div>
                            <div class="etiqueta">técnica #${t.id} · ${t.categoria}</div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ========== QUIZ ==========
    let quizQuestions = [];
    let currentQuizIndex = 0;
    let score = 0;
    let answered = false;

    function generateQuiz() {
        const shuffled = [...TECNICAS].sort(() => Math.random() - 0.5);
        quizQuestions = shuffled.slice(0, 10).map(t => {
            const opts = [t.respuesta];
            const others = TECNICAS.filter(x => x.id !== t.id);
            const shuffledOthers = others.sort(() => Math.random() - 0.5);
            for (let i = 0; i < 3; i++) {
                if (shuffledOthers[i]) opts.push(shuffledOthers[i].respuesta);
            }
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return {
                pregunta: `📌 ${t.ejercicio} (técnica: ${t.nombre})`,
                opciones: opts,
                correcta: t.respuesta,
                id: t.id
            };
        });
        currentQuizIndex = 0;
        score = 0;
        answered = false;
        renderQuiz();
    }

    function renderQuiz() {
        if (!quizQuestions.length) return;
        const q = quizQuestions[currentQuizIndex];
        const total = quizQuestions.length;
        let html = `
            <div class="quiz-pregunta">
                <p>${q.pregunta}</p>
                <div class="quiz-opciones" id="quizOptions">
        `;
        q.opciones.forEach((op, idx) => {
            html += `<button data-idx="${idx}" onclick="checkAnswer(${idx})">${op}</button>`;
        });
        html += `</div>
                <div id="quizFeedback" style="margin-top:0.8rem;"></div>
                <div class="quiz-result" id="quizScore">Puntuación: ${score}/${total}</div>
            </div>
            <div class="quiz-controles">
                <button id="nextQuizBtn" disabled>→ Siguiente</button>
                <button onclick="generateQuiz()">🔄 Nuevo cuestionario</button>
            </div>
        `;
        quizContainer.innerHTML = html;
        answered = false;
        document.getElementById('nextQuizBtn').disabled = true;
    }

    window.checkAnswer = function(idx) {
        if (answered) return;
        const q = quizQuestions[currentQuizIndex];
        const buttons = document.querySelectorAll('#quizOptions button');
        buttons.forEach((b, i) => {
            b.disabled = true;
            if (i === idx) {
                const esCorrecta = q.opciones[idx] === q.correcta;
                b.classList.add(esCorrecta ? 'correct' : 'incorrect');
                if (esCorrecta) score++;
            }
            if (q.opciones[i] === q.correcta) {
                buttons[i].classList.add('correct');
            }
        });
        answered = true;
        document.getElementById('nextQuizBtn').disabled = false;
        document.getElementById('quizScore').textContent = `Puntuación: ${score}/${quizQuestions.length}`;
        const fb = document.getElementById('quizFeedback');
        fb.innerHTML = `<span style="background:#2a5a7a;color:#e0f0ff;padding:0.2rem 1rem;border-radius:40px;">✅ Respuesta correcta: ${q.correcta}</span>`;
    };

    document.addEventListener('click', function(e) {
        if (e.target.id === 'nextQuizBtn') {
            if (currentQuizIndex < quizQuestions.length - 1) {
                currentQuizIndex++;
                renderQuiz();
            } else {
                alert(`¡Cuestionario finalizado! Puntuación: ${score}/${quizQuestions.length}`);
                document.getElementById('nextQuizBtn').disabled = true;
            }
        }
    });

    // Inicializar
    renderCards(1);
    generateQuiz();
</script>
