        { nombre: "Efecto de la imagen sensorial", teoria: "Imagen sensorial expositiva con efecto.", ejemplo: "La imagen sensorial produce emociones.", ejercicio: "¿Qué imagen sensorial explica efectos?", respuesta: "efecto de imagen sensorial" },
        { nombre: "Análisis de la imagen sensorial", teoria: "Imagen sensorial expositiva con análisis.", ejemplo: "La imagen sensorial se compone de percepción y emoción.", ejercicio: "¿Qué imagen sensorial analiza?", respuesta: "análisis de imagen sensorial" },
        { nombre: "Síntesis de la imagen sensorial", teoria: "Imagen sensorial expositiva con síntesis.", ejemplo: "La imagen sensorial es la síntesis de la experiencia.", ejercicio: "¿Qué imagen sensorial sintetiza?", respuesta: "síntesis de imagen sensorial" },
        { nombre: "Ejemplo de imagen sensorial", teoria: "Imagen sensorial expositiva con ejemplificación.", ejemplo: "Como 'el aroma de la luz', una imagen sensorial.", ejercicio: "¿Qué imagen sensorial usa ejemplos?", respuesta: "ejemplo de imagen sensorial" },
        { nombre: "Paráfrasis de la imagen sensorial", teoria: "Imagen sensorial expositiva con paráfrasis.", ejemplo: "Es decir, la imagen sensorial apela a los sentidos.", ejercicio: "¿Qué imagen sensorial reformula?", respuesta: "paráfrasis de imagen sensorial" },
        { nombre: "Resumen de la imagen sensorial", teoria: "Imagen sensorial expositiva con resumen.", ejemplo: "En resumen, la imagen sensorial es una herramienta literaria.", ejercicio: "¿Qué imagen sensorial resume?", respuesta: "resumen de imagen sensorial" },

        { nombre: "Transición sensorial", teoria: "Imagen sensorial expositiva con transición.", ejemplo: "Ahora, la imagen sensorial en la ciencia ficción.", ejercicio: "¿Qué imagen sensorial transita?", respuesta: "transición sensorial" },
        { nombre: "Recapitulación sensorial", teoria: "Imagen sensorial expositiva con recapitulación.", ejemplo: "Retomando la imagen sensorial, es clave en la literatura.", ejercicio: "¿Qué imagen sensorial recapitula?", respuesta: "recapitulación sensorial" },

        { nombre: "Recomendación sensorial", teoria: "Imagen sensorial expositiva con recomendación.", ejemplo: "Te sugiero que explores las imágenes sensoriales en la ciencia ficción.", ejercicio: "¿Qué imagen sensorial recomienda?", respuesta: "recomendación sensorial" },
        { nombre: "Advertencia sensorial", teoria: "Imagen sensorial expositiva con advertencia.", ejemplo: "Cuida las imágenes sensoriales, son poderosas.", ejercicio: "¿Qué imagen sensorial advierte?", respuesta: "advertencia sensorial" },
        { nombre: "Corrección sensorial", teoria: "Imagen sensorial expositiva con corrección.", ejemplo: "Más bien, la imagen sensorial es subjetiva.", ejercicio: "¿Qué imagen sensorial corrige?", respuesta: "corrección sensorial" },
        { nombre: "Hipótesis sensorial", teoria: "Imagen sensorial expositiva con hipótesis.", ejemplo: "Si la imagen sensorial es vívida, entonces impacta.", ejercicio: "¿Qué imagen sensorial plantea hipótesis?", respuesta: "hipótesis sensorial" },
        { nombre: "Atenuación sensorial", teoria: "Imagen sensorial expositiva con atenuación.", ejemplo: "Quizás, la imagen sensorial sea solo una percepción.", ejercicio: "¿Qué imagen sensorial atenúa?", respuesta: "atenuación sensorial" },
        { nombre: "Énfasis sensorial", teoria: "Imagen sensorial expositiva con énfasis.", ejemplo: "Sin duda, la imagen sensorial es clave en la literatura.", ejercicio: "¿Qué imagen sensorial enfatiza?", respuesta: "énfasis sensorial" },
        { nombre: "Generalización sensorial", teoria: "Imagen sensorial expositiva con generalización.", ejemplo: "Toda imagen sensorial apela a los sentidos.", ejercicio: "¿Qué imagen sensorial generaliza?", respuesta: "generalización sensorial" },
        { nombre: "Precisión sensorial", teoria: "Imagen sensorial expositiva con precisión.", ejemplo: "Exactamente, la imagen sensorial es una herramienta literaria.", ejercicio: "¿Qué imagen sensorial precisa?", respuesta: "precisión sensorial" },
        { nombre: "Matización sensorial", teoria: "Imagen sensorial expositiva con matización.", ejemplo: "No obstante, la imagen sensorial puede variar.", ejercicio: "¿Qué imagen sensorial matiza?", respuesta: "matización sensorial" },
        { nombre: "Conclusión positiva sensorial", teoria: "Imagen sensorial expositiva con conclusión positiva.", ejemplo: "Al final, la imagen sensorial es bella.", ejercicio: "¿Qué imagen sensorial concluye con optimismo?", respuesta: "conclusión positiva sensorial" },
        { nombre: "Verdad universal sensorial", teoria: "Imagen sensorial expositiva con verdad universal.", ejemplo: "La imagen sensorial es el espejo del alma.", ejercicio: "¿Qué imagen sensorial expresa una verdad eterna?", respuesta: "verdad universal sensorial" },
    ];

    TECNICAS.sort((a,b) => a.id - b.id);

    // ========== RENDER ==========
    const blockNav = document.getElementById('blockNav');
    const cardsGrid = document.getElementById('cardsGrid');
    const quizContainer = document.getElementById('quizContainer');

    let currentBlock = 1;
    const BLOCK_NAMES = ['', 'Imágenes narrativas', 'Imágenes descriptivas', 'Imágenes argumentativas', 'Imágenes expositivas'];

    for (let i = 1; i <= 4; i++) {
        const btn = document.createElement('button');
        btn.textContent = `${i}. ${BLOCK_NAMES[i]}`;
        btn.dataset.block = i;
        btn.addEventListener('click', () => {
            currentBlock = i;
            renderCards(i);
            updateNav(i);
        });
        blockNav.appendChild(btn);
    }

    function updateNav(block) {
        document.querySelectorAll('.block-nav button').forEach(b => b.classList.toggle('active', parseInt(b.dataset.block) === block));
    }
    updateNav(1);

    window.verificarRespuesta = function(id) {
        const input = document.getElementById(`input-${id}`);
        const feedback = document.getElementById(`feedback-${id}`);
        const correcta = document.getElementById(`correcta-${id}`);
        if (!input || !feedback) return;
        const valor = input.value.trim().toLowerCase();
        const respuestaCorrecta = correcta ? correcta.textContent.toLowerCase() : '';
        if (valor === '' || valor === '...') {
            feedback.textContent = '✏️ Escribe tu respuesta primero.';
            feedback.className = 'feedback-msg';
            return;
        }
        const normalize = (s) => s.replace(/\s+/g, ' ').trim();
        const esCorrecto = normalize(valor) === normalize(respuestaCorrecta) ||
                           normalize(valor).includes(normalize(respuestaCorrecta)) ||
                           normalize(respuestaCorrecta).includes(normalize(valor));
        if (esCorrecto) {
            feedback.textContent = '✅ ¡Correcto! Bien hecho.';
            feedback.className = 'feedback-msg correcto';
        } else {
            feedback.textContent = `❌ Incorrecto. La respuesta correcta es: "${respuestaCorrecta}"`;
            feedback.className = 'feedback-msg incorrecto';
        }
    };

    function renderCards(block) {
        const filtered = TECNICAS.filter(t => t.bloque === block);
        cardsGrid.innerHTML = filtered.map((t, idx) => {
            return `
                <div class="card-flip" data-id="${t.id}" onclick="this.classList.toggle('flipped')">
                    <div class="card-flip-inner">
                        <div class="card-front">
                            <div class="numero">${t.id}</div>
                            <span class="categoria">${t.categoria}</span>
                            <h3>${t.nombre}</h3>
                            <div class="teoria">${t.teoria}</div>
                            <div class="girar-indicador">↻ tocar para practicar</div>
                        </div>
                        <div class="card-back">
                            <div style="font-weight:600;color:#8bc4e0;margin-bottom:0.2rem;">👁️ ${t.nombre}</div>
                            <div class="ejemplo"><strong>Ejemplo:</strong> ${t.ejemplo}</div>
                            <div class="ejercicio">✏️ ${t.ejercicio}</div>
                            <div class="respuesta-area">
                                <input type="text" id="input-${t.id}" placeholder="Escribe tu respuesta..." />
                                <button class="btn-verificar" onclick="verificarRespuesta(${t.id})">Comprobar</button>
                            </div>
                            <div id="feedback-${t.id}" class="feedback-msg"></div>
                            <div id="correcta-${t.id}" style="display:none;">${t.respuesta}</div>
                            <div class="respuesta-correcta">✓ ${t.respuesta}</div>
                            <div class="etiqueta">técnica #${t.id} · ${t.categoria}</div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ========== QUIZ ==========
    let quizQuestions = [];
    let currentQuizIndex = 0;
    let score = 0;
    let answered = false;

    function generateQuiz() {
        const shuffled = [...TECNICAS].sort(() => Math.random() - 0.5);
        quizQuestions = shuffled.slice(0, 10).map(t => {
            const opts = [t.respuesta];
            const others = TECNICAS.filter(x => x.id !== t.id);
            const shuffledOthers = others.sort(() => Math.random() - 0.5);
            for (let i = 0; i < 3; i++) {
                if (shuffledOthers[i]) opts.push(shuffledOthers[i].respuesta);
            }
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return {
                pregunta: `📌 ${t.ejercicio} (técnica: ${t.nombre})`,
                opciones: opts,
                correcta: t.respuesta,
                id: t.id
            };
        });
        currentQuizIndex = 0;
        score = 0;
        answered = false;
        renderQuiz();
    }

    function renderQuiz() {
        if (!quizQuestions.length) return;
        const q = quizQuestions[currentQuizIndex];
        const total = quizQuestions.length;
        let html = `
            <div class="quiz-pregunta">
                <p>${q.pregunta}</p>
                <div class="quiz-opciones" id="quizOptions">
        `;
        q.opciones.forEach((op, idx) => {
            html += `<button data-idx="${idx}" onclick="checkAnswer(${idx})">${op}</button>`;
        });
        html += `</div>
                <div id="quizFeedback" style="margin-top:0.8rem;"></div>
                <div class="quiz-result" id="quizScore">Puntuación: ${score}/${total}</div>
            </div>
            <div class="quiz-controles">
                <button id="nextQuizBtn" disabled>→ Siguiente</button>
                <button onclick="generateQuiz()">🔄 Nuevo cuestionario</button>
            </div>
        `;
        quizContainer.innerHTML = html;
        answered = false;
        document.getElementById('nextQuizBtn').disabled = true;
    }

    window.checkAnswer = function(idx) {
        if (answered) return;
        const q = quizQuestions[currentQuizIndex];
        const buttons = document.querySelectorAll('#quizOptions button');
        buttons.forEach((b, i) => {
            b.disabled = true;
            if (i === idx) {
                const esCorrecta = q.opciones[idx] === q.correcta;
                b.classList.add(esCorrecta ? 'correct' : 'incorrect');
                if (esCorrecta) score++;
            }
            if (q.opciones[i] === q.correcta) {
                buttons[i].classList.add('correct');
            }
        });
        answered = true;
        document.getElementById('nextQuizBtn').disabled = false;
        document.getElementById('quizScore').textContent = `Puntuación: ${score}/${quizQuestions.length}`;
        const fb = document.getElementById('quizFeedback');
        fb.innerHTML = `<span style="background:#2a5a7a;color:#e0f0ff;padding:0.2rem 1rem;border-radius:40px;">✅ Respuesta correcta: ${q.correcta}</span>`;
    };

    document.addEventListener('click', function(e) {
        if (e.target.id === 'nextQuizBtn') {
            if (currentQuizIndex < quizQuestions.length - 1) {
                currentQuizIndex++;
                renderQuiz();
            } else {
                alert(`¡Cuestionario finalizado! Puntuación: ${score}/${quizQuestions.length}`);
                document.getElementById('nextQuizBtn').disabled = true;
            }
        }
    });

    // Inicializar
    renderCards(1);
    generateQuiz();
</script>
