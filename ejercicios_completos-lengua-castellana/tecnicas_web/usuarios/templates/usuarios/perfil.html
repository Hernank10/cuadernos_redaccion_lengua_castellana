{% extends 'core/base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-4">
        <div class="card">
            <div class="card-body text-center">
                <div class="avatar-circle mx-auto mb-3" style="width: 80px; height: 80px; font-size: 32px;">
                    {{ user.username|first|upper }}
                </div>
                <h4>{{ user.username }}</h4>
                <p class="text-muted">{{ user.get_rol_display }}</p>
                <p><i class="bi bi-envelope"></i> {{ user.email }}</p>
                <p><i class="bi bi-calendar"></i> Miembro desde: {{ user.fecha_registro|date:"d/m/Y" }}</p>
            </div>
        </div>
    </div>
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h5><i class="bi bi-person"></i> Información Personal</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Usuario</label>
                        <input type="text" class="form-control" value="{{ user.username }}" readonly>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" value="{{ user.email }}" readonly>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Rol</label>
                        <input type="text" class="form-control" value="{{ user.get_rol_display }}" readonly>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Bio</label>
                        <textarea class="form-control" rows="3" readonly>{{ user.bio|default:"Sin biografía" }}</textarea>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
