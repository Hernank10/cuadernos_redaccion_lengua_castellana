{% extends 'core/base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0"><i class="bi bi-plus-circle"></i> Agregar Lección a "{{ curso.titulo }}"</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="titulo" class="form-label">Título de la Lección *</label>
                        <input type="text" class="form-control" id="titulo" name="titulo" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="descripcion" class="form-label">Descripción</label>
                        <textarea class="form-control" id="descripcion" name="descripcion" rows="3"></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="tecnica" class="form-label">Técnica Asociada (opcional)</label>
                        <select class="form-control" id="tecnica" name="tecnica">
                            <option value="">--- Ninguna ---</option>
                            {% for tecnica in tecnicas %}
                            <option value="{{ tecnica.id }}">{{ tecnica.titulo|truncatechars:80 }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="orden" class="form-label">Orden</label>
                            <input type="number" class="form-control" id="orden" name="orden" 
                                   value="{{ curso.lecciones.count|add:1 }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="duracion_minutos" class="form-label">Duración (minutos)</label>
                            <input type="number" class="form-control" id="duracion_minutos" name="duracion_minutos" value="5">
                        </div>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-plus-circle"></i> Agregar Lección
                        </button>
                        <a href="{% url 'cursos:detalle' curso.id %}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
